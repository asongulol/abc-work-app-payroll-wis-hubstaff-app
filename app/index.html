  function downloadTemplate(){
    const headers=["First name","Last name","Email","Mobile","Wise recipient id","Wise UUID","Payout method","Rate","Rate effective","Role","Contract","Hubstaff user id","Hubstaff name","Hire date","Date of birth","PH address","GCash","PayMaya","PayPal","Health allowance","13th month","Status","Started on","Ended on"];
    const example=["Manuella","Gamboa","manuella@example.com","+639170000000","12345678","33e5a1b2-c4d5-6789-...","wise","18000","2026-01-01","Billing Associate","FT","2030586","Manuella Gamboa","2025-06-01","1995-03-12","Quezon City, PH","","","","yes","yes","active","2025-06-01",""];
    downloadCSV("contractor-import-template.csv",[headers,example]);
  }

  // Derive names, coerce types, find a match (Wise-first), and diff vs existing.
  function buildRow(rec,roster){
    const errors=[], notes=[];
    // names: explicit first/last win; else split a single "name" field.
    let first=rec.first_name, last=rec.last_name, mid=rec.middle_name||null;
    if((!first||!last) && rec.name){
      const toks=rec.name.trim().split(/\s+/);
      if(!first) first=toks[0]||"";
      if(!last)  last=toks.length>1?toks[toks.length-1]:(last||"");
      if(!mid && toks.length>2) mid=toks.slice(1,-1).join(" ");
    }
    const wid = rec.wise_recipient_id!=null && /^\d+$/.test(String(rec.wise_recipient_id).replace(/\D/g,""))
      ? Number(String(rec.wise_recipient_id).replace(/\D/g,"")) : null;
    if(rec.wise_recipient_id!=null && wid==null) notes.push("Wise id not numeric — ignored");
    const uuid = rec.wise_recipient_uuid||null;
    const huid = rec.hubstaff_user_id!=null && /^\d+$/.test(String(rec.hubstaff_user_id)) ? Number(rec.hubstaff_user_id) : null;
    let method=null;
    if(rec.payout_method){ method=BULK_PAYOUT[normHdr(rec.payout_method)]||null; if(!method) notes.push(`payout "${rec.payout_method}" unknown — skipped`); }
    let contract=null;
    if(rec.contract){ const c=normHdr(rec.contract); contract = (c==="pt"||c==="parttime")?"PT":(c==="ft"||c==="fulltime")?"FT":null; if(!contract) notes.push(`contract "${rec.contract}" unknown — skipped`); }
    const ha=parseBool(rec.health_allowance_eligible), thir=parseBool(rec.thirteenth_month_eligible);
    const rate = rec.rate!=null ? Number(String(rec.rate).replace(/[^0-9.]/g,"")) : null;
    if(rec.rate!=null && !(rate>0)) notes.push("rate not a positive number — skipped");
    let status=null;
    if(rec.status){ const s=normHdr(rec.status);
      status = (s==="active"||s==="a"||s==="current") ? "active"
        : (["ended","inactive","terminated","resigned","former","past","done","separated","n"].includes(s) ? "ended" : null);
      if(!status) notes.push(`status "${rec.status}" unknown — skipped`); }
    let startedOn=null;
    if(rec.started_on){ if(/^\d{4}-\d{2}-\d{2}$/.test(rec.started_on)) startedOn=rec.started_on; else notes.push("started on not YYYY-MM-DD — skipped"); }
    let endedOn=null;
    if(rec.ended_on){ if(/^\d{4}-\d{2}-\d{2}$/.test(rec.ended_on)) endedOn=rec.ended_on; else notes.push("ended on not YYYY-MM-DD — skipped"); }

    // ---- MATCH: Wise id -> Wise uuid -> Hubstaff id -> strict name -> loose name
    let hit=null, via="";
    if(wid!=null){ hit=roster.find(r=>Number(r.w.wise_recipient_id)===wid); if(hit)via="Wise id"; }
    if(!hit && uuid){ hit=roster.find(r=>r.w.wise_recipient_uuid && r.w.wise_recipient_uuid===uuid); if(hit)via="Wise UUID"; }
    if(!hit && huid!=null){ hit=roster.find(r=>r.link&&Number(r.link.hubstaff_user_id)===huid); if(hit)via="Hubstaff id"; }
    const fullForKey=`${first||""} ${mid||""} ${last||""}`.trim();
    if(!hit && fullForKey){ const sk=nameKey(fullForKey); hit=roster.find(r=>r.names.some(n=>nameKey(n)===sk)); if(hit)via="name"; }
    if(!hit && fullForKey){ const lk=looseKey(fullForKey); hit=roster.find(r=>r.names.some(n=>looseKey(n)===lk)); if(hit)via="name (loose)"; }

    // worker fields present in this row (don't overwrite with blanks)
    const wp={};
    if(first) wp.first_name=first;
    if(last!=null && last!=="") wp.last_name=last;
    if(mid) wp.middle_name=mid;
    if(rec.email) wp.email=rec.email;
    if(rec.work_email) wp.work_email=rec.work_email;
    if(rec.work_number) wp.work_number=rec.work_number;
    if(rec.work_extension) wp.work_extension=rec.work_extension;
    if(rec.mobile) wp.mobile=rec.mobile;
    if(rec.ph_address) wp.ph_address=rec.ph_address;
    if(rec.hire_date) wp.hire_date=rec.hire_date;
    if(rec.date_of_birth) wp.date_of_birth=rec.date_of_birth;
    if(rec.gcash) wp.gcash=rec.gcash;
    if(rec.paymaya) wp.paymaya=rec.paymaya;
    if(rec.paypal) wp.paypal=rec.paypal;
    if(method) wp.payout_method=method;
    if(wid!=null) wp.wise_recipient_id=wid;
    if(uuid) wp.wise_recipient_uuid=uuid;
    if(ha!==undefined) wp.health_allowance_eligible=ha;
    if(thir!==undefined) wp.thirteenth_month_eligible=thir;
    if(status) wp.status=status;   // worker-level status mirrors the link below
    // 201-file personal fields (flat text)
    ["emergency_name","emergency_relationship","emergency_mobile","permanent_address",
     "address_landmark","postal_code","marital_status","education_level","course",
     "year_graduated","school"].forEach(k=>{ if(rec[k]) wp[k]=rec[k]; });
    // culture bits -> profile_extras jsonb (merged with whatever already exists)
    const extras={};
    if(rec.x_favorite_color) extras.favorite_color=rec.x_favorite_color;
    if(rec.x_favorite_food)  extras.favorite_food=rec.x_favorite_food;
    if(rec.x_motto)          extras.motto=rec.x_motto;
    if(Object.keys(extras).length) wp.profile_extras=extras;   // jsonb column

    const link={};
    if(contract) link.contract=contract;
    if(rec.role) link.role=rec.role;
    if(rec.hubstaff_name) link.hubstaff_name=rec.hubstaff_name;
    if(huid!=null) link.hubstaff_user_id=huid;
    if(status) link.status=status;
    // ended_on follows status (today if ending without an explicit date; cleared on reactivate)
    if(status==="ended") link.ended_on = endedOn || todayISO();
    else if(status==="active") link.ended_on = null;
    else if(endedOn) link.ended_on = endedOn;
    if(startedOn) link.started_on = startedOn;

    let action, existing=null, changes={};
    if(hit){
      action="update"; existing=hit;
      if(!hit.link) notes.push("matched but not in this company — will be linked");
      // diff worker fields (skip object-valued like profile_extras — not in the roster snapshot)
      Object.keys(wp).forEach(k=>{ if(typeof wp[k]==="object"&&wp[k]!==null) return; const a=hit.w[k]??null, b=wp[k]; if(String(a===null?"":a)!==String(b===null?"":b)) changes[k]={from:a,to:b}; });
      Object.keys(link).forEach(k=>{ const a=hit.link?.[k]??null, b=link[k]; if(String(a===null?"":a)!==String(b===null?"":b)) changes[k]={from:a,to:b}; });
    }else{
      action="create";
      if(!first || !fullForKey){ errors.push("No name — can't create. Provide Name, or a Wise id/UUID matching an existing contractor."); action="error"; }
    }
    return { row:rec._row, action, via, errors, notes,
      name:`${first||""} ${last||""}`.trim()||"(no name)",
      existing, wp, link, rate, rate_eff:rec.rate_effective||null, ha, thir, wid, uuid, changes };
  }

  // ---- stage 2: commit ----
  const todayISO=()=>new Date().toISOString().slice(0,10);
  async function upsertRate(worker_id, amount, effRaw){
    const eff = (effRaw && /^\d{4}-\d{2}-\d{2}$/.test(effRaw)) ? effRaw : todayISO();
    const {data:same}=await client.from("rates").select("id")
      .eq("worker_id",worker_id).eq("company_id",companyId).eq("effective_start",eff).limit(1);
    if(same&&same[0]){ await client.from("rates").update({amount_php:amount,period_basis:"semi_monthly",effective_end:null}).eq("id",same[0].id); return; }
    await client.from("rates").update({effective_end:eff})
      .eq("worker_id",worker_id).eq("company_id",companyId).is("effective_end",null).lt("effective_start",eff);
    await client.from("rates").insert({worker_id,company_id:companyId,amount_php:amount,period_basis:"semi_monthly",effective_start:eff});
  }
  function mergeRecips(existingList, wid, uuid){
    const list=Array.isArray(existingList)?[...existingList]:[];
    if(wid==null) return list;
    if(!list.some(x=>Number(x.id)===wid)) list.push({id:wid, uuid:uuid||null, label:"imported"});
    else if(uuid){ const i=list.findIndex(x=>Number(x.id)===wid); if(!list[i].uuid) list[i]={...list[i],uuid}; }
    return list;
  }
  async function commit(){
    setBusy(true); setProgress("Importing…");
    const out={created:0,updated:0,skipped:0,errors:[]};
    const rows=preview.filter(r=>r.action!=="error");
    out.skipped = preview.length - rows.length;
    for(let i=0;i<rows.length;i++){
      const r=rows[i]; setProgress(`Importing ${i+1}/${rows.length} — ${r.name}…`);
      try{
        if(r.action==="update"){
          const wp={...r.wp};
          if(r.wid!=null) wp.wise_recipients=mergeRecips(r.existing.w.wise_recipients, r.wid, r.uuid);
          if(Object.keys(wp).length){ const {error}=await client.from("workers").update(wp).eq("id",r.existing.w.id); if(error)throw error; }
          if(!r.existing.link){
            // matched (e.g. by Wise id) but not yet in this company — create the link
            const {error:le}=await client.from("worker_companies")
              .insert({worker_id:r.existing.w.id,company_id:companyId,contract:"FT",status:"active",role:null,hubstaff_name:null,...r.link});
            if(le)throw le;
          }else if(Object.keys(r.link).length){
            // already linked — update only the provided link fields; don't touch status
            const {error:le}=await client.from("worker_companies")
              .update(r.link).eq("worker_id",r.existing.w.id).eq("company_id",companyId);
            if(le)throw le;
          }
          if(r.rate>0) await upsertRate(r.existing.w.id, r.rate, r.rate_eff);
          logEvent(client,{company_id:companyId,action:"edit_contractor",entity:r.name,detail:{from:"bulk import",via:r.via,changed:r.changes}});
          out.updated++;
        }else{
          // CREATE — match-before-create already done; build full insert
          const base={first_name:r.wp.first_name||"New", last_name:r.wp.last_name||"Contractor", status:"active",
            health_allowance_eligible:r.ha!==undefined?r.ha:true, thirteenth_month_eligible:r.thir!==undefined?r.thir:true, ...r.wp};
          if(r.wid!=null) base.wise_recipients=mergeRecips([], r.wid, r.uuid);
          let {data:nw,error:e1}=await client.from("workers").insert(base).select().single();
          if(e1 && /payout_method/i.test(e1.message)) ({data:nw,error:e1}=await client.from("workers").insert({...base,payout_method:base.payout_method||"wise"}).select().single());
          if(e1)throw e1;
          const {error:e2}=await client.from("worker_companies")
            .insert({worker_id:nw.id,company_id:companyId,contract:"FT",status:"active",role:null,hubstaff_name:null,...r.link});
          if(e2){
            // race / unique on (company,hubstaff_user_id): reuse the winner, drop orphan
            if(/duplicate|unique|23505/i.test(e2.message||"") && r.link.hubstaff_user_id!=null){
              const {data:win}=await client.from("worker_companies").select("worker_id").eq("company_id",companyId).eq("hubstaff_user_id",r.link.hubstaff_user_id).maybeSingle();
              if(win?.worker_id){ await client.from("workers").delete().eq("id",nw.id); nw={id:win.worker_id}; }
              else throw e2;
            } else throw e2;
          }
          if(r.rate>0) await upsertRate(nw.id, r.rate, r.rate_eff);
          logEvent(client,{company_id:companyId,action:"add_contractor",entity:r.name,detail:{from:"bulk import"}});
          out.created++;
        }
      }catch(ex){ out.errors.push({row:r.row,name:r.name,msg:ex.message||String(ex)}); }
    }
    setResult(out); setStage("done"); setBusy(false); setProgress("");
  }

  const counts=preview.reduce((a,r)=>{a[r.action]=(a[r.action]||0)+1;return a;},{});
  const chg=c=>Object.keys(c).slice(0,4).map(k=>`${k}: ${c[k].from??"∅"}→${c[k].to}`).join(", ")+(Object.keys(c).length>4?` +${Object.keys(c).length-4} more`:"");

  return (
    <div className="modal-bg" onClick={close}>
      <div className="modal" ref={mref} role="dialog" aria-modal="true" aria-labelledby="bi-title" onClick={e=>e.stopPropagation()} style={{maxWidth:980}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>
          <div><h2 id="bi-title" style={{margin:0}}>Bulk import contractors</h2>
            <p className="sub" style={{margin:"4px 0 0"}}>Paste from a spreadsheet or upload a CSV. Existing contractors are
              matched <b>by Wise recipient id/UUID first</b>, then Hubstaff id, then name — and <b>updated in place</b>. Single company.</p></div>
          <button className="btn ghost sm" onClick={close}>Close</button>
        </div>

        {(consolidated||!companyId) &&
          <div className="banner" style={{marginTop:12,background:"var(--warn-soft)",borderColor:"#fcd34d",color:"#92400e"}}>
            Pick a single company in the top-left switcher first — rate and company assignment are per-company.</div>}

        {stage==="input" && <>
          <DraftNotice show={draftRestored} onFresh={startFresh}/>
          <div style={{marginTop:12}}>
            <textarea value={text} onChange={e=>setText(e.target.value)} spellCheck={false}
              placeholder={"Paste rows here (header row required). e.g.\nName\tWise recipient id\tWise UUID\tRate\tEmail\nManuella Gamboa\t79bf2801\t33e5...\t18000\tmanuella@x.com"}
              style={{width:"100%",height:160,fontFamily:"monospace",fontSize:12,padding:8,border:"1px solid var(--line)",borderRadius:8}}/>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12,marginTop:10,flexWrap:"wrap"}}>
            <label className="sub">…or upload CSV: <input type="file" accept=".csv,text/csv" onChange={e=>readFile(e.target.files?.[0])}/></label>
            <button className="btn ghost sm" onClick={downloadTemplate}>⬇ Download CSV template</button>
            <span style={{flex:1}}/>
            <button className="btn" disabled={busy||consolidated||!companyId||!text.trim()} onClick={buildPreview}>{busy?progress||"Working…":"Preview"}</button>
          </div>
          <label className="sub" style={{display:"flex",alignItems:"center",gap:6,marginTop:10}}>
            <input type="checkbox" checked={preferWise} onChange={e=>setPreferWise(e.target.checked)}/>
            <span>Prefer the <b>Wise account name</b> for rows with a Wise recipient id (fetched from Wise so the DB name matches payouts). Falls back to the sheet name when Wise can't return one.</span>
          </label>
          <Banner msg={parseErr} tone="error" style={{marginTop:10}} />
          <details style={{marginTop:12}}>
            <summary className="sub" style={{cursor:"pointer"}}>Accepted columns (header names are flexible)</summary>
            <p className="sub" style={{marginTop:6,lineHeight:1.6}}>
              <b>Name</b> (or First name / Last name) · <b>Wise recipient id</b> · <b>Wise UUID</b> · Payout method (wise/bpi/gcash/paymaya/paypal) ·
              Rate · Rate effective (YYYY-MM-DD) · Email · Mobile · Role · Contract (FT/PT) · Hubstaff user id · Hubstaff name ·
              Hire date · Date of birth · PH address · GCash · PayMaya · PayPal · Health allowance (yes/no) · 13th month (yes/no) ·
              Status (active/ended) · Started on (YYYY-MM-DD) · Ended on (YYYY-MM-DD).<br/>
              Blank cells are left untouched on existing contractors — nothing is wiped by an empty column.
              <code>payout_account</code> (bank details) is intentionally excluded — the app never stores raw bank details, only Wise recipient references.
            </p>
          </details>
        </>}

        {stage==="preview" && <>
          <div style={{display:"flex",gap:10,alignItems:"center",margin:"12px 0",flexWrap:"wrap"}}>
            <span className="pill" style={{background:"#dcfce7",color:"#166534"}}>{counts.create||0} new</span>
            <span className="pill" style={{background:"#eef2ff",color:"#3730a3"}}>{counts.update||0} update</span>
            {counts.error>0 && <span className="pill warn">{counts.error} skipped (error)</span>}
            <span style={{flex:1}}/>
            <button className="btn ghost sm" disabled={busy} onClick={()=>setStage("input")}>← Back</button>
            <button className="btn" disabled={busy||(!counts.create&&!counts.update)} onClick={commit}>{busy?progress||"Importing…":`Import ${ (counts.create||0)+(counts.update||0) } contractor(s)`}</button>
          </div>
          <div className="table-scroll" style={{maxHeight:380}}><table style={{fontSize:13}}>
            <thead><tr><th>#</th><th>Name</th><th>Action</th><th>Matched via</th><th>Wise id / UUID</th><th>Rate</th><th>Changes / notes</th></tr></thead>
            <tbody>
              {preview.map((r,i)=>(
                <tr key={i} style={r.action==="error"?{background:"#fef2f2"}:{}}>
                  <td className="muted">{r.row}</td>
                  <td><b>{r.name}</b>{r.wiseName && <span className="pill" style={{marginLeft:6,background:"#ecfeff",color:"#155e75",fontSize:10}}>Wise</span>}</td>
                  <td><span className="pill" style={r.action==="create"?{background:"#dcfce7",color:"#166534"}:r.action==="update"?{background:"#eef2ff",color:"#3730a3"}:{background:"#fee2e2",color:"#991b1b"}}>
                    {r.action==="error"?"skip":r.action}</span></td>
                  <td className="muted">{r.via||(r.action==="create"?"—":"")}</td>
                  <td style={{fontFamily:"monospace",fontSize:11}}>{r.wid??"—"}{r.uuid?` / ${String(r.uuid).slice(0,8)}…`:""}</td>
                  <td>{r.rate>0?`₱${r.rate.toLocaleString()}`:"—"}</td>
                  <td className="muted" style={{maxWidth:300}}>
                    {r.errors.length>0 && <span style={{color:"#991b1b"}}>{r.errors.join("; ")}</span>}
                    {r.action==="update" && Object.keys(r.changes).length>0 && <span>{chg(r.changes)}</span>}
                    {r.action==="update" && Object.keys(r.changes).length===0 && <span>no changes</span>}
                    {r.notes.length>0 && <div style={{color:"#92400e"}}>{r.notes.join("; ")}</div>}
                  </td>
                </tr>
              ))}
            </tbody>
          </table></div>
        </>}

        {stage==="done" && result && <div style={{marginTop:16}}>
          <div className="banner success">Import complete — <b>{result.created}</b> created, <b>{result.updated}</b> updated{result.skipped?`, ${result.skipped} skipped`:""}{result.errors.length?`, ${result.errors.length} failed`:""}.</div>
          {result.errors.length>0 && <div className="table-scroll" style={{maxHeight:200,marginTop:10}}><table style={{fontSize:13}}>
            <thead><tr><th>Row</th><th>Name</th><th>Error</th></tr></thead>
            <tbody>{result.errors.map((e,i)=>(<tr key={i}><td>{e.row}</td><td>{e.name}</td><td style={{color:"#991b1b"}}>{e.msg}</td></tr>))}</tbody>
          </table></div>}
          <div className="actions" style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:14}}>
            <button className="btn ghost" onClick={()=>{setText("");setPreview([]);setResult(null);setStage("input");}}>Import more</button>
            <button className="btn" onClick={()=>{onDone&&onDone();onClose();}}>Done</button>
          </div>
        </div>}
      </div>
    </div>
  );
}

// Admin picker: which profile fields contractors may self-edit in the portal.
// Writes portal_settings.editable_fields (read by the portal + enforced by the
// portal-self edge function). Payout destination is deliberately NOT offered.
function PortalSettingsModal({ client, onClose }){
  const close=guardedClose(onClose);
  const mref=useModalA11y(close,{escClose:false});
  const CANDIDATES=[
    {k:"first_name",label:"First name"},{k:"middle_name",label:"Middle name"},{k:"last_name",label:"Last name"},
    {k:"mobile",label:"Mobile"},{k:"ph_address",label:"PH address"},{k:"date_of_birth",label:"Date of birth"},
    {k:"gcash",label:"GCash"},{k:"paymaya",label:"PayMaya"},{k:"paypal",label:"PayPal"},{k:"wise_tag",label:"Wise Tag"},
    {k:"emergency_name",label:"Emergency contact name"},{k:"emergency_relationship",label:"Emergency relationship"},{k:"emergency_mobile",label:"Emergency mobile"},
    {k:"permanent_address",label:"Permanent address"},{k:"address_landmark",label:"Landmark"},{k:"postal_code",label:"Postal code"},
    {k:"marital_status",label:"Marital status"},{k:"education_level",label:"Highest Degree Attained"},{k:"course",label:"Degree and Major"},{k:"year_graduated",label:"Year graduated"},{k:"school",label:"School"},
    {k:"nickname",label:"Nickname"},{k:"favorite_color",label:"Favorite color"},{k:"favorite_food",label:"Favorite food"},{k:"tshirt_size",label:"T-shirt size"},{k:"shoe_size",label:"Shoe size"},{k:"hobbies",label:"Hobbies"},{k:"motto",label:"Personal motto"},
  ];
  const [sel,setSel]=useState(null); const [busy,setBusy]=useState(false); const [msg,setMsg]=useState("");
  const ucBase=React.useRef(null);
  const ucKey=(a)=>JSON.stringify((a||[]).slice().sort());
  useEffect(()=>{ client.from("portal_settings").select("editable_fields").eq("id",1).maybeSingle()
    .then(({data})=>{ const v=Array.isArray(data?.editable_fields)?data.editable_fields:[]; setSel(v); ucBase.current=ucKey(v); }); },[]);
  const toggle=k=>setSel(s=>s.includes(k)?s.filter(x=>x!==k):[...s,k]);
  useUnsavedGuard({ dirty: sel!==null && ucBase.current!==null && ucKey(sel)!==ucBase.current, label:"portal editable-fields", save: ()=>save() });
  async function save(){
    setBusy(true);setMsg("");
    const {error}=await client.from("portal_settings").upsert({id:1,editable_fields:sel,updated_at:new Date().toISOString()},{onConflict:"id"});
    if(error){ setMsg("Error: "+error.message); setBusy(false); return false; }
    setMsg("Saved."); logEvent(client,{action:"edit_contractor",entity:"portal settings",detail:{editable_fields:sel}});
    ucBase.current=ucKey(sel); setBusy(false); return true;
  }
  return (
    <div className="modal-bg" onClick={close}>
      <div className="modal" ref={mref} role="dialog" aria-modal="true" aria-labelledby="ps-title" onClick={e=>e.stopPropagation()} style={{maxWidth:520}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>
          <div><h2 id="ps-title" style={{margin:0}}>Portal — editable fields</h2>
            <p className="sub" style={{margin:"4px 0 0"}}>Tick the profile fields contractors may edit themselves in the portal. Payout destination (Wise recipient ID/UUID) is always admin-only.</p></div>
          <button className="btn ghost sm" onClick={close}>Close</button>
        </div>
        {sel===null ? <Skeleton rows={4}/> :
        <div style={{marginTop:12}}>
          {CANDIDATES.map(c=>(
            <label key={c.k} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",fontSize:14}}>
              <input type="checkbox" checked={sel.includes(c.k)} onChange={()=>toggle(c.k)}/> {c.label}
            </label>
          ))}
          <div className="actions" style={{display:"flex",gap:8,alignItems:"center",marginTop:10}}>
            <button className="btn" disabled={busy} onClick={save}>{busy?"Saving…":"Save"}</button>
            {msg && <span className="sub">{msg}</span>}
          </div>
        </div>}
      </div>
    </div>
  );
}

// Admin: post announcements shown on every contractor's portal welcome page.
function AnnouncementsModal({ client, onClose }){
  const close=guardedClose(onClose);   // prompt to keep-draft / discard if a draft announcement is typed
  const mref=useModalA11y(close,{escClose:false});
  const AKEY="eis_announce_draft";
  const _ad=draftLoad(AKEY);
  const [rows,setRows]=useState(null);
  const [title,setTitle]=useState((_ad&&_ad.v&&typeof _ad.v.title==="string")?_ad.v.title:"");
  const [body,setBody]=useState((_ad&&_ad.v&&typeof _ad.v.body==="string")?_ad.v.body:"");
  const [busy,setBusy]=useState(false); const [msg,setMsg]=useState("");
  const [draftRestored,setDraftRestored]=useState(!!(_ad&&_ad.v&&(((_ad.v.title||"").trim())||((_ad.v.body||"").trim()))));
  useAutoDraft(AKEY, {title,body}, !!(title.trim()||body.trim()), null);   // auto-save the draft announcement
  function startFresh(){ draftClear(AKEY); setTitle(""); setBody(""); setDraftRestored(false); }
  useUnsavedGuard({ dirty: !!(title.trim()||body.trim()), label:"the draft announcement", save: ()=>{ draftSave(AKEY, {title,body}); return true; }, discard: ()=>startFresh() });
  function load(){ client.from("announcements").select("id,title,body,active,published_at").order("published_at",{ascending:false}).then(({data})=>setRows(data||[])); }
  useEffect(load,[]);
  async function post(){
    if(!title.trim()){ setMsg("Title required."); return; }
    setBusy(true);setMsg("");
    const {error}=await client.from("announcements").insert({title:title.trim(),body:body.trim()||null,author:localStorage.getItem("sb_actor")||"admin"});
    if(error) setMsg("Error: "+error.message);
    else { setTitle("");setBody(""); draftClear(AKEY); setDraftRestored(false); logEvent(client,{action:"edit_contractor",entity:"announcement",detail:{posted:title.trim()}}); load(); }
    setBusy(false);
  }
  async function toggle(a){ await client.from("announcements").update({active:!a.active}).eq("id",a.id); load(); }
  async function del(a){ if(!window.confirm("Delete this announcement?"))return; await client.from("announcements").delete().eq("id",a.id); load(); }
  return (
    <div className="modal-bg" onClick={close}>
      <div className="modal" ref={mref} role="dialog" aria-modal="true" aria-labelledby="an-title" onClick={e=>e.stopPropagation()} style={{maxWidth:640}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>
          <div><h2 id="an-title" style={{margin:0}}>Announcements</h2>
            <p className="sub" style={{margin:"4px 0 0"}}>Shown to every contractor on their portal welcome page ("From New York").</p></div>
          <button className="btn ghost sm" onClick={close}>Close</button>
        </div>
        <div style={{marginTop:12,borderBottom:"1px solid var(--border)",paddingBottom:12}}>
          <DraftNotice show={draftRestored} onFresh={startFresh}/>
          <input style={{width:"100%",padding:8,border:"1px solid var(--border)",borderRadius:8,marginBottom:6}} placeholder="Title" value={title} onChange={e=>setTitle(e.target.value)}/>
          <textarea style={{width:"100%",height:70,padding:8,border:"1px solid var(--border)",borderRadius:8}} placeholder="Message (optional)" value={body} onChange={e=>setBody(e.target.value)}/>
          <div className="actions" style={{display:"flex",gap:8,alignItems:"center",marginTop:6}}>
            <button className="btn" disabled={busy} onClick={post}>{busy?"Posting…":"Post announcement"}</button>
            {msg && <span className="sub">{msg}</span>}
          </div>
        </div>
        <div style={{marginTop:12}}>
          {rows===null?<Skeleton rows={4}/>: !rows.length?<div className="empty">No announcements yet.</div>:
            rows.map(a=>(
              <div key={a.id} style={{borderBottom:"1px solid var(--border)",padding:"8px 0"}}>
                <div style={{display:"flex",justifyContent:"space-between",gap:8}}>
                  <b>{a.title}</b>
                  <span style={{whiteSpace:"nowrap"}}>
                    <button className="btn ghost sm" onClick={()=>toggle(a)}>{a.active?"Hide":"Show"}</button>{" "}
                    <button className="btn ghost sm" onClick={()=>del(a)}>Delete</button>
                  </span>
                </div>
                <div className="sub">{String(a.published_at).slice(0,10)}{a.active?"":" · hidden"}</div>
                {a.body && <div style={{fontSize:13,marginTop:2,whiteSpace:"pre-wrap"}}>{a.body}</div>}
              </div>
            ))}
        </div>
      </div>
    </div>
  );
}

// ============================ CONTRACTORS ====================================
// Guided "Add contractor" wizard: admin captures the IC essentials, the
// contractor completes the rest via onboarding. Creates NOTHING until Create.
function AddContractorWizard({ client, companyId, companyName, onClose, onCreated }){
  const today=new Date().toISOString().slice(0,10);
  const DEFAULTS={ first_name:"", middle_name:"", last_name:"", email:"",
    ph_address:"", permanent_address:"", date_of_birth:"",
    company_id:companyId||"", contract:"FT", role:"", rate:"", hours:"40", contract_date:today, hire_date:today,
    shift_start:etToPhtHHMM("08:00"), shift_end:etToPhtHHMM("17:00"),
    ic_addendum_type:"", ic_addendum_text:"", extra_docs:[],
    tools:{gmail:false,providersoft:false,hubstaff:false,zoom:false,others:""},
    countersigner_user_id:"", countersigner_name:"",
    health_allowance_eligible:true, thirteenth_month_eligible:true, invite:true };
  // Per-company draft so a half-finished hire survives a refresh/close/navigation.
  // Nothing touches the DB until "Create contractor"; the draft lives in
  // localStorage and is cleared on create or "Start fresh".
  const DRAFT_KEY="eis_hire_draft_"+(companyId||"none");
  const loadedDraft=(()=>{ try{ const r=localStorage.getItem(DRAFT_KEY); if(!r) return null; const d=JSON.parse(r); return (d&&d.f&&typeof d.f==="object")?d:null; }catch{ return null; } })();
  const [step,setStep]=useState(loadedDraft?Math.min(3,Math.max(1,loadedDraft.step||1)):1);
  const [f,setF]=useState(loadedDraft?{...DEFAULTS,...loadedDraft.f}:DEFAULTS);
  const [draftRestored,setDraftRestored]=useState(!!loadedDraft);
  const set=(k,v)=>setF(x=>({...x,[k]:v}));
  const [busy,setBusy]=useState(false); const [err,setErr]=useState(""); const [errs,setErrs]=useState({});
  const [result,setResult]=useState(null);
  const [sameAddr,setSameAddr]=useState(()=>{ const d=loadedDraft&&loadedDraft.f; return !!(d&&d.ph_address)&&((d.permanent_address||"")===(d.ph_address||"")); });
  // Keep permanent address synced to current while "same as current" is ticked.
  useEffect(()=>{ if(sameAddr) setF(x=> x.permanent_address===x.ph_address ? x : {...x,permanent_address:x.ph_address}); },[sameAddr,f.ph_address]);
  // a11y: focus-trap + focus-restore for whichever branch is mounted (form XOR
  // success). escClose:false so a stray Escape never discards a half-typed hire;
  // dep:!!result re-establishes the trap when the success screen replaces the form.
  const mref=useModalA11y(onClose,{escClose:false, dep:!!result});
  const [admins,setAdmins]=useState([]); const [companies,setCompanies]=useState([]);
  useEffect(()=>{
    client.from("admin_users").select("user_id,email,name,can_countersign").then(({data})=>{
      const list=data||[]; setAdmins(list);
      // Default the countersigner to the current admin — but only if THEY may
      // countersign — and use their name (not email) on the document.
      client.auth.getUser().then(({data:ud})=>{ const u=ud&&ud.user; if(!u) return;
        const meA=list.find(a=>a.user_id===u.id);
        if(meA && meA.can_countersign!==false) setF(x=>x.countersigner_user_id?x:{...x,countersigner_user_id:u.id,countersigner_name:meA.name||meA.email||u.email||""});
      });
    });
    // Companies the admin may assign to (RLS scopes this to their companies; owner sees all).
    client.from("companies").select("id,name,status").eq("status","active").order("name").then(({data})=>setCompanies(data||[]));
  },[]);  // eslint-disable-line
  const doneRef=React.useRef(false);
  useEffect(()=>{
    if(doneRef.current) return;
    const id=setTimeout(()=>{ if(doneRef.current) return;
      const has=s=>s!=null&&String(s).trim()!=="";
      const hasContent=has(f.first_name)||has(f.last_name)||has(f.email)||has(f.role)||has(f.rate)||has(f.ic_addendum_text)||(Array.isArray(f.extra_docs)&&f.extra_docs.some(has));
      try{ if(hasContent) localStorage.setItem(DRAFT_KEY, JSON.stringify({f, step, companyName:companyName||"", at:Date.now()})); }catch(_e){} }, 500);
    return ()=>clearTimeout(id);
  },[f, step]);  // eslint-disable-line
  function clearDraft(){ doneRef.current=true; try{ localStorage.removeItem(DRAFT_KEY); }catch(_e){} }
  function startFresh(){ try{ localStorage.removeItem(DRAFT_KEY); }catch(_e){} setF(DEFAULTS); setStep(1); setDraftRestored(false); setErr(""); setErrs({}); }
  const ne=v=>v!=null&&String(v).trim()!=="";
  // Unsaved-changes guard. This flow autosaves a localStorage draft continuously,
  // so "Save" just keeps that draft (nothing is created until "Create contractor")
  // and "Discard" clears it. Not dirty once the contractor has been created (result).
  const ucDirty = !result && (ne(f.first_name)||ne(f.last_name)||ne(f.email)||ne(f.role)||ne(f.rate)||ne(f.ic_addendum_text)||(Array.isArray(f.extra_docs)&&f.extra_docs.some(ne)));
  // "Save" on the leave-prompt writes the draft right now (the autosave debounce
  // may not have fired) so it's there to resume from the Hiring screen banner.
  const persistDraft=()=>{ try{ localStorage.setItem(DRAFT_KEY, JSON.stringify({f, step, companyName:companyName||"", at:Date.now()})); }catch(_e){} };
  useUnsavedGuard({ dirty: ucDirty, label:"the new-contractor form", save: ()=>{ persistDraft(); return true; }, discard: ()=>startFresh() });
  const close=guardedClose(onClose);   // prompt to keep-draft / discard if there are entries
  function validateStep(s){
    const e={};
    if(s===1){
      if(!ne(f.first_name)) e.first_name="Required";
      if(!ne(f.last_name)) e.last_name="Required";
      if(f.invite || ne(f.email)){ if(!ne(f.email)) e.email="Email required to invite"; else if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(f.email.trim())) e.email="Enter a valid email"; }
    }
    if(s===2){
      if(!ne(f.company_id)) e.company_id="Select a company";
      if(!ne(f.role)) e.role="Required";
      if(!ne(f.rate)) e.rate="Required"; else if(!(parseFloat(f.rate)>0)) e.rate="Enter a positive amount";
      if(!ne(f.hours)) e.hours="Required"; else if(!(parseFloat(f.hours)>0)) e.hours="Enter a positive number";
      if(!ne(f.hire_date)) e.hire_date="Required";
      if(!ne(f.countersigner_user_id)) e.countersigner_user_id="Assign a countersigner";
      if(!ne(f.shift_start)||!ne(f.shift_end)) e.shift="Set a shift start and end";
    }
    return e;
  }
  function next(){ const e=validateStep(step); setErrs(e); if(!Object.keys(e).length) setStep(s=>Math.min(3,s+1)); }
  function back(){ setErrs({}); setErr(""); setStep(s=>Math.max(1,s-1)); }
  async function create(){
    const e={...validateStep(1),...validateStep(2)};
    if(Object.keys(e).length){ setErrs(e); setErr("Please fix the highlighted fields."); setStep((e.first_name||e.last_name||e.email)?1:2); return; }
    const coId=f.company_id||companyId;
    if(!coId){ setErr("Select a company for this hire."); setErrs(p=>({...p,company_id:"Select a company"})); setStep(2); return; }
    setBusy(true); setErr("");
    let w=null;
    try{
      // MATCH-BEFORE-CREATE: never make a second record for an existing email.
      if(ne(f.email)){
        const {data:dupe}=await client.from("workers").select("id,first_name,last_name").ilike("email",f.email.trim()).limit(1);
        if(Array.isArray(dupe)&&dupe.length){
          setErrs({email:"A contractor with this email already exists"}); setStep(1);
          setErr(`${[dupe[0].first_name,dupe[0].last_name].filter(Boolean).join(" ")||"Someone"} already uses ${f.email.trim()} — open their profile instead.`);
          setBusy(false); return;
        }
        // Early warning before we create anything: reject an email that already has
        // a portal login (visible to this admin). The edge create_login is the
        // authoritative guard — it can see ALL auth accounts (admins / leftover
        // users) — but catching the common case here avoids a create-then-rollback.
        const {data:loginDupe}=await client.from("contractor_logins").select("worker_id").ilike("email",f.email.trim()).limit(1);
        if(Array.isArray(loginDupe)&&loginDupe.length){
          setErrs({email:"This email already has a portal login"}); setStep(1);
          setErr(`${f.email.trim()} is already in use by another portal login — use a different email for this contractor.`);
          setBusy(false); return;
        }
      }
      // NAME-level guard: an active namesake is almost always the SAME person
      // entered twice (the duplicate this prevents). Distinct people can share a
      // name, so warn + require an explicit override rather than a hard block.
      {
        const fn=f.first_name.trim(), ln=f.last_name.trim();
        if(fn && ln){
          const norm=s=>String(s||"").trim().toLowerCase().replace(/\s+/g," ");
          const {data:nameDupe}=await client.from("workers")
            .select("id,first_name,middle_name,last_name,email,status")
            .ilike("first_name",fn).ilike("last_name",ln).limit(5);
          const hit=(nameDupe||[]).find(d=>norm(d.first_name)===norm(fn)&&norm(d.last_name)===norm(ln));
          if(hit){
            const who=[hit.first_name,hit.middle_name,hit.last_name].filter(Boolean).join(" ");
            if(!(await confirmDanger({
              title:"Possible duplicate contractor",
              message:`A contractor named ${who}${hit.email?` (${hit.email})`:""} already exists${hit.status&&hit.status!=="active"?` — currently ${hit.status}`:""}.\n\nThis is usually the same person entered twice. Open their profile instead, or create a second, separate contractor with this name only if they're genuinely a different person.`,
              confirmWord:"DUPLICATE", confirmLabel:"Create anyway",
            }))){ setBusy(false); return; }
          }
        }
      }
      const base={ first_name:f.first_name.trim(), middle_name:f.middle_name.trim()||null, last_name:f.last_name.trim(),
        email:f.email.trim()||null, ph_address:f.ph_address.trim()||null, permanent_address:f.permanent_address.trim()||null,
        date_of_birth:f.date_of_birth||null, hire_date:f.hire_date||null, status:"active",
        shift_start:f.shift_start||null, shift_end:f.shift_end||null,
        health_allowance_eligible:!!f.health_allowance_eligible, thirteenth_month_eligible:!!f.thirteenth_month_eligible };
      let r=await client.from("workers").insert(base).select().single();
      if(r.error && /payout_method/i.test(r.error.message)) r=await client.from("workers").insert({...base,payout_method:"wise"}).select().single();
      if(r.error) throw r.error;
      w=r.data;
      const {error:e2}=await client.from("worker_companies").insert({worker_id:w.id, company_id:coId, contract:f.contract, role:f.role.trim()||null, weekly_hours:parseFloat(f.hours)||null, status:"active", started_on:f.hire_date||null});
      if(e2) throw e2;
      if(parseFloat(f.rate)>0){
        const {error:e3}=await client.from("rates").insert({worker_id:w.id, company_id:coId, amount_php:parseFloat(f.rate), effective_start:f.contract_date||f.hire_date||today});
        if(e3) throw e3;
      }
      let invited=null;
      if(f.invite){
        const {data,error}=await client.functions.invoke("portal-admin",{body:{action:"create_login",worker_id:w.id,email:f.email.trim()}});
        if(error||(data&&data.error)) throw new Error((data&&data.error)||await fnErrorMessage(error));
        invited={email:data.email,password:data.password};
      }
      // Per-hire prep (best-effort — the contractor is already created/invited):
      // prefill the IC Agreement (rate/position/start + addendum) and record any
      // extra requested documents on their onboarding. Admin can edit later in the hire file.
      try{
        const {data:u}=await client.auth.getUser(); const myId=(u&&u.user&&u.user.id)||null;
        const csId=f.countersigner_user_id||null, csName=(f.countersigner_name||"").trim()||null;
        const coName=(companies.find(c=>c.id===coId)||{}).name||companyName||null;   // snapshot for {{company_name}}
        // Engagement basis snapshotted onto the agreements: FT/PT (→ 40/20 hrs/wk
        // in the doc) and the shift window, so every agreement states the terms.
        const empType=f.contract==="PT"?"part_time":f.contract==="FT"?"full_time":null;
        const hours=parseFloat(f.hours)||null;
        const schedule=(ne(f.shift_start)&&ne(f.shift_end))?phtShiftToEtLabel(f.shift_start,f.shift_end):null;
        await client.from("onboarding_agreements").upsert({
          worker_id:w.id, agreement_kind:"ic_agreement",
          f_rate:f.rate?String(f.rate).trim():null, f_position:f.role.trim()||null, f_start_date:f.hire_date||null,
          f_company_name:coName, f_employment_type:empType, f_hours_per_week:hours, f_schedule:schedule,
          addendum_type:f.ic_addendum_type||null, addendum_text:(f.ic_addendum_text||"").trim()||null,
          countersigner_user_id:csId, countersigner_name:csName,
          prepared_by:myId, prepared_at:new Date().toISOString(), updated_at:new Date().toISOString()
        },{onConflict:"worker_id,agreement_kind"});
        // same countersigner + company + engagement basis on the other agreements so none show a blank line
        if(csId||csName||coName||empType||schedule||hours){ for(const k of ONB_AGR_KINDS){ if(k==="ic_agreement") continue;
          await client.from("onboarding_agreements").upsert({ worker_id:w.id, agreement_kind:k,
            countersigner_user_id:csId, countersigner_name:csName, f_company_name:coName,
            f_employment_type:empType, f_hours_per_week:hours, f_schedule:schedule,
            prepared_by:myId, prepared_at:new Date().toISOString(), updated_at:new Date().toISOString() },{onConflict:"worker_id,agreement_kind"}); } }
        const xdocs=ocUniq((f.extra_docs||[]).filter(t=>(t||"").trim()).map(t=>({kind:ocSlug(t),title:t.trim(),required:true})));
        if(f.invite && xdocs.length){
          await client.from("onboarding_progress").upsert({worker_id:w.id, extra_documents:xdocs, updated_at:new Date().toISOString()},{onConflict:"worker_id"});
        }
        // Record which tools to provision; the logins are entered at completion.
        const tr=f.tools||{};
        if(f.invite && (tr.gmail||tr.providersoft||tr.hubstaff||tr.zoom||(tr.others||"").trim())){
          await client.rpc("set_tools_requested",{ p_worker_id:w.id, p_requested:tr });
        }
      }catch(_e){ /* non-fatal */ }
      logEvent(client,{company_id:coId,action:"add_contractor",entity:`${f.first_name} ${f.last_name}`,detail:{from:"wizard",contract:f.contract,invited:!!f.invite,rate:parseFloat(f.rate)||null,addendum:f.ic_addendum_type||null,extra_docs:(f.extra_docs||[]).filter(t=>(t||"").trim()).length}});
      clearDraft();   // created — discard the saved draft
      setResult(invited||{ok:true}); onCreated&&onCreated();
    }catch(ex){
      // Roll back the just-created worker so a late failure (e.g. invite on an
      // email already taken in Supabase Auth) never leaves an orphaned, half-
      // created contractor. FK ON DELETE CASCADE clears worker_companies / rates
      // / contractor_logins / onboarding_progress.
      if(w&&w.id){ try{ await client.from("workers").delete().eq("id",w.id); }catch(_e){} }
      setErr("Couldn't create: "+(ex.message||ex));
    }finally{ setBusy(false); }
  }
  const inp={width:"100%",padding:8,border:"1px solid #d1d5db",borderRadius:8,margin:"2px 0",fontSize:14};
  // field() is a plain JSX-returning helper (NOT a nested component) so inputs keep focus across renders
  const field=(label,k,type,ph)=>(
    <div style={{margin:"6px 0"}}>
      <label className="muted" style={{fontSize:12}}>{label}</label>
      {type==="email"
        ? <EmailInput style={inp} value={f[k]} placeholder={ph||""} onChange={v=>set(k,v)} aria-invalid={errs[k]?"true":"false"}/>
        : <input style={inp} type={type||"text"} value={f[k]} placeholder={ph||""} onChange={e=>set(k,e.target.value)} aria-invalid={errs[k]?"true":"false"}/>}
      {errs[k] && <div style={{color:"#b91c1c",fontSize:12}}>{errs[k]}</div>}
    </div>
  );
  if(result){
    return (
      <div className="modal-bg" onClick={onClose}><div className="modal" ref={mref} role="dialog" aria-modal="true" aria-labelledby="acw-done-title" onClick={e=>e.stopPropagation()} style={{maxWidth:520}}>
        <h2 id="acw-done-title" style={{marginTop:0}}>✓ Contractor added</h2>
        {result.password ? <div>
          <p className="sub">Portal login created. Share these with {f.first_name} — they complete onboarding on first sign-in.</p>
          <div className="card" style={{background:"#f8fafc"}}>
            <div className="row"><span className="muted">Email</span><b>{result.email}</b></div>
            <div className="row"><span className="muted">Temp password</span><b>{result.password}</b></div>
          </div>
          <button className="btn ghost sm" onClick={()=>{ try{navigator.clipboard.writeText("Email: "+result.email+"\nTemp password: "+result.password);}catch(_e){} }}>Copy</button>
        </div> : <p className="sub">{f.first_name} {f.last_name} was added.</p>}
        <div style={{marginTop:12}}><button className="btn" onClick={onClose}>Done</button></div>
      </div></div>
    );
  }
  return (
    <div className="modal-bg" onClick={close}><div className="modal" ref={mref} role="dialog" aria-modal="true" aria-labelledby="acw-title" onClick={e=>e.stopPropagation()} style={{maxWidth:560}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <h2 id="acw-title" style={{margin:0}}>Add contractor <span className="muted" style={{fontSize:13,fontWeight:400}}>· {companyName||"this company"}</span></h2>
        <button className="btn ghost sm" onClick={close}>Cancel</button>
      </div>
      <div style={{display:"flex",gap:6,margin:"10px 0"}}>{[1,2,3].map(n=>(<div key={n} style={{flex:1,height:4,borderRadius:2,background:n<=step?"#1F3A68":"#e5e7eb"}}/>))}</div>
      <p className="sub" style={{marginTop:0}}>Step {step} of 3 · {step===1?"Identity":step===2?"Engagement (IC terms)":"Portal & onboarding"}</p>
      {draftRestored && <div className="banner" style={{marginTop:0,marginBottom:8,background:"#eff6ff",borderColor:"#bfdbfe",color:"#1e40af",display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}><span>↩ Resumed your saved draft.</span><button className="btn ghost sm" onClick={startFresh}>Start fresh</button></div>}
      {step===1 && <div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>{field("First name *","first_name")}{field("Middle name","middle_name")}{field("Last name *","last_name")}</div>
        {field("Personal email *","email","email","name@example.com")}
        {field("Current address","ph_address")}
        <div style={{margin:"6px 0"}}>
          <label className="muted" style={{fontSize:12}}>Permanent address</label>
          <label className="muted" style={{fontSize:12,display:"flex",gap:6,alignItems:"center",margin:"2px 0 4px"}}>
            <input type="checkbox" checked={sameAddr} onChange={e=>setSameAddr(e.target.checked)}/> Same as current address
          </label>
          <input style={inp} value={f.permanent_address} disabled={sameAddr} onChange={e=>set("permanent_address",e.target.value)}/>
        </div>
        {field("Date of birth","date_of_birth","date")}
      </div>}
      {step===2 && <div>
        <div style={{margin:"6px 0"}}>
          <label className="muted" style={{fontSize:12}}>Company *</label>
          <select style={inp} value={f.company_id} onChange={e=>set("company_id",e.target.value)} aria-invalid={errs.company_id?"true":"false"}>
            <option value="">— select company —</option>
            {companies.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
          {errs.company_id && <div style={{color:"#b91c1c",fontSize:12}}>{errs.company_id}</div>}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div style={{margin:"6px 0"}}><label className="muted" style={{fontSize:12}}>Contract *</label>
            <select style={inp} value={f.contract} onChange={e=>{ const v=e.target.value; setF(x=>({...x,contract:v,hours:v==="PT"?"20":"40"})); }}><option value="FT">Full-time</option><option value="PT">Part-time</option></select></div>
          <div style={{margin:"6px 0"}}><label className="muted" style={{fontSize:12}}>Expected hours / week *</label>
            <input style={inp} type="number" min="1" max="60" step="0.5" value={f.hours} onChange={e=>set("hours",e.target.value)} aria-invalid={errs.hours?"true":"false"}/>
            {errs.hours && <div style={{color:"#b91c1c",fontSize:12}}>{errs.hours}</div>}
            <div className="muted" style={{fontSize:11,marginTop:2}}>Defaults to {f.contract==="PT"?"20 (part-time)":"40 (full-time)"} — adjust if different.</div></div>
        </div>
        {field("Role / position *","role","text","e.g. Billing Specialist — shows on the IC Agreement")}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>{field("Rate (PHP / period)","rate","number")}{field("Contract date","contract_date","date")}</div>
        {field("Hire date (start) *","hire_date","date")}
        <div style={{display:"flex",gap:16,marginTop:6}}>
          <label style={{fontSize:13,display:"flex",gap:6,alignItems:"center"}}><input type="checkbox" checked={f.health_allowance_eligible} onChange={e=>set("health_allowance_eligible",e.target.checked)}/> Health allowance</label>
          <label style={{fontSize:13,display:"flex",gap:6,alignItems:"center"}}><input type="checkbox" checked={f.thirteenth_month_eligible} onChange={e=>set("thirteenth_month_eligible",e.target.checked)}/> 13th month</label>
        </div>
        <div style={{marginTop:12,paddingTop:10,borderTop:"1px solid #eef0f3"}}>
          <label className="muted" style={{fontSize:12}}>Daily shift * <span style={{fontWeight:400}}>(stored in Philippine time; defaults to 8am–5pm US Eastern)</span></label>
          <div style={{display:"flex",gap:8,alignItems:"center",marginTop:4,flexWrap:"wrap"}}>
            <input type="time" style={{...inp,width:"auto",margin:0}} value={f.shift_start} onChange={e=>set("shift_start",e.target.value)} aria-label="Shift start (PHT)"/>
            <span className="muted">to</span>
            <input type="time" style={{...inp,width:"auto",margin:0}} value={f.shift_end} onChange={e=>set("shift_end",e.target.value)} aria-label="Shift end (PHT)"/>
            <button className="btn ghost sm" type="button" onClick={()=>setF(x=>({...x,shift_start:etToPhtHHMM("08:00"),shift_end:etToPhtHHMM("17:00")}))}>Reset to 8–5 ET</button>
          </div>
          <div className="muted" style={{fontSize:11,marginTop:2}}>= 8:00 AM – 5:00 PM US Eastern, converted to Philippine time.</div>
          {errs.shift && <div style={{color:"#b91c1c",fontSize:12}}>{errs.shift}</div>}
        </div>
        <div style={{marginTop:12,paddingTop:10,borderTop:"1px solid #eef0f3"}}>
          <label className="muted" style={{fontSize:12}}>Company countersigner * <span style={{fontWeight:400}}>(signs for ABC Kids NY — their name appears on the agreement the contractor signs)</span></label>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <select style={inp} value={f.countersigner_user_id} onChange={e=>{ const a=admins.find(x=>x.user_id===e.target.value); set("countersigner_user_id",e.target.value); set("countersigner_name",a?(a.name||a.email):""); }} aria-invalid={errs.countersigner_user_id?"true":"false"}>
              <option value="">— select admin —</option>
              {admins.filter(a=>a.can_countersign!==false).map(a=><option key={a.user_id} value={a.user_id}>{a.name?`${a.name} (${a.email})`:a.email}</option>)}
            </select>
            <input style={inp} value={f.countersigner_name} onChange={e=>set("countersigner_name",e.target.value)} placeholder="Name shown on the agreement"/>
          </div>
          {errs.countersigner_user_id && <div style={{color:"#b91c1c",fontSize:12}}>{errs.countersigner_user_id}</div>}
        </div>
        <div style={{marginTop:12,paddingTop:10,borderTop:"1px solid #eef0f3"}}>
          <label className="muted" style={{fontSize:12}}>IC Agreement addendum <span style={{fontWeight:400}}>(optional — appended to the IC Agreement they sign)</span></label>
          <select style={inp} value={f.ic_addendum_type} onChange={e=>set("ic_addendum_type",e.target.value)}>
            <option value="">No addendum</option><option value="scope_of_work">Scope of Work</option><option value="other">Other</option>
          </select>
          {f.ic_addendum_type && <textarea style={{...inp,minHeight:74,fontFamily:"inherit"}} value={f.ic_addendum_text} onChange={e=>set("ic_addendum_text",e.target.value)}
            placeholder={f.ic_addendum_type==="scope_of_work"?"Describe this hire's scope of work…":"Custom addendum text…"}/>}
        </div>
        <div style={{marginTop:10}}>
          <label className="muted" style={{fontSize:12}}>Additional documents to request <span style={{fontWeight:400}}>(beyond the standard set, e.g. Professional license)</span></label>
          {(f.extra_docs||[]).map((t,i)=>(
            <div key={i} style={{display:"flex",gap:6,margin:"4px 0"}}>
              <input style={{...inp,margin:0}} value={t} placeholder="Document name" onChange={e=>set("extra_docs",(f.extra_docs||[]).map((x,j)=>j===i?e.target.value:x))}/>
              <button className="btn ghost sm" onClick={()=>set("extra_docs",(f.extra_docs||[]).filter((_,j)=>j!==i))}>✕</button>
            </div>
          ))}
          <button className="btn ghost sm" style={{marginTop:4}} onClick={()=>set("extra_docs",[...(f.extra_docs||[]),""])}>+ Add document</button>
        </div>
      </div>}
      {step===3 && <div>
        <label style={{fontSize:14,display:"flex",gap:8,alignItems:"flex-start",margin:"6px 0"}}>
          <input type="checkbox" checked={f.invite} onChange={e=>set("invite",e.target.checked)} style={{marginTop:3}}/>
          <span><b>Invite to the contractor portal</b><br/><span className="muted" style={{fontSize:12}}>Creates a login and starts onboarding — the contractor signs the IC Agreement, Non-Compete, NDA and BAA, completes their profile, and uploads documents. You'll get a temp password to share.</span></span>
        </label>
        {f.invite && !ne(f.email) && <div style={{color:"#b91c1c",fontSize:12}}>Add a personal email in step 1 to invite.</div>}
        {f.invite && <div className="card" style={{marginTop:8}}>
          <div className="muted" style={{fontSize:12,marginBottom:6}}>Tools to provision <span style={{fontWeight:400}}>— you'll enter the logins when onboarding completes</span></div>
          {[["gmail","Gmail address"],["providersoft","Providersoft access"],["hubstaff","Hubstaff access"],["zoom","Zoom number"]].map(([k,lbl])=>(
            <label key={k} style={{display:"inline-flex",gap:6,alignItems:"center",fontSize:13,marginRight:16,marginBottom:4}}>
              <input type="checkbox" checked={!!(f.tools&&f.tools[k])} onChange={e=>set("tools",{...(f.tools||{}),[k]:e.target.checked})}/>{lbl}
            </label>
          ))}
          <input style={{...inp,marginTop:6}} placeholder="Other tools (optional)" value={(f.tools&&f.tools.others)||""} onChange={e=>set("tools",{...(f.tools||{}),others:e.target.value})}/>
        </div>}
        <div className="card" style={{background:"#f8fafc",marginTop:8}}>
          <div className="muted" style={{fontSize:12,marginBottom:4}}>Summary</div>
          <div className="row"><span className="muted">Name</span><span>{[f.first_name,f.middle_name,f.last_name].filter(Boolean).join(" ")||"—"}</span></div>
          <div className="row"><span className="muted">Email</span><span>{f.email||"—"}</span></div>
          <div className="row"><span className="muted">Company / contract</span><span>{(companies.find(c=>c.id===f.company_id)||{}).name||companyName||"—"} · {f.contract}{f.role?` · ${f.role}`:""}</span></div>
          <div className="row"><span className="muted">Rate</span><span>{parseFloat(f.rate)>0?`₱${f.rate}/period`:"not set"}</span></div>
          <div className="row"><span className="muted">Hire date</span><span>{f.hire_date||"—"}</span></div>
          <div className="row"><span className="muted">Shift (PHT)</span><span>{f.shift_start&&f.shift_end?`${f.shift_start}–${f.shift_end}`:"—"}</span></div>
          <div className="row"><span className="muted">Countersigner</span><span>{f.countersigner_name||"—"}</span></div>
          {f.ic_addendum_type && <div className="row"><span className="muted">IC addendum</span><span>{f.ic_addendum_type==="scope_of_work"?"Scope of Work":"Other"}</span></div>}
          {(f.extra_docs||[]).filter(t=>(t||"").trim()).length>0 && <div className="row"><span className="muted">Extra documents</span><span>{(f.extra_docs||[]).filter(t=>(t||"").trim()).length}</span></div>}
        </div>
      </div>}
      {err && <div className="err" style={{marginTop:8}}>{err}</div>}
      <div className="muted" style={{fontSize:11,marginTop:10}}>✓ Progress auto-saved on this device — you can close and pick up where you left off.</div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:8}}>
        <button className="btn ghost sm" disabled={step===1||busy} onClick={back}>Back</button>
        {step<3 ? <button className="btn" onClick={next}>Next</button>
          : <button className="btn" disabled={busy||(f.invite&&!ne(f.email))} onClick={create}>{busy?"Creating…":"Create contractor"}</button>}
      </div>
    </div></div>
  );
}

function Contractors({ client, companyId, consolidated, onBillingChange, pendingWorkerId, consumePendingWorker, rosterNonce }) {
  const { data, loading, reload } = useQuery(client, c => {
    // workers joined to their company link(s) + current rate
    let q = c.from("worker_companies")
      .select("contract,role,weekly_hours,hubstaff_name,hubstaff_user_id,status,company_id,companies(name),"+
              "workers(id,first_name,middle_name,last_name,status,email,mobile,ph_address,hire_date,date_of_birth,"+
              "payout_method,gcash,paymaya,paypal,wise_recipient_id,wise_recipient_uuid,wise_recipients,wise_tag,photo_url,health_allowance_eligible,thirteenth_month_eligible,"+
              "emergency_name,emergency_relationship,emergency_mobile,permanent_address,address_landmark,postal_code,marital_status,education_level,course,year_graduated,school,work_email,work_number,work_extension,profile_extras)");
    if (!consolidated && companyId) q = q.eq("company_id", companyId);
    return q;
  }, [client, companyId, consolidated, rosterNonce]);

  // Each contractor's CLIENT engagement(s). The roster rows above are the
  // EMPLOYER links (payroll home), so r.companies is always the employer — to
  // show who a contractor actually works FOR we pull their active worker_companies
  // links to kind='client' companies and map them by worker. A contractor with no
  // client assigned yet shows "—".
  const { data: clientLinkData } = useQuery(client, c =>
    c.from("worker_companies")
      .select("worker_id,status,companies(name,kind)")
      .eq("status", "active"),
    [client, rosterNonce]);
  const clientsByWorker = {};
  (clientLinkData || []).forEach(l => {
    // keep only CLIENT engagements — skip the employer link (the payroll home)
    if (!l.worker_id || !l.companies || l.companies.kind !== "client") return;
    (clientsByWorker[l.worker_id] = clientsByWorker[l.worker_id] || []).push(l.companies.name);
  });
  Object.values(clientsByWorker).forEach(a => a.sort((x, y) => x.localeCompare(y)));

  const [selected, setSelected] = useState(null);
  const [showInactive, setShowInactive] = useState(false);
  const [busyId, setBusyId] = useState(null);
  const allRows = (data || []).filter(r => r.workers);
  // Cross-tab profile open: another tab called openContractor(workerId) — find
  // and select the worker's row so the profile modal opens. Show inactive in
  // case the target is inactive (otherwise the row would be hidden).
  useEffect(()=>{
    if(!pendingWorkerId) return;
    const hit=allRows.find(r=>String(r.workers?.id)===String(pendingWorkerId));
    if(hit){
      // Inline the active check — `isActive` is declared below, can't be used here.
      const active=(hit.workers?.status==="active")&&(hit.status==="active");
      if(!active) setShowInactive(true);
      // ProfileModal expects r.w to be the worker object — the list rows add
      // it via setSelected({...r,w}). Replicate that shape here, otherwise the
      // modal reads w.first_name on undefined and crashes the tree.
      setSelected({...hit, w: hit.workers});
      consumePendingWorker && consumePendingWorker();
    }
    // If !hit and allRows is empty, the query may still be loading — leave
    // pendingWorkerId set; the effect re-runs when allRows arrives. If the
    // worker truly isn't in this company's list (filtered out by company_id),
    // it'll never resolve — user can switch company manually.
    /* eslint-disable-next-line */
  },[pendingWorkerId, allRows.length]);
  const isActive = r => (r.workers.status==="active") && (r.status==="active");
  const visible = showInactive ? allRows : allRows.filter(isActive);
  const inactiveCount = allRows.length - allRows.filter(isActive).length;
  // flatten searchable fields for sort/filter. _company holds the contractor's
  // CLIENT engagement(s) (what the "Client" column shows / filters / sorts on),
  // NOT the employer the roster rows are pinned to.
  const flat = visible.map(r=>{
    const clients=clientsByWorker[r.workers.id]||[];
    return {...r,
      _name:fullName(r.workers), _clients:clients,
      _company:clients.join(", "), _role:r.role||"",
      _method:r.workers.payout_method||"", _status:isActive(r)?"active":"inactive"};
  });
  const {rows, Th, q, setQ}=useSortFilter(flat,{
    name:r=>r._name, company:r=>r._company, role:r=>r._role,
    contract:r=>r.contract, method:r=>r._method, status:r=>r._status,
  },["_name","_company","_role"]);

  // toggle a worker active/inactive (updates worker + this company link)
  async function setActive(r, makeActive) {
    setBusyId(r.workers.id);
    const ws = makeActive ? "active" : "ended";
    await client.from("workers").update({status: ws}).eq("id", r.workers.id);
    if (r.company_id)
      await client.from("worker_companies").update(
        makeActive ? {status:"active", ended_on:null} : {status:"ended", ended_on:new Date().toISOString().slice(0,10)}
      ).eq("worker_id", r.workers.id).eq("company_id", r.company_id);
    // Status flips affect payroll scope — record so the next Calculate / Lock
    // / Reconcile / pay action prompts the user to acknowledge before acting on
    // a roster that just changed.
    if(typeof onBillingChange === "function"){
      onBillingChange({
        workerId: r.workers.id,
        name: fullName(r.workers),
        field: `status → ${makeActive?"active":"inactive"}`,
      });
    }
    setBusyId(null); reload();
  }

  // Permanently delete a contractor. Hard delete is intentionally rare in a
  // payroll app — the server (portal-admin) refuses it for anyone with pay/time
  // history (deactivate those instead). Used to remove mistakes / test accounts.
  async function deleteContractor(r){
    const w=r.workers; const wid=w.id;
    const nm=fullName(w)||w.email||"this contractor";
    const token=fullName(w)||w.email||wid;   // a knowable thing to type, even for a nameless row
    // Pre-check counts for the right confirmation prompt. The SERVER guard is the
    // real authority (fail-closed) — this is only to shape the UX / set `force`.
    setBusyId(wid);
    const [pay,te,sig,doc]=await Promise.all([
      client.from("payments").select("id",{count:"exact",head:true}).eq("worker_id",wid),
      client.from("time_entries").select("work_date",{count:"exact",head:true}).eq("worker_id",wid),
      client.from("onboarding_signatures").select("id",{count:"exact",head:true}).eq("worker_id",wid),
      client.from("documents").select("id",{count:"exact",head:true}).eq("worker_id",wid),
    ]);
    setBusyId(null);
    if((pay.count||0)>0 || (te.count||0)>0){
      window.alert(`${nm} has payroll history (${pay.count||0} payment(s), ${te.count||0} time entr${(te.count||0)===1?"y":"ies"}) and can't be deleted. Deactivate them instead.`);
      return;
    }
    const records=(sig.count||0)+(doc.count||0);
    let msg=`Permanently delete ${nm}?\n\nRemoves their profile, onboarding records, documents, uploaded files, and portal login — and CANNOT be undone.`;
    if(records>0) msg+=`\n\n⚠ This ALSO destroys ${sig.count||0} signed agreement(s) and ${doc.count||0} uploaded document(s).`;
    const typed=window.prompt(msg+`\n\nType "${token}" to confirm:`);
    if(typed===null) return;
    if(typed.trim()!==String(token).trim()){ window.alert("Confirmation didn't match — nothing was deleted."); return; }
    setBusyId(wid);
    const { data, error } = await client.functions.invoke("portal-admin",{body:{action:"delete_contractor",worker_id:wid,force:records>0}});
    setBusyId(null);
    if(error||(data&&data.error)){ window.alert("Couldn't delete: "+((data&&data.error)||await fnErrorMessage(error))); return; }
    logEvent(client,{company_id:r.company_id,action:"delete_contractor",entity:nm,detail:{worker_id:wid,signatures:sig.count||0,documents:doc.count||0}});
    reload();
  }

  // create a new contractor in THIS company, then open their profile to fill in
  // the rest (rate, payout method, etc.). Reuses the proven create + edit flow.
  const [adding,setAdding]=useState(false);
  const [addErr,setAddErr]=useState("");
  const [showBulk,setShowBulk]=useState(false);
  const [showPull,setShowPull]=useState(false);
  const [showAnnounce,setShowAnnounce]=useState(false);
  const [showWizard,setShowWizard]=useState(false);
  async function addContractor(){
    if(consolidated||!companyId){setAddErr("Pick a single company first (top-left switcher) to add a contractor.");return;}
    setAdding(true);setAddErr("");
    try{
      const base={first_name:"New", last_name:"Contractor", status:"active",
        health_allowance_eligible:true, thirteenth_month_eligible:true,
        shift_start:etToPhtHHMM("08:00"), shift_end:etToPhtHHMM("17:00")};   // default 8–5 ET
      let {data:w,error:e1}=await client.from("workers").insert(base).select().single();
      // fallback if DB still has payout_method NOT NULL (pre-migration)
      if(e1 && /payout_method/i.test(e1.message)){
        ({data:w,error:e1}=await client.from("workers").insert({...base,payout_method:"wise"}).select().single());
      }
      if(e1)throw e1;
      const {error:e2}=await client.from("worker_companies")
        .insert({worker_id:w.id, company_id:companyId, contract:"FT", status:"active"});
      if(e2)throw e2;
      logEvent(client,{company_id:companyId,action:"add_contractor",
        entity:"New Contractor",detail:{from:"contractors tab"}});
      // company name for the modal header
      const cname=allRows.find(x=>x.company_id===companyId)?.companies?.name||"";
      reload();
      // open the profile modal on the new contractor so they can fill in details
      setSelected({ w, workers:w, company_id:companyId, companies:{name:cname},
        contract:"FT", role:null, hubstaff_name:null, status:"active" });
    }catch(ex){ setAddErr("Couldn't add: "+(ex.message||ex)+
      " — if it mentions payout_method, run the FINISH_SETUP migration to make it optional."); }
    finally{ setAdding(false); }
  }

  // Only show the Loading placeholder on the FIRST load (when data is still
  // null). On any subsequent reload (e.g. after a save fires notifySaved →
  // reload), `loading` flips true again briefly but `data` is already
  // populated — show the existing table so the modal stays mounted and keeps
  // its local form state. Previously this returned early on every reload,
  // unmounting the modal and resetting all inputs.
  if (loading && !data) return <Skeleton rows={4}/>;
  return (
    <div>
    <div className="card">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
        <div>
          <h2>Contractors</h2>
          <p className="sub">{consolidated ? "All companies" : "Current company"} ·
            {" "}{rows.length} shown{inactiveCount>0?` · ${inactiveCount} inactive`:""}. Click a row (or Edit) for the full profile.</p>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <label style={{fontSize:13,display:"flex",alignItems:"center",gap:6}}>
            <input type="checkbox" checked={showInactive} onChange={e=>setShowInactive(e.target.checked)}/>
            Show inactive
          </label>
          <button className="btn ghost" disabled={consolidated} onClick={()=>setShowPull(true)}
            title={consolidated?"Pick a single company first":"Match your saved Wise recipients to contractors and store their recipient IDs"}>
            ⤓ Pull IDs from Wise</button>
          <button className="btn ghost" disabled={consolidated} onClick={()=>setShowBulk(true)}
            title={consolidated?"Pick a single company first":"Import a roster of contractors (CSV / paste)"}>
            ⇪ Bulk import</button>
          <button className="btn ghost" onClick={()=>setShowAnnounce(true)}
            title="Post announcements to the contractor portal welcome page">
            📣 Announcements</button>
          <button className="btn ghost sm" disabled={adding||consolidated} onClick={addContractor}
            title={consolidated?"Pick a single company first":"Quick-add a blank row to fill in on the profile"}>
            {adding?"…":"Quick add"}</button>
          <button className="btn" disabled={consolidated} onClick={()=>setShowWizard(true)}
            title={consolidated?"Pick a single company first":"Add a contractor (guided) and optionally invite them to onboard"}>
            + Add contractor</button>
        </div>
      </div>
      <Banner msg={addErr} tone="error" style={{marginTop:10}} />
      <FilterBox q={q} setQ={setQ} placeholder="Filter by name, client, role…" />
      {rows.length===0 ? <div className="empty">No contractors match.</div> :
      <div className="table-scroll"><table>
        <thead><tr>
          <Th k="name">Name</Th><Th k="company">Client</Th><Th k="role">Role</Th><Th k="contract">Contract</Th>
          <Th k="method">Payout</Th><Th k="status">Status</Th><th></th>
        </tr></thead>
        <tbody>
          {rows.map((r,i)=>{
            const w=r.workers; const active=isActive(r);
            return (
              // Stable composite key (worker + company) so sorting/filtering can't
              // mis-associate row-level DOM/state; worker.id alone repeats in
              // consolidated mode where a worker spans multiple companies.
              <tr key={(w&&w.id||i)+"|"+(r.company_id||"")} style={active?{}:{opacity:.6}}>
                <td className="clickable card-title" onClick={()=>setSelected({...r,w})}>
                  <span style={{display:"inline-flex",alignItems:"center",gap:8}}>
                    <Avatar src={w.photo_url} name={fullName(w)} size={28}/><b>{fullName(w)}</b></span></td>
                <td data-label="Client">{r._clients&&r._clients.length
                  ? r._clients.join(", ")
                  : <span className="muted" title="No client assigned — set one in Edit → Client engagements">—</span>}</td>
                <td data-label="Role">{r.role||<span className="muted">—</span>}</td>
                <td data-label="Contract"><span className={"pill "+(r.contract==="PT"?"pt":"ft")} title={codeHint("contract",r.contract)}>{r.contract}</span></td>
                <td data-label="Payout">{w.payout_method?<span title={codeHint("method",w.payout_method)}>{methodLabel(w.payout_method)}</span>:
                  <span className="pill warn" title="No payout method set — can't be paid until set">not set</span>}</td>
                <td data-label="Status"><span className={"pill "+(active?"active":"inactive")} title={codeHint("status",active?"active":"inactive")}>{active?"active":"inactive"}</span></td>
                <td className="card-action" style={{textAlign:"right",whiteSpace:"nowrap"}}>
                  <button className="btn ghost sm" onClick={()=>setSelected({...r,w})}>Edit</button>{" "}
                  {active
                    ? <button className="btn ghost sm" disabled={busyId===w.id}
                        onClick={()=>setActive(r,false)}>Deactivate</button>
                    : <button className="btn sm" disabled={busyId===w.id}
                        onClick={()=>setActive(r,true)}>Reactivate</button>}{" "}
                  <button className="btn ghost sm" disabled={busyId===w.id}
                    style={{color:"#b91c1c",borderColor:"#fca5a5"}}
                    title="Permanently delete (blocked if they have pay/time history)"
                    onClick={()=>deleteContractor(r)}>Delete</button>
                </td>
              </tr>
            );
          })}
        </tbody>
      </table></div>}
      {selected && <ProfileModal r={selected} client={client} onClose={()=>{setSelected(null);reload();}} onBillingChange={onBillingChange} onSaved={reload} />}
      <HireDraftBanner companyId={companyId} refreshKey={showWizard} onResume={()=>setShowWizard(true)}/>
      {showWizard && <AddContractorWizard client={client} companyId={companyId}
        companyName={(allRows.find(x=>x.company_id===companyId)||{}).companies?.name||""}
        onClose={()=>{setShowWizard(false);reload();}} onCreated={reload} />}
      {showBulk && <BulkImport client={client} companyId={companyId} consolidated={consolidated} onClose={()=>setShowBulk(false)} onDone={reload} />}
      {showPull && <PullRecipients client={client} companyId={companyId} consolidated={consolidated} onClose={()=>{setShowPull(false);reload();}} />}
      {showAnnounce && <AnnouncementsModal client={client} onClose={()=>setShowAnnounce(false)} />}
    </div>
    </div>
  );
}

function ProfileModal({ r, onClose, client, onBillingChange, onSaved }) {

  const notifySaved = ()=>{

  // C2 — before/after audit. Build a {field:{from,to}} object for fields that
  // actually changed, so audit_log.detail records the prior value, not just the
  // new one (makes a rate/recipient/method change replayable in a dispute).
  const auditDiff=(oldObj,newObj,fields)=>{
    const d={};
    fields.forEach(k=>{ const a=(oldObj?.[k]??null), b=(newObj?.[k]??null);
      if(String(a===null?"":a)!==String(b===null?"":b)) d[k]={from:a,to:b}; });

  };
  const [recips,setRecips]=useState(Array.isArray(w.wise_recipients)?w.wise_recipients:[]);
  const [defId,setDefId]=useState(w.wise_recipient_id||null);
  // The Wise UUID used by the manual Batch Payments CSV (recipientId column).
  // Not returned by the Wise API — must be pasted from the Wise web UI's
  // "Download all templates" export. Stored separately from defId/recips.
  const [defUuid,setDefUuid]=useState(w.wise_recipient_uuid||"");
  const [uuidDraft,setUuidDraft]=useState(w.wise_recipient_uuid||"");
  const [newId,setNewId]=useState(""); const [newLabel,setNewLabel]=useState("");
  const [savedMsg,setSavedMsg]=useState("");
  const [payMethod,setPayMethod]=useState(w.payout_method||"");
  const [photo,setPhoto]=useState(w.photo_url||"");
  const [photoBusy,setPhotoBusy]=useState(false);
  async function onPickPhoto(file){

  // --- contractor self-service portal login (admin-created; via portal-admin fn) ---
  const [portalLogin,setPortalLogin]=useState(undefined);  // undefined=loading, null=none, obj=exists

  useEffect(()=>{ let live=true;

    client.from("onboarding_progress").select("current_stage,completed_at").eq("worker_id",w.id).maybeSingle()
      .then(({data})=>{ if(live) setOnb(data||null); }).catch(()=>{ if(live) setOnb(null); });

  async function createPortalLogin(){

  // Enroll (or re-enroll) a contractor into onboarding — collect agreements +
  // documents. Clears completed_at + stage flags so the portal routes them

  async function requireOnboarding(){

  }
  // --- editable fields ---
  const [f,setF]=useState({
    first_name:w.first_name||"", middle_name:w.middle_name||"", last_name:w.last_name||"",
    email:w.email||"", work_email:w.work_email||"", mobile:w.mobile||"", work_number:w.work_number||"", work_extension:w.work_extension||"", ph_address:w.ph_address||"",
    hire_date:w.hire_date||"", date_of_birth:w.date_of_birth||"",
    health_allowance_eligible:!!w.health_allowance_eligible,
    thirteenth_month_eligible:!!w.thirteenth_month_eligible,
    emergency_name:w.emergency_name||"", emergency_relationship:w.emergency_relationship||"", emergency_mobile:w.emergency_mobile||"",
    permanent_address:w.permanent_address||"", address_landmark:w.address_landmark||"", postal_code:w.postal_code||"",
    marital_status:w.marital_status||"", education_level:w.education_level||"", course:w.course||"", year_graduated:w.year_graduated||"", school:w.school||"",
    favorite_color:(w.profile_extras||{}).favorite_color||"", favorite_food:(w.profile_extras||{}).favorite_food||"", motto:(w.profile_extras||{}).motto||"",
  });
  const [contract,setContract]=useState(r.contract||"FT");
  const [role,setRole]=useState(r.role||"");
  const [weeklyHours,setWeeklyHours]=useState(r.weekly_hours!=null?String(r.weekly_hours):"");
  const [hubName,setHubName]=useState(r.hubstaff_name||"");
  const [rate,setRate]=useState("");
  const [rateEff,setRateEff]=useState(new Date().toISOString().slice(0,10));
  const set=(k,v)=>setF(x=>({...x,[k]:v}));
  const [sameAddr,setSameAddr]=useState(()=> !!w.ph_address && (w.permanent_address||"")===(w.ph_address||""));
  // Keep permanent address synced to current (PH) while "same as current" is ticked.
  useEffect(()=>{ if(sameAddr) setF(x=> x.permanent_address===x.ph_address ? x : {...x,permanent_address:x.ph_address}); },[sameAddr,f.ph_address]);
  // Unsaved-changes guard: dirty when any field diverges from the snapshot taken

  const ucSnap=()=>JSON.stringify({f,contract,role,hubName});

  // Pay-tab sub-forms (rate / Wise recipient / UUID) have their own commit buttons,

  useUnsavedGuard({ dirty: !!(newId.trim()||newLabel.trim()||(rate||"").trim()) || (uuidDraft||"")!==(defUuid||""), label:"an unsaved payout entry" });

  // Full rate history for (worker, company), sorted newest-first. Drives the
  // inline 'Save rate' default (most-recent row) AND the new History table
  // below. effective_end column is computed visually from the next row's
  // effective_start so edits feel WYSIWYG.
  const [rateHistory,setRateHistory]=useState([]);
  const [rateEditingId,setRateEditingId]=useState(null);   // which row's effective_start is being edited
  const [rateEditDate,setRateEditDate]=useState("");
  const [rateConfirmDelete,setRateConfirmDelete]=useState(null);  // row id awaiting delete confirm
  async function loadRateHistory(){
    if(!r?.company_id){ setRateHistory([]); return; }
    const {data}=await client.from("rates")
      .select("id,amount_php,effective_start,effective_end,created_at")
      .eq("worker_id",w.id).eq("company_id",r.company_id)
      .order("effective_start",{ascending:false})
      .order("created_at",{ascending:false});
