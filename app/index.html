<!-- UI kill-switch (redesign safety net): lets any user instantly fall back to the
     frozen classic admin app (legacy.html) with NO redeploy. Runs before React/Babel
     load so a redirect avoids loading the whole app. ?ui=classic opts in, ?ui=new opts
     out; the choice persists in localStorage. Remove this block once the redesign is
     signed off and legacy.html is retired. See docs/admin-redesign-plan.md Phase 0. -->
<script>
(function(){
  try{
    // GLOBAL ROLLBACK LEVER: flip to true and deploy (~15s) to send EVERYONE to the
    // classic app at once. Individual users can still debug the new app via ?ui=new.
    var FORCE_CLASSIC=false;
    var q=new URLSearchParams(location.search);
    var v=q.get("ui");
    if(v==="classic") localStorage.setItem("eis_ui","classic");
    else if(v==="new") localStorage.removeItem("eis_ui");
    var wantClassic=(FORCE_CLASSIC && v!=="new") || localStorage.getItem("eis_ui")==="classic";
    if(wantClassic && !/\/legacy\.html$/.test(location.pathname)){
      location.replace("/legacy.html"+location.search+location.hash);
    }
  }catch(e){/* never let the kill-switch break the app */}
})();
</script>

<style>
  :root{
    /* Brand — unified with the contractor portal (navy + gold). */
    --navy:#1F3A68; --navy-700:#162a4d; --navy-50:#eef2f8;
    --gold:#D4A24C; --gold-soft:#f7edd8;
    --bg:#f4f6f9; --card:#ffffff; --surface-2:#f8fafc;
    --border:#e4e8ee; --border-strong:#ccd3dd; --text:#15233b;
    --muted:#5c6677; --subtle:#677083; /* subtle darkened from #8b94a4 -> WCAG AA 4.5:1 (was 3.06) */
    --good:#0a7d3c; --good-soft:#dcfce7;
    --warn:#b45309; --warn-soft:#fef3c7; --bad:#b91c1c; --bad-soft:#fee2e2;
    /* Aliases consumed by existing classNames -> re-skin to navy in one place. */
    --accent:var(--navy); --accent-soft:var(--navy-50);
    --radius-sm:7px; --radius:11px; --radius-lg:16px;
    --shadow-sm:0 1px 2px rgba(15,28,51,.05);
    --shadow:0 4px 14px -5px rgba(15,28,51,.14);
    --shadow-lg:0 16px 40px -12px rgba(15,28,51,.28);
    --ring:0 0 0 3px rgba(31,58,104,.22);
    /* Motion tokens (restrained, enterprise feel): --dur = standard transition
       duration; --ease = standard easing. Use these for all hover/focus/state
       transitions so motion stays cohesive. All motion is disabled under
       prefers-reduced-motion (see @media at the end of this stylesheet). */
    --dur:.16s; --ease:cubic-bezier(.2,.6,.2,1);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
       background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;
       -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  td{font-variant-numeric:tabular-nums}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}
  /* Visible keyboard focus everywhere (WCAG). */
  :focus-visible{outline:2px solid var(--navy);outline-offset:2px;border-radius:4px}
  /* Skip-to-content link: hidden until keyboard-focused (WCAG 2.4.1). */
  .skip-link{position:absolute;left:-9999px;top:0;z-index:100;background:var(--navy);color:#fff;
             padding:10px 16px;border-radius:0 0 var(--radius-sm) 0;font-weight:600;text-decoration:none}
  .skip-link:focus{left:0}
  .topbar{display:flex;align-items:center;gap:16px;padding:13px 20px;background:var(--navy);
          border-top:3px solid var(--gold);border-bottom:1px solid var(--navy-700);color:#fff;
          position:sticky;top:0;z-index:10;box-shadow:var(--shadow);
          padding-top:calc(13px + env(safe-area-inset-top,0px))}
  .brand{font-weight:800;font-size:16px;margin:0 8px 0 0;color:#fff;letter-spacing:-.01em}
  .brand small{color:var(--gold);font-weight:500;font-size:12px;display:block;letter-spacing:0}
  /* keep topbar controls legible on the dark navy bar */
  .topbar .muted,.topbar .sub{color:#c5cfe0}
  .topbar select{background:#fff;color:var(--text);border-color:transparent}
  .topbar .btn.ghost{background:transparent;color:#fff;border-color:rgba(255,255,255,.45)}
  .topbar .btn.ghost:hover{background:rgba(255,255,255,.14);border-color:#fff}
  /* Wrappers are layout-transparent on desktop (display:contents) so the topbar
     renders identically to baseline — EmployerSwitcher's marginLeft:auto still
     right-aligns the actions. They become real flex/block boxes on mobile. */
  .topbar-actions{display:contents}
  .company-switcher{display:contents}
  select,input,button,textarea{font-family:inherit;font-size:14px}
  select,input,textarea{padding:8px 11px;border:1px solid var(--border-strong);border-radius:var(--radius-sm);
       background:#fff;color:var(--text);transition:border-color var(--dur) var(--ease),box-shadow var(--dur) var(--ease)}
  select:focus,input:focus,textarea:focus{outline:none;border-color:var(--navy);box-shadow:var(--ring)}
  /* Phase 3: visible invalid state (for class-styled fields) + form conventions. */
  input[aria-invalid="true"],select[aria-invalid="true"],textarea[aria-invalid="true"]{
    border-color:var(--bad);box-shadow:0 0 0 3px var(--bad-soft)}
  .field .req{color:var(--bad);font-weight:700}
  .field .opt,label .opt{color:var(--subtle);font-weight:400;text-transform:none;letter-spacing:0}
  .field-err{color:var(--bad);font-size:11px;margin-top:4px;font-weight:600}
  /* Searchable multi-select contractor picker */
  .cpick{position:relative;display:inline-block}
  .cpick-btn{min-width:170px;text-align:left;display:inline-flex;justify-content:space-between;gap:8px;align-items:center}
  .cpick-menu{position:absolute;z-index:40;top:calc(100% + 4px);left:0;min-width:250px;max-width:330px;
              background:var(--card);border:1px solid var(--border-strong);border-radius:var(--radius);
              box-shadow:var(--shadow-lg);padding:8px}
  .cpick-search{width:100%;margin-bottom:6px}
  .cpick-row{display:flex;gap:6px;margin-bottom:6px}
  .cpick-list{max-height:260px;overflow-y:auto}
  .cpick-item{display:flex;align-items:center;gap:9px;padding:6px;border-radius:6px;cursor:pointer;font-size:13px}
  .cpick-item:hover{background:var(--navy-50)}
  .cpick-item input{margin:0;flex:none}
  /* ===== Phase 7: sidebar nav (desktop) + mobile bottom-bar + More-sheet ==== */
  :root{ --topbar-h:65px; --side-w:212px; --side-w-collapsed:60px; }
  .shell{display:flex;align-items:flex-start}
  .shell > .wrap{flex:1 1 auto;min-width:0}
  .sidebar{flex:0 0 var(--side-w);width:var(--side-w);position:sticky;top:var(--topbar-h);
           max-height:calc(100vh - var(--topbar-h));overflow-y:auto;background:var(--card);
           border-right:1px solid var(--border);padding:8px 8px 24px}
  .sidebar.collapsed{flex-basis:var(--side-w-collapsed);width:var(--side-w-collapsed)}
  .side-group{margin-top:8px}
  .side-group-label{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--subtle);
                    font-weight:700;padding:8px 10px 4px}
  .sidebar.collapsed .side-group-label{height:10px;padding:0;overflow:hidden;color:transparent}
  .side-item{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:9px 10px;
             border:none;background:none;border-radius:var(--radius-sm);color:var(--muted);font:inherit;
             font-weight:600;font-size:13.5px;cursor:pointer;
             transition:background var(--dur) var(--ease),color var(--dur) var(--ease)}
  .side-item:hover{background:var(--navy-50);color:var(--text)}
  .side-item.active{background:var(--navy);color:#fff}
  .side-ico{flex:none;width:20px;text-align:center;font-size:16px;line-height:1}
  .side-label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sidebar.collapsed .side-item{justify-content:center;padding:9px 0}
  .sidebar.collapsed .side-label{display:none}
  .side-collapse{display:flex;align-items:center;gap:11px;width:100%;margin-top:12px;padding:9px 10px;
                 border:none;background:none;border-top:1px solid var(--border);border-radius:0;
                 color:var(--subtle);font:inherit;font-weight:600;font-size:12px;cursor:pointer}
  .side-collapse:hover{color:var(--text)}
  .sidebar.collapsed .side-collapse{justify-content:center}
  /* mobile: drop the sidebar; the bottom bar + More-sheet take over */
  @media (max-width:768px){ .shell{display:block} .sidebar{display:none} .more-sheet-bg{display:block} }
  .more-sheet-bg{position:fixed;inset:0;background:rgba(15,28,51,.42);z-index:60;display:none}
  .more-sheet{position:fixed;left:0;right:0;bottom:0;max-height:82vh;overflow-y:auto;background:var(--card);
              border-radius:16px 16px 0 0;padding:12px 12px calc(18px + env(safe-area-inset-bottom,0px));
              box-shadow:var(--shadow-lg);animation:sheetup .2s var(--ease)}
  @keyframes sheetup{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @media (prefers-reduced-motion: reduce){.more-sheet{animation:none}}
  .more-sheet-head{display:flex;justify-content:space-between;align-items:center;padding:2px 4px 8px}
  .wrap{max-width:1180px;margin:24px auto;padding:0 20px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
        padding:20px;margin-bottom:16px;box-shadow:var(--shadow-sm)}
  h2{margin:0 0 4px;font-size:19px;font-weight:700;letter-spacing:-.01em}
  .sub{color:var(--muted);margin:0 0 16px;font-size:13px}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:top}
  th{color:var(--subtle);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em;
     border-bottom:1px solid var(--border-strong)}
  tbody tr{transition:background var(--dur) var(--ease)}
  tr.clickable:hover{background:var(--accent-soft);cursor:pointer}
  .btn{background:var(--accent);color:#fff;border:1px solid transparent;padding:9px 15px;border-radius:var(--radius-sm);
       cursor:pointer;font-weight:600;line-height:1.2;
       transition:background var(--dur) var(--ease),box-shadow var(--dur) var(--ease),transform var(--dur) var(--ease)}
  .btn:hover{background:var(--navy-700)}
  .btn:active{transform:translateY(1px)}
  .btn:focus-visible{outline:none;box-shadow:var(--ring)}
  .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
  .btn.ghost{background:#fff;color:var(--accent);border:1px solid var(--border-strong)}
  .btn.ghost:hover{background:var(--navy-50);border-color:var(--accent)}
  .btn.danger{background:var(--bad);color:#fff}
  .btn.danger:hover{background:#991b1b}
  .btn.danger-outline{background:#fff;color:var(--bad);border:1px solid var(--bad)}
  .btn.danger-outline:hover{background:var(--bad-soft)}
  .btn.sm{padding:6px 11px;font-size:12px}
  .pill{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600}
  .pill.ft{background:var(--accent-soft);color:var(--accent)}
  .pill.pt{background:#fce7f3;color:#9d174d}
  .pill.active{background:#dcfce7;color:var(--good)}
  .pill.inactive{background:#f3f4f6;color:var(--muted)}
  .pill.warn{background:var(--warn-soft);color:var(--warn)}
  .pill.bad{background:#fee2e2;color:var(--bad)}
  .pill.info{background:var(--accent-soft);color:var(--accent)}
  /* ===== Phase 2: loading skeletons + step checklist ======================= */
  .skel{display:flex;flex-direction:column;gap:10px;padding:8px 2px}
  .skel-bar{height:14px;border-radius:6px;
            background:linear-gradient(90deg,#eef1f5 25%,#e2e7ee 37%,#eef1f5 63%);
            background-size:400% 100%;animation:skelshimmer 1.4s ease infinite}
  @keyframes skelshimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}
  @media (prefers-reduced-motion: reduce){.skel-bar{animation:none}}
  .steps{border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;
         background:var(--surface-2);max-width:440px}
  .steps-head{display:flex;justify-content:space-between;align-items:baseline;
              font-weight:700;margin-bottom:8px;font-size:13px}
  .steps-time{color:var(--muted);font-variant-numeric:tabular-nums;font-weight:600;font-size:12px}
  .step{display:flex;gap:9px;align-items:center;padding:4px 0;font-size:13px;color:var(--muted)}
  .step-ico{width:18px;text-align:center;flex:none}
  .step-active{color:var(--text);font-weight:600}
  .step-active .step-ico{color:var(--navy)}
  .step-done{color:var(--text)}
  .step-done .step-ico{color:var(--good)}
  .step-pending{color:var(--subtle)}
  /* ===== Phase 5: Overview dashboard tiles ================================ */
  .ov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
  .ov-tile{display:block;width:100%;text-align:left;background:var(--card);border:1px solid var(--border);
           border-left:4px solid var(--border-strong);border-radius:var(--radius);padding:14px 16px;cursor:pointer;font:inherit;
           transition:box-shadow var(--dur) var(--ease),transform var(--dur) var(--ease)}
  .ov-tile:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
  .ov-tile:disabled{cursor:default}
  .ov-tile:disabled:hover{box-shadow:none;transform:none}
  .ov-tile.t-good{border-left-color:var(--good)}
  .ov-tile.t-warn{border-left-color:var(--warn)}
  .ov-tile.t-bad{border-left-color:var(--bad)}
  .ov-tile.t-info{border-left-color:var(--navy)}
  .ov-tile-label{font-size:12px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:7px}
  .ov-tile-num{font-size:26px;font-weight:800;letter-spacing:-.02em;margin:6px 0 2px;line-height:1.05;color:var(--text)}
  .ov-tile-sub{font-size:12px;color:var(--muted)}
  @media(max-width:480px){.ov-grid{grid-template-columns:1fr}}
  /* ===== Overview v2: SWR freshness, pay-cycle pipeline, net-pay sparkline === */
  .ov-updated{font-size:11px;color:var(--muted);display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
  .ov-updated .dot{width:6px;height:6px;border-radius:50%;background:var(--good);flex:0 0 auto}
  .ov-updated.refreshing .dot{background:var(--navy);animation:ovPulse 1s ease-in-out infinite}
  @keyframes ovPulse{0%,100%{opacity:.25}50%{opacity:1}}
  /* "THIS PAY CYCLE" hero */
  .ov-cycle{margin-top:12px}
  .ov-cycle-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:14px}
  .ov-cycle-net{text-align:right}
  .ov-cycle-net .ov-tile-num{margin:2px 0 0}
  /* pay-cycle pipeline: Time -> Calc -> Lock -> Sent -> Settled */
  .ov-pipe{display:flex;align-items:flex-start;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:2px 0}
  .ov-pipe-step{position:relative;flex:1 1 0;min-width:60px;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center}
  .ov-pipe-step::before{content:"";position:absolute;top:13px;left:-50%;width:100%;height:2px;background:var(--border-strong);z-index:0}
  .ov-pipe-step:first-child::before{display:none}
  .ov-pipe-step.done::before,.ov-pipe-step.active::before{background:var(--good)}
  .ov-pipe-pip{position:relative;z-index:1;width:26px;height:26px;border-radius:50%;display:inline-flex;
    align-items:center;justify-content:center;font-size:12px;font-weight:800;
    background:var(--card);border:2px solid var(--border-strong);color:var(--muted)}
  .ov-pipe-step.done .ov-pipe-pip{background:var(--good);border-color:var(--good);color:#fff}
  .ov-pipe-step.active .ov-pipe-pip{border-color:var(--navy);color:var(--navy);box-shadow:0 0 0 3px rgba(15,28,51,.10)}
  .ov-pipe-label{font-size:11px;font-weight:700;color:var(--text);line-height:1.15}
  .ov-pipe-step.todo .ov-pipe-label{color:var(--muted);font-weight:600}
  .ov-pipe-sub{font-size:10px;color:var(--muted);line-height:1.1}
  /* net-pay sparkline (pure inline SVG — no chart lib, CSP-safe) */
  .ov-spark-wrap{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .ov-spark{flex:1 1 200px;min-width:160px;height:46px;display:block}
  .ov-spark-poly{fill:none;stroke:var(--navy);stroke-width:2;vector-effect:non-scaling-stroke;stroke-linejoin:round;stroke-linecap:round}
  .ov-spark-area{fill:var(--navy);opacity:.06;stroke:none}
  .ov-spark-dot{fill:var(--navy)}
  .ov-spark-meta{display:flex;flex-direction:column;gap:1px;min-width:120px}
  .ov-delta{font-size:13px;font-weight:700;display:inline-flex;align-items:center;gap:4px}
  .ov-delta.up{color:var(--good)} .ov-delta.down{color:var(--bad)} .ov-delta.flat{color:var(--muted)}
  /* subtle staggered entrance */
  @keyframes ovIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .ov-anim{animation:ovIn .3s var(--ease) both}
  .ov-grid > .ov-tile{animation:ovIn .3s var(--ease) both}
  .ov-grid > .ov-tile:nth-child(1){animation-delay:.03s}
  .ov-grid > .ov-tile:nth-child(2){animation-delay:.06s}
  .ov-grid > .ov-tile:nth-child(3){animation-delay:.09s}
  .ov-grid > .ov-tile:nth-child(4){animation-delay:.12s}
  .ov-grid > .ov-tile:nth-child(5){animation-delay:.15s}
  .ov-grid > .ov-tile:nth-child(6){animation-delay:.18s}
  /* the global reduced-motion rule zeroes durations but not delays — kill ours */
  @media (prefers-reduced-motion: reduce){.ov-grid > .ov-tile,.ov-anim{animation:none !important}}
  /* horizontal scroll wrapper for wide tables */
  .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .table-scroll table{min-width:560px}
  /* ===== Phase 2: tables -> stacked cards on phones (<768px) ===============
     Below the md breakpoint, wide data tables become a vertical stack of
     label/value "cards" so they never force horizontal PAGE scroll on a
     360px screen. Desktop (>=768px) keeps the real <table> untouched.
     The transform is CSS-only: each <tr> becomes a card, each <td> a row of
     [label][value]. Column labels come from `data-label` attributes added to
     the primary list tables; tables without them degrade gracefully to a
     readable label-less stack (still no horizontal page scroll).
     Opt out per-table with class `keep-table` (stays tabular + side-scrolls). */
  @media (max-width: 767px) {
    .table-scroll:not(.keep-table){overflow-x:visible}
    .table-scroll:not(.keep-table) table{min-width:0;width:100%}
    /* Hide the desktop header row — labels move inline via data-label. */
    .table-scroll:not(.keep-table) > table > thead,
    .table-scroll:not(.keep-table) > table > thead tr{
      position:absolute;width:1px;height:1px;padding:0;margin:-1px;
      overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}
    .table-scroll:not(.keep-table) > table,
    .table-scroll:not(.keep-table) > table > tbody{display:block;width:100%}
    .table-scroll:not(.keep-table) > table > tbody > tr{
      display:block;background:var(--card);border:1px solid var(--border);
      border-radius:var(--radius);padding:10px 12px;margin-bottom:10px}
    .table-scroll:not(.keep-table) > table > tbody > tr > td{
      display:flex;justify-content:space-between;align-items:flex-start;gap:12px;
      width:auto;border:none;border-bottom:1px solid var(--border);
      padding:7px 0;text-align:right}
    .table-scroll:not(.keep-table) > table > tbody > tr > td:last-child{
      border-bottom:none}
    /* The data-label becomes the left-hand field name within each card row. */
    .table-scroll:not(.keep-table) > table > tbody > tr > td[data-label]::before{
      content:attr(data-label);flex:0 0 40%;text-align:left;color:var(--muted);
      font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.03em;
      padding-top:1px}
    /* Cells acting as a card title or full-width action row: span the row. */
    .table-scroll:not(.keep-table) > table > tbody > tr > td.card-title{
      display:block;text-align:left;font-size:15px;padding-bottom:9px}
    .table-scroll:not(.keep-table) > table > tbody > tr > td.card-title::before{
      content:none}
    /* Action cells: STACK the buttons as full-width tap targets (>=44px). Flex
       column + min-width:0 so two width:100% buttons can't sit side-by-side and
       blow out the cell's min-content (which inflated the mobile layout viewport
       and dragged width:100% modals wide — see KNOWN_ISSUE_modal_width). */
    .table-scroll:not(.keep-table) > table > tbody > tr > td.card-action{
      display:flex;flex-direction:column;align-items:stretch;gap:6px;min-width:0;
      text-align:left;padding:7px 0}
    .table-scroll:not(.keep-table) > table > tbody > tr > td.card-action::before{
      content:none}
    .table-scroll:not(.keep-table) > table > tbody > tr > td.card-action .btn{
      width:100%;min-width:0;min-height:44px;font-size:14px}
    /* Empty placeholder cells add no visible row on mobile. */
    .table-scroll:not(.keep-table) > table > tbody > tr > td.card-skip{display:none}
    /* Tables explicitly kept tabular get a subtle scroll affordance + tighter
       min-width so the side-scroll is obvious but compact. */
    .table-scroll.keep-table{
      box-shadow:inset -14px 0 12px -12px rgba(0,0,0,.12)}
    .table-scroll.keep-table table{min-width:520px}
  }
  /* primary action bar within a card */
  .actionbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:8px;
    padding-top:12px;border-top:1px solid var(--border)}
  .card.primary{border-color:var(--accent);box-shadow:var(--shadow)}
  h3{margin:0 0 4px;font-size:15px}
  /* tab groups */
  .tabgroup{display:flex;align-items:center}
  .row{display:flex;gap:18px;flex-wrap:wrap}
  .field{margin-bottom:12px;min-width:200px;flex:1}
  .field label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin-bottom:4px}
  .field .val{font-size:14px}
  .empty{color:var(--muted);text-align:center;padding:40px}
  /* messages: prominent by default, with success/error variants */
  .banner{background:var(--warn-soft);border:1px solid #fcd34d;border-left:5px solid #f59e0b;
    color:#92400e;padding:14px 18px;border-radius:8px;margin-bottom:16px;font-size:15px;font-weight:600;
    line-height:1.4;box-shadow:0 2px 8px rgba(0,0,0,.10);display:flex;align-items:center;gap:10px;
    animation:bannerPop .22s ease-out}
  .banner::before{content:"!";flex:0 0 22px;width:22px;height:22px;border-radius:50%;
    background:#f59e0b;color:#fff;font-weight:800;font-size:14px;display:inline-flex;
    align-items:center;justify-content:center}
  .banner.success{background:#dcfce7;border-color:#86efac;border-left-color:#16a34a;color:#065f46}
  .banner.success::before{content:"\2713";background:#16a34a}
  .banner.error{background:#fee2e2;border-color:#fecaca;border-left-color:#dc2626;color:#991b1b}
  .banner.error::before{content:"\2715";background:#dc2626}
  /* Info: neutral/instructional (e.g. 'use the other delete path instead').
     Important: NOT green — avoids being mistaken for a success message. */
  .banner.info{background:#dbeafe;border-color:#bfdbfe;border-left-color:#2563eb;color:#1e3a8a}
  .banner.info::before{content:"\2139";background:#2563eb}
  @keyframes bannerPop{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
  .connect{max-width:440px;margin:80px auto;text-align:center}
  .connect input{width:100%;margin-bottom:10px}
  .modal-bg{position:fixed;inset:0;background:rgba(15,28,51,.45);display:flex;align-items:flex-start;justify-content:center;padding:40px;z-index:20;overflow:auto;animation:modalFade var(--dur) var(--ease)}
  .modal{background:#fff;border-radius:var(--radius-lg);padding:24px;max-width:680px;width:100%;box-shadow:var(--shadow-lg);animation:modalRise .18s var(--ease)}
  @keyframes modalFade{from{opacity:0}to{opacity:1}}
  @keyframes modalRise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .x{float:right;border:none;background:none;font-size:20px;cursor:pointer;color:var(--muted)}
  /* ===== Quick-find command palette (Cmd/Ctrl-K) ========================= */
  .cmdk-bg{align-items:flex-start;padding-top:12vh}
  .cmdk{overflow:hidden}
  .cmdk-input{width:100%;border:none;border-bottom:1px solid var(--border);background:transparent;color:var(--text);
    font:inherit;font-size:17px;padding:18px 20px;outline:none;border-radius:0}
  .cmdk-list{max-height:46vh;overflow:auto;padding:6px}
  .cmdk-empty{padding:18px 20px;color:var(--muted);font-size:14px}
  .cmdk-item{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:none;
    cursor:pointer;padding:9px 12px;border-radius:8px;font:inherit;color:var(--text)}
  .cmdk-item.sel{background:var(--navy);color:#fff}
  .cmdk-ico{flex:0 0 auto;width:20px;text-align:center;font-size:15px}
  .cmdk-label{flex:1 1 auto;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cmdk-type{flex:0 0 auto;font-size:11px;color:var(--muted)}
  .cmdk-item.sel .cmdk-type{color:rgba(255,255,255,.82)}
  .cmdk-foot{border-top:1px solid var(--border);padding:8px 16px;font-size:11px;color:var(--muted);text-align:right}
  .muted{color:var(--muted)}
  .stub{border:2px dashed var(--border);border-radius:var(--radius);padding:36px;text-align:center;color:var(--muted)}
  /* ===== Phase 0 responsive foundation (additive; no visual change) =====
     Breakpoint + spacing tokens documented as CSS custom properties so the
     inline CSS below stays in sync with the Tailwind md:/lg: classes used in
     the JSX. Tailwind defaults: sm=640, md=768, lg=1024, xl=1280.
     Desktop (>=1024px / lg:) behavior is intentionally left untouched. */
  :root{
    --bp-sm:640px;   /* phones / small-tablet boundary */
    --bp-md:768px;   /* tablet boundary (Tailwind md) */
    --bp-lg:1024px;  /* desktop boundary (Tailwind lg) — preserve >=1024px */
    --space-1:4px; --space-2:8px; --space-3:12px;   /* 4px-base spacing scale */
    --space-4:16px; --space-5:24px; --space-6:32px;
  }
  /* Mobile utility classes — only take effect below the sm breakpoint, so they
     are inert (and thus visually no-op) on tablet/desktop. */
  @media (max-width: 640px) {
    .hide-mobile{display:none !important}      /* hidden on phones only */
    .stack-mobile{flex-direction:column !important}        /* flex rows -> column */
    .stack-mobile.stack-grid{display:block !important}     /* grids -> single column */
  }
  .show-mobile{display:none}                   /* hidden by default ... */
  @media (max-width: 640px) {
    .show-mobile{display:block !important}      /* ... shown on phones only */
  }
  @media (max-width: 820px) {
    .wrap{margin:14px auto;padding:0 12px}
    .card{padding:14px}
    .topbar{flex-wrap:wrap;gap:8px;align-items:flex-start;z-index:30}
    .brand{flex:1 1 100%;margin-right:0}
    .topbar-actions{width:100%;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
    .topbar-actions > *{flex:1 1 auto;min-width:140px}
    /* Brand title: scale down + truncate gracefully so it never pushes the
       sign-out / company switcher off-screen on narrow phones. */
    .brand{font-size:15px;overflow:hidden;text-overflow:ellipsis}
    .company-switcher{display:block;width:100%}
    /* Modals must sit above the elevated sticky header (z:30) and the fixed
       bottom-nav (z:40) across tablet/phone widths — not only on the <=640px
       sheet layout — or a modal opened at 641-820px hides behind them. */
    .modal-bg{z-index:50}
    .grid-2{grid-template-columns:1fr !important}
  }
  /* two-column responsive grid used by Time Import options */
  .grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
  /* ===== Phase 4: Dashboard stat cards & summary grids =======================
     The dashboard summary strips (.dash-stats) are flex `.row`s of `.field`
     stat cards (.dash-stat) with a big `.val` number (.dash-stat-num). On
     desktop the `.field` min-width:200 + flex:1 yields an even multi-column
     row (untouched). The rules below ONLY take effect on small screens, so
     they are inert at >=1024px and the desktop layout is unchanged.
       <=640px : two-up grid (even cards, no odd full-width stretch)
       <=400px : single column for tiny phones (360px target)
     A grid (not flex) on mobile sizes the cards evenly while min-width:0
     overrides the .field min-width:200 that would otherwise overflow a 360px
     viewport. The big number is nudged down a touch to fit two-up. */
  @media (max-width: 640px) {
    .dash-stats{display:grid !important;grid-template-columns:1fr 1fr;gap:10px 12px;margin-bottom:8px}
    .dash-stats > .dash-stat{min-width:0 !important;margin-bottom:0}
    .dash-stats .dash-stat-num{font-size:18px !important}
  }
  @media (max-width: 400px) {
    .dash-stats{grid-template-columns:1fr}
  }
  /* Custom hover tooltip — native title= is unreliable on Chrome/macOS for
     multi-line text; this fires instantly and respects line breaks. */
  .tip-wrap{position:relative;display:inline-block}
  .tip-wrap:hover .tip-body,.tip-wrap:focus-within .tip-body{visibility:visible;opacity:1}
  .tip-body{position:absolute;left:50%;bottom:calc(100% + 6px);transform:translateX(-50%);
    background:#1f2937;color:#fff;padding:6px 8px;border-radius:4px;font-size:12px;line-height:1.4;
    white-space:pre-line;min-width:max-content;max-width:300px;z-index:1000;pointer-events:none;
    visibility:hidden;opacity:0;transition:opacity .1s;text-align:left;font-weight:400}
  .tip-body::after{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);
    border:4px solid transparent;border-top-color:#1f2937}
  /* ===== Mobile bottom tab bar (phones/tablet only, <=768px) =================
     A fixed bottom navigation so the primary tabs are reachable one-handed
     without scrolling the top tab row. Hidden at >=769px so the desktop
     experience is untouched. Mirrors the same `tab` state + go() handler as
     the top tabs — no new navigation logic. */
  .bottom-nav{display:none}
  @media (max-width: 768px) {
    .bottom-nav{
      display:flex;position:fixed;left:0;right:0;bottom:0;z-index:40;
      background:var(--card);border-top:1px solid var(--border);
      overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
      padding-bottom:env(safe-area-inset-bottom,0px);
      box-shadow:0 -2px 8px rgba(0,0,0,.06)}
    .bottom-nav::-webkit-scrollbar{display:none}
    .bottom-nav .bnav{
      flex:1 0 auto;min-width:64px;min-height:56px;border:none;background:none;
      cursor:pointer;color:var(--muted);font-weight:500;font-size:11px;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:3px;padding:6px 8px;line-height:1.1;text-align:center}
    .bottom-nav .bnav .bnav-ico{font-size:18px;line-height:1}
    .bottom-nav .bnav.active{color:var(--accent)}
    .bottom-nav .bnav.active .bnav-ico{transform:translateY(-1px)}
    /* Keep page content clear of the fixed bar (incl. safe-area inset). */
    .wrap{padding-bottom:calc(72px + env(safe-area-inset-bottom,0px))}
  }
  /* ===== Phase 3: Forms & Modals — mobile sheets (<=640px) ===================
     Below the sm breakpoint, the shared `.modal-bg`/`.modal` dialogs become
     full-width slide-up sheets pinned to the bottom of the viewport, with a
     sticky Save/Cancel action bar and a safe-area inset. Form `.row`s collapse
     to a single column and inputs/labels grow to >=16px so iOS Safari does not
     auto-zoom on focus. ALL of this is gated to <=640px, so the centered
     desktop dialogs at >=1024px are completely untouched (this is purely
     additive; every modal shares these classes so no JSX changes are needed).
     Note: several modals set an inline `style={{maxWidth:NNN}}` on `.modal`;
     inline styles outrank stylesheet rules, so the mobile overrides below use
     `!important` to reliably reach full width on phones. */
  @media (max-width: 640px) {
    /* Backdrop: dock the sheet to the bottom, no outer padding so it can be
       full-bleed. Keep scroll containment on the sheet itself (below). */
    .modal-bg{
      align-items:flex-end;justify-content:stretch;padding:0;
      z-index:50}                       /* above the bottom-nav (z-40) */
    /* Sheet: full width, tall but capped to the viewport, rounded top only,
       internal scroll, and bottom padding clears the sticky action bar +
       home-indicator safe area. Use dynamic viewport units (dvh) so mobile
       browser chrome resizing never clips the top of the sheet. */
    .modal{
      max-width:100% !important;width:100% !important;
      max-height:92vh;max-height:92dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;
      border-radius:16px 16px 0 0;padding:18px 16px;
      padding-bottom:0;
      position:relative;animation:sheetUp .22s ease-out}
    /* Larger, easier-to-hit close button on the sheet (>=44px touch target). */
    .modal .x{font-size:26px;min-width:44px;min-height:44px;line-height:1;margin:-4px -4px 0 0}
    /* Form rows stack to a single column; fields go full width. */
    .modal .row{flex-direction:column;gap:0}
    .modal .field{min-width:0;width:100%}
    /* >=16px on form controls + labels prevents iOS focus auto-zoom and makes
       inputs comfortably tappable. */
    .modal label,
    .modal input,
    .modal select,
    .modal textarea{font-size:16px}
    .modal .field label{font-size:12px}   /* keep the small uppercase caption */
    .modal input,
    .modal select,
    .modal textarea{min-height:44px;padding:10px 12px}
    .modal textarea{min-height:88px}
    /* Sticky action bar pinned to the bottom of the sheet. Buttons become
       full-width, stacked, and stay reachable above the home indicator. */
    .modal .actions{
      position:sticky;bottom:0;left:0;right:0;
      display:flex !important;
      margin:16px -16px 0 !important;padding:12px 16px;
      padding-bottom:calc(12px + env(safe-area-inset-bottom,0px));
      background:var(--card);border-top:1px solid var(--border);
      flex-direction:column-reverse !important;justify-content:stretch !important;
      gap:8px !important;flex-wrap:nowrap;
      box-shadow:0 -2px 8px rgba(0,0,0,.06);z-index:1}
    .modal .actions .btn{width:100%;min-height:44px;font-size:15px}
  }
  @keyframes sheetUp{from{transform:translateY(100%)}to{transform:none}}
  /* ===== Phase 5: Polish & QA (final pass) ===================================
     Additive, mobile-only refinements. Everything here is gated behind
     max-width media queries, so the desktop experience at >=1024px (and the
     tablet/desktop tabular layouts) is byte-for-byte unchanged.
     Goals: (1) every interactive control clears the 44px tap-target floor on
     phones; (2) long unbreakable strings (emails, Wise tags, UUIDs) wrap
     instead of forcing horizontal page scroll; (3) slightly more legible small
     button text. */
  @media (max-width: 640px) {
    /* Tap-target floor: any standalone button (incl. .btn.sm rendered outside
       tables/modals, which already have their own 44px rules) gets a 44px min
       height and vertically-centered label. inline-flex keeps inline siblings
       (e.g. "Save"{" "}"Cancel") flowing naturally. */
    .btn{min-height:44px;display:inline-flex;align-items:center;justify-content:center;gap:6px}
    .btn.sm{font-size:13px;padding:8px 12px}
    /* The bottom-nav buttons are already 56px; the .x close button is handled
       in the Phase 3 modal block. Native form controls already get 44px in the
       modal block; mirror that for inline (non-modal) selects/inputs so on-page
       editors (rate tables, recipient rows) are comfortably tappable too. */
    select,input,textarea{min-height:44px}
    /* Long unbreakable values must never push the page wider than the viewport.
       Applies to the stacked-card value cells and generic value spans. */
    .table-scroll:not(.keep-table) > table > tbody > tr > td,
    .field .val,
    .modal .field .val{overflow-wrap:anywhere;word-break:break-word}
    /* Info banners often carry long unbreakable codes (temp passwords, Wise
       tags, emails). Let them wrap to their own line and break the code so the
       banner never pushes the page wider than the viewport. */
    .banner{flex-wrap:wrap}
    .banner code{min-width:0;overflow-wrap:anywhere;word-break:break-word}
  }
  @media print {
    body{background:#fff}
    .topbar,.tabs,.bottom-nav,.no-print{display:none !important}
    .wrap{margin:0;max-width:none}
    /* hide every card except the pay list when printing */
    .card{display:none !important}
    #paylist-print{display:block !important;border:none;box-shadow:none;margin:0}
    #paylist-print *{visibility:visible}
  }
  /* ---- Floating pop-up notifications (toasts) — visible regardless of scroll ---- */
  .toaster{position:fixed; top:14px; left:50%; transform:translateX(-50%); z-index:9999; display:flex; flex-direction:column; gap:8px; width:max-content; max-width:min(620px,94vw); pointer-events:none;}
  .toast{pointer-events:auto; display:flex; align-items:flex-start; gap:10px; padding:11px 14px; border-radius:12px; box-shadow:0 10px 30px rgba(15,23,42,.22); font-size:14px; border:1px solid; animation:toastIn .18s ease;}
  .toast .x{background:none; border:0; color:inherit; opacity:.55; cursor:pointer; font-size:18px; line-height:1; padding:0 0 0 2px;}
  .toast.info{background:#eff6ff; border-color:#bfdbfe; color:#1e3a8a;}
  .toast.success{background:#ecfdf5; border-color:#a7f3d0; color:#065f46;}
  .toast.warn{background:#fffbeb; border-color:#fde68a; color:#92400e;}
  .toast.error{background:#fef2f2; border-color:#fecaca; color:#b91c1c;}
  @keyframes toastIn{from{opacity:0; transform:translateY(-6px);} to{opacity:1; transform:none;}}
  /* Respect users who prefer reduced motion — kill transitions/animations. */
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{transition-duration:.001ms !important;animation-duration:.001ms !important;
      animation-iteration-count:1 !important;scroll-behavior:auto !important}
  }
</style>

<body>
<div id="root"></div>
<!-- Redesign safety net: discreet link to fall back to the classic app. Lives
     OUTSIDE #root so React never touches it. Removed when legacy.html is retired. -->
<a href="/?ui=classic" id="ui-switch" class="no-print"
   title="Switch to the classic admin design"
   style="position:fixed;left:10px;bottom:10px;z-index:40;font:600 11px/1 Inter,system-ui,sans-serif;color:#5c6677;background:rgba(255,255,255,.92);border:1px solid #e4e8ee;border-radius:999px;padding:6px 11px;text-decoration:none;box-shadow:0 1px 2px rgba(20,35,59,.08);opacity:.7">↩ Classic view</a>
<script type="text/babel" data-type="module">
const { useState, useEffect, useCallback } = React;
// Build stamp — replaced on each deploy by tools/stamp-build.mjs.
const BUILD = "2026-06-19 21:22 EDT · bc1ec2e";
// Self-update: on load, compare the running build to the deployed version.txt
// (fetched no-store). If a newer build is live, reload to it via a cache-busting
// URL — so a NORMAL refresh always lands on the latest, no hard refresh needed.
(function(){
  async function checkUpdate(){
    try{
      // never interrupt an OAuth callback — its code/token lives in the URL.
      if(/access_token=|[?&](code|error)=/.test(location.hash + "&" + location.search)) return;
      const res = await fetch("version.txt?_=" + Date.now(), { cache:"no-store" });
      if(!res.ok) return;
      const latest = (await res.text()).trim();
      if(!latest || latest === BUILD) return;                 // already current
      // Loop-safe: reload only if we're not already on THIS build's buster. (The
      // old guard checked merely for the PRESENCE of _v=, so it stopped updating
      // after the first reload — that's why long-open tabs went stale.)
      if(location.search.indexOf("_v=" + encodeURIComponent(latest)) === -1)
        location.replace(location.pathname + "?_v=" + encodeURIComponent(latest));
    }catch(_e){ /* offline / blocked — ignore */ }
  }
  checkUpdate();
  // Re-check when the tab is refocused/reopened, so an open tab picks up a new
  // deploy without a manual refresh.
  document.addEventListener("visibilitychange", function(){ if(!document.hidden) checkUpdate(); });
  window.addEventListener("focus", checkUpdate);
})();
// Admin: set a contractor's single daily shift (PHT). Drives the portal's
// start/end mood check-ins. Self-contained — fetches + saves on its own.
function ShiftEditor({ client, workerId }){
  const [s,setS]=useState(null); const [busy,setBusy]=useState(false); const [msg,setMsg]=useState("");
  // The standard schedule is 8am–5pm US Eastern (stored in PHT). Used to default
  // an unset shift and to power the "Reset to 8–5 ET" button.
  const def=()=>({start:etToPhtHHMM("08:00"),end:etToPhtHHMM("17:00")});
  useEffect(()=>{ let alive=true;
    client.from("workers").select("shift_start,shift_end").eq("id",workerId).maybeSingle()
      .then(({data})=>{ if(!alive) return;
        const st=(data&&data.shift_start||"").slice(0,5), en=(data&&data.shift_end||"").slice(0,5);
        setS((st||en)?{start:st,end:en}:def()); });   // default an unset shift to 8–5 ET
    return ()=>{alive=false;}; },[workerId]);
  if(!s) return null;
  async function save(){ setBusy(true); setMsg("");
    const {error}=await client.from("workers").update({shift_start:s.start||null,shift_end:s.end||null}).eq("id",workerId);
    setBusy(false); setMsg(error?("Failed: "+error.message):"Saved ✓"); }
  const sinp={padding:"7px 10px",border:"1px solid var(--border-strong)",borderRadius:"var(--radius-sm)",width:"auto"};
  return (
    <div style={{margin:"8px 0"}}>
      <label style={{display:"block",fontSize:11,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".03em",marginBottom:4}}>Shift schedule (PHT) — drives start/end mood check-ins · default 8am–5pm US Eastern</label>
      <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
        <input type="time" style={sinp} value={s.start} onChange={e=>setS(x=>({...x,start:e.target.value}))}/>
        <span className="muted">to</span>
        <input type="time" style={sinp} value={s.end} onChange={e=>setS(x=>({...x,end:e.target.value}))}/>
        <button className="btn sm" disabled={busy} onClick={save}>{busy?"Saving…":"Save shift"}</button>
        <button className="btn ghost sm" type="button" disabled={busy} onClick={()=>setS(def())}>Reset to 8–5 ET</button>
        {msg && <span className="muted" style={{fontSize:12}}>{msg}</span>}
      </div>
      <div className="muted" style={{fontSize:11,marginTop:2}}>= 8:00 AM – 5:00 PM US Eastern, converted to Philippine time.</div>
    </div>
  );
}

// PH is UTC+8 year-round; US Eastern is UTC-5 (EST) / UTC-4 (EDT). Convert an
// Eastern wall-clock "HH:MM" into the equivalent Philippine-time "HH:MM" for the
// current date, so a shift entered as US office hours is stored in PHT like the
// rest of the app (ShiftEditor / portal check-ins). Auto-tracks US daylight saving.
function etOffsetHours(date){
  const p=new Intl.DateTimeFormat("en-US",{timeZone:"America/New_York",timeZoneName:"shortOffset"}).formatToParts(date).find(x=>x.type==="timeZoneName");
  const m=p&&p.value.match(/GMT([+-]\d+)(?::(\d+))?/);
  return m? Number(m[1])+(m[2]?Math.sign(Number(m[1]))*Number(m[2])/60:0) : -5;
}
function etToPhtHHMM(hhmm){
  const [h,m]=String(hhmm).split(":").map(Number);
  const gap=8-etOffsetHours(new Date());   // 12 (EDT) or 13 (EST)
  const t=(((h*60+m+gap*60)%1440)+1440)%1440;
  return String(Math.floor(t/60)).padStart(2,"0")+":"+String(t%60).padStart(2,"0");
}
// Inverse of etToPhtHHMM: a PHT "HH:MM" -> the equivalent US Eastern "HH:MM"
// for today's DST. Used to express a contractor's shift on agreements in ET (the
// anchor) even though it's stored in PHT.
function phtToEtHHMM(hhmm){
  const [h,m]=String(hhmm).split(":").map(Number);
  const gap=8-etOffsetHours(new Date());   // 12 (EDT) or 13 (EST)
  const t=(((h*60+m-gap*60)%1440)+1440)%1440;
  return String(Math.floor(t/60)).padStart(2,"0")+":"+String(t%60).padStart(2,"0");
}
// "HH:MM" (24h) -> "h:MM AM/PM"
function fmt12(hhmm){
  const [h,m]=String(hhmm).split(":").map(Number);
  if(!Number.isFinite(h)||!Number.isFinite(m)) return String(hhmm||"");
  return (((h+11)%12)+1)+":"+String(m).padStart(2,"0")+" "+(h<12?"AM":"PM");
}
// A PHT shift start/end rendered as an Eastern-Time label for agreements.
function phtShiftToEtLabel(startPht,endPht){
  return fmt12(phtToEtHHMM(startPht))+" – "+fmt12(phtToEtHHMM(endPht))+" Eastern Time";
}

// Display label for a payout method: BPI uppercase, others Capitalized.
// Next US daylight-saving transition (spring=2nd Sun Mar, fall=1st Sun Nov),
// as a 'YYYY-MM-DD' ET date. Drives the shift-adjustment nudge banner.
function nextUsDstChange(){
  const nthSunday=(year,month0,n)=>{ let c=0; for(let day=1;day<=31;day++){ const dt=new Date(Date.UTC(year,month0,day)); if(dt.getUTCMonth()!==month0) break; if(dt.getUTCDay()===0){ c++; if(c===n){ return `${year}-${String(month0+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`; } } } return null; };
  const todayET=new Intl.DateTimeFormat("en-CA",{timeZone:"America/New_York"}).format(new Date());
  const y=Number(todayET.slice(0,4));
  const ms=(s)=>Date.UTC(+s.slice(0,4),+s.slice(5,7)-1,+s.slice(8,10));
  const cands=[];
  for(const yy of [y,y+1]){ cands.push({iso:nthSunday(yy,2,2),kind:"spring"}); cands.push({iso:nthSunday(yy,10,1),kind:"fall"}); }
  return cands.filter(c=>c.iso && ms(c.iso)>=ms(todayET)).sort((a,b)=>ms(a.iso)-ms(b.iso))[0];
}
// Shows from the working day before (Fri) through the Sunday change, reminding
// admins to shift US-anchored schedules by an hour (PH<->NY gap flips 12h<->13h).
function DstNudge(){
  const c=nextUsDstChange(); if(!c) return null;
  const ms=(s)=>Date.UTC(+s.slice(0,4),+s.slice(5,7)-1,+s.slice(8,10));
  const todayET=new Intl.DateTimeFormat("en-CA",{timeZone:"America/New_York"}).format(new Date());
  const days=Math.round((ms(c.iso)-ms(todayET))/86400000);
  if(days<0 || days>2) return null;
  const when=new Date(c.iso+"T12:00:00Z").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
  const spring=c.kind==="spring";
  return (
    <div className="banner info">⏰ US daylight saving {spring?"begins":"ends"} on {when} (clocks {spring?"spring forward":"fall back"}). The Philippines–New York gap becomes {spring?"12 hours":"13 hours"}. For any shifts anchored to US office hours, move their PHT start/end <b>{spring?"1 hour EARLIER":"1 hour LATER"}</b>.</div>
  );
}
function methodLabel(m){
  if(!m) return "";
  return m==="bpi" ? "BPI" : m.charAt(0).toUpperCase()+m.slice(1);
}

// Recognition-over-recall (Phase 4): plain-language explanation of a coded
// value, surfaced on hover via title= so even trained admins don't have to hold
// the taxonomy in their head. Returns "" when there's no hint (no tooltip).
function codeHint(kind, val){
  const v=String(val==null?"":val).toLowerCase();
  const M={
    contract:{ft:"Full-time contractor", pt:"Part-time contractor"},
    status:{active:"Currently engaged — included in new payroll", inactive:"Not currently engaged — excluded from new payroll"},
    method:{wise:"Paid in PHP via Wise transfer (USD-funded)", bpi:"Paid via BPI bank transfer",
            gcash:"Paid via GCash", paymaya:"Paid via Maya", paypal:"Paid via PayPal"},
    pay:{draft:"Calculated, not yet sent", queued:"Queued for payout", sent:"Funded & sent to the contractor",
         failed:"Payout failed — needs attention", reconciled:"Matched against the payout rail"},
  };
  return (M[kind] && M[kind][v]) || "";
}

// Loading skeleton (Phase 2). Shimmer bars that reserve layout space so data
// load causes no shift. Shimmer auto-disables under prefers-reduced-motion.
function Skeleton({rows=4, style}){
  return (
    <div className="skel" aria-hidden="true" style={style}>
      {Array.from({length:rows}).map((_,i)=>
        <div key={i} className="skel-bar" style={{width:(68+((i*29)%30))+"%"}}/>)}
    </div>
  );
}

// ---- Floating pop-up notifications -----------------------------------------
// Warnings/messages appear here, anchored to the VIEWPORT, so they're visible
// no matter how far a long page is scrolled. Two flavours:
//   • notify(content, {type, ms, persistent, actions}) — transient toast (auto-
//     dismisses after ~5s unless persistent); use for one-off feedback/errors.
//   • <Alert show={cond} type="warn">…</Alert> — persistent warning that floats
//     while `cond` holds (returns null inline). Can carry an action button.
// Mounted once via <Toaster/> at the app root.
const _toasts=[]; let _toastSub=null; let _toastId=0;
function _emitToasts(){ if(_toastSub) _toastSub(_toasts.slice()); }
function notify(content, opts){
  opts=opts||{}; const id=++_toastId;
  _toasts.push({id, content, type:opts.type||"info", actions:opts.actions||null});
  _emitToasts();
  if(!opts.persistent) setTimeout(()=>dismissToast(id), opts.ms||5000);
  return id;
}
function dismissToast(id){ const i=_toasts.findIndex(t=>t.id===id); if(i>=0){ _toasts.splice(i,1); _emitToasts(); } }
const _alerts=new Map(); let _alertSub=null; let _currentTab=null;
function _emitAlerts(){ if(_alertSub) _alertSub(new Map(_alerts)); }
function setToastTab(t){ _currentTab=t; _emitAlerts(); }   // App sets this on tab change
// Persistent warning. Pass `tab` to scope it to one tab (all tabs stay mounted,
// so a tab-less Alert floats everywhere). Omit `tab` for genuinely app-wide ones.
function Alert({show, type, children, actions, tab}){
  const id=React.useId();
  useEffect(()=>{
    if(show) _alerts.set(id,{type:type||"warn", content:children, actions:actions||null, tab:tab||null}); else _alerts.delete(id);
    _emitAlerts();
    return ()=>{ _alerts.delete(id); _emitAlerts(); };
  });
  return null;
}
function Toaster(){
  const [toasts,setToasts]=useState([]); const [alerts,setAlerts]=useState(new Map());
  useEffect(()=>{ _toastSub=setToasts; _alertSub=setAlerts; setToasts(_toasts.slice()); setAlerts(new Map(_alerts));
    return ()=>{ _toastSub=null; _alertSub=null; }; },[]);
  const items=[ ...[...alerts.entries()].filter(([id,a])=>!a.tab||a.tab===_currentTab).map(([id,a])=>({key:"a"+id, dismiss:null, ...a})),
                ...toasts.map(t=>({key:"t"+t.id, type:t.type, content:t.content, actions:t.actions, dismiss:()=>dismissToast(t.id)})) ];
  if(!items.length) return null;
  return (
    <div className="toaster" role="region" aria-label="Notifications">
      {items.map(it=>(
        <div key={it.key} className={"toast "+(it.type||"info")} role={(it.type==="error"||it.type==="warn")?"alert":"status"}>
          <div style={{flex:1,minWidth:0}}>{it.content}</div>
          {it.actions&&it.actions.map((a,i)=><button key={i} className="btn sm" onClick={()=>{ a.onClick&&a.onClick(); it.dismiss&&it.dismiss(); }}>{a.label}</button>)}
          {it.dismiss && <button className="x" aria-label="Dismiss" onClick={it.dismiss}>×</button>}
        </div>
      ))}
    </div>
  );
}

// Step checklist with elapsed time (Phase 2) for ops that can exceed ~10s
// (imports, payroll calc, Wise drafting). Shows each step's state so the user
// can decide whether to wait — the guideline's replacement for a bare spinner.
// Pass steps:[labels], current:index, startedAt:ms, done:bool.
function ProgressSteps({steps, current=0, startedAt, done=false}){
  const [,tick]=useState(0);
  useEffect(()=>{
    if(done) return; const id=setInterval(()=>tick(t=>t+1),1000); return ()=>clearInterval(id);
  },[done]);
  const elapsed=startedAt? Math.max(0,Math.round((Date.now()-startedAt)/1000)) : 0;
  return (
    <div className="steps" role="status" aria-live="polite">
      <div className="steps-head"><span>{done?"Done ✓":"Working…"}</span><span className="steps-time">{elapsed}s elapsed</span></div>
      {steps.map((s,i)=>{
        const state = done||i<current ? "done" : i===current ? "active" : "pending";
        return (
          <div key={i} className={"step step-"+state}>
            <span className="step-ico" aria-hidden="true">{state==="done"?"✓":state==="active"?"●":"○"}</span>
            <span>{s}</span>
          </div>
        );
      })}
    </div>
  );
}

// Prominent status banner. Auto-detects tone from the message text:
// anything that reads like a failure -> red error styling, else green success.
// Pass tone="error"|"success"|"warn" to force it. Returns null when msg is empty.
function bannerTone(msg){
  const t=String(msg||"").toLowerCase();
  if(/error|couldn'?t|can'?t|failed|fail\b|no rate|invalid|enter |pick |unable/.test(t)) return "error";
  return "success";
}
function Banner({msg, tone, style, children}){
  if(!msg && !children) return null;
  const cls = tone || (msg ? bannerTone(msg) : "");
  return <div className={"banner"+(cls?(" "+cls):"")} style={style}>{children||msg}</div>;
}

// Assemble a contractor's display name as first [middle] last. Works whether or
// not the middle_name column/value is present (most contractors have none).
function fullName(w){
  if(!w) return "";
  const parts=[w.first_name, w.middle_name, w.last_name].filter(x=>x && String(x).trim());
  return parts.join(" ").trim();
}

function phoneCountry(code){ return PHONE_COUNTRIES.find(c=>c.code===code) || PHONE_COUNTRIES[0]; }
// Group national digits per country style (progressive, for live typing). US & PH
// use local grouping; every other country keeps raw digits (E.164 caps total at 15).
function groupNational(code, raw){
  if(code==="US" || code==="PH"){
    const d=String(raw||"").replace(/\D/g,"").slice(0,10);
    if(!d) return "";
    const a=d.slice(0,3), b=d.slice(3,6), c=d.slice(6,10);
    if(code==="PH") return [a,b,c].filter(Boolean).join("-");   // AAA-BBB-CCCC
    let out="("+a;                                              // US: (AAA) BBB-CCCC
    if(d.length>3) out+=") "+b;
    if(d.length>6) out+="-"+c;
    return out;
  }
  return String(raw||"").replace(/\D/g,"").slice(0,15);
}
// Combine a country + national number into the stored/displayed string.
function buildPhone(code, national){
  const g=groupNational(code, national);
  return g ? `${phoneCountry(code).cc} ${g}` : "";
}
// Parse a stored phone string into {code, national}. Detects PH/US local forms
// first (+63/+1, 63+10, 0+10, 1+10), then matches the longest dial-code prefix of
// any picker country; otherwise falls back to `def` (US).
function parsePhone(value, def){
  const s=String(value==null?"":value).trim();
  const digits=s.replace(/\D/g,"");
  if(!digits) return { code: def||"US", national:"" };
  if(s.startsWith("+63") || (digits.startsWith("63") && digits.length===12)) return { code:"PH", national:digits.replace(/^63/,"").slice(0,10) };
  if(digits.startsWith("0") && digits.length===11)                           return { code:"PH", national:digits.slice(1,11) };
  if(s.startsWith("+1")  || (digits.startsWith("1") && digits.length===11))  return { code:"US", national:digits.replace(/^1/,"").slice(0,10) };
  if(s.startsWith("+")){                                       // any other "+CC …" value
    let best=null;
    for(const c of PHONE_COUNTRIES){
      const d=c.cc.replace(/\D/g,"");
      if(d && digits.startsWith(d) && (!best || d.length>best.len)) best={ code:c.code, len:d.length };
    }
    if(best) return { code:best.code, national: digits.slice(best.len).slice(0,15) };
  }
  return { code: def||"US", national: digits.slice(-10) };
}
// Pretty-print any stored phone value (read-only display + on-save normalization).
// US → "+1 (AAA) BBB-CCCC", PH → "+63 AAA-BBB-CCCC", others → "+CC digits".
// Incomplete US/PH numbers are returned unchanged so a half-typed value is never mangled.
function formatPhone(raw){
  const s=(raw==null?"":String(raw)).trim();
  if(!s) return "";
  const { code, national }=parsePhone(s, null);
  if(!national) return s;
  if((code==="US"||code==="PH") && national.length!==10) return s;   // incomplete — leave as typed
  return buildPhone(code, national);
}

// Phone field with a country-code picker. Controlled by `value` (the full stored
// string e.g. "+1 (212) 555-0100"); emits the same canonical string via onChange.
// Live edits stay raw (no cursor jank); formats on blur. `defaultCountry` is used
// only when the stored value has no explicit country code.
function PhoneInput({ value, onChange, defaultCountry="US", style, inputStyle, placeholder, ...rest }){
  const p0=parsePhone(value, defaultCountry);
  const [country,setCountry]=useState(p0.code);
  const [nat,setNat]=useState(()=>groupNational(p0.code, p0.national));
  // Re-sync if the value prop changes from outside (record load, pull-from-Wise)
  // and differs from what we'd emit — without clobbering in-progress typing.
  useEffect(()=>{
    const emitted=buildPhone(country, nat);
    if(String(value||"")!==emitted){ const p=parsePhone(value, defaultCountry); setCountry(p.code); setNat(groupNational(p.code, p.national)); }
  // eslint-disable-next-line
  },[value]);
  const emit=(code,text)=>onChange(buildPhone(code, text));
  return (
    <div style={{display:"flex",gap:6,width:"100%",...style}}>
      <select value={country} aria-label="Country code" style={{flex:"0 0 auto",width:96,padding:"0 4px"}}
        onChange={e=>{ const c=e.target.value; setCountry(c); setNat(n=>groupNational(c,n)); emit(c,nat); }}>
        {PHONE_COUNTRIES.map(c=><option key={c.code} value={c.code} title={c.name}>{c.flag} {c.cc} {c.name}</option>)}
      </select>
      <input type="tel" inputMode="tel" value={nat}
        placeholder={placeholder||phoneCountry(country).ex} style={{flex:1,minWidth:0,...inputStyle}}
        onChange={e=>{ setNat(e.target.value); emit(country, e.target.value); }}
        onBlur ={e=>{ const g=groupNational(country, e.target.value); setNat(g); emit(country, g); }}
        {...rest}/>
    </div>
  );
}

// ---- Email: shared input with common-domain autocomplete -------------------
// Domains ordered by approximate global mailbox count: Gmail is far ahead, then
// the big consumer providers (Microsoft's Outlook/Hotmail, Yahoo, Apple), then
// large legacy/regional ones. Pass `work` to pin the company domains to the front
// (work-email fields), or `pin` to supply your own front-of-list domains.
const EMAIL_DOMAINS = [
  "gmail.com","yahoo.com","hotmail.com","outlook.com","icloud.com",
  "aol.com","proton.me","gmx.com","yandex.com","live.com","msn.com","mail.com",
];
const WORK_EMAIL_DOMAINS = ["123babytalks.com","abckidsny.com"];
// Build `local@domain` completions from what's typed. Once a domain is started
// after "@", narrow to domains that begin with it; cap the list so it stays tidy.
function emailSuggestions(value, domains){
  const v=String(value||"");
  const at=v.indexOf("@");
  const local=(at>=0 ? v.slice(0,at) : v).trim();
  if(!local) return [];
  const typed=(at>=0 ? v.slice(at+1) : "").toLowerCase();
  return domains.filter(d=> !typed || d.startsWith(typed)).slice(0,8).map(d=>`${local}@${d}`);
}

// Read an image file, center-crop to a square, scale to `size`px, return a JPEG
// data URI. Keeps photos tiny (~15-25KB) so they live in a text column with no
// Storage bucket. Rejects non-images.
function fileToAvatarDataUri(file, size=256){
  return new Promise((resolve,reject)=>{
    if(!file){ reject(new Error("No file")); return; }
    if(!/^image\//.test(file.type)){ reject(new Error("That's not an image file.")); return; }
    const url=URL.createObjectURL(file); const img=new Image();
    img.onload=()=>{
      try{
        const s=Math.min(img.width,img.height), sx=(img.width-s)/2, sy=(img.height-s)/2;
        const c=document.createElement("canvas"); c.width=size; c.height=size;
        c.getContext("2d").drawImage(img,sx,sy,s,s,0,0,size,size);
        URL.revokeObjectURL(url);
        resolve(c.toDataURL("image/jpeg",0.82));
      }catch(ex){ URL.revokeObjectURL(url); reject(ex); }
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); reject(new Error("Couldn't read that image.")); };
    img.src=url;
  });
}

// Supabase JS v2 wraps a non-2xx edge-function response as FunctionsHttpError with
// the unhelpful message "Edge Function returned a non-2xx status code"; the real
// upstream error is on err.context (a Response). Module-scope so EVERY component
// (create-login, Wise external-sources panel, onboarding review) can surface the
// actual cause. (Was previously nested in ExternalSourcesPanel, which made the
// create-login handler throw "fnErrorMessage is not defined".)
async function fnErrorMessage(err){
  const fallback = String(err?.message||err||"Edge function error");
  try{
    const ctx = err?.context;
    if(ctx && typeof ctx.text==="function"){
      const body = await ctx.text();
      if(body){
        try{ const j=JSON.parse(body); if(j?.error) return String(j.error); }catch{}
        return body.length>300 ? body.slice(0,300)+"…" : body;
      }
    }
  }catch{/* fall through */}
  return fallback;
}

// Reusable sort + text-filter for a list of row objects.
// `cols` maps a sort key -> accessor fn. Returns helpers for a clickable header
// and the processed (filtered+sorted) array.
function useSortFilter(rows, accessors, searchFields){
  const [sortKey,setSortKey]=useState(null);
  const [dir,setDir]=useState(1);          // 1 asc, -1 desc
  const [q,setQ]=useState("");
  function toggle(key){
    if(sortKey===key) setDir(d=>-d); else { setSortKey(key); setDir(1); }
  }
  let out=rows||[];
  if(q && searchFields){
    const needle=q.toLowerCase();
    out=out.filter(r=>searchFields.some(f=>String(r[f]??"").toLowerCase().includes(needle)));
  }
  if(sortKey && accessors[sortKey]){
    const acc=accessors[sortKey];
    out=[...out].sort((a,b)=>{
      const x=acc(a), y=acc(b);
      if(x==null&&y==null)return 0; if(x==null)return 1; if(y==null)return -1;
      if(typeof x==="number"&&typeof y==="number") return (x-y)*dir;
      return String(x).localeCompare(String(y))*dir;
    });
  }
  // header cell renderer: <Th k="name">Contractor</Th>
  const Th=({k,children,style})=>(
    <th onClick={k?()=>toggle(k):undefined}
        style={{cursor:k?"pointer":"default",userSelect:"none",...style}}>
      {children}{k&&sortKey===k?(dir===1?" ▲":" ▼"):k?" ⇅":""}</th>
  );
  return {rows:out, Th, q, setQ};
}
function FilterBox({q,setQ,placeholder}){
  return <input value={q} onChange={e=>setQ(e.target.value)}
    placeholder={placeholder||"Filter…"}

}

// ---- Supabase connection (anon key only; stored in this browser) ------------
const LS_URL = "sb_url", LS_KEY = "sb_anon";
// Built-in connection. Safe to ship the anon key here because RLS is locked to
// allowlisted Google logins (Phase 2) — the key alone grants nothing. So the
// app auto-connects and goes straight to Google sign-in; no key pasting on any
// browser. localStorage still overrides if set (e.g. to point at a staging DB).
const SUPABASE_URL  = "https://cgsidolrauzsowqlllsz.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNnc2lkb2xyYXV6c293cWxsbHN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MDMwMzEsImV4cCI6MjA5NTM3OTAzMX0.2Z_dDcN0la3c5l2YMYWjeUejhAGZH4ROHXQtYRGWYfY";
function useSupabase() {
  const [client, setClient] = useState(null);
  const [session, setSession] = useState(null);   // Supabase Auth session (Google sign-in)
  const [authReady, setAuthReady] = useState(false);
  const [libTimedOut, setLibTimedOut] = useState(false);  // esm.sh client factory never loaded
  const [creds, setCreds] = useState({
    url: localStorage.getItem(LS_URL) || SUPABASE_URL,
    key: localStorage.getItem(LS_KEY) || SUPABASE_ANON,
  });
  useEffect(() => {
    if (!(creds.url && creds.key)) return;   // no creds (user disconnected) → ConnectScreen
    let cancelled = false, sub = null, tries = 0;
    setLibTimedOut(false);
    // The supabase-js client factory loads as a SEPARATE esm.sh module
    // (window.__createClient). On a slow/cold network that import can resolve
    // AFTER React has mounted — so POLL until it's ready instead of giving up
    // once. The old code checked __createClient a single time and, if it wasn't
    // there yet, left client=null forever → the app fell back to the Connect
    // screen (and stranded the OAuth #access_token in the URL) until a manual
    // reload. This is why it "occasionally" showed Connect, esp. right after the
    // Google redirect (fresh page load races the esm.sh fetch).
    const start = () => {
      if (cancelled) return;
      if (!window.__createClient) {
        if (++tries > 200) { setLibTimedOut(true); return; }   // ~10s, then offer Reload
        setTimeout(start, 50); return;
      }
      const c = window.__createClient(creds.url, creds.key);
      setClient(c);
      // Pick up an existing session, then subscribe to sign-in/out. The session
      // gates the app; its email becomes the audit actor (replaces "admin").
      setAuthReady(false);
      c.auth.getSession().then(({ data }) => {
        if (cancelled) return;
        applySession(data?.session || null);
        setAuthReady(true);
      }).catch(() => { if (!cancelled) setAuthReady(true); });
      sub = c.auth.onAuthStateChange((_e, s) => { if (!cancelled) applySession(s || null); });
    };
    start();
    return () => { cancelled = true; try { sub?.data?.subscription?.unsubscribe(); } catch (_e) {} };
  }, [creds]);
  function applySession(s) {
    setSession(s);
    if (s?.user?.email) localStorage.setItem("sb_actor", s.user.email);
    else localStorage.removeItem("sb_actor");
  }
  const connect = (url, key) => {
    localStorage.setItem(LS_URL, url); localStorage.setItem(LS_KEY, key);
    setCreds({ url, key });
  };
  const disconnect = async () => {
    try { if (client) await client.auth.signOut(); } catch (_e) {}
    localStorage.removeItem(LS_URL); localStorage.removeItem(LS_KEY); localStorage.removeItem("sb_actor");
    setCreds({ url: "", key: "" }); setClient(null); setSession(null);
  };
  const signOut = async () => { try { if (client) await client.auth.signOut(); } catch (_e) {} };
  return { client, session, authReady, libTimedOut, creds, connect, disconnect, signOut };
}

// ---- small data hook --------------------------------------------------------
function useQuery(client, runner, deps, opts) {
  // opts.enabled (default true): when false the query does NOT fetch — used to
  // gate always-mounted tabs so a company switch doesn't refetch every hidden
  // tab. If deps change while disabled, the query refetches once on re-enable.
  const enabled = !opts || opts.enabled !== false;
  const [data, setData] = useState(null);
  const [error, setError] = useState(null);
  const [loading, setLoading] = useState(true);
  const dirtyRef = React.useRef(true);   // true = a fetch is owed (deps changed since last load)
  const reload = useCallback(() => {
    if (!client) return;
    dirtyRef.current = false;
    setLoading(true);
    runner(client).then(({ data, error }) => {
      setData(data); setError(error); setLoading(false);
    });
  }, deps); // eslint-disable-line
  // deps changed → owe a fetch; do it now if enabled, else defer to re-enable.
  useEffect(() => { dirtyRef.current = true; if (enabled) reload(); }, [reload]); // eslint-disable-line
  // became enabled with a pending fetch → run it once.
  useEffect(() => { if (enabled && dirtyRef.current) reload(); }, [enabled]); // eslint-disable-line
  return { data, error, loading, reload };
}

// Fetch ALL rows for a query that may exceed PostgREST's 1000-row cap, returning
// {data,error} like a normal runner. Pass a `count()` head-count query and a
// `range(from,to)` data query (ordered by a stable column). Pages are fetched
// concurrently. Use in a useQuery runner: () => pageAll(countQ, rangeQ).
async function pageAll(countQuery, rangeQuery, pageSize = 1000) {
  const { count, error: ce } = await countQuery();
  if (ce) return { data: null, error: ce };
  const reqs = [];
  for (let from = 0; from < (count || 0); from += pageSize) reqs.push(rangeQuery(from, from + pageSize - 1));
  const results = await Promise.all(reqs);
  const err = (results.find(r => r.error) || {}).error || null;
  if (err) return { data: null, error: err };
  return { data: results.flatMap(r => r.data || []), error: null };
}

// ── Unsaved-changes guard ──────────────────────────────────────────────────
// Any surface with in-progress edits registers via useUnsavedGuard({dirty,label,
// save,discard}). Navigation choke points (tab switch, modal close) and the
// browser unload event consult the registry; if anything is dirty they open ONE
// blocking prompt. "Save" runs the surface's own smart save (commit when the
// entry is complete, keep an autosaved draft when it isn't); "Discard" drops the
// edits. Mirrors the confirmDanger/<DangerConfirm/> promise-host pattern.
const _guards = new Map();                 // id -> {dirty,label,save,discard}
function _setGuard(id, rec){ if(rec && rec.dirty) _guards.set(id, rec); else _guards.delete(id); }
function _dirtyGuards(){ return [..._guards.values()]; }
// Only a surface with a real Save action blocks navigation. A dirty surface with
// nothing savable (e.g. an in-progress signature) just lets you leave — no prompt.
function _savableDirty(){ return [..._guards.values()].filter(g=>g.save); }
function unsavedDirty(){ return _savableDirty().length>0; }
function useUnsavedGuard(rec){
  const id = React.useId();
  React.useEffect(()=>{ _setGuard(id, rec); });            // refresh each render (live closures + dirty)
  React.useEffect(()=>()=>{ _guards.delete(id); }, []);    // drop on unmount
}
let _ucOpen = null;       // setter installed by the mounted <UnsavedChangesModal/>
let _ucResolve = null;    // resolver for the in-flight prompt
// Returns Promise<boolean>: true = caller may proceed (saved/discarded/nothing dirty).
function confirmUnsaved(){
  const gs=_savableDirty();
  if(!gs.length) return Promise.resolve(true);   // nothing savable → just let them go
  if(typeof _ucOpen!=="function") return Promise.resolve(window.confirm("You have unsaved changes. Leave and lose them?"));
  return new Promise(resolve=>{
    if(_ucResolve){ const prev=_ucResolve; _ucResolve=null; prev(false); }   // settle any stale prompt
    _ucResolve=resolve; _ucOpen(gs.map(g=>g.label).filter(Boolean));
  });
}
// Decision handler invoked by the modal buttons. Returns whether nav should proceed.
async function _ucDecide(decision){
  const gs=_savableDirty(); const resolve=_ucResolve; _ucResolve=null;
  let proceed=false;
  try{
    if(decision==="save"){ for(const g of gs){ if(g.save){ const ok=await g.save(); if(ok===false) throw new Error("save_incomplete"); } } proceed=true; }
    else if(decision==="discard"){ for(const g of gs){ if(g.discard){ try{ g.discard(); }catch(_e){} } } proceed=true; }
    else proceed=false;   // stay
  }catch(_e){ proceed=false; try{ notify("Couldn't save — fix the highlighted fields, or choose Discard.",{type:"error"}); }catch(_e2){} }
  if(resolve) resolve(proceed);
  return proceed;
}
// Wrap a close/dismiss handler so it prompts when the surface is dirty.
function guardedClose(onClose){ return async ()=>{ if(await confirmUnsaved()) onClose&&onClose(); }; }
// Host: always mounted, holds the open/closed state, renders the dialog ONLY when
// open so the inner useModalA11y (focus trap + restore + Escape) engages exactly
// while shown — never as a persistent global keytrap.
function UnsavedChangesModal(){
  const [labels,setLabels]=useState(null);   // null = closed; array = open
  useEffect(()=>{ _ucOpen=(ls)=>setLabels(ls||[]);
    return ()=>{ _ucOpen=null; if(_ucResolve){ const r=_ucResolve; _ucResolve=null; r(false); } }; },[]);
  if(labels===null) return null;

}
function UnsavedDialog({ labels, onDone }){
  const [busy,setBusy]=useState(false);
  async function act(d){
    setBusy(true);
    const proceed=await _ucDecide(d);
    setBusy(false);
    if(proceed || d==="stay") onDone();   // keep open if a Save failed, so they can fix/Discard
  }
  const mref=useModalA11y(()=>{ if(!busy) act("stay"); }, {escClose:true});  // focus trap + restore + Escape
  const canSave=_dirtyGuards().some(g=>g.save);
  const where=(labels&&labels.length)?` in ${labels.join(", ")}`:"";
  return (
    <div className="modal-bg" onClick={()=>!busy&&act("stay")}>
      <div className="modal" ref={mref} onClick={e=>e.stopPropagation()} style={{maxWidth:440}}
           role="dialog" aria-modal="true" aria-labelledby="uc-title">
        <h2 id="uc-title" style={{marginTop:0}}>Unsaved changes</h2>
        <p className="sub" style={{whiteSpace:"pre-wrap"}}>You have unsaved changes{where}. {canSave?"Save them before leaving, or discard them?":"Leave and discard them?"}</p>
        <div className="actions">
          <button className="btn ghost" disabled={busy} onClick={()=>act("stay")}>Stay on page</button>
          <button className="btn danger" disabled={busy} onClick={()=>act("discard")}>Discard changes</button>
          {canSave && <button className="btn" disabled={busy} onClick={()=>act("save")}>{busy?"Saving…":"Save"}</button>}
        </div>
      </div>
    </div>
  );
}
