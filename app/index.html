        <div><label style={{fontSize:10,color:"var(--muted)"}}>To</label><br/>
          <input type="date" value={to} onChange={e=>setTo(e.target.value)}/></div>
        <button className="btn ghost sm" onClick={()=>{setFrom(`${yr}-01-01`);setTo("");}}>This year</button>
        <button className="btn ghost sm" onClick={()=>{setFrom(`${yr-1}-01-01`);setTo(`${yr-1}-12-31`);}}>Last year</button>
        <span className="muted" style={{fontSize:12,marginLeft:"auto",alignSelf:"center"}}>
          {rows.length} contractor(s) · total net {money(totNet,"PHP")}</span>
      </div>
      {loading?<div className="empty">Loading…</div>:
       rows.length===0?<div className="empty">No pay statements in this date range.</div>:
      <div className="table-scroll"><table>
        <thead><tr>
          <th>Contractor</th>{consolidated&&<th>Company</th>}
          <th>Periods</th><th>Hours</th><th>Gross ₱</th><th>Misc ₱</th><th>Net ₱</th><th>Paid ₱</th>
        </tr></thead>
        <tbody>
          {rows.map((r,i)=>(
            <tr key={i}>
              <td><b>{r.name}</b></td>{consolidated&&<td className="muted">{r.company}</td>}
              <td>{r.periods}</td>
              <td>{r.hours.toFixed(2)}</td>
              <td>{money(r.gross,"PHP")}</td>
              <td style={r.misc<0?{color:"#b91c1c"}:{}}>{money(r.misc,"PHP")}</td>
              <td><b>{money(r.net,"PHP")}</b></td>
              <td style={r.paid<r.net?{color:"var(--warn)"}:{color:"var(--good)"}}>{money(r.paid,"PHP")}</td>
            </tr>
          ))}
        </tbody>
      </table></div>}
      <p className="muted" style={{fontSize:11,marginTop:6}}>
        CSV export includes the full breakdown (Health, 13th, Lunch, Bonus, Deductions). The on-screen
        table is condensed; Gross + Misc + the other components reconcile to Net.</p>
    </div>
  );
}

// Wise reconciliation admin: one-time backfill of wise_transfer_id across ALL
// paid periods, and the matching summary. Lives in Reports (not Process Payroll)
// because it's a global cleanup operation, not a per-period action. Per the
// app UX guideline, admin/cleanup tools are tucked into a section rather than
// promoted to top-level peers.
function WiseReconciliation({client,companyId,consolidated}){
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState("");
  const [result,setResult]=useState(null);
  const [confirm,setConfirm]=useState(false);   // inline-confirm pattern
  const [emailCheck,setEmailCheck]=useState(null);  // { checked, mismatches, missing_in_db, missing_in_wise }
  const [driftSummary,setDriftSummary]=useState(null);  // { wise:[{worker_id,name,fields}], hubstaff:[...] }
  const [driftBusy,setDriftBusy]=useState(false);
  const [driftMsg,setDriftMsg]=useState("");
  const [driftShow,setDriftShow]=useState(false);

  // Cross-system drift summary: which contractors have ANY name/email mismatch
  // against Wise OR Hubstaff. Lightweight — just shows counts and a click-out
  // to the contractor's profile for the fix.
  async function runDriftScan(){
    if(consolidated||!companyId){ setDriftMsg("Pick a single company first."); return; }
    setDriftBusy(true); setDriftMsg(""); setDriftSummary(null);
    try{
      // 1. Pull workers in this company with at least one external ID
      const {data:wcs,error:wcErr}=await client.from("worker_companies")
        .select("worker_id,hubstaff_user_id,workers(id,first_name,middle_name,last_name,email,wise_recipient_id)")
        .eq("company_id",companyId);
      if(wcErr) throw new Error(wcErr.message);
      const workers=(wcs||[]).map(x=>({
        ...x.workers,
        worker_id:x.worker_id,
        hubstaff_user_id:x.hubstaff_user_id,
      })).filter(w=>w && (w.wise_recipient_id || w.hubstaff_user_id));

      // 2. Bulk-pull Wise recipients (one API call)
      const wiseLinked=workers.filter(w=>w.wise_recipient_id);
      let wiseById=new Map();
      if(wiseLinked.length>0){
        const { data, error }=await client.functions.invoke("wise-payouts",{ body:{ action:"recipients" } });
        if(error) throw new Error(error.message||"Edge function error");
        if(data?.error) throw new Error(data.error);
        for(const rec of (data?.recipients||[])){ if(rec.id) wiseById.set(String(rec.id), rec); }
      }

      // 3. Pull each linked Hubstaff user (one call per user — Hubstaff doesn't
      //    have a bulk-by-id endpoint that's reliable across orgs; this is N
      //    calls but only for linked workers, typically <50)
      const hubLinked=workers.filter(w=>w.hubstaff_user_id);
      const hubById=new Map();
      for(const w of hubLinked){
        try{
          const { data, error }=await client.functions.invoke("hubstaff-sync",{
            body:{ action:"get_user", user_id:w.hubstaff_user_id } });
          if(error || data?.error) continue;
          if(data?.user) hubById.set(String(w.hubstaff_user_id), data.user);
        }catch(_){ /* skip on error */ }
      }

      // 4. Compute drift per worker
      const norm=s=>String(s||"").trim().toLowerCase();
      const wiseDrift=[]; const hubDrift=[];
      for(const w of workers){
        const dbName=fullName(w), dbEmail=w.email||"";
        if(w.wise_recipient_id){
          const rec=wiseById.get(String(w.wise_recipient_id));
          if(rec){
            const fields=[];
            if(norm(rec.name)!==norm(dbName)) fields.push("name");
            if(rec.email && norm(rec.email)!==norm(dbEmail)) fields.push("email");
            if(fields.length) wiseDrift.push({ worker_id:w.id, name:dbName, fields,
              external:{name:rec.name, email:rec.email} });
          }
        }
        if(w.hubstaff_user_id){
          const hub=hubById.get(String(w.hubstaff_user_id));
          if(hub){
            const fields=[];
            if(norm(hub.name)!==norm(dbName)) fields.push("name");
            if(hub.email && norm(hub.email)!==norm(dbEmail)) fields.push("email");
            if(fields.length) hubDrift.push({ worker_id:w.id, name:dbName, fields,
              external:{name:hub.name, email:hub.email} });
          }
        }
      }
      setDriftSummary({
        wise_checked:wiseLinked.length, wise_drift:wiseDrift,
        hub_checked:hubLinked.length, hub_drift:hubDrift,
      });
      setDriftMsg(`Scanned ${workers.length} linked contractor(s): `+
        `Wise drift on ${wiseDrift.length}, Hubstaff drift on ${hubDrift.length}.`);
    }catch(ex){ setDriftMsg("Drift scan failed: "+(ex.message||ex)); }
    finally{ setDriftBusy(false); }
  }

  // Compare workers' emails to whatever email Wise has on the linked recipient.
  // Honest scope: only catches mismatches where Wise actually has an email on
  // the recipient (many PHP bank recipients don't). Surfaces a 'needs review'
  // table; fixing the email is a manual edit on the contractor profile.
  async function runEmailCheck(){
    setBusy(true); setMsg(""); setEmailCheck(null);
    try{
      // Pull Wise recipients (the existing read-only action; now also returns email when present).
      const { data: rData, error: rErr }=await client.functions.invoke("wise-payouts",{ body:{ action:"recipients" } });
      if(rErr) throw new Error(rErr.message||"Edge function error");
      if(rData?.error) throw new Error(rData.error);
      const recipients=Array.isArray(rData.recipients)?rData.recipients:[];
      // Index Wise recipients by numeric id.
      const wiseById=new Map();
      for(const rec of recipients){ if(rec.id) wiseById.set(String(rec.id), rec); }
      // Pull workers with a linked Wise recipient. If company is selected, scope to it;
      // otherwise the cross-check runs across all companies.
      let q=client.from("workers").select("id,first_name,middle_name,last_name,email,wise_recipient_id").not("wise_recipient_id","is",null);
      if(!consolidated && companyId){
        // No direct workers.company_id — scope via worker_companies join.
        const {data:wcs}=await client.from("worker_companies").select("worker_id").eq("company_id",companyId);
        const ids=(wcs||[]).map(x=>x.worker_id);
        if(ids.length) q=q.in("id",ids);
      }
      const {data:workers,error:wErr}=await q;
      if(wErr) throw new Error(wErr.message);
      const norm=s=>String(s||"").trim().toLowerCase();
      const mismatches=[];           // worker has email, Wise has different email
      const missing_in_db=[];        // Wise has an email, worker has no email
      const missing_in_wise=[];      // worker has an email, Wise has no email (only flagged for context)
      let checked=0;
      for(const w of (workers||[])){
        const rec=wiseById.get(String(w.wise_recipient_id));
        if(!rec) continue;
        checked++;
        const wEmail=norm(w.email), rEmail=norm(rec.email);
        if(rEmail && !wEmail){
          missing_in_db.push({ worker_id:w.id, name:fullName(w), wise_email:rec.email, wise_name:rec.name });
        } else if(wEmail && !rEmail){
          missing_in_wise.push({ worker_id:w.id, name:fullName(w), db_email:w.email, wise_name:rec.name });
        } else if(rEmail && wEmail && rEmail!==wEmail){
          mismatches.push({ worker_id:w.id, name:fullName(w), db_email:w.email, wise_email:rec.email, wise_name:rec.name });
        }
      }
      setEmailCheck({ checked, mismatches, missing_in_db, missing_in_wise,
                      recipients_total:recipients.length, workers_linked:(workers||[]).length });
      setMsg(`Compared ${checked} linked worker(s) against Wise: `+
             `${mismatches.length} mismatch(es), ${missing_in_db.length} missing in DB, `+
             `${missing_in_wise.length} missing on Wise.`);
    }catch(ex){ setMsg("Email check failed: "+(ex.message||ex)); }
    finally{ setBusy(false); }
  }

  async function runBackfill(){
    setBusy(true); setMsg(""); setResult(null); setConfirm(false);
    try{
      // No pay_period_id — scans all unmatched Wise payments.
      const { data, error }=await client.functions.invoke("wise-payouts",{
        body:{ action:"match", window_days:14 } });
      if(error) throw new Error(error.message||"Edge function error");
      if(data?.error) throw new Error(data.error);
      setResult(data);
      setMsg(`Scanned ${data.scanned} unmatched payment(s) against ${data.wise_transfers_pulled||0} Wise transfer(s): `+
             `${data.matched} matched cleanly, ${data.variances} matched with variance, `+
             `${data.ambiguous} ambiguous, ${data.unmatched} unmatched.`);
      logEvent(client,{ company_id:companyId, action:"wise_recipient_sync",
        entity:"Wise reconciliation",
        detail:{ kind:"global_backfill", scanned:data.scanned, matched:data.matched,
                 variances:data.variances, ambiguous:data.ambiguous, unmatched:data.unmatched } });
    }catch(ex){ setMsg("Backfill failed: "+(ex.message||ex)); }
    finally{ setBusy(false); }
  }

  return (
    <div className="card" style={{borderColor:"#bcd"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
        <div>
          <h2 style={{margin:"0 0 4px"}}>Wise reconciliation <span className="pill" style={{background:"#eef2ff",color:"#3730a3",fontSize:10}}>admin</span></h2>
          <p className="sub">One-time cleanup: scans every paid Wise payment that has no
            <code>wise_transfer_id</code> stored, pulls Wise's transfer history, and links
            each DB row to its real Wise transfer by recipient + amount + date.
            Read-mostly: writes only the transfer ID. Never changes amounts.
            Variances and ambiguous matches are surfaced for review.</p>
        </div>
        {!confirm
          ? <button className="btn" disabled={busy} onClick={()=>setConfirm(true)}>Backfill all paid periods</button>
          : <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <span className="muted" style={{fontSize:13}}>Run across all paid periods?</span>
              <button className="btn" disabled={busy} onClick={runBackfill}>{busy?"Scanning…":"Confirm"}</button>
              <button className="btn ghost" disabled={busy} onClick={()=>setConfirm(false)}>Cancel</button>
            </div>}
      </div>
      {msg && <div className="muted" style={{fontSize:13,marginTop:10}}>{msg}</div>}
      {result && (
        <div style={{marginTop:12}}>
          <div className="row" style={{gap:16,flexWrap:"wrap",fontSize:13}}>
            <span>Scanned <b>{result.scanned}</b></span>
            <span className="muted">across {result.wise_transfers_pulled||0} Wise transfer(s)</span>
            <span><b>{result.matched}</b> matched cleanly</span>
            <span className={result.variances?"pill warn":"muted"}>{result.variances} with variance</span>
            <span className={result.ambiguous?"pill warn":"muted"}>{result.ambiguous} ambiguous</span>
            <span className={result.unmatched?"pill warn":"muted"}>{result.unmatched} unmatched</span>
          </div>
          {result.window && (
            <div className="muted" style={{fontSize:12,marginTop:6}}>
              Window: {String(result.window.from).slice(0,10)} → {String(result.window.to).slice(0,10)} (±{result.window.days} days)
            </div>
          )}
          {result.variances>0 && (
            <p className="muted" style={{fontSize:12,marginTop:8}}>
              See the <b>Process and Pay</b> tab for any period to view the per-row variance
              details. Variances are not auto-fixed — Wise's amount is shown next to the DB
              amount, and you decide whether to update the DB.
            </p>
          )}
        </div>
      )}

      {/* Email cross-check — separate action in the same admin card. */}
      <div style={{marginTop:16,paddingTop:12,borderTop:"1px solid var(--line)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
          <div>
            <h3 style={{margin:"0 0 4px",fontSize:15}}>Email cross-check</h3>
            <p className="sub" style={{fontSize:12}}>Compares the email on each contractor against the email Wise has
              on their linked recipient. Surfaces mismatches for manual fix. <b>Partial signal:</b> only catches
              mismatches where Wise actually has an email on the recipient (many PHP bank recipients don't).</p>
          </div>
          <button className="btn ghost" disabled={busy} onClick={runEmailCheck}>
            {busy?"Checking…":"Check emails"}
          </button>
        </div>
        {emailCheck && (
          <div style={{marginTop:10}}>
            <div className="row" style={{gap:16,flexWrap:"wrap",fontSize:13}}>
              <span>Compared <b>{emailCheck.checked}</b> linked worker(s)</span>
              <span className="muted">of {emailCheck.workers_linked} with a Wise recipient stored</span>
              <span className={emailCheck.mismatches.length?"pill warn":"muted"}>{emailCheck.mismatches.length} mismatch(es)</span>
              <span className={emailCheck.missing_in_db.length?"pill warn":"muted"}>{emailCheck.missing_in_db.length} missing in DB</span>
              <span className="muted">{emailCheck.missing_in_wise.length} missing on Wise</span>
            </div>
            {emailCheck.mismatches.length>0 && (
              <div style={{marginTop:8}}>
                <div style={{fontWeight:600,fontSize:13,marginBottom:4}}>Mismatches (DB ≠ Wise)</div>
                <div className="table-scroll"><table>
                  <thead><tr><th>Worker</th><th>DB email</th><th>Wise email</th><th>Wise recipient name</th></tr></thead>
                  <tbody>
                    {emailCheck.mismatches.map((m,i)=>(
                      <tr key={i}>
                        <td><b>{m.name}</b></td>
                        <td style={{color:"#b91c1c"}}>{m.db_email}</td>
                        <td style={{color:"var(--good)"}}>{m.wise_email}</td>
                        <td className="muted">{m.wise_name||"—"}</td>
                      </tr>
                    ))}
                  </tbody>
                </table></div>
                <p className="muted" style={{fontSize:12,marginTop:4}}>
                  Fix mismatches manually on the contractor's profile (Contractors → Edit).
                  The Wise email is shown for reference but you decide which is right.
                </p>
              </div>
            )}
            {emailCheck.missing_in_db.length>0 && (
              <div style={{marginTop:10}}>
                <div style={{fontWeight:600,fontSize:13,marginBottom:4}}>Missing in DB (Wise has, contractor doesn't)</div>
                <ul style={{margin:0,paddingLeft:18,fontSize:13}}>
                  {emailCheck.missing_in_db.slice(0,15).map((m,i)=>(
                    <li key={i}><b>{m.name}</b> <span className="muted">· Wise has {m.wise_email}</span></li>
                  ))}
                  {emailCheck.missing_in_db.length>15 && <li className="muted">…and {emailCheck.missing_in_db.length-15} more</li>}
                </ul>
              </div>
            )}
          </div>
        )}
      </div>

      {/* --- Cross-system drift summary ---
          Counts of contractors who differ between DB and Wise OR DB and Hubstaff
          on name/email. Click 'Show list' to see who; the actual fix happens in
          each contractor's profile (the External sources section). */}
      <div style={{marginTop:16,paddingTop:12,borderTop:"1px solid var(--line)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
          <div>
            <h3 style={{margin:"0 0 4px",fontSize:15}}>Cross-system drift (Wise + Hubstaff)</h3>
            <p className="sub" style={{fontSize:12}}>Scans every contractor with a Wise recipient or
              Hubstaff user and lists where the external system disagrees with the DB on name or email.
              Click a name to open the profile and fix it there.</p>
          </div>
          <button className="btn ghost" disabled={driftBusy||consolidated} onClick={runDriftScan}>
            {driftBusy?"Scanning…":"Scan all"}</button>
        </div>
        {consolidated && <Banner tone="info" msg="Pick a single company first." style={{marginTop:8}}/>}
        {driftMsg && <div className="muted" style={{fontSize:13,marginTop:8}}>{driftMsg}</div>}
        {driftSummary && (
          <div style={{marginTop:10}}>
            <div className="row" style={{gap:16,flexWrap:"wrap",fontSize:13}}>
              <span>Wise checked: <b>{driftSummary.wise_checked}</b></span>
              <span className={driftSummary.wise_drift.length?"pill warn":"muted"}>
                {driftSummary.wise_drift.length} Wise drift
              </span>
              <span>Hubstaff checked: <b>{driftSummary.hub_checked}</b></span>
              <span className={driftSummary.hub_drift.length?"pill warn":"muted"}>
                {driftSummary.hub_drift.length} Hubstaff drift
              </span>
              {(driftSummary.wise_drift.length+driftSummary.hub_drift.length)>0 && (
                <button className="btn ghost sm" onClick={()=>setDriftShow(s=>!s)}>
                  {driftShow?"Hide list":"Show list"}</button>
              )}
            </div>
            {driftShow && (
              <div style={{marginTop:10,display:"flex",gap:24,flexWrap:"wrap"}}>
                {driftSummary.wise_drift.length>0 && (
                  <div style={{flex:"1 1 280px"}}>
                    <div style={{fontWeight:600,fontSize:13,marginBottom:4}}>Wise drift</div>
                    <ul style={{margin:0,paddingLeft:18,fontSize:13}}>
                      {driftSummary.wise_drift.slice(0,20).map((d,i)=>(
                        <li key={i}><b>{d.name}</b> <span className="muted">· differs on {d.fields.join(", ")}</span></li>
                      ))}
                      {driftSummary.wise_drift.length>20 && <li className="muted">…and {driftSummary.wise_drift.length-20} more</li>}
                    </ul>
                  </div>
                )}
                {driftSummary.hub_drift.length>0 && (
                  <div style={{flex:"1 1 280px"}}>
                    <div style={{fontWeight:600,fontSize:13,marginBottom:4}}>Hubstaff drift</div>
                    <ul style={{margin:0,paddingLeft:18,fontSize:13}}>
                      {driftSummary.hub_drift.slice(0,20).map((d,i)=>(
                        <li key={i}><b>{d.name}</b> <span className="muted">· differs on {d.fields.join(", ")}</span></li>
                      ))}
                      {driftSummary.hub_drift.length>20 && <li className="muted">…and {driftSummary.hub_drift.length-20} more</li>}
                    </ul>
                  </div>
                )}
              </div>
            )}
            <p className="muted" style={{fontSize:12,marginTop:8}}>
              To fix: open the contractor on the <b>Contractors</b> tab. The External sources section
              shows DB vs Wise/Hubstaff side by side. For <b>Wise</b> drift, click "Use Wise's …" to
              pull Wise's value into the DB. For <b>Hubstaff</b> drift, fix it in Hubstaff's web UI —
              Hubstaff's public API doesn't accept user-profile edits.
            </p>
          </div>
        )}
      </div>
    </div>
  );
}

// contractor utilization = worked hours vs a nominal full-time month from approved time
function UtilizationReport({client,companyId,consolidated}){
  const {data,loading}=useQuery(client,c=>{
    let q=c.from("time_entries").select("worker_id,source_name,tracked_seconds,approval,company_id")
      .eq("approval","approved");
    if(!consolidated&&companyId)q=q.eq("company_id",companyId);
    return q;
  },[client,companyId,consolidated]);
  const te=data||[];
  const byWorker={};
  te.forEach(t=>{const k=t.source_name; (byWorker[k]=byWorker[k]||{sec:0,days:0}); byWorker[k].sec+=t.tracked_seconds; byWorker[k].days++;});
  const rows=Object.entries(byWorker).map(([name,v])=>({name,hours:+(v.sec/3600).toFixed(1),days:v.days}))
    .sort((a,b)=>b.hours-a.hours);
  return (
    <div className="card">
      <h2>Contractor utilization</h2>
      <p className="sub">Total approved hours per contractor across all imported time (in scope).</p>
      {loading?<div className="empty">Loading…</div>:
       rows.length===0?<div className="empty">No approved time yet.</div>:
      <table>
        <thead><tr><th>Contractor</th><th>Approved hours</th><th>Days tracked</th><th>Avg h/day</th></tr></thead>
        <tbody>
          {rows.map((r,i)=>(
            <tr key={i}><td><b>{r.name}</b></td><td>{r.hours}</td><td>{r.days}</td>
              <td>{r.days?(r.hours/r.days).toFixed(1):"—"}</td></tr>
          ))}
        </tbody>
      </table>}
    </div>
  );
}

// ============================ WISE PAYOUTS ===================================
// Drafts Wise transfers for a LOCKED period and writes back transfer id + FX.
// It NEVER funds (moves money) — you fund the batch in Wise directly.
function WisePayouts({client,companyId,consolidated,presetPeriodId,confirmBillingDirty,openContractor,apiPayoutsEnabled}){
  const gate = (label)=> typeof confirmBillingDirty==="function" ? confirmBillingDirty(label) : true;
  const [periods,setPeriods]=useState([]);
  const [periodId,setPeriodId]=useState("");
  const [rows,setRows]=useState(null);     // editable per-contractor rows
  const [busy,setBusy]=useState(false);
  const [armed,setArmed]=useState(false);
  const [msg,setMsg]=useState("");
  const [batchId,setBatchId]=useState(null);
  // --- Pull recipients from Wise + match to contractors (ID-first convention) ---
  const [recSync,setRecSync]=useState(null);  // {preview:[{recipient_id,name,currency,account,worker_id,worker_name,matched,already}], msg}
  const [recBusy,setRecBusy]=useState(false);

  // Fetch the saved recipient list from Wise (read-only) and match each to an
  // existing contractor. MATCH ORDER (per the standing convention):
  //   1) stable Wise recipient id already stored on a worker (immune to renames),
  //   2) strict normalized name, 3) loose first+last name.
  async function pullWiseRecipients(){
    if(consolidated||!companyId){setMsg("Pick a single company first.");return;}
    setRecBusy(true);setMsg("");
    try{
      const {data,error}=await client.functions.invoke("wise-payouts",{body:{action:"recipients"}});
      if(error)throw new Error(error.message||"Edge function error");
      if(data&&data.error)throw new Error(data.error);
      const recipients=data.recipients||[];
      // load this company's workers + their stored wise ids/names for matching
      const {data:wcs}=await client.from("worker_companies")
        .select("worker_id,workers(first_name,middle_name,last_name,wise_recipient_id,wise_recipients)")
        .eq("company_id",companyId);
      const byWiseId={}, byStrict={}, byLoose={};
      (wcs||[]).forEach(l=>{
        const w=l.workers; if(!w)return;
        const val={worker_id:l.worker_id, worker_name:fullName(w)};
        const ids=[w.wise_recipient_id, ...(Array.isArray(w.wise_recipients)?w.wise_recipients.map(x=>x.id):[])].filter(x=>x!=null);
        ids.forEach(id=>{ if(!byWiseId[id]) byWiseId[id]=val; });
        const sk=nameKey(fullName(w)), lk=looseKey(fullName(w));
        if(sk&&!byStrict[sk])byStrict[sk]=val;
        if(lk&&!byLoose[lk])byLoose[lk]=val;
      });
      const preview=recipients.map(rec=>{
        const hit=byWiseId[rec.id] || byStrict[nameKey(rec.name)] || byLoose[looseKey(rec.name)] || null;
        const already=!!byWiseId[rec.id];   // this recipient id is already stored on someone
        return {recipient_id:rec.id, name:rec.name, currency:rec.currency, account:rec.account,
                worker_id:hit?hit.worker_id:null, worker_name:hit?hit.worker_name:null,
                matched:!!hit, already};
      });
      const matched=preview.filter(p=>p.matched).length;
      setRecSync({preview, profile_id:data.profile_id});
      setMsg(`Pulled ${recipients.length} Wise recipient(s); matched ${matched} to contractors. Review below, then save the IDs.`);
    }catch(ex){
      setMsg("Wise recipient pull failed: "+ex.message+
        " — check the wise-payouts function is deployed and WISE_API_TOKEN is set.");
    }finally{ setRecBusy(false); }
  }

  // Store the matched Wise recipient id onto each matched worker (only where it
  // isn't already their stored id), and add it to their wise_recipients list.
  async function saveMatchedRecipients(){
    if(!recSync)return;
    setRecBusy(true);setMsg("");
    try{
      const toSave=recSync.preview.filter(p=>p.matched && !p.already);
      let saved=0;
      for(const p of toSave){
        // read current list so we can append without clobbering
        const {data:w}=await client.from("workers")
          .select("wise_recipients,wise_recipient_id").eq("id",p.worker_id).single();
        const list=Array.isArray(w?.wise_recipients)?w.wise_recipients:[];
        if(!list.some(x=>x.id===p.recipient_id)) list.push({id:p.recipient_id,label:p.name||`Recipient ${p.recipient_id}`});
        const nextDef=w?.wise_recipient_id||p.recipient_id;
        const {error}=await client.from("workers")
          .update({wise_recipients:list, wise_recipient_id:nextDef}).eq("id",p.worker_id);
        if(!error)saved++;
      }
      logEvent(client,{company_id:companyId,action:"wise_recipient_sync",
        entity:"Wise recipients",detail:{pulled:recSync.preview.length,saved}});
      setMsg(`Saved Wise recipient id for ${saved} contractor(s). Unmatched recipients were left alone.`);
      setRecSync(null);
    }catch(ex){ setMsg("Couldn't save recipient ids: "+ex.message); }
    finally{ setRecBusy(false); }
  }

  useEffect(()=>{
    if(!client||!companyId){setPeriods([]);return;}
    client.from("pay_periods").select("id,period_start,period_end,state")
      .eq("company_id",companyId).in("state",["locked","paid"])
      .order("period_start",{ascending:false})
      .then(({data})=>setPeriods(data||[]));
  },[client,companyId]);

  // when embedded in Process Payroll with a chosen period, auto-load it
  useEffect(()=>{ if(presetPeriodId && presetPeriodId!==periodId) loadBatch(presetPeriodId);
    /* eslint-disable-next-line */ },[presetPeriodId]);

  async function loadBatch(pid){
    setPeriodId(pid);setRows(null);setMsg("");setArmed(false);setBatchId(null);
    if(!pid)return;
    const {data,error}=await client.from("payments")
      .select("id,worker_id,net_php,payout_amount,wise_transfer_id,fx_rate,status,payout_method,funded_at,funded_by,fund_error,"+
              "workers(first_name,middle_name,last_name,wise_recipient_id,wise_recipient_uuid,wise_recipients,payout_method)")
      .eq("pay_period_id",pid);
    if(error){setMsg(error.message);return;}
    setRows((data||[])
      // Filter on the PAYMENT row's snapshot of payout_method (frozen at lock
      // time), not the worker's current value. If a contractor's profile method
      // changes after lock, the locked statement is still the source of truth —
      // this is what the Pay list does and the API draft must match it,
      // otherwise contractors silently disappear from one view but not the other.
      .filter(p=>(p.payout_method||p.workers?.payout_method)==="wise")
      .map(p=>{
        const list=Array.isArray(p.workers?.wise_recipients)?p.workers.wise_recipients:[];
        const def=p.workers?.wise_recipient_id||list[0]?.id||null;  // last-used default
        return {
          payment_id:p.id,                                // needed by the fund action
          worker_id:p.worker_id,
          name:fullName(p.workers),
          amount:Number(p.net_php||p.payout_amount||0),  // editable
          recipients:list,
          recipient_id:def,                               // editable; defaults to last-used
          recipient_uuid:p.workers?.wise_recipient_uuid||"",  // Wisetag/contact rows have only a UUID
          // include: by default true for unfunded drafts and untouched rows.
          // We don't auto-select rows that are already funded — they're done.
          include:!!def && !p.wise_transfer_id,
          transfer_id:p.wise_transfer_id, status:p.status,
          funded_at:p.funded_at||null,
          fund_error:p.fund_error||null,
        };
      })
      // only contractors who actually have a Wise recipient on file
      .filter(r=>r.recipient_id));
  }

  function setRow(wid,patch){ setRows(prev=>prev.map(r=>r.worker_id===wid?{...r,...patch}:r)); }
  function setAll(include){ setRows(prev=>prev.map(r=>r.transfer_id?r:{...r,include})); }

  const selected=(rows||[]).filter(r=>r.include && r.recipient_id && r.amount>0 && !r.transfer_id);
  const total=selected.reduce((s,r)=>s+r.amount,0);

  // Drafted-but-not-yet-funded rows. Surfaced when companies.api_payouts_enabled
  // is true so the user can fund them via the API path (real money). Excludes
  // rows with a Wisetag-only / missing-numeric-id since the existing draft
  // path rejects those (manual CSV handles them instead).
  const drafted=(rows||[]).filter(r=>r.transfer_id && !r.funded_at);
  const draftedTotal=drafted.reduce((s,r)=>s+r.amount,0);

  // Per-row fund: hits the edge function for one transfer, updates the local
  // row state with the outcome, surfaces error inline. Returns {ok, error}.
  const [fundBusyId,setFundBusyId]=useState(null);  // payment_id or "__bulk__" while in flight
  async function fundOne(row, actor){
    if(!row?.transfer_id){ return { ok:false, error:"no transfer_id" }; }
    if(row.funded_at){ return { ok:true, already_funded:true }; }
    setFundBusyId(row.payment_id || row.worker_id);
    try{
      const { data, error }=await client.functions.invoke("wise-payouts",{
        body:{
          action:"fund",
          transfer_id: row.transfer_id,
          payment_id:  row.payment_id || null,
          actor:       actor || null,
        }});
      if(error) throw new Error(error.message||"Edge function error");
      if(data && data.ok===false){
        const errMsg=data.error||"Wise fund failed";
        setRow(row.worker_id, { fund_error: errMsg });
        logEvent(client,{ company_id:companyId, action:"api_payout",
          entity:`${row.name} · transfer ${row.transfer_id}`,
          detail:{ outcome:"failed", amount_php:row.amount, transfer_id:String(row.transfer_id),
                   error:errMsg, http_status:data.http_status||null } });
        return { ok:false, error:errMsg };
      }
      // success path
      const fundedAt=data?.funded_at||new Date().toISOString();
      setRow(row.worker_id, { funded_at:fundedAt, fund_error:null });
      logEvent(client,{ company_id:companyId, action:"api_payout",
        entity:`${row.name} · transfer ${row.transfer_id}`,
        detail:{ outcome:data?.already_funded?"already_funded":"funded",
                 amount_php:row.amount, transfer_id:String(row.transfer_id),
                 wise_status:data?.wise_status||null, funded_at:fundedAt } });
      return { ok:true, funded_at:fundedAt };
    }catch(ex){
      const errMsg=String(ex.message||ex);
      setRow(row.worker_id, { fund_error: errMsg });
      logEvent(client,{ company_id:companyId, action:"api_payout",
        entity:`${row.name} · transfer ${row.transfer_id}`,
        detail:{ outcome:"failed", amount_php:row.amount, transfer_id:String(row.transfer_id),
                 error:errMsg } });
      return { ok:false, error:errMsg };
    }finally{
      setFundBusyId(null);
    }
  }

  // Bulk fund all drafted-but-unfunded rows. Per-row outcomes; doesn't stop
  // on first failure (other rows may still succeed). Requires a typed-amount
  // confirmation since this moves real money.
  async function fundDrafted(){
    if(!drafted.length){ setMsg("Nothing drafted to fund."); return; }
    if(!gate("Fund drafted Wise transfers (real money)")) return;
    const totalStr=money(draftedTotal,"PHP");
    const sample=drafted.slice(0,8).map(r=>`• ${r.name} — ${money(r.amount,"PHP")}`).join("\n");
    const more=drafted.length>8?`\n…and ${drafted.length-8} more`:"";
    const ok=window.confirm(
      `⚠ REAL MONEY: about to fund ${drafted.length} drafted Wise transfer(s):\n\n`+
      sample+more+
      `\n\nTotal: ${totalStr}\n\nThis calls Wise's funding endpoint and moves money out of your business Wise balance. The action is per-row idempotent (refuses to refund a row already funded) and each outcome is logged to the audit log.\n\nProceed?`
    );
    if(!ok) return;
    setFundBusyId("__bulk__"); setBusy(true); setMsg("");
    let funded=0, alreadyFunded=0, failed=0;
    const actor=null;  // future: pull from auth.user.email if available
    for(const r of drafted){
      const res=await fundOne(r, actor);
      if(res.ok){ if(res.already_funded) alreadyFunded++; else funded++; }
      else failed++;
    }
    setFundBusyId(null); setBusy(false);
    setMsg(`Funded ${funded} transfer(s)`+
      (alreadyFunded?`; ${alreadyFunded} already funded`:"")+
      (failed?`; ${failed} failed — see per-row error pills`:"")+`. Total intended: ${totalStr}.`);
    // refresh from DB to pull canonical funded_at / fund_error values
    loadBatch(periodId);
  }

  async function createBatch(){
    if(!gate("Create Wise batch (API draft)")) return;
    setArmed(false);setBusy(true);setMsg("");
    try{
      const {data,error}=await client.functions.invoke("wise-payouts",{
        body:{action:"batch",
          name:`Payroll ${periods.find(p=>p.id===periodId)?.period_end||""}`,
          items:selected.map(r=>({worker_id:r.worker_id,recipient_id:r.recipient_id,amount_php:r.amount}))}});
      if(error)throw new Error(error.message||"Edge function error");
      if(data&&data.error)throw new Error(data.error);
      let ok=0,fail=0;
      for(const res of (data.results||[])){
        if(res.transfer_id){
          await client.from("payments").update({
            wise_transfer_id:String(res.transfer_id), fx_rate:res.fx_rate, status:"queued"})
            .eq("pay_period_id",periodId).eq("worker_id",res.worker_id);
          // remember last-used recipient on the worker
          const row=selected.find(r=>r.worker_id===res.worker_id);
          if(row) await client.from("workers").update({wise_recipient_id:row.recipient_id}).eq("id",res.worker_id);
          ok++;
        } else fail++;
      }
      setBatchId(data.batch_group_id);
      setMsg(`Created Wise batch with ${ok} transfer(s)${fail?`, ${fail} failed`:""}. `+
        `Batch group id: ${data.batch_group_id}. NO money has moved — open Wise to review, complete, and FUND this batch.`);
      loadBatch(periodId);
    }catch(ex){
      setMsg("Wise batch failed: "+ex.message+
        " — check the wise-payouts function is deployed and WISE_API_TOKEN is set.");
    }finally{ setBusy(false); }
  }

  return (
    <div className="card" style={{borderColor:"#cdb"}}>
      <h2>Wise payouts <span className="pill" style={{background:"#fef3c7",color:"var(--warn)",fontSize:10}}>drafts only · no money moves</span></h2>
      <p className="sub">For a locked period: review each Wise contractor, adjust recipient or amount,
        include/exclude as needed, then create them as <b>one Wise batch</b>. This records the locked FX
        and transfer IDs but <b>does not send money</b> — you complete and fund the batch in Wise yourself.</p>
      {consolidated && <div className="banner">Pick a single company.</div>}

      {/* --- Pull recipients from Wise + match to contractors (ID-first) --- */}
      {!consolidated && companyId &&
      <div className="card" style={{background:"var(--accent-soft)",borderColor:"#bcd",marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
          <div>
            <h3 style={{margin:0}}>Pull recipients from Wise</h3>
            <p className="sub" style={{margin:"2px 0 0"}}>Read-only. Lists your saved Wise recipients and matches each to a
              contractor (by stored Wise ID first, then name). No money moves.</p>
          </div>
          <button className="btn" disabled={recBusy} onClick={pullWiseRecipients}>
            {recBusy?"Pulling…":"Pull from Wise"}</button>
        </div>
        {recSync && (()=>{ const toSave=recSync.preview.filter(p=>p.matched&&!p.already);
          return (
          <div style={{marginTop:12}}>
            <div className="table-scroll"><table>
              <thead><tr><th>Wise recipient</th><th>Currency</th><th>Account</th><th>Matched contractor</th><th>Status</th></tr></thead>
              <tbody>
                {recSync.preview.map(p=>(
                  <tr key={p.recipient_id}>
                    <td><b>{p.name||"(no name)"}</b> <span className="muted">#{p.recipient_id}</span></td>
                    <td>{p.currency||"—"}</td>
                    <td className="muted">{p.account||"—"}</td>
                    <td>{p.matched?p.worker_name:<span className="muted">— no match —</span>}</td>
                    <td>{p.already
                      ? <span className="pill active">already linked</span>
                      : p.matched
                        ? <span className="pill info">will link</span>
                        : <span className="pill warn">unmatched</span>}</td>
                  </tr>
                ))}
              </tbody>
            </table></div>
            <div style={{marginTop:10,display:"flex",gap:8,alignItems:"center"}}>
              <button className="btn" disabled={recBusy||!toSave.length} onClick={saveMatchedRecipients}>
                {toSave.length?`Save ${toSave.length} matched ID(s)`:"Nothing new to save"}</button>
              <button className="btn ghost" disabled={recBusy} onClick={()=>setRecSync(null)}>Dismiss</button>
              <span className="muted" style={{fontSize:12}}>Unmatched recipients are left untouched — match those by setting the Wise recipient on the contractor's profile.</span>
            </div>
          </div>);})()}
      </div>}

      {!presetPeriodId &&
      <div className="row" style={{alignItems:"flex-end"}}>
        <div className="field"><label>Locked pay period</label>
          <select value={periodId} onChange={e=>loadBatch(e.target.value)}>
            <option value="">Select…</option>
            {periods.map(p=><option key={p.id} value={p.id}>{p.period_start} → {p.period_end} ({p.state})</option>)}
          </select></div>
      </div>}

      {rows && (rows.length===0
        ? <div className="empty">No Wise contractors with a saved recipient in this period.
            Set a Wise recipient on a contractor's profile to include them here.</div>
        : (()=>{ const selectable=rows.filter(r=>!r.transfer_id);
                 const allOn=selectable.length>0 && selectable.every(r=>r.include);
          return <div>
          <p className="sub" style={{marginTop:8}}>{selected.length} selected · total to batch <b>{money(total,"PHP")}</b></p>
          <div className="table-scroll"><table>
            <thead><tr>
              <th><label style={{display:"inline-flex",gap:4,alignItems:"center",fontWeight:600}}>
                <input type="checkbox" checked={allOn}
                  onChange={e=>setAll(e.target.checked)} disabled={!selectable.length}/> All</label></th>
              <th>Contractor</th><th>Amount ₱</th><th>Wise recipient</th><th>Status</th></tr></thead>
            <tbody>
              {rows.map(r=>(
                <tr key={r.worker_id} style={r.transfer_id?{opacity:.6}:{}}>
                  <td><input type="checkbox" checked={r.include&&!r.transfer_id} disabled={r.transfer_id}
                    onChange={e=>setRow(r.worker_id,{include:e.target.checked})}/></td>
                  <td><b>{r.name}</b></td>
                  <td><input type="number" step="0.01" value={r.amount} disabled={r.transfer_id}
                    onChange={e=>setRow(r.worker_id,{amount:parseFloat(e.target.value)||0})}
                    style={{width:100,padding:"3px 6px",fontSize:13}}/></td>
                  <td>
                    {r.transfer_id
                      ? <span className="muted">#{r.recipient_id}</span>
                      : r.recipients.length
                        ? <select value={r.recipient_id||""} onChange={e=>setRow(r.worker_id,{recipient_id:Number(e.target.value)})}
                            style={{padding:"3px 6px",fontSize:13}}>
                            {r.recipients.map(rec=><option key={rec.id} value={rec.id}>{rec.label} (#{rec.id})</option>)}
                          </select>
                        : r.recipient_uuid
                          ? <span className="tip-wrap muted" tabIndex={0} style={{fontStyle:"italic",cursor:"help"}}>
                              Wisetag — use Manual CSV
                              <span className="tip-body">Paid via Wise Tag (contact recipient). The Wise API draft path requires a bank-account recipient — include this contractor in the Manual Wise batch CSV instead (uses the stored UUID).</span>
                            </span>
                          : (openContractor
                              ? <button type="button"
                                  onClick={()=>openContractor(r.worker_id)}
                                  title="Open this contractor's profile to add a Wise recipient"
                                  style={{background:"none",border:"none",padding:0,margin:0,
                                    color:"var(--warn)",textDecoration:"underline",cursor:"pointer",font:"inherit"}}>
                                  add recipient on profile
                                </button>
                              : <span style={{color:"var(--warn)"}}>add recipient on profile</span>)}
                  </td>
                  <td style={{whiteSpace:"nowrap"}}>
                    {r.funded_at
                      ? <span className="pill" style={{background:"#dcfce7",color:"#166534"}}
                          title={`Funded ${new Date(r.funded_at).toLocaleString()} — money out of your Wise balance.`}>
                          ✓ funded
                        </span>
                      : r.transfer_id
                        ? <span style={{display:"inline-flex",gap:4,alignItems:"center",flexWrap:"wrap"}}>
                            <span className="pill active">drafted</span>
                            {apiPayoutsEnabled && (
                              fundBusyId===(r.payment_id||r.worker_id)
                                ? <span className="muted" style={{fontSize:11}}>funding…</span>
                                : <button className="btn ghost sm" disabled={!!fundBusyId}
                                    title={`Fund this single transfer (${money(r.amount,"PHP")}) via Wise API. Real money will move.`}
                                    onClick={async ()=>{
                                      if(!gate("Fund this Wise transfer (real money)")) return;
                                      if(!window.confirm(`Fund ${r.name} for ${money(r.amount,"PHP")} via Wise API?\n\nThis moves real money out of your Wise balance.`)) return;
                                      await fundOne(r, null);
                                    }}>
                                    Fund
                                  </button>
                            )}
                            {r.fund_error && (
                              <span className="tip-wrap" tabIndex={0}
                                style={{fontSize:10,verticalAlign:"middle",cursor:"help"}}>
                                <span className="pill" style={{background:"#fef2f2",color:"#b91c1c"}}>
                                  fund failed
                                </span>
                                <span className="tip-body">{`Last Wise fund attempt failed:\n${r.fund_error}\n\nClick Fund to retry.`}</span>
                              </span>
                            )}
                          </span>
                        : <span className="pill" style={{background:"#f3f4f6",color:"var(--muted)"}}>{r.status||"ready"}</span>}
                  </td>
                </tr>
              ))}
            </tbody>
          </table></div>
          <div style={{marginTop:12,display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
            {selected.length===0
              ? <span className="muted">Nothing selected to batch.</span>
              : armed
                ? <span style={{display:"inline-flex",gap:8,alignItems:"center"}}>
                    <span style={{fontSize:13}}>Create a Wise batch of {selected.length} transfer(s), {money(total,"PHP")}? (no money moves)</span>
                    <button className="btn" disabled={busy} onClick={createBatch}>Confirm batch</button>
                    <button className="btn ghost" onClick={()=>setArmed(false)}>Cancel</button>
                  </span>
                : <button className="btn" disabled={busy} onClick={()=>setArmed(true)}>
                    Create Wise batch ({selected.length})</button>}
            {/* Bulk Fund — only when api_payouts_enabled is on for this company AND
                there's at least one drafted-but-unfunded row to fund. Separate
                from Create Wise batch because the existing batch action stops
                at draft (the safer default); funding is a real-money step that
                deserves its own button and its own confirmation. */}
            {apiPayoutsEnabled && drafted.length>0 && (
              <button className="btn" disabled={busy||fundBusyId==="__bulk__"}
                onClick={fundDrafted}
                title={`Call Wise's funding endpoint for every drafted transfer (${money(draftedTotal,"PHP")}). REAL MONEY moves.`}
                style={{background:"#166534",color:"#fff",borderColor:"#166534"}}>
                {fundBusyId==="__bulk__" ? `Funding…` : `Fund ${drafted.length} drafted (${money(draftedTotal,"PHP")})`}
              </button>
            )}
            {apiPayoutsEnabled && (
              <span className="muted" style={{fontSize:11}}>
                API payouts <b style={{color:"#166534"}}>ENABLED</b> for this company.
              </span>
            )}
          </div>
        </div>; })())}
      <Banner msg={msg} style={{marginTop:12}} />
    </div>
  );
}

// ============================ PROCESS PAYROLL ================================
// Everything you do AFTER locking a period: download a manual Wise batch file,
// download individual payment files, or use the automatic Wise API draft.
function downloadCSV(filename, rowsOfArrays){
  const esc=v=>{ const s=v==null?"":String(v); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; };
  const text=rowsOfArrays.map(r=>r.map(esc).join(",")).join("\r\n");
  const blob=new Blob([text],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

function ProcessPayroll({client,companyId,consolidated,active,confirmBillingDirty,openContractor,apiPayoutsEnabled}){
  const gate = (label)=> typeof confirmBillingDirty==="function" ? confirmBillingDirty(label) : true;
  const [periods,setPeriods]=useState([]);
  const [periodId,setPeriodId]=useState("");
  const [pers,setPers]=useState(null);   // {start,end,pay_date}
  const [rows,setRows]=useState(null);
  const [msg,setMsg]=useState("");
  // Undo: { label, fn } — status only, never touches money. Stays until dismissed.
  const [undo,setUndo]=useState(null);
  // Wise batch currencies — default USD source -> PHP target; user can change.
  const [srcCcy,setSrcCcy]=useState("USD");
  const [tgtCcy,setTgtCcy]=useState("PHP");
  // Which payment-channel tab is active on the Pay list: 'wise' | 'bpi' | 'all'.
  // Default reaches for the channel with the most rows so the most useful view
  // is shown first; 'all' is the consolidated fallback.
  const [payTab,setPayTab]=useState("wise");
  async function runUndo(){
    if(!undo)return;
    const fn=undo.fn; setUndo(null); setBusy(true); setMsg("");
    try{ await fn(); load(periodId); }
    catch(ex){ setMsg("Undo failed: "+(ex.message||ex)); }
    finally{ setBusy(false); }
  }

  useEffect(()=>{
    if(!client||!companyId){setPeriods([]);return;}
    client.from("pay_periods").select("id,period_start,period_end,pay_date,state")
      .eq("company_id",companyId).in("state",["locked","paid"])
      .order("period_start",{ascending:false}).then(({data})=>setPeriods(data||[]));
  },[client,companyId,active]);

  const [busy,setBusy]=useState(false);
  async function load(pid){
    // Switching periods: clear ALL period-scoped state so the new period
    // starts clean. Otherwise the previous period's Reconcile / match results
    // and any in-flight inline-confirm prompts linger on screen and look like
    // they belong to the new period.
    setPeriodId(pid);setRows(null);setMsg("");setPers(null);
    setReconResult(null); setMatchResult(null);
    setPaidArm({}); setUnlockArm({});
    setUndo(null);
    if(!pid)return;
    const pp=periods.find(p=>p.id===pid); setPers(pp);
    const {data,error}=await client.from("payments")
      .select("id,worker_id,net_php,original_net_php,payout_method,status,paid_at,wise_transfer_id,wise_dates,wise_locked_at,company_id,"+
              "workers(first_name,middle_name,last_name,email,status,payout_method,wise_recipient_id,wise_recipient_uuid)")
      .eq("pay_period_id",pid);
    if(error){setMsg(error.message);return;}
    // Pull worker_companies status for THIS period's company so we can flag
    // rows whose company link has been ended (independent of the worker-level
    // status). Common scenario: contractor is still 'active' globally but the
    // link to this company was ended after lock.
    const workerIds=(data||[]).map(p=>p.worker_id);
    let linkStatusByWorker={};
    // Periods are scoped to the currently selected company, so companyId is
    // the right key to look up worker_companies link status.
    if(workerIds.length && companyId){
      const {data:wcs}=await client.from("worker_companies")
        .select("worker_id,status,ended_on")
        .eq("company_id",companyId).in("worker_id",workerIds);
      (wcs||[]).forEach(l=>{ linkStatusByWorker[l.worker_id]=l; });
    }
    setRows((data||[]).map(p=>{
      const wkStatus=p.workers?.status||"active";
      const link=linkStatusByWorker[p.worker_id];
      const linkStatus=link?.status||"active";
      const workerMethod=p.workers?.payout_method||null;
      return {
        payment_id:p.id,
        worker_id:p.worker_id,
        name:fullName(p.workers),
        email:p.workers?.email||"",
        net:Number(p.net_php||0),
        original_net:p.original_net_php!=null?Number(p.original_net_php):null,  // non-null = matcher overrode
        method:p.payout_method||"",
        recipient_id:p.workers?.wise_recipient_id||"",
        recipient_uuid:p.workers?.wise_recipient_uuid||"",   // for the manual-batch CSV recipientId
        transfer_id:p.wise_transfer_id||null,
        status:p.status||"draft", paid_at:p.paid_at||null,
        wise_dates:p.wise_dates||null,   // { created, dateFunded, dateSent } from Wise
        locked_at:p.wise_locked_at||null,  // when non-null this row is locked
        // Stale-state indicators — set when the snapshot diverges from the
        // contractor's current state. UI shows a 🚫 inactive badge or a method-
        // drift hint so you know why a locked row may behave oddly later.
        worker_status:wkStatus,
        link_status:linkStatus,
        link_ended_on:link?.ended_on||null,
        stale_inactive:(wkStatus!=="active") || (linkStatus!=="active"),
        method_drift:!!(workerMethod && p.payout_method && workerMethod!==p.payout_method),
        current_worker_method:workerMethod,
      };
    }).sort((a,b)=>a.name.localeCompare(b.name)));
    // complete the lifecycle: if every payment is sent, advance the period to 'paid'
    const list=data||[];
    if(list.length && list.every(p=>p.status==="sent") && pp && pp.state!=="paid"){
      await client.from("pay_periods").update({state:"paid"}).eq("id",pid);
      setPers({...pp,state:"paid"});
      // refresh the dropdown labels
      client.from("pay_periods").select("id,period_start,period_end,pay_date,state")
        .eq("company_id",companyId).in("state",["locked","paid"])
        .order("period_start",{ascending:false}).then(({data})=>setPeriods(data||[]));
    }
  }

  // mark one (or all) paid — manual fallback, with UNDO (status only; no money moves).
  // paidOnIso lets the caller specify the REAL pay date for BPI/manual rows; if
  // omitted, defaults to now() (used by the "Mark all paid" bulk button which
  // can't pop a date picker per row).
  async function markPaid(workerIds, paidOnIso){
    if(!workerIds.length)return;
    // Only gate the bulk path — single-row "Mark paid" is the lightweight
    // per-row affordance and prompting on each click would be obnoxious.
    if(workerIds.length>1 && !gate(`Mark ${workerIds.length} contractor(s) paid`)) return;
    setBusy(true);setMsg("");
    try{
      // snapshot prior status/paid_at per worker, and the period state, for Undo
      const prior=(rows||[]).filter(r=>workerIds.includes(r.worker_id))
        .map(r=>({worker_id:r.worker_id,status:r.status,paid_at:r.paid_at}));
      const priorPeriodState=pers?.state;
      const stampIso=paidOnIso||new Date().toISOString();
      await client.from("payments").update({status:"sent",paid_at:stampIso})
        .eq("pay_period_id",periodId).in("worker_id",workerIds);
      const names=(rows||[]).filter(r=>workerIds.includes(r.worker_id)).map(r=>r.name);
      logEvent(client,{company_id:companyId, action:"mark_paid",
        entity:`${pers?.period_start} → ${pers?.period_end}`,
        detail:{count:workerIds.length, contractors:names, method:"manual"}});
      const pid=periodId;
      setUndo({ label:`Marked ${workerIds.length} contractor(s) paid.`,
        fn:async()=>{
          for(const p of prior){
            await client.from("payments").update({status:p.status||"draft",paid_at:p.paid_at||null})
              .eq("pay_period_id",pid).eq("worker_id",p.worker_id);
          }
          // if marking paid had advanced the period to 'paid', step it back to 'locked'
          if(priorPeriodState && priorPeriodState!=="paid"){
            await client.from("pay_periods").update({state:priorPeriodState}).eq("id",pid);
          }
          logEvent(client,{company_id:companyId,action:"undo",entity:"mark_paid",detail:{count:prior.length}});
        }});
      load(periodId);
    }catch(ex){ setMsg("Couldn't mark paid: "+(ex.message||ex)); }
    finally{ setBusy(false); }
  }
  // mark one (or all) UNPAID — reverse of markPaid. Status only; no money moves.
  // Mirrors markPaid: snapshots for Undo, logs the event, and steps the period
  // state back from 'paid' to 'locked' so a reversed period isn't shown as paid.
  async function markUnpaid(workerIds){
    if(!workerIds.length)return;
    setBusy(true);setMsg("");
    try{
      // snapshot prior status/paid_at per worker, and the period state, for Undo
      const prior=(rows||[]).filter(r=>workerIds.includes(r.worker_id))
        .map(r=>({worker_id:r.worker_id,status:r.status,paid_at:r.paid_at}));
      const priorPeriodState=pers?.state;
      await client.from("payments").update({status:"draft",paid_at:null})
        .eq("pay_period_id",periodId).in("worker_id",workerIds);
      // a reversed period is no longer fully paid — step it back to 'locked'
      if(priorPeriodState==="paid"){
        await client.from("pay_periods").update({state:"locked"}).eq("id",periodId);
        setPers({...pers,state:"locked"});
      }
      const names=(rows||[]).filter(r=>workerIds.includes(r.worker_id)).map(r=>r.name);
      logEvent(client,{company_id:companyId, action:"mark_unpaid",
        entity:`${pers?.period_start} → ${pers?.period_end}`,
        detail:{count:workerIds.length, contractors:names}});
      const pid=periodId;
      setUndo({ label:`Reverted ${workerIds.length} contractor(s) to unpaid.`,
        fn:async()=>{
          for(const p of prior){
            await client.from("payments").update({status:p.status||"draft",paid_at:p.paid_at||null})
              .eq("pay_period_id",pid).eq("worker_id",p.worker_id);
          }
          // restore the period state if reversing had stepped it back
          if(priorPeriodState && priorPeriodState!=="locked"){
            await client.from("pay_periods").update({state:priorPeriodState}).eq("id",pid);
          }
          logEvent(client,{company_id:companyId,action:"undo",entity:"mark_unpaid",detail:{count:prior.length}});
        }});
      load(periodId);
    }catch(ex){ setMsg("Couldn't mark unpaid: "+(ex.message||ex)); }
    finally{ setBusy(false); }
  }
  // bulk reverse: paid rows WITHOUT a Wise transfer (those need individual handling),
  // with a confirmation since un-paying a whole period is a larger action.
  function markAllUnpaid(){
    const ids=(rows||[]).filter(r=>r.status==="sent" && !r.transfer_id).map(r=>r.worker_id);
    const skipped=(rows||[]).filter(r=>r.status==="sent" && r.transfer_id).length;
    if(!ids.length){
      setMsg(skipped?`All paid rows have a Wise transfer — reverse those individually.`:`Nothing to reverse.`);
      return;
    }
    const note=skipped?` (${skipped} with a Wise transfer will be skipped — handle individually)`:"";
    if(!window.confirm(`Revert ${ids.length} contractor(s) in this period to unpaid?${note}\n\n`+
      `This changes status only — it does NOT move money or cancel any Wise transfer.\n\n`+
      `⚠️  NOTE: If you re-open and RECALCULATE this period afterward, all manual overrides and `+
      `adjustments (Health Allowance, PDD Lunch, 13th, bonus, gross overrides) will be reset to `+
      `hours-based values. Do not recalculate if you want to keep imported/adjusted amounts.`))return;
    markUnpaid(ids);
  }
  // API check: read Wise transfer status and auto-mark paid where sent/completed
  async function checkWiseStatus(){
    const withTransfer=(rows||[]).filter(r=>r.transfer_id);
    if(!withTransfer.length){setMsg("No drafted Wise transfers to check. Use the API draft first, or mark paid manually.");return;}
    setBusy(true);setMsg("");
    try{
      const {data,error}=await client.functions.invoke("wise-payouts",{
        body:{action:"status",transfer_ids:withTransfer.map(r=>r.transfer_id)}});
      if(error)throw new Error(error.message||"Edge function error");
      if(data&&data.error)throw new Error(data.error);
      // Only terminal-success states mark the payment paid. "processing" and
      // "funds_converted" are IN-FLIGHT — the money hasn't left Wise yet, so
      // recording them as sent in the DB would be a false positive.
      const paidStates=new Set(["outgoing_payment_sent","completed","sent"]);
      const inFlightStates=new Set(["processing","funds_converted","incoming_payment_waiting","waiting_recipient_input_to_proceed"]);
      const byId={}; (data.statuses||[]).forEach(s=>byId[String(s.id)]=s.status);
      let marked=0, inFlight=0;
      for(const r of withTransfer){
        const st=byId[String(r.transfer_id)];
        if(st && paidStates.has(st)){
          await client.from("payments").update({status:"sent",paid_at:new Date().toISOString()})
            .eq("pay_period_id",periodId).eq("worker_id",r.worker_id);
          marked++;
        } else if(st && inFlightStates.has(st)){
          inFlight++;
        }
      }
      const inFlightNote=inFlight?` · ${inFlight} still in-flight (not yet sent)`:"";
      setMsg(`Checked ${withTransfer.length} Wise transfer(s); ${marked} now marked paid${inFlightNote}.`);
      load(periodId);
    }catch(ex){ setMsg("Wise status check failed: "+ex.message); }
    finally{ setBusy(false); }
  }

  // ============ Reconcile with Wise (processed-batch CSV import + status + variance) ===========
  // When you upload a Wise batch CSV manually, Wise generates the transfer IDs
  // server-side and never returns them to the app — so those rows have no
  // wise_transfer_id and can't be polled. After Wise processes the batch you
  // can re-download the processed CSV (Batch payments → ... → Download), which
  // has the original upload columns PLUS a transferId column. Importing it
  // backfills wise_transfer_id and unlocks status polling for that period.
  const [reconResult,setReconResult]=useState(null);   // { imported, skipped, variances, polled, parseErrors }
  const reconFileRef=React.useRef(null);

  // Parse the processed Wise CSV. We're permissive about column naming because
  // Wise has shipped a few variants (transferId vs id; amount vs sourceAmount).
  function parseWiseProcessedCsv(text){
    const grid=parseCSV(text);
    if(!grid.length) return { rows:[], errors:["empty file"] };
    const header=grid[0].map(h=>String(h||"").trim());
    const norm=h=>h.toLowerCase().replace(/[^a-z0-9]/g,"");
    const idxOf=(...names)=>{
      const wanted=new Set(names.map(norm));
      for(let i=0;i<header.length;i++) if(wanted.has(norm(header[i]))) return i;
      return -1;
    };
    const cRecip=idxOf("recipientId","recipient_id");
    const cAmt  =idxOf("amount","targetAmount","sourceAmount");
    const cTid  =idxOf("transferId","transfer_id","id");
    const cAErr =idxOf("apiError");
    const cUErr =idxOf("userError");
    const cName =idxOf("name");
    const errors=[];
    if(cRecip<0) errors.push("missing 'recipientId' column");
    if(cTid<0)   errors.push("missing 'transferId' column — re-download the processed batch from Wise (it includes transfer IDs)");
    const out=[];
    for(let i=1;i<grid.length;i++){
      const r=grid[i];
      const recip=cRecip>=0?String(r[cRecip]||"").trim():"";
      const tid  =cTid  >=0?String(r[cTid]  ||"").trim():"";
      const amt  =cAmt  >=0?Number(String(r[cAmt]||"").replace(/,/g,""))||0:0;
      const apiErr=cAErr>=0?String(r[cAErr]||"").trim():"";
      const usrErr=cUErr>=0?String(r[cUErr]||"").trim():"";
      const name =cName>=0?String(r[cName]||"").trim():"";
      if(!recip && !tid) continue;
      out.push({ recipient_uuid:recip, transfer_id:tid, amount:amt,
                 name, api_error:apiErr, user_error:usrErr });
    }
    return { rows:out, errors };
  }

  // Accept a name+amount fallback suggestion from the reconcile-unmatched list:
  // backfill the CSV transfer_id onto the suggested worker's payment row. Only
  // links a transfer id (no money moves); idempotent on re-accept.
  const [csvAcceptBusy,setCsvAcceptBusy]=useState(null);
  const [csvAccepted,setCsvAccepted]=useState({});
  async function acceptCsvSuggestion(sKey,u){
    if(!u?.suggest?.worker_id || !u?.transfer_id) return;
    setCsvAcceptBusy(sKey); setMsg("");
    try{
      const {error}=await client.from("payments")
        .update({ wise_transfer_id:String(u.transfer_id) })
        .eq("pay_period_id",periodId).eq("worker_id",u.suggest.worker_id);
      if(error) throw new Error(error.message);
      logEvent(client,{ company_id:companyId, action:"wise_recipient_sync",
        entity:`${u.suggest.name} → transfer ${u.transfer_id}`,
        detail:{ kind:"csv_fallback_link", matched_by:"name+amount",
                 csv_name:u.name, csv_recipient_uuid:u.recipient_uuid } });
      setCsvAccepted(p=>({...p,[sKey]:true}));
      setMsg(`Linked transfer ${u.transfer_id} to ${u.suggest.name} (name+amount fallback). Re-run a poll/reconcile to pull its status.`);
    }catch(ex){ setMsg("Couldn't link suggestion: "+(ex.message||ex)); }
    finally{ setCsvAcceptBusy(null); }
  }

  async function onReconcileFile(e){
    const f=e.target.files && e.target.files[0]; if(!f) return;
    setBusy(true); setMsg(""); setReconResult(null);
    try{
      const text=await f.text();
      const { rows:parsedRows, errors:parseErrors }=parseWiseProcessedCsv(text);
      if(parseErrors.length){
        setReconResult({ imported:0, skipped:0, variances:[], polled:null,
          parseErrors, unmatched:[], rowErrors:[] });
        setMsg("Couldn't read the Wise CSV — see details below.");
        return;
      }
      // Index DB rows for this period by recipient UUID for fast lookup,
      // plus name keys for a fallback when the CSV row's UUID doesn't match
      // (missing/typo'd UUID, or paid via a different recipient). The fallback
      // never auto-applies — it surfaces a suggested contractor for one-click
      // accept in the UI.
      const byUuid=new Map();
      for(const r of (rows||[])){
        if(r.recipient_uuid) byUuid.set(r.recipient_uuid, r);
      }
      let imported=0, skipped=0;
      const variances=[];                       // { name, db_amount, wise_amount }
      const unmatched=[];                       // CSV rows that don't match anyone in this period
      const rowErrors=[];                       // CSV rows with api/user errors from Wise
      // Fallback name+amount match against DB rows still missing a transfer_id.
      const suggestMatch=(cr)=>{
        if(!cr.name) return null;
        const sk=nameKey(cr.name), lk=looseKey(cr.name);
        const cands=(rows||[]).filter(r=>!r.transfer_id &&
          (nameKey(r.name)===sk || looseKey(r.name)===lk) &&
          (!(cr.amount>0) || Math.abs(cr.amount-Number(r.net||0))<=1.00));
        return cands.length===1 ? cands[0] : null;   // only a UNIQUE match is safe to suggest
      };
      for(const cr of parsedRows){
        if(cr.api_error || cr.user_error){
          rowErrors.push({ name:cr.name||cr.recipient_uuid, error:cr.api_error||cr.user_error });
          continue;
        }
        const match=byUuid.get(cr.recipient_uuid);
        if(!match){
          const suggestion=suggestMatch(cr);
          unmatched.push({ recipient_uuid:cr.recipient_uuid, name:cr.name, amount:cr.amount,
            transfer_id:cr.transfer_id||null,
            suggest: suggestion?{worker_id:suggestion.worker_id, name:suggestion.name, net:suggestion.net}:null });
          continue;
        }
        // Variance check: did Wise actually send the amount the DB recorded?
        // Tolerance ₱0.01 to absorb rounding.
        if(cr.amount>0 && Math.abs(cr.amount - match.net) > 0.01){
          variances.push({ name:match.name, db_amount:match.net, wise_amount:cr.amount,
                           delta:cr.amount-match.net });
        }
        // Backfill transfer_id only when missing — idempotent on re-import
        if(!match.transfer_id && cr.transfer_id){
          const { error }=await client.from("payments")
            .update({ wise_transfer_id:String(cr.transfer_id) })
            .eq("pay_period_id",periodId).eq("worker_id",match.worker_id);
          if(error){ rowErrors.push({ name:match.name, error:error.message }); }
          else { imported++; }
        } else if(match.transfer_id){
          skipped++;
        }
      }
      // Audit: importing transfer IDs is a notable event
      if(imported>0){
        logEvent(client,{ company_id:companyId, action:"wise_recipient_sync",
          entity:`${pers?.period_start} → ${pers?.period_end}`,
          detail:{ kind:"processed_batch_import", imported, skipped,
                   variance_count:variances.length, unmatched:unmatched.length } });
      }
      // Now poll Wise for status using the new server-side action, scoped to this period.
      let polled=null;
      try{
        const { data, error }=await client.functions.invoke("wise-payouts",{
          body:{ action:"poll", pay_period_id:periodId, only_drafts:true } });
        if(error) polled={ error: error.message||"Edge function error" };
        else if(data?.error) polled={ error: data.error };
        else polled={ checked:data?.checked||0, marked_paid:data?.marked_paid||0,
                      in_flight:data?.in_flight||0, unknown:data?.unknown||0 };
      }catch(ex){ polled={ error: String(ex.message||ex) }; }
      setReconResult({ imported, skipped, variances, polled, parseErrors:[],
                       unmatched, rowErrors });
      const polledNote=polled && !polled.error
        ? ` · Polled ${polled.checked}, marked ${polled.marked_paid} paid`+
          (polled.in_flight?`, ${polled.in_flight} in-flight`:"")
        : "";
      setMsg(`Imported ${imported} transfer ID(s); ${skipped} already on file; `+
             `${variances.length} amount variance(s); ${unmatched.length} unmatched.${polledNote}`);
      await load(periodId);
    }catch(ex){ setMsg("Reconcile failed: "+(ex.message||ex)); }
    finally{ setBusy(false); if(reconFileRef.current) reconFileRef.current.value=""; }
  }

  // Inline date picker state for "Mark paid" on non-Wise rows. When the user
  // clicks Mark paid, instead of stamping now() we arm the row, show a date
  // input + Confirm, and only then write the chosen date. (Wise rows skip this
  // because their paid date comes from the Wise API, not user input.)
  const [paidArm,setPaidArm]=useState({});  // { [worker_id]: 'YYYY-MM-DD' } when armed
  const todayYmd=()=>{ const d=new Date(); return d.toISOString().slice(0,10); };
  function armPaid(workerId){
    setPaidArm(prev=>({...prev,[workerId]:todayYmd()}));
  }
  function unarmPaid(workerId){
    setPaidArm(prev=>{ const n={...prev}; delete n[workerId]; return n; });
  }
  function setPaidDate(workerId, ymd){
    setPaidArm(prev=>({...prev,[workerId]:ymd}));
  }
  async function confirmPaidWithDate(workerId){
    const ymd=paidArm[workerId]; if(!ymd) return;
    // Stamp midday UTC of the chosen date so timezone display is stable.
    const iso=new Date(`${ymd}T12:00:00Z`).toISOString();
    unarmPaid(workerId);
    await markPaid([workerId], iso);
  }

  // Per-row Unlock — clears wise_locked_at after capturing a reason in
  // audit_log. The next Reconcile run will re-lock the row.
  const [unlockArm,setUnlockArm]=useState({});  // { [payment_id]: reasonString }
  function armUnlock(paymentId){ setUnlockArm(prev=>({...prev,[paymentId]:""})); }
  function unarmUnlock(paymentId){ setUnlockArm(prev=>{ const n={...prev}; delete n[paymentId]; return n; }); }
  function setUnlockReason(paymentId, reason){ setUnlockArm(prev=>({...prev,[paymentId]:reason})); }
  async function confirmUnlock(paymentId, workerId){
    const reason=(unlockArm[paymentId]||"").trim();
    if(!reason){ setMsg("Unlock requires a reason."); return; }
    setBusy(true); setMsg("");
    try{
      const {error}=await client.from("payments").update({wise_locked_at:null}).eq("id",paymentId);
      if(error) throw new Error(error.message);
      const w=(rows||[]).find(r=>r.payment_id===paymentId);
      logEvent(client,{ company_id:companyId, action:"wise_lock_release",
        entity:`${pers?.period_start} → ${pers?.period_end} · ${w?.name||workerId}`,
        detail:{ payment_id:paymentId, worker_id:workerId, reason } });
      setMsg(`Unlocked ${w?.name||"row"}. It will re-lock next Reconcile.`);
      unarmUnlock(paymentId);
      await load(periodId);
    }catch(ex){ setMsg("Unlock failed: "+(ex.message||ex)); }
    finally{ setBusy(false); }
  }

  // Link a probable historical recipient id (surfaced by the matcher's orphan
  // diagnostic) onto a worker's wise_recipients list. Used when a worker
  // changed banks mid-history and old pay periods reference a recipient id
  // that's no longer the default. Appends without disturbing wise_recipient_id.
  const [linkBusy,setLinkBusy]=useState(null);  // `${worker_id}:${target_account}` while in flight
  const [linkedKeys,setLinkedKeys]=useState({});
  async function linkOrphanRecipient(workerId, workerName, targetAccount, transferId, opts){
    if(!workerId||!targetAccount)return;
    const key=`${workerId}:${targetAccount}`;
    const ambiguous=!!(opts&&opts.ambiguous);
    setLinkBusy(key); setMsg("");
    try{
      // SANITY PROBE: ask Wise who recipient #targetAccount actually is and
      // compare to the worker we're about to link it to. Catches the
      // wrong-contractor mistake (esp. when two contractors share an amount).
      // Best-effort: if the probe fails (e.g. Wisetag/403), we proceed but warn.
      let probeNote="";
      try{
        const { data:probe }=await client.functions.invoke("wise-payouts",{
          body:{ action:"get_recipient", recipient_id:Number(targetAccount)||targetAccount } });
        const recName=probe?.recipient?.name||"";
        if(recName){
          const same=nameKey(recName)===nameKey(workerName||"") || looseKey(recName)===looseKey(workerName||"");
          if(!same){
            if(!window.confirm(
              `⚠ Recipient name mismatch.\n\nWise recipient #${targetAccount} is held by "${recName}", `+
              `but you're linking it to "${workerName}".\n\nThese don't look like the same person. `+
              `Linking the wrong recipient would pay/attribute to the wrong contractor.\n\nLink anyway?`)){
              setLinkBusy(null); return;
            }
          }
          probeNote=` (Wise: ${recName})`;
        }
      }catch(_e){ /* probe is best-effort; Wisetag recipients 403 here */ }

      // Ambiguous candidate (the transfer's amount fits more than one unmatched
      // contractor in the window) — require a second explicit confirmation.
      if(ambiguous && !window.confirm(
        `This transfer's amount matches more than one unpaid contractor in the window, `+
        `so it's AMBIGUOUS. Confirm you've verified (via the transfer date and the `+
        `recipient${probeNote}) that #${targetAccount} belongs to ${workerName} before linking.\n\nLink?`)){
        setLinkBusy(null); return;
      }

      const { data:cur, error:re } = await client.from("workers")
        .select("wise_recipients").eq("id",workerId).single();
      if(re) throw new Error(re.message);
      const list = Array.isArray(cur?.wise_recipients) ? cur.wise_recipients : [];
      const numericId = Number(targetAccount);
      const idForList = Number.isFinite(numericId) ? numericId : targetAccount;
      if(!list.some(x=>String(x?.id)===String(idForList))){
        list.push({ id: idForList, label: `Historical recipient (linked from Reconcile transfer ${transferId})` });
        const { error:ue } = await client.from("workers")
          .update({ wise_recipients: list }).eq("id", workerId);
        if(ue) throw new Error(ue.message);
      }
      logEvent(client, { company_id:companyId, action:"wise_recipient_sync",
        entity:`${workerName||workerId} → #${targetAccount}`,
        detail:{ kind:"link_historical_recipient", recipient_id:idForList,
                 source_transfer_id:transferId } });
      setLinkedKeys(p=>({...p,[key]:true}));
      setMsg(`Linked recipient #${targetAccount} to ${workerName||"worker"}. Re-run Reconcile to match the historical pay period.`);
    }catch(ex){ setMsg("Couldn't link recipient: "+(ex.message||ex)); }
    finally{ setLinkBusy(null); }
  }

  // Smart Reconcile — the one-button consolidation. Looks at the current rows,
  // decides what each Wise row needs, calls the right action(s), and reports
  // back in plain English. Doesn't waste API calls on rows that already have
  // Wise data (per Oliver's call: "Wise info doesn't change so if Wise info
  // is already present then it should just use that data").
  async function reconcileWithWise(){
    if(!gate("Reconcile with Wise")) return;
    setBusy(true); setMsg(""); setMatchResult(null);
    try{
      const wiseAll=(rows||[]).filter(r=>r.method==="wise");
      const needsMatching = wiseAll.filter(r=>!r.transfer_id);
      // Rows with a transfer_id but no Wise data yet (no created date stored).
      // Note: Wise's API doesn't return dateSent for batch-uploaded transfers
      // so we key on `created` instead — that's the only timestamp we ever get.
      const needsData     = wiseAll.filter(r=>r.transfer_id && (!r.wise_dates || !r.wise_dates.created));
      // For already-matched rows we ALSO re-run match with refresh:true so
      // amount variances get re-detected and auto-overridden (otherwise a row
      // that was matched before the variance-override logic existed would
      // never get its amount corrected).
      const alreadyMatched = wiseAll.filter(r=>r.transfer_id && r.wise_dates && r.wise_dates.created);
      let matchedCount=0, refreshedMatched=0, refreshedData=0,
          varianceCount=0, ambiguousCount=0, unmatchedCount=0,
          overriddenCount=0;
      // 1. Match any rows missing a transfer_id (first-time match path)
      if(needsMatching.length>0){
        const { data, error }=await client.functions.invoke("wise-payouts",{
          body:{ action:"match", pay_period_id:periodId, refresh:false } });
        if(error) throw new Error(error.message||"Edge function error");
        if(data?.error) throw new Error(data.error);
        matchedCount=data.matched||0;
        varianceCount=data.variances||0;
        ambiguousCount=data.ambiguous||0;
        unmatchedCount=data.unmatched||0;
        overriddenCount=(data.results||[]).filter(r=>r.outcome==="matched_with_variance_overridden").length;
        setMatchResult(data);   // surface the match details panel
      }
      // 2. For everything that already has a transfer_id — re-run match in
      //    refresh mode. Picks up amount variances on rows we matched before
      //    the variance logic existed (e.g. Mery: matched as "clean" because
      //    the old ±0.01 tolerance hid her ₱60 override).
      if((needsData.length + alreadyMatched.length) > 0){
        const { data, error }=await client.functions.invoke("wise-payouts",{
          body:{ action:"match", pay_period_id:periodId, refresh:true } });
        if(error) throw new Error(error.message||"Edge function error");
