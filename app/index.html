                            <span className="tip-body">
                              {`Payment was locked with method "${r.method||"—"}" but the contractor's current payout method is "${r.current_worker_method||"—"}". The locked statement uses the snapshot; future periods will follow the new method.`}
                            </span>
                          </span>
                        )}
                      </td>
                      <td><span title={codeHint("method",r.method)}>{methodLabel(r.method)||"—"}</span></td>
                      <td className="muted">{isWise?(r.recipient_id?`#${r.recipient_id}`:(r.email||"—")):(r.email||"—")}</td>
                      <td>
                        {r.net.toLocaleString(undefined,{minimumFractionDigits:2})}
                        {r.original_net!=null && (() => {
                          const delta=r.net-r.original_net;
                          const sign=delta>0?"+":"";
                          const fmt=n=>Number(n).toLocaleString(undefined,{minimumFractionDigits:2});
                          const tip=`Auto-overridden by Wise reconcile.\nOriginal DB amount: ₱${fmt(r.original_net)}\nWise actually sent: ₱${fmt(r.net)}\nDelta: ${sign}₱${fmt(delta)}`;
                          return (
                            <span className="tip-wrap" tabIndex={0}
                              style={{marginLeft:6,cursor:"help",fontSize:13,color:"#a16207"}}>
                              ⚠️
                              <span className="tip-body">{tip}</span>
                            </span>
                          );
                        })()}
                      </td>
                      <td>{r.status==="sent"
                        ? <span className="pill active">paid</span>
                        : <span className="pill" style={{background:"#f3f4f6",color:"var(--muted)"}}>unpaid</span>}</td>
                      <td title={tooltip} style={{fontSize:12,color:"var(--muted)",whiteSpace:"nowrap"}}>
                        {r.status==="sent" && sentIso ? fmtDate(sentIso) : "—"}
                      </td>
                      <td className="no-print" style={{textAlign:"right"}}>
                        {locked
                          // Locked rows: inline Unlock-with-reason flow. Mark unpaid is blocked.
                          ? (unlockArmed
                              ? <span style={{display:"inline-flex",gap:4,alignItems:"center"}}>
                                  <input type="text" placeholder="Reason…" value={unlockReason}
                                    onChange={e=>setUnlockReason(r.payment_id,e.target.value)}
                                    style={{fontSize:12,padding:"2px 6px",width:160}}/>
                                  <button className="btn sm" disabled={busy||!unlockReason.trim()}
                                    onClick={()=>confirmUnlock(r.payment_id,r.worker_id)}>Unlock</button>
                                  <button className="btn ghost sm" disabled={busy}
                                    onClick={()=>unarmUnlock(r.payment_id)}>Cancel</button>
                                </span>
                              : <button className="btn ghost sm" disabled={busy}
                                  title="This row is locked by Wise reconcile. Unlock with a reason to edit it; the next Reconcile will re-lock."
                                  onClick={()=>armUnlock(r.payment_id)}>Unlock…</button>)
                          : r.status==="sent"
                            ? <button className="btn ghost sm" disabled={busy}
                                title="Revert this payment to unpaid (status only — no money moves)"
                                onClick={()=>markUnpaid([r.worker_id])}>Mark unpaid</button>
                            : isWise
                              // Wise rows: paid date comes from the API after polling, not user input
                              ? <button className="btn ghost sm" disabled={busy} onClick={()=>markPaid([r.worker_id])}>Mark paid</button>
                              : armed
                                // Non-Wise (BPI/other) armed for date input — inline confirm
                                ? <span style={{display:"inline-flex",gap:4,alignItems:"center"}}>
                                    <input type="date" value={armed}
                                      onChange={e=>setPaidDate(r.worker_id,e.target.value)}
                                      style={{fontSize:12,padding:"2px 4px",width:130}}/>
                                    <button className="btn sm" disabled={busy||!armed}
                                      onClick={()=>confirmPaidWithDate(r.worker_id)}>Confirm</button>
                                    <button className="btn ghost sm" disabled={busy}
                                      onClick={()=>unarmPaid(r.worker_id)}>Cancel</button>
                                  </span>
                                // Non-Wise unarmed — clicking arms the row for date entry
                                : <button className="btn ghost sm" disabled={busy} onClick={()=>armPaid(r.worker_id)}>Mark paid…</button>}
                      </td>
                    </tr>);
                  })}
                  <tr>
                    <td colSpan={3} style={{fontWeight:700}}>
                      {payTab==="all" ? "Grand total" : `${payTab.toUpperCase()} subtotal`}
                    </td>
                    <td style={{fontWeight:700}}>{visibleTotal.toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                    <td/><td/><td className="no-print"/>
                  </tr>
                  {payTab!=="all" && (
                    <tr><td colSpan={3} className="muted" style={{fontSize:12}}>Grand total (all channels)</td>
                      <td className="muted" style={{fontSize:12}}>{total.toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                      <td/><td/><td className="no-print"/></tr>
                  )}
                </tbody>
              </table></div>
            );
          })()}

          <p className="muted" style={{fontSize:12,marginTop:8}}>For Wise rows, <b>Reconcile with Wise</b> sets paid status and
            the Wise draft date automatically. <b>The "Sent ≈" date is approximate</b> — Wise's API doesn't return
            the actual send timestamp for batch-uploaded transfers, so it shows the draft date (the money typically
            leaves Wise within 1–2 days). For BPI / non-Wise rows, click <b>Mark paid…</b> and enter the date the
            BPI transfer actually happened.</p>
        </div>

        <div className="card no-print">
          <h3 style={{margin:"0 0 4px"}}>1 · Manual Wise batch file</h3>
          <p className="sub">Downloads a CSV in Wise's exact batch-upload template, keyed by each recipient's
            Wise ID ({wiseRows.length-wiseMissingUuid.length} of {wiseRows.length} Wise contractor(s) ready).
            Upload it on your Wise account → Batch payments. You fund it in Wise.</p>
          {wiseMissingUuid.length>0 &&
            <Banner tone="error" style={{marginBottom:8}}>
              <b>{wiseMissingUuid.length} Wise contractor(s) have no stored Wise recipient UUID</b> and will be dropped from the CSV:
              {" "}
              {wiseMissingUuid.map((r,i)=>(
                <React.Fragment key={r.worker_id||i}>
                  {i>0 && ", "}
                  {openContractor
                    ? <button type="button" className="btn-link"
                        onClick={()=>openContractor(r.worker_id)}
                        title="Open this contractor's profile and jump to the Wise recipient UUID field"
                        style={{background:"none",border:"none",padding:0,margin:0,color:"#b91c1c",
                          textDecoration:"underline",cursor:"pointer",font:"inherit"}}>
                        {r.name}
                      </button>
                    : <span>{r.name}</span>}
                </React.Fragment>
              ))}.
              {" "}Click a name above to open the profile and paste the UUID into the <b>"Wise recipient UUID"</b> field — get UUIDs from <i>Wise → Batch payments → Download all templates</i>.
              {" "}<span className="muted" style={{fontSize:11}}>("Pull IDs from Wise" can't fix this — the Wise API doesn't return UUIDs, only the templates CSV does.)</span>
            </Banner>}
          <div className="row" style={{alignItems:"flex-end",gap:12,marginBottom:8}}>
            <div className="field"><label style={{fontSize:12}}>Source currency</label>
              <select value={srcCcy} onChange={e=>setSrcCcy(e.target.value)}>
                <option value="USD">USD</option><option value="PHP">PHP</option>
              </select></div>
            <div className="field"><label style={{fontSize:12}}>Target currency</label>
              <select value={tgtCcy} onChange={e=>setTgtCcy(e.target.value)}>
                <option value="PHP">PHP</option><option value="USD">USD</option>
              </select></div>
            <span className="muted" style={{fontSize:11,paddingBottom:6}}>Default USD → PHP.</span>
          </div>
          <button className="btn" disabled={!(wiseRows.length-wiseMissingUuid.length)} onClick={downloadWiseBatch}>
            Download Wise batch CSV ({wiseRows.length-wiseMissingUuid.length})</button>
          {!wiseRows.length && <span className="muted" style={{marginLeft:8,fontSize:12}}>No Wise-method contractors in this period.</span>}
          {lastExported("wise") && <span className="pill warn" style={{marginLeft:8}}>already downloaded {new Date(lastExported("wise")).toLocaleDateString()}</span>}
        </div>

        <div className="card">
          <h3 style={{margin:"0 0 4px"}}>2 · Individual payment files</h3>
          <p className="sub">A per-contractor breakdown of all {rows.length} payments (every method, incl. BPI),
            with amounts, methods and pay date — for manual/individual payments and record-keeping.</p>
          <button className="btn ghost" onClick={downloadIndividual}>Download payments CSV ({rows.length})</button>
          {lastExported("individual") && <span className="pill warn" style={{marginLeft:8}}>already downloaded {new Date(lastExported("individual")).toLocaleDateString()}</span>}
        </div>

        <div className="card">
          <h3 style={{margin:"0 0 4px"}}>3 · Automatic Wise API draft</h3>
          <p className="sub">Draft the Wise transfers directly via the API (drafts only — you fund in Wise).
            Lets you edit recipients/amounts per person and create one batch.</p>
          <WisePayouts client={client} companyId={companyId} consolidated={consolidated} presetPeriodId={periodId} confirmBillingDirty={confirmBillingDirty} openContractor={openContractor} apiPayoutsEnabled={apiPayoutsEnabled} toggleApiPayouts={toggleApiPayouts}/>
        </div>
        </>)}
      </>}
      {wiseDialog && <WiseApiDialog
        rows={wiseRows} total={wiseRows.reduce((s,r)=>s+(r.net||0),0)}
        period={pers} onClose={()=>setWiseDialog(false)} />}
    </div>
  );
}

// Step-by-step Wise API payout dialog. Walks: 1) review recipients,
// 2) confirm amounts, 3) fund. Funding is DISABLED for now (the real-money
// fund path lives on the api-payouts branch, untested) — the final step
// explains that and points to Download Wise File / the API draft instead.
function WiseApiDialog({ rows, total, period, onClose }){
  const mref=useModalA11y(onClose,{escClose:true}); // read-only review: Escape-safe
  const [step,setStep]=useState(1);
  const missing=rows.filter(r=>!r.recipient_id && !r.recipient_uuid);
  const ready=rows.filter(r=>r.recipient_id || r.recipient_uuid);
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" ref={mref} role="dialog" aria-modal="true" aria-labelledby="wapi-title" onClick={e=>e.stopPropagation()} style={{maxWidth:640}}>
        <button className="x" aria-label="Close" onClick={onClose}><span aria-hidden="true">×</span></button>
        <h2 id="wapi-title" style={{marginBottom:2}}>Pay via Wise API</h2>
        <p className="sub" style={{marginTop:0}}>
          {period?.period_start} → {period?.period_end} · Step {step} of 3
        </p>
        {/* step rail */}
        <div style={{display:"flex",gap:6,margin:"8px 0 14px"}}>
          {["Review recipients","Confirm amounts","Fund"].map((lbl,i)=>(
            <div key={i} style={{flex:1,padding:"4px 8px",borderRadius:4,fontSize:12,textAlign:"center",
              background: step===i+1?"var(--accent)":"#f1f5f9", color: step===i+1?"#fff":"var(--muted)"}}>
              {i+1}. {lbl}</div>
          ))}
        </div>

        {step===1 && (
          <div>
            <p style={{fontSize:13}}>{ready.length} of {rows.length} Wise contractor(s) have a recipient on file.</p>
            {missing.length>0 && (
              <div className="banner" style={{background:"#fef2f2",borderColor:"#fecaca",color:"#b91c1c",marginBottom:8}}>
                {missing.length} missing a recipient — they'll be skipped: {missing.map(r=>r.name).join(", ")}.
                Set their Wise recipient on the Contractors tab.
              </div>
            )}
            <div className="table-scroll" style={{maxHeight:240}}>
              <table style={{fontSize:13}}>
                <thead><tr><th>Contractor</th><th>Recipient</th></tr></thead>
                <tbody>{ready.map(r=>(
                  <tr key={r.worker_id}><td>{r.name}</td>
                    <td className="muted">{r.recipient_id?`#${r.recipient_id}`:`uuid ${String(r.recipient_uuid).slice(0,8)}…`}</td></tr>
                ))}</tbody>
              </table>
            </div>
          </div>
        )}
        {step===2 && (
          <div>
            <p style={{fontSize:13}}>Confirm the amounts to send (PHP). Total <b>{money(total,"PHP")}</b>.</p>
            <div className="table-scroll" style={{maxHeight:240}}>
              <table style={{fontSize:13}}>
                <thead><tr><th>Contractor</th><th>Amount ₱</th></tr></thead>
                <tbody>{ready.map(r=>(
                  <tr key={r.worker_id}><td>{r.name}</td>
                    <td><b>{Number(r.net||0).toLocaleString(undefined,{minimumFractionDigits:2})}</b></td></tr>
                ))}</tbody>
              </table>
            </div>
          </div>
        )}
        {step===3 && (
          <div>
            <div className="banner" style={{background:"#fffbeb",borderColor:"#fde68a",color:"#92400e"}}>
              <b>API funding isn't enabled yet.</b> The automatic fund step (moving money out of your
              Wise balance via the API) is built but turned off pending testing. For now, use
              <b> Download Wise File</b> and upload it in Wise → Batch payments, or the
              <b> Automatic Wise API draft</b> below (drafts only — you fund in Wise).
            </div>
            <p className="muted" style={{fontSize:12,marginTop:8}}>
              {ready.length} contractor(s) · {money(total,"PHP")} would be funded when this is enabled.
            </p>
          </div>
        )}

        <div className="actions" style={{display:"flex",justifyContent:"space-between",marginTop:14}}>
          <button className="btn ghost" onClick={step===1?onClose:()=>setStep(s=>s-1)}>
            {step===1?"Cancel":"Back"}</button>
          {step<3
            ? <button className="btn" onClick={()=>setStep(s=>s+1)}>Next</button>
            : <button className="btn" disabled title="Funding not enabled yet"
                style={{opacity:.6,cursor:"not-allowed"}}>Fund (disabled)</button>}
        </div>
      </div>
    </div>
  );
}

// ============================ AUDIT LOG ======================================
const AUDIT_LABELS={import:"Import",delete_import:"Delete import",approve:"Approve time",
  reject:"Reject time",lock:"Lock period",unlock_period:"Unlock period",delete_statement:"Delete pay statement",mark_paid:"Mark paid",mark_unpaid:"Mark unpaid",manual_hours:"Manual hours",api_payout:"API payout (fund)",api_payouts_flag:"API payouts flag",
  wise_recipient_sync:"Wise recipient sync",
  wise_lock_release:"Unlock Wise-locked row",
  wise_lock_warning:"Edit attempted on locked row",
  add_contractor:"Add contractor",edit_contractor:"Edit contractor",delete_contractor:"Delete contractor",set_rate:"Set rate",
  recalculate:"Recalculate (reset overrides)",undo:"Undo",
  "override.gross":"Gross override"};
function AuditLog({client,companyId,consolidated}){
  // Date-range filter drives the SERVER query, so you can look back further
  // than the recent-500 cap when investigating something older. Empty = no
  // bound (recent 500 as before). `to` is inclusive of the whole day.
  const [from,setFrom]=useState("");
  const [to,setTo]=useState("");
  const {data,loading,reload}=useQuery(client,c=>{
    let q=c.from("audit_log").select("id,actor,action,entity,detail,created_at")
      .order("created_at",{ascending:false}).limit(500);
    if(!consolidated&&companyId)q=q.eq("company_id",companyId);
    if(from) q=q.gte("created_at",from);
    if(to)   q=q.lte("created_at",to+"T23:59:59.999Z");
    return q;
  },[client,companyId,consolidated,from,to]);
  const {rows,Th,q,setQ}=useSortFilter((data||[]).map(r=>({...r,
    _label:AUDIT_LABELS[r.action]||r.action, _when:r.created_at})),{
    when:r=>r._when, action:r=>r._label, entity:r=>r.entity, actor:r=>r.actor,
  },["_label","entity","actor"]);
  function exportCsv(){

function summarizeDetail(d){
  if(!d) return "";
  const parts=[];
  // C2 — render before/after diffs. A value shaped {from,to} prints as
  // "from → to"; the `changed` object (from saveDetails) lists each field.
  const fmtVal=v=> v===null||v===undefined||v===""?"∅":String(v);
  const isDiff=v=> v && typeof v==="object" && ("from" in v) && ("to" in v);
  const fmtDiff=(label,v)=> `${label}: ${fmtVal(v.from)} → ${fmtVal(v.to)}`;
  if(d.changed && typeof d.changed==="object"){
    const ks=Object.keys(d.changed);
    if(ks.length) parts.push(ks.map(k=>fmtDiff(k,d.changed[k])).join("; "));
    else parts.push("no field changes");
  }
  // Top-level {from,to} fields (rate amount_php, payout_method, uuid, etc.)
  ["amount_php","payout_method","uuid","default_recipient_id"].forEach(k=>{
    if(isDiff(d[k])) parts.push(fmtDiff(k,d[k]));
  });
  if(d.kind && !d.changed) parts.push(d.kind);
  if(d.contractors!=null) parts.push(`${Array.isArray(d.contractors)?d.contractors.length:d.contractors} contractor(s)`);
  if(d.rows!=null) parts.push(`${d.rows} rows`);
  if(d.entries!=null) parts.push(`${d.entries} entries`);
  if(d.count!=null) parts.push(`${d.count} item(s)`);
  if(d.total_net!=null) parts.push(`net ₱${Number(d.total_net).toLocaleString()}`);
  if(d.enabled!=null) parts.push(d.enabled?"enabled":"disabled");
  if(d.mode) parts.push(d.mode);
  if(d.hours!=null && !isDiff(d.hours)) parts.push(`${d.hours}h`);
  if(d.overrides && d.overrides.length) parts.push(`${d.overrides.length} override(s)`);
  if(Array.isArray(d.contractors) && d.contractors.length<=6) parts.push("("+d.contractors.join(", ")+")");
  if(d.reason) parts.push(`reason: ${d.reason}`);
  return parts.join(" · ");
}

const ONB_DEFAULT_REQ_DOCS = [{kind:"resume"},{kind:"diploma"},{kind:"nbi_clearance"},{kind:"gov_id",sides:["front","back"]}];
function onbReqSlots(cfg){
  const docs=((cfg&&Array.isArray(cfg.documents)&&cfg.documents.length)?cfg.documents:ONB_DEFAULT_REQ_DOCS)

// Per-required-slot Stage-3 status from the worker's uploaded docs. Mirrors the
// server's kind-level "cleared" rule (waive/defer clear the whole kind) so the
// flag never disagrees with completion. state: approved | pending |
// needs_replacement | waived | deferred | missing ("missing" = never uploaded).
function onbSlotStates(cfg, rows){
  const clearedKind={}, latest={};
  (rows||[]).forEach(d=>{
    if(d.review_status==="waived"||d.review_status==="deferred") clearedKind[d.kind]=d.review_status;
    const at=d.created_at||"";
    [d.kind+"|"+(d.side||""), d.kind+"|*"].forEach(k=>{ if(!latest[k]||at>(latest[k].created_at||"")) latest[k]=d; });
  });
  return onbReqSlots(cfg).map(s=>{
    if(clearedKind[s.kind]) return {...s, state:clearedKind[s.kind], doc:null};
    const d=latest[s.side?s.kind+"|"+s.side:s.kind+"|*"]||null;
    const state=!d?"missing":d.review_status==="approved"?"approved":d.review_status==="needs_replacement"?"needs_replacement":"pending";
    return {...s, state, doc:d};
  });
}

function mergeAgreement(body, v){

      return [(p.clientX-r.left)*(c.width/r.width),(p.clientY-r.top)*(c.height/r.height)]; };

    const move=(e)=>{ if(!drawing) return; const [x,y]=pos(e); ctx.lineTo(x,y); ctx.stroke(); setDrawn(true); e.preventDefault(); };

    c.addEventListener("mousedown",down); c.addEventListener("mousemove",move); window.addEventListener("mouseup",up);

        </div>}
        <label className="muted" style={{fontSize:12,display:"block"}}>Full legal name</label>
        <input value={name} onChange={e=>setName(e.target.value)} style={{width:"100%"}}/>
        {mode==="draw" && <div style={{margin:"8px 0"}}>
          <canvas ref={canvasRef} width={520} height={140} style={{width:"100%",border:"1px solid #cbd5e1",borderRadius:8,touchAction:"none",background:"#fff"}} aria-label="Signature drawing area"/>
          <button className="btn ghost sm" onClick={clearCanvas} style={{marginTop:4}}>Clear</button>

// Per-tool field schema for the provisioning modal.
const TOOL_FIELDS = {
  gmail:[["address","Email address"],["password","Password"]],
  providersoft:[["username","Username"],["password","Password"]],
  hubstaff:[["username","Username / email"],["password","Password / invite"]],
  zoom:[["number","Zoom number / extension"]],
};
const TOOL_NAME = { gmail:"Company Gmail", providersoft:"Providersoft", hubstaff:"Hubstaff", zoom:"Zoom" };
function toolsRequestedList(requested){
  return Object.entries(requested||{}).filter(([k,v])=> k==="others" ? String(v||"").trim() : !!v).map(([k])=>k);
}
// Admin enters the tool logins at completion. They're encrypted (set_worker_tools),
// emailed (send_tools_email) and shown in the contractor's portal pop-up.
function ToolsProvisionModal({ client, worker_id, workerName, requested, onClose, onDone }){
  const mref=useModalA11y(onClose,{escClose:false});
  const tools=toolsRequestedList(requested);
  const [vals,setVals]=useState({}); const [busy,setBusy]=useState(false); const [err,setErr]=useState("");
  const setV=(t,fk,v)=>setVals(s=>({...s,[t]:{...(s[t]||{}),[fk]:v}}));
  const inp={width:"100%",padding:8,border:"1px solid #d1d5db",borderRadius:8,margin:"2px 0",fontSize:14,boxSizing:"border-box"};
  async function save(){
    setBusy(true); setErr("");
    const creds={};
    for(const t of tools){
      if(t==="others"){ const v=((vals.others&&vals.others.details)||"").trim(); if(v) creds.others={ [String(requested.others||"Other")]:v }; continue; }
      const fields={}; for(const [fk] of (TOOL_FIELDS[t]||[])){ const v=((vals[t]&&vals[t][fk])||"").trim(); if(v) fields[fk]=v; }
      if(Object.keys(fields).length) creds[t]=fields;
    }
    if(!Object.keys(creds).length){ setErr("Enter at least one tool's login."); setBusy(false); return; }
    const { error:e1 } = await client.rpc("set_worker_tools",{ p_worker_id:worker_id, p_creds:creds });
    if(e1){ setErr("Save failed: "+e1.message); setBusy(false); return; }
    let note="";
    try{ const { data } = await client.functions.invoke("portal-admin",{body:{action:"send_tools_email",worker_id}});
      if(data&&data.emailed&&data.emailed.email_configured===false) note=" Email isn't configured yet — the contractor will still see them in the portal.";
      else if(data&&data.emailed&&data.emailed.ok===false) note=" (email send failed — portal pop-up still set)";
    }catch(_e){ note=" (email send failed — portal pop-up still set)"; }
    setBusy(false);
    logEvent(client,{action:"tools_provisioned",entity:workerName,detail:{worker_id,tools}});
    onDone&&onDone(note); onClose();
  }
  return (
    <div className="modal-bg" onClick={onClose} style={{zIndex:60}}>
      <div className="modal" ref={mref} role="dialog" aria-modal="true" onClick={e=>e.stopPropagation()} style={{maxWidth:520}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <h2 style={{margin:0,fontSize:17}}>Tool access — {workerName}</h2>
          <button className="btn ghost sm" onClick={onClose}>Close</button>
        </div>
        <p className="sub" style={{marginTop:4}}>Enter the logins to hand off. They're <b>encrypted at rest</b>, emailed to the contractor, and shown in their portal.</p>
        {tools.length===0 && <div className="empty">No tools were requested for this contractor.</div>}
        {tools.map(t=> t==="others" ? (
          <div key="others" style={{border:"1px solid #e5e7eb",borderRadius:8,padding:"10px 12px",marginBottom:8}}>
            <b style={{fontSize:13}}>Other — {String(requested.others||"")}</b>
            <textarea style={{...inp,minHeight:60}} placeholder="Details / logins" value={(vals.others&&vals.others.details)||""} onChange={e=>setV("others","details",e.target.value)}/>
          </div>
        ) : (
          <div key={t} style={{border:"1px solid #e5e7eb",borderRadius:8,padding:"10px 12px",marginBottom:8}}>
            <b style={{fontSize:13}}>{TOOL_NAME[t]||t}</b>
            {(TOOL_FIELDS[t]||[]).map(([fk,lbl])=>(
              <input key={fk} style={inp} placeholder={lbl} value={(vals[t]&&vals[t][fk])||""} onChange={e=>setV(t,fk,e.target.value)}/>
            ))}
          </div>
        ))}
        {err && <div className="err">{err}</div>}
        <div style={{display:"flex",gap:8,marginTop:8}}>
          <button className="btn" disabled={busy||!tools.length} onClick={save}>{busy?"Saving…":"Save & notify contractor"}</button>
        </div>
      </div>
    </div>
  );
}

  const onbCfg=((psRows||[])[0]||{}).onboarding_config||{};

  const ex=(w.profile_extras&&typeof w.profile_extras==="object")?w.profile_extras:{};
  const [busy,setBusy]=useState(false); const [msg,setMsg]=useState(""); const [revDoc,setRevDoc]=useState(null); const [revErr,setRevErr]=useState(null); const [deferTarget,setDeferTarget]=useState(null);
  const [toolsStatus,setToolsStatus]=useState(null); const [showTools,setShowTools]=useState(false);

  // Withdraw the offer: revoke the login + deactivate + email the candidate. The

  async function withdrawOffer(){

    logEvent(client,{action:"withdraw_offer",entity:workerName,detail:{worker_id,emailed:!!(data&&data.emailed&&data.emailed.ok)}});
    onChange&&onChange(); onClose&&onClose();
  }
  // Delete the whole hire (guarded server-side; force destroys signed/uploaded records).
  async function deleteHire(){
    setBusy(true);
    const [sig,doc]=await Promise.all([
      client.from("onboarding_signatures").select("id",{count:"exact",head:true}).eq("worker_id",worker_id),
      client.from("documents").select("id",{count:"exact",head:true}).eq("worker_id",worker_id),
    ]);

      title:`Delete ${workerName}?`,
      message:"Permanently removes their profile, onboarding records, documents, uploaded files, and portal login. This CANNOT be undone."+(records>0?`\n\n⚠ Also destroys ${sig.count||0} signed agreement(s) and ${doc.count||0} uploaded document(s).`:""),

    }))) return;
    setBusy(true); setMsg("");
    const {data,error}=await client.functions.invoke("portal-admin",{body:{action:"delete_contractor",worker_id,force:records>0}});
    setBusy(false);
    if(error||(data&&data.error)){ setMsg("Couldn't delete: "+((data&&data.error)||await fnErrorMessage(error))); return; }
    logEvent(client,{action:"delete_contractor",entity:workerName,detail:{worker_id,signatures:sig.count||0,documents:doc.count||0,from:"onboarding"}});
    onChange&&onChange(); onClose&&onClose();
  }
  // Update the login email (if corrected) + issue a fresh temp password + re-send welcome.
  async function submitResend(){
    const email=(resend.email||"").trim();
    setResend(r=>({...r,busy:true,err:""}));
    const {data,error}=await client.functions.invoke("portal-admin",{body:{action:"update_login_and_resend",worker_id,email:email||undefined}});
    if(error||(data&&data.error)){ const emsg=(data&&data.error)||("Couldn't update — "+await fnErrorMessage(error)); setResend(r=>({...r,busy:false,err:emsg})); return; }
    logEvent(client,{action:"update_login_resend",entity:workerName,detail:{worker_id,email_changed:!!(data&&data.email_changed)}});
    reloadW(); onChange&&onChange();
    setResend(r=>({...r,busy:false,done:{email:data.email,password:data.password,emailed:data.emailed,changed:!!data.email_changed}}));
  }
  const reloadTools=()=>client.rpc("get_tools_status",{p_worker_id:worker_id}).then(({data})=>setToolsStatus(data||null));
  useEffect(()=>{ reloadTools(); },[worker_id]); // eslint-disable-line
  const _toolsReq=(toolsStatus&&toolsStatus.requested)||{};
  const _hasTools=toolsRequestedList(_toolsReq).length>0;
  const _toolsProvisioned=!!(toolsStatus&&toolsStatus.provisioned_at);
  async function view(d){
    if(!d.storage_path) return;
    const win=window.open("about:blank","_blank");   // open synchronously (popup-blocker safe), then redirect
    const {data,error}=await client.storage.from("contractor-docs").createSignedUrl(d.storage_path,120);
    if(error||!data){ if(win)win.close(); setMsg("Open failed: "+((error&&error.message)||"no url")); return; }
    if(win) win.location=data.signedUrl; else window.open(data.signedUrl,"_blank");
  }
  // `d` is either an uploaded doc (has .id) or a missing required slot (.kind /
  // .side, no row yet — the function creates a placeholder). opts: {reason,
  // override, defer_until}. revErr is keyed by id OR kind|side so the inline
  // error lands on the right row.
  async function review(d,action,opts){
    opts=opts||{};
    const rowKey=d.id||(d.kind+"|"+(d.side||""));
    setBusy(true); setMsg(""); setRevErr(null);
    const reqBody={ action, reason:opts.reason||null, override:!!opts.override };
    if(d.id) reqBody.document_id=d.id; else { reqBody.worker_id=worker_id; reqBody.kind=d.kind; reqBody.side=d.side||null; }
    if(opts.defer_until) reqBody.defer_until=opts.defer_until;
    const { data, error } = await client.functions.invoke("portal-review",{body:reqBody});
    setBusy(false);
    if(error||(data&&data.error)){ setRevErr({id:rowKey,text:(data&&data.error)||await fnErrorMessage(error)}); return; }
    logEvent(client,{action:"document_review",entity:(ONB_DOC_LABEL[d.kind]||d.kind),detail:{document_id:d.id||null,kind:d.kind,side:d.side||null,action,reason:opts.reason||null,defer_until:opts.defer_until||null,override:!!opts.override}});
    reloadDocs(); onChange&&onChange();
  }
  // NBI freshness is enforced server-side (portal-review); mirror it here only to
  // label stale rows + swap "Approve" for "Approve anyway" (override). Default 6mo.
  function isNbiStale(d){
    if(d.kind!=="nbi_clearance"||!d.issued_on) return false;
    const dt=new Date(d.issued_on+"T00:00:00Z"); if(isNaN(dt.getTime())) return false;
    const e=new Date(dt); e.setUTCMonth(e.getUTCMonth()+6); return e.getTime()<Date.now();
  }
  // Admin onboarding overrides (is_admin() write policy on onboarding_progress).
  async function applyProg(patch, label, warn, onOk){
    if(!window.confirm(`${label} for ${workerName}?`+(warn?`\n\n${warn}`:""))) return;
    setBusy(true); setMsg("");
    const { error } = await client.from("onboarding_progress")
      .update({...patch, updated_at:new Date().toISOString()}).eq("worker_id",worker_id);
    setBusy(false);
    if(error){ setMsg("Failed: "+error.message); return; }
    logEvent(client,{action:"onboarding_override",entity:workerName,detail:{worker_id,label}});
    reloadProg(); onChange&&onChange(); if(onOk) onOk();
  }
  function reopenTo(stage){
    const p={ current_stage:stage, completed_at:null };
    if(stage==="stage1_sign"){ p.stage1_complete=false; p.stage2_complete=false; p.stage3_complete=false; }
    else if(stage==="stage2_profile"){ p.stage2_complete=false; p.stage3_complete=false; }
    else if(stage==="stage3_docs"){ p.stage3_complete=false; }
    applyProg(p, "Reopen to "+(ONB_STAGE_LABEL[stage]||stage), prog&&prog.completed_at?"This re-locks their pay-data access until they finish again.":null);
  }
  function markComplete(){ applyProg({ stage1_complete:true,stage2_complete:true,stage3_complete:true,current_stage:"complete",completed_at:new Date().toISOString() },
    "Mark onboarding COMPLETE", "This unlocks their pay-data access immediately.",
    ()=>{ if(_hasTools && !_toolsProvisioned) setShowTools(true); }); }
  function revoke(){ applyProg({ current_stage:"stage1_sign",stage1_complete:false,stage2_complete:false,stage3_complete:false,completed_at:null },
    "Revoke / reset onboarding", "This sends them back to Stage 1 and re-locks their pay-data access."); }
  const byKey={}; (docs||[]).forEach(d=>{ const k=d.kind+"|"+(d.side||""); (byKey[k]=byKey[k]||[]).push(d); });
  const missingSlots=onbSlotStates(onbCfg, docs||[]).filter(s=>s.state==="missing");   // required, never uploaded
  const todayISO=new Date().toISOString().slice(0,10);   // for deferred-doc overdue flagging
  const FIELDS=[["Mobile","mobile"],["Current address","ph_address"],["Permanent address","permanent_address"],["Postal","postal_code"],["Date of birth","date_of_birth"],["Emergency contact","emergency_name"],["Relationship","emergency_relationship"],["Emergency mobile","emergency_mobile"],["Marital","marital_status"],["Highest Degree Attained","education_level"],["Degree and Major","course"],["Year grad.","year_graduated"],["School","school"],["GCash","gcash"],["PayMaya","paymaya"],["PayPal","paypal"],["Wise Tag","wise_tag"]];
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" ref={mref} role="dialog" aria-modal="true" aria-labelledby="od-title" onClick={e=>e.stopPropagation()} style={{maxWidth:720}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:12}}>
          <h2 id="od-title" style={{margin:0}}>{[w.first_name,w.middle_name,w.last_name].filter(Boolean).join(" ")||w.email||"Contractor"}</h2>
          <button className="btn ghost sm" onClick={onClose}>Close</button>
        </div>
        <p className="sub" style={{marginTop:2}}>{w.email}{w.work_email?` · ${w.work_email}`:""}</p>
        {msg && <div className="banner" style={{background:"#fee2e2",borderColor:"#fca5a5"}}>{msg}</div>}

        {/* Hire management — correct the initial offer, re-send, withdraw, or delete. */}
        <div style={{display:"flex",gap:6,flexWrap:"wrap",margin:"4px 0 10px"}}>
          <button className="btn ghost sm" disabled={busy} title="Fix name, email, address, FT/PT, role, company" onClick={()=>setShowEdit(true)}>✎ Edit details</button>
          <button className="btn ghost sm" disabled={busy} title="Correct the login email, issue a fresh temp password, and re-send the welcome" onClick={()=>setResend({email:w.email||"",busy:false,err:"",done:null})}>✉ Update login &amp; resend</button>
          <span style={{flex:1}}/>
          <button className="btn ghost sm" disabled={busy} style={{color:"#b45309",borderColor:"#fcd34d"}} title="Rescind the offer and email the candidate" onClick={withdrawOffer}>⊘ Withdraw offer</button>
          <button className="btn ghost sm" disabled={busy} style={{color:"#b91c1c",borderColor:"#fca5a5"}} title="Permanently delete this hire" onClick={deleteHire}>🗑 Delete hire</button>
        </div>

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <div style={{fontSize:13}}><b>Stage:</b> {ONB_STAGE_LABEL[prog.current_stage]||prog.current_stage}
              {prog.completed_at && <span style={{marginLeft:6,color:"#166534"}}>· completed {new Date(prog.completed_at).toLocaleDateString()}</span>}
              <span className="muted" style={{marginLeft:6,fontSize:11}}>[{prog.stage1_complete?"1✓":"1"}/{prog.stage2_complete?"2✓":"2"}/{prog.stage3_complete?"3✓":"3"}]</span></div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              <button className="btn ghost sm" disabled={busy} title="Send back to signing" onClick={()=>reopenTo("stage1_sign")}>↺ Stage 1</button>
              <button className="btn ghost sm" disabled={busy} title="Send back to profile" onClick={()=>reopenTo("stage2_profile")}>↺ Stage 2</button>
              <button className="btn ghost sm" disabled={busy} title="Send back to documents" onClick={()=>reopenTo("stage3_docs")}>↺ Stage 3</button>
              {!prog.completed_at && <button className="btn sm" disabled={busy} onClick={markComplete}>✓ Mark complete</button>}
              {_hasTools && <button className="btn ghost sm" disabled={busy} title="Enter the tool logins to hand off" onClick={()=>setShowTools(true)}>🔑 Tool access{_toolsProvisioned?" ✓":""}</button>}
              <button className="btn ghost sm" disabled={busy} title="Send their onboarding back to Stage 1 (re-sign)" onClick={revoke}>↺ Reset</button>
            </div>
          </div>
          {_hasTools && <div className="muted" style={{fontSize:11,marginTop:6}}>🔑 Tools to provision: {toolsRequestedList(_toolsReq).map(t=>TOOL_NAME[t]||"Other").join(", ")}{_toolsProvisioned?" — provisioned ✓":" — not yet provisioned"}</div>}
        </div>}

        {showTools && <ToolsProvisionModal client={client} worker_id={worker_id} workerName={workerName} requested={_toolsReq}
          onClose={()=>setShowTools(false)} onDone={()=>reloadTools()}/>}

        {showEdit && <ProfileModal client={client}
          r={{ w:{id:worker_id, ...w}, workers:{id:worker_id, ...w},
               company_id: wc?wc.company_id:null, companies:(wc&&wc.companies)?{name:wc.companies.name}:{name:""},
               contract: wc?wc.contract:"FT", role: wc?wc.role:null, weekly_hours: wc?wc.weekly_hours:null, hubstaff_name: wc?wc.hubstaff_name:null, status:"active" }}
          onClose={()=>setShowEdit(false)} onBillingChange={()=>{}}
          onSaved={()=>{ reloadW(); reloadWc(); onChange&&onChange(); }}/>}

        {resend && <div className="modal-bg" onClick={()=>!resend.busy&&setResend(null)} style={{zIndex:60}}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:480}} role="dialog" aria-modal="true">
            <h2 style={{marginTop:0}}>Update login &amp; resend</h2>
            {!resend.done ? <div>
              <p className="sub">Confirm (or fix) the contractor's email — we'll update their portal login, issue a fresh temporary password, and re-send the welcome with the latest details.</p>

                <input type="email" value={resend.email} onChange={e=>setResend(r=>({...r,email:e.target.value}))} style={{width:"100%"}} aria-label="Login email"/></div>
              <p className="muted" style={{fontSize:12,marginTop:6}}>A new temp password is always issued (the old one may have reached the wrong inbox). Fix name / company / rate / contract first via <b>Edit details</b> — those changes are included in the email.</p>
              {resend.err && <div className="err" style={{fontSize:13,marginTop:6}}>{resend.err}</div>}
              <div className="actions" style={{marginTop:10}}>
                <button className="btn ghost" disabled={resend.busy} onClick={()=>setResend(null)}>Cancel</button>
                <button className="btn" disabled={resend.busy||!(resend.email||"").trim()} onClick={submitResend}>{resend.busy?"Sending…":"Update & resend"}</button>
              </div>
            </div> : <div>
              <div className="banner" style={{background:"#dcfce7",borderColor:"#86efac"}}>✓ {resend.done.changed?"Login email updated and welcome re-sent.":"Welcome re-sent with a fresh password."}{resend.done.emailed&&resend.done.emailed.email_configured===false?" Email isn't configured — share the password below manually.":""}</div>
              <div className="card" style={{background:"#f8fafc"}}>
                <div className="row"><span className="muted">Email</span><b>{resend.done.email}</b></div>
                <div className="row"><span className="muted">New temp password</span><b>{resend.done.password}</b></div>
              </div>
              <button className="btn ghost sm" onClick={()=>{ try{navigator.clipboard.writeText("Email: "+resend.done.email+"\nTemp password: "+resend.done.password);}catch(_e){} }}>Copy</button>
              <div className="actions" style={{marginTop:10}}><button className="btn" onClick={()=>setResend(null)}>Done</button></div>
            </div>}

        </div>}

        <h3 style={{marginBottom:4}}>1 · Agreements</h3>
        {(sigs||[]).length===0? <p className="sub">No signatures yet.</p> :
         <div className="table-scroll"><table>
           <thead><tr><th>Agreement</th><th>Signed name</th><th>When</th><th>IP</th><th>Ver</th></tr></thead>
           <tbody>{(sigs||[]).map((s,i)=>(<tr key={i}>
             <td>{ONB_AGR_LABEL[s.agreement_kind]||s.agreement_kind}{s.status!=="signed"?` (${s.status})`:""}</td>
             <td>{s.signed_legal_name}</td>
             <td className="muted" style={{fontSize:11,whiteSpace:"nowrap"}}>{new Date(s.signed_at).toLocaleString()}</td>
             <td className="muted" style={{fontSize:11}}>{s.ip_address||"—"}</td>
             <td className="muted" style={{fontSize:11}} title={s.doc_sha256?("sha256 "+s.doc_sha256):""}>{s.doc_version}</td>
           </tr>))}</tbody></table></div>}
        <AgreementsPanel client={client} worker_id={worker_id}
          workerName={[w.first_name,w.middle_name,w.last_name].filter(Boolean).join(" ")||w.email||"Contractor"}
          sigs={sigs} onChange={onChange} onSigChange={reloadSigs}/>

        <h3 style={{marginBottom:4,marginTop:14}}>2 · Profile</h3>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"3px 16px",fontSize:13}}>
          {FIELDS.map(([lbl,k])=>(<div key={k}><span className="muted">{lbl}:</span> {w[k]||"—"}</div>))}
        </div>
        {(ex.nickname||ex.favorite_color||ex.favorite_food||ex.tshirt_size||ex.shoe_size||ex.hobbies||ex.motto)&&<p className="muted" style={{fontSize:12,marginTop:4}}>{[ex.nickname&&"Nickname: "+ex.nickname,ex.favorite_color&&"Color: "+ex.favorite_color,ex.favorite_food&&"Food: "+ex.favorite_food,ex.tshirt_size&&"T-shirt: "+ex.tshirt_size,ex.shoe_size&&"Shoe: "+ex.shoe_size,ex.hobbies&&"Hobbies: "+ex.hobbies,ex.motto&&"Motto: "+ex.motto].filter(Boolean).join(" · ")}</p>}

        <h3 style={{marginBottom:4,marginTop:14}}>3 · Documents</h3>
        {missingSlots.length>0 && prog && prog.stage1_complete && prog.stage2_complete && !prog.completed_at && <div className="banner" style={{background:"#fef3c7",borderColor:"#fcd34d",color:"#92400e"}}>
          ⚠ {missingSlots.length} required document{missingSlots.length>1?"s":""} not uploaded yet: {missingSlots.map(s=>s.label).join(", ")}. Stage 3 stays open until {missingSlots.length>1?"these are":"this is"} provided (or waived).
        </div>}
        {(docs||[]).length===0 && missingSlots.length===0 && <p className="sub">No documents uploaded yet.</p>}
        {Object.keys(byKey).sort().map(key=>{
           const list=byKey[key]; const d=list[0]; const side=key.split("|")[1]; const kind=key.split("|")[0];
           const badge=d.review_status==="approved"?{txt:"Approved",color:"#166534",bg:"#dcfce7"}:d.review_status==="waived"?{txt:"Waived",color:"#475569",bg:"#e2e8f0"}:d.review_status==="deferred"?{txt:"Deferred · follow up",color:"#92400e",bg:"#fef3c7"}:d.review_status==="needs_replacement"?{txt:"Needs replacement",color:"#b45309",bg:"#fef3c7"}:{txt:"Pending review",color:"#1e40af",bg:"#dbeafe"};
           return (
            <div key={key} style={{borderTop:"1px solid #e5e7eb",padding:"8px 0"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>

                  <div className="muted" style={{fontSize:11}}>{d.title}{d.issued_on?` · issued ${d.issued_on}`:""}{list.length>1?` · ${list.length} versions`:""}</div></div>
                <Badge s={badge}/>
              </div>
              {d.review_status==="needs_replacement"&&d.review_reason&&<div className="muted" style={{fontSize:12}}>Reason: {d.review_reason}</div>}
              {d.review_status==="deferred"&&d.defer_until&&<div style={{fontSize:12,marginTop:2,color:d.defer_until<todayISO?"#b91c1c":"#92400e"}}>📌 Follow up by {d.defer_until}{d.defer_until<todayISO?" · overdue":""}</div>}
              {isNbiStale(d) && <div style={{fontSize:12,color:"#b45309",marginTop:4}}>⚠ Issued {d.issued_on} — older than 6 months (NBI freshness rule).</div>}
              <div style={{display:"flex",gap:6,marginTop:6,flexWrap:"wrap"}}>
                <button className="btn ghost sm" onClick={()=>view(d)} disabled={!d.storage_path}>View</button>
                {d.review_status!=="approved" && !isNbiStale(d) && <button className="btn sm" disabled={busy} onClick={()=>review(d,"approve")}>Approve</button>}
                {d.review_status!=="approved" && isNbiStale(d) && <button className="btn sm" disabled={busy} title="Override the freshness rule — recorded in the audit log" onClick={()=>review(d,"approve",{override:true})}>Approve anyway</button>}
                {d.review_status!=="needs_replacement"&&<button className="btn ghost sm" disabled={busy} onClick={()=>setRevDoc(d)}>Needs replacement</button>}
                {d.review_status!=="waived"&&<button className="btn ghost sm" disabled={busy} title="Drop this requirement for this contractor (onboarding can finish without it)" onClick={()=>{ if(window.confirm("Waive the "+(ONB_DOC_LABEL[kind]||kind)+" requirement? The contractor won't need to provide it.")) review(d,"waive"); }}>Waive</button>}
                {d.review_status!=="deferred"&&<button className="btn ghost sm" disabled={busy} title="Let onboarding finish now; collect this by a set date — shows as a follow-up in this tab" onClick={()=>setDeferTarget(d)}>Defer…</button>}
              </div>

         })}

          <div key={"miss|"+s.kind+"|"+(s.side||"")} style={{borderTop:"1px solid #e5e7eb",padding:"8px 0"}}>

              <div><b>{s.label}</b><div className="muted" style={{fontSize:11}}>Required — not uploaded yet</div></div>

            </div>

              <button className="btn ghost sm" disabled={busy} title="Let onboarding finish now; collect this by a set date — shows as a follow-up" onClick={()=>setDeferTarget(s)}>Defer…</button>
            </div>

// Defer picker — collect a REQUIRED follow-up date ("collect by") + optional
// reason before deferring a document/missing slot. The date is a tracked
// reminder only; it does not auto-relock onboarding. `target` is an uploaded doc
// or a missing required slot (both carry .kind/.label/.side).
function DeferPicker({ target, onCancel, onSubmit }){
  const mref=useModalA11y(onCancel,{escClose:false});   // has free-text/date: no Escape-close
  const todayISO=new Date().toISOString().slice(0,10);
  const [due,setDue]=useState(""); const [reason,setReason]=useState(""); const [err,setErr]=useState("");
  const label=target.label||(ONB_DOC_LABEL[target.kind]||target.kind)+(target.side?` (${target.side})`:"");
  function submit(){
    if(!due){ setErr("Pick a follow-up date."); return; }
    if(due<todayISO){ setErr("The follow-up date can't be in the past."); return; }
    onSubmit({defer_until:due, reason:reason.trim()||null});
  }
  return (
    <div className="modal-bg" onClick={e=>e.stopPropagation()}>
      <div className="modal" ref={mref} role="dialog" aria-modal="true" aria-labelledby="dp-title" onClick={e=>e.stopPropagation()} style={{maxWidth:440}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <h2 id="dp-title" style={{margin:0}}>Defer document</h2>
          <button className="btn ghost sm" onClick={onCancel}>Close</button>
        </div>
        <p className="sub">{label} — onboarding can finish now; collect this by the date below. It stays on the follow-up list until provided.</p>
        <label style={{display:"block",fontSize:13,fontWeight:600,marginTop:6}}>Collect by</label>
        <input type="date" value={due} min={todayISO} onChange={e=>{setDue(e.target.value); setErr("");}} style={{width:"100%"}}/>
        <label style={{display:"block",fontSize:13,fontWeight:600,marginTop:8}}>Note <span className="muted" style={{fontWeight:400}}>(optional)</span></label>
        <input value={reason} onChange={e=>setReason(e.target.value)} placeholder="e.g. waiting on NBI release" style={{width:"100%"}}/>
        {err && <div className="err" style={{marginTop:6}}>{err}</div>}
        <div style={{display:"flex",gap:8,marginTop:12}}>
          <button className="btn" onClick={submit}>Defer until {due||"…"}</button>
          <button className="btn ghost" onClick={onCancel}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

// Reason picker for "needs replacement" — preset reasons + optional custom text,
// replacing the old window.prompt. Returns the chosen reason string to onSubmit.
function ReasonPicker({ doc, onCancel, onSubmit }){
  const mref=useModalA11y(onCancel,{escClose:false}); // has a free-text reason: no Escape-close
  const PRESETS=["Blurry / unreadable","Expired","Wrong document","Incomplete / missing pages","Name doesn't match profile","Photo of a screen / glare"];
  const [pick,setPick]=useState(PRESETS[0]); const [custom,setCustom]=useState(""); const [err,setErr]=useState("");
  function submit(){
    const reason = pick==="Other" ? custom.trim() : pick;
    if(!reason){ setErr("Enter a reason."); return; }
    onSubmit(reason);
  }
  return (
    <div className="modal-bg" onClick={e=>e.stopPropagation()}>

    </div>
  );
}

// Editor for the standard agreement bodies (merge-field templates). Paste the

// {{start_date}} {{countersigner_name}} {{today}} where values should be filled.
function AgreementTemplatesModal({ client, onClose }){
  const [rows,setRows]=useState(null); const [sel,setSel]=useState("ic_agreement");

  function load(){ client.from("agreement_templates").select("kind,title,version,body").then(({data})=>{
    const list=(data||[]); setRows(list); const cur=list.find(r=>r.kind===sel)||list[0]; if(cur){ setSel(cur.kind); setBody(cur.body||""); } }); }
  useEffect(load,[]);

  if(rows===null) return <div className="modal-bg" onClick={close}><div className="modal" onClick={e=>e.stopPropagation()}><Skeleton rows={4}/></div></div>;
  const pick=(k)=>{ const r=rows.find(x=>x.kind===k); setSel(k); setBody((r&&r.body)||""); setMsg(""); };
  async function save(){
    setBusy(true); setMsg("");

    setRows(rs=>rs.map(r=>r.kind===sel?{...r,body}:r));
    return true;
  }
  return (
    <div className="modal-bg" onClick={close}>

          <b>Parties:</b> <code>{"{{employer_name}}"}</code> = the contracting employer (Aaron Anderson E.H.S. LLC) · <code>{"{{client_name}}"}</code> (a.k.a. <code>{"{{company_name}}"}</code>) = the assigned client company · <code>{"{{contractor_name}}"}</code> · <code>{"{{countersigner_name}}"}</code><br/>
          <b>Engagement:</b> <code>{"{{position}}"}</code> · <code>{"{{rate}}"}</code> (per period) · <code>{"{{monthly_rate}}"}</code> · <code>{"{{start_date}}"}</code> · <code>{"{{contractor_address}}"}</code> · <code>{"{{employment_type}}"}</code> (e.g. “Full-time (40 hours/week)”) · <code>{"{{hours_per_week}}"}</code> · <code>{"{{schedule}}"}</code> (shift) · <code>{"{{today}}"}</code> · <code>{"{{addendum}}"}</code><br/>
          <span className="muted" style={{fontSize:12}}>If you don’t place <code>{"{{employment_type}}"}</code>/<code>{"{{schedule}}"}</code> in the text, an “Engagement: … Work schedule: …” line is appended automatically.</span></p>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
          {rows.map(r=>(<button key={r.kind} className={"btn sm "+(sel===r.kind?"":"ghost")} onClick={()=>pick(r.kind)}>{ONB_AGR_LABEL[r.kind]||r.kind}</button>))}
        </div>
        <textarea value={body} onChange={e=>setBody(e.target.value)} style={{width:"100%",minHeight:340,fontFamily:"monospace",fontSize:13,padding:10}}/>
        {msg && <div className="muted" style={{fontSize:13,marginTop:4}}>{msg}</div>}
        <div style={{display:"flex",gap:8,marginTop:8}}>
          <button className="btn" disabled={busy} onClick={save}>{busy?"Saving…":"Save template"}</button>
        </div>
      </div>
    </div>
  );
}
// Editor for portal_settings.onboarding_config — friendly form (enabled gate +
// Documents + Agreements lists) with a raw-JSON escape hatch. The form edits the
// common 90%; ANY other keys present (e.g. profile_tabs) are preserved verbatim.
// Agreement WORDING lives in agreement_templates (the "Agreement templates"
// editor) keyed by `kind` — this list only controls which appear and their order.
const ONB_DEFAULT_DOCS=[{kind:"resume",title:"Resume / CV",required:true},{kind:"diploma",title:"Diploma or Transcript of Records",required:true},{kind:"nbi_clearance",title:"NBI Clearance",required:true,freshness_months:6},{kind:"gov_id",title:"Government-issued ID or Passport",required:true,sides:["front","back"]}];
function ocSlug(s){ return String(s||"").toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_+|_+$/g,"").slice(0,40)||"item"; }
// Allowed signature methods per signing party. "both" preserves the historical
// behavior (contractor & countersigner pick Type or Draw); "typed"/"drawn" lock
// the choice. Read by the portal SignaturePad and admin CountersignModal.
const SIG_METHOD_OPTS=[["both","Typed or drawn"],["typed","Typed only"],["drawn","Drawn only"]];
function ocSigMethods(c){ const s=(c&&c.signature_methods)||{}; const norm=v=>["both","typed","drawn"].includes(v)?v:"both";
  return { contractor:norm(s.contractor), countersigner:norm(s.countersigner) }; }
function ocUniq(items){ const seen={}; return items.map(o=>{ let k=o.kind||"item"; if(seen[k]){ let n=2; while(seen[k+"_"+n])n++; k=k+"_"+n; } seen[k]=1; return {...o,kind:k}; }); }
function OnboardingConfigModal({ client, onClose }){
  const [cfg,setCfg]=useState(null);
  const [enabled,setEnabled]=useState(false);
  const [docs,setDocs]=useState([]);
  const [agrs,setAgrs]=useState([]);
  const [sigMethods,setSigMethods]=useState({contractor:"both",countersigner:"both"});
  const [hireEmails,setHireEmails]=useState(ONB_DEFAULT_HIRE_EMAILS);          // new-hire credential + welcome emails
  const [reviewNotify,setReviewNotify]=useState({enabled:true,frequency:"daily",include_deferred:true}); // review digest
  const [recipientsRaw,setRecipientsRaw]=useState("");                          // digest recipients, edited as a string
  const [mode,setMode]=useState("form");        // "form" | "json"
  const [text,setText]=useState("");
  const [busy,setBusy]=useState(false); const [msg,setMsg]=useState("");
  const close=guardedClose(onClose);   // prompt to Save/Discard if the config has unsaved edits
  const mref=useModalA11y(close,{escClose:false, dep:cfg!==null}); // re-establish trap once config loads
  const ucBase=React.useRef(null); const jsonBase=React.useRef("");   // jsonBase tracks the textarea baseline so merely VIEWING raw JSON isn't "dirty"
  const ucSnap=()=>JSON.stringify({enabled,docs,agrs,sigMethods,hireEmails,reviewNotify,recipientsRaw});   // form state only — raw-JSON edits tracked separately
  useEffect(()=>{ if(cfg!==null) ucBase.current=ucSnap(); }, [cfg]);   // baseline = freshly loaded/saved config
  useUnsavedGuard({ dirty: (ucBase.current!==null && ucSnap()!==ucBase.current) || (mode==="json" && text!==jsonBase.current), label:"the onboarding configuration", save: ()=>save() });
  function hydrate(c){
    setCfg(c); setEnabled(!!c.onboarding_enabled);
    setDocs(Array.isArray(c.documents)&&c.documents.length ? c.documents.map(d=>({...d})) : ONB_DEFAULT_DOCS.map(d=>({...d})));
    setAgrs(Array.isArray(c.agreements) ? c.agreements.slice().sort((a,b)=>(a.order||0)-(b.order||0)).map(a=>({...a})) : []);
    setSigMethods(ocSigMethods(c));
    const he=c.hire_emails||{};
    setHireEmails({ auto_send:he.auto_send!==false,
      portal_url:he.portal_url||ONB_DEFAULT_HIRE_EMAILS.portal_url,
      wise_referral_url:he.wise_referral_url||ONB_DEFAULT_HIRE_EMAILS.wise_referral_url,
      hubstaff_install_url:he.hubstaff_install_url||ONB_DEFAULT_HIRE_EMAILS.hubstaff_install_url,
      welcome:{...ONB_DEFAULT_HIRE_EMAILS.welcome, ...(he.welcome||{})},
      credentials:{...ONB_DEFAULT_HIRE_EMAILS.credentials, ...(he.credentials||{})},
      tools:{...ONB_DEFAULT_HIRE_EMAILS.tools, ...(he.tools||{})} });
    const rn=c.review_notify||{};
    setReviewNotify({ enabled:rn.enabled!==false, frequency:rn.frequency||"daily", include_deferred:rn.include_deferred!==false });
    setRecipientsRaw((Array.isArray(rn.recipients)?rn.recipients:[]).join(", "));
    const j=JSON.stringify(c,null,2); setText(j); jsonBase.current=j;
  }
  function load(){ client.from("portal_settings").select("onboarding_config").eq("id",1).maybeSingle()
    .then(({data})=>hydrate((data&&data.onboarding_config)||{})); }
  useEffect(load,[]);
  if(cfg===null) return <div className="modal-bg" onClick={close}><div className="modal" onClick={e=>e.stopPropagation()}><Skeleton rows={4}/></div></div>;

  // Build the object to save from the form, PRESERVING any keys not in the form.
  function buildFromForm(){
    const cleanDocs=ocUniq(docs.filter(d=>(d.title||"").trim()).map(d=>{
      const o={...d}; o.kind=d.kind||ocSlug(d.title); o.title=d.title.trim(); o.required=d.required!==false;
      if(Array.isArray(d.sides)&&d.sides.length) o.sides=["front","back"]; else delete o.sides;
      const fm=Number(d.freshness_months); if(Number.isFinite(fm)&&fm>0) o.freshness_months=fm; else delete o.freshness_months;
      return o;
    }));
    const cleanAgrs=ocUniq(agrs.filter(a=>(a.title||"").trim()).map((a,i)=>{
      const o={...a}; o.kind=a.kind||ocSlug(a.title); o.title=a.title.trim(); o.required=a.required!==false; o.order=i+1;
      return o;
    }));
    return {...cfg, onboarding_enabled:enabled, documents:cleanDocs, agreements:cleanAgrs,
      signature_methods:{contractor:sigMethods.contractor, countersigner:sigMethods.countersigner},
      hire_emails:{ auto_send:hireEmails.auto_send!==false,
        portal_url:(hireEmails.portal_url||"").trim(),
        wise_referral_url:(hireEmails.wise_referral_url||"").trim(),
        hubstaff_install_url:(hireEmails.hubstaff_install_url||"").trim(),
        welcome:{ subject:(hireEmails.welcome&&hireEmails.welcome.subject)||"", html:(hireEmails.welcome&&hireEmails.welcome.html)||"" },
        credentials:{ subject:(hireEmails.credentials&&hireEmails.credentials.subject)||"", html:(hireEmails.credentials&&hireEmails.credentials.html)||"" },
        tools:{ subject:(hireEmails.tools&&hireEmails.tools.subject)||"", html:(hireEmails.tools&&hireEmails.tools.html)||"" } },
      review_notify:{ enabled:reviewNotify.enabled!==false,
        frequency:["daily","weekdays","weekly"].indexOf(reviewNotify.frequency)>=0?reviewNotify.frequency:"daily",
        include_deferred:reviewNotify.include_deferred!==false,

  }
  const preview = buildFromForm();

  async function save(){

    if(mode==="json"){

// ===== Phase 4 (behavioral): risk-proportional confirm dialog =============
// Replaces window.confirm() on high-risk/irreversible actions with a styled
// modal. For irreversible ones the user must TYPE a confirm word (LOCK / DELETE
// / the entity name). Promise-based + imperative so handlers just do
// `if(!(await confirmDanger({...}))) return;` — no prop threading. Falls back to
// window.confirm if the host isn't mounted yet (safety).
let _dangerOpen = null;     // setter installed by the mounted <DangerConfirm/>
let _dangerResolve = null;  // resolver for the in-flight confirm promise
function confirmDanger(opts){
  return new Promise(resolve=>{
    if(typeof _dangerOpen === "function"){
      if(_dangerResolve){ const prev=_dangerResolve; _dangerResolve=null; prev(false); } // settle any stale confirm
      _dangerResolve = resolve; _dangerOpen(opts||{});
    }
    else { resolve(window.confirm((opts&&(opts.message||opts.title))||"Are you sure?")); }
  });
}
function DangerConfirm(){
  const [opts,setOpts]=useState(null);
  const [typed,setTyped]=useState("");
  useEffect(()=>{ _dangerOpen=(o)=>{ setOpts(o); setTyped(""); };
    return ()=>{ _dangerOpen=null; if(_dangerResolve){ const r=_dangerResolve; _dangerResolve=null; r(false); } }; },[]);
  const done=useCallback((val)=>{ setOpts(null); setTyped(""); const r=_dangerResolve; _dangerResolve=null; if(r) r(val); },[]);
  useEffect(()=>{
    if(!opts) return;
    // Register as the topmost modal so any underlying useModalA11y dialog (e.g.
    // the Companies modal that triggered this confirm) sees isTop()===false and
    // stands down — otherwise its own Escape handler would close IT instead of
    // this confirm, and its Tab-trap would pull focus behind this dialog.
    const token={}; _modalStack.push(token);
    const onKey=(e)=>{ if(e.key==="Escape") done(false); };
    window.addEventListener("keydown",onKey);
    return ()=>{ window.removeEventListener("keydown",onKey);
      const i=_modalStack.indexOf(token); if(i>=0) _modalStack.splice(i,1); };
  },[opts,done]);
  if(!opts) return null;
  const needWord = !!opts.confirmWord;
  const ready = !needWord || typed.trim().toLowerCase()===String(opts.confirmWord).trim().toLowerCase();
  // zIndex above any regular modal (.modal-bg is 20, or 50 on mobile) so a confirm
  // triggered from INSIDE another modal — e.g. archiving a company, or
  // confirmBillingDirty from the profile editor — appears on top, not behind it.
  // Inline beats the media-query class without !important.
  return (
    <div className="modal-bg" onClick={()=>done(false)} style={{zIndex:1000}}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:460}}
           role="dialog" aria-modal="true" aria-labelledby="danger-title">
        <h2 id="danger-title" style={{marginTop:0}}>{opts.title||"Please confirm"}</h2>
        {opts.message && <p className="sub" style={{marginBottom:opts.consequence?10:14,whiteSpace:"pre-wrap"}}>{opts.message}</p>}
        {opts.consequence && <div className="banner warn" style={{marginBottom:14,whiteSpace:"pre-wrap"}}>{opts.consequence}</div>}
        {needWord && <div className="field" style={{marginBottom:4}}>
          <label>Type <b>{opts.confirmWord}</b> to confirm</label>
          <input autoFocus value={typed} onChange={e=>setTyped(e.target.value)}
                 onKeyDown={e=>{ if(e.key==="Enter"&&ready) done(true); }}
                 aria-label={"Type "+opts.confirmWord+" to confirm"} />
        </div>}
        <div className="actions">
          <button className="btn ghost" autoFocus={!needWord} onClick={()=>done(false)}>Cancel</button>
          <button className="btn danger" disabled={!ready} onClick={()=>done(true)}>{opts.confirmLabel||"Confirm"}</button>
        </div>
      </div>
    </div>
  );
}

// ===== Phase 6: shared modal accessibility ================================
// useModalA11y(onClose, {escClose}) — attach the returned ref to a modal's inner
// .modal div (also give it role="dialog" aria-modal="true" + aria-labelledby on
// the heading). On open: focuses the first control and TRAPS Tab inside the
// dialog; on close: restores focus to the trigger. Escape-to-close is OPT-IN
// (escClose) so data-entry forms don't lose unsaved input on a stray Escape.
// Algorithm verified headlessly by tools/modal-a11y-check.mjs.
let _modalStack = [];   // tokens for currently-open modals; only the TOP one handles keys
function useModalA11y(onClose, opts){
  const ref = React.useRef(null);
  const closeRef = React.useRef(onClose); closeRef.current = onClose;
  const escClose = !!(opts && opts.escClose);
  const dep = opts && opts.dep;   // optional: re-establish the trap when this changes (e.g. content loaded after a skeleton, or a wizard branch switch)
  useEffect(()=>{
    const node = ref.current; if(!node) return;   // tolerates modals that early-return null
    const token = {};
    _modalStack.push(token);
    const isTop = ()=> _modalStack[_modalStack.length-1]===token;  // nested modals: only innermost acts
    const prevFocus = document.activeElement;
    const SEL='a[href],button:not([disabled]),input:not([disabled]),select:not([disabled]),textarea:not([disabled]),[tabindex]:not([tabindex="-1"])';
    const focusables = ()=>Array.from(node.querySelectorAll(SEL)).filter(el=>el.offsetWidth>0||el.offsetHeight>0||el===document.activeElement);
    const f=focusables();
    if(f[0]){ try{ f[0].focus(); }catch(_){} }
    else { try{ node.setAttribute("tabindex","-1"); node.focus(); }catch(_){} }
    const onKey=(e)=>{
      if(!isTop()) return;   // a more-recently-opened modal owns the keyboard
      if(e.key==="Escape"){ if(escClose){ e.preventDefault(); e.stopPropagation(); closeRef.current && closeRef.current(); } return; }
      if(e.key==="Tab"){
        const els=focusables(); if(!els.length){ e.preventDefault(); return; }
        const first=els[0], last=els[els.length-1], active=document.activeElement;
        if(!node.contains(active)){ e.preventDefault(); first.focus(); return; }
        if(e.shiftKey && active===first){ e.preventDefault(); last.focus(); }
        else if(!e.shiftKey && active===last){ e.preventDefault(); first.focus(); }
      }
    };
    document.addEventListener("keydown", onKey, true);
    return ()=>{ document.removeEventListener("keydown", onKey, true);
      _modalStack = _modalStack.filter(t=>t!==token);
      try{ prevFocus && prevFocus.focus && prevFocus.focus(); }catch(_){} };
  },[escClose, dep]);
  return ref;
}

// Compact relative time for the "updated Xm ago" freshness stamp.
function timeAgo(iso){
  if(!iso) return "";
  const t=new Date(iso).getTime(); if(isNaN(t)) return "";
  const s=Math.max(0,(Date.now()-t)/1000);
  if(s<45) return "just now";
  const m=s/60; if(m<60){ return Math.max(1,Math.round(m))+" min ago"; }
  const h=m/60; if(h<24){ const v=Math.round(h); return v+(v===1?" hr ago":" hrs ago"); }
  const d=h/24; if(d<30){ const v=Math.round(d); return v+(v===1?" day ago":" days ago"); }
  return new Date(iso).toISOString().slice(0,10);
}

// Tiny inline-SVG sparkline (no chart library → fast + CSP-safe). Stretches to
// fill its flex cell; non-scaling stroke keeps the line crisp at any width.
function Sparkline({values, width=240, height=44}){
  const vals=(values||[]).map(v=>Number(v)||0);
  if(vals.length<2) return null;
  const min=Math.min(...vals), max=Math.max(...vals), span=(max-min)||1, n=vals.length;
  const x=i=> (i/(n-1))*(width-4)+2;
  const y=v=> (height-3) - ((v-min)/span)*(height-6);
  const pts=vals.map((v,i)=>[x(i),y(v)]);
  const line=pts.map(p=>p[0].toFixed(1)+","+p[1].toFixed(1)).join(" ");
  const area="2,"+(height-2)+" "+line+" "+(width-2)+","+(height-2);
  const last=pts[pts.length-1];
  return (
    <svg className="ov-spark" viewBox={"0 0 "+width+" "+height} preserveAspectRatio="none" role="img" aria-hidden="true">
      <polygon className="ov-spark-area" points={area}/>
      <polyline className="ov-spark-poly" points={line}/>
      <circle className="ov-spark-dot" cx={last[0]} cy={last[1]} r="2.6"/>
    </svg>
  );
}
