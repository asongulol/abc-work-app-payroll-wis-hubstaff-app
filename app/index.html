// ============================ PAYROLL RUN ====================================
const HA_ANNUAL=20000, HA_ELIG_DAYS=180, PERIODS_PER_YEAR=24;
const FT_DAY_HOURS=8, PT_DAY_HOURS=4;   // hours per working day by contract
const PAYOUT_CHANNELS=["wise","bpi","gcash","paymaya","paypal"];  // matches the files

function money(n,cur){ if(n==null)return "—";
  return (cur==="USD"?"$":"PHP ")+Number(n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); }

// --- holiday engine ---------------------------------------------------------
// Expected hours = (all calendar days in period x day-hours) - (day-hours per
// observed holiday in period). Day-hours = 8 (FT) / 4 (PT).
function _nthWeekday(y,m,wd,n){const f=new Date(y,m,1).getDay();return new Date(y,m,1+((wd-f+7)%7)+(n-1)*7);}
function _lastWeekday(y,m,wd){const last=new Date(y,m+1,0);return new Date(y,m,last.getDate()-((last.getDay()-wd+7)%7));}
function _easter(y){const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,
  f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,
  l=(32+2*e+2*i-h-k)%7,mm=Math.floor((a+11*h+22*l)/451),mo=Math.floor((h+l-7*mm+114)/31),
  da=((h+l-7*mm+114)%31)+1;return new Date(y,mo-1,da);}
const _isoD=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
// Default observed holidays for a given year (the offices' list).
function defaultHolidays(year){
  const e=_easter(year), gf=new Date(e); gf.setDate(e.getDate()-2);
  const thx=_nthWeekday(year,10,4,4), aft=new Date(thx); aft.setDate(thx.getDate()+1);
  return [
    {name:"New Year's Day", date:_isoD(new Date(year,0,1))},
    {name:"Martin Luther King Jr. Day", date:_isoD(_nthWeekday(year,0,1,3))},
    {name:"Good Friday", date:_isoD(gf)},
    {name:"Memorial Day", date:_isoD(_lastWeekday(year,4,1))},
    {name:"Independence Day", date:_isoD(new Date(year,6,4))},
    {name:"Labor Day", date:_isoD(_nthWeekday(year,8,1,1))},
    {name:"Indigenous Peoples' Day", date:_isoD(_nthWeekday(year,9,1,2))},
    {name:"Thanksgiving Day", date:_isoD(thx)},
    {name:"Day after Thanksgiving", date:_isoD(aft)},
    {name:"Christmas Day", date:_isoD(new Date(year,11,25))},
  ];
}
// Load holidays for a year: user-saved overrides (localStorage) else defaults.
function getHolidays(year){
  try{const raw=localStorage.getItem("holidays_"+year); if(raw)return JSON.parse(raw);}catch(e){}
  return defaultHolidays(year);
}
function saveHolidays(year,list){ localStorage.setItem("holidays_"+year, JSON.stringify(list)); }
function _isWeekday(dateStr){ const wd=new Date(dateStr+"T00:00:00").getDay(); return wd>=1 && wd<=5; }
// count holiday dates within [start,end] inclusive. weekdayOnly: only holidays
// that land on a Mon-Fri (a Sat/Sun holiday doesn't reduce expected work).
function holidaysInRange(start,end,weekdayOnly){
  const ys=new Date(start).getFullYear(), ye=new Date(end).getFullYear();
  let all=[]; for(let y=ys;y<=ye;y++) all=all.concat(getHolidays(y));
  return all.filter(h=>h.date>=start && h.date<=end && (!weekdayOnly || _isWeekday(h.date)));
}
// Expected hours: WORKING DAYS (Mon-Fri) in period x dayHours, minus dayHours
// for each holiday that falls on a working day.
function expectedHours(contract, start, end){
  const dayH = contract==="PT"?PT_DAY_HOURS:FT_DAY_HOURS;
  const s=new Date(start+"T00:00:00"), e=new Date(end+"T00:00:00");
  let weekdays=0;
  for(let d=new Date(s); d<=e; d.setDate(d.getDate()+1)){
    const wd=d.getDay(); if(wd>=1 && wd<=5) weekdays++;
  }
  const hol=holidaysInRange(start,end,true).length;   // weekday holidays only
  return Math.max(0, weekdays*dayH - hol*dayH);
}

// Health allowance for a period (fixed 20k/yr, eligible 6 months after hire).
function healthAllowance(hire, ps, pe){
  if(!hire)return 0;
  const h=new Date(hire), elig=new Date(h.getTime()+HA_ELIG_DAYS*86400000);
  if(new Date(pe) < elig) return 0;
  // anniversary mode: full 20k in the period containing the hire-month/day anniversary
  const y=new Date(ps).getFullYear();
  const anniv=new Date(y, h.getMonth(), Math.min(h.getDate(),28));
  if(new Date(ps)<=anniv && anniv<=new Date(pe) && anniv>=elig) return HA_ANNUAL;
  return 0;
}
// 13th-month: (months worked this year / 12) x MONTHLY rate, then SPLIT IN TWO
// (paid across two periods). monthly = per-period rate x 2.
//   full 13th  = (monthsWorked/12) * (ratePhp*2)
//   per payment = full 13th / 2  = (monthsWorked/12) * ratePhp
// monthsWorked counts from Jan 1 (or hire date if later) through the period end,
// capped at 12. Editable per payee in the table.
function monthsWorkedInYear(hire, periodEnd){
  const end=new Date(periodEnd+"T00:00:00");
  const yearStart=new Date(end.getFullYear(),0,1);
  let from=yearStart;
  if(hire){ const h=new Date(hire); if(h>from && h.getFullYear()===end.getFullYear()) from=h; }
  // whole + partial months between `from` and `end`
  let months=(end.getFullYear()-from.getFullYear())*12 + (end.getMonth()-from.getMonth());
  months += (end.getDate() - from.getDate())/30;   // partial month
  return Math.max(0, Math.min(12, months));
}
function thirteenthAccrual(ratePhp, hire, periodEnd){
  if(!ratePhp) return 0;
  const mw=monthsWorkedInYear(hire, periodEnd);
  return +((mw/12) * ratePhp).toFixed(2);   // = half of the full annual 13th
}

// --- semi-monthly periods + arrears pay dates -------------------------------
const iso=d=>d.toISOString().slice(0,10);
const lastDay=(y,m)=>new Date(y,m+1,0).getDate();   // m is 0-based
// Given any date string, return the half-month period {start,end,payDate}.
// Pay rule (arrears): 1-15 -> paid end of SAME month; 16-end -> paid 15th of NEXT month.
function periodFor(dateStr){
  const d=new Date(dateStr+"T00:00:00");
  const y=d.getFullYear(), m=d.getMonth(), day=d.getDate();
  if(day<=15){
    return {start:iso(new Date(y,m,1)), end:iso(new Date(y,m,15)),
            payDate:iso(new Date(y,m,lastDay(y,m)))};            // end of same month
  } else {
    const ny=m===11?y+1:y, nm=m===11?0:m+1;
    return {start:iso(new Date(y,m,16)), end:iso(new Date(y,m,lastDay(y,m))),
            payDate:iso(new Date(ny,nm,15))};                    // 15th of next month
  }
}

// Editable holiday config for a given year (persists in localStorage).
function HolidayEditor({year, onChange}){
  const [list,setList]=useState(getHolidays(year));
  useEffect(()=>{ setList(getHolidays(year)); },[year]);
  function commit(next){ setList(next); saveHolidays(year,next); onChange&&onChange(); }
  function edit(i,field,val){ const n=list.map((h,j)=>j===i?{...h,[field]:val}:h); commit(n); }
  function add(){ commit([...list,{name:"New holiday",date:`${year}-01-01`}]); }
  function del(i){ commit(list.filter((_,j)=>j!==i)); }
  function reset(){ localStorage.removeItem("holidays_"+year); commit(defaultHolidays(year)); }
  return (
    <div className="card">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <div><h2>Observed holidays · {year}</h2>
          <p className="sub">Each holiday in a period reduces Expected hours by one day
            (8h full-time / 4h part-time). Edit, add, or remove — changes save automatically.</p></div>
        <div style={{display:"flex",gap:8}}>
          <button className="btn ghost sm" onClick={add}>+ Add</button>
          <button className="btn ghost sm" onClick={reset}>Reset to defaults</button>
        </div>
      </div>
      <table>
        <thead><tr><th>Holiday</th><th>Date</th><th></th></tr></thead>
        <tbody>
          {list.map((h,i)=>(
            <tr key={i}>
              <td><input value={h.name} onChange={e=>edit(i,"name",e.target.value)} style={{width:"100%",border:"none",fontSize:13}}/></td>
              <td><input type="date" value={h.date} onChange={e=>edit(i,"date",e.target.value)}/></td>
              <td style={{textAlign:"right"}}><button className="btn ghost sm" onClick={()=>del(i)}>Remove</button></td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function Payroll({client,companyId,consolidated,confirmBillingDirty,openContractor}){
  const gate = (label)=> typeof confirmBillingDirty==="function" ? confirmBillingDirty(label) : true;
  const today=new Date();
  const def=periodFor(iso(today));
  const [start,setStart]=useState(def.start);
  const [end,setEnd]=useState(def.end);
  const [payDate,setPayDate]=useState(def.payDate);
  const [autoDates,setAutoDates]=useState(true);   // auto-fill from imported file dates
  const [fx,setFx]=useState(58.0);            // PHP per 1 USD (reference only; paid in PHP)
  const [fxAuto,setFxAuto]=useState(true);    // true until the user types over it
  const [fxNote,setFxNote]=useState("");      // shows "live rate as of …"
  const [includeHA,setIncludeHA]=useState(true);
  const [include13,setInclude13]=useState(false);
  const [rows,setRows]=useState(null);
  const [period,setPeriod]=useState(null);    // {id,state}
  const [msg,setMsg]=useState("");
  const [busy,setBusy]=useState(false);
  const [showHol,setShowHol]=useState(false);
  const [holTick,setHolTick]=useState(0);     // bump to re-read holidays after edits
  const [undo,setUndo]=useState(null);        // {label,fn} — rollback after a destructive recalculation
  const periodHolidays=holidaysInRange(start,end,true);   // weekday holidays (what's subtracted)
  const ftExp=expectedHours("FT",start,end), ptExp=expectedHours("PT",start,end);
  // sort + filter for the pay-statements table (display only; edits key by worker_id)
  const {rows:sfRows, Th:SfTh, q:sfQ, setQ:sfSetQ}=useSortFilter(rows||[],{
    name:r=>r.name, worked:r=>r.worked, ratio:r=>r.ratio, rate:r=>r.rate,
    net:r=>r.net, method:r=>r.method,
  },["name"]);

  // default the period from the most recent imported time. If that period is
  // already locked/paid, advance to the NEXT period so you start fresh instead
  // of reloading a finished draft.
  useEffect(()=>{
    if(!client||!companyId||!autoDates)return;
    (async()=>{
      const {data}=await client.from("time_entries").select("work_date")
        .eq("company_id",companyId).order("work_date",{ascending:false}).limit(1);
      if(!(data&&data[0]))return;
      let p=periodFor(data[0].work_date);
      // if that period is locked/paid, jump to the next half-month
      const {data:pp}=await client.from("pay_periods").select("state")
        .eq("company_id",companyId).eq("period_start",p.start).eq("period_end",p.end).maybeSingle();
      if(pp && pp.state && pp.state!=="open"){
        const nextDay=new Date(p.end+"T00:00:00"); nextDay.setDate(nextDay.getDate()+1);
        p=periodFor(nextDay.toISOString().slice(0,10));
      }
      setStart(p.start);setEnd(p.end);setPayDate(p.payDate);
    })();
  },[client,companyId,autoDates]);

  // On mount / when company+period settle, restore any saved draft or locked
  // snapshot so a calculated payroll survives tab-switches and refreshes.
  useEffect(()=>{ if(client&&companyId&&start&&end) loadSaved(); /* eslint-disable-next-line */
  },[client,companyId,start,end]);

  // Auto-save edits (gross override, PDD, recipient/method) back to the draft,
  // debounced, so manual changes also survive navigation. Skip locked periods.
  useEffect(()=>{
    if(!rows||!rows.length||(period&&period.state&&period.state!=="open"))return;
    const t=setTimeout(()=>{ saveDraft(rows); }, 800);
    return ()=>clearTimeout(t);
    /* eslint-disable-next-line */
  },[rows]);

  // fetch today's live PHP/USD rate once (free API, no key); user can override.
  useEffect(()=>{
    let cancelled=false;
    fetch("https://open.er-api.com/v6/latest/USD")
      .then(r=>r.json())
      .then(d=>{ if(cancelled)return;
        const php=d&&d.rates&&d.rates.PHP;
        if(php){ if(fxAuto) setFx(+(+php).toFixed(4));
          setFxNote(`live rate ${(+php).toFixed(2)} as of ${d.time_last_update_utc?d.time_last_update_utc.slice(5,16):"today"}`); }
      })
      .catch(()=>{ if(!cancelled) setFxNote("couldn't fetch live rate — using last value, editable"); });
    return ()=>{ cancelled=true; };
    /* eslint-disable-next-line */
  },[]);

  // keep pay date in sync when the period start changes (unless user overrides)
  function applyStart(v){ setStart(v); const p=periodFor(v); setEnd(p.end); setPayDate(p.payDate); }

  async function calculate(){
    if(!companyId){setMsg("Pick a single company first.");return;}
    if(!gate("Calculate")) return;
    // GUARD: recalculating rebuilds every row purely from tracked hours. That DISCARDS any
    // manual gross overrides AND any adjustments/allowances (Health Allowance, PDD Lunch, 13th,
    // bonus) currently saved for this period — e.g. amounts brought in by an import. Warn loudly
    // and snapshot the prior values so the user can roll back.
    const prevRows = rows;
    const adjusted = (prevRows||[]).filter(r=>
      r.overridden || (r.ha||0)>0 || (r.pdd||0)>0 || (r.bonus||0)>0 || r.t13_overridden ||
      (Array.isArray(r.misc_items) && r.misc_items.length>0));
    if(adjusted.length){
      const names = adjusted.slice(0,8).map(r=>r.name).join(", ") + (adjusted.length>8?` +${adjusted.length-8} more`:"");
      // Spell out Misc entries explicitly — they're the easiest to forget since
      // they live behind a popup, not an inline column.
      const miscRows = adjusted.filter(r=>Array.isArray(r.misc_items) && r.misc_items.length>0);
      const miscDetail = miscRows.slice(0,6).map(r=>{
        const items=r.misc_items.map(it=>{
          if(it.kind==="other_hours") return `${it.label} ${it.hours}h`;
          if(it.kind==="deduction")   return `-${it.label} ₱${Number(it.amount).toLocaleString()}`;
          return `${it.label} ₱${Number(it.amount).toLocaleString()}`;
        }).join(", ");
        return `   • ${r.name}: ${items}`;
      }).join("\n") + (miscRows.length>6?`\n   …and ${miscRows.length-6} more with Misc entries`:"");
      const ok = window.confirm(
        "⚠️  RECALCULATING WILL RESET ALL OVERRIDES AND ADJUSTMENTS\n\n"+
        `This period has ${adjusted.length} contractor(s) with manual overrides or adjustments `+
        `(gross overrides, Health Allowance, 13th-month, Lunch, bonus, or Misc items):\n`+
        `   ${names}\n\n`+
        (miscRows.length
          ? `Misc entries that will be WIPED (${miscRows.length} contractor(s)):\n${miscDetail}\n\n`
          : "")+
        "Recalculating rebuilds every amount from tracked hours only and will OVERWRITE those "+
        "values (allowances reset to 0, overrides and Misc items discarded). This is what happened "+
        "to imported historical amounts.\n\n"+
        "An \"Undo recalculation\" button will appear so you can restore the current values.\n\n"+
        "Recalculate and overwrite anyway?");
      if(!ok){ setMsg("Recalculation cancelled — existing overrides and adjustments were kept."); return; }
      // snapshot the current saved amounts so the user can roll back
      const snapshot = prevRows.map(r=>({...r}));
      const snapStart=start, snapEnd=end, snapPid=period?.id;
      setUndo({ label:`Recalculation overwrote ${adjusted.length} override(s)/adjustment(s). Restore the prior amounts?`,
        fn:async()=>{
          setRows(snapshot.map(r=>({...r})));
          // re-persist the snapshot if the period is still an editable draft
          await saveDraft(snapshot);
          logEvent(client,{company_id:companyId,action:"undo",entity:"recalculate",
            detail:{period:`${snapStart} → ${snapEnd}`, restored:snapshot.length}});
          setMsg(`Restored prior amounts for ${snapshot.length} contractor(s).`);
        }});
      // durable trail: record that a recalc overwrote adjustments
      logEvent(client,{company_id:companyId,action:"recalculate",entity:`${start} → ${end}`,
        detail:{overwrote_adjustments:adjusted.length,
          contractors:adjusted.map(r=>r.name)}});
    } else {
      setUndo(null);
    }
    setBusy(true);setMsg("");setRows(null);
    // 1. approved time in range — both tracked AND paid PTO count toward worked_hours
    const {data:te,error:e1}=await client.from("time_entries")
      .select("worker_id,source_name,work_date,tracked_seconds,pto_seconds,approval")
      .eq("company_id",companyId).gte("work_date",start).lte("work_date",end)
      .eq("approval","approved");
    if(e1){setMsg(e1.message);setBusy(false);return;}
    // 2. roster (contract, hire) + rates
    const {data:wc}=await client.from("worker_companies")
      .select("worker_id,contract,hubstaff_name,status,ended_on,workers(first_name,middle_name,last_name,hire_date,status,payout_method,health_allowance_eligible,thirteenth_month_eligible)")
      .eq("company_id",companyId);
    // map source_name -> worker_id so time rows with a null worker_id still attribute
    const widByName={};
    (wc||[]).forEach(l=>{
      const w=l.workers||{};
      const keys=[l.hubstaff_name, `${w.first_name||""} ${w.last_name||""}`.trim()].filter(Boolean);
      keys.forEach(k=>{ widByName[k]=l.worker_id; widByName[normName(k)]=l.worker_id; });
    });
    const {data:rt}=await client.from("rates")
      .select("worker_id,amount_php,effective_start,effective_end").eq("company_id",companyId);
    // 3. last-used payout method per worker (most recent prior payment)
    const {data:priorPays}=await client.from("payments")
      .select("worker_id,payout_method,created_at,pay_periods(period_end)")
      .eq("company_id",companyId).not("payout_method","is",null)
      .order("created_at",{ascending:false});
    const lastMethod={};
    (priorPays||[]).forEach(p=>{ if(p.payout_method && !(p.worker_id in lastMethod)) lastMethod[p.worker_id]=p.payout_method; });

    const wcById={}; (wc||[]).forEach(r=>wcById[r.worker_id]=r);
    function rateFor(wid){
      const cands=(rt||[]).filter(r=>r.worker_id===wid &&
        r.effective_start<=end && (!r.effective_end||r.effective_end>=start));
      cands.sort((a,b)=>a.effective_start<b.effective_start?1:-1);
      return cands[0]?Number(cands[0].amount_php):null;
    }
    // aggregate worked seconds per worker (resolve null worker_id by source_name).
    // worked = tracked + paid-PTO so PTO leave is paid like worked time.
    const secByWorker={}, daysByWorker={};
    (te||[]).forEach(t=>{
      const wid = t.worker_id || widByName[t.source_name] || widByName[normName(t.source_name)];
      if(!wid) return;   // unattributable row (no matching contractor)
      const trackedSecs = Number(t.tracked_seconds||0);
      const ptoSecs = Number(t.pto_seconds||0);
      secByWorker[wid]=(secByWorker[wid]||0)+trackedSecs+ptoSecs;
      if(trackedSecs>0 || ptoSecs>0){
        (daysByWorker[wid]=daysByWorker[wid]||new Set()).add(t.work_date);
      }
    });
    const out=[];
    Object.keys(secByWorker).forEach(wid=>{
      const link=wcById[wid]; if(!link)return;
      const w=link.workers||{};
      const worked=secByWorker[wid]/3600;
      const exp=expectedHours(link.contract, start, end);
      const ratio=Math.min(worked/exp,5);          // cap matches workbook V
      const rate=rateFor(wid);
      const gross=rate==null?null:(ratio>=1?rate:+(ratio*rate).toFixed(2));
      const ha=(includeHA && w.health_allowance_eligible)?healthAllowance(w.hire_date,start,end):0;
      const t13=(include13 && w.thirteenth_month_eligible && rate!=null)?thirteenthAccrual(rate,w.hire_date,end):0;
      const pdd=0;     // PDD Lunch: manual per-period add-on, editable in the table
      const bonus=0;   // performance / other bonus, editable in the table
      const ded=rate==null?0:+(rate-(gross||0)).toFixed(2);
      // Calculate resets misc_items — they are user-entered adjustments per
      // pay period, not derivable from rate/hours/dates. The Recalculate
      // warning already tells users overrides will be wiped; that applies
      // to misc_items too.
      const misc_items=[];
      const miscSum=0;
      const net=gross==null?null:+(gross+ha+t13+pdd+bonus+miscSum).toFixed(2);
      // Inactive snapshot for Lock & Save warning: a row is "inactive" if the
      // worker_companies link or the worker itself is no longer active. Keeps
      // people who are mid-offboarding visible (so a final period can still be
      // calculated/locked), but loud-warns at lock time.
      const inactive=(link.status && link.status!=="active") || (w.status && w.status!=="active");
      out.push({worker_id:wid,name:fullName(w)||link.worker_id,
        contract:link.contract,worked:+worked.toFixed(2),expected:exp,ratio:+ratio.toFixed(4),
        rate,gross,computed_gross:gross,ha,t13,computed_t13:t13,pdd,bonus,ded,net,overridden:false,
        misc_items,
        usd_ref:(net==null||!fx)?null:+(net/fx).toFixed(2),   // reference only; paid in PHP
        inactive,
        // default to the worker's set method, else their LAST-USED channel, else unset
        method:w.payout_method||lastMethod[wid]||null});
    });
    out.sort((a,b)=>a.name.localeCompare(b.name));
    setRows(out);
    setBusy(false);
    if(!out.length){setMsg("No approved time found for this company in that date range. Import & approve hours first.");return;}
    await saveDraft(out);   // persist so it survives tab-switch / refresh
  }

  // Save the current calculation as a DRAFT (period state='open', payments status='draft').
  async function saveDraft(currentRows){
    try{
      const {data:pp}=await client.from("pay_periods")
        .upsert({company_id:companyId,period_start:start,period_end:end,pay_date:payDate,state:"open"},
                {onConflict:"company_id,period_start,period_end"})
        .select().single();
      if(!pp)return;
      // don't clobber a period that's already locked/paid
      if(pp.state && pp.state!=="open") return;
      const draftRows=currentRows.filter(r=>r.net!=null).map(r=>({
        company_id:companyId, pay_period_id:pp.id, worker_id:r.worker_id,
        expected_hours:r.expected, worked_hours:r.worked, performance_ratio:r.ratio,
        rate_php:r.rate, gross_php:r.gross, health_allowance_php:r.ha,
        thirteenth_month_php:r.t13, pdd_lunch_php:r.pdd||0, bonus_php:r.bonus||0,
        deduction_php:r.ded, net_php:r.net,
        misc_items: Array.isArray(r.misc_items)?r.misc_items:[],
        fx_rate:fx, payout_currency:"PHP", payout_amount:r.net,
        payout_method:r.method, status:"draft",
        note:r.overridden?`Gross manually overridden (computed ${r.computed_gross})`:null}));
      if(draftRows.length)
        await client.from("payments").upsert(draftRows,{onConflict:"pay_period_id,worker_id"});
    }catch(e){ /* draft save is best-effort; calculation still shows */ }
  }

  // Load a saved DRAFT (or locked snapshot) for the current company+period.
  // If the period has no saved data, clear any leftover rows so the screen
  // reflects the NEW period rather than lingering on the old one.
  // Rows where the LIVE worker name OR the rate effective for this period has
  // drifted from the snapshot stored in `payments`. Populated by loadSaved().
  // The render shows a banner listing these so the user knows to Recalculate.
  const [staleRows,setStaleRows]=useState([]);
  // Which row's misc-items popup is currently open. null = closed.
  const [miscRowId,setMiscRow]=useState(null);
  // Save the popup's draft back onto the row state. Maps the popup's payload
  // back into six storage sinks: health_allowance_php (ha), thirteenth_month_php
  // (t13), pdd_lunch_php (pdd), bonus_php (bonus), and misc_items
  // (other_earns + other_hours + deduction kinds). The row's `ded` (rate -
  // gross informational column) is NOT touched — user-input deductions live
  // in misc_items. 13th-month follows the existing override convention:
  // payload.t13_blank=true reverts to computed_t13; a numeric value marks
  // t13_overridden.
  function saveMiscForRow(workerId, payload){
    patchRow(workerId, r => ({
      ...r,
      ha: numOrZero(payload.ha),
      t13: payload.t13_blank ? (r.computed_t13||0) : numOrZero(payload.t13),
      t13_overridden: !payload.t13_blank && payload.t13!==""&&payload.t13!=null,
      pdd: numOrZero(payload.pdd),
      bonus: numOrZero(payload.bonus),
      misc_items: Array.isArray(payload.misc_items)?payload.misc_items:[],
    }));
    // saveDraft is auto-debounced by the existing useEffect that watches
    // rows; nothing else to do here.
    setMiscRow(null);
  }

  async function loadSaved(){
    if(!companyId||!start||!end)return;
    const {data:pp}=await client.from("pay_periods").select("id,state")
      .eq("company_id",companyId).eq("period_start",start).eq("period_end",end).maybeSingle();
    if(!pp){ setRows(null); setPeriod(null); setMsg(""); setStaleRows([]); return; }
    const {data:pays}=await client.from("payments")
      .select("worker_id,expected_hours,worked_hours,performance_ratio,rate_php,gross_php,"+
              "health_allowance_php,thirteenth_month_php,pdd_lunch_php,bonus_php,deduction_php,net_php,fx_rate,"+
              "misc_items,payout_method,note,workers(first_name,middle_name,last_name)")
      .eq("pay_period_id",pp.id);
    if(!pays||!pays.length){ setRows(null); setPeriod({id:pp.id,state:pp.state}); setMsg(""); setStaleRows([]); return; }
    setPeriod({id:pp.id,state:pp.state});

    // Live drift check: compare each payment's stored rate_php against the rate
    // CURRENTLY effective for the period. (The Calculate snapshot freezes
    // rate_php at the moment calculate() ran. If a rate was edited or
    // backfilled since then, the stored snapshot is stale.)
    const widList=[...new Set((pays||[]).map(p=>p.worker_id))];
    let liveRateByWid={};
    if(widList.length){
      const {data:rt}=await client.from("rates")
        .select("worker_id,amount_php,effective_start,effective_end")
        .eq("company_id",companyId).in("worker_id",widList);
      // Pick the rate effective for THIS period: effective_start<=end AND
      // (effective_end is null OR effective_end>=start). Most-recent wins.
      const byWorker={};
      (rt||[]).forEach(r=>{
        if(r.effective_start>end) return;
        if(r.effective_end && r.effective_end<start) return;
        const cur=byWorker[r.worker_id];
        if(!cur || r.effective_start>cur.effective_start) byWorker[r.worker_id]=r;
      });
      liveRateByWid=Object.fromEntries(Object.entries(byWorker).map(([wid,r])=>[wid,Number(r.amount_php)]));
    }

    const mapped=pays.map(p=>{
      const liveRate = liveRateByWid[p.worker_id];
      const storedRate = p.rate_php==null ? null : Number(p.rate_php);
      const rateChanged = liveRate!=null && storedRate!=null && Math.abs(liveRate - storedRate) > 0.01;
      return {
        worker_id:p.worker_id, name:fullName(p.workers),
        worked:Number(p.worked_hours||0), expected:Number(p.expected_hours||0),
        ratio:Number(p.performance_ratio||0), rate:storedRate, live_rate:liveRate,
        gross:p.gross_php==null?null:Number(p.gross_php), computed_gross:p.gross_php==null?null:Number(p.gross_php),
        ha:Number(p.health_allowance_php||0), t13:Number(p.thirteenth_month_php||0), computed_t13:Number(p.thirteenth_month_php||0),
        pdd:Number(p.pdd_lunch_php||0), bonus:Number(p.bonus_php||0), ded:Number(p.deduction_php||0), net:p.net_php==null?null:Number(p.net_php),
        misc_items: Array.isArray(p.misc_items) ? p.misc_items : [],
        overridden:!!p.note, usd_ref:(p.net_php==null||!fx)?null:+(Number(p.net_php)/fx).toFixed(2),
        method:p.payout_method||null,
        rate_stale: rateChanged,
      };
    });
    setRows(mapped);
    setStaleRows(mapped.filter(r=>r.rate_stale).map(r=>({
      worker_id:r.worker_id, name:r.name, was:r.rate, now:r.live_rate,
    })));
    setMsg(pp.state==="open"?"Loaded saved draft for this period.":`Loaded ${pp.state} period (read-only snapshot).`);
  }

  // Sum the misc_items adjustments on a row. other_earns and other_hours add
  // (positive amounts); deduction kind subtracts (amount is stored positive
  // and treated as a deduction here). r.ded (the rate-minus-gross
  // performance shortfall) remains informational and is NOT in net.
  function miscTotal(items){
    if(!Array.isArray(items)) return 0;
    return items.reduce((s,it)=> {
      const a = Number(it?.amount)||0;
      return s + (it?.kind === "deduction" ? -a : a);
    }, 0);
  }

  // recompute net + usd_ref from a row's components (single source of truth).
  // Net adds the misc_items sum on top of the existing typed columns.
  function recalcNet(r){
    const net = r.gross==null ? null
      : +(r.gross + (r.ha||0) + (r.t13||0) + (r.pdd||0) + (r.bonus||0) + miscTotal(r.misc_items)).toFixed(2);
    return {...r, net, usd_ref:(net==null||!fx)?null:+(net/fx).toFixed(2)};
  }
  function patchRow(wid, fn){ setRows(prev=>prev.map(r=> r.worker_id===wid ? recalcNet(fn(r)) : r)); }
  const numOrZero=v=> (v===""||v==null) ? 0 : (+v);

  function overrideGross(wid, value){
    patchRow(wid, r=>{
      const overridden = value!=="" && value!=null;
      return {...r, overridden, gross: overridden ? (+value) : r.computed_gross};
    });
  }
  function setMethod(wid, value){
    setRows(prev=>prev.map(r=> r.worker_id===wid ? {...r, method:value||null} : r));
  }
  function setPdd(wid, value){ patchRow(wid, r=>({...r, pdd:numOrZero(value)})); }
  function setBonus(wid, value){ patchRow(wid, r=>({...r, bonus:numOrZero(value)})); }
  // 13th override: blank reverts to computed
  function setT13(wid, value){
    patchRow(wid, r=>({...r, t13: value===""||value==null ? (r.computed_t13||0) : (+value),
      t13_overridden: value!=="" && value!=null}));
  }

  // Period-level UNLOCK — flip pay_periods.state back to 'open' so the user
  // can edit / recalculate / re-lock. Requires a typed reason (audit trail),
  // confirms destructive consequences, and refuses to act on a 'paid' period
  // (the user must mark all unpaid in Process & Pay first, which steps state
  // back to 'locked' and is then unlockable from here).
  async function unlockPeriod(){
    if(!period?.id){ setMsg("No period to unlock."); return; }
    if(period.state==="paid"){
      setMsg("This period is marked PAID. Go to Process & Pay → Mark all unpaid first, then come back here to unlock.");
      return;
    }
    if(period.state!=="locked"){ setMsg("This period isn't locked."); return; }
    const reason=window.prompt(
      "Unlock this pay period for editing?\n\n"+
      `Period: ${start} → ${end}\n\n`+
      "⚠ Consequences:\n"+
      "• Recalculate will REBUILD net amounts from hours — manual overrides "+
      "(gross, PDD lunch, 13th, bonus, health allowance adjustments) will be wiped.\n"+
      "• Any payment rows already drafted/sent in Wise won't be affected here, "+
      "but DB amounts can drift from what was actually paid.\n"+
      "• Re-lock when you're done to restore the read-only snapshot.\n\n"+
      "Enter a reason (recorded in the audit log):"
    );
    if(reason==null) return;            // user cancelled the prompt
    if(!reason.trim()){ setMsg("Unlock requires a reason."); return; }
    setBusy(true); setMsg("");
    try{
      const {error}=await client.from("pay_periods")
        .update({state:"open", locked_at:null}).eq("id",period.id);
      if(error) throw new Error(error.message);
      logEvent(client,{ company_id:companyId, action:"unlock_period",
        entity:`${start} → ${end}`,
        detail:{ reason, previous_state:"locked" } });
      setPeriod({ ...period, state:"open" });
      setMsg(`Unlocked ${start} → ${end} for editing. Re-lock when done.`);
    }catch(ex){ setMsg("Unlock failed: "+(ex.message||ex)); }
    finally{ setBusy(false); }
  }

  async function lockAndSave(){
    if(!rows||!rows.length){setMsg("Calculate first.");return;}
    if(!gate("Lock & save pay statements")) return;
    // Don't let anyone silently drop out of payout: block lock if a contractor
    // has no rate (net==null) or no payout method set.
    const noRate=rows.filter(r=>r.net==null);
    const noMethod=rows.filter(r=>r.net!=null && !r.method);
    if(noRate.length){
      setMsg(`Can't lock — ${noRate.length} contractor(s) have NO RATE and would be left out: `+
        noRate.map(r=>r.name).join(", ")+". Set their rate on their profile (Contractors tab), then recalculate.");
      return;
    }
    if(noMethod.length && !confirm(
      `${noMethod.length} contractor(s) have no payout method set (${noMethod.map(r=>r.name).join(", ")}). `+
      `They'll be saved but won't appear in Wise/BPI exports until you set it. Lock anyway?`)) return;
    // Inactive warning — uses the snapshot from Calculate. Common cause of
    // "contractor missing from Wise payouts": locked into a period while
    // marked inactive on their profile or worker_companies link.
    const inactiveRows=rows.filter(r=>r.net!=null && r.inactive);
    if(inactiveRows.length && !confirm(
      `${inactiveRows.length} contractor(s) are marked INACTIVE (worker or company link is not active):\n\n`+
      inactiveRows.slice(0,12).map(r=>`• ${r.name}`).join("\n")+
      (inactiveRows.length>12?`\n…and ${inactiveRows.length-12} more`:"")+
      `\n\nIf this is a final pay period for them, proceed. Otherwise cancel, set them back to active on the Contractors tab, and recalculate.\n\nLock anyway?`
    )) return;
    if(!confirm(`Lock this period and save ${rows.length} pay statements? Locked periods are read-only.`))return;
    setBusy(true);setMsg("");
    // upsert pay_period
    const {data:pp,error:e1}=await client.from("pay_periods")
      .upsert({company_id:companyId,period_start:start,period_end:end,pay_date:payDate,
               state:"locked",locked_at:new Date().toISOString()},
              {onConflict:"company_id,period_start,period_end"})
      .select().single();
    if(e1){setMsg(e1.message);setBusy(false);return;}
    const pays=rows.filter(r=>r.net!=null).map(r=>({
      company_id:companyId, pay_period_id:pp.id, worker_id:r.worker_id,
      expected_hours:r.expected, worked_hours:r.worked, performance_ratio:r.ratio,
      rate_php:r.rate, gross_php:r.gross, health_allowance_php:r.ha,
      thirteenth_month_php:r.t13, pdd_lunch_php:r.pdd||0, bonus_php:r.bonus||0, deduction_php:r.ded, net_php:r.net,
      misc_items: Array.isArray(r.misc_items)?r.misc_items:[],
      fx_rate:fx, payout_currency:"PHP", payout_amount:r.net,   // PAID IN PHP; fx_rate is reference only
      payout_method:r.method, status:"draft",
      note:r.overridden?`Gross manually overridden (computed ${r.computed_gross})`:null}));
    const {error:e2}=await client.from("payments")
      .upsert(pays,{onConflict:"pay_period_id,worker_id"});
    setBusy(false);
    if(e2){setMsg(e2.message);return;}
    setPeriod({id:pp.id,state:"locked"});
    // audit: the lock, plus any manual overrides captured at lock time
    const overrides=rows.filter(r=>r.overridden||r.t13_overridden||r.bonus||r.pdd)
      .map(r=>({name:r.name, gross_override:r.overridden?r.gross:undefined,
        computed_gross:r.overridden?r.computed_gross:undefined,
        t13:r.t13_overridden?r.t13:undefined, bonus:r.bonus||undefined, pdd:r.pdd||undefined}));
    logEvent(client,{company_id:companyId, action:"lock",
      entity:`${start} → ${end}`,
      detail:{contractors:pays.length, total_net:pays.reduce((s,p)=>s+(p.net_php||0),0),
        overrides: overrides.length?overrides:undefined}});
    setMsg(`Locked & saved ${pays.length} pay statements. Next: go to the Process Payroll tab to pay contractors.`);
  }

  const totalNet=rows?rows.reduce((s,r)=>s+(r.net||0),0):0;
  const totalUsdRef=rows?rows.reduce((s,r)=>s+(r.usd_ref||0),0):0;

  return (
    <div>
      <div className="card">
        <h2>Payroll run</h2>
        <p className="sub">Pick a company + period, calculate from approved hours and the
          effective PHP rate, review, then lock. Locking saves a pay statement per contractor.</p>
        {consolidated && <div className="banner">Switch to a single company — payroll runs are per-company.</div>}
        <div className="row" style={{alignItems:"flex-end"}}>
          <div className="field"><label>Period start</label>
            <input type="date" value={start} onChange={e=>{setAutoDates(false);applyStart(e.target.value);}}/></div>
          <div className="field"><label>Period end</label>
            <input type="date" value={end} onChange={e=>{setAutoDates(false);setEnd(e.target.value);}}/></div>
          <div className="field"><label>Pay date (auto)</label>
            <input type="date" value={payDate} onChange={e=>setPayDate(e.target.value)}/></div>
          <div className="field"><label>FX rate (PHP per 1 USD, ref)</label>
            <input type="number" step="0.0001" value={fx}
              onChange={e=>{setFxAuto(false);setFx(parseFloat(e.target.value)||0);}}/>
            {fxNote && <span className="muted" style={{fontSize:11}}>{fxAuto?fxNote:"manual override · "+fxNote}</span>}
          </div>
        </div>
        <p className="muted" style={{fontSize:12,marginTop:-4}}>
          Semi-monthly (24/yr). Work 1–15 is paid end of that month; work 16–end is paid the 15th of the next month.
          Dates auto-fill from the imported file — edit the start and the rest follow.</p>
        <div className="banner" style={{background:"var(--accent-soft)",borderColor:"#bcd",color:"var(--text)",marginTop:8}}>
          <b>Expected hours this period:</b> full-time <b>{ftExp}h</b>, part-time <b>{ptExp}h</b>
          {" "}— calendar days × day-hours, minus {periodHolidays.length} holiday(s)
          {periodHolidays.length>0 && <span>: {periodHolidays.map(h=>h.name).join(", ")}</span>}.
          {" "}<a href="#" onClick={e=>{e.preventDefault();setShowHol(s=>!s);}} style={{color:"var(--accent)"}}>
            {showHol?"Hide":"Edit"} holidays</a>
        </div>

        {/* Rate drift banner: the Calculate snapshot stores rate_php on each
            payment row. If a rate was edited (in Contractors → Edit) AFTER
            Calculate ran, the snapshot is stale. Show what changed so the
            user can decide whether to Recalculate. */}
        {staleRows.length>0 && (
          <div className="banner" style={{background:"#fef3c7",borderColor:"#fcd34d",color:"#92400e",marginTop:8}}>
            <b>⚠ Rate(s) changed since this period was last calculated.</b>
            {" "}The displayed amounts below are from the saved snapshot. Click <b>Recalculate</b>
            {" "}to apply the current effective rates.
            <ul style={{margin:"6px 0 0",paddingLeft:18,fontSize:12}}>
              {staleRows.slice(0,8).map((s,i)=>(
                <li key={s.worker_id||i}>
                  {openContractor && s.worker_id
                    ? <button type="button"
                        onClick={()=>openContractor(s.worker_id)}
                        title="Open this contractor's profile to review or edit the rate"
                        style={{background:"none",border:"none",padding:0,margin:0,color:"#92400e",
                          textDecoration:"underline",cursor:"pointer",font:"inherit",fontWeight:700}}>
                        {s.name}
                      </button>
                    : <b>{s.name}</b>}
                  :
                  {" "}was ₱{Number(s.was).toLocaleString(undefined,{minimumFractionDigits:2})},
                  {" "}now ₱{Number(s.now).toLocaleString(undefined,{minimumFractionDigits:2})}
                </li>
              ))}
              {staleRows.length>8 && <li>…and {staleRows.length-8} more</li>}
            </ul>
          </div>
        )}
        <div className="row">
          <label style={{fontSize:13}}><input type="checkbox" checked={includeHA}
            onChange={e=>setIncludeHA(e.target.checked)}/> Include Health Allowance (₱20k/yr, on anniversary)</label>
          <label style={{fontSize:13}}><input type="checkbox" checked={include13}
            onChange={e=>setInclude13(e.target.checked)}/> Include 13th-month accrual (rate ÷ 12 per period)</label>
        </div>
        <div style={{marginTop:8}}>
          <button className="btn" disabled={busy||consolidated} onClick={calculate}>
            {busy?"Working…":"Calculate"}</button>
          <span className="muted" style={{fontSize:11,marginLeft:10}}>
            Recalculating rebuilds amounts from hours and resets overrides/adjustments.</span>
        </div>
        {undo && <div className="banner error" style={{marginTop:10,display:"flex",
          justifyContent:"space-between",alignItems:"center",gap:12}}>
          <span><b>Undo available:</b> {undo.label}</span>
          <span style={{display:"flex",gap:8}}>
            <button className="btn sm" disabled={busy} onClick={async()=>{
              const fn=undo.fn; setUndo(null); setBusy(true);
              try{ await fn(); }catch(e){ setMsg("Undo failed: "+(e.message||e)); }
              finally{ setBusy(false); }
            }}>Undo recalculation</button>
            <button className="btn ghost sm" onClick={()=>setUndo(null)}>Dismiss</button>
          </span>
        </div>}
        <Banner msg={msg} style={{marginTop:12}} />
      </div>

      {showHol && <HolidayEditor year={new Date(start).getFullYear()}
        onChange={()=>setHolTick(t=>t+1)} />}

      {rows && rows.length>0 && (
        <div className="card">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
            <div><h2>Pay statements · {start} → {end}</h2>
              <p className="sub">Pay date <b>{payDate}</b> · {rows.length} contractor(s) ·
                Payout <b>{money(totalNet,"PHP")}</b>
                {" "}<span className="muted">(≈ {money(totalUsdRef,"USD")} ref @ {fx} PHP/USD)</span></p></div>
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
              {period?.state && period.state!=="open" && (
                <span className="pill" style={{
                  background:period.state==="paid"?"#dcfce7":"#eef2ff",
                  color:period.state==="paid"?"#166534":"#3730a3",
                  fontSize:11,padding:"3px 8px"}}>
                  🔒 {period.state}
                </span>
              )}
              <button className="btn" disabled={busy} onClick={lockAndSave}>
                {period?.state==="locked"
                  ? "Re-lock period (overwrite snapshot)"
                  : period?.state==="paid"
                    ? "Re-lock (must mark unpaid first)"
                    : "Lock period & save statements"}
              </button>
              {period?.state && period.state!=="open" && (
                <button className="btn ghost" disabled={busy} onClick={unlockPeriod}
                  title={period.state==="paid"
                    ? "Period is marked paid. Mark all unpaid in Process & Pay first."
                    : "Flip this period back to 'open' so you can edit / recalculate. Requires a reason. Re-lock when done."}
                  style={{borderColor:"#b91c1c",color:"#b91c1c"}}>
                  Unlock for editing…
                </button>
              )}
            </div>
          </div>
          <FilterBox q={sfQ} setQ={sfSetQ} placeholder="Filter contractors…" />
          {(() => {
            // Decide which optional columns to display: show a column only if
            // at least one row in the current period has a non-zero value.
            // misc_items is its own always-visible column with a popup editor.
            const anyHA    = sfRows.some(r => Number(r.ha)>0);
            const any13    = sfRows.some(r => Number(r.t13)>0);
            const anyLunch = sfRows.some(r => Number(r.pdd)>0);
            const anyBonus = sfRows.some(r => Number(r.bonus)>0);
            const miscSum = r => miscTotal(r.misc_items);
            return (
          <div className="table-scroll"><table>
            <thead><tr>
              <SfTh k="name">Contractor</SfTh><SfTh k="worked">Worked h</SfTh><th>Exp</th><SfTh k="ratio">Ratio</SfTh><SfTh k="rate">Rate ₱</SfTh>
              <th>Gross ₱</th>
              {anyHA    && <th>HA ₱</th>}
              {any13    && <th>13th ₱</th>}
              {anyLunch && <th>Lunch ₱</th>}
              {anyBonus && <th>Bonus ₱</th>}
              <th>Misc ₱</th>
              <SfTh k="net">Net ₱ (paid)</SfTh><th>≈ USD ref</th><SfTh k="method">Via</SfTh>
            </tr></thead>
            <tbody>
              {sfRows.map(r=>(
                <tr key={r.worker_id} style={
                  r.inactive?{background:"#fef2f2"}:r.rate==null?{background:"var(--warn-soft)"}:{}}>
                  <td>
                    <b style={r.inactive?{textDecoration:"line-through"}:{}}>{r.name}</b>
                    {r.inactive && <span className="tip-wrap" tabIndex={0}
                      style={{marginLeft:6,fontSize:10,verticalAlign:"middle",cursor:"help"}}>
                      <span className="pill" style={{background:"#fef2f2",color:"#b91c1c"}}>🚫 inactive</span>
                      <span className="tip-body">This contractor (or their company link) is marked inactive. They're still included in this calculation so you can pay a final period — but Lock &amp; Save will ask you to confirm. If this isn't a final period, reactivate them on the Contractors tab and recalculate.</span>
                    </span>}
                  </td>
                  <td>{r.worked}</td><td>{r.expected}</td><td>{(r.ratio*100).toFixed(0)}%</td>
                  <td>{r.rate==null?<span className="muted">no rate</span>:r.rate.toLocaleString()}</td>
                  <td>
                    <input type="number" step="0.01" value={r.gross==null?"":r.gross}
                      title="Computed from hours; edit to override"
                      onChange={e=>overrideGross(r.worker_id, e.target.value)}
                      style={{width:90,padding:"3px 6px",fontSize:13,
                        border:r.overridden?"1px solid var(--accent)":"1px solid var(--border)",
                        background:r.overridden?"var(--accent-soft)":"#fff"}}/>
                    {r.overridden && <button className="btn ghost sm" title="Revert to computed"
                      style={{marginLeft:4,padding:"2px 6px"}}
                      onClick={()=>overrideGross(r.worker_id,"")}>↺</button>}
                  </td>
                  {anyHA    && <td>{r.ha?r.ha.toLocaleString():"—"}</td>}
                  {any13    && <td>{r.t13?Number(r.t13).toLocaleString():"—"}</td>}
                  {anyLunch && <td>{r.pdd?Number(r.pdd).toLocaleString():"—"}</td>}
                  {anyBonus && <td>{r.bonus?Number(r.bonus).toLocaleString():"—"}</td>}
                  <td style={{whiteSpace:"nowrap"}}>
                    {(() => {
                      const m = miscSum(r);
                      const hasMisc = Math.abs(m) > 0.005;
                      const itemCount = Array.isArray(r.misc_items)?r.misc_items.length:0;
                      return (
                        <span style={{display:"inline-flex",gap:6,alignItems:"center"}}>
                          {hasMisc
                            ? <span style={{color:m<0?"#b91c1c":"inherit"}}>
                                {m<0?"-":""}{Math.abs(m).toLocaleString(undefined,{minimumFractionDigits:2})}
                              </span>
                            : <span className="muted">—</span>}
                          <button className="btn ghost sm" style={{padding:"2px 8px",fontSize:12}}
                            onClick={()=>setMiscRow(r.worker_id)}
                            title={itemCount?`Edit ${itemCount} misc item(s)`:"Add Lunch / Other Earns / Other Hours / Bonus / Deductions"}>
                            {itemCount?`Edit (${itemCount})`:"+ Misc"}
                          </button>
                        </span>
                      );
                    })()}
                  </td>
                  <td><b>{r.net==null?"—":r.net.toLocaleString()}</b></td>
                  <td className="muted">{r.usd_ref==null?"—":"$"+r.usd_ref.toLocaleString()}</td>
                  <td>
                    <select value={r.method||""} onChange={e=>setMethod(r.worker_id,e.target.value)}
                      style={{padding:"3px 6px",fontSize:13,
                        border:r.method?"1px solid var(--border)":"1px solid var(--warn)",
                        background:r.method?"#fff":"var(--warn-soft)"}}>
                      <option value="">— set —</option>
                      {PAYOUT_CHANNELS.map(ch=><option key={ch} value={ch}>{methodLabel(ch)}</option>)}
                    </select></td>
                </tr>
              ))}
            </tbody>
          </table></div>
            );
          })()}
          <p className="muted" style={{fontSize:12,marginTop:10}}>
            Contractors are <b>paid in PHP</b> (Net ₱). USD is a reference only (Net ₱ ÷ FX).
            <b> Gross ₱ is editable</b> — override it for any contractor and Net recomputes;
            a blue cell + ↺ marks an override (the saved statement records the original computed value).
            Yellow rows have no effective rate set — fix that before locking.</p>
        </div>
      )}
      {miscRowId && (() => {
        const row = (rows||[]).find(r=>r.worker_id===miscRowId);
        if(!row){ setMiscRow(null); return null; }
        return <MiscModal row={row}
          onClose={()=>setMiscRow(null)}
          onSave={payload=>saveMiscForRow(miscRowId, payload)} />;
      })()}
    </div>
  );
}

// ============================ MISC MODAL =====================================
// Per-row popup for the "Misc" cell in Calculate's pay statements table.
// Edits four storage sinks at once:
//   1. Lunch       → payments.pdd_lunch_php  (single number)
//   2. Bonus       → payments.bonus_php      (single number)
//   3. Other Earns → payments.misc_items[]   (kind=other_earns, label+amount)
//   4. Other Hours → payments.misc_items[]   (kind=other_hours, label+hours;
//                     amount = hours * (rate * 24 / 2080), live-computed)
//   5. Deductions  → payments.misc_items[]   (kind=deduction, label+amount;
//                     subtracted from Net in miscTotal)
//
// All edits are local until "Save" — closing without saving discards. Save
// hands the assembled payload back to the parent which patches the row and
// triggers debounced saveDraft via the standard recalcNet pipeline.
function MiscModal({ row, onClose, onSave }){
  const rate = Number(row.rate)||0;
  // Effective hourly rate per the spec: (semi-monthly rate × 24 periods/yr) ÷ 2080 hrs/yr
  const hourlyRate = rate>0 ? +((rate*24)/2080).toFixed(4) : 0;

  // Local editable state, seeded from the row.
  const [ha,setHa]=useState(row.ha?String(row.ha):"");
  // 13th-month: track whether the user cleared it (blank → revert to computed).
  const [t13,setT13]=useState(row.t13?String(row.t13):"");
  const [pdd,setPdd]=useState(row.pdd?String(row.pdd):"");
  const [bonus,setBonus]=useState(row.bonus?String(row.bonus):"");
  const computedT13 = Number(row.computed_t13)||0;
  const seedItems = Array.isArray(row.misc_items)?row.misc_items:[];
  const [earns,setEarns]=useState(()=>seedItems.filter(x=>x.kind==="other_earns").map(x=>({label:x.label||"", amount:String(x.amount||"")})));
  const [hours,setHours]=useState(()=>seedItems.filter(x=>x.kind==="other_hours").map(x=>({label:x.label||"", hours:String(x.hours||""), hourly_rate:Number(x.hourly_rate||hourlyRate)})));
  const [deducs,setDeducs]=useState(()=>seedItems.filter(x=>x.kind==="deduction").map(x=>({label:x.label||"", amount:String(x.amount||"")})));

  function setEarn(i, patch){ setEarns(prev=>prev.map((e,j)=>j===i?{...e,...patch}:e)); }
  function setHr(i, patch){ setHours(prev=>prev.map((e,j)=>j===i?{...e,...patch}:e)); }
  function setDed(i, patch){ setDeducs(prev=>prev.map((e,j)=>j===i?{...e,...patch}:e)); }
  const addEarn = ()=>setEarns(prev=>[...prev,{label:"",amount:""}]);
  const addHr   = ()=>setHours(prev=>[...prev,{label:"",hours:"",hourly_rate:hourlyRate}]);
  const addDed  = ()=>setDeducs(prev=>[...prev,{label:"",amount:""}]);
  const rmEarn = i=>setEarns(prev=>prev.filter((_,j)=>j!==i));
  const rmHr   = i=>setHours(prev=>prev.filter((_,j)=>j!==i));
  const rmDed  = i=>setDeducs(prev=>prev.filter((_,j)=>j!==i));

  // Compute Other Hours amount inline (hours × hourly_rate) for preview.
  const hoursAmount = e => +((Number(e.hours)||0) * (Number(e.hourly_rate)||0)).toFixed(2);

  const haNum    = Number(ha)||0;
  const t13Num   = t13===""||t13==null ? computedT13 : (Number(t13)||0);
  const pddNum   = Number(pdd)||0;
  const bonusNum = Number(bonus)||0;
  const earnsSum = earns.reduce((s,e)=>s+(Number(e.amount)||0),0);
  const hoursSum = hours.reduce((s,e)=>s+hoursAmount(e),0);
  const ducsSum  = deducs.reduce((s,e)=>s+(Number(e.amount)||0),0);
  const netImpact = haNum + t13Num + pddNum + bonusNum + earnsSum + hoursSum - ducsSum;

  function commitSave(){
    // Reject malformed: label required + amount/hours required & positive.
    const cleanEarns = earns
      .map(e=>({label:String(e.label||"").trim(), amount:Number(e.amount)||0}))
      .filter(e=>e.label && e.amount>0);
    const cleanHours = hours
      .map(e=>({label:String(e.label||"").trim(), hours:Number(e.hours)||0,
                hourly_rate:Number(e.hourly_rate)||hourlyRate}))
      .filter(e=>e.label && e.hours>0)
      .map(e=>({...e, amount:+((e.hours)*(e.hourly_rate)).toFixed(2)}));
    const cleanDeds = deducs
      .map(e=>({label:String(e.label||"").trim(), amount:Number(e.amount)||0}))
      .filter(e=>e.label && e.amount>0);
    const misc_items = [
      ...cleanEarns.map(e=>({kind:"other_earns", label:e.label, amount:+(e.amount).toFixed(2)})),
      ...cleanHours.map(e=>({kind:"other_hours", label:e.label, hours:e.hours,
                              hourly_rate:e.hourly_rate, amount:e.amount})),
      ...cleanDeds .map(e=>({kind:"deduction",   label:e.label, amount:+(e.amount).toFixed(2)})),
    ];
    // t13_blank=true means user emptied the field — parent reverts to computed.
    const t13_blank = t13===""||t13==null;
    onSave({ ha:haNum, t13: t13_blank?"":t13Num, t13_blank,
             pdd:pddNum, bonus:bonusNum, misc_items });
  }

  const numInp = {width:120,padding:"4px 6px",fontSize:13};
  const lblInp = {flex:1,padding:"4px 6px",fontSize:13,minWidth:160};
  const sectionStyle = {borderTop:"1px solid var(--border)",paddingTop:10,marginTop:10};
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:640}}>
        <button className="x" onClick={onClose}>×</button>
        <h2 style={{marginBottom:0}}>Misc · {row.name}</h2>
        <p className="sub" style={{marginTop:2,fontSize:12}}>
          Rate ₱{rate.toLocaleString()} · effective hourly ₱{hourlyRate.toLocaleString(undefined,{minimumFractionDigits:2})} (rate×24÷2080)
        </p>

        {/* HA + 13th + Lunch + Bonus — single-value typed inputs that map to
            the existing health_allowance_php, thirteenth_month_php,
            pdd_lunch_php, and bonus_php columns respectively. Clearing the
            13th-month input reverts to the value Calculate computed
            (computed_t13); 13th input shows "computed" hint when blank.
            HA has no auto-revert — empty means 0. */}
        <div style={{display:"flex",gap:16,marginTop:8,flexWrap:"wrap"}}>
          <div className="field">
            <label>Health Allowance (₱)</label>
            <input type="number" step="0.01" value={ha} onChange={e=>setHa(e.target.value)}
              placeholder="0" style={numInp}/>
          </div>
          <div className="field">
            <label>13th month (₱) <span className="muted" style={{fontSize:11,fontWeight:400}}>
              {(t13===""||t13==null)?`(computed: ₱${computedT13.toLocaleString(undefined,{minimumFractionDigits:2})})`:""}
            </span></label>
            <input type="number" step="0.01" value={t13} onChange={e=>setT13(e.target.value)}
              placeholder={`computed ${computedT13.toFixed(2)}`} style={numInp}/>
          </div>
          <div className="field">
            <label>Lunch (₱)</label>
            <input type="number" step="0.01" value={pdd} onChange={e=>setPdd(e.target.value)}
              placeholder="0" style={numInp}/>
          </div>
          <div className="field">
            <label>Bonus (₱)</label>
            <input type="number" step="0.01" value={bonus} onChange={e=>setBonus(e.target.value)}
              placeholder="0" style={numInp}/>
          </div>
        </div>

        {/* Other Earns — labeled lump sums. */}
        <div style={sectionStyle}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <label style={{fontSize:11,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".03em"}}>
              Other earns
            </label>
            <button className="btn ghost sm" onClick={addEarn}>+ Add earn</button>
          </div>
          {earns.length===0
            ? <p className="muted" style={{fontSize:12,margin:"6px 0 0"}}>None.</p>
            : earns.map((e,i)=>(
                <div key={i} style={{display:"flex",gap:6,alignItems:"center",marginTop:6}}>
                  <input type="text" placeholder="Description (required)" value={e.label}
                    onChange={ev=>setEarn(i,{label:ev.target.value})} style={lblInp}/>
                  <input type="number" step="0.01" placeholder="₱ amount" value={e.amount}
                    onChange={ev=>setEarn(i,{amount:ev.target.value})} style={numInp}/>
                  <button className="btn ghost sm" onClick={()=>rmEarn(i)}
                    style={{borderColor:"var(--bad)",color:"var(--bad)"}}>×</button>
                </div>
              ))}
        </div>

        {/* Other Hours — labeled labor hours, priced at the contractor's
            effective hourly rate. Amount is auto-derived from hours; rate
            is captured at save time for historical stability. */}
        <div style={sectionStyle}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <label style={{fontSize:11,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".03em"}}>
              Other hours <span style={{textTransform:"none"}}>(priced at ₱{hourlyRate.toLocaleString(undefined,{minimumFractionDigits:2})}/h)</span>
            </label>
            <button className="btn ghost sm" onClick={addHr} disabled={hourlyRate<=0}
              title={hourlyRate<=0?"Set a rate on this contractor first":"Add a labeled hours entry"}>
              + Add hours
            </button>
          </div>
          {hours.length===0
            ? <p className="muted" style={{fontSize:12,margin:"6px 0 0"}}>None.</p>
            : hours.map((e,i)=>(
                <div key={i} style={{display:"flex",gap:6,alignItems:"center",marginTop:6,flexWrap:"wrap"}}>
                  <input type="text" placeholder="Description (required)" value={e.label}
                    onChange={ev=>setHr(i,{label:ev.target.value})} style={lblInp}/>
                  <input type="number" step="0.01" placeholder="hours" value={e.hours}
                    onChange={ev=>setHr(i,{hours:ev.target.value})} style={{width:90,padding:"4px 6px",fontSize:13}}/>
                  <span className="muted" style={{fontSize:12}}>
                    × ₱{Number(e.hourly_rate).toLocaleString(undefined,{minimumFractionDigits:2})}/h
                    = <b>₱{hoursAmount(e).toLocaleString(undefined,{minimumFractionDigits:2})}</b>
                  </span>
                  <button className="btn ghost sm" onClick={()=>rmHr(i)}
                    style={{borderColor:"var(--bad)",color:"var(--bad)"}}>×</button>
                </div>
              ))}
        </div>

        {/* Deductions — labeled subtractions from Net. */}
        <div style={sectionStyle}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <label style={{fontSize:11,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".03em"}}>
              Deductions <span style={{textTransform:"none"}}>(subtracted from Net)</span>
            </label>
            <button className="btn ghost sm" onClick={addDed}>+ Add deduction</button>
          </div>
          {deducs.length===0
            ? <p className="muted" style={{fontSize:12,margin:"6px 0 0"}}>None.</p>
            : deducs.map((e,i)=>(
                <div key={i} style={{display:"flex",gap:6,alignItems:"center",marginTop:6}}>
                  <input type="text" placeholder="Reason (required)" value={e.label}
                    onChange={ev=>setDed(i,{label:ev.target.value})} style={lblInp}/>
                  <input type="number" step="0.01" placeholder="₱ amount" value={e.amount}
                    onChange={ev=>setDed(i,{amount:ev.target.value})} style={numInp}/>
                  <button className="btn ghost sm" onClick={()=>rmDed(i)}
                    style={{borderColor:"var(--bad)",color:"var(--bad)"}}>×</button>
                </div>
              ))}
        </div>

        <div style={{...sectionStyle, display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:13}}>
            Net impact: <b style={{color:netImpact<0?"#b91c1c":"#166534"}}>
              {netImpact<0?"-":"+"}₱{Math.abs(netImpact).toLocaleString(undefined,{minimumFractionDigits:2})}
            </b>
          </div>
          <div>
            <button className="btn ghost" onClick={onClose}>Cancel</button>
            {" "}
            <button className="btn" onClick={commitSave}>Save</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ============================ DOCUMENTS ======================================
const DOC_KINDS=[["ic_agreement","IC Agreement"],["w8ben","W-8BEN"],["gov_id","Gov ID"],["other","Other"]];
function daysUntil(dateStr){ if(!dateStr)return null;
  return Math.round((new Date(dateStr+"T00:00:00")-new Date(new Date().toISOString().slice(0,10)+"T00:00:00"))/86400000); }

function Documents({client,companyId,consolidated}){
  // workers in scope (for the add-form dropdown + names)
  const {data:wcs}=useQuery(client,c=>{
    let q=c.from("worker_companies").select("worker_id,company_id,workers(first_name,middle_name,last_name)");
    if(!consolidated&&companyId)q=q.eq("company_id",companyId);
    return q;
  },[client,companyId,consolidated]);
  const {data:docs,loading,reload}=useQuery(client,c=>{
    let q=c.from("documents").select("id,worker_id,company_id,kind,title,signed_on,expires_on,storage_path")
      .order("expires_on",{ascending:true,nullsFirst:false});
    if(!consolidated&&companyId)q=q.eq("company_id",companyId);
    return q;
  },[client,companyId,consolidated]);

  const nameById={}; (wcs||[]).forEach(w=>{ if(w.workers) nameById[w.worker_id]=fullName(w.workers); });
  const workerOpts=Object.entries(nameById).sort((a,b)=>a[1].localeCompare(b[1]));

  const [form,setForm]=useState({worker_id:"",kind:"ic_agreement",title:"",signed_on:"",expires_on:""});
  const [busy,setBusy]=useState(false); const [msg,setMsg]=useState("");
  async function addDoc(){
    if(!form.worker_id){setMsg("Pick a contractor.");return;}
    setBusy(true);setMsg("");
    const {error}=await client.from("documents").insert({
      worker_id:form.worker_id, company_id:companyId||null, kind:form.kind,
      title:form.title||DOC_KINDS.find(k=>k[0]===form.kind)[1],
      signed_on:form.signed_on||null, expires_on:form.expires_on||null});
    setBusy(false);
    if(error){setMsg(error.message);return;}
    setForm({worker_id:"",kind:"ic_agreement",title:"",signed_on:"",expires_on:""});
    reload();
  }

  const list=docs||[];
  const expiringSoon=list.filter(d=>{const n=daysUntil(d.expires_on); return n!=null && n<=30;});

  return (
    <div>
      <div className="card">
        <h2>Documents</h2>
        <p className="sub">Track each contractor's IC agreement, W-8BEN, and IDs.
          Set an expiry to get a reminder here when it's within 30 days (or overdue).</p>
        {expiringSoon.length>0 &&
          <div className="banner">{expiringSoon.length} document(s) expiring soon or overdue — see highlighted rows.</div>}
        <div className="row" style={{alignItems:"flex-end"}}>
          <div className="field"><label>Contractor</label>
            <select value={form.worker_id} onChange={e=>setForm({...form,worker_id:e.target.value})}>
              <option value="">Select…</option>
              {workerOpts.map(([id,nm])=><option key={id} value={id}>{nm}</option>)}
            </select></div>
          <div className="field"><label>Type</label>
            <select value={form.kind} onChange={e=>setForm({...form,kind:e.target.value})}>
              {DOC_KINDS.map(([v,l])=><option key={v} value={v}>{l}</option>)}
            </select></div>
          <div className="field"><label>Title (optional)</label>
            <input value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder="e.g. 2026 IC Agreement"/></div>
          <div className="field"><label>Signed</label>
            <input type="date" value={form.signed_on} onChange={e=>setForm({...form,signed_on:e.target.value})}/></div>
          <div className="field"><label>Expires</label>
            <input type="date" value={form.expires_on} onChange={e=>setForm({...form,expires_on:e.target.value})}/></div>
          <div className="field" style={{flex:"0 0 auto"}}>
            <button className="btn" disabled={busy} onClick={addDoc}>Add document</button></div>
        </div>
        <p className="muted" style={{fontSize:12}}>File upload to secure storage is a Phase-2 add-on
          (needs the Storage bucket from setup). For now this tracks the record + dates.</p>
        <Banner msg={msg} />
      </div>

      <div className="card">
        <h2>Tracked documents {consolidated?"· all companies":""}</h2>
        {loading?<div className="empty">Loading…</div>:
         list.length===0?<div className="empty">No documents yet. Add one above.</div>:
        <table>
          <thead><tr><th>Contractor</th><th>Type</th><th>Title</th><th>Signed</th><th>Expires</th><th>Status</th></tr></thead>
          <tbody>
            {list.map(d=>{
              const n=daysUntil(d.expires_on);
              const overdue=n!=null&&n<0, soon=n!=null&&n>=0&&n<=30;
              return (
                <tr key={d.id} style={overdue?{background:"#fee2e2"}:soon?{background:"var(--warn-soft)"}:{}}>
                  <td><b>{nameById[d.worker_id]||"—"}</b></td>
                  <td>{DOC_KINDS.find(k=>k[0]===d.kind)?.[1]||d.kind}</td>
                  <td>{d.title||"—"}</td>
                  <td>{d.signed_on||"—"}</td>
                  <td>{d.expires_on||<span className="muted">no expiry</span>}</td>
                  <td>{n==null?<span className="muted">—</span>:
                       overdue?<span className="pill bad">overdue {Math.abs(n)}d</span>:
                       soon?<span className="pill warn">in {n}d</span>:
                       <span className="pill active">ok</span>}</td>
                </tr>
              );
            })}
          </tbody>
        </table>}
      </div>
    </div>
  );
}

// ============================ REPORTS ========================================
function Reports({client,companyId,consolidated}){
  // Pull the full per-contractor breakdown so each period row can expand to
  // show who was paid what (no extra round-trip per period).
  const {data,loading}=useQuery(client,c=>{
    let q=c.from("payments").select(
      "company_id,worked_hours,rate_php,gross_php,health_allowance_php,pdd_lunch_php,"+
      "bonus_php,thirteenth_month_php,deduction_php,misc_items,net_php,payout_amount,payout_currency,"+
      "fx_rate,status,payout_method,worker_id,"+
      "pay_periods(period_start,period_end,pay_date,state),"+
      "companies(name),workers(first_name,middle_name,last_name)");
    if(!consolidated&&companyId)q=q.eq("company_id",companyId);
    return q;
  },[client,companyId,consolidated]);

  const [openKey,setOpenKey]=useState(null);   // which period row is expanded
  const pays=data||[];
  // group by period, keeping each contractor's line for the expandable detail
  const byPeriod={};
  pays.forEach(p=>{
    const pp=p.pay_periods||{}; const key=`${p.companies?.name||"?"}|${pp.period_start}|${pp.period_end}`;
    const g=byPeriod[key]||(byPeriod[key]={key,company:p.companies?.name,start:pp.period_start,end:pp.period_end,
      pay_date:pp.pay_date,count:0,net:0,usdRef:0,unpaid:0,fx:p.fx_rate,rows:[]});
    g.count++; g.net+=Number(p.net_php||0);
    g.usdRef+=p.fx_rate?Number(p.net_php||0)/Number(p.fx_rate):0;
    if(p.status!=="sent" && p.status!=="reconciled") g.unpaid+=Number(p.net_php||0);
    // Real (user-entered) deductions live in misc_items[kind=deduction] and ARE
    // subtracted from net. deduction_php is the rate−gross performance shortfall
    // (informational, NOT subtracted) — shown separately so the two aren't
    // conflated. misc (earns+hours−deductions) is the net contribution of the
    // Misc popup; miscDeduct isolates just the deduction portion for display.
    const items=Array.isArray(p.misc_items)?p.misc_items:[];
    const miscDeduct=items.filter(x=>x.kind==="deduction").reduce((s,x)=>s+(Number(x.amount)||0),0);
    const miscEarn=items.filter(x=>x.kind!=="deduction").reduce((s,x)=>s+(Number(x.amount)||0),0);
    g.rows.push({
      name:fullName(p.workers)||"(unknown)",
      hours:p.worked_hours, rate:p.rate_php, gross:p.gross_php, ha:p.health_allowance_php,
      lunch:p.pdd_lunch_php, bonus:p.bonus_php, t13:p.thirteenth_month_php,
      perfShort:p.deduction_php, miscEarn, miscDeduct,
      net:p.net_php, method:p.payout_method, status:p.status});
  });
  const periods=Object.values(byPeriod).sort((a,b)=>(b.start||"").localeCompare(a.start||""));
  const grandNet=periods.reduce((s,p)=>s+p.net,0);
  const grandUnpaid=periods.reduce((s,p)=>s+p.unpaid,0);
  const nCols=(consolidated?7:6)+1;   // for the detail row colSpan

  const paid=st=>st==="sent"||st==="reconciled";

  return (
    <div>
      <div className="card">
        <h2>Reports {consolidated?"· all companies (consolidated)":""}</h2>
        <p className="sub">Totals come from locked/saved pay statements.
          {consolidated?" Showing every company.":" Showing the selected company."}
          {" "}Click a period to see the per-contractor breakdown.</p>
        <div className="row">
          <div className="field"><label>Total net (all periods)</label>
            <div className="val" style={{fontSize:20,fontWeight:700}}>{money(grandNet,"PHP")}</div></div>
          <div className="field"><label>Unpaid / not yet sent</label>
            <div className="val" style={{fontSize:20,fontWeight:700,color:grandUnpaid>0?"var(--warn)":"var(--good)"}}>{money(grandUnpaid,"PHP")}</div></div>
          <div className="field"><label>Pay periods recorded</label>
            <div className="val" style={{fontSize:20,fontWeight:700}}>{periods.length}</div></div>
        </div>
      </div>

      <div className="card">
        <h2>Payout by pay period</h2>
        {loading?<div className="empty">Loading…</div>:
         periods.length===0?<div className="empty">No saved pay statements yet. Run &amp; lock a payroll first.</div>:
        <div className="table-scroll"><table>
          <thead><tr>
            <th style={{width:24}}></th>
            {consolidated&&<th>Company</th>}
            <th>Period</th><th>Pay date</th><th>Contractors</th><th>Net ₱</th><th>≈ USD ref</th><th>Unpaid ₱</th>
          </tr></thead>
          <tbody>
            {periods.map((p,i)=>{
              const open=openKey===p.key;
              return (
              <React.Fragment key={p.key}>
              <tr className="clickable" onClick={()=>setOpenKey(open?null:p.key)}
                  style={{cursor:"pointer", background:open?"#f1f5f9":undefined}}>
                <td style={{color:"var(--muted)"}}>{open?"▾":"▸"}</td>
                {consolidated&&<td>{p.company||"—"}</td>}
                <td>{p.start} → {p.end}</td>
                <td>{p.pay_date||"—"}</td>
                <td>{p.count}</td>
                <td><b>{money(p.net,"PHP")}</b></td>
                <td className="muted">{p.fx?money(p.usdRef,"USD"):"—"}</td>
                <td style={p.unpaid>0?{color:"var(--warn)",fontWeight:600}:{}}>{money(p.unpaid,"PHP")}</td>
              </tr>
              {open && (
                <tr>
                  <td colSpan={nCols} style={{background:"#f8fafc",padding:"8px 10px"}}>
                    <div style={{maxHeight:320,overflow:"auto"}}>
                      <table>
                        <thead><tr>
                          <th>Contractor</th><th>Hours</th><th>Rate ₱</th><th>Gross ₱</th>
                          <th>Health ₱</th><th>13th ₱</th><th>Lunch ₱</th><th>Bonus ₱</th>
                          <th>Misc earn ₱</th>
                          <th><span className="tip-wrap" tabIndex={0} style={{cursor:"help"}}>Deductions ₱

                          <th><span className="tip-wrap" tabIndex={0} style={{cursor:"help"}}>Perf. short ₱
                            <span className="tip-body">Performance shortfall = rate − gross when hours were under expectation. Informational only — NOT subtracted from Net.</span></span></th>
                          <th>Net ₱</th><th>Method</th><th>Status</th>
                        </tr></thead>
                        <tbody>
                          {[...p.rows].sort((a,b)=>a.name.localeCompare(b.name)).map((r,j)=>(
                            <tr key={j}>
                              <td><b>{r.name}</b></td>
                              <td>{r.hours!=null?Number(r.hours).toFixed(2):"—"}</td>
                              <td>{money(r.rate,"PHP")}</td>
                              <td>{money(r.gross,"PHP")}</td>
                              <td>{money(r.ha,"PHP")}</td>
                              <td>{money(r.t13,"PHP")}</td>
                              <td>{money(r.lunch,"PHP")}</td>
                              <td>{money(r.bonus,"PHP")}</td>
                              <td>{r.miscEarn?money(r.miscEarn,"PHP"):"—"}</td>
                              <td style={r.miscDeduct?{color:"#b91c1c"}:{}}>{r.miscDeduct?("-"+money(r.miscDeduct,"PHP")):"—"}</td>
                              <td className="muted">{r.perfShort?money(r.perfShort,"PHP"):"—"}</td>
                              <td><b>{money(r.net,"PHP")}</b></td>
                              <td>{methodLabel(r.method)||"—"}</td>
                              <td><span className="pill" style={paid(r.status)
                                    ?{background:"#dcfce7",color:"#065f46"}
                                    :{background:"#f3f4f6",color:"var(--muted)"}}>
                                  {paid(r.status)?"paid":(r.status||"draft")}</span></td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </td>
                </tr>
              )}
              </React.Fragment>
            );})}
          </tbody>
        </table></div>}
      </div>

      <PerContractorSummary client={client} companyId={companyId} consolidated={consolidated}/>

      <UtilizationReport client={client} companyId={companyId} consolidated={consolidated}/>

      <WiseReconciliation client={client} companyId={companyId} consolidated={consolidated}/>
    </div>
  );
}

// Per-contractor cross-period summary with a date range + CSV/print export.
// Answers "how much did we pay X this year" (visa renewals, mortgage letters,
// year-end statements) without copying period rows out by hand. Aggregates
// locked/saved pay statements by contractor over the chosen window.
function PerContractorSummary({client,companyId,consolidated}){
  // Default window: current calendar year to date.
  const yr=new Date().getFullYear();
  const [from,setFrom]=useState(`${yr}-01-01`);
  const [to,setTo]=useState("");
  const {data,loading}=useQuery(client,c=>{
    let q=c.from("payments").select(
      "company_id,worked_hours,gross_php,health_allowance_php,pdd_lunch_php,bonus_php,"+
      "thirteenth_month_php,deduction_php,net_php,misc_items,status,worker_id,"+
      "pay_periods(period_start,period_end,pay_date),companies(name),"+
      "workers(first_name,middle_name,last_name)");
    if(!consolidated&&companyId)q=q.eq("company_id",companyId);
    return q;
  },[client,companyId,consolidated]);

  const pays=data||[];
  // Filter by period_start within [from,to] (inclusive). Client-side because
  // the date lives on the joined pay_periods row.
  const inWindow=pays.filter(p=>{
    const s=p.pay_periods?.period_start; if(!s) return false;
    if(from && s<from) return false;
    if(to && s>to) return false;
    return true;
  });
  // misc sum helper (earns+hours add, deduction subtracts) — mirrors Payroll.
  const miscSum=items=>Array.isArray(items)?items.reduce((s,it)=>{
    const a=Number(it?.amount)||0; return s+(it?.kind==="deduction"?-a:a);
  },0):0;

  const byWorker={};
  inWindow.forEach(p=>{
    const key=`${p.worker_id}|${p.companies?.name||""}`;
    const g=byWorker[key]||(byWorker[key]={
      name:fullName(p.workers)||"(unknown)", company:p.companies?.name||"",
      periods:0, hours:0, gross:0, ha:0, t13:0, lunch:0, bonus:0, misc:0, ded:0, net:0, paid:0});
    g.periods++;
    g.hours+=Number(p.worked_hours||0);
    g.gross+=Number(p.gross_php||0);
    g.ha+=Number(p.health_allowance_php||0);
    g.t13+=Number(p.thirteenth_month_php||0);
    g.lunch+=Number(p.pdd_lunch_php||0);
    g.bonus+=Number(p.bonus_php||0);
    g.misc+=miscSum(p.misc_items);
    g.ded+=Number(p.deduction_php||0);
    g.net+=Number(p.net_php||0);
    if(p.status==="sent"||p.status==="reconciled") g.paid+=Number(p.net_php||0);
  });
  const rows=Object.values(byWorker).sort((a,b)=>a.name.localeCompare(b.name));
  const totNet=rows.reduce((s,r)=>s+r.net,0);

  function exportCsv(){
    // "Misc PHP" already nets user deductions (earns+hours−deductions). The
    // deduction_php column is the rate−gross performance shortfall — labeled
    // "Perf short PHP" so it isn't read as an actual withholding.
    const header=["Contractor",...(consolidated?["Company"]:[]),"Periods","Hours","Gross PHP",
      "Health PHP","13th PHP","Lunch PHP","Bonus PHP","Misc PHP (net)","Perf short PHP","Net PHP","Paid PHP"];
    const body=rows.map(r=>[r.name,...(consolidated?[r.company]:[]),r.periods,
      r.hours.toFixed(2),r.gross.toFixed(2),r.ha.toFixed(2),r.t13.toFixed(2),r.lunch.toFixed(2),
      r.bonus.toFixed(2),r.misc.toFixed(2),r.ded.toFixed(2),r.net.toFixed(2),r.paid.toFixed(2)]);
    downloadCSV(`contractor_summary_${from||"start"}_${to||"latest"}.csv`, [header,...body]);
  }

  return (
    <div className="card">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
        <div><h2>Per-contractor summary</h2>
          <p className="sub">Totals per contractor over a date range (by period start). For year-end
            statements, visa/mortgage letters, and quick "how much did we pay X" lookups.</p></div>
        <button className="btn ghost sm" disabled={!rows.length} onClick={exportCsv}>Export CSV ({rows.length})</button>
      </div>
      <div style={{display:"flex",gap:8,alignItems:"flex-end",flexWrap:"wrap",margin:"8px 0"}}>
        <div><label style={{fontSize:10,color:"var(--muted)"}}>From (period start)</label><br/>
          <input type="date" value={from} onChange={e=>setFrom(e.target.value)}/></div>
