// ============================ HUBSTAFF CSV PARSING ===========================
// Mirrors the verified Python parser: quoted CSV, date cols between "Member"
// and "Time off", HH:MM:SS values, trailing totals row skipped.
function parseCSV(text){
  const rows=[]; let i=0,field="",row=[],q=false;
  while(i<text.length){
    const ch=text[i];
    if(q){
      if(ch==='"'){ if(text[i+1]==='"'){field+='"';i++;} else q=false; }
      else field+=ch;
    }else{
      if(ch==='"')q=true;
      else if(ch===","){row.push(field);field="";}
      else if(ch==="\n"||ch==="\r"){
        if(ch==="\r"&&text[i+1]==="\n")i++;
        row.push(field);field="";
        if(row.some(c=>c.trim()!==""))rows.push(row);
        row=[];
      } else field+=ch;
    }
    i++;
  }
  if(field!==""||row.length){row.push(field);if(row.some(c=>c.trim()!==""))rows.push(row);}
  return rows;
}
function hmsToSeconds(s){
  if(!s)return 0; s=String(s).trim();
  if(!s||s==="0:00:00")return 0;
  const p=s.split(":").map(n=>parseInt(n,10)||0);
  const [h,m,sec]=[p[0]||0,p[1]||0,p[2]||0];
  return h*3600+m*60+sec;
}
// Tokenize a person's name into normalized, comparable word tokens:
// strip accents + punctuation, expand the common "Ma." -> "Maria", drop
// generational suffixes. Used by both the strict and loose match keys below.
function nameTokens(raw){
  if(!raw)return [];
  let s=String(raw).normalize("NFD").replace(/[̀-ͯ]/g,"") // strip accents
        .replace(/[.,]/g," ").replace(/\bMa\b/ig,"Maria")
        .replace(/\b(jr|sr|ii|iii|iv|n)\b/ig," ");
  return s.split(/\s+/).filter(Boolean).map(x=>x.toLowerCase());
}
// STRICT key: all tokens, sorted — so word order and extra middle names don't
// break a match ("manuella brittany gamboa" == "gamboa manuella brittany"), and
// the same full name always yields the same key. This is the primary match key.
function nameKey(raw){
  const t=nameTokens(raw);
  return t.length ? [...t].sort().join(" ") : "";
}
// LOOSE key: first + last token only (the legacy behavior). Kept as a fallback
// so a one-name-shorter record can still find its match (e.g. "Manuella Gamboa"
// loose-matches "Manuella Brittany Gamboa").
function looseKey(raw){
  const t=nameTokens(raw);
  if(!t.length)return "";
  return t.length===1?t[0]:`${t[0]} ${t[t.length-1]}`;
}
// Back-compat: normName is still called in a few places; route it to the strict
// key so all matching uses the same, more robust normalization.
function normName(raw){ return nameKey(raw); }
// Parse a Hubstaff daily-report into {dates:[iso], members:[{name,dayseconds{},totalSec,activity}]}
function parseHubstaff(text){
  const rows=parseCSV(text);
  if(!rows.length)throw new Error("Empty CSV");
  const header=rows[0].map(c=>c.trim());
  const mi=header.indexOf("Member")>=0?header.indexOf("Member"):2;
  const ti=header.indexOf("Time off");
  const tot=header.indexOf("Total worked");
  const act=header.indexOf("Activity");
  if(ti<0||tot<0)throw new Error('Not a Hubstaff daily report (missing "Time off"/"Total worked").');
  const dateCols=header.slice(mi+1,ti);
  const members=[];
  for(const r of rows.slice(1)){
    const name=(r[mi]||"").trim();
    if(!name)continue; // totals row
    const dayseconds={};
    dateCols.forEach((d,j)=>{dayseconds[d]=hmsToSeconds(r[mi+1+j]);});
    members.push({
      name, dayseconds,
      timeOffSec:hmsToSeconds(r[ti]),
      totalSec:hmsToSeconds(r[tot]),
      activity:(act>=0?(r[act]||"").trim():""),
    });
  }
  return {dates:dateCols,members};
}

// ============================ TIME IMPORT ====================================
function TimeImport({client,companyId,consolidated}){
  const [parsed,setParsed]=useState(null);
  const [err,setErr]=useState("");
  const [matches,setMatches]=useState([]);
  const [committing,setCommitting]=useState(false);
  const [done,setDone]=useState(null);
  const [notice,setNotice]=useState(null);   // {ok, text, unmatched:[names]}

  // load this company's hubstaff_name -> worker_id map (incl. inactive, so we can
  // still import a final period for a removed contractor — but we warn).
  const {data:links,reload:reloadLinks}=useQuery(client,c=>{
    let q=c.from("worker_companies").select("worker_id,hubstaff_name,hubstaff_user_id,status,workers(first_name,last_name,status)");
    if(companyId)q=q.eq("company_id",companyId);
    return q;
  },[client,companyId]);

  // #37: resolve an unmatched import row to a contractor, then re-match so their
  // hours import in this run. MATCH-BEFORE-CREATE: we first look for an existing
  // worker (in this company OR anywhere) whose name matches; if found we reuse and
  // (re)link them instead of inserting a duplicate. Only when no existing worker
  // matches do we create a brand-new one. This is the core duplicate fix.
  async function addContractor(member){
    if(!companyId){setErr("Pick a single company first.");return;}
    setErr("");
    let w=null;

    // (0) ID-FIRST (per the standing convention + race safety): if the import
    //     row carries a Hubstaff user_id, look for an existing link in THIS
    //     company that already has that stable id. This catches the case where
    //     another tab / a concurrent sync already added this person (immune to
    //     name differences), so we reuse instead of creating a duplicate or
    //     hitting the worker_companies_company_hubstaff_user partial-unique.
    if(member.user_id!=null){
      const {data:byId}=await client.from("worker_companies")
        .select("worker_id").eq("company_id",companyId)
        .eq("hubstaff_user_id",member.user_id).maybeSingle();
      if(byId?.worker_id){
        w={id:byId.worker_id};
        // keep the visible hubstaff_name label fresh for future name-based matches
        await client.from("worker_companies")
          .update({hubstaff_name:member.name,status:"active"})
          .eq("worker_id",w.id).eq("company_id",companyId);
      }
    }

    // (1) Look for an existing worker that matches this name. Pull every worker
    //     plus this company's links so we can match by hubstaff_name OR real name,
    //     using the same strict/loose keys the import matcher uses.
    const {data:allW}=await client.from("workers")
      .select("id,first_name,middle_name,last_name,status,"+
              "worker_companies(company_id,hubstaff_name,status)");
    const cand=(allW||[]).map(x=>{
      const link=(x.worker_companies||[]).find(l=>l.company_id===companyId);
      return {worker_id:x.id, inactive:(x.status==="ended"),
        keys:[link?.hubstaff_name, `${x.first_name||""} ${x.middle_name||""} ${x.last_name||""}`]
          .filter(Boolean), linkedHere:!!link};
    });
    const sk=nameKey(member.name), lk=looseKey(member.name);
    // ID-first match (w) wins; otherwise fall back to strict then loose name keys.
    let hit=(w && {worker_id:w.id, inactive:false})
          || cand.find(c=>c.keys.some(k=>nameKey(k)===sk))   // strict first
          || cand.find(c=>c.keys.some(k=>looseKey(k)===lk)); // loose fallback

    // store the stable Hubstaff id on the link when the import row carries one,
    // so the NEXT sync matches this person by id regardless of name changes.
    const idCol = member.user_id!=null ? {hubstaff_user_id:member.user_id} : {};
    if(hit){
      // reuse the existing worker — link to this company if not already, and make
      // sure the hubstaff_name label is set so future imports match automatically.
      w={id:hit.worker_id};
      const {error:le}=await client.from("worker_companies")
        .upsert({worker_id:w.id,company_id:companyId,contract:"FT",
                 hubstaff_name:member.name,status:"active",...idCol},
                {onConflict:"worker_id,company_id"});
      if(le){setErr("Link failed: "+le.message);return;}
    }else{
      // (2) No existing match — create a new worker, then link.
      const toks=member.name.trim().split(/\s+/);
      const first=toks[0]||member.name, last=toks.slice(1).join(" ")||"";
      const base={first_name:first,last_name:last,status:"active",
          health_allowance_eligible:true,thirteenth_month_eligible:true};
      let {data:nw,error:e1}=await client.from("workers").insert(base).select().single();
      // Fallback if the DB still has payout_method NOT NULL (pre-migration).
      if(e1 && /payout_method/i.test(e1.message)){
        ({data:nw,error:e1}=await client.from("workers")
          .insert({...base,payout_method:"wise"}).select().single());
        if(!e1) setTimeout(()=>setErr("Note: set "+member.name+"'s real payout method on their profile (defaulted to Wise)."),1500);
      }
      if(e1){setErr("Add failed: "+e1.message+" — run the FINISH_SETUP migration to make payout_method optional.");return;}
      w=nw;
      const {error:e2}=await client.from("worker_companies")
        .insert({worker_id:w.id,company_id:companyId,contract:"FT",
          hubstaff_name:member.name,status:"active",...idCol});
      if(e2){
        // Race: another tab/sync linked this Hubstaff id to the company between
        // our ID-first check and this insert (partial-unique on
        // company_id+hubstaff_user_id). Reuse the winner's worker and drop the
        // orphan worker we just created so we don't leave a duplicate.
        const isUnique=/duplicate key|unique|23505/i.test(e2.message||"");
        if(isUnique && member.user_id!=null){
          const {data:winner}=await client.from("worker_companies")
            .select("worker_id").eq("company_id",companyId)
            .eq("hubstaff_user_id",member.user_id).maybeSingle();
          if(winner?.worker_id){
            await client.from("workers").delete().eq("id",w.id);  // remove the orphan
            w={id:winner.worker_id};
          }else{ setErr("Link failed: "+e2.message);return; }
        }else{ setErr("Link failed: "+e2.message);return; }
      }
    }

    // backfill worker_id onto any ALREADY-IMPORTED time rows for this person
    // (so they attribute to the worker in payroll, which groups by worker_id)
    await client.from("time_entries").update({worker_id:w.id})
      .eq("company_id",companyId).eq("source_name",member.name).is("worker_id",null);
    logEvent(client,{company_id:companyId,action:"add_contractor",entity:member.name,
      detail:{from:"unmatched import row", reused:!!hit}});
    // refresh links, then rebuild the match table so this person now matches
    const {data:fresh}=await client.from("worker_companies")
      .select("worker_id,hubstaff_name,hubstaff_user_id,status,workers(first_name,last_name,status)")
      .eq("company_id",companyId);
    reloadLinks();
    if(parsed){
      const idx=indexLinks(fresh);
      setMatches(parsed.members.map(m=>{const h=matchExisting(m,idx);
        return {...m,key:nameKey(m.name),worker_id:h?h.worker_id:null,matched:!!h,inactive:!!(h&&h.inactive)};}));
    }
    if(parsed){
      // CSV preview is on screen — they'll be included in this same import.
      setErr(`Added ${member.name} — now matched. They'll be included in this import.`);
    }else{
      // API sync (no preview) — their time wasn't written while unmatched, so
      // remove them from the notice list and tell the user to re-sync.
      setNotice(n=>n?{...n,unmatched:(n.unmatched||[]).filter(x=>x!==member.name)}:n);
      setErr(`Added ${member.name}. Re-sync Hubstaff to import their time.`);
    }
  }

  // Build an index of existing contractors keyed BOTH by the strict (sorted-token)
  // key and the loose (first+last) key, derived from BOTH the hubstaff_name and
  // the worker's real name. An import row then matches on any of these, so the
  // same person is recognized even with reordered words, extra middle names, or a
  // name that was stored slightly differently. Strict keys win over loose.
  function indexLinks(linkRows){
    const byId={}, strict={}, loose={};
    (linkRows||[]).forEach(l=>{
      const inactive=(l.status==="ended")||(l.workers?.status==="ended");
      const val={worker_id:l.worker_id,inactive};
      // primary key: the stable Hubstaff user id, when stored
      if(l.hubstaff_user_id!=null && !byId[l.hubstaff_user_id]) byId[l.hubstaff_user_id]=val;
      // fallback keys: normalized name from both the hubstaff label and real name
      const realName=`${l.workers?.first_name||""} ${l.workers?.last_name||""}`;
      [l.hubstaff_name, realName].filter(Boolean).forEach(src=>{
        const sk=nameKey(src), lk=looseKey(src);
        if(sk && !strict[sk]) strict[sk]=val;
        if(lk && !loose[lk]) loose[lk]=val;
      });
    });
    return {byId,strict,loose};
  }
  // Resolve an import member to an existing worker. STABLE ID WINS: if the member
  // carries a Hubstaff user_id we've seen before, match on that (immune to name
  // changes). Otherwise fall back to strict name key, then loose first+last key.
  function matchExisting(member, idx){
    const uid=(member&&typeof member==="object")?member.user_id:null;
    const name=(member&&typeof member==="object")?member.name:member;
    if(uid!=null && idx.byId[uid]) return idx.byId[uid];
    return idx.strict[nameKey(name)] || idx.loose[looseKey(name)] || null;
  }
  function buildMatchTable(p){
    const idx=indexLinks(links);
    return p.members.map(m=>{
      const hit=matchExisting(m, idx);
      return {...m,key:nameKey(m.name),worker_id:hit?hit.worker_id:null,
              matched:!!hit, inactive:!!(hit&&hit.inactive)};
    });
  }
  function onFile(e){
    const f=e.target.files[0]; if(!f)return;
    setErr("");setDone(null);
    const rd=new FileReader();
    rd.onload=()=>{
      try{
        const p=parseHubstaff(rd.result);
        setParsed(p); setMatches(buildMatchTable(p));
      }catch(ex){setErr(ex.message);setParsed(null);}
    };
    rd.readAsText(f);
  }

  // ---- Phase 2: direct sync via the hubstaff-sync Edge Function -------------
  const [orgId,setOrgId]=useState(localStorage.getItem("hs_org")||"");
  const [syncStart,setSyncStart]=useState("");
  const [syncStop,setSyncStop]=useState("");
  const [syncing,setSyncing]=useState(false);
  const [orgs,setOrgs]=useState(null);        // null=unloaded, []=loaded
  const [loadingOrgs,setLoadingOrgs]=useState(false);
  async function listOrgs(){
    setErr("");setLoadingOrgs(true);
    try{
      const {data,error}=await client.functions.invoke("hubstaff-sync",{body:{action:"list_orgs"}});
      if(error)throw new Error(error.message||"Edge function error");
      if(data&&data.error)throw new Error(data.error);
      setOrgs(data.organizations||[]);
      if((data.organizations||[]).length===1) setOrgId(String(data.organizations[0].id));
    }catch(ex){
      setErr("Couldn't list orgs: "+ex.message+
        " — is the hubstaff-sync function deployed and HUBSTAFF_REFRESH_TOKEN set?");
    }finally{ setLoadingOrgs(false); }
  }
  function listDates(start,stop){
    const out=[]; let d=new Date(start+"T00:00:00"); const e=new Date(stop+"T00:00:00");
    while(d<=e){ out.push(d.toISOString().slice(0,10)); d.setDate(d.getDate()+1); }
    return out;
  }
  async function syncFromHubstaff(){
    if(consolidated){setErr("Switch to a single company to sync.");return;}
    if(!orgId||!syncStart||!syncStop){setErr("Enter Hubstaff org id, start and stop dates.");return;}
    setErr("");setDone(null);setNotice(null);setSyncing(true);
    try{
      localStorage.setItem("hs_org",orgId);
      // invoke the Edge Function; the refresh token stays server-side.
      const {data,error}=await client.functions.invoke("hubstaff-sync",{
        body:{org_id:Number(orgId),start:syncStart,stop:syncStop}});
      if(error)throw new Error(error.message||"Edge function error");
      if(data&&data.error)throw new Error(data.error);
      const dates=listDates(syncStart,syncStop);
      const members=(data.members||[]).map(m=>({
        name:m.name, user_id:m.user_id||null,
        dayseconds:m.days||{},         // tracked seconds per day
        ptoseconds:m.pto_days||{},     // paid+approved PTO seconds per day from Hubstaff
        totalSec:m.total||0,           // tracked-only total (back-compat)
        ptoTotalSec:m.pto_total||0,    // PTO-only total
        totalWithPtoSec:m.total_with_pto||((m.total||0)+(m.pto_total||0)),
        timeOffSec:0, activity:""}));
      const p={dates,members};
      const mt=buildMatchTable(p);
      // NOTE: API sync skips the preview entirely — it commits straight to the
      // Time Approval table. (CSV upload still uses the preview via onFile.)
      setMatches(mt);
      if(!members.length){
        setNotice({ok:false,text:"Hubstaff returned no activity for "+syncStart+" → "+syncStop+"."});
        return;
      }
      // auto-commit straight to approval with fromSync=true. writeRows() posts
      // the success notice (with unmatched names) once a write actually happens —
      // including after the user resolves an overlap. When commit pauses on
      // overlap it returns {paused}, and the overlap banner takes over until then.
      await commit(mt,p,true);
    }catch(ex){
      setNotice({ok:false,text:"Sync failed: "+ex.message+
        " — check the hubstaff-sync Edge Function is deployed and its token is set."});
    }finally{ setSyncing(false); }
  }

  const [overlap,setOverlap]=useState(null);   // {rows, existing:[{source_name,work_date}]}

  // Step 1: detect overlap with already-imported entries, then ask how to proceed.
  // Accepts optional explicit matches/parsed (so sync can commit without waiting
  // on React state). Falls back to component state for the manual CSV flow.
  async function commit(mArg, pArg, fromSync){
    if(!companyId){setErr("Pick a single company first (not consolidated).");return {};}
    const M=mArg||matches, P=pArg||parsed;
    setErr("");setOverlap(null);
    const rows=[];
    M.filter(m=>m.matched).forEach(m=>{
      P.dates.forEach(d=>{
        rows.push({company_id:companyId,worker_id:m.worker_id,source_name:m.name,
          work_date:d,
          tracked_seconds:(m.dayseconds?.[d]||0),
          pto_seconds:(m.ptoseconds?.[d]||0),   // 0 for CSV imports (no PTO source)
          activity_pct:(parseFloat(m.activity)||null),approval:"pending"});
      });
    });
    if(!rows.length){setErr("Nothing matched to import.");return {};}
    const names=[...new Set(rows.map(r=>r.source_name))];
    const {data:existing}=await client.from("time_entries")
      .select("source_name,work_date")
      .eq("company_id",companyId)
      .gte("work_date",P.dates[0]).lte("work_date",P.dates[P.dates.length-1])
      .in("source_name",names);
    const existKey=new Set((existing||[]).map(e=>`${e.source_name}|${e.work_date}`));
    const overlapping=rows.filter(r=>existKey.has(`${r.source_name}|${r.work_date}`));
    if(overlapping.length){
      const days=[...new Set(overlapping.map(r=>r.work_date))].sort();
      const ppl=[...new Set(overlapping.map(r=>r.source_name))];
      setOverlap({rows, overlapping, days, ppl, _parsed:P, _matches:M, _fromSync:!!fromSync});
      return {paused:true};   // wait for user choice — caller skips the notice
    }
    await writeRows(rows,"insert",P,M,fromSync);
    return {written:true};
  }

  // Step 2: perform the actual write per the user's chosen mode.
  async function writeRows(rows,mode,pArg,mArg,fromSync){
    const P=pArg||parsed, M=mArg||matches;
    setCommitting(true);setErr("");setOverlap(null);
    const batch=crypto.randomUUID();
    let toWrite=rows.map(r=>({...r,import_batch_id:batch}));
    if(mode==="skip"){
      const names=[...new Set(rows.map(r=>r.source_name))];
      const {data:existing}=await client.from("time_entries")
        .select("source_name,work_date").eq("company_id",companyId)
        .gte("work_date",P.dates[0]).lte("work_date",P.dates[P.dates.length-1])
        .in("source_name",names);
      const ex=new Set((existing||[]).map(e=>`${e.source_name}|${e.work_date}`));
      toWrite=toWrite.filter(r=>!ex.has(`${r.source_name}|${r.work_date}`));
      if(!toWrite.length){setCommitting(false);setErr("All rows already exist — nothing new to import.");return;}
    }
    const {error}=await client.from("time_entries")
      .upsert(toWrite,{onConflict:"company_id,source_name,work_date"});
    setCommitting(false);
    if(error){setErr(error.message);return;}
    // Teach the system the stable Hubstaff id for each matched contractor that
    // carries one, so the NEXT sync matches by id (immune to name edits). Best
    // effort — never blocks the import.
    try{
      const withId=M.filter(m=>m.matched && m.worker_id && m.user_id!=null);
      for(const m of withId){
        await client.from("worker_companies")
          .update({hubstaff_user_id:m.user_id})
          .eq("company_id",companyId).eq("worker_id",m.worker_id)
          .is("hubstaff_user_id",null);   // only fill when not already set
      }
    }catch(_){/* non-fatal */}
    const ppl=M.filter(m=>m.matched).length;
    logEvent(client,{company_id:companyId, action:"import",
      entity:`${P.dates[0]} → ${P.dates[P.dates.length-1]}`,
      detail:{contractors:ppl, rows:toWrite.length, mode, batch}});
    setDone({count:toWrite.length,people:ppl,
             days:P.dates.length,
             unmatched:M.filter(m=>!m.matched).length, batch, mode});
    // For API sync (which skips the preview), surface a success notice with any
    // unmatched names so the user can set up those profiles. The overlap-resolution
    // path also reaches here, so we read fromSync (threaded via overlap._fromSync).
    if(fromSync){
      const unmatched=M.filter(m=>!m.matched).map(m=>m.name);
      setNotice({ok:true,
        text:`Synced ${ppl} contractor(s) (${P.dates[0]} → ${P.dates[P.dates.length-1]}) straight to Time Approval`+
             (mode==="skip"?" — new rows only.":mode==="overwrite"?" — overwrote existing.":"."),
        unmatched});
    }
  }

  // #1: delete the import that was just committed
  async function deleteCurrentImport(){
    if(!done?.batch)return;
    setCommitting(true);
    await client.from("time_entries").delete()
      .eq("company_id",companyId).eq("import_batch_id",done.batch);
    logEvent(client,{company_id:companyId, action:"delete_import",
      entity:"current import", detail:{batch:done.batch, rows:done.count}});
    setCommitting(false);
    setDone(null);setParsed(null);setMatches([]);
    setErr("Last import deleted.");
  }

  const matchedN=matches.filter(m=>m.matched).length;
  const unmatchedN=matches.length-matchedN;

  return (
    <div>
      <div className="card">
        <h2>Hubstaff time import</h2>
        <p className="sub">Two ways to bring in time. Rows match contractors by their
          <b> Hubstaff name</b>; imported hours stage as <b>pending</b> until approved below.</p>
        {consolidated && <div className="banner">Switch to a single company to import (imports are per-company).</div>}

        <div className="grid-2">
          <div>
            <label style={{fontSize:11,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".03em"}}>Option A — upload CSV</label>
            <p className="muted" style={{fontSize:12,margin:"4px 0 8px"}}>Export the daily report from Hubstaff and drop the file here.</p>
            <input type="file" accept=".csv,text/csv" onChange={onFile} disabled={consolidated}/>
          </div>
          <div style={{borderLeft:"1px solid var(--border)",paddingLeft:16}}>
            <label style={{fontSize:11,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".03em"}}>Option B — sync from Hubstaff API</label>
            <p className="muted" style={{fontSize:12,margin:"4px 0 8px"}}>Pulls directly. Needs the <code>hubstaff-sync</code> Edge Function deployed and the token set (see setup).</p>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"flex-end"}}>
              <div><label style={{fontSize:10,color:"var(--muted)"}}>Organization</label><br/>
                {orgs && orgs.length
                  ? <select value={orgId} onChange={e=>setOrgId(e.target.value)} style={{minWidth:140}}>
                      <option value="">Select…</option>
                      {orgs.map(o=><option key={o.id} value={o.id}>{o.name} ({o.id})</option>)}
                    </select>
                  : <input style={{width:110}} value={orgId} onChange={e=>setOrgId(e.target.value)} placeholder="org id"/>}
              </div>
              <button className="btn ghost sm" disabled={loadingOrgs} onClick={listOrgs}>
                {loadingOrgs?"Loading…":(orgs?"↻ Orgs":"List my orgs")}</button>
              <div><label style={{fontSize:10,color:"var(--muted)"}}>Start</label><br/>
                <input type="date" value={syncStart} onChange={e=>setSyncStart(e.target.value)}/></div>
              <div><label style={{fontSize:10,color:"var(--muted)"}}>Stop</label><br/>
                <input type="date" value={syncStop} onChange={e=>setSyncStop(e.target.value)}/></div>
              <button className="btn" disabled={syncing||consolidated} onClick={syncFromHubstaff}>
                {syncing?"Syncing…":"Sync"}</button>
            </div>
          </div>
        </div>
        {err && <div className="banner" style={{marginTop:12}}>{err}</div>}

        {overlap && <div className="banner" style={{marginTop:12,background:"var(--warn-soft)",borderColor:"#fcd34d",color:"#92400e"}}>
          <b>Overlap detected.</b> {overlap.overlapping.length} row(s) for {overlap.ppl.length} contractor(s)
          on {overlap.days.length} day(s) ({overlap.days[0]}{overlap.days.length>1?` … ${overlap.days[overlap.days.length-1]}`:""})
          already exist from a previous import. How should I proceed?
          <div style={{marginTop:8,display:"flex",gap:8,flexWrap:"wrap"}}>
            <button className="btn sm" onClick={()=>writeRows(overlap.rows,"overwrite",overlap._parsed,overlap._matches,overlap._fromSync)}>Overwrite existing</button>
            <button className="btn ghost sm" onClick={()=>writeRows(overlap.rows,"skip",overlap._parsed,overlap._matches,overlap._fromSync)}>Skip overlapping (import only new)</button>
            <button className="btn ghost sm" onClick={()=>setOverlap(null)}>Cancel</button>
          </div>
          <div style={{marginTop:6,fontSize:12}}>Overlapping: {overlap.ppl.slice(0,8).join(", ")}{overlap.ppl.length>8?"…":""}</div>
        </div>}

        {done && <div className="banner success" style={{display:"block",marginTop:12}}>
          Imported <b>{done.people} contractor(s)</b> × {done.days||parsed?.dates?.length||"?"} days
          {" "}= {done.count} daily entries
          {done.mode==="skip"?" (new rows only)":done.mode==="overwrite"?" (overwrote existing)":""}.
          {done.unmatched>0 && ` ${done.unmatched} unmatched member(s) skipped.`} Review &amp; approve below.
          <div style={{marginTop:8}}>
            <button className="btn ghost sm" style={{borderColor:"var(--bad)",color:"var(--bad)"}}
              disabled={committing} onClick={deleteCurrentImport}>Delete this import</button>
          </div>
        </div>}

        {/* Hubstaff sync notification — success (with any unmatched names to set up)
            or failure. Dismissible. CSV import uses the preview + done banner above. */}
        {notice && <div className="banner" style={{marginTop:12,
            background:notice.ok?"#dcfce7":"#fee2e2",
            borderColor:notice.ok?"#86efac":"#fca5a5",
            color:notice.ok?"#065f46":"#991b1b"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
            <div><b>{notice.ok?"Hubstaff sync complete":"Hubstaff sync failed"}</b> — {notice.text}</div>
            <button className="btn ghost sm" aria-label="Dismiss" onClick={()=>setNotice(null)}>✕</button>
          </div>
          {notice.ok && notice.unmatched && notice.unmatched.length>0 && (
            <div style={{marginTop:10}}>
              <div style={{fontSize:13,marginBottom:6}}>
                <b>{notice.unmatched.length} Hubstaff member(s) didn't match a contractor</b> and were
                skipped. Set up their profile to include their time — add them here, then re-sync.
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {notice.unmatched.map((nm,i)=>(
                  <span key={i} className="pill warn" style={{display:"inline-flex",alignItems:"center",gap:6}}>
                    {nm}
                    {!consolidated &&
                      <button className="btn ghost sm" style={{padding:"0 6px"}}
                        onClick={()=>addContractor({name:nm})}>+ Add</button>}
                  </span>
                ))}
              </div>
            </div>
          )}
        </div>}
      </div>

      {parsed && (
        <div className="card">
          <h2>Preview · {parsed.dates[0]} → {parsed.dates[parsed.dates.length-1]}</h2>
          <p className="sub">{matchedN} matched · {unmatchedN} unmatched ·
            {" "}{parsed.dates.length} days in period.
            Unmatched members need their <code>hubstaff_name</code> set on the contractor.</p>
          <table>
            <thead><tr>
              <th>Hubstaff member</th><th>Match</th><th>Days worked</th>
              <th title="Time clocked into Hubstaff timer">Tracked (h)</th>
              <th title="Paid + approved time off from Hubstaff time_off_requests">PTO (h)</th>
              <th title="Tracked + PTO — this is what payroll uses">Total (h)</th>
              <th>Activity</th><th></th>
            </tr></thead>
            <tbody>
              {matches.map((m,i)=>{
                const daysWorked=parsed.dates.filter(d=>(m.dayseconds?.[d]||0)>0).length;
                const trackedH=(m.totalSec||0)/3600;
                const ptoH=(m.ptoTotalSec||0)/3600;
                const totalH=trackedH+ptoH;
                return (
                <tr key={i} style={m.inactive?{background:"var(--warn-soft)"}:{}}>
                  <td>{m.name}{m.inactive && <span className="muted" style={{fontSize:11}}> · inactive</span>}</td>
                  <td>{m.matched
                       ?(m.inactive
                          ?<span className="pill" style={{background:"#fde68a",color:"#92400e"}}>matched · inactive</span>
                          :<span className="pill active">matched</span>)
                       :<span className="pill warn">no match</span>}</td>
                  <td>{daysWorked} <span className="muted">/ {parsed.dates.length}</span></td>
                  <td>{trackedH.toFixed(2)}</td>
                  <td style={ptoH>0?{color:"var(--accent)",fontWeight:600}:{color:"var(--muted)"}}>
                    {ptoH>0?ptoH.toFixed(2):"—"}
                  </td>
                  <td style={{fontWeight:600}}>{totalH.toFixed(2)}</td>
                  <td>{m.activity||"—"}</td>
                  <td style={{textAlign:"right"}}>
                    {!m.matched && !consolidated &&
                      <button className="btn ghost sm" onClick={()=>addContractor(m)}>+ Add contractor</button>}
                  </td>
                </tr>
              );})}
            </tbody>
          </table>
          <p className="muted" style={{fontSize:12,marginTop:8}}>
            Each contractor is stored as one row per day of the period ({matchedN} × {parsed.dates.length}
            {" "}= {matchedN*parsed.dates.length} daily entries), including zero-hour days — that's what the
            payroll calculation needs. The approval and reports views group these back by contractor.</p>
          {matches.some(m=>m.matched&&m.inactive) &&
            <div className="banner" style={{background:"var(--warn-soft)",borderColor:"#fcd34d",color:"#92400e"}}>
              <b>Heads up:</b> {matches.filter(m=>m.matched&&m.inactive).length} matched contractor(s) are
              marked <b>inactive</b> ({matches.filter(m=>m.matched&&m.inactive).map(m=>m.name).join(", ")}).
              Their time will still import — useful for a final period — but confirm you intend to pay them.</div>}
          <div style={{marginTop:14}}>
            <button className="btn" disabled={committing||!matchedN||consolidated} onClick={commit}>
              {committing?"Importing…":`Import ${matchedN} contractor(s) → pending`}</button>
          </div>
        </div>
      )}

      <TimeApproval client={client} companyId={companyId} consolidated={consolidated} key={done?done.count:"a"}/>
    </div>
  );
}

// ---- delete imports ---------------------------------------------------------
function DeleteImports({client,companyId,consolidated,onDeleted}){
  const [delStart,setDelStart]=useState("");
  const [delStop,setDelStop]=useState("");
  const [busy,setBusy]=useState(false);
  // msg + msgTone — Banner defaults to success styling if tone isn't passed,
  // which used to mislead users into thinking 'no batch id; use date-range
  // delete instead' was a success message. Tone makes it honest.
  const [msg,setMsg]=useState("");
  const [msgTone,setMsgTone]=useState(null);   // 'info' | 'error' | 'success' | null
  const setInfo  =(m)=>{setMsg(m);setMsgTone("info");};
  const setErr   =(m)=>{setMsg(m);setMsgTone("error");};
  const setOk    =(m)=>{setMsg(m);setMsgTone("success");};
  const [armed,setArmed]=useState(null);   // which item is awaiting 2nd-click confirm
  // Extra-friction confirm text — only required when the date range overlaps
  // a locked/paid period. Forces the user to type DELETE to proceed.
  const [confirmText,setConfirmText]=useState("");
  const [viewing,setViewing]=useState(null); // {batchId, rows}

  async function viewBatch(b){
    if(viewing&&viewing.batchId===b.id){setViewing(null);return;}
    let q=client.from("time_entries")
      .select("source_name,work_date,tracked_seconds,approval")
      .eq("import_batch_id",b.id).order("source_name").order("work_date");
    if(companyId)q=q.eq("company_id",companyId);
    const {data}=await q;
    setViewing({batchId:b.id,rows:data||[]});
  }

  // recent import batches for this company (group time_entries by import_batch_id)
  const {data,reload}=useQuery(client,c=>{
    let q=c.from("time_entries")
      .select("import_batch_id,work_date,created_at")
      .order("created_at",{ascending:false}).limit(2000);
    if(companyId)q=q.eq("company_id",companyId);
    return q;
  },[client,companyId]);

  const batches={};
  (data||[]).forEach(r=>{
    const b=r.import_batch_id||"(no batch)";
    const g=batches[b]||(batches[b]={id:r.import_batch_id,rows:0,min:r.work_date,max:r.work_date,when:r.created_at});
    g.rows++; if(r.work_date<g.min)g.min=r.work_date; if(r.work_date>g.max)g.max=r.work_date;
  });
  const batchList=Object.values(batches).slice(0,12);

  // actual deletes (called only after the inline 2nd-click confirm)
  async function doDeleteBatch(b){
    setArmed(null);
    if(!b.id){
      setInfo("This group has no batch ID stored (legacy or manual data). "+
              "Use the date-range delete above, covering the dates shown for this batch.");
      return;
    }
    setBusy(true);setMsg("");setMsgTone(null);
    let q=client.from("time_entries").delete().eq("import_batch_id",b.id);
    if(companyId)q=q.eq("company_id",companyId);
    const {error}=await q;
    setBusy(false);
    if(error){setErr(error.message);return;}
    setOk(`Deleted import (${b.rows} rows).`); reload(); onDeleted&&onDeleted();
  }
  async function doDeleteRange(){
    setArmed(null); setConfirmText("");
    setBusy(true);setMsg("");setMsgTone(null);
    const {error,count}=await client.from("time_entries").delete({count:"exact"})
      .eq("company_id",companyId).gte("work_date",delStart).lte("work_date",delStop);
    setBusy(false);
    if(error){setErr(error.message);return;}
    setOk(`Deleted ${count??"?"} time entries in ${delStart} → ${delStop}.`);
    reload(); onDeleted&&onDeleted();
  }
  // arm the date-range delete: validate + count + check paid-period overlap,
  // then show an inline confirm whose label spells out the date range AND
  // warns if any paid/locked periods would lose their underlying time data.
  // This is the guard that should have caught the 2026-05-28 accident where
  // a user-typed range silently deleted 97 rows from already-paid periods.
  async function armRange(){
    if(consolidated||!companyId){setErr("Pick a single company to delete by date.");return;}
    if(!delStart||!delStop){setErr("Enter both start and stop dates.");return;}
    if(delStart>delStop){setErr("'From' must be on or before 'To'.");return;}
    // 1. fetch the actual rows that will be deleted (not just a count) so we can
    //    show a per-contractor dry-run preview BEFORE the user confirms. The
    //    window is one or a few half-month periods, so this is bounded
    //    (contractors × days) — typically a few hundred rows at most.
    const {data:rows}=await client.from("time_entries")
      .select("source_name,work_date,tracked_seconds,pto_seconds")
      .eq("company_id",companyId).gte("work_date",delStart).lte("work_date",delStop);
    const count=(rows||[]).length;
    if(!count){setInfo("No time entries in that range.");return;}
    // Group by contractor for the preview: row count, date span, total hours.
    const byName={};
    (rows||[]).forEach(r=>{
      const g=byName[r.source_name]||(byName[r.source_name]={name:r.source_name,rows:0,
        firstDate:r.work_date,lastDate:r.work_date,sec:0});
      g.rows++;
      g.sec+=(r.tracked_seconds||0)+(r.pto_seconds||0);
      if(r.work_date<g.firstDate) g.firstDate=r.work_date;
      if(r.work_date>g.lastDate)  g.lastDate=r.work_date;
    });
    const preview=Object.values(byName)
      .map(g=>({...g,hours:+(g.sec/3600).toFixed(2)}))
      .sort((a,b)=>a.name.localeCompare(b.name));
    // 2. do any locked/paid pay_periods overlap this window? If so, we want
    //    the user to see exactly which ones BEFORE they confirm.
    const {data:pps}=await client.from("pay_periods")
      .select("period_start,period_end,state")
      .eq("company_id",companyId)
      .in("state",["locked","paid"])
      .lte("period_start",delStop)
      .gte("period_end",delStart);
    const overlap=(pps||[]).filter(p=>p.period_start<=delStop && p.period_end>=delStart);
    setMsg("");setMsgTone(null);
    setArmed({type:"range",count,start:delStart,stop:delStop,overlap,preview});
  }

  return (
    <div className="card">
      <h2>Delete imports</h2>
      <p className="sub">Remove time you imported in error or want to re-pull. Click Delete,
        then Confirm. (Tip: re-importing the same period overwrites rather than duplicates,
        so you usually only need this to clear bad data.)</p>

      <div style={{marginBottom:14}}>
        <label style={{fontSize:11,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".03em"}}>By date range {consolidated?"(pick a single company)":""}</label>
        <div style={{display:"flex",gap:8,alignItems:"flex-end",marginTop:6}}>
          <div><label style={{fontSize:10,color:"var(--muted)"}}>From</label><br/>
            <input type="date" value={delStart} onChange={e=>{setDelStart(e.target.value);setArmed(null);}}/></div>
          <div><label style={{fontSize:10,color:"var(--muted)"}}>To</label><br/>
            <input type="date" value={delStop} onChange={e=>{setDelStop(e.target.value);setArmed(null);}}/></div>
          {armed&&armed.type==="range"
            ? (armed.overlap && armed.overlap.length>0
                // SAFE PATH: overlap with locked/paid periods. Require typed
                // 'DELETE' to confirm, and surface exactly which periods.
                ? <span style={{display:"inline-flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                    <span style={{fontSize:12,color:"var(--bad)",fontWeight:600}}>
                      Delete {armed.count} rows · {armed.start} → {armed.stop}
                    </span>
                    <span style={{fontSize:11,color:"var(--bad)"}}>
                      ⚠️ overlaps {armed.overlap.length} locked/paid period(s) ·
                      type DELETE to confirm
                    </span>
                    <input type="text" placeholder="type DELETE"
                      value={confirmText} onChange={e=>setConfirmText(e.target.value)}
                      style={{fontSize:12,padding:"2px 6px",width:110}}/>
                    <button className="btn sm" style={{background:"var(--bad)"}}
                      disabled={busy||confirmText!=="DELETE"}
                      onClick={doDeleteRange}>Confirm</button>
                    <button className="btn ghost sm" onClick={()=>{setArmed(null);setConfirmText("");}}>Cancel</button>
                  </span>
                // NORMAL PATH: no paid periods in range. Single-click confirm,
                // but spell the dates out so the user can't miss what's being deleted.
                : <span style={{display:"inline-flex",gap:6,alignItems:"center"}}>
                    <span style={{fontSize:12,color:"var(--bad)"}}>
                      Delete {armed.count} rows · {armed.start} → {armed.stop}?
                    </span>
                    <button className="btn sm" style={{background:"var(--bad)"}} disabled={busy}
                      onClick={doDeleteRange}>Confirm</button>
                    <button className="btn ghost sm" onClick={()=>setArmed(null)}>Cancel</button>
                  </span>)
            : <button className="btn ghost" style={{borderColor:"var(--bad)",color:"var(--bad)"}}
                disabled={busy||consolidated} onClick={armRange}>Delete range</button>}
        </div>
        {/* Dry-run preview: which contractors + how much time would be deleted.
            Shown whenever a range is armed, so the user sees WHO is affected
            (not just a row count) before confirming. */}
        {armed && armed.type==="range" && armed.preview && armed.preview.length>0 && (
          <div style={{marginTop:8,padding:"8px 10px",background:"#f8fafc",border:"1px solid var(--border)",borderRadius:4}}>
            <div style={{fontSize:12,fontWeight:600,marginBottom:4}}>
              Will delete {armed.count} row(s) across {armed.preview.length} contractor(s):
            </div>
            <div className="table-scroll" style={{maxHeight:180}}>
              <table style={{fontSize:12}}>
                <thead><tr><th>Contractor</th><th>Rows</th><th>Hours</th><th>Date span</th></tr></thead>
                <tbody>
                  {armed.preview.slice(0,30).map((g,i)=>(
                    <tr key={i}>
                      <td>{g.name}</td>
                      <td>{g.rows}</td>
                      <td>{g.hours.toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                      <td className="muted">{g.firstDate===g.lastDate?g.firstDate:`${g.firstDate} → ${g.lastDate}`}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            {armed.preview.length>30 && <p className="muted" style={{fontSize:11,margin:"4px 0 0"}}>…and {armed.preview.length-30} more contractor(s).</p>}
          </div>
        )}
        {/* If the range overlaps locked/paid periods, list them so the user
            sees exactly which periods would lose underlying time data. */}
        {armed && armed.type==="range" && armed.overlap && armed.overlap.length>0 && (
          <div style={{marginTop:8,padding:"8px 10px",background:"#fef3c7",border:"1px solid #fcd34d",borderRadius:4}}>
            <div style={{fontSize:12,fontWeight:600,marginBottom:4,color:"#92400e"}}>
              This range overlaps {armed.overlap.length} {armed.overlap.length===1?"period":"periods"} that {armed.overlap.length===1?"is":"are"} already locked/paid:
            </div>
            <ul style={{margin:0,paddingLeft:18,fontSize:12,color:"#92400e"}}>
              {armed.overlap.slice(0,10).map((p,i)=>(
                <li key={i}>{p.period_start} → {p.period_end} <b>· {p.state}</b></li>
              ))}
              {armed.overlap.length>10 && <li>…and {armed.overlap.length-10} more</li>}
            </ul>
            <p style={{margin:"6px 0 0",fontSize:11,color:"#92400e"}}>
              Deleting time entries here won't unwind the payments themselves, but it
              will break re-calculation, audit reports, and any future re-locking of these
              periods. If these are real paid periods, <b>cancel</b> and narrow your range.
            </p>
          </div>
        )}
      </div>

      <label style={{fontSize:11,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".03em"}}>By import batch (most recent)</label>
      {batchList.length===0?<div className="empty" style={{padding:20}}>No imports recorded.</div>:
      <table style={{marginTop:6}}>
        <thead><tr><th>Imported</th><th>Date range</th><th>Rows</th><th></th></tr></thead>
        <tbody>
          {batchList.map((b,i)=>(
            <React.Fragment key={i}>
            <tr>
              <td>{b.when?new Date(b.when).toLocaleString():"—"}</td>
              <td>{b.min} → {b.max}</td>
              <td>{b.rows}</td>
              <td style={{textAlign:"right"}}>
                <button className="btn ghost sm" disabled={!b.id} onClick={()=>viewBatch(b)}>
                  {viewing&&viewing.batchId===b.id?"Hide":"View"}</button>{" "}
                {armed&&armed.type==="batch"&&armed.i===i
                  ? <span style={{display:"inline-flex",gap:6,alignItems:"center"}}>
                      <button className="btn sm" style={{background:"var(--bad)"}} disabled={busy}
                        onClick={()=>doDeleteBatch(b)}>Confirm</button>
                      <button className="btn ghost sm" onClick={()=>setArmed(null)}>Cancel</button>
                    </span>
                  : <button className="btn ghost sm" style={{borderColor:"var(--bad)",color:"var(--bad)"}}
                      disabled={busy} onClick={()=>setArmed({type:"batch",i})}>Delete</button>}</td>
            </tr>
            {viewing&&viewing.batchId===b.id &&
              <tr><td colSpan={4} style={{background:"#fafafa",padding:0}}>
                <div style={{maxHeight:220,overflow:"auto",padding:"8px 10px"}}>
                  <table><thead><tr><th>Contractor</th><th>Date</th><th>Hours</th><th>Status</th></tr></thead>
                    <tbody>{viewing.rows.map((e,j)=>(
                      <tr key={j}><td>{e.source_name}</td><td>{e.work_date}</td>
                        <td>{(e.tracked_seconds/3600).toFixed(2)}</td><td>{e.approval}</td></tr>
                    ))}</tbody></table>
                </div></td></tr>}
            </React.Fragment>
          ))}
        </tbody>
      </table>}
      <Banner msg={msg} tone={msgTone||undefined} style={{marginTop:12}} />
    </div>
  );
}

// ---- approval workflow ------------------------------------------------------
function TimeApproval({client,companyId,consolidated}){
  const {data,loading,reload}=useQuery(client,c=>{
    let q=c.from("time_entries")
      .select("id,source_name,work_date,tracked_seconds,pto_seconds,approval,worker_id")
      .order("work_date",{ascending:true});
    if(companyId)q=q.eq("company_id",companyId);
    return q;
  },[client,companyId]);

  // active contractors in this company, for the manual-hours picker
  const {data:wcs}=useQuery(client,c=>{
    let q=c.from("worker_companies").select("worker_id,hubstaff_name,workers(first_name,last_name,status)").neq("status","ended");
    if(companyId)q=q.eq("company_id",companyId);
    return q;
  },[client,companyId]);
  const contractorOpts=(wcs||[]).filter(x=>x.workers&&x.workers.status!=="ended")
    .map(x=>({worker_id:x.worker_id, source:x.hubstaff_name||`${x.workers.first_name} ${x.workers.last_name}`.trim(),
      name:`${x.workers.first_name} ${x.workers.last_name}`.trim()}))
    .sort((a,b)=>a.name.localeCompare(b.name));

  const entries=data||[];
  // ACTIVE = still needs a decision (pending or rejected). APPROVED = history.
  const active=entries.filter(e=>e.approval!=="approved");
  const approved=entries.filter(e=>e.approval==="approved");

  // group active by contractor for review
  const byPerson={};
  active.forEach(e=>{(byPerson[e.source_name]=byPerson[e.source_name]||[]).push(e);});
  // Sort by contractor name so row order is STABLE — otherwise object-insertion
  // order (driven by work_date) makes rows jump around when hours change.
  const people=Object.entries(byPerson).sort((a,b)=>a[0].localeCompare(b[0]));

  // period span across ACTIVE entries (the period being approved now)
  const activeDates=active.map(e=>e.work_date).sort();
  const pStart=activeDates[0], pEnd=activeDates[activeDates.length-1];
  function countWorkingDays(start,end){
    if(!start||!end)return 0;
    let wd=0; const s=new Date(start+"T00:00:00"), e=new Date(end+"T00:00:00");
    for(let d=new Date(s); d<=e; d.setDate(d.getDate()+1)){ const w=d.getDay(); if(w>=1&&w<=5) wd++; }
    return Math.max(0, wd - holidaysInRange(start,end,true).length);
  }
  const periodDays=activeDates.length?new Set(activeDates).size:0;
  const workingDays=countWorkingDays(pStart,pEnd);

  // group APPROVED into periods by half-month span (via periodFor)
  const approvedPeriods={};
  approved.forEach(e=>{
    const p=periodFor(e.work_date); const key=`${p.start}|${p.end}`;
    const g=approvedPeriods[key]||(approvedPeriods[key]={start:p.start,end:p.end,entries:[]});
    g.entries.push(e);
  });
  const approvedList=Object.values(approvedPeriods).sort((a,b)=>b.start.localeCompare(a.start));

  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState("");               // FIX: was referenced but never declared (left busy stuck)
  const [showHistory,setShowHistory]=useState(false);
  const [openPeriod,setOpenPeriod]=useState(null);
  // Undo: { label, fn } — toast stays until clicked or dismissed (no time pressure).
  const [undo,setUndo]=useState(null);
  async function runUndo(){
    if(!undo)return;
    const fn=undo.fn; setUndo(null); setBusy(true); setMsg("");
    try{ await fn(); reload(); }
    catch(ex){ setMsg("Undo failed: "+(ex.message||ex)); }
    finally{ setBusy(false); }
  }
  const [editHrs,setEditHrs]=useState({});       // {source_name: hoursString} inline edits
  // per-row "Add hours" expansion: { name -> {mode:'total'|'daily', total:'', daily:{date:hrs}} }
  const [addRow,setAddRow]=useState(null);        // which contractor's add-hours panel is open
  const [addMode,setAddMode]=useState("total");   // 'total' | 'daily'
  const [addTotal,setAddTotal]=useState("");
  const [addDaily,setAddDaily]=useState({});      // {date: hoursString}
  // bottom manual-add row state (for a contractor not yet in the table).
  // addBottomMode toggles between a single period-total field and per-day
  // inputs (one input per date in the period) — same UX as the per-row
  // Add hours panel above. addBottomDaily is the {date: hoursString} map.
  const [addWid,setAddWid]=useState(""); const [addHrs,setAddHrs]=useState("");
  const [addBottomMode,setAddBottomMode]=useState("total");   // 'total' | 'daily'
  const [addBottomDaily,setAddBottomDaily]=useState({});

  // the period to write into: the active period if present, else default by dates
  const writePeriod = (pStart && pEnd) ? {start:pStart,end:pEnd} : periodFor(new Date().toISOString().slice(0,10));

  // list every date in the period being approved (writePeriod)
  function periodDates(){
    const out=[]; let d=new Date(writePeriod.start+"T00:00:00"); const e=new Date(writePeriod.end+"T00:00:00");
    while(d<=e){out.push(d.toISOString().slice(0,10));d.setDate(d.getDate()+1);}
    return out;
  }

  // edit an existing contractor's TOTAL for the period: put the whole total on the
  // first day, zero the rest (pay engine sums the period, so total is preserved).
  async function setContractorTotal(name, es, hoursStr){
    const h=parseFloat(hoursStr); if(isNaN(h)||h<0)return;
    setBusy(true);setMsg("");
    try{
      const sorted=[...es].sort((a,b)=>a.work_date.localeCompare(b.work_date));
      for(let i=0;i<sorted.length;i++){
        const secs=i===0?Math.round(h*3600):0;
        await client.from("time_entries").update({tracked_seconds:secs}).eq("id",sorted[i].id);
      }
      logEvent(client,{company_id:companyId,action:"manual_hours",entity:name,
        detail:{period:`${writePeriod.start} → ${writePeriod.end}`,hours:h,mode:"edit-total"}});
      setEditHrs(x=>{const n={...x};delete n[name];return n;});
      reload();
    }catch(ex){ setMsg("Couldn't save hours: "+(ex.message||ex)); }
    finally{ setBusy(false); }   // ALWAYS clear busy so the button never sticks on "Working…"
  }

  // Per-row "Add hours": write manual time for a named contractor (already in the
  // table) as a period TOTAL or DAY-BY-DAY. Upserts pending rows for the period.
  async function addHoursForContractor(name, es){
    // resolve worker_id + source_name from the existing rows for this contractor
    const wid=es.find(e=>e.worker_id)?.worker_id || null;
    const source=name;
    setMsg("");
    let rows=[];
    const dates=periodDates();
    // import_batch_id is a uuid column — must be a bare UUID (no "manual-" prefix).
    // Provenance is recorded in the audit log (action:"manual_hours") instead.
    const batch=crypto.randomUUID();
    if(addMode==="total"){
      const h=parseFloat(addTotal);
      if(isNaN(h)||h<=0){setMsg("Enter total hours for "+name+".");return;}
      rows=dates.map((dt,i)=>({company_id:companyId,worker_id:wid,source_name:source,
        work_date:dt,tracked_seconds:i===0?Math.round(h*3600):0,approval:"pending",
        import_batch_id:batch}));
    }else{
      rows=dates.map(dt=>({company_id:companyId,worker_id:wid,source_name:source,
        work_date:dt,tracked_seconds:Math.round((parseFloat(addDaily[dt])||0)*3600),approval:"pending",
        import_batch_id:batch}));
      if(!rows.some(r=>r.tracked_seconds>0)){setMsg("Enter hours for at least one day.");return;}
    }
    setBusy(true);
    try{
      const {error}=await client.from("time_entries").upsert(rows,{onConflict:"company_id,source_name,work_date"});
      if(error)throw error;
      const hrs=rows.reduce((s,r)=>s+r.tracked_seconds,0)/3600;
      logEvent(client,{company_id:companyId,action:"manual_hours",entity:name,
        detail:{period:`${writePeriod.start} → ${writePeriod.end}`,hours:+hrs.toFixed(2),mode:addMode}});
      // reset + close the panel
      setAddRow(null);setAddTotal("");setAddDaily({});setAddMode("total");
      reload();
    }catch(ex){ setMsg("Couldn't add hours: "+(ex.message||ex)); }
    finally{ setBusy(false); }
  }

  // bottom row: add manual hours for a contractor NOT yet in the table.
  // Two modes: 'total' (single number → stuffed onto day-0; payroll sums the
  // period so it's preserved) or 'daily' (one number per date → exact placement).
  async function addManualRow(){
    const opt=contractorOpts.find(o=>o.worker_id===addWid);
    if(!opt){setMsg("Pick a contractor.");return;}
    const dates=periodDates();
    let rows; let totalForLog;
    if(addBottomMode==="daily"){
      // Validate at least one non-zero day was entered
      const perDay=dates.map(dt=>({dt, h:parseFloat(addBottomDaily[dt])||0}));
      if(!perDay.some(d=>d.h>0)){setMsg("Enter hours for at least one day.");return;}
      const batch=crypto.randomUUID();
      rows=perDay.map(({dt,h})=>({company_id:companyId,worker_id:opt.worker_id,source_name:opt.source,
        work_date:dt,tracked_seconds:Math.round(h*3600),approval:"pending",
        import_batch_id:batch}));
      totalForLog=+perDay.reduce((s,d)=>s+d.h,0).toFixed(2);
    } else {
      const h=parseFloat(addHrs);
      if(isNaN(h)||h<=0){setMsg("Enter hours.");return;}
      const batch=crypto.randomUUID();
      rows=dates.map((dt,i)=>({company_id:companyId,worker_id:opt.worker_id,source_name:opt.source,
        work_date:dt,tracked_seconds:i===0?Math.round(h*3600):0,approval:"pending",
        import_batch_id:batch}));
      totalForLog=h;
    }
    setBusy(true);setMsg("");
    try{
      const {error}=await client.from("time_entries").upsert(rows,{onConflict:"company_id,source_name,work_date"});
      if(error)throw error;
      logEvent(client,{company_id:companyId,action:"manual_hours",entity:opt.name,
        detail:{period:`${writePeriod.start} → ${writePeriod.end}`,hours:totalForLog,mode:`add-${addBottomMode}`}});
      setAddWid("");setAddHrs("");setAddBottomDaily({});setAddBottomMode("total");
      reload();
    }catch(ex){ setMsg("Couldn't add hours: "+(ex.message||ex)); }
    finally{ setBusy(false); }
  }
  // delete one contractor's time entries (this view's period) — also the "reject" path
  // Delete a contractor's time — now immediate (no confirm) with an UNDO that
  // re-inserts the exact rows (same ids, so payroll links stay intact).
  async function deleteContractor(name,ids){
    if(!ids.length)return;
    setBusy(true);setMsg("");
    try{
      // snapshot the full rows first so Undo can restore them verbatim
      const {data:snap}=await client.from("time_entries").select("*").in("id",ids);
      const {error}=await client.from("time_entries").delete().in("id",ids);
      if(error)throw error;
      logEvent(client,{company_id:companyId,action:"delete_import",
        entity:name,detail:{entries:ids.length,scope:"individual",period:pStart?`${pStart} → ${pEnd}`:""}});
      setUndo({ label:`Removed ${name}'s time (${ids.length} entr${ids.length===1?"y":"ies"}).`,
        fn:async()=>{
          if(snap&&snap.length){
            await client.from("time_entries").insert(snap);
            logEvent(client,{company_id:companyId,action:"undo",entity:name,detail:{of:"delete",entries:snap.length}});
          }
        }});
      reload();
    }catch(ex){ setMsg("Couldn't remove: "+(ex.message||ex)); }
    finally{ setBusy(false); }
  }
  // Approve / reject — captures each row's PRIOR status so Undo restores them
  // individually (handles mixed prior states correctly).
  async function setApproval(ids,status){
    if(!ids.length)return;
    setBusy(true);setMsg("");
    try{
      const idSet=new Set(ids);
      const prior=entries.filter(e=>idSet.has(e.id)).map(e=>({id:e.id,approval:e.approval}));
      const {error}=await client.from("time_entries").update({approval:status}).in("id",ids);
      if(error)throw error;
      logEvent(client,{company_id:companyId, action:status==="approved"?"approve":"reject",
        entity:pStart?`${pStart} → ${pEnd}`:"time entries", detail:{entries:ids.length}});
      const verb=status==="approved"?"Approved":"Rejected";
      setUndo({ label:`${verb} ${ids.length} entr${ids.length===1?"y":"ies"}.`,
        fn:async()=>{
          // restore prior statuses, grouping ids by their previous value
          const byStatus={};
          prior.forEach(p=>{(byStatus[p.approval]=byStatus[p.approval]||[]).push(p.id);});
          for(const [st,idl] of Object.entries(byStatus)){
            await client.from("time_entries").update({approval:st}).in("id",idl);
          }
          logEvent(client,{company_id:companyId,action:"undo",entity:"approval",detail:{of:status,entries:ids.length}});
        }});
      reload();
    }catch(ex){ setMsg("Couldn't update approval: "+(ex.message||ex)); }
    finally{ setBusy(false); }
  }
  const pendingIds=active.filter(e=>e.approval==="pending").map(e=>e.id);
  const pendingTotal=pendingIds.length;

  // Only blank the card on the FIRST load (data still null). On reloads after
  // approve/delete, `loading` flips true briefly but data is already present —
  // keep the table rendered so the in-progress add-hours panel and scroll
  // position survive. (Same guard as the Contractors modal fix.)
  if(loading && !data)return <div className="card"><div className="empty">Loading time entries…</div></div>;
  return (
    <div className="card">
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
        <div>
          <h2>Time approval</h2>
          <p className="sub">Review staged hours before they become payable.
            {" "}{pendingTotal} pending entr{pendingTotal===1?"y":"ies"}.
            {pStart && <span> · span {pStart} → {pEnd} ({periodDays} days, {workingDays} working).</span>}</p>
        </div>
        {people.length>0 &&
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button className="btn" disabled={busy||!pendingTotal}
            onClick={()=>setApproval(pendingIds,"approved")}>
            {busy?"Working…":`Approve all pending (${pendingTotal})`}</button>
          <button className="btn ghost" disabled={busy||!pendingTotal}
            onClick={()=>setApproval(pendingIds,"rejected")}>
            Reject all pending</button>
        </div>}
      </div>

      {/* Undo toast — stays until clicked or dismissed (no auto-expire). */}
      {undo && <div className="banner" style={{marginTop:10,display:"flex",justifyContent:"space-between",
          alignItems:"center",gap:12,background:"#eef2ff",borderColor:"#c7d2fe",color:"#3730a3"}}>
        <span>{undo.label}</span>
        <span style={{display:"inline-flex",gap:6,whiteSpace:"nowrap"}}>
          <button className="btn sm" disabled={busy} onClick={runUndo}>Undo</button>
          <button className="btn ghost sm" onClick={()=>setUndo(null)}>Dismiss</button>
        </span>
      </div>}

      <Banner msg={msg} style={{marginTop:10}} />

      {people.length===0 && approved.length>0 && !consolidated && companyId &&
        <div className="banner success">
          Nothing pending — all imported time is approved. Add manual hours below, or import another period.</div>}
      {(consolidated || !companyId)
        ? <div className="empty">{consolidated
            ? "Time review is per-company — switch to a single company to review and approve time."
            : "Pick a single company to review time."}</div>
        : <div className="table-scroll"><table>
        <thead><tr>
          <th>Contractor</th>
          <th>Days in period</th>
          <th>Working days</th>
          <th>Days worked</th>
          <th title="Time clocked into Hubstaff timer">Tracked (h)</th>
          <th title="Paid time off from Hubstaff (status=approved)">PTO (h)</th>
          <th title="Tracked + PTO — this is what payroll uses">Total (h)</th>
          <th>Status</th><th></th>
        </tr></thead>
        <tbody>
          {people.map(([name,es])=>{
            const ids=es.map(e=>e.id);
            const trackedSec=es.reduce((s,e)=>s+(e.tracked_seconds||0),0);
            const ptoSec=es.reduce((s,e)=>s+(e.pto_seconds||0),0);
            const trackedH=(trackedSec/3600).toFixed(2);
            const ptoH=(ptoSec/3600).toFixed(2);
            const totalH=((trackedSec+ptoSec)/3600).toFixed(2);
            const daysWorked=es.filter(e=>(e.tracked_seconds||0)>0 || (e.pto_seconds||0)>0).length;
            const statuses=new Set(es.map(e=>e.approval));
            const status=statuses.size===1?[...statuses][0]:"mixed";
            const editing=editHrs[name]!==undefined;
            const adding=addRow===name;
            return (
              <React.Fragment key={name}>
              <tr>
                <td><b>{name}</b></td>
                <td>{periodDays}</td>
                <td>{workingDays}</td>
                <td>{daysWorked}</td>
                {/* Tracked is editable (manual override of Hubstaff timer). */}
                <td>
                  {editing
                    ? <span style={{display:"inline-flex",gap:4,alignItems:"center"}}>
                        <input type="number" step="0.01" autoFocus style={{width:80}}
                          value={editHrs[name]} onChange={e=>setEditHrs(x=>({...x,[name]:e.target.value}))}/>
                        <button className="btn sm" disabled={busy} onClick={()=>setContractorTotal(name,es,editHrs[name])}>✓</button>
                        <button className="btn ghost sm" onClick={()=>setEditHrs(x=>{const n={...x};delete n[name];return n;})}>✕</button>
                      </span>
                    : <span>{trackedH} <button className="btn ghost sm" title="Edit tracked hours (Hubstaff timer time)"
                        style={{padding:"1px 6px"}} onClick={()=>setEditHrs(x=>({...x,[name]:trackedH}))}>✎</button></span>}
                </td>
                {/* PTO is API-sourced (not editable here); shown as muted if zero. */}
                <td style={ptoSec>0?{color:"var(--accent)",fontWeight:600}:{color:"var(--muted)"}}>
                  {ptoSec>0?ptoH:"—"}
                </td>
                {/* Total = Tracked + PTO. This is what payroll uses. */}
                <td style={{fontWeight:600}}>{totalH}</td>
                <td><span className="pill" style={status==="rejected"?{background:"#fee2e2",color:"var(--bad)"}:{background:"var(--warn-soft)",color:"var(--warn)"}}>
                      {status}</span></td>
                <td style={{textAlign:"right",whiteSpace:"nowrap"}}>
                  <button className="btn sm" disabled={busy} onClick={()=>setApproval(ids,"approved")}>Approve</button>{" "}
                  <button className="btn ghost sm" onClick={()=>{
                    // open the inline add-hours panel for THIS contractor, PRE-FILLED
                    // with the hours already on each day so they're edited, not wiped.
                    if(adding){ setAddRow(null); setMsg(""); return; }
                    const seed={};
                    es.forEach(e=>{ const h=e.tracked_seconds/3600; if(h>0) seed[e.work_date]=String(+h.toFixed(2)); });
