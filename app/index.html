        openPeriodForEdit({start:p.period_start, end:p.period_end});
      } else if(typeof goTab==="function"){ goTab("payroll"); }
    }catch(ex){ setMsg("Unlock failed: "+(ex.message||ex)); }
    finally{ setBusy(false); }
  }

  useEffect(()=>{
    if(!client||!companyId){setPeriods([]);return;}
    client.from("pay_periods").select("id,period_start,period_end,pay_date,state")
      .eq("company_id",companyId).in("state",["locked","paid"])
      .order("period_start",{ascending:false}).then(({data})=>setPeriods(data||[]));
  },[client,companyId,active]);

  // Background check for the Process & Pay empty state: are there batches
  // waiting upstream? (open pay_periods = drafts to lock in Calculate, and
  // pending time_entries to approve in Time & Approval.) Drives the prompt.
  const [prep,setPrep]=useState({drafts:[],pending:0});
  useEffect(()=>{
    if(reconcileOnly||!client||!companyId||consolidated){return;}
    (async()=>{
      // "Not yet locked" = an OPEN pay_period that actually has payment rows
      // (a real calculated draft). Empty open periods (e.g. left behind after a
      // batch delete) are NOT counted — they're not waiting on anything.
      const {data:open}=await client.from("pay_periods").select("id,period_start,period_end")
        .eq("company_id",companyId).eq("state","open");
      let drafts=[];
      if(open && open.length){
        const ids=open.map(p=>p.id);
        const {data:pays}=await client.from("payments").select("pay_period_id").in("pay_period_id",ids);
        const withPay=new Set((pays||[]).map(p=>p.pay_period_id));
        drafts=open.filter(p=>withPay.has(p.id))
          .map(p=>({start:p.period_start,end:p.period_end}))
          .sort((a,b)=>(b.start||"").localeCompare(a.start||""));
      }
      const {count:pending}=await client.from("time_entries")
        .select("id",{count:"exact",head:true}).eq("company_id",companyId).eq("approval","pending");
      setPrep({drafts, pending:pending||0});
    })();
  },[client,companyId,consolidated,active,reconcileOnly]);

  const [busy,setBusy]=useState(false);
  async function load(pid){
    // Switching periods: clear ALL period-scoped state so the new period
    // starts clean. Otherwise the previous period's Reconcile / match results
    // and any in-flight inline-confirm prompts linger on screen and look like
    // they belong to the new period.
    setPeriodId(pid);setRows(null);setMsg("");setPers(null);
    setReconResult(null); setMatchResult(null);
    setPaidArm({}); setUnlockArm({});
    setUndo(null);
    if(!pid)return;
    const pp=periods.find(p=>p.id===pid); setPers(pp);
    const {data,error}=await client.from("payments")
      .select("id,worker_id,net_php,original_net_php,payout_method,status,paid_at,wise_transfer_id,wise_dates,wise_locked_at,company_id,"+
              "workers(first_name,middle_name,last_name,email,status,payout_method,wise_recipient_id,wise_recipient_uuid)")
      .eq("pay_period_id",pid);
    if(error){setMsg(error.message);return;}
    // Pull worker_companies status for THIS period's company so we can flag
    // rows whose company link has been ended (independent of the worker-level
    // status). Common scenario: contractor is still 'active' globally but the
    // link to this company was ended after lock.
    const workerIds=(data||[]).map(p=>p.worker_id);
    let linkStatusByWorker={};
    // Periods are scoped to the currently selected company, so companyId is
    // the right key to look up worker_companies link status.
    if(workerIds.length && companyId){
      const {data:wcs}=await client.from("worker_companies")
        .select("worker_id,status,ended_on")
        .eq("company_id",companyId).in("worker_id",workerIds);
      (wcs||[]).forEach(l=>{ linkStatusByWorker[l.worker_id]=l; });
    }
    setRows((data||[]).map(p=>{
      const wkStatus=p.workers?.status||"active";
      const link=linkStatusByWorker[p.worker_id];
      const linkStatus=link?.status||"active";
      const workerMethod=p.workers?.payout_method||null;
      return {
        payment_id:p.id,
        worker_id:p.worker_id,
        name:fullName(p.workers),
        email:p.workers?.email||"",
        net:Number(p.net_php||0),
        original_net:p.original_net_php!=null?Number(p.original_net_php):null,  // non-null = matcher overrode
        method:p.payout_method||"",
        recipient_id:p.workers?.wise_recipient_id||"",
        recipient_uuid:p.workers?.wise_recipient_uuid||"",   // for the manual-batch CSV recipientId
        transfer_id:p.wise_transfer_id||null,
        status:p.status||"draft", paid_at:p.paid_at||null,
        wise_dates:p.wise_dates||null,   // { created, dateFunded, dateSent } from Wise
        locked_at:p.wise_locked_at||null,  // when non-null this row is locked
        // Stale-state indicators — set when the snapshot diverges from the
        // contractor's current state. UI shows a 🚫 inactive badge or a method-
        // drift hint so you know why a locked row may behave oddly later.
        worker_status:wkStatus,
        link_status:linkStatus,
        link_ended_on:link?.ended_on||null,
        stale_inactive:(wkStatus!=="active") || (linkStatus!=="active"),
        method_drift:!!(workerMethod && p.payout_method && workerMethod!==p.payout_method),
        current_worker_method:workerMethod,
      };
    }).sort((a,b)=>a.name.localeCompare(b.name)));
    // complete the lifecycle: if every payment is sent, advance the period to 'paid'
    const list=data||[];
    if(list.length && list.every(p=>p.status==="sent") && pp && pp.state!=="paid"){
      await client.from("pay_periods").update({state:"paid"}).eq("id",pid);
      setPers({...pp,state:"paid"});
      // refresh the dropdown labels
      client.from("pay_periods").select("id,period_start,period_end,pay_date,state")
        .eq("company_id",companyId).in("state",["locked","paid"])
        .order("period_start",{ascending:false}).then(({data})=>setPeriods(data||[]));
    }
  }

  // mark one (or all) paid — manual fallback, with UNDO (status only; no money moves).
  // paidOnIso lets the caller specify the REAL pay date for BPI/manual rows; if
  // omitted, defaults to now() (used by the "Mark all paid" bulk button which
  // can't pop a date picker per row).
  async function markPaid(workerIds, paidOnIso){
    if(!workerIds.length)return;
    // Only gate the bulk path — single-row "Mark paid" is the lightweight
    // per-row affordance and prompting on each click would be obnoxious.
    if(workerIds.length>1 && !(await gate(`Mark ${workerIds.length} contractor(s) paid`))) return;
    setBusy(true);setMsg("");
    try{
      // snapshot prior status/paid_at per worker, and the period state, for Undo
      const prior=(rows||[]).filter(r=>workerIds.includes(r.worker_id))
        .map(r=>({worker_id:r.worker_id,status:r.status,paid_at:r.paid_at}));
      const priorPeriodState=pers?.state;
      const stampIso=paidOnIso||new Date().toISOString();
      await client.from("payments").update({status:"sent",paid_at:stampIso})
        .eq("pay_period_id",periodId).in("worker_id",workerIds);
      const names=(rows||[]).filter(r=>workerIds.includes(r.worker_id)).map(r=>r.name);
      logEvent(client,{company_id:companyId, action:"mark_paid",
        entity:`${pers?.period_start} → ${pers?.period_end}`,
        detail:{count:workerIds.length, contractors:names, method:"manual"}});
      const pid=periodId;
      setUndo({ label:`Marked ${workerIds.length} contractor(s) paid.`,
        fn:async()=>{
          for(const p of prior){
            await client.from("payments").update({status:p.status||"draft",paid_at:p.paid_at||null})
              .eq("pay_period_id",pid).eq("worker_id",p.worker_id);
          }
          // if marking paid had advanced the period to 'paid', step it back to 'locked'
          if(priorPeriodState && priorPeriodState!=="paid"){
            await client.from("pay_periods").update({state:priorPeriodState}).eq("id",pid);
          }
          logEvent(client,{company_id:companyId,action:"undo",entity:"mark_paid",detail:{count:prior.length}});
        }});
      load(periodId);
    }catch(ex){ setMsg("Couldn't mark paid: "+(ex.message||ex)); }
    finally{ setBusy(false); }
  }
  // mark one (or all) UNPAID — reverse of markPaid. Status only; no money moves.
  // Mirrors markPaid: snapshots for Undo, logs the event, and steps the period
  // state back from 'paid' to 'locked' so a reversed period isn't shown as paid.
  async function markUnpaid(workerIds){
    if(!workerIds.length)return;
    setBusy(true);setMsg("");
    try{
      // snapshot prior status/paid_at per worker, and the period state, for Undo
      const prior=(rows||[]).filter(r=>workerIds.includes(r.worker_id))
        .map(r=>({worker_id:r.worker_id,status:r.status,paid_at:r.paid_at}));
      const priorPeriodState=pers?.state;
      await client.from("payments").update({status:"draft",paid_at:null})
        .eq("pay_period_id",periodId).in("worker_id",workerIds);
      // a reversed period is no longer fully paid — step it back to 'locked'
      if(priorPeriodState==="paid"){
        await client.from("pay_periods").update({state:"locked"}).eq("id",periodId);
        setPers({...pers,state:"locked"});
      }
      const names=(rows||[]).filter(r=>workerIds.includes(r.worker_id)).map(r=>r.name);
      logEvent(client,{company_id:companyId, action:"mark_unpaid",
        entity:`${pers?.period_start} → ${pers?.period_end}`,
        detail:{count:workerIds.length, contractors:names}});
      const pid=periodId;
      setUndo({ label:`Reverted ${workerIds.length} contractor(s) to unpaid.`,
        fn:async()=>{
          for(const p of prior){
            await client.from("payments").update({status:p.status||"draft",paid_at:p.paid_at||null})
              .eq("pay_period_id",pid).eq("worker_id",p.worker_id);
          }
          // restore the period state if reversing had stepped it back
          if(priorPeriodState && priorPeriodState!=="locked"){
            await client.from("pay_periods").update({state:priorPeriodState}).eq("id",pid);
          }
          logEvent(client,{company_id:companyId,action:"undo",entity:"mark_unpaid",detail:{count:prior.length}});
        }});
      load(periodId);
    }catch(ex){ setMsg("Couldn't mark unpaid: "+(ex.message||ex)); }
    finally{ setBusy(false); }
  }
  // bulk reverse: paid rows WITHOUT a Wise transfer (those need individual handling),
  // with a confirmation since un-paying a whole period is a larger action.
  async function markAllUnpaid(){
    const ids=(rows||[]).filter(r=>r.status==="sent" && !r.transfer_id).map(r=>r.worker_id);
    const skipped=(rows||[]).filter(r=>r.status==="sent" && r.transfer_id).length;
    if(!ids.length){
      setMsg(skipped?`All paid rows have a Wise transfer — reverse those individually.`:`Nothing to reverse.`);
      return;
    }
    const note=skipped?` (${skipped} with a Wise transfer will be skipped — handle individually)`:"";
    if(!(await confirmDanger({
      title:`Revert ${ids.length} contractor(s) to unpaid?`,
      message:`Revert ${ids.length} contractor(s) in this period to unpaid?${note}\n\nThis changes status only — it does NOT move money or cancel any Wise transfer.`,
      consequence:"If you re-open and RECALCULATE this period afterward, all manual overrides and adjustments (Health Allowance, PDD Lunch, 13th, bonus, gross overrides) will be reset to hours-based values. Do not recalculate if you want to keep imported/adjusted amounts.",
      confirmWord:"UNPAID", confirmLabel:"Revert to unpaid",
    }))) return;
    markUnpaid(ids);
  }
  // API check: read Wise transfer status and auto-mark paid where sent/completed
  async function checkWiseStatus(){
    const withTransfer=(rows||[]).filter(r=>r.transfer_id);
    if(!withTransfer.length){setMsg("No drafted Wise transfers to check. Use the API draft first, or mark paid manually.");return;}
    setBusy(true);setMsg("");
    try{
      const {data,error}=await client.functions.invoke("wise-payouts",{
        body:{action:"status",transfer_ids:withTransfer.map(r=>r.transfer_id)}});
      if(error)throw new Error(error.message||"Edge function error");
      if(data&&data.error)throw new Error(data.error);
      // Only terminal-success states mark the payment paid. "processing" and
      // "funds_converted" are IN-FLIGHT — the money hasn't left Wise yet, so
      // recording them as sent in the DB would be a false positive.
      const paidStates=new Set(["outgoing_payment_sent","completed","sent"]);
      const inFlightStates=new Set(["processing","funds_converted","incoming_payment_waiting","waiting_recipient_input_to_proceed"]);
      const byId={}; (data.statuses||[]).forEach(s=>byId[String(s.id)]=s.status);
      let marked=0, inFlight=0;
      for(const r of withTransfer){
        const st=byId[String(r.transfer_id)];
        if(st && paidStates.has(st)){
          await client.from("payments").update({status:"sent",paid_at:new Date().toISOString()})
            .eq("pay_period_id",periodId).eq("worker_id",r.worker_id);
          marked++;
        } else if(st && inFlightStates.has(st)){
          inFlight++;
        }
      }
      const inFlightNote=inFlight?` · ${inFlight} still in-flight (not yet sent)`:"";
      setMsg(`Checked ${withTransfer.length} Wise transfer(s); ${marked} now marked paid${inFlightNote}.`);
      load(periodId);
    }catch(ex){ setMsg("Wise status check failed: "+ex.message); }
    finally{ setBusy(false); }
  }

  // ============ Reconcile with Wise (processed-batch CSV import + status + variance) ===========
  // When you upload a Wise batch CSV manually, Wise generates the transfer IDs
  // server-side and never returns them to the app — so those rows have no
  // wise_transfer_id and can't be polled. After Wise processes the batch you
  // can re-download the processed CSV (Batch payments → ... → Download), which
  // has the original upload columns PLUS a transferId column. Importing it
  // backfills wise_transfer_id and unlocks status polling for that period.
  const [reconResult,setReconResult]=useState(null);   // { imported, skipped, variances, polled, parseErrors }
  const reconFileRef=React.useRef(null);

  // Parse the processed Wise CSV. We're permissive about column naming because
  // Wise has shipped a few variants (transferId vs id; amount vs sourceAmount).
  function parseWiseProcessedCsv(text){
    const grid=parseCSV(text);
    if(!grid.length) return { rows:[], errors:["empty file"] };
    const header=grid[0].map(h=>String(h||"").trim());
    const norm=h=>h.toLowerCase().replace(/[^a-z0-9]/g,"");
    const idxOf=(...names)=>{
      const wanted=new Set(names.map(norm));
      for(let i=0;i<header.length;i++) if(wanted.has(norm(header[i]))) return i;
      return -1;
    };
    const cRecip=idxOf("recipientId","recipient_id");
    const cAmt  =idxOf("amount","targetAmount","sourceAmount");
    const cTid  =idxOf("transferId","transfer_id","id");
    const cAErr =idxOf("apiError");
    const cUErr =idxOf("userError");
    const cName =idxOf("name");
    const errors=[];
    if(cRecip<0) errors.push("missing 'recipientId' column");
    if(cTid<0)   errors.push("missing 'transferId' column — re-download the processed batch from Wise (it includes transfer IDs)");
    const out=[];
    for(let i=1;i<grid.length;i++){
      const r=grid[i];
      const recip=cRecip>=0?String(r[cRecip]||"").trim():"";
      const tid  =cTid  >=0?String(r[cTid]  ||"").trim():"";
      const amt  =cAmt  >=0?Number(String(r[cAmt]||"").replace(/,/g,""))||0:0;
      const apiErr=cAErr>=0?String(r[cAErr]||"").trim():"";
      const usrErr=cUErr>=0?String(r[cUErr]||"").trim():"";
      const name =cName>=0?String(r[cName]||"").trim():"";
      if(!recip && !tid) continue;
      out.push({ recipient_uuid:recip, transfer_id:tid, amount:amt,
                 name, api_error:apiErr, user_error:usrErr });
    }
    return { rows:out, errors };
  }

  // Accept a name+amount fallback suggestion from the reconcile-unmatched list:
  // backfill the CSV transfer_id onto the suggested worker's payment row. Only
  // links a transfer id (no money moves); idempotent on re-accept.
  const [csvAcceptBusy,setCsvAcceptBusy]=useState(null);
  const [csvAccepted,setCsvAccepted]=useState({});
  async function acceptCsvSuggestion(sKey,u){
    if(!u?.suggest?.worker_id || !u?.transfer_id) return;
    setCsvAcceptBusy(sKey); setMsg("");
    try{
      const {error}=await client.from("payments")
        .update({ wise_transfer_id:String(u.transfer_id) })
        .eq("pay_period_id",periodId).eq("worker_id",u.suggest.worker_id);
      if(error) throw new Error(error.message);
      logEvent(client,{ company_id:companyId, action:"wise_recipient_sync",
        entity:`${u.suggest.name} → transfer ${u.transfer_id}`,
        detail:{ kind:"csv_fallback_link", matched_by:"name+amount",
                 csv_name:u.name, csv_recipient_uuid:u.recipient_uuid } });
      setCsvAccepted(p=>({...p,[sKey]:true}));
      setMsg(`Linked transfer ${u.transfer_id} to ${u.suggest.name} (name+amount fallback). Re-run a poll/reconcile to pull its status.`);
    }catch(ex){ setMsg("Couldn't link suggestion: "+(ex.message||ex)); }
    finally{ setCsvAcceptBusy(null); }
  }

  async function onReconcileFile(e){
    const f=e.target.files && e.target.files[0]; if(!f) return;
    setBusy(true); setMsg(""); setReconResult(null);
    try{
      const text=await f.text();
      const { rows:parsedRows, errors:parseErrors }=parseWiseProcessedCsv(text);
      if(parseErrors.length){
        setReconResult({ imported:0, skipped:0, variances:[], polled:null,
          parseErrors, unmatched:[], rowErrors:[] });
        setMsg("Couldn't read the Wise CSV — see details below.");
        return;
      }
      // Index DB rows for this period by recipient UUID for fast lookup,
      // plus name keys for a fallback when the CSV row's UUID doesn't match
      // (missing/typo'd UUID, or paid via a different recipient). The fallback
      // never auto-applies — it surfaces a suggested contractor for one-click
      // accept in the UI.
      const byUuid=new Map();
      for(const r of (rows||[])){
        if(r.recipient_uuid) byUuid.set(r.recipient_uuid, r);
      }
      let imported=0, skipped=0;
      const variances=[];                       // { name, db_amount, wise_amount }
      const unmatched=[];                       // CSV rows that don't match anyone in this period
      const rowErrors=[];                       // CSV rows with api/user errors from Wise
      // Fallback name+amount match against DB rows still missing a transfer_id.
      const suggestMatch=(cr)=>{
        if(!cr.name) return null;
        const sk=nameKey(cr.name), lk=looseKey(cr.name);
        const cands=(rows||[]).filter(r=>!r.transfer_id &&
          (nameKey(r.name)===sk || looseKey(r.name)===lk) &&
          (!(cr.amount>0) || Math.abs(cr.amount-Number(r.net||0))<=1.00));
        return cands.length===1 ? cands[0] : null;   // only a UNIQUE match is safe to suggest
      };
      for(const cr of parsedRows){
        if(cr.api_error || cr.user_error){
          rowErrors.push({ name:cr.name||cr.recipient_uuid, error:cr.api_error||cr.user_error });
          continue;
        }
        const match=byUuid.get(cr.recipient_uuid);
        if(!match){
          const suggestion=suggestMatch(cr);
          unmatched.push({ recipient_uuid:cr.recipient_uuid, name:cr.name, amount:cr.amount,
            transfer_id:cr.transfer_id||null,
            suggest: suggestion?{worker_id:suggestion.worker_id, name:suggestion.name, net:suggestion.net}:null });
          continue;
        }
        // Variance check: did Wise actually send the amount the DB recorded?
        // Tolerance ₱0.01 to absorb rounding.
        if(cr.amount>0 && Math.abs(cr.amount - match.net) > 0.01){
          variances.push({ name:match.name, db_amount:match.net, wise_amount:cr.amount,
                           delta:cr.amount-match.net });
        }
        // Backfill transfer_id only when missing — idempotent on re-import
        if(!match.transfer_id && cr.transfer_id){
          const { error }=await client.from("payments")
            .update({ wise_transfer_id:String(cr.transfer_id) })
            .eq("pay_period_id",periodId).eq("worker_id",match.worker_id);
          if(error){ rowErrors.push({ name:match.name, error:error.message }); }
          else { imported++; }
        } else if(match.transfer_id){
          skipped++;
        }
      }
      // Audit: importing transfer IDs is a notable event
      if(imported>0){
        logEvent(client,{ company_id:companyId, action:"wise_recipient_sync",
          entity:`${pers?.period_start} → ${pers?.period_end}`,
          detail:{ kind:"processed_batch_import", imported, skipped,
                   variance_count:variances.length, unmatched:unmatched.length } });
      }
      // Now poll Wise for status using the new server-side action, scoped to this period.
      let polled=null;
      try{
        const { data, error }=await client.functions.invoke("wise-payouts",{
          body:{ action:"poll", pay_period_id:periodId, only_drafts:true } });
        if(error) polled={ error: error.message||"Edge function error" };
        else if(data?.error) polled={ error: data.error };
        else polled={ checked:data?.checked||0, marked_paid:data?.marked_paid||0,
                      in_flight:data?.in_flight||0, unknown:data?.unknown||0 };
      }catch(ex){ polled={ error: String(ex.message||ex) }; }
      setReconResult({ imported, skipped, variances, polled, parseErrors:[],
                       unmatched, rowErrors });
      const polledNote=polled && !polled.error
        ? ` · Polled ${polled.checked}, marked ${polled.marked_paid} paid`+
          (polled.in_flight?`, ${polled.in_flight} in-flight`:"")
        : "";
      setMsg(`Imported ${imported} transfer ID(s); ${skipped} already on file; `+
             `${variances.length} amount variance(s); ${unmatched.length} unmatched.${polledNote}`);
      await load(periodId);
    }catch(ex){ setMsg("Reconcile failed: "+(ex.message||ex)); }
    finally{ setBusy(false); if(reconFileRef.current) reconFileRef.current.value=""; }
  }

  // Inline date picker state for "Mark paid" on non-Wise rows. When the user
  // clicks Mark paid, instead of stamping now() we arm the row, show a date
  // input + Confirm, and only then write the chosen date. (Wise rows skip this
  // because their paid date comes from the Wise API, not user input.)
  const [paidArm,setPaidArm]=useState({});  // { [worker_id]: 'YYYY-MM-DD' } when armed
  const todayYmd=()=>{ const d=new Date(); return d.toISOString().slice(0,10); };
  function armPaid(workerId){
    setPaidArm(prev=>({...prev,[workerId]:todayYmd()}));
  }
  function unarmPaid(workerId){
    setPaidArm(prev=>{ const n={...prev}; delete n[workerId]; return n; });
  }
  function setPaidDate(workerId, ymd){
    setPaidArm(prev=>({...prev,[workerId]:ymd}));
  }
  async function confirmPaidWithDate(workerId){
    const ymd=paidArm[workerId]; if(!ymd) return;
    // Stamp midday UTC of the chosen date so timezone display is stable.
    const iso=new Date(`${ymd}T12:00:00Z`).toISOString();
    unarmPaid(workerId);
    await markPaid([workerId], iso);
  }

  // Per-row Unlock — clears wise_locked_at after capturing a reason in
  // audit_log. The next Reconcile run will re-lock the row.
  const [unlockArm,setUnlockArm]=useState({});  // { [payment_id]: reasonString }
  function armUnlock(paymentId){ setUnlockArm(prev=>({...prev,[paymentId]:""})); }
  function unarmUnlock(paymentId){ setUnlockArm(prev=>{ const n={...prev}; delete n[paymentId]; return n; }); }
  function setUnlockReason(paymentId, reason){ setUnlockArm(prev=>({...prev,[paymentId]:reason})); }
  async function confirmUnlock(paymentId, workerId){
    const reason=(unlockArm[paymentId]||"").trim();
    if(!reason){ setMsg("Unlock requires a reason."); return; }
    setBusy(true); setMsg("");
    try{
      const {error}=await client.from("payments").update({wise_locked_at:null}).eq("id",paymentId);
      if(error) throw new Error(error.message);
      const w=(rows||[]).find(r=>r.payment_id===paymentId);
      logEvent(client,{ company_id:companyId, action:"wise_lock_release",
        entity:`${pers?.period_start} → ${pers?.period_end} · ${w?.name||workerId}`,
        detail:{ payment_id:paymentId, worker_id:workerId, reason } });
      setMsg(`Unlocked ${w?.name||"row"}. It will re-lock next Reconcile.`);
      unarmUnlock(paymentId);
      await load(periodId);
    }catch(ex){ setMsg("Unlock failed: "+(ex.message||ex)); }
    finally{ setBusy(false); }
  }

  // Link a probable historical recipient id (surfaced by the matcher's orphan
  // diagnostic) onto a worker's wise_recipients list. Used when a worker
  // changed banks mid-history and old pay periods reference a recipient id
  // that's no longer the default. Appends without disturbing wise_recipient_id.
  const [linkBusy,setLinkBusy]=useState(null);  // `${worker_id}:${target_account}` while in flight
  const [linkedKeys,setLinkedKeys]=useState({});
  async function linkOrphanRecipient(workerId, workerName, targetAccount, transferId, opts){
    if(!workerId||!targetAccount)return;
    const key=`${workerId}:${targetAccount}`;
    const ambiguous=!!(opts&&opts.ambiguous);
    setLinkBusy(key); setMsg("");
    try{
      // SANITY PROBE: ask Wise who recipient #targetAccount actually is and
      // compare to the worker we're about to link it to. Catches the
      // wrong-contractor mistake (esp. when two contractors share an amount).
      // Best-effort: if the probe fails (e.g. Wisetag/403), we proceed but warn.
      let probeNote="";
      try{
        const { data:probe }=await client.functions.invoke("wise-payouts",{
          body:{ action:"get_recipient", recipient_id:Number(targetAccount)||targetAccount } });
        const recName=probe?.recipient?.name||"";
        if(recName){
          const same=nameKey(recName)===nameKey(workerName||"") || looseKey(recName)===looseKey(workerName||"");
          if(!same){
            if(!(await confirmDanger({
              title:"Recipient name mismatch",
              message:`Wise recipient #${targetAccount} is held by "${recName}", but you're linking it to "${workerName}". These don't look like the same person.`,
              consequence:"Linking the wrong recipient would pay/attribute money to the wrong contractor.",
              confirmWord:workerName, confirmLabel:"Link anyway",
            }))){
              setLinkBusy(null); return;
            }
          }
          probeNote=` (Wise: ${recName})`;
        }
      }catch(_e){ /* probe is best-effort; Wisetag recipients 403 here */ }

      // Ambiguous candidate (the transfer's amount fits more than one unmatched
      // contractor in the window) — require a second explicit confirmation.
      if(ambiguous && !(await confirmDanger({
        title:"Ambiguous match — verify the contractor",
        message:`This transfer's amount matches more than one unpaid contractor in the window. Confirm you've verified (via the transfer date and the recipient${probeNote}) that #${targetAccount} belongs to ${workerName} before linking.`,
        consequence:"Linking the wrong recipient would attribute money to the wrong contractor.",
        confirmWord:workerName, confirmLabel:"Link",
      }))){
        setLinkBusy(null); return;
      }

      const { data:cur, error:re } = await client.from("workers")
        .select("wise_recipients").eq("id",workerId).single();
      if(re) throw new Error(re.message);
      const list = Array.isArray(cur?.wise_recipients) ? cur.wise_recipients : [];
      const numericId = Number(targetAccount);
      const idForList = Number.isFinite(numericId) ? numericId : targetAccount;
      if(!list.some(x=>String(x?.id)===String(idForList))){
        list.push({ id: idForList, label: `Historical recipient (linked from Reconcile transfer ${transferId})` });
        const { error:ue } = await client.from("workers")
          .update({ wise_recipients: list }).eq("id", workerId);
        if(ue) throw new Error(ue.message);
      }
      logEvent(client, { company_id:companyId, action:"wise_recipient_sync",
        entity:`${workerName||workerId} → #${targetAccount}`,
        detail:{ kind:"link_historical_recipient", recipient_id:idForList,
                 source_transfer_id:transferId } });
      setLinkedKeys(p=>({...p,[key]:true}));
      setMsg(`Linked recipient #${targetAccount} to ${workerName||"worker"}. Re-run Reconcile to match the historical pay period.`);
    }catch(ex){ setMsg("Couldn't link recipient: "+(ex.message||ex)); }
    finally{ setLinkBusy(null); }
  }

  // Smart Reconcile — the one-button consolidation. Looks at the current rows,
  // decides what each Wise row needs, calls the right action(s), and reports
  // back in plain English. Doesn't waste API calls on rows that already have
  // Wise data (per Oliver's call: "Wise info doesn't change so if Wise info
  // is already present then it should just use that data").
  async function reconcileWithWise(){
    if(!(await gate("Reconcile with Wise"))) return;
    setBusy(true); setMsg(""); setMatchResult(null);
    try{
      const wiseAll=(rows||[]).filter(r=>r.method==="wise");
      const needsMatching = wiseAll.filter(r=>!r.transfer_id);
      // Rows with a transfer_id but no Wise data yet (no created date stored).
      // Note: Wise's API doesn't return dateSent for batch-uploaded transfers
      // so we key on `created` instead — that's the only timestamp we ever get.
      const needsData     = wiseAll.filter(r=>r.transfer_id && (!r.wise_dates || !r.wise_dates.created));
      // For already-matched rows we ALSO re-run match with refresh:true so
      // amount variances get re-detected and auto-overridden (otherwise a row
      // that was matched before the variance-override logic existed would
      // never get its amount corrected).
      const alreadyMatched = wiseAll.filter(r=>r.transfer_id && r.wise_dates && r.wise_dates.created);
      let matchedCount=0, refreshedMatched=0, refreshedData=0,
          varianceCount=0, ambiguousCount=0, unmatchedCount=0,
          overriddenCount=0;
      // 1. Match any rows missing a transfer_id (first-time match path)
      if(needsMatching.length>0){
        const { data, error }=await client.functions.invoke("wise-payouts",{
          body:{ action:"match", pay_period_id:periodId, refresh:false } });
        if(error) throw new Error(error.message||"Edge function error");
        if(data?.error) throw new Error(data.error);
        matchedCount=data.matched||0;
        varianceCount=data.variances||0;
        ambiguousCount=data.ambiguous||0;
        unmatchedCount=data.unmatched||0;
        overriddenCount=(data.results||[]).filter(r=>r.outcome==="matched_with_variance_overridden").length;
        setMatchResult(data);   // surface the match details panel
      }
      // 2. For everything that already has a transfer_id — re-run match in
      //    refresh mode. Picks up amount variances on rows we matched before
      //    the variance logic existed (e.g. Mery: matched as "clean" because
      //    the old ±0.01 tolerance hid her ₱60 override).
      if((needsData.length + alreadyMatched.length) > 0){
        const { data, error }=await client.functions.invoke("wise-payouts",{
          body:{ action:"match", pay_period_id:periodId, refresh:true } });
        if(error) throw new Error(error.message||"Edge function error");
        if(data?.error) throw new Error(data.error);
        refreshedMatched=data.matched||0;
        refreshedData=data.scanned||0;
        varianceCount+=(data.variances||0);
        ambiguousCount+=(data.ambiguous||0);
        unmatchedCount+=(data.unmatched||0);
        overriddenCount+=(data.results||[]).filter(r=>r.outcome==="matched_with_variance_overridden").length;
        // If we didn't already set matchResult from step 1, set it now so
        // the user sees per-row details from refresh too.
        if(!matchedCount) setMatchResult(data);
      }
      // 3. Report
      const parts=[];
      if(matchedCount>0)        parts.push(`linked ${matchedCount} new`);
      if(refreshedData>0)       parts.push(`re-checked ${refreshedData} already-matched`);
      if(overriddenCount>0)     parts.push(`auto-overrode ${overriddenCount} amount(s) to match Wise`);
      if(varianceCount>overriddenCount) parts.push(`${varianceCount-overriddenCount} ambiguous variance(s) needing review`);
      if(ambiguousCount>0)      parts.push(`${ambiguousCount} ambiguous`);
      if(unmatchedCount>0)      parts.push(`${unmatchedCount} unmatched`);
      if(!wiseAll.length)       parts.push("no Wise rows in this period");
      else if(!parts.length)    parts.push("nothing to do — all rows already reconciled");
      logEvent(client,{ company_id:companyId, action:"wise_recipient_sync",
        entity:`${pers?.period_start} → ${pers?.period_end}`,
        detail:{ kind:"smart_reconcile",
                 wise_rows:wiseAll.length, needs_matching:needsMatching.length,
                 needs_data:needsData.length, already_matched:alreadyMatched.length,
                 matched:matchedCount, refreshed:refreshedData,
                 overridden:overriddenCount,
                 variances:varianceCount, ambiguous:ambiguousCount, unmatched:unmatchedCount } });
      setMsg(`Reconciled with Wise: ${parts.join(", ")}.`);
      await load(periodId);
    }catch(ex){ setMsg("Reconcile failed: "+(ex.message||ex)); }
    finally{ setBusy(false); }
  }

  // Manual poll without importing a CSV — useful once transfer IDs are already in.
  // Pass includeSent=true to re-poll already-sent rows (refreshes wise_dates
  // on rows that were marked sent before that column existed).
  // Kept around as an Advanced option only — smart Reconcile is the primary UI.
  async function pollWiseForPeriod(includeSent){
    setBusy(true); setMsg("");
    try{
      const { data, error }=await client.functions.invoke("wise-payouts",{
        body:{ action:"poll", pay_period_id:periodId, only_drafts:!includeSent } });
      if(error) throw new Error(error.message||"Edge function error");
      if(data?.error) throw new Error(data.error);
      const inFlightNote=data?.in_flight?` · ${data.in_flight} still in-flight`:"";
      const verb=includeSent?"Re-polled":"Polled";
      setMsg(`${verb} ${data?.checked||0} Wise transfer(s); ${data?.marked_paid||0} now marked paid${inFlightNote}.`);
      await load(periodId);
    }catch(ex){ setMsg("Wise poll failed: "+(ex.message||ex)); }
    finally{ setBusy(false); }
  }

  // Match historical batch — call the matcher action for this period.
  // Surfaces matched / variance / ambiguous / unmatched results without
  // auto-fixing anything ambiguous. Pass refresh=true to re-fetch already-
  // matched rows (e.g. to backfill wise_dates onto older matches).
  const [matchResult,setMatchResult]=useState(null);
  async function matchHistoryForPeriod(refresh){
    setBusy(true); setMsg(""); setMatchResult(null);
    try{
      const { data, error }=await client.functions.invoke("wise-payouts",{
        body:{ action:"match", pay_period_id:periodId, window_days:14, refresh:!!refresh } });
      if(error) throw new Error(error.message||"Edge function error");
      if(data?.error) throw new Error(data.error);
      setMatchResult(data);
      // Log so it's auditable that we ran a match (idempotent, but worth recording)
      if(data?.matched || data?.variances){
        logEvent(client,{ company_id:companyId, action:"wise_recipient_sync",
          entity:`${pers?.period_start} → ${pers?.period_end}`,
          detail:{ kind:refresh?"history_refresh":"history_match", scanned:data.scanned, matched:data.matched,
                   variances:data.variances, ambiguous:data.ambiguous, unmatched:data.unmatched } });
      }
      const verb=refresh?"Refreshed":"Scanned";
      setMsg(`${verb} ${data.scanned} payment(s) against ${data.wise_transfers_pulled||0} Wise transfers: `+
             `${data.matched} matched cleanly, ${data.variances} matched with variance, `+
             `${data.ambiguous} ambiguous, ${data.unmatched} unmatched.`);
      await load(periodId);
    }catch(ex){ setMsg("History match failed: "+(ex.message||ex)); }
    finally{ setBusy(false); }
  }

  const wiseRows=(rows||[]).filter(r=>r.method==="wise");
  const bpiRows=(rows||[]).filter(r=>r.method==="bpi");
  const otherRows=(rows||[]).filter(r=>!["wise","bpi"].includes(r.method));
  const label=pers?`${pers.period_start}_to_${pers.period_end}`:"period";

  // --- export-tracking guard: warn if a batch file was already downloaded for
  // this period (prevents accidentally uploading/paying the same batch twice).
  const exportKey=(type)=>`exported_${type}_${periodId}`;
  const [exportTick,setExportTick]=useState(0); // re-render after stamping
  function lastExported(type){ try{return localStorage.getItem(exportKey(type));}catch(e){return null;} }
  function guardedExport(type, doDownload){
    const prev=lastExported(type);
    if(prev && !confirm(`You already downloaded this ${type==="wise"?"Wise batch":"payments"} file for `+
      `this period on ${new Date(prev).toLocaleString()}.\n\nDownloading again risks paying the batch twice. `+
      `Download anyway?`)) return;
    doDownload();
    try{ localStorage.setItem(exportKey(type), new Date().toISOString()); }catch(e){}
    setExportTick(t=>t+1);
  }
  // (1) Manual Wise batch CSV — EXACT Wise batch-upload template, keyed by the
  // stable recipient UUID (recipientId). Rows missing a UUID can't be uploaded,
  // so we surface them rather than emit a file Wise would reject.
  const wiseMissingUuid=wiseRows.filter(r=>!r.recipient_uuid);
  async function downloadWiseBatch(){
    if(!(await gate("Download Wise batch CSV"))) return;
    // Hard stop if there's nothing to write (every Wise row is missing a UUID).
    const includedCount=wiseRows.length-wiseMissingUuid.length;
    if(!includedCount){
      alert("All Wise rows are missing a Wise recipient UUID — nothing to write. "+
        "Open each contractor's profile and paste their UUID (Wise → Batch payments → Download all templates).");
      return;
    }
    // Click-time confirm when any row would be silently dropped — keeps the
    // user from uploading a CSV that omits contractors they think they're paying.
    if(wiseMissingUuid.length>0){
      const droppedTotal=wiseMissingUuid.reduce((s,r)=>s+(r.net||0),0);
      const lines=wiseMissingUuid.slice(0,20).map(r=>`• ${r.name} — ${money(r.net,"PHP")}`).join("\n");
      const more=wiseMissingUuid.length>20?`\n…and ${wiseMissingUuid.length-20} more`:"";
      if(!confirm(
        `${wiseMissingUuid.length} contractor(s) will be DROPPED from this CSV (no Wise recipient UUID on file):\n\n`+
        lines+more+
        `\n\nTotal not included: ${money(droppedTotal,"PHP")}\n`+
        `Included in the CSV: ${includedCount} contractor(s).\n\n`+
        `Fix: open each profile (Contractors tab) and paste the UUID from Wise → Batch payments → Download all templates.\n\n`+
        `Download anyway?`
      )) return;
    }
    guardedExport("wise", ()=>{
      // Match Wise's "all recipients" export template: 10 columns (no trailing apiError/userError
      // columns — those only appear when you re-download a processed batch). recipientId is the
      // stable recipient UUID; recipientDetail is left empty (Wise fills it from the recipientId).
      const header=["recipientId","name","recipientEmail","recipientDetail","sourceCurrency",
                    "targetCurrency","amountCurrency","amount","paymentReference","receiverType"];
      const ref=`Payroll ${pers?.period_end||""}`.trim();
      // amount: whole numbers have no trailing .00, cents preserved
      const fmtAmt=n=>{ const v=Math.round(Number(n)*100)/100; return Number.isInteger(v)?String(v):v.toFixed(2); };
      const body=wiseRows
        .filter(r=>r.recipient_uuid)   // only rows with a UUID are valid for the batch upload
        .map(r=>[r.recipient_uuid, r.name, r.email, "", srcCcy, tgtCcy, "target",
                 fmtAmt(r.net), ref, "PERSON"]);
      downloadCSV(`wise_batch_${label}.csv`, [header,...body]);
    });
  }
  // (2) Individual payment files — full per-contractor breakdown (all methods)
  async function downloadIndividual(){
    if(!(await gate("Download individual payment files"))) return;
    guardedExport("individual", ()=>{
    const header=["Contractor","Method","Wise recipient id","Email","Amount PHP","Pay date","Period"];
    const body=(rows||[]).map(r=>[r.name,r.method,r.recipient_id,r.email,r.net.toFixed(2),pers?.pay_date||"",`${pers?.period_start}–${pers?.period_end}`]);
    downloadCSV(`payments_${label}.csv`, [header,...body]);
    });
  }

  const total=(rows||[]).reduce((s,r)=>s+r.net,0);
  const wiseTotal=wiseRows.reduce((s,r)=>s+r.net,0);
  const bpiTotal=bpiRows.reduce((s,r)=>s+r.net,0);

  return (
    <div>
      <div className="card">
        <h2>{reconcileOnly?"Reconcile with Wise":"Process payroll"}</h2>
        <p className="sub">{reconcileOnly
          ? "Pick a locked/paid period, then import the processed Wise CSV to backfill transfer IDs, poll status, and flag variances. Idempotent — safe to re-run."
          : <>After a period is locked, pay people here. Choose a locked period, then use a manual Wise batch file, individual payment files, or the automatic Wise API draft below. <b>Contractors are paid in PHP.</b></>}</p>
        {consolidated && <div className="banner">Pick a single company.</div>}
        {reconcileOnly
          ? (/* Review & Recon: dropdown across ALL locked + paid batches. */
            <>
              <div className="row" style={{alignItems:"flex-end"}}>
                <div className="field"><label>Batch (locked or paid)</label>
                  <select value={periodId} onChange={e=>load(e.target.value)}>
                    <option value="">Select…</option>
                    {periods.map(p=><option key={p.id} value={p.id}>{p.period_start} → {p.period_end} ({p.state})</option>)}
                  </select></div>
              </div>
              {periods.length===0 && !consolidated && <p className="muted" style={{fontSize:12}}>No locked or paid batches yet — lock a batch on the Calculate tab first.</p>}
              <ReconcileOverview {...{client,companyId,consolidated,onPick:load}} />
            </>)
          : (/* Process & Pay: a LIST of locked-but-not-yet-paid batches. */
            (()=>{ const ready=periods.filter(p=>p.state==="locked");
              if(ready.length===0){
                return (
                  <div className="empty" style={{textAlign:"left"}}>
                    <p style={{margin:"0 0 8px"}}><b>No payrolls ready to process and pay.</b> Go to
                      {" "}<b>Time &amp; Approval</b> to import time, or review approved batches in the
                      {" "}<b>Calculate</b> tab.</p>
                    {(prep.pending>0 || prep.drafts.length>0) && (
                      <div className="banner" style={{background:"#eff6ff",borderColor:"#bfdbfe",color:"#1e3a8a",display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
                        <span>Waiting upstream:
                          {prep.drafts.length>0 && <> <b>{prep.drafts.length}</b> calculated draft(s) not yet locked
                            {" "}({prep.drafts.slice(0,3).map(d=>`${d.start}→${d.end}`).join(", ")}{prep.drafts.length>3?", …":""})</>}
                          {prep.drafts.length>0 && prep.pending>0 && " · "}
                          {prep.pending>0 && <> <b>{prep.pending}</b> pending time entr(ies) in Time &amp; Approval</>}.
                        </span>
                        {goTab && prep.drafts.length>0 && <button className="btn sm" onClick={()=>goTab("payroll")}>Go to Calculate</button>}
                        {goTab && prep.pending>0 && <button className="btn ghost sm" onClick={()=>goTab("time")}>Go to Time &amp; Approval</button>}
                      </div>
                    )}
                  </div>
                );
              }
              return (
                <div className="table-scroll" style={{marginTop:4}}><table>
                  <thead><tr><th>Pay period</th><th>Pay date</th><th>Status</th><th></th></tr></thead>
                  <tbody>
                    {ready.map(p=>(
                      <tr key={p.id} style={periodId===p.id?{background:"#eff6ff"}:{}}>
                        <td className="card-title"><b>{p.period_start} → {p.period_end}</b></td>
                        <td data-label="Pay date">{p.pay_date||"—"}</td>
                        <td data-label="Status"><span className="pill" style={{background:"#eef2ff",color:"#3730a3"}}>locked · ready to pay</span></td>
                        <td className="card-action" style={{textAlign:"right",whiteSpace:"nowrap"}}>
                          <button className="btn sm" disabled={busy} onClick={()=>load(p.id)}>
                            {periodId===p.id?"Loaded":"Open & pay"}</button>
                          {!reconcileOnly && <>{" "}
                            <button className="btn ghost sm" disabled={busy} onClick={()=>unlockPeriod(p)}
                              title="Flip back to a draft and return to Calculate for editing. Requires a reason.">
                              Unlock</button></>}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table></div>
              );
            })())}
        {/* Undo toast — status only, never moves money. Stays until clicked/dismissed. */}
        {undo && <div className="banner" style={{display:"flex",justifyContent:"space-between",alignItems:"center",
            gap:12,background:"#eef2ff",borderColor:"#c7d2fe",color:"#3730a3"}}>
          <span>{undo.label}</span>
          <span style={{display:"inline-flex",gap:6,whiteSpace:"nowrap"}}>
            <button className="btn sm" disabled={busy} onClick={runUndo}>Undo</button>
            <button className="btn ghost sm" onClick={()=>setUndo(null)}>Dismiss</button>
          </span>
        </div>}
        <Banner msg={msg} />
      </div>

      <div ref={detailRef} style={{scrollMarginTop:12}} aria-hidden="true" />
      {periodId && <button className="btn sm" onClick={()=>window.scrollTo({top:0,behavior:"smooth"})}
        style={{position:"fixed",right:16,bottom:84,zIndex:40,boxShadow:"0 2px 10px rgba(0,0,0,.25)"}}
        title="Back to the period list" aria-label="Back to top">↑ Top</button>}
      {((rows && rows.length>0) || (reconcileOnly && periodId)) && <>
        {!reconcileOnly && <div className="card">
          <h3 style={{margin:"0 0 4px"}}>Summary · pay date {pers?.pay_date||"—"}</h3>
          <p className="sub">{rows.length} contractor(s) · total <b>{money(total,"PHP")}</b>
            {" · "}Wise {wiseRows.length} ({money(wiseTotal,"PHP")}) · BPI {bpiRows.length} ({money(bpiTotal,"PHP")})
            {otherRows.length>0 && ` · other ${otherRows.length}`}
            {" · "}{rows.filter(r=>r.status==="sent").length} paid</p>
          {otherRows.some(r=>!r.method) &&
            <div className="banner">{otherRows.filter(r=>!r.method).length} contractor(s) have <b>no payout method</b>
              ({otherRows.filter(r=>!r.method).map(r=>r.name).join(", ")}). They appear in the pay list below
              but not in the Wise/BPI exports — set their method on their profile.</div>}
        </div>}

        {/* Reconcile with Wise — import processed batch + status + variance.
            Lives under Review (reconcileOnly) — hidden in the Process & Pay
            view. Reconciling turns "I uploaded a file to Wise" into "the DB
            reflects what actually happened." */}
        {reconcileOnly && <div className="card no-print">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
            <div>
              <h3 style={{margin:"0 0 4px"}}>Reconcile with Wise</h3>
              <p className="sub">After Wise processes your batch, re-download the processed CSV from Wise
                (Batch payments → your batch → Download) and upload it here. The app backfills each Wise
                transfer ID into the DB, polls Wise for current status, and flags any amount mismatches.
                Idempotent — safe to re-run.</p>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <input ref={reconFileRef} type="file" accept=".csv,text/csv"
                style={{display:"none"}} onChange={onReconcileFile}/>
              <button className="btn" disabled={busy}
                onClick={()=>reconFileRef.current&&reconFileRef.current.click()}>
                Import processed Wise CSV
              </button>
              <button className="btn" disabled={busy} onClick={reconcileWithWise}
                title="One-click reconcile: links unmatched rows, fills in missing Wise dates, and locks rows that Wise has confirmed. Skips rows that are already current — no wasted API calls.">
                {busy?"Reconciling…":"Reconcile with Wise"}
              </button>
            </div>
          </div>
          {reconResult && (
            <div style={{marginTop:12}}>
              {reconResult.parseErrors && reconResult.parseErrors.length>0 && (
                <Banner tone="error" style={{marginBottom:8}}>
                  Couldn't read the Wise CSV: {reconResult.parseErrors.join("; ")}
                </Banner>
              )}
              <div className="row" style={{gap:16,flexWrap:"wrap",fontSize:13}}>
                <span><b>{reconResult.imported}</b> transfer ID(s) imported</span>
                <span className="muted">{reconResult.skipped} already on file</span>
                <span className={reconResult.variances.length?"pill warn":"muted"}>
                  {reconResult.variances.length} amount variance(s)
                </span>
                <span className={reconResult.unmatched.length?"pill warn":"muted"}>
                  {reconResult.unmatched.length} unmatched
                </span>
                {reconResult.polled && !reconResult.polled.error && (
                  <span className="muted">
                    Polled {reconResult.polled.checked}: {reconResult.polled.marked_paid} paid
                    {reconResult.polled.in_flight>0 && `, ${reconResult.polled.in_flight} in-flight`}
                  </span>
                )}
                {reconResult.polled && reconResult.polled.error && (
                  <span className="pill warn">Poll error: {reconResult.polled.error}</span>
                )}
              </div>
              {reconResult.variances.length>0 && (
                <div style={{marginTop:10}}>
                  <div style={{fontWeight:600,fontSize:13,marginBottom:4}}>Amount variances (DB vs Wise)</div>
                  <div className="table-scroll"><table>
                    <thead><tr><th>Contractor</th><th>DB (₱)</th><th>Wise (₱)</th><th>Delta (₱)</th></tr></thead>
                    <tbody>
                      {reconResult.variances.map((v,i)=>(
                        <tr key={i}>
                          <td className="card-title">{v.name}</td>
                          <td data-label="DB (₱)">{v.db_amount.toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                          <td data-label="Wise (₱)">{v.wise_amount.toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                          <td data-label="Delta (₱)" style={{color:v.delta>0?"#a16207":"#b91c1c",fontWeight:600}}>
                            {(v.delta>0?"+":"")+v.delta.toLocaleString(undefined,{minimumFractionDigits:2})}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table></div>
                  <p className="muted" style={{fontSize:12,marginTop:4}}>
                    A non-zero delta means the amount Wise actually transferred doesn't match what the DB
                    recorded. Investigate before treating the period as reconciled — the Wise amount is
                    the source of truth for what was paid.
                  </p>
                </div>
              )}
              {reconResult.unmatched.length>0 && (
                <div style={{marginTop:10}}>
                  <div style={{fontWeight:600,fontSize:13,marginBottom:4}}>Unmatched CSV rows</div>
                  <p className="muted" style={{fontSize:12,marginBottom:6}}>
                    These rows from the Wise CSV don't match anyone in this period's pay list (wrong
                    period, recipient swap, or a manual addition in Wise).
                  </p>
                  <ul style={{margin:0,paddingLeft:18,fontSize:13}}>
                    {reconResult.unmatched.slice(0,10).map((u,i)=>{
                      const sKey=u.suggest?`csvsug:${u.suggest.worker_id}:${u.transfer_id||u.recipient_uuid}`:null;
                      const done=sKey&&csvAccepted[sKey];
                      const inflight=sKey&&csvAcceptBusy===sKey;
                      return (
                      <li key={i} style={{marginBottom:u.suggest?6:0}}>
                        {u.name||"—"} <span className="muted">· uuid {String(u.recipient_uuid).slice(0,8)}…</span>
                        {u.amount?` · ₱${u.amount.toLocaleString(undefined,{minimumFractionDigits:2})}`:""}
                        {u.suggest && (
                          <div style={{marginTop:3,padding:"4px 8px",background:"#eff6ff",
                            border:"1px solid #bfdbfe",borderRadius:4,display:"inline-flex",gap:8,
                            alignItems:"center",flexWrap:"wrap"}}>
                            <span style={{fontSize:12}}>Likely <b>{u.suggest.name}</b> (name + amount match, no UUID on file)</span>
                            {done
                              ? <span className="pill active" style={{fontSize:10}}>linked</span>
                              : u.transfer_id
                                ? <button className="btn ghost sm" disabled={!!csvAcceptBusy}
                                    onClick={()=>acceptCsvSuggestion(sKey,u)}>
                                    {inflight?"Linking…":`Accept & link to ${u.suggest.name}`}</button>
                                : <span className="muted" style={{fontSize:11}}>(no transferId in CSV to link)</span>}
                          </div>
                        )}
                      </li>
                    );})}
                    {reconResult.unmatched.length>10 && <li className="muted">…and {reconResult.unmatched.length-10} more</li>}
                  </ul>
                </div>
              )}
              {reconResult.rowErrors.length>0 && (
                <div style={{marginTop:10}}>
                  <div style={{fontWeight:600,fontSize:13,marginBottom:4,color:"#b91c1c"}}>Row errors from Wise</div>
                  <ul style={{margin:0,paddingLeft:18,fontSize:13}}>
                    {reconResult.rowErrors.slice(0,10).map((r,i)=>(
                      <li key={i}>{r.name||"—"}: <span className="muted">{r.error}</span></li>
                    ))}
                    {reconResult.rowErrors.length>10 && <li className="muted">…and {reconResult.rowErrors.length-10} more</li>}
                  </ul>
                </div>
              )}
            </div>
          )}

          {matchResult && (
            <div style={{marginTop:12,borderTop:"1px solid var(--line)",paddingTop:12}}>
              <div style={{fontWeight:600,fontSize:13,marginBottom:6}}>History match results</div>
              {(() => {
                const closestCount=(matchResult.results||[]).filter(r=>r.outcome==="matched_closest_date").length;
                return (
                  <div className="row" style={{gap:16,flexWrap:"wrap",fontSize:13,marginBottom:6}}>
                    <span>Scanned <b>{matchResult.scanned}</b> unmatched payment(s)</span>
                    <span className="muted">across {matchResult.wise_transfers_pulled||0} Wise transfer(s)</span>
                    <span><b>{matchResult.matched}</b> matched cleanly</span>
                    {closestCount>0 && <span className="muted">(of which {closestCount} via closest-date tiebreaker)</span>}
                    <span className={matchResult.variances?"pill warn":"muted"}>{matchResult.variances} matched with variance</span>
                    <span className={matchResult.ambiguous?"pill warn":"muted"}>{matchResult.ambiguous} ambiguous</span>
                    <span className={matchResult.unmatched?"pill warn":"muted"}>{matchResult.unmatched} unmatched</span>
                  </div>
                );
              })()}
              {/* Closest-date tiebreaker — multiple transfers matched recipient+amount,
                  picked by proximity to pay_date. Worth surfacing so the user can spot-check. */}
              {(matchResult.results||[]).some(r=>r.outcome==="matched_closest_date") && (
                <div style={{marginTop:8}}>
                  <div style={{fontWeight:600,fontSize:13,marginBottom:4}}>Resolved by closest-date tiebreaker</div>
                  <p className="muted" style={{fontSize:12,marginBottom:6}}>
                    Multiple Wise transfers matched recipient + amount in this period's window.
                    The matcher picked the transfer closest to the period's pay_date and linked
                    that one; the others almost certainly belong to other periods (and will get
                    linked when you Reconcile those).
                  </p>
                  <ul style={{margin:0,paddingLeft:18,fontSize:13}}>
                    {(matchResult.results||[]).filter(r=>r.outcome==="matched_closest_date").map((r,i)=>{
                      const w=(rows||[]).find(x=>x.worker_id===r.worker_id);
                      const others=(r.also_considered||[]).slice(0,3).join(", ");
                      const more=(r.also_considered||[]).length>3?"…":"";
                      return (<li key={i}>{w?w.name:`worker ${String(r.worker_id).slice(0,8)}…`}
                        <span className="muted"> · picked {r.transfer_id}; deferred {others}{more}</span></li>);
                    })}
                  </ul>
                </div>
              )}
              {/* Variances — amount differs. Two sub-cases:
                  - matched_with_variance_overridden: single candidate, DB auto-updated to Wise's value.
                  - matched_with_variance: multiple candidates, DB amount left alone (too risky to pick). */}
              {(matchResult.results||[]).some(r=>r.outcome==="matched_with_variance_overridden") && (
                <div style={{marginTop:8}}>
                  <div style={{fontWeight:600,fontSize:13,marginBottom:4}}>⚠️ Auto-overridden by Wise (DB updated)</div>
                  <p className="muted" style={{fontSize:12,marginBottom:6}}>
                    Exactly one Wise transfer matched the recipient + window, and its amount differs
                    from the DB. The DB has been updated to Wise's amount (the original is preserved
                    in <code>original_net_php</code>). These rows show a ⚠️ next to the amount in the
                    Pay list — hover for details.
                  </p>
                  <div className="table-scroll"><table>
                    <thead><tr><th>Worker</th><th>Was DB (₱)</th><th>Now Wise (₱)</th><th>Delta (₱)</th><th>Wise status</th></tr></thead>
                    <tbody>
                      {(matchResult.results||[]).filter(r=>r.outcome==="matched_with_variance_overridden").map((r,i)=>{
                        const w=(rows||[]).find(x=>x.worker_id===r.worker_id);
                        return (<tr key={i}>
                          <td className="card-title"><b>{w?w.name:`worker ${String(r.worker_id).slice(0,8)}…`}</b></td>
                          <td data-label="Was DB (₱)" className="muted">{Number(r.db_amount).toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                          <td data-label="Now Wise (₱)"><b>{Number(r.wise_amount).toLocaleString(undefined,{minimumFractionDigits:2})}</b></td>
                          <td data-label="Delta (₱)" style={{color:r.delta>0?"#a16207":"#b91c1c",fontWeight:600}}>
                            {(r.delta>0?"+":"")+Number(r.delta).toLocaleString(undefined,{minimumFractionDigits:2})}
                          </td>
                          <td data-label="Wise status"><span className="muted">{r.wise_status||"—"}</span></td>
                        </tr>);
                      })}
                    </tbody>
                  </table></div>
                </div>
              )}
              {(matchResult.results||[]).some(r=>r.outcome==="matched_with_variance") && (
                <div style={{marginTop:8}}>
                  <div style={{fontWeight:600,fontSize:13,marginBottom:4}}>Variance — needs review (DB not changed)</div>
                  <p className="muted" style={{fontSize:12,marginBottom:6}}>
                    Multiple Wise transfers matched the recipient + window — the matcher picked the
                    closest amount but did NOT auto-override the DB (too risky when there are multiple
                    candidates). Investigate, then fix the DB row manually if Wise is right.
                  </p>
                  <div className="table-scroll"><table>
                    <thead><tr><th>Worker</th><th>DB (₱)</th><th>Wise (₱)</th><th>Delta (₱)</th><th>Wise status</th></tr></thead>
                    <tbody>
                      {(matchResult.results||[]).filter(r=>r.outcome==="matched_with_variance").map((r,i)=>{
                        const w=(rows||[]).find(x=>x.worker_id===r.worker_id);
                        return (<tr key={i}>
                          <td className="card-title">{w?w.name:`worker ${String(r.worker_id).slice(0,8)}…`}</td>
                          <td data-label="DB (₱)">{Number(r.db_amount).toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                          <td data-label="Wise (₱)">{Number(r.wise_amount).toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                          <td data-label="Delta (₱)" style={{color:r.delta>0?"#a16207":"#b91c1c",fontWeight:600}}>
                            {(r.delta>0?"+":"")+Number(r.delta).toLocaleString(undefined,{minimumFractionDigits:2})}
                          </td>
                          <td data-label="Wise status"><span className="muted">{r.wise_status||"—"}</span></td>
                        </tr>);
                      })}
                    </tbody>
                  </table></div>
                </div>
              )}
              {/* Ambiguous — multiple Wise transfers match the same DB row */}
              {(matchResult.results||[]).some(r=>r.outcome==="ambiguous_exact") && (
                <div style={{marginTop:10}}>
                  <div style={{fontWeight:600,fontSize:13,marginBottom:4}}>Ambiguous matches</div>
                  <p className="muted" style={{fontSize:12,marginBottom:6}}>
                    More than one Wise transfer matches this row's recipient AND amount in the date window.
                    Nothing was written — you'll need to pick the right transfer manually (or just rely on
                    the next "Check Wise status" pass once one of them clears).
                  </p>
                  <ul style={{margin:0,paddingLeft:18,fontSize:13}}>
                    {(matchResult.results||[]).filter(r=>r.outcome==="ambiguous_exact").map((r,i)=>{
                      const w=(rows||[]).find(x=>x.worker_id===r.worker_id);
                      return (<li key={i}>{w?w.name:`worker ${String(r.worker_id).slice(0,8)}…`} <span className="muted">· {r.candidate_transfer_ids.length} candidates: {r.candidate_transfer_ids.slice(0,3).join(", ")}{r.candidate_transfer_ids.length>3?"…":""}</span></li>);
                    })}
                  </ul>
                </div>
              )}
              {/* Unmatched — no Wise transfer for this recipient/amount/window */}
              {(matchResult.results||[]).some(r=>String(r.outcome||"").startsWith("no_")) && (
                <div style={{marginTop:10}}>
                  <div style={{fontWeight:600,fontSize:13,marginBottom:4}}>Unmatched</div>
                  <p className="muted" style={{fontSize:12,marginBottom:6}}>
                    These DB rows had no clean Wise match. Common reasons: worker has no
                    stored Wise recipient UUID, the payment was actually sent via BPI, the
                    transfer happened outside the ±14 day window, or it was funded from a
                    different Wise account.
                  </p>
                  <ul style={{margin:0,paddingLeft:18,fontSize:13}}>
                    {(matchResult.results||[]).filter(r=>String(r.outcome||"").startsWith("no_")).slice(0,15).map((r,i)=>{
                      const w=(rows||[]).find(x=>x.worker_id===r.worker_id);
                      const workerName=w?w.name:`worker ${String(r.worker_id).slice(0,8)}…`;
                      const orphans=Array.isArray(r.candidate_orphan_transfers)?r.candidate_orphan_transfers:[];
                      return (
                        <li key={i} style={{marginBottom:orphans.length?6:0}}>
                          {workerName} <span className="muted">· {r.reason}</span>
                          {orphans.length>0 && (
                            <div style={{marginTop:4,marginLeft:-4,padding:"6px 8px",
                              background:"#fffbeb",border:"1px solid #fde68a",borderRadius:4,fontSize:12}}>
                              <div style={{fontWeight:600,marginBottom:4}}>
                                Possible historical recipient{orphans.length>1?"s":""} (amount + date fit, not yet on this worker):
                              </div>
                              {orphans.map((o,j)=>{
                                const key=`${r.worker_id}:${o.target_account}`;
                                const done=!!linkedKeys[key];
                                const inflight=linkBusy===key;
                                const created=o.created?new Date(o.created).toISOString().slice(0,10):"—";
                                const amt=Number(o.target_value||0).toLocaleString(undefined,{minimumFractionDigits:2});
                                return (
                                  <div key={j} style={{display:"flex",alignItems:"center",gap:8,
                                    flexWrap:"wrap",padding:"3px 0"}}>
                                    <span>Transfer <code>{o.transfer_id}</code> · recipient <b>#{o.target_account}</b>
                                      {" "}· ₱{amt} · {created}
                                      {o.wise_status && <span className="muted"> · {o.wise_status}</span>}
                                      {o.ambiguous && <span className="pill" style={{fontSize:10,marginLeft:6,
                                        background:"#fef2f2",color:"#b91c1c"}}
                                        title={`This amount matches ${o.shared_with_n_payments} unpaid contractors in the window — verify by date + recipient before linking.`}>
                                        ⚠ ambiguous (matches {o.shared_with_n_payments})</span>}</span>
                                    {done
                                      ? <span className="pill active" style={{fontSize:10}}>linked</span>
                                      : <button className="btn ghost sm" disabled={inflight}
                                          style={o.ambiguous?{borderColor:"#b91c1c",color:"#b91c1c"}:{}}
                                          onClick={()=>linkOrphanRecipient(r.worker_id, workerName, o.target_account, o.transfer_id, {ambiguous:o.ambiguous})}>
                                          {inflight?"Linking…":(o.ambiguous?`Verify & link #${o.target_account}`:`Link #${o.target_account} to ${workerName}`)}
                                        </button>}
                                  </div>
                                );
                              })}
                              {!Object.keys(linkedKeys).length ? null :
                                <div className="muted" style={{fontSize:11,marginTop:4}}>
                                  After linking, click <b>Reconcile with Wise</b> again to match the linked period(s).
                                </div>}
                            </div>
                          )}
                        </li>
                      );
                    })}
                  </ul>
                </div>
              )}
            </div>
          )}
          {/* Batch being reconciled — merged into this same card (was separate). */}
          <div style={{borderTop:"1px solid var(--border)",marginTop:14,paddingTop:14}}>
            {!(rows && rows.length>0) ? (
              <div className="empty">
                {rows===null ? "Loading this batch…" : "This batch has no pay statements (it may have been deleted). Pick another batch."}
              </div>
            ) : (
              <>
                  <h3 style={{margin:"0 0 4px"}}>Batch being reconciled · {pers?.period_start} → {pers?.period_end}</h3>
                  <p className="sub">{rows.length} contractor(s) · total {money(total,"PHP")} · {rows.filter(r=>r.status==="sent"||r.status==="reconciled").length} sent.
                    The <b>Change</b> column reflects what reconcile has applied (transfer linked, sent, or amount overridden to Wise's value).</p>
                  <div className="table-scroll"><table style={{fontSize:13}}>
                    <thead><tr><th>Contractor</th><th>Via</th><th>Net ₱</th><th>Wise transfer</th><th>Status</th><th>Sent</th><th>Change</th></tr></thead>
                    <tbody>
                      {[...rows].sort((a,b)=>a.name.localeCompare(b.name)).map(r=>{
                        const sent=r.status==="sent"||r.status==="reconciled";
                        const overrode=r.original_net!=null && Math.abs(Number(r.original_net)-Number(r.net))>0.005;
                        const sentDate=r.wise_dates?.dateSent||r.wise_dates?.dateFunded||r.paid_at||null;
                        const changes=[];
                        if(r.transfer_id) changes.push("linked");
                        if(sent) changes.push("sent");
                        if(overrode) changes.push(`amount: ₱${Number(r.original_net).toLocaleString(undefined,{minimumFractionDigits:2})}→₱${Number(r.net).toLocaleString(undefined,{minimumFractionDigits:2})}`);
                        return (
                          <tr key={r.worker_id}>
                            <td>{r.name}{r.locked_at && <span title="Locked by reconcile" style={{marginLeft:4}}>🔒</span>}</td>
                            <td><span title={codeHint("method",r.method)}>{methodLabel(r.method)||"—"}</span></td>
                            <td>{Number(r.net||0).toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                            <td className="muted">{r.transfer_id?<code>{r.transfer_id}</code>:"—"}</td>
                            <td><span className="pill" style={sent?{background:"#dcfce7",color:"#065f46"}:{background:"#f3f4f6",color:"var(--muted)"}}>{sent?"sent":(r.status||"draft")}</span></td>
                            <td className="muted" style={{whiteSpace:"nowrap"}}>{sentDate?(()=>{try{return new Date(sentDate).toLocaleDateString();}catch(e){return String(sentDate).slice(0,10);}})():"—"}</td>
                            <td style={{fontSize:12}}>{changes.length
                              ? <span style={{color: overrode?"#a16207":"#166534"}}>{changes.join(" · ")}</span>
                              : <span className="muted">no change yet</span>}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table></div>
                  <p className="muted" style={{fontSize:11,marginTop:6}}>
                    If nothing changed after reconciling, Wise had no matching transfers for this batch's
                    recipients/dates — check the messages above, or that the batch was actually funded in Wise.</p>
              </>
            )}
          </div>
        </div>}

        {/* Printable pay list + mark-paid, with channel tabs (Wise | BPI | All).

            scannable instead of forcing the eye to jump between Wise and BPI
            rows in alphabetical order. Each tab shows its own subtotal in the
            tab header; the All tab shows the grand total. Print uses All view
            so the printed statement always shows everything. */}
        {!reconcileOnly && (<>
        <div className="card" id="paylist-print">

            <div className="no-print" style={{display:"flex",gap:8,flexWrap:"wrap"}}>

              <button className="btn" disabled={busy||!wiseRows.length} onClick={()=>setWiseDialog(true)}

          {(() => {
            const channelButton=(id,label,count,sub)=>{

                {otherRows.length>0 && channelButton("other","Other",otherRows.length,money(otherRows.reduce((s,r)=>s+r.net,0),"PHP"))}
                {channelButton("all","All",rows.length,money(total,"PHP"))}
              </div>

          })()}

          {(() => {
            // In print mode we always show everything (the printed statement
            // shouldn't depend on which tab was visible when Print was clicked).
            // For screen, filter rows by the active tab.
            const visibleRows = payTab==="all" ? rows
                              : payTab==="wise" ? wiseRows
                              : payTab==="bpi" ? bpiRows
                              : payTab==="other" ? otherRows
                              : rows;
            const visibleTotal = visibleRows.reduce((s,r)=>s+r.net,0);
            const fmtDate=(iso)=>{ if(!iso)return ""; try{return new Date(iso).toLocaleDateString();}catch(e){return String(iso).slice(0,10);} };
            return (
              <div className="table-scroll keep-table"><table>
                <thead><tr>
                  <th>Contractor</th><th>Method</th><th>Recipient/Email</th>
                  <th>Amount ₱</th><th>Status</th>
                  <th title="For Wise rows: the date Wise drafted the transfer — the actual send date isn't returned by Wise's API for batch-uploaded transfers, so this is approximate (money typically leaves Wise within 1–2 days of the drafted date). For BPI rows: the date you manually recorded the payment.">Sent ≈</th>
                  <th className="no-print"></th>
                </tr></thead>
                <tbody>
                  {visibleRows.map(r=>{
                    const isWise=r.method==="wise";
                    const armed=paidArm[r.worker_id];
                    // For Wise rows we'd LIKE to show the real dateSent, but Wise's API
                    // for batch-uploaded transfers only returns `created` (the draft
                    // timestamp) — not dateSent or dateFunded. So we fall back to that.
                    // For BPI rows, paid_at is the date the user entered manually.
                    const wd=r.wise_dates||{};

                    // Tooltip is honest about WHICH date this is for each row.

                          <span className="tip-wrap" tabIndex={0}
