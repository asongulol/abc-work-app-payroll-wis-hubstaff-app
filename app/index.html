      : +(r.gross + (r.ha||0) + (r.t13||0) + (r.pdd||0) + (r.bonus||0) + miscTotal(r.misc_items)).toFixed(2);
    return {...r, net, usd_ref:(net==null||!fx)?null:+(net/fx).toFixed(2)};
  }
  function patchRow(wid, fn){ setRows(prev=>prev.map(r=> r.worker_id===wid ? recalcNet(fn(r)) : r)); }
  const numOrZero=v=> (v===""||v==null) ? 0 : (+v);

  function overrideGross(wid, value){
    patchRow(wid, r=>{
      const overridden = value!=="" && value!=null;
      return {...r, overridden, gross: overridden ? (+value) : r.computed_gross};
    });
  }
  function setMethod(wid, value){
    setRows(prev=>prev.map(r=> r.worker_id===wid ? {...r, method:value||null} : r));
  }
  function setPdd(wid, value){ patchRow(wid, r=>({...r, pdd:numOrZero(value)})); }
  function setBonus(wid, value){ patchRow(wid, r=>({...r, bonus:numOrZero(value)})); }
  // 13th override: blank reverts to computed
  function setT13(wid, value){
    patchRow(wid, r=>({...r, t13: value===""||value==null ? (r.computed_t13||0) : (+value),
      t13_overridden: value!=="" && value!=null}));
  }

  // Period-level UNLOCK — flip pay_periods.state back to 'open' so the user
  // can edit / recalculate / re-lock. Requires a typed reason (audit trail),
  // confirms destructive consequences, and refuses to act on a 'paid' period
  // (the user must mark all unpaid in Process & Pay first, which steps state
  // back to 'locked' and is then unlockable from here).
  async function unlockPeriod(){
    if(!period?.id){ setMsg("No period to unlock."); return; }
    if(period.state==="paid"){
      setMsg("This period is marked PAID. Go to Process & Pay → Mark all unpaid first, then come back here to unlock.");
      return;
    }
    if(period.state!=="locked"){ setMsg("This period isn't locked."); return; }
    const reason=window.prompt(
      "Unlock this pay period for editing?\n\n"+
      `Period: ${start} → ${end}\n\n`+
      "⚠ Consequences:\n"+
      "• Recalculate will REBUILD net amounts from hours — manual overrides "+
      "(gross, PDD lunch, 13th, bonus, health allowance adjustments) will be wiped.\n"+
      "• Any payment rows already drafted/sent in Wise won't be affected here, "+
      "but DB amounts can drift from what was actually paid.\n"+
      "• Re-lock when you're done to restore the read-only snapshot.\n\n"+
      "Enter a reason (recorded in the audit log):"
    );
    if(reason==null) return;            // user cancelled the prompt
    if(!reason.trim()){ setMsg("Unlock requires a reason."); return; }
    setBusy(true); setMsg("");
    try{
      const {error}=await client.from("pay_periods")
        .update({state:"open", locked_at:null}).eq("id",period.id);
      if(error) throw new Error(error.message);
      logEvent(client,{ company_id:companyId, action:"unlock_period",
        entity:`${start} → ${end}`,
        detail:{ reason, previous_state:"locked" } });
      setPeriod({ ...period, state:"open" });
      setMsg(`Unlocked ${start} → ${end} for editing. Re-lock when done.`);
    }catch(ex){ setMsg("Unlock failed: "+(ex.message||ex)); }
    finally{ setBusy(false); }
  }

  // Delete a single contractor's saved pay statement for this period. Only
  // allowed while the period is open (not locked/paid) — a locked statement is
  // a record of what was/will be paid; unlock first if you truly need to remove
  // one. Deletes the payments row (if persisted) and drops it from the table.
  // Resolve this period's pay_period row (id + state) from the DB. `period`
  // state is only populated by loadSaved/lock/unlock — a fresh Calculate
  // leaves it null even though saveDraft has persisted a pay_period — so the
  // delete actions must look it up by company+dates, else they'd no-op the DB.
  async function resolvePeriod(){
    if(period?.id) return period;
    const {data}=await client.from("pay_periods").select("id,state")
      .eq("company_id",companyId).eq("period_start",start).eq("period_end",end).maybeSingle();
    return data ? {id:data.id,state:data.state} : null;
  }

  async function deleteStatement(workerId, name){
    const pp=await resolvePeriod();
    if(pp?.state && pp.state!=="open"){
      setMsg(`Period is ${pp.state} — unlock it first to delete a statement.`); return; }
    if(!window.confirm(`Delete ${name}'s pay statement for ${start} → ${end}?\n\n`+
      `Removes their row from this period's saved statements. No money is affected `+
      `(this period isn't paid). You can re-add them by recalculating.`)) return;
    suppressSave.current=true;   // block any debounced saveDraft from re-adding it
    setBusy(true); setMsg("");
    try{
      if(pp?.id){
        const {error}=await client.from("payments").delete()
          .eq("pay_period_id",pp.id).eq("worker_id",workerId);
        if(error) throw new Error(error.message);
      }
      setRows(prev=>(prev||[]).filter(r=>r.worker_id!==workerId));
      logEvent(client,{company_id:companyId,action:"delete_statement",
        entity:`${name} · ${start} → ${end}`,detail:{scope:"contractor"}});
      setMsg(`Deleted ${name}'s statement for this period.`);
    }catch(ex){ setMsg("Couldn't delete statement: "+(ex.message||ex)); }
    finally{ setBusy(false); setTimeout(()=>{suppressSave.current=false;},1200); }
  }

  // Delete ALL saved pay statements for this period (the whole batch). Open
  // periods only; requires a typed DELETE since it wipes every row. Leaves the
  // (now-empty) open pay_period so you can recalculate fresh.
  async function deleteAllStatements(){
    const pp=await resolvePeriod();
    if(pp?.state && pp.state!=="open"){
      setMsg(`Period is ${pp.state} — unlock it first to delete its statements.`); return; }
    const n=(rows||[]).length;
    const typed=window.prompt(
      `Delete the WHOLE batch — all ${n} pay statement(s) for ${start} → ${end}?\n\n`+
      `This wipes every contractor's saved statement for this period (total `+
      `${money(totalNet,"PHP")}). The period stays open so you can recalculate. `+
      `No money is affected (not paid).\n\nType DELETE to confirm:`);
    if(typed==null) return;
    if(typed.trim().toUpperCase()!=="DELETE"){ setMsg("Not deleted — confirmation text didn't match."); return; }
    suppressSave.current=true;   // block any debounced saveDraft from re-adding rows
    setBusy(true); setMsg("");
    try{
      if(pp?.id){
        const {error}=await client.from("payments").delete().eq("pay_period_id",pp.id);
        if(error) throw new Error(error.message);
      }
      logEvent(client,{company_id:companyId,action:"delete_statement",
        entity:`${start} → ${end}`,detail:{scope:"whole_period",count:n,total_net:totalNet}});
      setRows([]);
      setMsg(`Deleted the batch — ${n} statement(s) for this period. Recalculate to rebuild.`);
    }catch(ex){ setMsg("Couldn't delete statements: "+(ex.message||ex)); }
    finally{ setBusy(false); setTimeout(()=>{suppressSave.current=false;},1200); loadBatches(); }
  }

  // Build the list of approved-time batches grouped by semi-monthly pay period
  // (the navigable list on this tab). Each batch carries its contractor count,
  // total hours, and current state (uncalculated / draft / locked). Paid
  // periods are excluded — they're done and live in Process & Pay.
  async function loadBatches(loadAll=false){
    if(!client||!companyId||consolidated){ setBatches(null); return; }
    const cacheKey="eis_batches_"+companyId;
    // SWR: paint this company's cached list immediately (covers company switches),
    // or null -> skeleton if it has none yet; then refresh below.
    try{ const c=sessionStorage.getItem(cacheKey); setBatches(c?JSON.parse(c):null); }catch(_e){ setBatches(null); }
    // Heavy part = scanning approved time_entries to total hours/contractors per
    // period. Default to RECENT-ONLY (newest ~10 periods) so the tab loads fast;
    // "Show earlier periods" calls loadBatches(true) for the full history.
    const COLS="worker_id,source_name,work_date,tracked_seconds,pto_seconds";
    const g={};
    const PAGE=1000;
    const agg=te=>(te||[]).forEach(t=>{
      const p=periodFor(t.work_date); const key=`${p.start}|${p.end}`;
      const b=g[key]||(g[key]={start:p.start,end:p.end,payDate:p.payDate,workers:new Set(),sec:0});
      b.workers.add(t.worker_id||t.source_name);
      b.sec+=(Number(t.tracked_seconds||0))+(Number(t.pto_seconds||0));
    });
    let partial=false;
    if(loadAll){
      // Full history — one HEAD count, then all pages concurrently.
      const {count}=await client.from("time_entries").select("id",{count:"exact",head:true})
        .eq("company_id",companyId).eq("approval","approved");
      const reqs=[];
      for(let from=0; from<(count||0); from+=PAGE){
        reqs.push(client.from("time_entries").select(COLS)
          .eq("company_id",companyId).eq("approval","approved")
          .order("work_date",{ascending:true}).range(from,from+PAGE-1));
      }
      (await Promise.all(reqs)).forEach(({data})=>agg(data));
    } else {
      // Recent-first — page newest→oldest until the 10 most-recent periods are
      // fully captured (we've crossed into an 11th), then stop. Fast first paint.
      let reachedEnd=false;
      for(let from=0, pg=0; pg<8; pg++, from+=PAGE){
        const {data:te}=await client.from("time_entries").select(COLS)
          .eq("company_id",companyId).eq("approval","approved")
          .order("work_date",{ascending:false}).range(from,from+PAGE-1);
        if(!te||!te.length){ reachedEnd=true; break; }
        agg(te);
        if(te.length<PAGE){ reachedEnd=true; break; }          // last page → we have it all
        if(Object.keys(g).length>10) break;                    // 10 newest complete; older periods exist
      }
      partial=!reachedEnd;   // stopped early (more history exists) → offer "Show earlier"
    }
    const {data:pp}=await client.from("pay_periods")
      .select("id,period_start,period_end,pay_date,state").eq("company_id",companyId);
    const ppByKey={}; (pp||[]).forEach(p=>{ ppByKey[`${p.period_start}|${p.period_end}`]=p; });
    // Count draft statements per OPEN period — drives draft labeling, orphan-draft
    // surfacing, and empty-phantom detection.
    const openPP=(pp||[]).filter(p=>p.state==="open");
    const payCount={};
    if(openPP.length){
      const {data:pays}=await client.from("payments").select("pay_period_id,worker_id")
        .in("pay_period_id",openPP.map(p=>p.id));
      (pays||[]).forEach(r=>{ payCount[r.pay_period_id]=(payCount[r.pay_period_id]||0)+1; });
    }
    // List = every period with approved time UNION every open period that already
    // has draft statements. The union is the key fix: a calculated draft can no
    // longer silently hide just because its time isn't approved/imported yet
    // (e.g. a premature/stale calc of an in-progress period). Locked/paid are
    // labeled; "open + has statements" => draft; otherwise uncalculated.
    const keys=new Set(Object.keys(g));
    openPP.forEach(p=>{ if(payCount[p.id]>0) keys.add(`${p.period_start}|${p.period_end}`); });
    const list=[...keys].map(key=>{
      const [s,e]=key.split("|"); const b=g[key]; const ppRow=ppByKey[key];
      const hasPay=!!(ppRow && payCount[ppRow.id]>0);
      const state=(ppRow&&(ppRow.state==="locked"||ppRow.state==="paid")) ? ppRow.state
                 : hasPay ? "draft" : "uncalculated";
      return {
        start:s, end:e, payDate:(b&&b.payDate)||(ppRow&&ppRow.pay_date)||periodFor(s).payDate,
        contractors: b ? b.workers.size : (ppRow?payCount[ppRow.id]:0),
        hours: b ? +(b.sec/3600).toFixed(2) : 0,
        state, noTime: !b,   // draft with no approved time backing it
      };
    }).sort((a,b)=>b.start.localeCompare(a.start));
    const shownList = partial ? list.slice(0,10) : list;   // partial scan -> show only the complete recent 10
    setBatches(shownList);
    setBatchesPartial(partial);
    try{ sessionStorage.setItem(cacheKey, JSON.stringify(shownList)); }catch(_e){}   // refresh the SWR cache
    // Phantom EMPTY drafts need the FULL time scan to be accurate (a partial scan
    // would falsely flag periods whose time simply wasn't fetched), so only on loadAll.
    if(loadAll){
      const empties=openPP.filter(p=>!(payCount[p.id]>0) && !g[`${p.period_start}|${p.period_end}`])
        .map(p=>({id:p.id,start:p.period_start,end:p.period_end}));
      setEmptyDrafts(empties);
    } else { setEmptyDrafts([]); }
  }
  const [emptyDrafts,setEmptyDrafts]=useState([]);
  // Delete phantom empty draft periods (open, no payments, no approved time).
  async function cleanupEmptyDrafts(){
    if(!emptyDrafts.length) return;
    if(!window.confirm(`Delete ${emptyDrafts.length} empty draft pay period(s)?\n\n`+
      emptyDrafts.slice(0,10).map(d=>`• ${d.start} → ${d.end}`).join("\n")+
      (emptyDrafts.length>10?`\n…and ${emptyDrafts.length-10} more`:"")+
      `\n\nThese have no statements and no approved time — safe to remove. Recalculating a period recreates it if needed.`)) return;
    setBusy(true); setMsg("");
    try{
      const {error}=await client.from("pay_periods").delete().in("id",emptyDrafts.map(d=>d.id));
      if(error) throw new Error(error.message);
      logEvent(client,{company_id:companyId,action:"delete_statement",
        entity:"empty draft periods",detail:{scope:"cleanup_empty_periods",count:emptyDrafts.length}});
      setMsg(`Removed ${emptyDrafts.length} empty draft period(s).`);
      loadBatches();
    }catch(ex){ setMsg("Cleanup failed: "+(ex.message||ex)); }
    finally{ setBusy(false); }
  }
  useEffect(()=>{ loadBatches(); /* eslint-disable-next-line */ },[client,companyId,consolidated]);

  // Calculate one batch: set the period dates and let the settle-effect run
  // calculate(). Scrolls the run card into view so the result is visible.
  async function calcBatch(b){
    if(!(await gate("Calculate"))) return;
    setAutoDates(false); pendingCalc.current=true; applyStart(b.start); setCalcNonce(n=>n+1);
    setMsg(`Calculating ${b.start} → ${b.end}…`);
  }
  // Just load a period (no recalc) — used to review/inspect a locked or paid
  // batch in place (where you can Unlock it). loadSaved fires off the date change.
  function openBatch(b){
    setAutoDates(false); pendingCalc.current=false; scrollToBatch.current=true;
    applyStart(b.start); setLoadNonce(n=>n+1);   // force reload even if dates are unchanged
    setMsg(`Loaded ${b.start} → ${b.end}.`);
  }
  // Once the requested batch's rows have loaded, scroll the card into view (the
  // list above can be long, so the loaded card would otherwise be off-screen).
  useEffect(()=>{
    if(scrollToBatch.current && rows && rows.length){
      scrollToBatch.current=false;
      const el=document.getElementById("pay-batch-card");
      if(el) el.scrollIntoView({behavior:"smooth",block:"start"});
    }
  },[rows]);

  // Delete a whole approved-time batch (the period's approved entries, plus any
  // open draft statements). Blocked for locked/paid periods — unlock first.
  async function deleteBatch(b){
    if(b.state==="locked"||b.state==="paid"){
      setMsg(`Period ${b.start} → ${b.end} is ${b.state} — unlock it first.`); return; }
    // Orphan draft = calculated statements with no approved time behind them.
    // Phrase the prompt for what's actually being removed.
    const confirmMsg = b.noTime
      ? `Discard the draft for ${b.start} → ${b.end}?\n\n${b.contractors} draft statement(s), no approved time behind it. `+
        `This clears the draft only (no time entries exist for this period).`
      : `Delete the approved-time batch for ${b.start} → ${b.end}?\n\n`+
        `${b.contractors} contractor(s) · ${b.hours}h.\nRemoves the approved time entries`+
        (b.state==="draft"?" and the draft pay statements":"")+` for this period. `+
        `Not reversible here (re-import/re-add the time to restore).`;
    if(!(await confirmDanger({
      title: b.noTime ? "Discard this draft?" : "Delete this approved-time batch?",
      message: confirmMsg,
      confirmWord: b.noTime ? "" : "DELETE",
      confirmLabel: b.noTime ? "Discard draft" : "Delete batch",
    }))) return;
    setBusy(true); setMsg("");
    try{
      const {data:ppRow}=await client.from("pay_periods").select("id,state")
        .eq("company_id",companyId).eq("period_start",b.start).eq("period_end",b.end).maybeSingle();
      if(ppRow && ppRow.state==="open"){
        await client.from("payments").delete().eq("pay_period_id",ppRow.id);
      }
      const {error}=await client.from("time_entries").delete()
        .eq("company_id",companyId).gte("work_date",b.start).lte("work_date",b.end)
        .eq("approval","approved");
      if(error) throw new Error(error.message);
      // Fully remove the now-empty open period so it can't linger as a phantom
      // draft that auto-loads on the next visit.
      if(ppRow && ppRow.state==="open"){
        await client.from("pay_periods").delete().eq("id",ppRow.id);
      }
      logEvent(client,{company_id:companyId,action:"delete_import",
        entity:`${b.start} → ${b.end}`,
        detail:{scope:"approved_batch",contractors:b.contractors,hours:b.hours}});
      // Any other batch still waiting to calculate? (exclude the one just
      // deleted; locked/paid don't count as "waiting".)
      const remaining = (batches||[]).filter(x =>
        !(x.start===b.start && x.end===b.end) && x.state!=="locked" && x.state!=="paid");
      // if the currently-loaded period is the one we deleted, clear the table
      if(start===b.start && end===b.end){ setRows([]); setPeriod(null); }
      loadBatches();
      if(remaining.length===0){
        // Nothing left to calculate — go to Time & Approval to load/enter hours.
        // Clear the message so coming back to Calculate shows just the empty list.
        setMsg("");
        if(typeof goTab==="function") goTab("time");
      } else {
        setMsg(`Deleted ${b.start} → ${b.end}.`);
      }
    }catch(ex){ setMsg("Couldn't delete batch: "+(ex.message||ex)); }
    finally{ setBusy(false); }
  }

  async function lockAndSave(){
    if(!rows||!rows.length){setMsg("Calculate first.");return;}
    if(!(await gate("Lock & save pay statements"))) return;
    // Don't let anyone silently drop out of payout: block lock if a contractor
    // has no rate (net==null) or no payout method set.
    const noRate=rows.filter(r=>r.net==null);
    const noMethod=rows.filter(r=>r.net!=null && !r.method);
    if(noRate.length){
      setMsg(`Can't lock — ${noRate.length} contractor(s) have NO RATE and would be left out: `+
        noRate.map(r=>r.name).join(", ")+". Set their rate on their profile (Contractors tab), then recalculate.");
      return;
    }
    if(noMethod.length && !confirm(
      `${noMethod.length} contractor(s) have no payout method set (${noMethod.map(r=>r.name).join(", ")}). `+
      `They'll be saved but won't appear in Wise/BPI exports until you set it. Lock anyway?`)) return;
    // Inactive warning — uses the snapshot from Calculate. Common cause of
    // "contractor missing from Wise payouts": locked into a period while
    // marked inactive on their profile or worker_companies link.
    const inactiveRows=rows.filter(r=>r.net!=null && r.inactive);
    if(inactiveRows.length && !confirm(
      `${inactiveRows.length} contractor(s) are marked INACTIVE (worker or company link is not active):\n\n`+
      inactiveRows.slice(0,12).map(r=>`• ${r.name}`).join("\n")+
      (inactiveRows.length>12?`\n…and ${inactiveRows.length-12} more`:"")+
      `\n\nIf this is a final pay period for them, proceed. Otherwise cancel, set them back to active on the Contractors tab, and recalculate.\n\nLock anyway?`
    )) return;
    if(!confirm(`Lock this period and save ${rows.length} pay statements? Locked periods are read-only.`))return;
    setBusy(true);setMsg("");
    // upsert pay_period
    const {data:pp,error:e1}=await client.from("pay_periods")
      .upsert({company_id:companyId,period_start:start,period_end:end,pay_date:payDate,
               state:"locked",locked_at:new Date().toISOString()},
              {onConflict:"company_id,period_start,period_end"})
      .select().single();
    if(e1){setMsg(e1.message);setBusy(false);return;}
    const pays=rows.filter(r=>r.net!=null).map(r=>({
      company_id:companyId, pay_period_id:pp.id, worker_id:r.worker_id,
      expected_hours:r.expected, worked_hours:r.worked, performance_ratio:r.ratio,
      rate_php:r.rate, gross_php:r.gross, health_allowance_php:r.ha,
      thirteenth_month_php:r.t13, pdd_lunch_php:r.pdd||0, bonus_php:r.bonus||0, deduction_php:r.ded, net_php:r.net,
      misc_items: Array.isArray(r.misc_items)?r.misc_items:[],
      fx_rate:fx, payout_currency:"PHP", payout_amount:r.net,   // PAID IN PHP; fx_rate is reference only
      payout_method:r.method, status:"draft",
      note:r.overridden?`Gross manually overridden (computed ${r.computed_gross})`:null}));
    const {error:e2}=await client.from("payments")
      .upsert(pays,{onConflict:"pay_period_id,worker_id"});
    setBusy(false);
    if(e2){setMsg(e2.message);return;}
    setPeriod({id:pp.id,state:"locked"});
    // audit: the lock, plus any manual overrides captured at lock time
    const overrides=rows.filter(r=>r.overridden||r.t13_overridden||r.bonus||r.pdd)
      .map(r=>({name:r.name, gross_override:r.overridden?r.gross:undefined,
        computed_gross:r.overridden?r.computed_gross:undefined,
        t13:r.t13_overridden?r.t13:undefined, bonus:r.bonus||undefined, pdd:r.pdd||undefined}));
    logEvent(client,{company_id:companyId, action:"lock",
      entity:`${start} → ${end}`,
      detail:{contractors:pays.length, total_net:pays.reduce((s,p)=>s+(p.net_php||0),0),
        overrides: overrides.length?overrides:undefined}});
    setMsg(`Locked ${pays.length} statement(s) for ${start} → ${end}.`);
    loadBatches();   // reflect the new locked state in the batch list
    // The period is locked now and lives in Process & Pay. Clear it from the
    // Calculate view so returning to this tab shows the clean "ready for
    // calculation" list — not a stale locked batch card that implies there's
    // still something to calculate/lock here. (Review it via Show locked/paid.)
    setRows(null); setPeriod(null); setStaleRows([]);
    // Offer to move straight to paying this batch.
    if(typeof goTab==="function" && window.confirm(
      `Locked ${pays.length} statement(s) for ${start} → ${end}.\n\n`+
      `Proceed to Pay Batch (Process & Pay) now? Choose Cancel to stay on Calculate.`)){
      goTab("process");
    }
  }

  const totalNet=rows?rows.reduce((s,r)=>s+(r.net||0),0):0;
  const totalUsdRef=rows?rows.reduce((s,r)=>s+(r.usd_ref||0),0):0;

  return (
    <div>
      {/* Approved-time batches by pay period — the navigable list. Pick one to
          Calculate (it flows to Process & Pay once locked) or Delete. */}
      {/* Cold load (no cached list yet): show the section with a skeleton instead
          of a blank gap, so the tab feels instant while the scan runs. */}
      {!consolidated && companyId && batches===null && (
        <div className="card">
          <h2 style={{margin:"0 0 4px"}}>Pay periods ready for calculation</h2>
          <p className="sub" style={{marginTop:0}}>Loading approved time…</p>
          <Skeleton rows={3}/>
        </div>
      )}
      {!consolidated && companyId && batches && (batches.length>0 || emptyDrafts.length>0) && (() => {
        const finishedCount = batches.filter(b=>b.state==="locked"||b.state==="paid").length;
        const shown = showFinishedBatches ? batches : batches.filter(b=>b.state!=="locked"&&b.state!=="paid");
        return (
        <div className="card">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
            <h2 style={{margin:0}}>Pay periods ready for calculation</h2>
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
              {emptyDrafts.length>0 && (
                <button className="btn ghost sm" disabled={busy} onClick={cleanupEmptyDrafts}
                  title="Delete empty draft periods left behind after a batch/import delete (no statements, no approved time)."
                  style={{borderColor:"var(--bad)",color:"var(--bad)"}}>
                  Clean up {emptyDrafts.length} empty draft(s)
                </button>
              )}
              {finishedCount>0 && (
                <button className="btn ghost sm" onClick={()=>setShowFinishedBatches(s=>!s)}>
                  {showFinishedBatches ? `Hide locked/paid (${finishedCount})` : `Show locked/paid (${finishedCount})`}
                </button>
              )}
              {batchesPartial && (
                <button className="btn ghost sm" disabled={busy} onClick={()=>loadBatches(true)}
                  title="Currently showing the 10 most recent periods. Load the full history.">
                  ↓ Show earlier periods
                </button>
              )}
            </div>
          </div>
          <p className="sub">{showFinishedBatches?"Every period with approved time.":"Periods that still need action (not yet calculated or still a draft)."}
            {" "}<b>Calculate</b> builds a period's pay statements (review below, then Lock to send it to Process &amp; Pay); <b>Delete</b> removes the batch.
            <b> Locked</b>/<b>paid</b> periods are read-only here — Open one to review or unlock it; paid ones live in Process &amp; Pay.</p>
          {shown.length===0
            ? <div className="empty">Nothing waiting — all approved periods are locked or paid. {finishedCount>0 && "Use “Show locked/paid” to review them."}</div>
            : <div className="table-scroll"><table>
            <thead><tr><th>Pay period</th><th>Contractors</th><th>Total hours</th><th>Status</th><th></th></tr></thead>
            <tbody>
              {shown.map((b,i)=>{
                const isCur = start===b.start && end===b.end;
                const badge = b.state==="paid"
                  ? <span className="pill" style={{background:"#dcfce7",color:"#166534"}}>paid</span>
                  : b.state==="locked"
                    ? <span className="pill" style={{background:"#eef2ff",color:"#3730a3"}}>locked · ready to pay</span>
                    : b.state==="draft"
                      ? <span className="pill" style={{background:"#fef9c3",color:"#854d0e"}}>calculated (draft)</span>
                      : <span className="pill" style={{background:"#f3f4f6",color:"var(--muted)"}}>not calculated</span>;
                const finished = b.state==="locked" || b.state==="paid";
                return (
                  <tr key={i} style={isCur?{background:"#eff6ff"}:{}}>
                    <td className="card-title"><b>{b.start} → {b.end}</b>
                      {b.noTime && b.state==="draft" && <div className="sub" style={{fontWeight:400}}>draft only — no approved time</div>}</td>
                    <td data-label="Contractors">{b.contractors}</td>
                    <td data-label="Total hours">{b.hours.toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                    <td data-label="Status">{badge}</td>
                    <td className="card-action" style={{textAlign:"right",whiteSpace:"nowrap"}}>
                      {finished
                        ? <button className="btn ghost sm" disabled={busy} onClick={()=>openBatch(b)}
                            title={b.state==="paid"?"View this paid period's pay statements (read-only; pay/reconcile in Process & Pay)":"View this locked period below (review / unlock)"}>View</button>
                        : <>
                            <button className="btn sm" disabled={busy} onClick={()=>calcBatch(b)}>
                              Calculate</button>{" "}
                            <button className="btn ghost sm" disabled={busy}
                              title="Delete this approved-time batch"
                              style={{borderColor:"var(--bad)",color:"var(--bad)"}}
                              onClick={()=>deleteBatch(b)}>Delete</button>
                          </>}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table></div>}
        </div>
        ); })()}
      {/* Loaded, but this client has NO approved-time batches AND no draft periods.
          Without this branch every block above is false and the tab renders an
          empty <div> — the "blank Calculate tab" a half-set-up client (time but
          not yet approved, or no time at all) would land on. Show a directive
          empty-state instead of nothing. */}
      {!consolidated && companyId && batches && batches.length===0 && emptyDrafts.length===0 && (
        <div className="card">
          <h2 style={{margin:"0 0 4px"}}>Pay periods ready for calculation</h2>
          <div className="empty">
            No approved time for this client yet. Import and approve time in <b>Time &amp; Approval</b> —
            once a period is approved it shows up here to calculate.
            {typeof goTab==="function" &&
              <div style={{marginTop:10}}><button className="btn ghost sm" onClick={()=>goTab("time")}>Go to Time &amp; Approval</button></div>}
          </div>
        </div>
      )}
      {/* The manual "Payroll run" entry card was removed — calculation is
          driven by the batch list above (click Calculate on a period) and the
          Pay batch card below. Calculation feedback still surfaces here. */}
      {consolidated && <div className="card"><div className="banner">Switch to a single company — payroll runs are per-company.</div></div>}
      {(msg || dropped.length>0 || undo) && (
        <div className="card">
          {dropped.length>0 && (
            <div className="banner" style={{background:"#fef2f2",borderColor:"#fecaca",color:"#b91c1c"}}>
              <b>⚠ Some approved time isn't showing below:</b>
              <ul style={{margin:"6px 0 0",paddingLeft:18,fontSize:13}}>
                {dropped.map((m,i)=><li key={i}>{m}</li>)}
              </ul>
            </div>
          )}
          {undo && <div className="banner error" style={{marginTop:dropped.length?8:0,display:"flex",
            justifyContent:"space-between",alignItems:"center",gap:12}}>
            <span><b>Undo available:</b> {undo.label}</span>
            <span style={{display:"flex",gap:8}}>
              <button className="btn sm" disabled={busy} onClick={async()=>{
                const fn=undo.fn; setUndo(null); setBusy(true);
                try{ await fn(); }catch(e){ setMsg("Undo failed: "+(e.message||e)); }
                finally{ setBusy(false); }
              }}>Undo recalculation</button>
              <button className="btn ghost sm" onClick={()=>setUndo(null)}>Dismiss</button>
            </span>
          </div>}
          <Banner msg={msg} style={{marginTop:(dropped.length||undo)?8:0}} />
        </div>
      )}

      {showHol && <HolidayEditor year={new Date(start).getFullYear()}
        onChange={()=>setHolTick(t=>t+1)} />}

      {rows && rows.length>0 && (
        <div className="card" id="pay-batch-card">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
            <div><h2>Pay batch · {start} → {end}</h2>
              <p className="sub">Pay date <b>{payDate}</b> · {rows.length} contractor(s) ·
                Payout <b>{money(totalNet,"PHP")}</b>
                {" "}<span className="muted">(≈ {money(totalUsdRef,"USD")} ref @ {fx} PHP/USD)</span></p></div>
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
              {period?.state && period.state!=="open" && (
                <span className="pill" style={{
                  background:period.state==="paid"?"#dcfce7":"#eef2ff",
                  color:period.state==="paid"?"#166534":"#3730a3",
                  fontSize:11,padding:"3px 8px"}}>
                  🔒 {period.state}
                </span>
              )}
              <button className="btn" disabled={busy} onClick={lockAndSave}>
                {period?.state==="locked"
                  ? "Re-lock batch (overwrite)"
                  : period?.state==="paid"
                    ? "Re-lock (mark unpaid first)"
                    : "Lock batch for processing"}
              </button>
              {period?.state && period.state!=="open" && (
                <button className="btn ghost" disabled={busy} onClick={unlockPeriod}
                  title={period.state==="paid"
                    ? "Period is marked paid. Mark all unpaid in Process & Pay first."
                    : "Flip this period back to 'open' so you can edit / recalculate. Requires a reason. Re-lock when done."}
                  style={{borderColor:"#b91c1c",color:"#b91c1c"}}>
                  Unlock for editing…
                </button>
              )}
              {/* Delete the whole period's statements (the batch) — open periods only. */}
              {(!period?.state || period.state==="open") && (
                <button className="btn ghost" disabled={busy} onClick={deleteAllStatements}
                  title="Delete the whole batch — every contractor's saved statement for this period (open periods only; requires typed DELETE)."
                  style={{borderColor:"var(--bad)",color:"var(--bad)"}}>
                  Delete batch
                </button>
              )}
            </div>
          </div>
          {/* Calculation options (moved here from the removed Payroll-run card).
              Toggle and Recalculate to rebuild this batch from hours. */}
          <div className="row" style={{alignItems:"center",gap:16,flexWrap:"wrap",marginTop:4}}>
            <label style={{fontSize:13}}><input type="checkbox" checked={includeHA}
              onChange={e=>setIncludeHA(e.target.checked)}/> Include Health Allowance</label>
            <label style={{fontSize:13}}><input type="checkbox" checked={include13}
              onChange={e=>setInclude13(e.target.checked)}/> Include 13th-month</label>
            <span style={{display:"inline-flex",alignItems:"center",gap:6}}>
              <label style={{fontSize:12,color:"var(--muted)"}}>FX ref</label>
              <input type="number" step="0.0001" value={fx}
                onChange={e=>{setFxAuto(false);setFx(parseFloat(e.target.value)||0);}} style={{width:90}}/>
            </span>
            <button className="btn ghost sm" disabled={busy} onClick={calculate}>
              {busy?"Working…":"Recalculate"}</button>
            <span className="muted" style={{fontSize:11}}>Rebuilds from hours; resets overrides &amp; Misc.</span>
          </div>
          <p className="muted" style={{fontSize:12,margin:"4px 0 0"}}>
            Expected: full-time <b>{ftExp}h</b>, part-time <b>{ptExp}h</b> (minus {periodHolidays.length} holiday(s)
            {periodHolidays.length>0 && <span>: {periodHolidays.map(h=>h.name).join(", ")}</span>}).
            {" "}<a href="#" onClick={e=>{e.preventDefault();setShowHol(s=>!s);}} style={{color:"var(--accent)"}}>
              {showHol?"Hide":"Edit"} holidays</a>
          </p>
          {/* Rate-drift (stale snapshot) banner — moved here with the options. */}
          {staleRows.length>0 && (
            <div className="banner" style={{background:"#fef3c7",borderColor:"#fcd34d",color:"#92400e",marginTop:8}}>
              <b>⚠ Rate(s) changed since this batch was last calculated.</b>
              {" "}Click <b>Recalculate</b> to apply the current effective rates.
              <ul style={{margin:"6px 0 0",paddingLeft:18,fontSize:12}}>
                {staleRows.slice(0,8).map((s,i)=>(
                  <li key={s.worker_id||i}>
                    {openContractor && s.worker_id
                      ? <button type="button" onClick={()=>openContractor(s.worker_id)}
                          title="Open this contractor's profile to review or edit the rate"
                          style={{background:"none",border:"none",padding:0,margin:0,color:"#92400e",
                            textDecoration:"underline",cursor:"pointer",font:"inherit",fontWeight:700}}>{s.name}</button>
                      : <b>{s.name}</b>}:
                    {" "}was ₱{Number(s.was).toLocaleString(undefined,{minimumFractionDigits:2})},
                    {" "}now ₱{Number(s.now).toLocaleString(undefined,{minimumFractionDigits:2})}
                  </li>
                ))}
                {staleRows.length>8 && <li>…and {staleRows.length-8} more</li>}
              </ul>
            </div>
          )}
          <FilterBox q={sfQ} setQ={sfSetQ} placeholder="Filter contractors…" />
          {(() => {
            // Decide which optional columns to display: show a column only if
            // at least one row in the current period has a non-zero value.
            // misc_items is its own always-visible column with a popup editor.
            const anyHA    = sfRows.some(r => Number(r.ha)>0);
            const any13    = sfRows.some(r => Number(r.t13)>0);
            const anyLunch = sfRows.some(r => Number(r.pdd)>0);
            const anyBonus = sfRows.some(r => Number(r.bonus)>0);
            const miscSum = r => miscTotal(r.misc_items);
            return (
          <div className="table-scroll keep-table"><table>
            <thead><tr>
              <SfTh k="name">Contractor</SfTh><SfTh k="worked">Worked h</SfTh><th>Exp</th><SfTh k="ratio">Ratio</SfTh><SfTh k="rate">Rate ₱</SfTh>
              <th>Gross ₱</th>
              {anyHA    && <th>HA ₱</th>}
              {any13    && <th>13th ₱</th>}
              {anyLunch && <th>Lunch ₱</th>}
              {anyBonus && <th>Bonus ₱</th>}
              <th>Misc ₱</th>
              <SfTh k="net">Net ₱ (paid)</SfTh><th title="USD reference only — contractors are paid in PHP. Computed as Net ₱ ÷ FX. FX is the rate Wise locked at transfer time (USD→PHP) where available, otherwise a market approximation.">≈ USD ref</th><SfTh k="method">Via</SfTh>
              {(!period?.state || period.state==="open") && <th></th>}
            </tr></thead>
            <tbody>
              {sfRows.map(r=>(
                <tr key={r.worker_id} style={
                  r.inactive?{background:"#fef2f2"}:r.rate==null?{background:"var(--warn-soft)"}:{}}>
                  <td className="card-title">
                    <b style={r.inactive?{textDecoration:"line-through"}:{}}>{r.name}</b>
                    {r.inactive && <span className="tip-wrap" tabIndex={0}
                      style={{marginLeft:6,fontSize:10,verticalAlign:"middle",cursor:"help"}}>
                      <span className="pill" style={{background:"#fef2f2",color:"#b91c1c"}}>🚫 inactive</span>
                      <span className="tip-body">This contractor (or their company link) is marked inactive. They're still included in this calculation so you can pay a final period — but Lock &amp; Save will ask you to confirm. If this isn't a final period, reactivate them on the Contractors tab and recalculate.</span>
                    </span>}
                  </td>
                  <td>{r.worked}</td><td>{r.expected}</td><td>{(r.ratio*100).toFixed(0)}%</td>
                  <td>{r.rate==null?<span className="muted">no rate</span>:r.rate.toLocaleString()}</td>
                  <td>
                    <input type="number" step="0.01" value={r.gross==null?"":r.gross}
                      title="Computed from hours; edit to override"
                      onChange={e=>overrideGross(r.worker_id, e.target.value)}
                      style={{width:90,padding:"3px 6px",fontSize:13,
                        border:r.overridden?"1px solid var(--accent)":"1px solid var(--border)",
                        background:r.overridden?"var(--accent-soft)":"#fff"}}/>
                    {r.overridden && <button className="btn ghost sm" title="Revert to computed"
                      style={{marginLeft:4,padding:"2px 6px"}}
                      onClick={()=>overrideGross(r.worker_id,"")}>↺</button>}
                  </td>
                  {anyHA    && <td>{r.ha?r.ha.toLocaleString():"—"}</td>}
                  {any13    && <td>{r.t13?Number(r.t13).toLocaleString():"—"}</td>}
                  {anyLunch && <td>{r.pdd?Number(r.pdd).toLocaleString():"—"}</td>}
                  {anyBonus && <td>{r.bonus?Number(r.bonus).toLocaleString():"—"}</td>}
                  <td style={{whiteSpace:"nowrap"}}>
                    {(() => {
                      const m = miscSum(r);
                      const hasMisc = Math.abs(m) > 0.005;
                      const itemCount = Array.isArray(r.misc_items)?r.misc_items.length:0;
                      return (
                        <span style={{display:"inline-flex",gap:6,alignItems:"center"}}>
                          {hasMisc
                            ? <span style={{color:m<0?"#b91c1c":"inherit"}}>
                                {m<0?"-":""}{Math.abs(m).toLocaleString(undefined,{minimumFractionDigits:2})}
                              </span>
                            : <span className="muted">—</span>}
                          <button className="btn ghost sm" style={{padding:"2px 8px",fontSize:12}}
                            onClick={()=>setMiscRow(r.worker_id)}
                            title={itemCount?`Edit ${itemCount} misc item(s)`:"Add Lunch / Other Earns / Other Hours / Bonus / Deductions"}>
                            {itemCount?`Edit (${itemCount})`:"+ Misc"}
                          </button>
                        </span>
                      );
                    })()}
                  </td>
                  <td><b>{r.net==null?"—":r.net.toLocaleString()}</b></td>
                  <td className="muted">{r.usd_ref==null?"—":"$"+r.usd_ref.toLocaleString()}</td>
                  <td>
                    <select value={r.method||""} onChange={e=>setMethod(r.worker_id,e.target.value)}
                      style={{padding:"3px 6px",fontSize:13,
                        border:r.method?"1px solid var(--border)":"1px solid var(--warn)",
                        background:r.method?"#fff":"var(--warn-soft)"}}>
                      <option value="">— set —</option>
                      {PAYOUT_CHANNELS.map(ch=><option key={ch} value={ch}>{methodLabel(ch)}</option>)}
                    </select></td>
                  {(!period?.state || period.state==="open") && (
                    <td style={{textAlign:"right"}}>
                      <button className="btn ghost sm" disabled={busy}
                        title={`Delete ${r.name}'s statement for this period`}
                        style={{borderColor:"var(--bad)",color:"var(--bad)",padding:"2px 8px"}}
                        onClick={()=>deleteStatement(r.worker_id, r.name)}>Delete</button>
                    </td>
                  )}
                </tr>
              ))}
            </tbody>
          </table></div>
            );
          })()}
          <p className="muted" style={{fontSize:12,marginTop:10}}>
            Contractors are <b>paid in PHP</b> (Net ₱). USD is a reference only (Net ₱ ÷ FX).
            {" "}FX is the rate <b>Wise locked at transfer time</b> (USD→PHP) where available, otherwise a market approximation.
            <b> Gross ₱ is editable</b> — override it for any contractor and Net recomputes;
            a blue cell + ↺ marks an override (the saved statement records the original computed value).
            Yellow rows have no effective rate set — fix that before locking.</p>
        </div>
      )}
      {miscRowId && (() => {
        const row = (rows||[]).find(r=>r.worker_id===miscRowId);
        if(!row){ setMiscRow(null); return null; }
        return <MiscModal row={row}
          onClose={()=>setMiscRow(null)}
          onSave={payload=>saveMiscForRow(miscRowId, payload)} />;
      })()}
    </div>
  );
}

// ============================ MISC MODAL =====================================
// Per-row popup for the "Misc" cell in Calculate's pay statements table.
// Edits four storage sinks at once:
//   1. Lunch       → payments.pdd_lunch_php  (single number)
//   2. Bonus       → payments.bonus_php      (single number)
//   3. Other Earns → payments.misc_items[]   (kind=other_earns, label+amount)
//   4. Other Hours → payments.misc_items[]   (kind=other_hours, label+hours;
//                     amount = hours * (rate * 24 / 2080), live-computed)
//   5. Deductions  → payments.misc_items[]   (kind=deduction, label+amount;
//                     subtracted from Net in miscTotal)
//
// All edits are local until "Save" — closing without saving discards. Save
// hands the assembled payload back to the parent which patches the row and
// triggers debounced saveDraft via the standard recalcNet pipeline.
function MiscModal({ row, onClose, onSave }){
  const close=guardedClose(onClose);
  const mref=useModalA11y(close,{escClose:false}); // money-adjustment form: no Escape-close
  const rate = Number(row.rate)||0;
  // Effective hourly rate per the spec: (semi-monthly rate × 24 periods/yr) ÷ 2080 hrs/yr
  const hourlyRate = rate>0 ? +((rate*24)/2080).toFixed(4) : 0;

  // Local editable state, seeded from the row.
  const [ha,setHa]=useState(row.ha?String(row.ha):"");
  // 13th-month: track whether the user cleared it (blank → revert to computed).
  const [t13,setT13]=useState(row.t13?String(row.t13):"");
  const [pdd,setPdd]=useState(row.pdd?String(row.pdd):"");
  const [bonus,setBonus]=useState(row.bonus?String(row.bonus):"");
  const computedT13 = Number(row.computed_t13)||0;
  const seedItems = Array.isArray(row.misc_items)?row.misc_items:[];
  const [earns,setEarns]=useState(()=>seedItems.filter(x=>x.kind==="other_earns").map(x=>({label:x.label||"", amount:String(x.amount||"")})));
  const [hours,setHours]=useState(()=>seedItems.filter(x=>x.kind==="other_hours").map(x=>({label:x.label||"", hours:String(x.hours||""), hourly_rate:Number(x.hourly_rate||hourlyRate)})));
  const [deducs,setDeducs]=useState(()=>seedItems.filter(x=>x.kind==="deduction").map(x=>({label:x.label||"", amount:String(x.amount||"")})));

  function setEarn(i, patch){ setEarns(prev=>prev.map((e,j)=>j===i?{...e,...patch}:e)); }
  function setHr(i, patch){ setHours(prev=>prev.map((e,j)=>j===i?{...e,...patch}:e)); }
  function setDed(i, patch){ setDeducs(prev=>prev.map((e,j)=>j===i?{...e,...patch}:e)); }
  const addEarn = ()=>setEarns(prev=>[...prev,{label:"",amount:""}]);
  const addHr   = ()=>setHours(prev=>[...prev,{label:"",hours:"",hourly_rate:hourlyRate}]);
  const addDed  = ()=>setDeducs(prev=>[...prev,{label:"",amount:""}]);
  const rmEarn = i=>setEarns(prev=>prev.filter((_,j)=>j!==i));
  const rmHr   = i=>setHours(prev=>prev.filter((_,j)=>j!==i));
  const rmDed  = i=>setDeducs(prev=>prev.filter((_,j)=>j!==i));

  // Compute Other Hours amount inline (hours × hourly_rate) for preview.
  const hoursAmount = e => +((Number(e.hours)||0) * (Number(e.hourly_rate)||0)).toFixed(2);

  const haNum    = Number(ha)||0;
  const t13Num   = t13===""||t13==null ? computedT13 : (Number(t13)||0);
  const pddNum   = Number(pdd)||0;
  const bonusNum = Number(bonus)||0;
  const earnsSum = earns.reduce((s,e)=>s+(Number(e.amount)||0),0);
  const hoursSum = hours.reduce((s,e)=>s+hoursAmount(e),0);
  const ducsSum  = deducs.reduce((s,e)=>s+(Number(e.amount)||0),0);
  const netImpact = haNum + t13Num + pddNum + bonusNum + earnsSum + hoursSum - ducsSum;

  const ucSnap=()=>JSON.stringify({ha,t13,pdd,bonus,earns,hours,deducs});
  const ucBase=React.useRef(null);
  if(ucBase.current===null) ucBase.current=ucSnap();
  useUnsavedGuard({ dirty: ucBase.current!==ucSnap(), label:"these pay adjustments", save: ()=>{ commitSave(); return true; } });
  function commitSave(){
    // Reject malformed: label required + amount/hours required & positive.
    const cleanEarns = earns
      .map(e=>({label:String(e.label||"").trim(), amount:Number(e.amount)||0}))
      .filter(e=>e.label && e.amount>0);
    const cleanHours = hours
      .map(e=>({label:String(e.label||"").trim(), hours:Number(e.hours)||0,
                hourly_rate:Number(e.hourly_rate)||hourlyRate}))
      .filter(e=>e.label && e.hours>0)
      .map(e=>({...e, amount:+((e.hours)*(e.hourly_rate)).toFixed(2)}));
    const cleanDeds = deducs
      .map(e=>({label:String(e.label||"").trim(), amount:Number(e.amount)||0}))
      .filter(e=>e.label && e.amount>0);
    const misc_items = [
      ...cleanEarns.map(e=>({kind:"other_earns", label:e.label, amount:+(e.amount).toFixed(2)})),
      ...cleanHours.map(e=>({kind:"other_hours", label:e.label, hours:e.hours,
                              hourly_rate:e.hourly_rate, amount:e.amount})),
      ...cleanDeds .map(e=>({kind:"deduction",   label:e.label, amount:+(e.amount).toFixed(2)})),
    ];
    // t13_blank=true means user emptied the field — parent reverts to computed.
    const t13_blank = t13===""||t13==null;
    onSave({ ha:haNum, t13: t13_blank?"":t13Num, t13_blank,
             pdd:pddNum, bonus:bonusNum, misc_items });
    ucBase.current=ucSnap();   // committed to the row → no longer dirty
  }

  const numInp = {width:120,padding:"4px 6px",fontSize:13};
  const lblInp = {flex:1,padding:"4px 6px",fontSize:13,minWidth:160};
  const sectionStyle = {borderTop:"1px solid var(--border)",paddingTop:10,marginTop:10};
  return (
    <div className="modal-bg" onClick={close}>
      <div className="modal" ref={mref} role="dialog" aria-modal="true" aria-labelledby="misc-title" onClick={e=>e.stopPropagation()} style={{maxWidth:640}}>
        <button className="x" aria-label="Close" onClick={close}><span aria-hidden="true">×</span></button>
        <h2 id="misc-title" style={{marginBottom:0}}>Misc · {row.name}</h2>
        <p className="sub" style={{marginTop:2,fontSize:12}}>
          Rate ₱{rate.toLocaleString()} · effective hourly ₱{hourlyRate.toLocaleString(undefined,{minimumFractionDigits:2})} (rate×24÷2080)
        </p>

        {/* HA + 13th + Lunch + Bonus — single-value typed inputs that map to
            the existing health_allowance_php, thirteenth_month_php,
            pdd_lunch_php, and bonus_php columns respectively. Clearing the
            13th-month input reverts to the value Calculate computed
            (computed_t13); 13th input shows "computed" hint when blank.
            HA has no auto-revert — empty means 0. */}
        <div style={{display:"flex",gap:16,marginTop:8,flexWrap:"wrap"}}>
          <div className="field">
            <label>Health Allowance (₱)</label>
            <input type="number" step="0.01" value={ha} onChange={e=>setHa(e.target.value)}
              placeholder="0" style={numInp}/>
          </div>
          <div className="field">
            <label>13th month (₱) <span className="muted" style={{fontSize:11,fontWeight:400}}>
              {(t13===""||t13==null)?`(computed: ₱${computedT13.toLocaleString(undefined,{minimumFractionDigits:2})})`:""}
            </span></label>
            <input type="number" step="0.01" value={t13} onChange={e=>setT13(e.target.value)}
              placeholder={`computed ${computedT13.toFixed(2)}`} style={numInp}/>
          </div>
          <div className="field">
            <label>Lunch (₱)</label>
            <input type="number" step="0.01" value={pdd} onChange={e=>setPdd(e.target.value)}
              placeholder="0" style={numInp}/>
          </div>
          <div className="field">
            <label>Bonus (₱)</label>
            <input type="number" step="0.01" value={bonus} onChange={e=>setBonus(e.target.value)}
              placeholder="0" style={numInp}/>
          </div>
        </div>

        {/* Other Earns — labeled lump sums. */}
        <div style={sectionStyle}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <label style={{fontSize:11,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".03em"}}>
              Other earns
            </label>
            <button className="btn ghost sm" onClick={addEarn}>+ Add earn</button>
          </div>
          {earns.length===0
            ? <p className="muted" style={{fontSize:12,margin:"6px 0 0"}}>None.</p>
            : earns.map((e,i)=>(
                <div key={i} style={{display:"flex",gap:6,alignItems:"center",marginTop:6,flexWrap:"wrap"}}>
                  <input type="text" placeholder="Description (required)" value={e.label}
                    onChange={ev=>setEarn(i,{label:ev.target.value})} style={lblInp}/>
                  <input type="number" step="0.01" placeholder="₱ amount" value={e.amount}
                    onChange={ev=>setEarn(i,{amount:ev.target.value})} style={numInp}/>
                  <button className="btn ghost sm" onClick={()=>rmEarn(i)}
                    style={{borderColor:"var(--bad)",color:"var(--bad)"}}>×</button>
                </div>
              ))}
        </div>

        {/* Other Hours — labeled labor hours, priced at the contractor's
            effective hourly rate. Amount is auto-derived from hours; rate
            is captured at save time for historical stability. */}
        <div style={sectionStyle}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <label style={{fontSize:11,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".03em"}}>
              Other hours <span style={{textTransform:"none"}}>(priced at ₱{hourlyRate.toLocaleString(undefined,{minimumFractionDigits:2})}/h)</span>
            </label>
            <button className="btn ghost sm" onClick={addHr} disabled={hourlyRate<=0}
              title={hourlyRate<=0?"Set a rate on this contractor first":"Add a labeled hours entry"}>
              + Add hours
            </button>
          </div>
          {hours.length===0
            ? <p className="muted" style={{fontSize:12,margin:"6px 0 0"}}>None.</p>
            : hours.map((e,i)=>(
                <div key={i} style={{display:"flex",gap:6,alignItems:"center",marginTop:6,flexWrap:"wrap"}}>
                  <input type="text" placeholder="Description (required)" value={e.label}
                    onChange={ev=>setHr(i,{label:ev.target.value})} style={lblInp}/>
                  <input type="number" step="0.01" placeholder="hours" value={e.hours}
                    onChange={ev=>setHr(i,{hours:ev.target.value})} style={{width:90,padding:"4px 6px",fontSize:13}}/>
                  <span className="muted" style={{fontSize:12}}>
                    × ₱{Number(e.hourly_rate).toLocaleString(undefined,{minimumFractionDigits:2})}/h
                    = <b>₱{hoursAmount(e).toLocaleString(undefined,{minimumFractionDigits:2})}</b>
                  </span>
                  <button className="btn ghost sm" onClick={()=>rmHr(i)}
                    style={{borderColor:"var(--bad)",color:"var(--bad)"}}>×</button>
                </div>
              ))}
        </div>

        {/* Deductions — labeled subtractions from Net. */}
        <div style={sectionStyle}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <label style={{fontSize:11,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".03em"}}>
              Deductions <span style={{textTransform:"none"}}>(subtracted from Net)</span>
            </label>
            <button className="btn ghost sm" onClick={addDed}>+ Add deduction</button>
          </div>
          {deducs.length===0
            ? <p className="muted" style={{fontSize:12,margin:"6px 0 0"}}>None.</p>
            : deducs.map((e,i)=>(
                <div key={i} style={{display:"flex",gap:6,alignItems:"center",marginTop:6,flexWrap:"wrap"}}>
                  <input type="text" placeholder="Reason (required)" value={e.label}
                    onChange={ev=>setDed(i,{label:ev.target.value})} style={lblInp}/>
                  <input type="number" step="0.01" placeholder="₱ amount" value={e.amount}
                    onChange={ev=>setDed(i,{amount:ev.target.value})} style={numInp}/>
                  <button className="btn ghost sm" onClick={()=>rmDed(i)}
                    style={{borderColor:"var(--bad)",color:"var(--bad)"}}>×</button>
                </div>
              ))}
        </div>

        <div className="actions" style={{...sectionStyle, display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:13}}>
            Net impact: <b style={{color:netImpact<0?"#b91c1c":"#166534"}}>
              {netImpact<0?"-":"+"}₱{Math.abs(netImpact).toLocaleString(undefined,{minimumFractionDigits:2})}
            </b>
          </div>
          <div>
            <button className="btn ghost" onClick={close}>Cancel</button>
            {" "}
            <button className="btn" onClick={commitSave}>Save</button>
          </div>
        </div>
      </div>
    </div>
  );
}

const DOC_KINDS=[["ic_agreement","IC Agreement"],["w8ben","W-8BEN"],["gov_id","Gov ID"],["other","Other"]];
function daysUntil(dateStr){ if(!dateStr)return null;
  return Math.round((new Date(dateStr+"T00:00:00")-new Date(new Date().toISOString().slice(0,10)+"T00:00:00"))/86400000); }

function Documents({client,companyId,consolidated}){
  // workers in scope (for the add-form dropdown + names)
  const {data:wcs}=useQuery(client,c=>{
    let q=c.from("worker_companies").select("worker_id,company_id,workers(first_name,middle_name,last_name)");
    if(!consolidated&&companyId)q=q.eq("company_id",companyId);
    return q;
  },[client,companyId,consolidated]);
  const {data:docs,loading,reload}=useQuery(client,c=>{
    let q=c.from("documents").select("id,worker_id,company_id,kind,title,signed_on,expires_on,storage_path")
      .order("expires_on",{ascending:true,nullsFirst:false});
    if(!consolidated&&companyId)q=q.eq("company_id",companyId);
    return q;
  },[client,companyId,consolidated]);

  const nameById={}; (wcs||[]).forEach(w=>{ if(w.workers) nameById[w.worker_id]=fullName(w.workers); });
  const workerOpts=Object.entries(nameById).sort((a,b)=>a[1].localeCompare(b[1]));

  const [form,setForm]=useState({worker_id:"",kind:"ic_agreement",title:"",signed_on:"",expires_on:""});
  const [busy,setBusy]=useState(false); const [msg,setMsg]=useState("");
  async function addDoc(){
    if(!form.worker_id){setMsg("Pick a contractor.");return;}
    setBusy(true);setMsg("");
    const {error}=await client.from("documents").insert({
      worker_id:form.worker_id, company_id:companyId||null, kind:form.kind,
      title:form.title||DOC_KINDS.find(k=>k[0]===form.kind)[1],
      signed_on:form.signed_on||null, expires_on:form.expires_on||null});
    setBusy(false);
    if(error){setMsg(error.message);return;}
    setForm({worker_id:"",kind:"ic_agreement",title:"",signed_on:"",expires_on:""});
    reload();
  }

  const list=docs||[];
  const expiringSoon=list.filter(d=>{const n=daysUntil(d.expires_on); return n!=null && n<=30;});

  return (
    <div>
      <div className="card">
        <h2>Documents</h2>
        <p className="sub">Track each contractor's IC agreement, W-8BEN, and IDs.
          Set an expiry to get a reminder here when it's within 30 days (or overdue).</p>
        <Alert show={expiringSoon.length>0} type="warn" tab="documents">{expiringSoon.length} document(s) expiring soon or overdue — see the highlighted rows in Documents.</Alert>
        <div className="row" style={{alignItems:"flex-end"}}>
          <div className="field"><label>Contractor</label>
            <select value={form.worker_id} onChange={e=>setForm({...form,worker_id:e.target.value})}>
              <option value="">Select…</option>
              {workerOpts.map(([id,nm])=><option key={id} value={id}>{nm}</option>)}
            </select></div>
          <div className="field"><label>Type</label>
            <select value={form.kind} onChange={e=>setForm({...form,kind:e.target.value})}>
              {DOC_KINDS.map(([v,l])=><option key={v} value={v}>{l}</option>)}
            </select></div>
          <div className="field"><label>Title (optional)</label>
            <input value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder="e.g. 2026 IC Agreement"/></div>
          <div className="field"><label>Signed</label>
            <input type="date" value={form.signed_on} onChange={e=>setForm({...form,signed_on:e.target.value})}/></div>
          <div className="field"><label>Expires</label>
            <input type="date" value={form.expires_on} onChange={e=>setForm({...form,expires_on:e.target.value})}/></div>
          <div className="field" style={{flex:"0 0 auto"}}>
            <button className="btn" disabled={busy} onClick={addDoc}>Add document</button></div>
        </div>
        <p className="muted" style={{fontSize:12}}>File upload to secure storage is a Phase-2 add-on
          (needs the Storage bucket from setup). For now this tracks the record + dates.</p>
        <Banner msg={msg} />
      </div>

      <div className="card">
        <h2>Tracked documents {consolidated?"· all companies":""}</h2>
        {loading?<Skeleton rows={4}/>:
         list.length===0?<div className="empty">No documents yet. Add one above.</div>:
        <div className="table-scroll"><table>
          <thead><tr><th>Contractor</th><th>Type</th><th>Title</th><th>Signed</th><th>Expires</th><th>Status</th></tr></thead>
          <tbody>
            {list.map(d=>{
              const n=daysUntil(d.expires_on);
              const overdue=n!=null&&n<0, soon=n!=null&&n>=0&&n<=30;
              return (
                <tr key={d.id} style={overdue?{background:"#fee2e2"}:soon?{background:"var(--warn-soft)"}:{}}>
                  <td className="card-title"><b>{nameById[d.worker_id]||"—"}</b></td>
                  <td data-label="Type">{DOC_KINDS.find(k=>k[0]===d.kind)?.[1]||d.kind}</td>
                  <td data-label="Title">{d.title||"—"}</td>
                  <td data-label="Signed">{d.signed_on||"—"}</td>
                  <td data-label="Expires">{d.expires_on||<span className="muted">no expiry</span>}</td>
                  <td data-label="Status">{n==null?<span className="muted">—</span>:
                       overdue?<span className="pill bad">overdue {Math.abs(n)}d</span>:
                       soon?<span className="pill warn">in {n}d</span>:
                       <span className="pill active">ok</span>}</td>
                </tr>
              );
            })}
          </tbody>
        </table></div>}
      </div>
    </div>
  );
}

// Searchable multi-select contractor picker. options=[{id,name}]; value=Set of ids;
// onChange(newSet). "Select all" picks every option; default empty Set = none ("Select…").
function ContractorPicker({ options, value, onChange, placeholder }){
  const [open,setOpen]=useState(false);
  const [q,setQ]=useState("");
  const ref=React.useRef(null);
  useEffect(()=>{
    if(!open) return;
    const onDoc=e=>{ if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    const onKey=e=>{ if(e.key==="Escape") setOpen(false); };
    document.addEventListener("mousedown",onDoc); document.addEventListener("keydown",onKey);
    return ()=>{ document.removeEventListener("mousedown",onDoc); document.removeEventListener("keydown",onKey); };
  },[open]);
  const needle=q.trim().toLowerCase();
  const filtered=options.filter(o=>o.name.toLowerCase().includes(needle));
  const allOn=options.length>0 && value.size===options.length;
  const toggle=id=>{ const n=new Set(value); n.has(id)?n.delete(id):n.add(id); onChange(n); };
  const summary= value.size===0 ? (placeholder||"Select…") : allOn ? "All contractors" : value.size+" selected";
  return (
    <div className="cpick" ref={ref}>
      <button type="button" className="btn ghost sm cpick-btn" aria-haspopup="dialog" aria-expanded={open} onClick={()=>setOpen(o=>!o)}>
        <span>{summary}</span><span aria-hidden="true">▾</span>
      </button>
      {open &&
        <div className="cpick-menu" role="dialog" aria-label="Choose contractors">
          <input className="cpick-search" autoFocus placeholder="Search…" value={q} onChange={e=>setQ(e.target.value)} aria-label="Search contractors"/>
          <div className="cpick-row">
            <button type="button" className="btn ghost sm" disabled={!options.length} onClick={()=>onChange(new Set(options.map(o=>o.id)))}>Select all ({options.length})</button>
            <button type="button" className="btn ghost sm" disabled={!value.size} onClick={()=>onChange(new Set())}>Clear</button>
          </div>
          <div className="cpick-list">
            {filtered.length===0 ? <div className="muted" style={{padding:"8px",fontSize:12}}>No matches</div> :
             filtered.map(o=>(
               <label key={o.id} className="cpick-item">
                 <input type="checkbox" checked={value.has(o.id)} onChange={()=>toggle(o.id)}/>
                 <span>{o.name}</span>
               </label>))}
          </div>
        </div>}
    </div>
  );
}

function Reports({client,companyId,consolidated}){
  // Pull the full per-contractor breakdown so each period row can expand to
  // show who was paid what (no extra round-trip per period).
  const {data,loading}=useQuery(client,c=>{
    // Page the FULL payments set (HEAD count + concurrent ranges) — a single
    // query silently truncates at PostgREST's 1000-row cap, which would make the
    // grand-total cards under-report once payments exceed 1000 rows.
    const applyF=q=>{ if(!consolidated&&companyId)q=q.eq("company_id",companyId); return q; };
    const sel="company_id,worked_hours,rate_php,gross_php,health_allowance_php,pdd_lunch_php,"+
      "bonus_php,thirteenth_month_php,deduction_php,misc_items,net_php,payout_amount,payout_currency,"+
      "fx_rate,status,payout_method,worker_id,"+
      "pay_periods(period_start,period_end,pay_date,state),"+
      "companies(name),workers(first_name,middle_name,last_name)";
    return pageAll(
      ()=>applyF(c.from("payments").select("worker_id",{count:"exact",head:true})),
      (from,to)=>applyF(c.from("payments").select(sel)).order("pay_period_id",{ascending:true}).range(from,to));
  },[client,companyId,consolidated]);

  const [openKey,setOpenKey]=useState(null);   // which period row is expanded
  // Default the payout filter to the CURRENT month + year (empty Set = all).
  const _now=new Date();
  const [fYears,setFYears]=useState(()=>new Set([String(_now.getFullYear())]));
  const [fMonths,setFMonths]=useState(()=>new Set([String(_now.getMonth()+1).padStart(2,"0")]));
  const pays=data||[];
  // group by period, keeping each contractor's line for the expandable detail
  const byPeriod={};
  pays.forEach(p=>{
    const pp=p.pay_periods||{}; const key=`${p.companies?.name||"?"}|${pp.period_start}|${pp.period_end}`;
    const g=byPeriod[key]||(byPeriod[key]={key,company:p.companies?.name,start:pp.period_start,end:pp.period_end,
      pay_date:pp.pay_date,count:0,net:0,usdRef:0,unpaid:0,fx:p.fx_rate,rows:[]});
    g.count++; g.net+=Number(p.net_php||0);
    g.usdRef+=p.fx_rate?Number(p.net_php||0)/Number(p.fx_rate):0;
    if(p.status!=="sent" && p.status!=="reconciled") g.unpaid+=Number(p.net_php||0);
    // Real (user-entered) deductions live in misc_items[kind=deduction] and ARE
    // subtracted from net. deduction_php is the rate−gross performance shortfall
    // (informational, NOT subtracted) — shown separately so the two aren't
    // conflated. misc (earns+hours−deductions) is the net contribution of the
    // Misc popup; miscDeduct isolates just the deduction portion for display.
    const items=Array.isArray(p.misc_items)?p.misc_items:[];
    const miscDeduct=items.filter(x=>x.kind==="deduction").reduce((s,x)=>s+(Number(x.amount)||0),0);
    const miscEarn=items.filter(x=>x.kind!=="deduction").reduce((s,x)=>s+(Number(x.amount)||0),0);
    g.rows.push({
      name:fullName(p.workers)||"(unknown)",
      hours:p.worked_hours, rate:p.rate_php, gross:p.gross_php, ha:p.health_allowance_php,
      lunch:p.pdd_lunch_php, bonus:p.bonus_php, t13:p.thirteenth_month_php,
      perfShort:p.deduction_php, miscEarn, miscDeduct,
      net:p.net_php, method:p.payout_method, status:p.status});
  });
  const periods=Object.values(byPeriod).sort((a,b)=>(b.start||"").localeCompare(a.start||""));
  const grandNet=periods.reduce((s,p)=>s+p.net,0);
  const grandUnpaid=periods.reduce((s,p)=>s+p.unpaid,0);
  const grandUsd=periods.reduce((s,p)=>s+(p.usdRef||0),0);   // sum of per-period net/fx
  const nCols=(consolidated?7:6)+1;   // for the detail row colSpan

  // Year/Month filter for the payout-by-period table (multi-select; empty = All).
  const yearsAvail=[...new Set(periods.map(p=>(p.start||"").slice(0,4)).filter(Boolean))].sort().reverse();
  const MONTHS=[["01","Jan"],["02","Feb"],["03","Mar"],["04","Apr"],["05","May"],["06","Jun"],
                ["07","Jul"],["08","Aug"],["09","Sep"],["10","Oct"],["11","Nov"],["12","Dec"]];
  const shown=periods.filter(p=>{ const y=(p.start||"").slice(0,4), m=(p.start||"").slice(5,7);
    return (fYears.size===0||fYears.has(y))&&(fMonths.size===0||fMonths.has(m)); });
  const fNet=shown.reduce((s,p)=>s+p.net,0), fUsd=shown.reduce((s,p)=>s+(p.usdRef||0),0);
  const filterActive=fYears.size>0||fMonths.size>0;
  const toggleSet=(set,setter,v)=>{ const n=new Set(set); n.has(v)?n.delete(v):n.add(v); setter(n); };

  const paid=st=>st==="sent"||st==="reconciled";

  return (
    <div>
      <div className="card">
        <h2>Reports {consolidated?"· all companies (consolidated)":""}</h2>
        <p className="sub">Totals come from locked/saved pay statements.
          {consolidated?" Showing every company.":" Showing the selected company."}
          {" "}Click a period to see the per-contractor breakdown.</p>
        <div className="row dash-stats">
          <div className="field dash-stat"><label>Total net (all periods)</label>
            <div className="val dash-stat-num" style={{fontSize:20,fontWeight:700}}>{money(grandNet,"PHP")}</div></div>
          <div className="field dash-stat"><label>Total ≈ USD ref</label>
            <div className="val dash-stat-num" style={{fontSize:20,fontWeight:700}}>{money(grandUsd,"USD")}</div></div>
          <div className="field dash-stat"><label>Unpaid / not yet sent</label>
            <div className="val dash-stat-num" style={{fontSize:20,fontWeight:700,color:grandUnpaid>0?"var(--warn)":"var(--good)"}}>{money(grandUnpaid,"PHP")}</div></div>
          <div className="field dash-stat"><label>Pay periods recorded</label>
            <div className="val dash-stat-num" style={{fontSize:20,fontWeight:700}}>{periods.length}</div></div>
        </div>
      </div>

      <div className="card">
        <h2>Payout by pay period</h2>
        {periods.length>0 && (
          <div style={{margin:"6px 0 10px"}}>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,alignItems:"center"}}>
              <span className="muted" style={{fontSize:11,width:46}}>Year</span>
              <button className={"btn sm "+(fYears.size===0?"":"ghost")} onClick={()=>setFYears(new Set())}>All</button>
              {yearsAvail.map(y=>(
                <button key={y} className={"btn sm "+(fYears.has(y)?"":"ghost")} onClick={()=>toggleSet(fYears,setFYears,y)}>{y}</button>
              ))}
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,alignItems:"center",marginTop:6}}>
              <span className="muted" style={{fontSize:11,width:46}}>Month</span>
              <button className={"btn sm "+(fMonths.size===0?"":"ghost")} onClick={()=>setFMonths(new Set())}>All</button>
              {MONTHS.map(([n,lbl])=>(
                <button key={n} className={"btn sm "+(fMonths.has(n)?"":"ghost")} onClick={()=>toggleSet(fMonths,setFMonths,n)}>{lbl}</button>
              ))}
            </div>
            {filterActive && <p className="sub" style={{marginTop:6}}>
              Showing <b>{shown.length}</b> of {periods.length} periods · net <b>{money(fNet,"PHP")}</b> · ≈ {money(fUsd,"USD")}
              {" "}<button className="btn link sm" onClick={()=>{setFYears(new Set());setFMonths(new Set());}}>clear</button></p>}
          </div>
        )}
        {loading?<Skeleton rows={4}/>:
         periods.length===0?<div className="empty">No saved pay statements yet. Run &amp; lock a payroll first.</div>:
         shown.length===0?<div className="empty">No periods match this Year/Month filter.</div>:
        <div className="table-scroll"><table>
          <thead><tr>
            <th style={{width:24}}></th>
            {consolidated&&<th>Company</th>}
            <th>Period</th><th>Pay date</th><th>Contractors</th><th>Net ₱</th><th title="USD reference only — contractors are paid in PHP. Computed as Net ₱ ÷ FX. FX is the rate Wise locked at transfer time (USD→PHP) where available, otherwise a market approximation.">≈ USD ref</th><th>Unpaid ₱</th>
          </tr></thead>
          <tbody>
            {shown.map((p,i)=>{
              const open=openKey===p.key;
              return (
              <React.Fragment key={p.key}>
              <tr className="clickable" onClick={()=>setOpenKey(open?null:p.key)}
                  style={{cursor:"pointer", background:open?"#f1f5f9":undefined}}>
                <td data-label="Details" style={{color:"var(--muted)"}}>{open?"▾":"▸"}</td>
                {consolidated&&<td data-label="Company">{p.company||"—"}</td>}
                <td className="card-title">{p.start} → {p.end}</td>
                <td data-label="Pay date">{p.pay_date||"—"}</td>
                <td data-label="Contractors">{p.count}</td>
                <td data-label="Net ₱"><b>{money(p.net,"PHP")}</b></td>
                <td className="muted" data-label="≈ USD ref">{p.fx?money(p.usdRef,"USD"):"—"}</td>
                <td data-label="Unpaid ₱" style={p.unpaid>0?{color:"var(--warn)",fontWeight:600}:{}}>{money(p.unpaid,"PHP")}</td>
              </tr>
              {open && (
                <tr>
                  <td colSpan={nCols} style={{background:"#f8fafc",padding:"8px 10px"}}>
                    <div style={{maxHeight:320,overflow:"auto"}}>
                      <table className="keep-table">
                        <thead><tr>
                          <th>Contractor</th><th>Hours</th><th>Rate ₱</th><th>Gross ₱</th>
                          <th>Health ₱</th><th>13th ₱</th><th>Lunch ₱</th><th>Bonus ₱</th>
                          <th>Misc earn ₱</th>
                          <th><span className="tip-wrap" tabIndex={0} style={{cursor:"help"}}>Deductions ₱
                            <span className="tip-body">User-entered deductions (Misc popup) — actually subtracted from Net.</span></span></th>
                          <th><span className="tip-wrap" tabIndex={0} style={{cursor:"help"}}>Perf. short ₱
                            <span className="tip-body">Performance shortfall = rate − gross when hours were under expectation. Informational only — NOT subtracted from Net.</span></span></th>
                          <th>Net ₱</th><th>Method</th><th>Status</th>
                        </tr></thead>
                        <tbody>
                          {[...p.rows].sort((a,b)=>a.name.localeCompare(b.name)).map((r,j)=>(
                            <tr key={j}>
                              <td><b>{r.name}</b></td>
                              <td>{r.hours!=null?Number(r.hours).toFixed(2):"—"}</td>
                              <td>{money(r.rate,"PHP")}</td>
                              <td>{money(r.gross,"PHP")}</td>
                              <td>{money(r.ha,"PHP")}</td>
                              <td>{money(r.t13,"PHP")}</td>
                              <td>{money(r.lunch,"PHP")}</td>
                              <td>{money(r.bonus,"PHP")}</td>
                              <td>{r.miscEarn?money(r.miscEarn,"PHP"):"—"}</td>
                              <td style={r.miscDeduct?{color:"#b91c1c"}:{}}>{r.miscDeduct?("-"+money(r.miscDeduct,"PHP")):"—"}</td>
                              <td className="muted">{r.perfShort?money(r.perfShort,"PHP"):"—"}</td>
                              <td><b>{money(r.net,"PHP")}</b></td>
                              <td><span title={codeHint("method",r.method)}>{methodLabel(r.method)||"—"}</span></td>
                              <td><span className="pill" style={paid(r.status)
                                    ?{background:"#dcfce7",color:"#065f46"}
                                    :{background:"#f3f4f6",color:"var(--muted)"}}>
                                  {paid(r.status)?"paid":(r.status||"draft")}</span></td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </td>
                </tr>
              )}
              </React.Fragment>
            );})}
          </tbody>
        </table></div>}
      </div>

      <PerContractorSummary client={client} companyId={companyId} consolidated={consolidated}/>

      <ContractorHistory client={client} companyId={companyId} consolidated={consolidated}/>

      <UtilizationReport client={client} companyId={companyId} consolidated={consolidated}/>
    </div>
  );
}

// Per-contractor cross-period summary with a date range + CSV/print export.
// Answers "how much did we pay X this year" (visa renewals, mortgage letters,
// year-end statements) without copying period rows out by hand. Aggregates
// locked/saved pay statements by contractor over the chosen window.
function PerContractorSummary({client,companyId,consolidated}){
  // Default window: current calendar year to date.
  const yr=new Date().getFullYear();
  const [from,setFrom]=useState(`${yr}-01-01`);
  const [to,setTo]=useState("");
  const [sel,setSel]=useState(()=>new Set());  // selected worker_ids (empty = none chosen)
  const [openKey,setOpenKey]=useState(null);   // which contractor row is expanded to its per-period statements
  const {data,loading}=useQuery(client,c=>{
    // Page the full payments set — same 1000-row-cap correctness fix as Reports
    // (this drives year-to-date statements, so truncation would under-report).
    const applyF=q=>{ if(!consolidated&&companyId)q=q.eq("company_id",companyId); return q; };
    const sel="company_id,worked_hours,gross_php,health_allowance_php,pdd_lunch_php,bonus_php,"+
      "thirteenth_month_php,deduction_php,net_php,misc_items,status,worker_id,"+
      "pay_periods(period_start,period_end,pay_date),companies(name),"+
      "workers(first_name,middle_name,last_name)";
    return pageAll(
      ()=>applyF(c.from("payments").select("worker_id",{count:"exact",head:true})),
      (from,to)=>applyF(c.from("payments").select(sel)).order("pay_period_id",{ascending:true}).range(from,to));
  },[client,companyId,consolidated]);

  const pays=data||[];
  // Filter by period_start within [from,to] (inclusive). Client-side because
  // the date lives on the joined pay_periods row.
  const inWindow=pays.filter(p=>{
    const s=p.pay_periods?.period_start; if(!s) return false;
    if(from && s<from) return false;
    if(to && s>to) return false;
    return true;
  });
  // misc sum helper (earns+hours add, deduction subtracts) — mirrors Payroll.
  const miscSum=items=>Array.isArray(items)?items.reduce((s,it)=>{
    const a=Number(it?.amount)||0; return s+(it?.kind==="deduction"?-a:a);
  },0):0;

  // Contractor options = everyone in the window; the table shows only the SELECTED ones.
  const optMap={}; inWindow.forEach(p=>{ if(p.worker_id && !optMap[p.worker_id]) optMap[p.worker_id]=fullName(p.workers)||"(unknown)"; });
  const pickOptions=Object.entries(optMap).map(([id,name])=>({id,name})).sort((a,b)=>a.name.localeCompare(b.name));

  const byWorker={};
  inWindow.forEach(p=>{
