<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HR &amp; Payroll — PH Contractors</title>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
  window.__createClient = createClient;
</script>
<style>
  :root{
    --bg:#f6f7f9; --card:#ffffff; --border:#e2e5e9; --text:#1a1d21;
    --muted:#6b7280; --accent:#2f5496; --accent-soft:#eaf0fb; --good:#0a7d3c;
    --warn:#b45309; --warn-soft:#fef3c7; --bad:#b91c1c; --radius:10px;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
       background:var(--bg);color:var(--text);font-size:14px}
  .topbar{display:flex;align-items:center;gap:16px;padding:12px 20px;background:var(--card);
          border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
  .brand{font-weight:700;font-size:16px;margin-right:8px}
  .brand small{color:var(--muted);font-weight:400;font-size:12px;display:block}
  select,input,button,textarea{font-family:inherit;font-size:14px}
  select,input,textarea{padding:7px 10px;border:1px solid var(--border);border-radius:8px;background:#fff}
  .tabs{display:flex;gap:4px;padding:0 20px;background:var(--card);border-bottom:1px solid var(--border)}
  .tab{padding:11px 16px;border:none;background:none;cursor:pointer;color:var(--muted);
       border-bottom:2px solid transparent;font-weight:500}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .wrap{max-width:1180px;margin:22px auto;padding:0 20px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:16px}
  h2{margin:0 0 4px;font-size:18px}
  .sub{color:var(--muted);margin:0 0 16px;font-size:13px}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:top}
  th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.03em}
  tr.clickable:hover{background:var(--accent-soft);cursor:pointer}
  .btn{background:var(--accent);color:#fff;border:none;padding:8px 14px;border-radius:8px;cursor:pointer;font-weight:500}
  .btn.ghost{background:#fff;color:var(--accent);border:1px solid var(--accent)}
  .btn.sm{padding:5px 10px;font-size:12px}
  .pill{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600}
  .pill.ft{background:var(--accent-soft);color:var(--accent)}
  .pill.pt{background:#fce7f3;color:#9d174d}
  .pill.active{background:#dcfce7;color:var(--good)}
  .pill.inactive{background:#f3f4f6;color:var(--muted)}
  .pill.warn{background:var(--warn-soft);color:var(--warn)}
  .pill.bad{background:#fee2e2;color:var(--bad)}
  .pill.info{background:var(--accent-soft);color:var(--accent)}
  /* horizontal scroll wrapper for wide tables */
  .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .table-scroll table{min-width:560px}
  /* primary action bar within a card */
  .actionbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:8px;
    padding-top:12px;border-top:1px solid var(--border)}
  .card.primary{border-color:var(--accent);box-shadow:0 1px 4px rgba(47,84,150,.12)}
  h3{margin:0 0 4px;font-size:15px}
  /* tab groups */
  .tabgroup{display:flex;align-items:center}
  .tabgroup-label{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);
    padding:0 8px;align-self:center;white-space:nowrap}
  .tab-sep{width:1px;align-self:stretch;background:var(--border);margin:6px 4px}
  .row{display:flex;gap:18px;flex-wrap:wrap}
  .field{margin-bottom:12px;min-width:200px;flex:1}
  .field label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin-bottom:4px}
  .field .val{font-size:14px}
  .empty{color:var(--muted);text-align:center;padding:40px}
  /* messages: prominent by default, with success/error variants */
  .banner{background:var(--warn-soft);border:1px solid #fcd34d;border-left:5px solid #f59e0b;
    color:#92400e;padding:14px 18px;border-radius:8px;margin-bottom:16px;font-size:15px;font-weight:600;
    line-height:1.4;box-shadow:0 2px 8px rgba(0,0,0,.10);display:flex;align-items:center;gap:10px;
    animation:bannerPop .22s ease-out}
  .banner::before{content:"!";flex:0 0 22px;width:22px;height:22px;border-radius:50%;
    background:#f59e0b;color:#fff;font-weight:800;font-size:14px;display:inline-flex;
    align-items:center;justify-content:center}
  .banner.success{background:#dcfce7;border-color:#86efac;border-left-color:#16a34a;color:#065f46}
  .banner.success::before{content:"\2713";background:#16a34a}
  .banner.error{background:#fee2e2;border-color:#fecaca;border-left-color:#dc2626;color:#991b1b}
  .banner.error::before{content:"\2715";background:#dc2626}
  /* Info: neutral/instructional (e.g. 'use the other delete path instead').
     Important: NOT green — avoids being mistaken for a success message. */
  .banner.info{background:#dbeafe;border-color:#bfdbfe;border-left-color:#2563eb;color:#1e3a8a}
  .banner.info::before{content:"\2139";background:#2563eb}
  @keyframes bannerPop{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
  .connect{max-width:440px;margin:80px auto;text-align:center}
  .connect input{width:100%;margin-bottom:10px}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:flex-start;justify-content:center;padding:40px;z-index:20;overflow:auto}
  .modal{background:#fff;border-radius:12px;padding:24px;max-width:680px;width:100%}
  .x{float:right;border:none;background:none;font-size:20px;cursor:pointer;color:var(--muted)}
  .muted{color:var(--muted)}
  .stub{border:2px dashed var(--border);border-radius:var(--radius);padding:36px;text-align:center;color:var(--muted)}
  @media (max-width: 820px) {
    .wrap{margin:14px auto;padding:0 12px}
    .card{padding:14px}
    .tabs{overflow-x:auto;white-space:nowrap}
    .grid-2{grid-template-columns:1fr !important}
    .topbar{flex-wrap:wrap;gap:8px}
  }
  /* two-column responsive grid used by Time Import options */
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  /* Custom hover tooltip — native title= is unreliable on Chrome/macOS for
     multi-line text; this fires instantly and respects line breaks. */
  .tip-wrap{position:relative;display:inline-block}
  .tip-wrap:hover .tip-body,.tip-wrap:focus-within .tip-body{visibility:visible;opacity:1}
  .tip-body{position:absolute;left:50%;bottom:calc(100% + 6px);transform:translateX(-50%);
    background:#1f2937;color:#fff;padding:6px 8px;border-radius:4px;font-size:12px;line-height:1.4;
    white-space:pre-line;min-width:max-content;max-width:300px;z-index:1000;pointer-events:none;
    visibility:hidden;opacity:0;transition:opacity .1s;text-align:left;font-weight:400}
  .tip-body::after{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);
    border:4px solid transparent;border-top-color:#1f2937}
  @media print {
    body{background:#fff}
    .topbar,.tabs,.no-print{display:none !important}
    .wrap{margin:0;max-width:none}
    /* hide every card except the pay list when printing */
    .card{display:none !important}
    #paylist-print{display:block !important;border:none;box-shadow:none;margin:0}
    #paylist-print *{visibility:visible}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-type="module">
const { useState, useEffect, useCallback } = React;

// Display label for a payout method: BPI uppercase, others Capitalized.
function methodLabel(m){
  if(!m) return "";
  return m==="bpi" ? "BPI" : m.charAt(0).toUpperCase()+m.slice(1);
}

// Prominent status banner. Auto-detects tone from the message text:
// anything that reads like a failure -> red error styling, else green success.
// Pass tone="error"|"success"|"warn" to force it. Returns null when msg is empty.
function bannerTone(msg){
  const t=String(msg||"").toLowerCase();
  if(/error|couldn'?t|can'?t|failed|fail\b|no rate|invalid|enter |pick |unable/.test(t)) return "error";
  return "success";
}
function Banner({msg, tone, style, children}){
  if(!msg && !children) return null;
  const cls = tone || (msg ? bannerTone(msg) : "");
  return <div className={"banner"+(cls?(" "+cls):"")} style={style}>{children||msg}</div>;
}

// Assemble a contractor's display name as first [middle] last. Works whether or
// not the middle_name column/value is present (most contractors have none).
function fullName(w){
  if(!w) return "";
  const parts=[w.first_name, w.middle_name, w.last_name].filter(x=>x && String(x).trim());
  return parts.join(" ").trim();
}

// Audit log: record who/what/when. Best-effort (never blocks the action).
async function logEvent(client, {company_id, action, entity, detail}){
  try{
    await client.from("audit_log").insert({
      company_id: company_id||null,
      actor: localStorage.getItem("sb_actor") || "admin",
      action, entity: entity||null, detail: detail||null,
    });
  }catch(e){ /* auditing must never break the user's action */ }
}

// Reusable sort + text-filter for a list of row objects.
// `cols` maps a sort key -> accessor fn. Returns helpers for a clickable header
// and the processed (filtered+sorted) array.
function useSortFilter(rows, accessors, searchFields){
  const [sortKey,setSortKey]=useState(null);
  const [dir,setDir]=useState(1);          // 1 asc, -1 desc
  const [q,setQ]=useState("");
  function toggle(key){
    if(sortKey===key) setDir(d=>-d); else { setSortKey(key); setDir(1); }
  }
  let out=rows||[];
  if(q && searchFields){
    const needle=q.toLowerCase();
    out=out.filter(r=>searchFields.some(f=>String(r[f]??"").toLowerCase().includes(needle)));
  }
  if(sortKey && accessors[sortKey]){
    const acc=accessors[sortKey];
    out=[...out].sort((a,b)=>{
      const x=acc(a), y=acc(b);
      if(x==null&&y==null)return 0; if(x==null)return 1; if(y==null)return -1;
      if(typeof x==="number"&&typeof y==="number") return (x-y)*dir;
      return String(x).localeCompare(String(y))*dir;
    });
  }
  // header cell renderer: <Th k="name">Contractor</Th>
  const Th=({k,children,style})=>(
    <th onClick={k?()=>toggle(k):undefined}
        style={{cursor:k?"pointer":"default",userSelect:"none",...style}}>
      {children}{k&&sortKey===k?(dir===1?" ▲":" ▼"):k?" ⇅":""}</th>
  );
  return {rows:out, Th, q, setQ};
}
function FilterBox({q,setQ,placeholder}){
  return <input value={q} onChange={e=>setQ(e.target.value)}
    placeholder={placeholder||"Filter…"}
    style={{maxWidth:240,marginBottom:10}} />;
}

// ---- Supabase connection (anon key only; stored in this browser) ------------
const LS_URL = "sb_url", LS_KEY = "sb_anon";
function useSupabase() {
  const [client, setClient] = useState(null);
  const [creds, setCreds] = useState({
    url: localStorage.getItem(LS_URL) || "",
    key: localStorage.getItem(LS_KEY) || "",
  });
  useEffect(() => {
    if (creds.url && creds.key && window.__createClient) {
      setClient(window.__createClient(creds.url, creds.key));
    }
  }, [creds]);
  const connect = (url, key) => {
    localStorage.setItem(LS_URL, url); localStorage.setItem(LS_KEY, key);
    setCreds({ url, key });
  };
  const disconnect = () => {
    localStorage.removeItem(LS_URL); localStorage.removeItem(LS_KEY);
    setCreds({ url: "", key: "" }); setClient(null);
  };
  return { client, creds, connect, disconnect };
}

function ConnectScreen({ onConnect }) {
  const [url, setUrl] = useState(""); const [key, setKey] = useState("");
  return (
    <div className="connect">
      <div className="card">
        <h2>Connect to Supabase</h2>
        <p className="sub">Paste your Project URL and <b>anon public</b> key
          (Project Settings → API). Stored only in this browser.</p>
        <input placeholder="https://xxxx.supabase.co" value={url} onChange={e=>setUrl(e.target.value)} />
        <input placeholder="anon public key" value={key} onChange={e=>setKey(e.target.value)} />
        <button className="btn" style={{width:"100%"}}
          onClick={()=>url&&key&&onConnect(url.trim(),key.trim())}>Connect</button>
      </div>
    </div>
  );
}

// ---- small data hook --------------------------------------------------------
function useQuery(client, runner, deps) {
  const [data, setData] = useState(null);
  const [error, setError] = useState(null);
  const [loading, setLoading] = useState(true);
  const reload = useCallback(() => {
    if (!client) return;
    setLoading(true);
    runner(client).then(({ data, error }) => {
      setData(data); setError(error); setLoading(false);
    });
  }, deps); // eslint-disable-line
  useEffect(() => { reload(); }, [reload]);
  return { data, error, loading, reload };
}

// ============================ COMPANY SWITCHER ===============================
function CompanySwitcher({ client, companyId, setCompanyId, consolidated, setConsolidated }) {
  const { data } = useQuery(client,
    c => c.from("companies").select("id,name,status").order("name"), [client]);
  const companies = data || [];
  return (
    <div style={{display:"flex",alignItems:"center",gap:8,marginLeft:"auto"}}>
      <span className="muted" style={{fontSize:12}}>Company</span>
      <select value={consolidated ? "__all__" : (companyId||"")}
        onChange={e=>{
          if(e.target.value==="__all__"){setConsolidated(true);}
          else{setConsolidated(false);setCompanyId(e.target.value);}
        }}>
        <option value="" disabled>Select…</option>
        {companies.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
        <option value="__all__">— All companies (consolidated) —</option>
      </select>
    </div>
  );
}

// ============================ CONTRACTORS ====================================
function Contractors({ client, companyId, consolidated, onBillingChange, pendingWorkerId, consumePendingWorker }) {
  const { data, loading, reload } = useQuery(client, c => {
    // workers joined to their company link(s) + current rate
    let q = c.from("worker_companies")
      .select("contract,role,hubstaff_name,hubstaff_user_id,status,company_id,companies(name),"+
              "workers(id,first_name,middle_name,last_name,status,email,mobile,ph_address,hire_date,date_of_birth,"+
              "payout_method,gcash,paymaya,paypal,wise_recipient_id,wise_recipient_uuid,wise_recipients,health_allowance_eligible,thirteenth_month_eligible)");
    if (!consolidated && companyId) q = q.eq("company_id", companyId);
    return q;
  }, [client, companyId, consolidated]);

  const [selected, setSelected] = useState(null);
  const [showInactive, setShowInactive] = useState(false);
  const [busyId, setBusyId] = useState(null);
  const allRows = (data || []).filter(r => r.workers);
  // Cross-tab profile open: another tab called openContractor(workerId) — find
  // and select the worker's row so the profile modal opens. Show inactive in
  // case the target is inactive (otherwise the row would be hidden).
  useEffect(()=>{
    if(!pendingWorkerId) return;
    const hit=allRows.find(r=>String(r.workers?.id)===String(pendingWorkerId));
    if(hit){
      // Inline the active check — `isActive` is declared below, can't be used here.
      const active=(hit.workers?.status==="active")&&(hit.status==="active");
      if(!active) setShowInactive(true);
      // ProfileModal expects r.w to be the worker object — the list rows add
      // it via setSelected({...r,w}). Replicate that shape here, otherwise the
      // modal reads w.first_name on undefined and crashes the tree.
      setSelected({...hit, w: hit.workers});
      consumePendingWorker && consumePendingWorker();
    }
    // If !hit and allRows is empty, the query may still be loading — leave
    // pendingWorkerId set; the effect re-runs when allRows arrives. If the
    // worker truly isn't in this company's list (filtered out by company_id),
    // it'll never resolve — user can switch company manually.
    /* eslint-disable-next-line */
  },[pendingWorkerId, allRows.length]);
  const isActive = r => (r.workers.status==="active") && (r.status==="active");
  const visible = showInactive ? allRows : allRows.filter(isActive);
  const inactiveCount = allRows.length - allRows.filter(isActive).length;
  // flatten searchable fields for sort/filter
  const flat = visible.map(r=>({...r,
    _name:fullName(r.workers),
    _company:r.companies?.name||"", _role:r.role||"",
    _method:r.workers.payout_method||"", _status:isActive(r)?"active":"inactive"}));
  const {rows, Th, q, setQ}=useSortFilter(flat,{
    name:r=>r._name, company:r=>r._company, role:r=>r._role,
    contract:r=>r.contract, method:r=>r._method, status:r=>r._status,
  },["_name","_company","_role"]);

  // toggle a worker active/inactive (updates worker + this company link)
  async function setActive(r, makeActive) {
    setBusyId(r.workers.id);
    const ws = makeActive ? "active" : "ended";
    await client.from("workers").update({status: ws}).eq("id", r.workers.id);
    if (r.company_id)
      await client.from("worker_companies").update(
        makeActive ? {status:"active", ended_on:null} : {status:"ended", ended_on:new Date().toISOString().slice(0,10)}
      ).eq("worker_id", r.workers.id).eq("company_id", r.company_id);
    // Status flips affect payroll scope — record so the next Calculate / Lock
    // / Reconcile / pay action prompts the user to acknowledge before acting on
    // a roster that just changed.
    if(typeof onBillingChange === "function"){
      onBillingChange({
        workerId: r.workers.id,
        name: fullName(r.workers),
        field: `status → ${makeActive?"active":"inactive"}`,
      });
    }
    setBusyId(null); reload();
  }

  // create a new contractor in THIS company, then open their profile to fill in
  // the rest (rate, payout method, etc.). Reuses the proven create + edit flow.
  const [adding,setAdding]=useState(false);
  const [addErr,setAddErr]=useState("");
  async function addContractor(){
    if(consolidated||!companyId){setAddErr("Pick a single company first (top-left switcher) to add a contractor.");return;}
    setAdding(true);setAddErr("");
    try{
      const base={first_name:"New", last_name:"Contractor", status:"active",
        health_allowance_eligible:true, thirteenth_month_eligible:true};
      let {data:w,error:e1}=await client.from("workers").insert(base).select().single();
      // fallback if DB still has payout_method NOT NULL (pre-migration)
      if(e1 && /payout_method/i.test(e1.message)){
        ({data:w,error:e1}=await client.from("workers").insert({...base,payout_method:"wise"}).select().single());
      }
      if(e1)throw e1;
      const {error:e2}=await client.from("worker_companies")
        .insert({worker_id:w.id, company_id:companyId, contract:"FT", status:"active"});
      if(e2)throw e2;
      logEvent(client,{company_id:companyId,action:"add_contractor",
        entity:"New Contractor",detail:{from:"contractors tab"}});
      // company name for the modal header
      const cname=allRows.find(x=>x.company_id===companyId)?.companies?.name||"";
      reload();
      // open the profile modal on the new contractor so they can fill in details
      setSelected({ w, workers:w, company_id:companyId, companies:{name:cname},
        contract:"FT", role:null, hubstaff_name:null, status:"active" });
    }catch(ex){ setAddErr("Couldn't add: "+(ex.message||ex)+
      " — if it mentions payout_method, run the FINISH_SETUP migration to make it optional."); }
    finally{ setAdding(false); }
  }

  // Only show the Loading placeholder on the FIRST load (when data is still
  // null). On any subsequent reload (e.g. after a save fires notifySaved →
  // reload), `loading` flips true again briefly but `data` is already
  // populated — show the existing table so the modal stays mounted and keeps
  // its local form state. Previously this returned early on every reload,
  // unmounting the modal and resetting all inputs.
  if (loading && !data) return <div className="empty">Loading…</div>;
  return (
    <div className="card">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
        <div>
          <h2>Contractors</h2>
          <p className="sub">{consolidated ? "All companies" : "Current company"} ·
            {" "}{rows.length} shown{inactiveCount>0?` · ${inactiveCount} inactive`:""}. Click a row (or Edit) for the full profile.</p>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <label style={{fontSize:13,display:"flex",alignItems:"center",gap:6}}>
            <input type="checkbox" checked={showInactive} onChange={e=>setShowInactive(e.target.checked)}/>
            Show inactive
          </label>
          <button className="btn" disabled={adding||consolidated} onClick={addContractor}
            title={consolidated?"Pick a single company first":"Add a new contractor to this company"}>
            {adding?"Adding…":"+ Add contractor"}</button>
        </div>
      </div>
      <Banner msg={addErr} tone="error" style={{marginTop:10}} />
      <FilterBox q={q} setQ={setQ} placeholder="Filter by name, company, role…" />
      {rows.length===0 ? <div className="empty">No contractors match.</div> :
      <div className="table-scroll"><table>
        <thead><tr>
          <Th k="name">Name</Th><Th k="company">Company</Th><Th k="role">Role</Th><Th k="contract">Contract</Th>
          <Th k="method">Payout</Th><Th k="status">Status</Th><th></th>
        </tr></thead>
        <tbody>
          {rows.map((r,i)=>{
            const w=r.workers; const active=isActive(r);
            return (
              <tr key={i} style={active?{}:{opacity:.6}}>
                <td className="clickable" onClick={()=>setSelected({...r,w})}><b>{fullName(w)}</b></td>
                <td>{r.companies?.name||"—"}</td>
                <td>{r.role||<span className="muted">—</span>}</td>
                <td><span className={"pill "+(r.contract==="PT"?"pt":"ft")}>{r.contract}</span></td>
                <td>{w.payout_method?methodLabel(w.payout_method):
                  <span className="pill warn">not set</span>}</td>
                <td><span className={"pill "+(active?"active":"inactive")}>{active?"active":"inactive"}</span></td>
                <td style={{textAlign:"right",whiteSpace:"nowrap"}}>
                  <button className="btn ghost sm" onClick={()=>setSelected({...r,w})}>Edit</button>{" "}
                  {active
                    ? <button className="btn ghost sm" disabled={busyId===w.id}
                        onClick={()=>setActive(r,false)}>Deactivate</button>
                    : <button className="btn sm" disabled={busyId===w.id}
                        onClick={()=>setActive(r,true)}>Reactivate</button>}
                </td>
              </tr>
            );
          })}
        </tbody>
      </table></div>}
      {selected && <ProfileModal r={selected} client={client} onClose={()=>{setSelected(null);reload();}} onBillingChange={onBillingChange} onSaved={reload} />}
    </div>
  );
}

function Field({label,children}){return(
  <div className="field"><label>{label}</label><div className="val">{children||<span className="muted">—</span>}</div></div>
);}

function ProfileModal({ r, onClose, client, onBillingChange, onSaved }) {
  // Tiny helper so every billing save point reports a uniform record.
  const reportBilling = (field)=>{
    if(typeof onBillingChange==="function"){
      onBillingChange({ workerId: r?.w?.id, name: fullName(r?.w||{}), field });
    }
  };
  const w=r.w;
  // Re-pull the worker from the DB and sync ALL local state from it. This is
  // what makes saves and pull-from-Wise actions visible inside the modal
  // without closing/reopening. Defined after w so it can reference w.id.
  async function refreshLocal(){
    if(!w?.id || !client) return;
    const { data, error } = await client.from("workers")
      .select("first_name,middle_name,last_name,email,mobile,ph_address,hire_date,date_of_birth,"+
        "payout_method,wise_recipient_id,wise_recipient_uuid,wise_recipients,"+
        "health_allowance_eligible,thirteenth_month_eligible")
      .eq("id", w.id).single();
    if(error || !data) return;
    setF({
      first_name:data.first_name||"", middle_name:data.middle_name||"",
      last_name:data.last_name||"", email:data.email||"",
      mobile:data.mobile||"", ph_address:data.ph_address||"",
      hire_date:data.hire_date||"", date_of_birth:data.date_of_birth||"",
      health_allowance_eligible:!!data.health_allowance_eligible,
      thirteenth_month_eligible:!!data.thirteenth_month_eligible,
    });
    setPayMethod(data.payout_method||"");
    const list=Array.isArray(data.wise_recipients)?data.wise_recipients:[];
    setRecips(list);
    setDefId(data.wise_recipient_id||null);
    setDefUuid(data.wise_recipient_uuid||"");
    setUuidDraft(data.wise_recipient_uuid||"");
  }
  // notifySaved: tell parent to refetch the list AND refresh local modal state.
  // Without the local refresh, the modal still shows the snapshot from the
  // moment it opened — e.g. typing "s" in middle name then clicking Save shows
  // the saved DB value (which is "s"), so the field "appears" unchanged but
  // is actually correct. Same fix unblocks pull-from-Wise reflecting in the
  // modal without close+reopen.
  const notifySaved = ()=>{
    if(typeof onSaved==="function") onSaved();
    refreshLocal();
  };
  const [recips,setRecips]=useState(Array.isArray(w.wise_recipients)?w.wise_recipients:[]);
  const [defId,setDefId]=useState(w.wise_recipient_id||null);
  // The Wise UUID used by the manual Batch Payments CSV (recipientId column).
  // Not returned by the Wise API — must be pasted from the Wise web UI's
  // "Download all templates" export. Stored separately from defId/recips.
  const [defUuid,setDefUuid]=useState(w.wise_recipient_uuid||"");
  const [uuidDraft,setUuidDraft]=useState(w.wise_recipient_uuid||"");
  const [newId,setNewId]=useState(""); const [newLabel,setNewLabel]=useState("");
  const [savedMsg,setSavedMsg]=useState("");
  const [payMethod,setPayMethod]=useState(w.payout_method||"");
  // --- editable fields ---
  const [f,setF]=useState({
    first_name:w.first_name||"", middle_name:w.middle_name||"", last_name:w.last_name||"",
    email:w.email||"", mobile:w.mobile||"", ph_address:w.ph_address||"",
    hire_date:w.hire_date||"", date_of_birth:w.date_of_birth||"",
    health_allowance_eligible:!!w.health_allowance_eligible,
    thirteenth_month_eligible:!!w.thirteenth_month_eligible,
  });
  const [contract,setContract]=useState(r.contract||"FT");
  const [role,setRole]=useState(r.role||"");
  const [hubName,setHubName]=useState(r.hubstaff_name||"");
  const [rate,setRate]=useState("");
  const [rateEff,setRateEff]=useState(new Date().toISOString().slice(0,10));
  const set=(k,v)=>setF(x=>({...x,[k]:v}));

  // Full rate history for (worker, company), sorted newest-first. Drives the
  // inline 'Save rate' default (most-recent row) AND the new History table
  // below. effective_end column is computed visually from the next row's
  // effective_start so edits feel WYSIWYG.
  const [rateHistory,setRateHistory]=useState([]);
  const [rateEditingId,setRateEditingId]=useState(null);   // which row's effective_start is being edited
  const [rateEditDate,setRateEditDate]=useState("");
  const [rateConfirmDelete,setRateConfirmDelete]=useState(null);  // row id awaiting delete confirm
  async function loadRateHistory(){
    if(!r?.company_id){ setRateHistory([]); return; }
    const {data}=await client.from("rates")
      .select("id,amount_php,effective_start,effective_end,created_at")
      .eq("worker_id",w.id).eq("company_id",r.company_id)
      .order("effective_start",{ascending:false})
      .order("created_at",{ascending:false});
    const rows=data||[];
    setRateHistory(rows);
    if(rows[0]) setRate(String(rows[0].amount_php));
  }
  useEffect(()=>{ loadRateHistory();
    /* eslint-disable-next-line */ },[w.id, r?.company_id]);

  // Edit the effective_start on an existing rate row. After save, recompute
  // effective_end on the row immediately before it (in chronological order)
  // so the timeline stays contiguous.
  async function saveRateEffectiveEdit(row){
    const newStart=rateEditDate;
    if(!newStart || !/^\d{4}-\d{2}-\d{2}$/.test(newStart)){ setSavedMsg("Pick a valid date."); return; }
    if(newStart===row.effective_start){ setRateEditingId(null); return; }
    // 1. update this row's effective_start
    const {error:e1}=await client.from("rates")
      .update({effective_start:newStart}).eq("id",row.id);
    if(e1){ setSavedMsg("Rate edit failed: "+e1.message); return; }
    // 2. close the row's predecessor at newStart (or open it if newStart is later)
    // 3. recompute effective_end for the (now-)predecessor in the timeline.
    //    Easiest is to re-fetch all rows for this worker/company and walk
    //    chronologically, setting each row's effective_end to the NEXT row's
    //    effective_start (or NULL for the newest).
    const {data:fresh}=await client.from("rates")
      .select("id,effective_start,effective_end")
      .eq("worker_id",w.id).eq("company_id",r.company_id)
      .order("effective_start",{ascending:true});
    const sorted=fresh||[];
    for(let i=0;i<sorted.length;i++){
      const desiredEnd = i<sorted.length-1 ? sorted[i+1].effective_start : null;
      if(sorted[i].effective_end !== desiredEnd){
        await client.from("rates").update({effective_end:desiredEnd}).eq("id",sorted[i].id);
      }
    }
    logEvent(client,{company_id:r.company_id,action:"set_rate",
      entity:`${f.first_name} ${f.last_name}`,
      detail:{kind:"edit_effective_start",rate_id:row.id,
              from:row.effective_start, to:newStart, amount_php:row.amount_php}});
    setRateEditingId(null); setRateEditDate("");
    setSavedMsg(`Rate effective date updated to ${newStart}.`);
    loadRateHistory();
  }

  async function deleteRateRow(row){
    setRateConfirmDelete(null);
    const {error}=await client.from("rates").delete().eq("id",row.id);
    if(error){ setSavedMsg("Couldn't delete rate: "+error.message); return; }
    // After delete, recompute effective_end on remaining rows so the
    // chronological gap left by the deleted row gets closed.
    const {data:fresh}=await client.from("rates")
      .select("id,effective_start,effective_end")
      .eq("worker_id",w.id).eq("company_id",r.company_id)
      .order("effective_start",{ascending:true});
    const sorted=fresh||[];
    for(let i=0;i<sorted.length;i++){
      const desiredEnd = i<sorted.length-1 ? sorted[i+1].effective_start : null;
      if(sorted[i].effective_end !== desiredEnd){
        await client.from("rates").update({effective_end:desiredEnd}).eq("id",sorted[i].id);
      }
    }
    logEvent(client,{company_id:r.company_id,action:"set_rate",
      entity:`${f.first_name} ${f.last_name}`,
      detail:{kind:"delete_rate", rate_id:row.id, amount_php:row.amount_php, effective_start:row.effective_start}});
    setSavedMsg(`Deleted rate ₱${Number(row.amount_php).toLocaleString()} from ${row.effective_start}.`);
    loadRateHistory();
  }

  async function savePayMethod(val){
    setPayMethod(val);
    const {error}=await client.from("workers").update({payout_method: val||null}).eq("id",w.id);
    if(error){ setSavedMsg("Error: "+error.message); return; }
    setSavedMsg("Payout method saved.");
    reportBilling(`payout method → ${val||"(none)"}`);
    notifySaved();
  }
  async function saveDetails(){
    const {error:e1}=await client.from("workers").update({
      first_name:f.first_name, middle_name:f.middle_name||null, last_name:f.last_name, email:f.email||null, mobile:f.mobile||null,
      ph_address:f.ph_address||null, hire_date:f.hire_date||null, date_of_birth:f.date_of_birth||null,
      health_allowance_eligible:f.health_allowance_eligible,
      thirteenth_month_eligible:f.thirteenth_month_eligible}).eq("id",w.id);
    let e2=null;
    if(r.company_id){
      ({error:e2}=await client.from("worker_companies")
        .update({contract, role:role||null, hubstaff_name:hubName||null})
        .eq("worker_id",w.id).eq("company_id",r.company_id));
    }
    if(e1||e2){setSavedMsg("Error: "+((e1||e2).message));return;}
    logEvent(client,{company_id:r.company_id,action:"edit_contractor",
      entity:`${f.first_name} ${f.last_name}`,detail:{contract,role}});
    setSavedMsg("Details saved.");
    notifySaved();
  }
  async function saveRate(){
    const amt=parseFloat(rate);
    if(!(amt>0)){setSavedMsg("Enter a rate amount.");return;}
    if(!r.company_id){setSavedMsg("Pick a single company to set a rate.");return;}
    // Effective-dated rate save. Three steps, in order:
    //   1) If a rate already exists for this exact (worker, company, day),
    //      UPDATE it instead of inserting — same-day saves replace, not stack.
    //      This prevents the duplicate-day rows that caused the load query's
    //      tiebreaker to pick the wrong one (hello, Hazzan).
    //   2) Otherwise, close any open rate whose effective_start is STRICTLY
    //      BEFORE rateEff. Don't try to retroactively close a future-dated
    //      rate — that would violate the CHECK (effective_end >= effective_start).
    //   3) Insert the new rate.
    const {data:existing}=await client.from("rates")
      .select("id").eq("worker_id",w.id).eq("company_id",r.company_id)
      .eq("effective_start",rateEff).limit(1);
    if(existing && existing[0]){
      // Same-day update — replace the amount on the existing row, keep its id.
      const {error}=await client.from("rates")
        .update({amount_php:amt, period_basis:"semi_monthly", effective_end:null})
        .eq("id",existing[0].id);
      if(error){setSavedMsg("Rate error: "+error.message);return;}
      logEvent(client,{company_id:r.company_id,action:"set_rate",
        entity:`${f.first_name} ${f.last_name}`,
        detail:{amount_php:amt, effective_start:rateEff, kind:"same_day_update"}});
      setSavedMsg(`Rate updated to ₱${amt.toLocaleString()} for ${rateEff}.`);
      return;
    }
    // No same-day row exists. Close any STRICTLY-EARLIER open rate.
    await client.from("rates").update({effective_end:rateEff})
      .eq("worker_id",w.id).eq("company_id",r.company_id)
      .is("effective_end",null)
      .lt("effective_start",rateEff);
    const {error}=await client.from("rates").insert({
      worker_id:w.id, company_id:r.company_id, amount_php:amt,
      period_basis:"semi_monthly", effective_start:rateEff});
    if(error){setSavedMsg("Rate error: "+error.message);return;}
    logEvent(client,{company_id:r.company_id,action:"set_rate",
      entity:`${f.first_name} ${f.last_name}`,detail:{amount_php:amt,effective_start:rateEff}});
    setSavedMsg(`Rate set to ₱${amt.toLocaleString()} from ${rateEff}.`);
    reportBilling(`rate → ₱${amt.toLocaleString()} from ${rateEff}`);
    loadRateHistory();
    notifySaved();
  }

  async function persist(nextRecips,nextDef){
    const {error}=await client.from("workers")
      .update({wise_recipients:nextRecips, wise_recipient_id:nextDef}).eq("id",w.id);
    if(error){ setSavedMsg("Error: "+error.message); return; }
    setSavedMsg("Saved.");
    reportBilling(`Wise recipient (default #${nextDef||"—"})`);
    notifySaved();
  }
  function addRecip(){
    if(!newId)return;
    const id=Number(newId);
    if(recips.some(x=>x.id===id)){setSavedMsg("Already added.");return;}
    const next=[...recips,{id,label:newLabel||`Recipient ${id}`}];
    const nd=defId??id;
    setRecips(next);setDefId(nd);setNewId("");setNewLabel("");persist(next,nd);
  }
  function removeRecip(id){
    const next=recips.filter(x=>x.id!==id);
    const nd=defId===id?(next[0]?.id??null):defId;
    setRecips(next);setDefId(nd);persist(next,nd);
  }
  function makeDefault(id){ setDefId(id); persist(recips,id); }
  async function persistUuid(){
    const v=(uuidDraft||"").trim()||null;
    const {error}=await client.from("workers").update({wise_recipient_uuid:v}).eq("id",w.id);
    if(error){ setSavedMsg("Error: "+error.message); return; }
    setDefUuid(v||""); setSavedMsg(v?"Saved Wise recipient UUID.":"Cleared Wise recipient UUID.");
    logEvent(client,{company_id:r.company_id,action:"set_wise_recipient_uuid",
      entity:`${f.first_name} ${f.last_name}`,detail:{uuid:v}});
    reportBilling(v?`Wise recipient UUID set`:`Wise recipient UUID cleared`);
    notifySaved();
  }
  const inp={width:"100%"};
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <button className="x" onClick={onClose}>×</button>
        <h2>{fullName(f)}</h2>
        <p className="sub">{r.companies?.name} · {w.status}</p>
        <Banner msg={savedMsg} style={{marginTop:4}} />

        {/* --- Details (editable) --- */}
        <div className="row">
          <div className="field"><label>First name</label><input style={inp} value={f.first_name} onChange={e=>set("first_name",e.target.value)}/></div>
          <div className="field"><label>Middle name <span className="muted" style={{fontWeight:400}}>(optional)</span></label><input style={inp} value={f.middle_name} onChange={e=>set("middle_name",e.target.value)}/></div>
          <div className="field"><label>Last name</label><input style={inp} value={f.last_name} onChange={e=>set("last_name",e.target.value)}/></div>
        </div>
        <div className="row">
          <div className="field"><label>Contract</label>
            <select style={inp} value={contract} onChange={e=>setContract(e.target.value)}>
              <option value="FT">Full-time (80h/period)</option>
              <option value="PT">Part-time (40h/period)</option>
            </select></div>
          <div className="field"><label>Role</label><input style={inp} value={role} onChange={e=>setRole(e.target.value)} placeholder="e.g. Billing Associate"/></div>
          <Field label="Payout method">
            <select value={payMethod} onChange={e=>savePayMethod(e.target.value)}
              style={{border:payMethod?"1px solid var(--border)":"1px solid var(--warn)",
                background:payMethod?"#fff":"var(--warn-soft)"}}>
              <option value="">— not set —</option>
              {PAYOUT_CHANNELS.map(ch=><option key={ch} value={ch}>{methodLabel(ch)}</option>)}
            </select></Field>
        </div>
        <div className="row">
          <div className="field"><label>Email</label><input style={inp} type="email" value={f.email} onChange={e=>set("email",e.target.value)}/></div>
          <div className="field"><label>Mobile</label><input style={inp} type="tel" value={f.mobile} onChange={e=>set("mobile",e.target.value)}/></div>
        </div>
        <div className="row">
          <div className="field"><label>Hire date</label><input style={inp} type="date" value={f.hire_date||""} onChange={e=>set("hire_date",e.target.value)}/></div>
          <div className="field"><label>Date of birth</label><input style={inp} type="date" value={f.date_of_birth||""} onChange={e=>set("date_of_birth",e.target.value)}/></div>
        </div>
        <div className="field"><label>PH address</label><input style={inp} value={f.ph_address} onChange={e=>set("ph_address",e.target.value)}/></div>
        <div className="row">
          <div className="field"><label>Hubstaff name (import match)</label><input style={inp} value={hubName} onChange={e=>setHubName(e.target.value)}/></div>
          <label style={{fontSize:13,display:"flex",alignItems:"center",gap:6}}><input type="checkbox" checked={f.health_allowance_eligible} onChange={e=>set("health_allowance_eligible",e.target.checked)}/> Health allowance</label>
          <label style={{fontSize:13,display:"flex",alignItems:"center",gap:6}}><input type="checkbox" checked={f.thirteenth_month_eligible} onChange={e=>set("thirteenth_month_eligible",e.target.checked)}/> 13th-month</label>
        </div>
        <div style={{marginBottom:4}}><button className="btn" onClick={saveDetails}>Save details</button></div>

        {/* --- Rate (effective-dated) --- */}
        <div className="row" style={{alignItems:"flex-end",borderTop:"1px solid var(--border)",paddingTop:12,marginTop:8}}>
          <div className="field"><label>Rate (PHP per period)</label>
            <input style={inp} type="number" step="0.01" value={rate} onChange={e=>setRate(e.target.value)} placeholder="per half-month amount"/></div>
          <div className="field"><label>Effective from</label>
            <input style={inp} type="date" value={rateEff} onChange={e=>setRateEff(e.target.value)}/></div>
          <div className="field" style={{flex:"0 0 auto"}}><button className="btn" onClick={saveRate}>Save rate</button></div>
        </div>
        <p className="muted" style={{fontSize:12,marginTop:-4}}>Monthly = rate × 2. New rates are effective-dated (past periods keep their old rate).</p>

        {/* --- Rate history --- */}
        {r?.company_id && rateHistory.length>0 && (
          <div style={{marginTop:10}}>
            <label style={{fontSize:11,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".03em"}}>
              Rate history ({rateHistory.length})
            </label>
            <div className="table-scroll" style={{marginTop:4}}><table>
              <thead><tr>
                <th>Effective from</th><th>Effective to</th><th>Amount ₱</th><th style={{textAlign:"right"}}></th>
              </tr></thead>
              <tbody>
                {rateHistory.map((row,idx)=>{
                  const isEditing=rateEditingId===row.id;
                  const isConfirmDelete=rateConfirmDelete===row.id;
                  const endLabel=row.effective_end || "(current)";
                  return (
                    <tr key={row.id}>
                      <td>
                        {isEditing
                          ? <input type="date" value={rateEditDate}
                              onChange={e=>setRateEditDate(e.target.value)}
                              style={{fontSize:13,padding:"2px 4px"}}/>
                          : <span>{row.effective_start}</span>}
                      </td>
                      <td className={row.effective_end?undefined:"muted"} style={{fontSize:13}}>{endLabel}</td>
                      <td>{Number(row.amount_php).toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                      <td style={{textAlign:"right"}}>
                        {isEditing
                          ? <>
                              <button className="btn sm" onClick={()=>saveRateEffectiveEdit(row)}>Save</button>{" "}
                              <button className="btn ghost sm"
                                onClick={()=>{setRateEditingId(null);setRateEditDate("");}}>Cancel</button>
                            </>
                          : isConfirmDelete
                            ? <>
                                <span className="muted" style={{fontSize:11,marginRight:6}}>Delete this rate row?</span>
                                <button className="btn sm" style={{background:"var(--bad)"}}
                                  onClick={()=>deleteRateRow(row)}>Confirm</button>{" "}
                                <button className="btn ghost sm"
                                  onClick={()=>setRateConfirmDelete(null)}>Cancel</button>
                              </>
                            : <>
                                <button className="btn ghost sm"
                                  title="Edit the effective-from date for this rate row"
                                  onClick={()=>{setRateEditingId(row.id);setRateEditDate(row.effective_start);}}>
                                  Edit date
                                </button>{" "}
                                <button className="btn ghost sm" style={{borderColor:"var(--bad)",color:"var(--bad)"}}
                                  title="Remove this rate row from history. The previous rate's effective_end will extend to cover the gap."
                                  onClick={()=>setRateConfirmDelete(row.id)}>
                                  Delete
                                </button>
                              </>}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table></div>
            <p className="muted" style={{fontSize:11,marginTop:4}}>
              Editing or deleting a rate row recomputes neighbouring effective_end dates so the timeline stays contiguous.
              These changes are recorded in the audit log.
            </p>
          </div>
        )}

        {/* --- Wise recipients --- */}
        <div style={{borderTop:"1px solid var(--border)",paddingTop:12}}>
          <label style={{fontSize:11,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".03em"}}>
            Wise recipients (for payouts)</label>
          {recips.length===0
            ? <p className="muted" style={{fontSize:12,margin:"6px 0"}}>None yet. Add a recipient ID from your Wise account below.</p>
            : <table style={{marginTop:6}}><tbody>
                {recips.map(rec=>(
                  <tr key={rec.id}>
                    <td><b>{rec.label}</b> <span className="muted">#{rec.id}</span></td>
                    <td style={{width:130}}>{defId===rec.id
                      ? <span className="pill active">default (last used)</span>
                      : <button className="btn ghost sm" onClick={()=>makeDefault(rec.id)}>Make default</button>}</td>
                    <td style={{width:70,textAlign:"right"}}>
                      <button className="btn ghost sm" style={{borderColor:"var(--bad)",color:"var(--bad)"}}
                        onClick={()=>removeRecip(rec.id)}>Remove</button></td>
                  </tr>
                ))}
              </tbody></table>}
          <div style={{display:"flex",gap:6,alignItems:"flex-end",marginTop:8}}>
            <div><label style={{fontSize:10,color:"var(--muted)"}}>Wise recipient ID</label><br/>
              <input style={{width:130}} value={newId} onChange={e=>setNewId(e.target.value)} placeholder="numeric ID"/></div>
            <div><label style={{fontSize:10,color:"var(--muted)"}}>Label (optional)</label><br/>
              <input style={{width:150}} value={newLabel} onChange={e=>setNewLabel(e.target.value)} placeholder="e.g. BPI peso"/></div>
            <button className="btn sm" onClick={addRecip}>Add</button>
          </div>
          <div style={{display:"flex",gap:6,alignItems:"flex-end",marginTop:10,borderTop:"1px dashed var(--border)",paddingTop:10}}>
            <div style={{flex:1}}>
              <label style={{fontSize:10,color:"var(--muted)"}}>Wise recipient UUID (for manual Batch CSV)</label><br/>
              <input style={{width:"100%"}} value={uuidDraft} onChange={e=>setUuidDraft(e.target.value)}
                placeholder="e.g. 33e5a8b1-…  (paste from Wise → Batch payments → Download all templates)"/>
            </div>
            <button className="btn sm" disabled={(uuidDraft||"").trim()===(defUuid||"")} onClick={persistUuid}>
              {((uuidDraft||"").trim()&&!defUuid)?"Save":"Update"}
            </button>
          </div>
        </div>
        <p className="muted" style={{fontSize:12,marginTop:6}}>
          These are recipient IDs <b>in your Wise account</b> (identifiers only — never bank details).
          Payouts default to the one marked default; it updates to whichever was last used.
          {" "}The <b>UUID</b> is separate — the Wise API doesn't return it, so paste it once from the
          Wise <i>Batch payments → Download all templates</i> CSV; it's what the Manual Wise batch file uses.
        </p>

        {/* --- External sources: Wise + Hubstaff drift ---
            Pulls the linked Wise recipient and Hubstaff user on demand and
            shows side-by-side what each system has for name / email vs the
            DB. Mismatches get a ⚠️. For Hubstaff, an inline 'Push DB → Hubstaff'
            button (with required reason) updates the field. Wise side is
            read-only because Wise doesn't allow API edits of existing
            recipients. */}
        <ExternalSourcesPanel w={w} f={f} r={r} client={client} onBillingChange={onBillingChange} onSaved={notifySaved}/>

        <p className="muted" style={{fontSize:12,marginTop:10,borderTop:"1px solid var(--border)",paddingTop:12}}>
          Independent contractor record. No employee-style supervision data is stored,
          by design (PH misclassification safeguard).
        </p>
      </div>
    </div>
  );
}

// External sources panel — lives inside ProfileModal. Pulls Wise recipient
// (by w.wise_recipient_id) and Hubstaff user (by r.hubstaff_user_id),
// compares to DB values, surfaces mismatches with a per-field push button
// for Hubstaff. Read-only for Wise (API doesn't allow recipient edits).
function ExternalSourcesPanel({ w, f, r, client, onBillingChange, onSaved }){
  const reportBilling = (field)=>{
    if(typeof onBillingChange==="function"){
      onBillingChange({ workerId: w?.id, name: fullName(w||f||{}), field });
    }
  };
  const notifySaved = ()=>{ if(typeof onSaved==="function") onSaved(); };
  const [wise,setWise]=useState(null);     // { id, name, email, account, ... } or null
  const [hub,setHub]=useState(null);       // { id, name, email, status, time_zone } or null
  const [loadingWise,setLoadingWise]=useState(false);
  const [loadingHub,setLoadingHub]=useState(false);
  const [wiseErr,setWiseErr]=useState("");
  // Soft, non-error note for Wise — used when /v1/accounts/{id} returns 403
  // (which means the stored recipient is a Wisetag/Wise-balance recipient;
  // Wise's read API doesn't expose those, so there's no drift to check, but
  // payments still work via /v1/transfers).
  const [wiseNote,setWiseNote]=useState("");
  const [hubErr,setHubErr]=useState("");
  // State used by the Wise → DB pull flow (and previously by a now-removed
  // Hubstaff push flow). `pushing` doubles as a busy flag keyed by field;
  // `pushReason`/`pushArmed` are also used by the inline-confirm pattern
  // for pullFromWise. Kept the names to avoid a sweeping rename.
  const [pushing,setPushing]=useState(null);
  const [pushReason,setPushReason]=useState({});
  const [pushArmed,setPushArmed]=useState({});
  const [pushMsg,setPushMsg]=useState("");

  const wiseId = w.wise_recipient_id;
  const hubUserId = r?.hubstaff_user_id;

  // Supabase JS v2 wraps a non-2xx edge-function response as FunctionsHttpError
  // with the unhelpful message "Edge Function returned a non-2xx status code".
  // The real upstream error (e.g. Wise "404: account not found") is on
  // err.context as a Response. Read it so the panel surfaces the actual cause.
  async function fnErrorMessage(err){
    const fallback = String(err?.message||err||"Edge function error");
    try{
      const ctx = err?.context;
      if(ctx && typeof ctx.text==="function"){
        const body = await ctx.text();
        if(body){
          try{ const j=JSON.parse(body); if(j?.error) return String(j.error); }catch{}
          return body.length>300 ? body.slice(0,300)+"…" : body;
        }
      }
    }catch{/* fall through */}
    return fallback;
  }

  async function loadWise(){
    if(!wiseId) return;
    setLoadingWise(true); setWiseErr(""); setWiseNote("");
    try{
      const { data, error }=await client.functions.invoke("wise-payouts",{
        body:{ action:"get_recipient", recipient_id:wiseId } });
      if(error) throw new Error(await fnErrorMessage(error));
      if(data?.error) throw new Error(data.error);
      setWise(data?.recipient||null);
    }catch(ex){
      const msg=String(ex.message||ex);
      // 403 unauthorized from /v1/accounts/{id} means the stored recipient is
      // a Wisetag/Wise-balance recipient — Wise's read API only exposes bank
      // accounts. Drift check is N/A for these, but payments still work via
      // the transfer endpoint. Demote to a muted note instead of an error.
      if(/\b403\b/.test(msg) && /unauthorized/i.test(msg)){
        setWiseNote("Wisetag / Wise-balance recipient — Wise's read API doesn't expose this type, so drift check isn't available. Payments still work via the API draft.");
      } else {
        setWiseErr(msg);
      }
    }
    finally{ setLoadingWise(false); }
  }
  async function loadHub(){
    if(!hubUserId) return;
    setLoadingHub(true); setHubErr("");
    try{
      const { data, error }=await client.functions.invoke("hubstaff-sync",{
        body:{ action:"get_user", user_id:hubUserId } });
      if(error) throw new Error(await fnErrorMessage(error));
      if(data?.error) throw new Error(data.error);
      setHub(data?.user||null);
    }catch(ex){ setHubErr(String(ex.message||ex)); }
    finally{ setLoadingHub(false); }
  }

  // Lazy-load on first render — keeps the modal open fast, panel updates as
  // the API calls complete.
  useEffect(()=>{ if(wiseId) loadWise(); if(hubUserId) loadHub();
    /* eslint-disable-next-line */ },[wiseId,hubUserId]);

  function armPush(field){ setPushArmed(p=>({...p,[field]:true})); setPushReason(p=>({...p,[field]:""})); }
  function unarmPush(field){ setPushArmed(p=>{ const n={...p}; delete n[field]; return n; }); }
  function setReason(field,v){ setPushReason(p=>({...p,[field]:v})); }

  // NOTE: pushHub() (DB → Hubstaff name/email push) was removed 2026-05-28.
  // Hubstaff's public REST API doesn't expose user-profile writes — 11 candidate
  // endpoints probed, all returned 405 / 404 / 422-with-web-session-error. The
  // drift UI now points the user at Hubstaff's web UI to fix mismatches manually.
  // The pullFromWise() flow (Wise → DB, with optional cascade) below still
  // works because Wise IS exposed via REST. See WISE_SETUP.md.

  // Filipino-aware name parser. Handles:
  //   - Compound surname particles: "dela Cruz", "de la Cruz", "del Rosario",
  //     "de los Santos", "san Juan", "santo Tomas", etc. The particle and
  //     everything after it form the last name.
  //   - Suffix tokens: Jr, Jr., Sr, Sr., II, III, IV — attached to last name.
  //   - "Maria" / "Ma." / "Jose" used as first-name prefixes — kept with the
  //     given name (e.g. "Ma. Luisa Marcelo" → first="Ma. Luisa", last="Marcelo").
  //   - All-caps bank-style names ("HAZZAN DELA CRUZ") — title-cased so the
  //     DB doesn't read like a bank statement, while preserving particle
  //     casing (dela, de la, de los stay lower-case as is convention).
  //
  // Conservative fallback: if uncertain, parses as before (first, [middle…],
  // last) — same as the naïve version. The Wise pull always asks for a reason
  // and the user can manually fix any edge case the parser missed.
  function parseName(raw){
    let s = String(raw||"").trim();
    if(!s) return { first_name:"", middle_name:"", last_name:"" };

    // Detect ALL-CAPS bank-statement style. If the source is all upper-case
    // with no lowercase letters, title-case it (preserving particles).
    const hasLower = /[a-z]/.test(s);
    const PARTICLES_LC = new Set(["de","del","dela","la","los","las","san","santa","santo","y","da","do","das","dos"]);
    function titleCase(str){
      return str.split(/\s+/).map((tok,i)=>{
        const lc=tok.toLowerCase();
        // Particles in the middle of a name stay lowercase (e.g. "Hazzan dela Cruz")
        if(i>0 && PARTICLES_LC.has(lc)) return lc;
        // Honorific/abbreviation "Ma." stays as "Ma." with period
        if(/^ma\.?$/i.test(tok)) return /\./.test(tok) ? "Ma." : "Ma";
        // Regular token: Capitalize first letter, lowercase rest
        return tok.charAt(0).toUpperCase() + tok.slice(1).toLowerCase();
      }).join(" ");
    }
    if(!hasLower) s = titleCase(s);

    let parts = s.split(/\s+/).filter(Boolean);
    if(parts.length===0) return { first_name:"", middle_name:"", last_name:"" };

    // Strip + capture suffix (Jr, Jr., Sr, II, III, IV) from the end
    const SUFFIX_RE = /^(jr|sr|ii|iii|iv|v)\.?$/i;
    let suffix = "";
    if(parts.length>=2 && SUFFIX_RE.test(parts[parts.length-1])){
      suffix = parts.pop();
      // Normalise: "jr" → "Jr.", "ii" → "II"
      if(/^(ii|iii|iv|v)$/i.test(suffix)) suffix = suffix.toUpperCase();
      else suffix = suffix.charAt(0).toUpperCase() + suffix.slice(1).toLowerCase().replace(/\.?$/,".");
    }

    // 1 token: only a single name. Put it as first.
    if(parts.length===1){
      return { first_name:parts[0], middle_name:"", last_name: suffix||"" };
    }

    // Detect compound-surname start by scanning from the LEFT for the first
    // particle. Everything from the particle onward becomes the last name.
    // We require at least one token BEFORE the particle (so "dela Cruz"
    // alone parses as first="dela", last="Cruz" — but "Hazzan dela Cruz"
    // parses as first="Hazzan", last="dela Cruz").
    let particleStartIdx = -1;
    // Special case: "de la", "de los", "de las" — two-token particles
    for(let i=1; i<parts.length-1; i++){
      const a = parts[i].toLowerCase();
      const b = parts[i+1].toLowerCase();
      if(a==="de" && (b==="la" || b==="los" || b==="las")){
        // Make sure there's at least one more token after (the actual surname stem)
        if(i+2 < parts.length){ particleStartIdx = i; break; }
      }
    }
    // Then single-token particles: dela, del, san, santa, etc.
    if(particleStartIdx<0){
      for(let i=1; i<parts.length-1; i++){
        if(PARTICLES_LC.has(parts[i].toLowerCase())){
          particleStartIdx = i; break;
        }
      }
    }

    let firstMiddleParts, lastParts;
    if(particleStartIdx > 0){
      firstMiddleParts = parts.slice(0, particleStartIdx);
      lastParts = parts.slice(particleStartIdx);
    } else {
      // No particle found — conservative split: last token = last name,
      // everything before = first (+ middle)
      lastParts = [parts[parts.length-1]];
      firstMiddleParts = parts.slice(0, -1);
    }

    // Filipino convention: middle name is the maternal surname, which sits
    // as the single token IMMEDIATELY BEFORE the last name. Everything else
    // before that is the first name (which may itself be multi-token — e.g.
    // "Mery Angelyn Ann" or "Maria Cristina").
    //
    // So "Mery Angelyn Ann Calpa Dunan" parses as:
    //   first="Mery Angelyn Ann", middle="Calpa", last="Dunan"
    //
    // Exception A — first-name prefixes ("Ma.", "Maria", "Jose", etc) on a
    // 3-token name like "Ma. Luisa Marcelo" should NOT yield middle="Luisa".
    // The prefix rule wins: first="Ma. Luisa", middle="", last="Marcelo".
    //
    // Exception B — when only 1 or 2 tokens remain after extracting last,
    // there's no middle by definition.
    // Tokens that, when sitting at the start of the given-name portion,
    // bind to the next token as part of the FIRST name rather than
    // becoming a separate first-name slot. "Ma." / "Maria" / "Jose" /
    // "Mary" / "John" are the common PH compound-first-name prefixes.
    // Deliberately NOT including "Juan" — in PH usage "Juan" almost
    // always stands alone as a first name; including it would break
    // names like "Juan Cruz dela Cruz" (first="Juan", middle="Cruz").
    const FIRST_PREFIXES = new Set(["maria","ma","ma.","jose","mary","john"]);
    let firstName, middleName;
    if(firstMiddleParts.length===1){
      // Single token before last name → it's the first name, no middle
      firstName = firstMiddleParts[0];
      middleName = "";
    } else if(firstMiddleParts.length===2 && FIRST_PREFIXES.has(firstMiddleParts[0].toLowerCase())){
      // Prefix rule applies to short names: "Ma. Luisa" → first="Ma. Luisa", no middle
      firstName = firstMiddleParts.join(" ");
      middleName = "";
    } else if(firstMiddleParts.length===2){
      // Two non-prefix tokens before last → first + middle (no exception applies)
      firstName = firstMiddleParts[0];
      middleName = firstMiddleParts[1];
    } else {
      // 3+ tokens before last: middle = the single token immediately before
      // last name (i.e. last of firstMiddleParts). Everything else = first name.
      // The first-name-prefix rule still preserves "Ma." / "Maria" / etc as
      // part of the first name (which is automatic — they're already at the
      // start of firstName since we take everything except the final token).
      firstName  = firstMiddleParts.slice(0, -1).join(" ");
      middleName = firstMiddleParts[firstMiddleParts.length - 1];
    }

    let lastName = lastParts.join(" ");
    if(suffix) lastName = `${lastName} ${suffix}`;

    return { first_name:firstName, middle_name:middleName, last_name:lastName };
  }

  // Pull a value from Wise INTO the DB (and optionally onward to Hubstaff).
  // Wise is the source of truth for payment-recipient identity, so this is
  // the canonical direction for name/email when there's drift.
  async function pullFromWise(field){
    if(!wise){ setPushMsg("No Wise data loaded yet."); return; }
    const wiseVal=field==="name"?wise.name:wise.email;
    if(!wiseVal){ setPushMsg(`Wise has no ${field} to pull.`); return; }
    setPushing(`wise_${field}`); setPushMsg("");
    try{
      // 1. Update the DB
      let updatePayload={};
      if(field==="name"){
        const parts=parseName(wiseVal);
        updatePayload={ first_name:parts.first_name||null,
                        middle_name:parts.middle_name||null,
                        last_name:parts.last_name||null };
      } else {
        updatePayload={ email:wiseVal };
      }
      const { error }=await client.from("workers").update(updatePayload).eq("id",w.id);
      if(error) throw new Error(error.message);
      // Audit detail still captures what changed; no user-typed reason since
      // Wise is the documented source of truth for payment-recipient identity
      // — pulling its value is the canonical reconciliation action, not a
      // judgment call that needs justification.
      logEvent(client,{ company_id:r?.company_id, action:"edit_contractor",
        entity:`${fullName(f)} · Wise #${wiseId}`,
        detail:{ kind:"pull_from_wise", field, new_value:wiseVal } });
      // 2. NOTE: This used to cascade to Hubstaff (update_user) so all three
      //    systems agreed. Hubstaff doesn't expose user-profile writes via
      //    its public REST API (verified 2026-05-28 with 11 endpoint probes),
      //    so the cascade was removed. If Hubstaff is also wrong for this
      //    contractor, the user needs to fix it in Hubstaff's web UI.
      const hubMsg = hubUserId && hub && (
          (field==="name" && norm(hub.name)!==norm(wiseVal)) ||
          (field==="email" && hub.email && norm(hub.email)!==norm(wiseVal))
        ) ? " — Hubstaff still differs; fix it manually in the Hubstaff web UI" : "";
      setPushMsg(`Pulled ${field} from Wise into DB${hubMsg}.`);
      unarmPush(`wise_${field}`);
      notifySaved();
      // Note: the parent ProfileModal's local `f` state is stale now. The
      // change is in the DB; the list refetches on notifySaved(), and the
      // modal will pick up the new value when next opened.
    }catch(ex){ setPushMsg("Pull failed: "+String(ex.message||ex)); }
    finally{ setPushing(null); }
  }

  const norm=(s)=>String(s||"").trim().toLowerCase();
  const dbName=fullName(f);
  const dbEmail=f.email||"";
  const wiseNameDiff = wise && norm(wise.name)!==norm(dbName);
  const wiseEmailDiff = wise && wise.email && norm(wise.email)!==norm(dbEmail);
  const hubNameDiff = hub && norm(hub.name)!==norm(dbName);
  const hubEmailDiff = hub && norm(hub.email)!==norm(dbEmail);

  // Tiny helpers for the side-by-side row. Two row variants:
  //   canPush  → Hubstaff drift: shows a 'Fix in Hubstaff' link (Hubstaff's
  //              API doesn't allow user-profile writes, so no in-app push).
  //   canPull  → Wise drift: 'Use Wise's name/email' button — pulls Wise value
  //              into DB and locks it as the source of truth.
  function FieldRow({label,dbVal,extVal,diff,canPush,canPull,pullField}){
    const pullKey=`wise_${pullField}`;
    const pullArmed=pushArmed[pullKey];
    return (
      <tr>
        <td style={{padding:"4px 8px",fontSize:12,color:"var(--muted)"}}>{label}</td>
        <td style={{padding:"4px 8px",fontSize:13}}>{dbVal||<span className="muted">—</span>}</td>
        <td style={{padding:"4px 8px",fontSize:13}}>
          {extVal||<span className="muted">—</span>}
          {diff && <span title="DB and external value differ" style={{marginLeft:6,color:"#a16207"}}>⚠️</span>}
        </td>
        <td style={{padding:"4px 8px",textAlign:"right"}}>
          {/* canPush rows (Hubstaff drift) show a 'fix in Hubstaff UI' link
              instead of a Push button — Hubstaff's REST API doesn't expose
              user-profile writes, so the fix has to happen in their web UI. */}
          {canPush && diff && (
            <span className="muted" style={{fontSize:11}}>
              Fix in <a href="https://app.hubstaff.com" target="_blank" rel="noopener noreferrer"
                style={{color:"var(--accent)",textDecoration:"underline"}}>Hubstaff</a>
            </span>
          )}
          {canPull && diff && (
            <button className="btn sm" disabled={pushing===pullKey}
              title={`Use Wise's ${pullField} — overwrites the DB value. Wise is the payment source of truth. (Hubstaff isn't updated — its API doesn't support it; fix Hubstaff separately in their UI if needed.)`}
              onClick={()=>pullFromWise(pullField)}>
              {pushing===pullKey?"Pulling…":`Use Wise's ${pullField}`}
            </button>
          )}
        </td>
      </tr>
    );
  }

  // Look up an unlinked Wise recipient by numeric ID OR Wisetag and link it
  // on the worker. Preview first, then confirm. Pulls name/email into DB too
  // if the user accepts (uses the existing pullFromWise path after linking).
  const [lookupMode,setLookupMode]=useState("id");   // 'id' | 'wisetag'
  const [lookupInput,setLookupInput]=useState("");
  const [lookupBusy,setLookupBusy]=useState(false);
  const [lookupErr,setLookupErr]=useState("");
  const [lookupPreview,setLookupPreview]=useState(null);    // single recipient (ID mode)
  const [lookupResults,setLookupResults]=useState(null);    // contact list (Wisetag mode)
  const [lookupApplyName,setLookupApplyName]=useState(true);
  const [lookupApplyEmail,setLookupApplyEmail]=useState(true);
  function clearLookup(){
    setLookupInput(""); setLookupPreview(null); setLookupResults(null); setLookupErr("");
  }
  async function lookupWiseById(){
    const id=String(lookupInput).trim().replace(/^#/,"");
    if(!/^\d+$/.test(id)){ setLookupErr("Enter a numeric Wise recipient ID (e.g. 1372559053)."); return; }
    setLookupBusy(true); setLookupErr(""); setLookupPreview(null); setLookupResults(null);
    try{
      const { data, error }=await client.functions.invoke("wise-payouts",{
        body:{ action:"get_recipient", recipient_id:Number(id) } });
      if(error) throw new Error(error.message||"Edge function error");
      if(data?.error) throw new Error(data.error);
      if(!data?.recipient) throw new Error("No recipient returned");
      setLookupPreview(data.recipient);
    }catch(ex){ setLookupErr(String(ex.message||ex)); }
    finally{ setLookupBusy(false); }
  }
  // Wisetag mode — uses /v1/profiles/{id}/contacts?searchTerm=X. Returns a
  // list of CONTACTS (not bank-account recipients). Each contact has a
  // balance_recipient_id you can use as wise_recipient_id, but only for
  // Wise-to-Wise (balance) payments. Most PH contractors paid via bank
  // accounts won't be reachable this way.
  async function lookupWiseByTag(){
    const tag=String(lookupInput).trim().replace(/^@/,"");
    if(!tag){ setLookupErr("Enter a Wisetag (with or without the @)."); return; }
    setLookupBusy(true); setLookupErr(""); setLookupPreview(null); setLookupResults(null);
    try{
      const { data, error }=await client.functions.invoke("wise-payouts",{
        body:{ action:"search_contacts", search_term:tag } });
      if(error) throw new Error(error.message||"Edge function error");
      if(data?.error) throw new Error(data.error);
      const list=Array.isArray(data?.contacts)?data.contacts:[];
      if(!list.length){ setLookupErr(`No contacts matched "${tag}".`); return; }
      setLookupResults(list);
    }catch(ex){ setLookupErr(String(ex.message||ex)); }
    finally{ setLookupBusy(false); }
  }
  // When user clicks a contact in the multi-result list, treat its
  // balance_recipient_id as the wise_recipient_id to preview/link.
  function pickContact(c){
    setLookupPreview({
      id: c.balance_recipient_id,
      name: c.name || c.account_holder_name || "",
      email: null,                                // contacts API doesn't return email
      currency: null,
      account: "Wise balance",                    // honest: this is a Wise-balance recipient
      active: !c.hidden,
      _from_contact: true,                        // marker so the UI can label it
    });
  }
  async function linkLookupResult(){
    if(!lookupPreview) return;
    setLookupBusy(true); setLookupErr("");
    try{
      const updates={ wise_recipient_id: lookupPreview.id };
      // Also append to wise_recipients so the API-draft per-row dropdown in
      // Process & Pay can render this recipient. Without this, even a freshly
      // linked Wisetag balance recipient still falls back to the "no bank
      // recipient" branch and the row can't be drafted from the table.
      const { data: cur } = await client.from("workers")
        .select("wise_recipients").eq("id", w.id).single();
      const list = Array.isArray(cur?.wise_recipients) ? cur.wise_recipients : [];
      if(!list.some(x=>x.id===lookupPreview.id)){
        const label = lookupPreview._from_contact
          ? (lookupPreview.name ? `${lookupPreview.name} (Wisetag)` : "Wisetag balance")
          : (lookupPreview.name || `Recipient ${lookupPreview.id}`);
        list.push({ id: lookupPreview.id, label });
        updates.wise_recipients = list;
      }
      if(lookupApplyName && lookupPreview.name){
        const parts=parseName(lookupPreview.name);
        updates.first_name = parts.first_name || w.first_name;
        updates.middle_name = parts.middle_name || null;
        updates.last_name = parts.last_name || w.last_name;
      }
      if(lookupApplyEmail && lookupPreview.email){
        updates.email = lookupPreview.email;
      }
      const { error }=await client.from("workers").update(updates).eq("id",w.id);
      if(error) throw new Error(error.message);
      logEvent(client,{ company_id:r?.company_id, action:"edit_contractor",
        entity:`${fullName(f)} → Wise #${lookupPreview.id}`,
        detail:{ kind:"link_wise_recipient", recipient_id:lookupPreview.id,
                 applied_name:lookupApplyName, applied_email:lookupApplyEmail } });
      setPushMsg(`Linked Wise recipient #${lookupPreview.id}. Re-open the profile to see the updated fields.`);
      reportBilling(`Wise recipient linked → #${lookupPreview.id}`);
      notifySaved();
      setLookupInput(""); setLookupPreview(null);
    }catch(ex){ setLookupErr(String(ex.message||ex)); }
    finally{ setLookupBusy(false); }
  }

  return (
    <div style={{borderTop:"1px solid var(--border)",paddingTop:12,marginTop:12}}>
      <label style={{fontSize:11,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".03em"}}>
        External sources — drift check
      </label>
      <p className="muted" style={{fontSize:12,margin:"4px 0 8px"}}>
        What Wise and Hubstaff have for this contractor. Mismatches show ⚠️.
        For <b>Wise</b> drift, the "Use Wise's …" button pulls Wise's value into
        the DB (Wise is the payment source of truth). For <b>Hubstaff</b> drift,
        fix it in Hubstaff's web UI — Hubstaff's public API doesn't accept
        user-profile edits.
      </p>
      {pushMsg && <Banner msg={pushMsg} style={{marginBottom:8}}/>}

      {/* Wise */}
      <div style={{marginBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
          <b style={{fontSize:13}}>Wise</b>
          {wiseId
            ? <span className="muted" style={{fontSize:12}}>recipient #{wiseId}</span>
            : <span className="muted" style={{fontSize:12}}>not linked</span>}
          {wiseId && <button className="btn ghost sm" disabled={loadingWise} onClick={loadWise}>
            {loadingWise?"Loading…":"Refresh"}</button>}
        </div>
        {wiseErr && <Banner tone="error" msg={`Wise: ${wiseErr}`} style={{marginBottom:6}}/>}
        {wiseNote && !wiseErr && (
          <p className="muted" style={{fontSize:12,margin:"0 0 6px",fontStyle:"italic"}}>
            {wiseNote}
          </p>
        )}
        {wiseId && wise && (
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr style={{textAlign:"left"}}>
              <th style={{padding:"2px 8px",fontSize:11,color:"var(--muted)",fontWeight:500}}>Field</th>
