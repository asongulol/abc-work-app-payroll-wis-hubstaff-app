    setRateHistory(rows);
    if(rows[0]) setRate(String(rows[0].amount_php));
  }
  useEffect(()=>{ loadRateHistory();
    /* eslint-disable-next-line */ },[w.id, r?.company_id]);

  // Edit the effective_start on an existing rate row. After save, recompute
  // effective_end on the row immediately before it (in chronological order)
  // so the timeline stays contiguous.
  async function saveRateEffectiveEdit(row){
    const newStart=rateEditDate;
    if(!newStart || !/^\d{4}-\d{2}-\d{2}$/.test(newStart)){ setSavedMsg("Pick a valid date."); return; }
    if(newStart===row.effective_start){ setRateEditingId(null); return; }
    // 1. update this row's effective_start
    const {error:e1}=await client.from("rates")
      .update({effective_start:newStart}).eq("id",row.id);
    if(e1){ setSavedMsg("Rate edit failed: "+e1.message); return; }
    // 2. close the row's predecessor at newStart (or open it if newStart is later)
    // 3. recompute effective_end for the (now-)predecessor in the timeline.
    //    Easiest is to re-fetch all rows for this worker/company and walk
    //    chronologically, setting each row's effective_end to the NEXT row's
    //    effective_start (or NULL for the newest).
    const {data:fresh}=await client.from("rates")
      .select("id,effective_start,effective_end")
      .eq("worker_id",w.id).eq("company_id",r.company_id)
      .order("effective_start",{ascending:true});
    const sorted=fresh||[];
    for(let i=0;i<sorted.length;i++){
      const desiredEnd = i<sorted.length-1 ? sorted[i+1].effective_start : null;
      if(sorted[i].effective_end !== desiredEnd){
        await client.from("rates").update({effective_end:desiredEnd}).eq("id",sorted[i].id);
      }
    }
    logEvent(client,{company_id:r.company_id,action:"set_rate",
      entity:`${f.first_name} ${f.last_name}`,
      detail:{kind:"edit_effective_start",rate_id:row.id,
              from:row.effective_start, to:newStart, amount_php:row.amount_php}});
    setRateEditingId(null); setRateEditDate("");
    setSavedMsg(`Rate effective date updated to ${newStart}.`);
    loadRateHistory();
  }

  async function deleteRateRow(row){
    setRateConfirmDelete(null);
    const {error}=await client.from("rates").delete().eq("id",row.id);
    if(error){ setSavedMsg("Couldn't delete rate: "+error.message); return; }
    // After delete, recompute effective_end on remaining rows so the
    // chronological gap left by the deleted row gets closed.
    const {data:fresh}=await client.from("rates")
      .select("id,effective_start,effective_end")
      .eq("worker_id",w.id).eq("company_id",r.company_id)
      .order("effective_start",{ascending:true});
    const sorted=fresh||[];
    for(let i=0;i<sorted.length;i++){
      const desiredEnd = i<sorted.length-1 ? sorted[i+1].effective_start : null;
      if(sorted[i].effective_end !== desiredEnd){
        await client.from("rates").update({effective_end:desiredEnd}).eq("id",sorted[i].id);
      }
    }
    logEvent(client,{company_id:r.company_id,action:"set_rate",
      entity:`${f.first_name} ${f.last_name}`,
      detail:{kind:"delete_rate", rate_id:row.id, amount_php:row.amount_php, effective_start:row.effective_start}});
    setSavedMsg(`Deleted rate ₱${Number(row.amount_php).toLocaleString()} from ${row.effective_start}.`);
    loadRateHistory();
  }

  async function savePayMethod(val){

  async function saveDetails(){
    // Diff the worker fields against the values present when the modal opened
    // (w) and the link fields against r, so the audit records what changed.
    const wDiff=auditDiff(w,{
      first_name:f.first_name, middle_name:f.middle_name||null, last_name:f.last_name,
      email:f.email||null, work_email:f.work_email||null, mobile:f.mobile||null,
      work_number:f.work_number||null, work_extension:f.work_extension||null, ph_address:f.ph_address||null,
      hire_date:f.hire_date||null, date_of_birth:f.date_of_birth||null,
      health_allowance_eligible:f.health_allowance_eligible,
      thirteenth_month_eligible:f.thirteenth_month_eligible,
      emergency_name:f.emergency_name||null, emergency_relationship:f.emergency_relationship||null, emergency_mobile:f.emergency_mobile||null,
      permanent_address:f.permanent_address||null, address_landmark:f.address_landmark||null, postal_code:f.postal_code||null,
      marital_status:f.marital_status||null, education_level:f.education_level||null, course:f.course||null, year_graduated:f.year_graduated||null, school:f.school||null,
    },["first_name","middle_name","last_name","email","work_email","mobile","work_number","work_extension","ph_address","hire_date",
       "date_of_birth","health_allowance_eligible","thirteenth_month_eligible",
       "emergency_name","emergency_relationship","emergency_mobile","permanent_address","address_landmark","postal_code","marital_status","education_level","course","year_graduated","school"]);
    const linkDiff=auditDiff({contract:r.contract,role:r.role,hubstaff_name:r.hubstaff_name,weekly_hours:r.weekly_hours},
      {contract,role:role||null,hubstaff_name:hubName||null,weekly_hours:parseFloat(weeklyHours)||null},["contract","role","hubstaff_name","weekly_hours"]);
    // culture / fun facts live in the profile_extras jsonb — merge, don't clobber
    const exOld=(w.profile_extras&&typeof w.profile_extras==="object")?w.profile_extras:{};
    const exNew={...exOld};
    [["favorite_color",f.favorite_color],["favorite_food",f.favorite_food],["motto",f.motto]]
      .forEach(([k,v])=>{ if(v&&v.trim()) exNew[k]=v.trim(); else delete exNew[k]; });
    const cultureDiff=auditDiff(
      {favorite_color:exOld.favorite_color||null,favorite_food:exOld.favorite_food||null,motto:exOld.motto||null},
      {favorite_color:f.favorite_color||null,favorite_food:f.favorite_food||null,motto:f.motto||null},
      ["favorite_color","favorite_food","motto"]);
    const {error:e1}=await client.from("workers").update({
      profile_extras:exNew,
      first_name:f.first_name, middle_name:f.middle_name||null, last_name:f.last_name, email:f.email||null, work_email:f.work_email||null, mobile:f.mobile||null,
      work_number:f.work_number||null, work_extension:f.work_extension||null,
      ph_address:f.ph_address||null, hire_date:f.hire_date||null, date_of_birth:f.date_of_birth||null,
      health_allowance_eligible:f.health_allowance_eligible,
      thirteenth_month_eligible:f.thirteenth_month_eligible,
      emergency_name:f.emergency_name||null, emergency_relationship:f.emergency_relationship||null, emergency_mobile:f.emergency_mobile||null,
      permanent_address:f.permanent_address||null, address_landmark:f.address_landmark||null, postal_code:f.postal_code||null,
      marital_status:f.marital_status||null, education_level:f.education_level||null, course:f.course||null, year_graduated:f.year_graduated||null, school:f.school||null}).eq("id",w.id);
    let e2=null;
    if(r.company_id){
      ({error:e2}=await client.from("worker_companies")
        .update({contract, role:role||null, hubstaff_name:hubName||null, weekly_hours:parseFloat(weeklyHours)||null})
        .eq("worker_id",w.id).eq("company_id",r.company_id));
    }
    if(e1||e2){setSavedMsg("Error: "+((e1||e2).message));return false;}
    logEvent(client,{company_id:r.company_id,action:"edit_contractor",
      entity:`${f.first_name} ${f.last_name}`,detail:{changed:{...wDiff,...linkDiff,...cultureDiff}}});
    setSavedMsg("Details saved.");
    notifySaved();
    ucBase.current=ucSnap();   // edits are now the saved baseline → no longer dirty
    return true;
  }
  async function saveRate(){
    const amt=parseFloat(rate);
    if(!(amt>0)){setSavedMsg("Enter a rate amount.");return;}
    if(!r.company_id){setSavedMsg("Pick a single company to set a rate.");return;}
    // Effective-dated rate save. Three steps, in order:
    //   1) If a rate already exists for this exact (worker, company, day),
    //      UPDATE it instead of inserting — same-day saves replace, not stack.
    //      This prevents the duplicate-day rows that caused the load query's
    //      tiebreaker to pick the wrong one (hello, Hazzan).
    //   2) Otherwise, close any open rate whose effective_start is STRICTLY
    //      BEFORE rateEff. Don't try to retroactively close a future-dated
    //      rate — that would violate the CHECK (effective_end >= effective_start).
    //   3) Insert the new rate.
    const {data:existing}=await client.from("rates")
      .select("id").eq("worker_id",w.id).eq("company_id",r.company_id)
      .eq("effective_start",rateEff).limit(1);
    if(existing && existing[0]){
      // Same-day update — replace the amount on the existing row, keep its id.
      const {error}=await client.from("rates")
        .update({amount_php:amt, period_basis:"semi_monthly", effective_end:null})
        .eq("id",existing[0].id);
      if(error){setSavedMsg("Rate error: "+error.message);return;}
      logEvent(client,{company_id:r.company_id,action:"set_rate",
        entity:`${f.first_name} ${f.last_name}`,
        detail:{amount_php:amt, effective_start:rateEff, kind:"same_day_update"}});
      setSavedMsg(`Rate updated to ₱${amt.toLocaleString()} for ${rateEff}.`);
      return;
    }
    // No same-day row exists. Close any STRICTLY-EARLIER open rate.
    await client.from("rates").update({effective_end:rateEff})
      .eq("worker_id",w.id).eq("company_id",r.company_id)
      .is("effective_end",null)
      .lt("effective_start",rateEff);
    const {error}=await client.from("rates").insert({
      worker_id:w.id, company_id:r.company_id, amount_php:amt,
      period_basis:"semi_monthly", effective_start:rateEff});
    if(error){setSavedMsg("Rate error: "+error.message);return;}
    // Prior rate = the most recent rate row before this one (rateHistory is
    // sorted newest-first). Records the rate change as from→to for audit.
    const priorRate=Array.isArray(rateHistory)&&rateHistory[0]?Number(rateHistory[0].amount_php):null;
    logEvent(client,{company_id:r.company_id,action:"set_rate",
      entity:`${f.first_name} ${f.last_name}`,
      detail:{amount_php:{from:priorRate,to:amt},effective_start:rateEff}});
    setSavedMsg(`Rate set to ₱${amt.toLocaleString()} from ${rateEff}.`);
    reportBilling(`rate → ₱${amt.toLocaleString()} from ${rateEff}`);
    loadRateHistory();
    notifySaved();
  }

  async function persist(nextRecips,nextDef){
    // Capture prior default recipient id (payment-routing change) for audit.
    const {data:prev}=await client.from("workers").select("wise_recipient_id").eq("id",w.id).single();
    const {error}=await client.from("workers")
      .update({wise_recipients:nextRecips, wise_recipient_id:nextDef}).eq("id",w.id);
    if(error){ setSavedMsg("Error: "+error.message); return; }
    setSavedMsg("Saved.");
    logEvent(client,{company_id:r.company_id,action:"edit_contractor",
      entity:`${f.first_name} ${f.last_name}`,
      detail:{kind:"wise_recipient_default", default_recipient_id:{from:prev?.wise_recipient_id??null,to:nextDef??null}}});
    reportBilling(`Wise recipient (default #${nextDef||"—"})`);
    notifySaved();
  }
  function addRecip(){
    if(!newId)return;
    const id=Number(newId);
    if(recips.some(x=>x.id===id)){setSavedMsg("Already added.");return;}
    const next=[...recips,{id,label:newLabel||`Recipient ${id}`}];
    const nd=defId??id;
    setRecips(next);setDefId(nd);setNewId("");setNewLabel("");persist(next,nd);
  }
  function removeRecip(id){
    const next=recips.filter(x=>x.id!==id);
    const nd=defId===id?(next[0]?.id??null):defId;
    setRecips(next);setDefId(nd);persist(next,nd);
  }
  function makeDefault(id){ setDefId(id); persist(recips,id); }

    notifySaved();
  }

          {" "}The <b>UUID</b> is separate — the Wise API doesn't return it, so paste it once from the

        {/* --- External sources: Wise + Hubstaff drift ---
            Pulls the linked Wise recipient and Hubstaff user on demand and
            shows side-by-side what each system has for name / email vs the
            DB. Mismatches get a ⚠️. For Hubstaff, an inline 'Push DB → Hubstaff'
            button (with required reason) updates the field. Wise side is
            read-only because Wise doesn't allow API edits of existing
            recipients. */}
        <ExternalSourcesPanel w={w} f={f} r={r} client={client} onBillingChange={onBillingChange} onSaved={notifySaved}/>
        </>}

        <p className="muted" style={{fontSize:12,marginTop:10,borderTop:"1px solid var(--border)",paddingTop:12}}>

}

// External sources panel — lives inside ProfileModal. Pulls Wise recipient
// (by w.wise_recipient_id) and Hubstaff user (by r.hubstaff_user_id),
// compares to DB values, surfaces mismatches with a per-field push button
// for Hubstaff. Read-only for Wise (API doesn't allow recipient edits).
function ExternalSourcesPanel({ w, f, r, client, onBillingChange, onSaved }){
  const reportBilling = (field)=>{
    if(typeof onBillingChange==="function"){
      onBillingChange({ workerId: w?.id, name: fullName(w||f||{}), field });
    }
  };
  const notifySaved = ()=>{ if(typeof onSaved==="function") onSaved(); };
  const [wise,setWise]=useState(null);     // { id, name, email, account, ... } or null
  const [hub,setHub]=useState(null);       // { id, name, email, status, time_zone } or null
  const [loadingWise,setLoadingWise]=useState(false);
  const [loadingHub,setLoadingHub]=useState(false);
  const [wiseErr,setWiseErr]=useState("");
  // Soft, non-error note for Wise — used when /v1/accounts/{id} returns 403
  // (which means the stored recipient is a Wisetag/Wise-balance recipient;
  // Wise's read API doesn't expose those, so there's no drift to check, but
  // payments still work via /v1/transfers).
  const [wiseNote,setWiseNote]=useState("");
  const [hubErr,setHubErr]=useState("");
  // State used by the Wise → DB pull flow (and previously by a now-removed
  // Hubstaff push flow). `pushing` doubles as a busy flag keyed by field;
  // `pushReason`/`pushArmed` are also used by the inline-confirm pattern
  // for pullFromWise. Kept the names to avoid a sweeping rename.
  const [pushing,setPushing]=useState(null);
  const [pushReason,setPushReason]=useState({});
  const [pushArmed,setPushArmed]=useState({});
  const [pushMsg,setPushMsg]=useState("");

  const wiseId = w.wise_recipient_id;
  const hubUserId = r?.hubstaff_user_id;

  async function loadWise(){
    if(!wiseId) return;
    setLoadingWise(true); setWiseErr(""); setWiseNote("");
    try{
      const { data, error }=await client.functions.invoke("wise-payouts",{
        body:{ action:"get_recipient", recipient_id:wiseId } });
      if(error) throw new Error(await fnErrorMessage(error));
      if(data?.error) throw new Error(data.error);
      setWise(data?.recipient||null);
    }catch(ex){
      const msg=String(ex.message||ex);
      // 403 unauthorized from /v1/accounts/{id} means the stored recipient is
      // a Wisetag/Wise-balance recipient — Wise's read API only exposes bank
      // accounts. Drift check is N/A for these, but payments still work via
      // the transfer endpoint. Demote to a muted note instead of an error.
      if(/\b403\b/.test(msg) && /unauthorized/i.test(msg)){
        setWiseNote("Wisetag / Wise-balance recipient — Wise's read API doesn't expose this type, so drift check isn't available. Payments still work via the API draft.");
      } else {
        setWiseErr(msg);
      }
    }
    finally{ setLoadingWise(false); }
  }
  async function loadHub(){
    if(!hubUserId) return;
    setLoadingHub(true); setHubErr("");
    try{
      const { data, error }=await client.functions.invoke("hubstaff-sync",{
        body:{ action:"get_user", user_id:hubUserId } });
      if(error) throw new Error(await fnErrorMessage(error));
      if(data?.error) throw new Error(data.error);
      setHub(data?.user||null);
    }catch(ex){ setHubErr(String(ex.message||ex)); }
    finally{ setLoadingHub(false); }
  }

  // Lazy-load on first render — keeps the modal open fast, panel updates as
  // the API calls complete.
  useEffect(()=>{ if(wiseId) loadWise(); if(hubUserId) loadHub();
    /* eslint-disable-next-line */ },[wiseId,hubUserId]);

  function armPush(field){ setPushArmed(p=>({...p,[field]:true})); setPushReason(p=>({...p,[field]:""})); }
  function unarmPush(field){ setPushArmed(p=>{ const n={...p}; delete n[field]; return n; }); }
  function setReason(field,v){ setPushReason(p=>({...p,[field]:v})); }

  // NOTE: pushHub() (DB → Hubstaff name/email push) was removed 2026-05-28.
  // Hubstaff's public REST API doesn't expose user-profile writes — 11 candidate
  // endpoints probed, all returned 405 / 404 / 422-with-web-session-error. The
  // drift UI now points the user at Hubstaff's web UI to fix mismatches manually.
  // The pullFromWise() flow (Wise → DB, with optional cascade) below still
  // works because Wise IS exposed via REST. See WISE_SETUP.md.

  // Filipino-aware name parser. Handles:
  //   - Compound surname particles: "dela Cruz", "de la Cruz", "del Rosario",
  //     "de los Santos", "san Juan", "santo Tomas", etc. The particle and
  //     everything after it form the last name.
  //   - Suffix tokens: Jr, Jr., Sr, Sr., II, III, IV — attached to last name.
  //   - "Maria" / "Ma." / "Jose" used as first-name prefixes — kept with the
  //     given name (e.g. "Ma. Luisa Marcelo" → first="Ma. Luisa", last="Marcelo").
  //   - All-caps bank-style names ("HAZZAN DELA CRUZ") — title-cased so the
  //     DB doesn't read like a bank statement, while preserving particle
  //     casing (dela, de la, de los stay lower-case as is convention).
  //
  // Conservative fallback: if uncertain, parses as before (first, [middle…],
  // last) — same as the naïve version. The Wise pull always asks for a reason
  // and the user can manually fix any edge case the parser missed.
  function parseName(raw){
    let s = String(raw||"").trim();
    if(!s) return { first_name:"", middle_name:"", last_name:"" };

    // Detect ALL-CAPS bank-statement style. If the source is all upper-case
    // with no lowercase letters, title-case it (preserving particles).
    const hasLower = /[a-z]/.test(s);
    const PARTICLES_LC = new Set(["de","del","dela","la","los","las","san","santa","santo","y","da","do","das","dos"]);
    function titleCase(str){
      return str.split(/\s+/).map((tok,i)=>{
        const lc=tok.toLowerCase();
        // Particles in the middle of a name stay lowercase (e.g. "Hazzan dela Cruz")
        if(i>0 && PARTICLES_LC.has(lc)) return lc;
        // Honorific/abbreviation "Ma." stays as "Ma." with period
        if(/^ma\.?$/i.test(tok)) return /\./.test(tok) ? "Ma." : "Ma";
        // Regular token: Capitalize first letter, lowercase rest
        return tok.charAt(0).toUpperCase() + tok.slice(1).toLowerCase();
      }).join(" ");
    }
    if(!hasLower) s = titleCase(s);

    let parts = s.split(/\s+/).filter(Boolean);
    if(parts.length===0) return { first_name:"", middle_name:"", last_name:"" };

    // Strip + capture suffix (Jr, Jr., Sr, II, III, IV) from the end
    const SUFFIX_RE = /^(jr|sr|ii|iii|iv|v)\.?$/i;
    let suffix = "";
    if(parts.length>=2 && SUFFIX_RE.test(parts[parts.length-1])){
      suffix = parts.pop();
      // Normalise: "jr" → "Jr.", "ii" → "II"
      if(/^(ii|iii|iv|v)$/i.test(suffix)) suffix = suffix.toUpperCase();
      else suffix = suffix.charAt(0).toUpperCase() + suffix.slice(1).toLowerCase().replace(/\.?$/,".");
    }

    // 1 token: only a single name. Put it as first.
    if(parts.length===1){
      return { first_name:parts[0], middle_name:"", last_name: suffix||"" };
    }

    // Detect compound-surname start by scanning from the LEFT for the first
    // particle. Everything from the particle onward becomes the last name.
    // We require at least one token BEFORE the particle (so "dela Cruz"
    // alone parses as first="dela", last="Cruz" — but "Hazzan dela Cruz"
    // parses as first="Hazzan", last="dela Cruz").
    let particleStartIdx = -1;
    // Special case: "de la", "de los", "de las" — two-token particles
    for(let i=1; i<parts.length-1; i++){
      const a = parts[i].toLowerCase();
      const b = parts[i+1].toLowerCase();
      if(a==="de" && (b==="la" || b==="los" || b==="las")){
        // Make sure there's at least one more token after (the actual surname stem)
        if(i+2 < parts.length){ particleStartIdx = i; break; }
      }
    }
    // Then single-token particles: dela, del, san, santa, etc.
    if(particleStartIdx<0){
      for(let i=1; i<parts.length-1; i++){
        if(PARTICLES_LC.has(parts[i].toLowerCase())){
          particleStartIdx = i; break;
        }
      }
    }

    let firstMiddleParts, lastParts;
    if(particleStartIdx > 0){
      firstMiddleParts = parts.slice(0, particleStartIdx);
      lastParts = parts.slice(particleStartIdx);
    } else {
      // No particle found — conservative split: last token = last name,
      // everything before = first (+ middle)
      lastParts = [parts[parts.length-1]];
      firstMiddleParts = parts.slice(0, -1);
    }

    // Filipino convention: middle name is the maternal surname, which sits
    // as the single token IMMEDIATELY BEFORE the last name. Everything else
    // before that is the first name (which may itself be multi-token — e.g.
    // "Mery Angelyn Ann" or "Maria Cristina").
    //
    // So "Mery Angelyn Ann Calpa Dunan" parses as:
    //   first="Mery Angelyn Ann", middle="Calpa", last="Dunan"
    //
    // Exception A — first-name prefixes ("Ma.", "Maria", "Jose", etc) on a
    // 3-token name like "Ma. Luisa Marcelo" should NOT yield middle="Luisa".
    // The prefix rule wins: first="Ma. Luisa", middle="", last="Marcelo".
    //
    // Exception B — when only 1 or 2 tokens remain after extracting last,
    // there's no middle by definition.
    // Tokens that, when sitting at the start of the given-name portion,
    // bind to the next token as part of the FIRST name rather than
    // becoming a separate first-name slot. "Ma." / "Maria" / "Jose" /
    // "Mary" / "John" are the common PH compound-first-name prefixes.
    // Deliberately NOT including "Juan" — in PH usage "Juan" almost
    // always stands alone as a first name; including it would break
    // names like "Juan Cruz dela Cruz" (first="Juan", middle="Cruz").
    const FIRST_PREFIXES = new Set(["maria","ma","ma.","jose","mary","john"]);
    let firstName, middleName;
    if(firstMiddleParts.length===1){
      // Single token before last name → it's the first name, no middle
      firstName = firstMiddleParts[0];
      middleName = "";
    } else if(firstMiddleParts.length===2 && FIRST_PREFIXES.has(firstMiddleParts[0].toLowerCase())){
      // Prefix rule applies to short names: "Ma. Luisa" → first="Ma. Luisa", no middle
      firstName = firstMiddleParts.join(" ");
      middleName = "";
    } else if(firstMiddleParts.length===2){
      // Two non-prefix tokens before last → first + middle (no exception applies)
      firstName = firstMiddleParts[0];
      middleName = firstMiddleParts[1];
    } else {
      // 3+ tokens before last: middle = the single token immediately before
      // last name (i.e. last of firstMiddleParts). Everything else = first name.
      // The first-name-prefix rule still preserves "Ma." / "Maria" / etc as
      // part of the first name (which is automatic — they're already at the
      // start of firstName since we take everything except the final token).
      firstName  = firstMiddleParts.slice(0, -1).join(" ");
      middleName = firstMiddleParts[firstMiddleParts.length - 1];
    }

    let lastName = lastParts.join(" ");
    if(suffix) lastName = `${lastName} ${suffix}`;

    return { first_name:firstName, middle_name:middleName, last_name:lastName };
  }

  // Pull a value from Wise INTO the DB (and optionally onward to Hubstaff).
  // Wise is the source of truth for payment-recipient identity, so this is
  // the canonical direction for name/email when there's drift.
  async function pullFromWise(field){
    if(!wise){ setPushMsg("No Wise data loaded yet."); return; }
    const wiseVal=field==="name"?wise.name:wise.email;
    if(!wiseVal){ setPushMsg(`Wise has no ${field} to pull.`); return; }
    setPushing(`wise_${field}`); setPushMsg("");
    try{
      // 1. Update the DB
      let updatePayload={};
      if(field==="name"){
        const parts=parseName(wiseVal);
        updatePayload={ first_name:parts.first_name||null,
                        middle_name:parts.middle_name||null,
                        last_name:parts.last_name||null };
      } else {
        updatePayload={ email:wiseVal };
      }
      const { error }=await client.from("workers").update(updatePayload).eq("id",w.id);
      if(error) throw new Error(error.message);
      // Audit detail still captures what changed; no user-typed reason since
      // Wise is the documented source of truth for payment-recipient identity
      // — pulling its value is the canonical reconciliation action, not a
      // judgment call that needs justification.
      logEvent(client,{ company_id:r?.company_id, action:"edit_contractor",
        entity:`${fullName(f)} · Wise #${wiseId}`,
        detail:{ kind:"pull_from_wise", field, new_value:wiseVal } });
      // 2. NOTE: This used to cascade to Hubstaff (update_user) so all three
      //    systems agreed. Hubstaff doesn't expose user-profile writes via
      //    its public REST API (verified 2026-05-28 with 11 endpoint probes),
      //    so the cascade was removed. If Hubstaff is also wrong for this
      //    contractor, the user needs to fix it in Hubstaff's web UI.
      const hubMsg = hubUserId && hub && (
          (field==="name" && norm(hub.name)!==norm(wiseVal)) ||
          (field==="email" && hub.email && norm(hub.email)!==norm(wiseVal))
        ) ? " — Hubstaff still differs; fix it manually in the Hubstaff web UI" : "";
      setPushMsg(`Pulled ${field} from Wise into DB${hubMsg}.`);
      unarmPush(`wise_${field}`);
      notifySaved();
      // Note: the parent ProfileModal's local `f` state is stale now. The
      // change is in the DB; the list refetches on notifySaved(), and the
      // modal will pick up the new value when next opened.
    }catch(ex){ setPushMsg("Pull failed: "+String(ex.message||ex)); }
    finally{ setPushing(null); }
  }

  const norm=(s)=>String(s||"").trim().toLowerCase();
  const dbName=fullName(f);
  const dbEmail=f.email||"";
  const wiseNameDiff = wise && norm(wise.name)!==norm(dbName);
  const wiseEmailDiff = wise && wise.email && norm(wise.email)!==norm(dbEmail);
  const hubNameDiff = hub && norm(hub.name)!==norm(dbName);
  const hubEmailDiff = hub && norm(hub.email)!==norm(dbEmail);

  // Tiny helpers for the side-by-side row. Two row variants:
  //   canPush  → Hubstaff drift: shows a 'Fix in Hubstaff' link (Hubstaff's
  //              API doesn't allow user-profile writes, so no in-app push).
  //   canPull  → Wise drift: 'Use Wise's name/email' button — pulls Wise value
  //              into DB and locks it as the source of truth.
  function FieldRow({label,dbVal,extVal,diff,canPush,canPull,pullField}){
    const pullKey=`wise_${pullField}`;
    const pullArmed=pushArmed[pullKey];
    return (
      <tr>
        <td style={{padding:"4px 8px",fontSize:12,color:"var(--muted)"}}>{label}</td>
        <td style={{padding:"4px 8px",fontSize:13}}>{dbVal||<span className="muted">—</span>}</td>
        <td style={{padding:"4px 8px",fontSize:13}}>
          {extVal||<span className="muted">—</span>}
          {diff && <span title="DB and external value differ" style={{marginLeft:6,color:"#a16207"}}>⚠️</span>}
        </td>
        <td style={{padding:"4px 8px",textAlign:"right"}}>
          {/* canPush rows (Hubstaff drift) show a 'fix in Hubstaff UI' link
              instead of a Push button — Hubstaff's REST API doesn't expose
              user-profile writes, so the fix has to happen in their web UI. */}
          {canPush && diff && (
            <span className="muted" style={{fontSize:11}}>
              Fix in <a href="https://app.hubstaff.com" target="_blank" rel="noopener noreferrer"
                style={{color:"var(--accent)",textDecoration:"underline"}}>Hubstaff</a>
            </span>
          )}
          {canPull && diff && (
            <button className="btn sm" disabled={pushing===pullKey}
              title={`Use Wise's ${pullField} — overwrites the DB value. Wise is the payment source of truth. (Hubstaff isn't updated — its API doesn't support it; fix Hubstaff separately in their UI if needed.)`}
              onClick={()=>pullFromWise(pullField)}>
              {pushing===pullKey?"Pulling…":`Use Wise's ${pullField}`}
            </button>
          )}
        </td>
      </tr>
    );
  }

  // Look up an unlinked Wise recipient by numeric ID OR Wisetag and link it
  // on the worker. Preview first, then confirm. Pulls name/email into DB too
  // if the user accepts (uses the existing pullFromWise path after linking).
  const [lookupMode,setLookupMode]=useState("id");   // 'id' | 'wisetag'
  const [lookupInput,setLookupInput]=useState("");
  const [lookupBusy,setLookupBusy]=useState(false);
  const [lookupErr,setLookupErr]=useState("");
  const [lookupPreview,setLookupPreview]=useState(null);    // single recipient (ID mode)
  const [lookupResults,setLookupResults]=useState(null);    // contact list (Wisetag mode)
  const [lookupApplyName,setLookupApplyName]=useState(true);
  const [lookupApplyEmail,setLookupApplyEmail]=useState(true);
  function clearLookup(){
    setLookupInput(""); setLookupPreview(null); setLookupResults(null); setLookupErr("");
  }
  async function lookupWiseById(){
    const id=String(lookupInput).trim().replace(/^#/,"");
    if(!/^\d+$/.test(id)){ setLookupErr("Enter a numeric Wise recipient ID (e.g. 1372559053)."); return; }
    setLookupBusy(true); setLookupErr(""); setLookupPreview(null); setLookupResults(null);
    try{
      const { data, error }=await client.functions.invoke("wise-payouts",{
        body:{ action:"get_recipient", recipient_id:Number(id) } });
      if(error) throw new Error(error.message||"Edge function error");
      if(data?.error) throw new Error(data.error);
      if(!data?.recipient) throw new Error("No recipient returned");
      setLookupPreview(data.recipient);
    }catch(ex){ setLookupErr(String(ex.message||ex)); }
    finally{ setLookupBusy(false); }
  }
  // Wisetag mode — uses /v1/profiles/{id}/contacts?searchTerm=X. Returns a
  // list of CONTACTS (not bank-account recipients). Each contact has a
  // balance_recipient_id you can use as wise_recipient_id, but only for
  // Wise-to-Wise (balance) payments. Most PH contractors paid via bank
  // accounts won't be reachable this way.
  async function lookupWiseByTag(){
    const tag=String(lookupInput).trim().replace(/^@/,"");
    if(!tag){ setLookupErr("Enter a Wisetag (with or without the @)."); return; }
    setLookupBusy(true); setLookupErr(""); setLookupPreview(null); setLookupResults(null);
    try{
      const { data, error }=await client.functions.invoke("wise-payouts",{
        body:{ action:"search_contacts", search_term:tag } });
      if(error) throw new Error(error.message||"Edge function error");
      if(data?.error) throw new Error(data.error);
      const list=Array.isArray(data?.contacts)?data.contacts:[];
      if(!list.length){ setLookupErr(`No contacts matched "${tag}".`); return; }
      setLookupResults(list);
    }catch(ex){ setLookupErr(String(ex.message||ex)); }
    finally{ setLookupBusy(false); }
  }
  // When user clicks a contact in the multi-result list, treat its
  // balance_recipient_id as the wise_recipient_id to preview/link.
  function pickContact(c){
    setLookupPreview({
      id: c.balance_recipient_id,
      name: c.name || c.account_holder_name || "",
      email: null,                                // contacts API doesn't return email
      currency: null,
      account: "Wise balance",                    // honest: this is a Wise-balance recipient
      active: !c.hidden,
      _from_contact: true,                        // marker so the UI can label it
    });
  }
  async function linkLookupResult(){
    if(!lookupPreview) return;
    setLookupBusy(true); setLookupErr("");
    try{
      const updates={ wise_recipient_id: lookupPreview.id };
      // Also append to wise_recipients so the API-draft per-row dropdown in
      // Process & Pay can render this recipient. Without this, even a freshly
      // linked Wisetag balance recipient still falls back to the "no bank
      // recipient" branch and the row can't be drafted from the table.
      const { data: cur } = await client.from("workers")
        .select("wise_recipients").eq("id", w.id).single();
      const list = Array.isArray(cur?.wise_recipients) ? cur.wise_recipients : [];
      if(!list.some(x=>x.id===lookupPreview.id)){
        const label = lookupPreview._from_contact
          ? (lookupPreview.name ? `${lookupPreview.name} (Wisetag)` : "Wisetag balance")
          : (lookupPreview.name || `Recipient ${lookupPreview.id}`);
        list.push({ id: lookupPreview.id, label });
        updates.wise_recipients = list;
      }
      if(lookupApplyName && lookupPreview.name){
        const parts=parseName(lookupPreview.name);
        updates.first_name = parts.first_name || w.first_name;
        updates.middle_name = parts.middle_name || null;
        updates.last_name = parts.last_name || w.last_name;
      }
      if(lookupApplyEmail && lookupPreview.email){
        updates.email = lookupPreview.email;
      }
      const { error }=await client.from("workers").update(updates).eq("id",w.id);
      if(error) throw new Error(error.message);
      logEvent(client,{ company_id:r?.company_id, action:"edit_contractor",
        entity:`${fullName(f)} → Wise #${lookupPreview.id}`,
        detail:{ kind:"link_wise_recipient", recipient_id:lookupPreview.id,
                 applied_name:lookupApplyName, applied_email:lookupApplyEmail } });
      setPushMsg(`Linked Wise recipient #${lookupPreview.id}. Re-open the profile to see the updated fields.`);
      reportBilling(`Wise recipient linked → #${lookupPreview.id}`);
      notifySaved();
      setLookupInput(""); setLookupPreview(null);
    }catch(ex){ setLookupErr(String(ex.message||ex)); }
    finally{ setLookupBusy(false); }
  }

  return (
    <div style={{borderTop:"1px solid var(--border)",paddingTop:12,marginTop:12}}>
      <label style={{fontSize:11,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".03em"}}>
        External sources — drift check
      </label>
      <p className="muted" style={{fontSize:12,margin:"4px 0 8px"}}>
        What Wise and Hubstaff have for this contractor. Mismatches show ⚠️.
        For <b>Wise</b> drift, the "Use Wise's …" button pulls Wise's value into
        the DB (Wise is the payment source of truth). For <b>Hubstaff</b> drift,
        fix it in Hubstaff's web UI — Hubstaff's public API doesn't accept
        user-profile edits.
      </p>
      {pushMsg && <Banner msg={pushMsg} style={{marginBottom:8}}/>}

      {/* Wise */}
      <div style={{marginBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
          <b style={{fontSize:13}}>Wise</b>
          {wiseId
            ? <span className="muted" style={{fontSize:12}}>recipient #{wiseId}</span>
            : <span className="muted" style={{fontSize:12}}>not linked</span>}
          {wiseId && <button className="btn ghost sm" disabled={loadingWise} onClick={loadWise}>
            {loadingWise?"Loading…":"Refresh"}</button>}
        </div>
        {wiseErr && <Banner tone="error" msg={`Wise: ${wiseErr}`} style={{marginBottom:6}}/>}
        {wiseNote && !wiseErr && (
          <p className="muted" style={{fontSize:12,margin:"0 0 6px",fontStyle:"italic"}}>
            {wiseNote}
          </p>
        )}
        {wiseId && wise && (
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr style={{textAlign:"left"}}>
              <th style={{padding:"2px 8px",fontSize:11,color:"var(--muted)",fontWeight:500}}>Field</th>
              <th style={{padding:"2px 8px",fontSize:11,color:"var(--muted)",fontWeight:500}}>DB</th>
              <th style={{padding:"2px 8px",fontSize:11,color:"var(--muted)",fontWeight:500}}>Wise</th>
              <th></th>
            </tr></thead>
            <tbody>
              <FieldRow label="Name"  dbVal={dbName}  extVal={wise.name}  diff={wiseNameDiff}  canPush={false} canPull={true}  pullField="name"/>
              <FieldRow label="Email" dbVal={dbEmail} extVal={wise.email} diff={wiseEmailDiff} canPush={false} canPull={true}  pullField="email"/>
              <FieldRow label="Account" dbVal={null} extVal={`${wise.currency||""} ${wise.account||""}`.trim()||"—"} diff={false} canPush={false}/>
            </tbody>
          </table>
        )}
        {/* Lookup form, shown only when this worker has no Wise recipient
            linked yet. Two modes: by recipient ID (for bank-account payments)
            or by Wisetag (for Wise-balance payments — narrower use case). */}
        {!wiseId && (
          <div style={{marginTop:6,padding:"8px 10px",background:"var(--accent-soft)",borderRadius:4}}>
            <div style={{fontSize:12,marginBottom:6,fontWeight:600}}>Pull from Wise</div>
            {/* Mode tabs */}
            <div style={{display:"flex",gap:4,marginBottom:8}}>
              <button type="button"
                className={"btn sm"+(lookupMode==="id"?"":" ghost")}
                onClick={()=>{setLookupMode("id"); clearLookup();}}>By recipient ID</button>
              <button type="button"
                className={"btn sm"+(lookupMode==="wisetag"?"":" ghost")}
                onClick={()=>{setLookupMode("wisetag"); clearLookup();}}>By Wisetag</button>
            </div>
            <p className="muted" style={{fontSize:11,margin:"0 0 6px"}}>
              {lookupMode==="id"
                ? <>Paste the numeric Wise recipient ID (e.g. <code>1372559053</code>) — the standard route for bank-account payouts.</>
                : <>Search Wise contacts by Wisetag (with or without the @). <b>Caveat:</b> this returns Wise <i>contacts</i> with a <i>balance recipient ID</i> — usable only for Wise-to-Wise payments, not bank accounts. Most PH contractors paid via bank won't be reachable this way.</>}
            </p>
            <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
              <input type="text"
                placeholder={lookupMode==="id"?"numeric Wise recipient ID":"@wisetag or wisetag"}
                value={lookupInput} onChange={e=>setLookupInput(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter"&&!lookupBusy&&lookupInput.trim()){
                  lookupMode==="id"?lookupWiseById():lookupWiseByTag();
                }}}
                style={{fontSize:13,padding:"4px 8px",width:220}}/>
              <button className="btn sm" disabled={lookupBusy||!lookupInput.trim()}
                onClick={lookupMode==="id"?lookupWiseById:lookupWiseByTag}>
                {lookupBusy?"Looking…":"Look up"}</button>
              {(lookupPreview||lookupResults) && (
                <button className="btn ghost sm" disabled={lookupBusy}
                  onClick={clearLookup}>Clear</button>
              )}
            </div>
            {lookupErr && <Banner tone="error" msg={lookupErr} style={{marginTop:6}}/>}

            {/* Wisetag mode: multi-result picker */}
            {lookupResults && !lookupPreview && (
              <div style={{marginTop:8}}>
                <div style={{fontSize:12,fontWeight:600,marginBottom:4}}>
                  {lookupResults.length} contact(s) — pick one
                </div>
                <p className="muted" style={{fontSize:11,margin:"0 0 6px"}}>
                  Wise's search is fuzzy and often returns extra results. Pick the
                  contact that matches this contractor.
                </p>
                <div style={{display:"flex",flexDirection:"column",gap:4}}>
                  {lookupResults.map(c=>(
                    <button key={c.id} type="button"
                      className="btn ghost sm"
                      onClick={()=>pickContact(c)}
                      style={{justifyContent:"flex-start",textAlign:"left",padding:"6px 10px"}}>
                      <b>{c.name||"(no name)"}</b>
                      {c.account_holder_name && c.account_holder_name!==c.name &&
                        <span className="muted" style={{marginLeft:6,fontSize:11}}>· {c.account_holder_name}</span>}
                      <span className="muted" style={{marginLeft:6,fontSize:11}}>
                        · balance recipient #{c.balance_recipient_id}
                      </span>
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* Single-result preview (ID mode OR picked from Wisetag results) */}
            {lookupPreview && (
              <div style={{marginTop:8,padding:8,background:"#fff",border:"1px solid var(--border)",borderRadius:4}}>
                <div style={{fontSize:12,fontWeight:600,marginBottom:4}}>
                  Wise recipient #{lookupPreview.id}
                  {lookupPreview._from_contact && <span className="muted" style={{marginLeft:6,fontWeight:400,fontSize:11}}>(via Wisetag — Wise-balance recipient)</span>}
                </div>
                <div style={{fontSize:13}}>
                  <div>Name: <b>{lookupPreview.name||"—"}</b>
                    {lookupPreview.name && <label style={{marginLeft:10,fontSize:12}}>
                      <input type="checkbox" checked={lookupApplyName}
                        onChange={e=>setLookupApplyName(e.target.checked)}/> Apply name to DB
                    </label>}
                  </div>
                  {lookupPreview.email!==null && lookupPreview.email!==undefined && (
                    <div>Email: <b>{lookupPreview.email||"—"}</b>
                      {lookupPreview.email && <label style={{marginLeft:10,fontSize:12}}>
                        <input type="checkbox" checked={lookupApplyEmail}
                          onChange={e=>setLookupApplyEmail(e.target.checked)}/> Apply email to DB
                      </label>}
                    </div>
                  )}
                  <div className="muted" style={{fontSize:12,marginTop:2}}>
                    {lookupPreview.currency||"—"} · account {lookupPreview.account||"—"} · {lookupPreview.active===false?"inactive":"active"}
                  </div>
                </div>
                <div style={{marginTop:6,display:"flex",gap:6,alignItems:"center"}}>
                  <button className="btn sm" disabled={lookupBusy} onClick={linkLookupResult}>
                    Link recipient {(lookupApplyName||lookupApplyEmail)?"+ apply selected":""}
                  </button>
                  {lookupResults && (
                    <button className="btn ghost sm" disabled={lookupBusy}
                      onClick={()=>setLookupPreview(null)}>← Back to results</button>
                  )}
                </div>
              </div>
            )}
          </div>
        )}
      </div>

      {/* Hubstaff */}
      <div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
          <b style={{fontSize:13}}>Hubstaff</b>
          {hubUserId
            ? <span className="muted" style={{fontSize:12}}>user #{hubUserId}</span>
            : <span className="muted" style={{fontSize:12}}>not linked</span>}
          {hubUserId && <button className="btn ghost sm" disabled={loadingHub} onClick={loadHub}>
            {loadingHub?"Loading…":"Refresh"}</button>}
        </div>
        {hubErr && <Banner tone="error" msg={`Hubstaff: ${hubErr}`} style={{marginBottom:6}}/>}
        {hubUserId && hub && (
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr style={{textAlign:"left"}}>
              <th style={{padding:"2px 8px",fontSize:11,color:"var(--muted)",fontWeight:500}}>Field</th>
              <th style={{padding:"2px 8px",fontSize:11,color:"var(--muted)",fontWeight:500}}>DB</th>
              <th style={{padding:"2px 8px",fontSize:11,color:"var(--muted)",fontWeight:500}}>Hubstaff</th>
              <th></th>
            </tr></thead>
            <tbody>
              <FieldRow label="Name"  dbVal={dbName}  extVal={hub.name}  diff={hubNameDiff}  canPush={true}/>
              <FieldRow label="Email" dbVal={dbEmail} extVal={hub.email} diff={hubEmailDiff} canPush={true}/>
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

// ============================ HUBSTAFF CSV PARSING ===========================
// Mirrors the verified Python parser: quoted CSV, date cols between "Member"
// and "Time off", HH:MM:SS values, trailing totals row skipped.
function parseCSV(text){
  const rows=[]; let i=0,field="",row=[],q=false;
  while(i<text.length){
    const ch=text[i];
    if(q){
      if(ch==='"'){ if(text[i+1]==='"'){field+='"';i++;} else q=false; }
      else field+=ch;
    }else{
      if(ch==='"')q=true;
      else if(ch===","){row.push(field);field="";}
      else if(ch==="\n"||ch==="\r"){
        if(ch==="\r"&&text[i+1]==="\n")i++;
        row.push(field);field="";
        if(row.some(c=>c.trim()!==""))rows.push(row);
        row=[];
      } else field+=ch;
    }
    i++;
  }
  if(field!==""||row.length){row.push(field);if(row.some(c=>c.trim()!==""))rows.push(row);}
  return rows;
}
function hmsToSeconds(s){
  if(!s)return 0; s=String(s).trim();
  if(!s||s==="0:00:00")return 0;
  const p=s.split(":").map(n=>parseInt(n,10)||0);
  const [h,m,sec]=[p[0]||0,p[1]||0,p[2]||0];
  return h*3600+m*60+sec;
}
// Tokenize a person's name into normalized, comparable word tokens:
// strip accents + punctuation, expand the common "Ma." -> "Maria", drop
// generational suffixes. Used by both the strict and loose match keys below.
function nameTokens(raw){
  if(!raw)return [];
  let s=String(raw).normalize("NFD").replace(/[̀-ͯ]/g,"") // strip accents
        .replace(/[.,]/g," ").replace(/\bMa\b/ig,"Maria")
        .replace(/\b(jr|sr|ii|iii|iv|n)\b/ig," ");
  return s.split(/\s+/).filter(Boolean).map(x=>x.toLowerCase());
}
// STRICT key: all tokens, sorted — so word order and extra middle names don't
// break a match ("manuella brittany gamboa" == "gamboa manuella brittany"), and
// the same full name always yields the same key. This is the primary match key.
function nameKey(raw){
  const t=nameTokens(raw);
  return t.length ? [...t].sort().join(" ") : "";
}
// LOOSE key: first + last token only (the legacy behavior). Kept as a fallback
// so a one-name-shorter record can still find its match (e.g. "Manuella Gamboa"
// loose-matches "Manuella Brittany Gamboa").
function looseKey(raw){
  const t=nameTokens(raw);
  if(!t.length)return "";
  return t.length===1?t[0]:`${t[0]} ${t[t.length-1]}`;
}
// Back-compat: normName is still called in a few places; route it to the strict
// key so all matching uses the same, more robust normalization.
function normName(raw){ return nameKey(raw); }
// Parse a Hubstaff daily-report into {dates:[iso], members:[{name,dayseconds{},totalSec,activity}]}
function parseHubstaff(text){
  const rows=parseCSV(text);
  if(!rows.length)throw new Error("Empty CSV");
  const header=rows[0].map(c=>c.trim());
  const mi=header.indexOf("Member")>=0?header.indexOf("Member"):2;
  const ti=header.indexOf("Time off");
  const tot=header.indexOf("Total worked");
  const act=header.indexOf("Activity");
  if(ti<0||tot<0)throw new Error('Not a Hubstaff daily report (missing "Time off"/"Total worked").');
  const dateCols=header.slice(mi+1,ti);
  const members=[];
  for(const r of rows.slice(1)){
    const name=(r[mi]||"").trim();
    if(!name)continue; // totals row
    const dayseconds={};
    dateCols.forEach((d,j)=>{dayseconds[d]=hmsToSeconds(r[mi+1+j]);});
    members.push({
      name, dayseconds,
      timeOffSec:hmsToSeconds(r[ti]),
      totalSec:hmsToSeconds(r[tot]),
      activity:(act>=0?(r[act]||"").trim():""),
    });
  }
  return {dates:dateCols,members};
}

// ============================ TIME IMPORT ====================================
function TimeImport({client,companyId,consolidated,goTab,openPeriodForEdit}){
  const [parsed,setParsed]=useState(null);
  const [err,setErr]=useState("");
  const [matches,setMatches]=useState([]);
  const [committing,setCommitting]=useState(false);
  const [done,setDone]=useState(null);
  const [notice,setNotice]=useState(null);   // {ok, text, unmatched:[names]}
  // Time Approval (the review grid) stays hidden until the user imports + opts
  // to review, or clicks "Review & approve time" — so the tab opens on the
  // import step, not a wall of rows.
  const [revealApproval,setRevealApproval]=useState(false);

  // …but if unapproved time is ALREADY waiting (e.g. ingested by the daily
  // Hubstaff cron, or left pending from a prior session), open the grid on load
  // so those rows can't hide behind the import step. Without this, Process & Pay
  // counts the pending entries while this tab shows nothing to approve.
  useEffect(()=>{
    if(!client||!companyId){return;}
    let cancelled=false;
    client.from("time_entries").select("id",{count:"exact",head:true})
      .eq("company_id",companyId).neq("approval","approved")
      .then(({count})=>{ if(!cancelled && (count||0)>0) setRevealApproval(true); });
    return ()=>{cancelled=true;};
  },[client,companyId]);

  // load this company's hubstaff_name -> worker_id map (incl. inactive, so we can
  // still import a final period for a removed contractor — but we warn).
  const {data:links,reload:reloadLinks}=useQuery(client,c=>{
    let q=c.from("worker_companies").select("worker_id,hubstaff_name,hubstaff_user_id,status,workers(first_name,last_name,status)");
    if(companyId)q=q.eq("company_id",companyId);
    return q;
  },[client,companyId]);

  // #37: resolve an unmatched import row to a contractor, then re-match so their
  // hours import in this run. MATCH-BEFORE-CREATE: we first look for an existing
  // worker (in this company OR anywhere) whose name matches; if found we reuse and
  // (re)link them instead of inserting a duplicate. Only when no existing worker
  // matches do we create a brand-new one. This is the core duplicate fix.
  async function addContractor(member){
    if(!companyId){setErr("Pick a single company first.");return;}
    setErr("");
    let w=null;

    // (0) ID-FIRST (per the standing convention + race safety): if the import
    //     row carries a Hubstaff user_id, look for an existing link in THIS
    //     company that already has that stable id. This catches the case where
    //     another tab / a concurrent sync already added this person (immune to
    //     name differences), so we reuse instead of creating a duplicate or
    //     hitting the worker_companies_company_hubstaff_user partial-unique.
    if(member.user_id!=null){
      const {data:byId}=await client.from("worker_companies")
        .select("worker_id").eq("company_id",companyId)
        .eq("hubstaff_user_id",member.user_id).maybeSingle();
      if(byId?.worker_id){
        w={id:byId.worker_id};
        // keep the visible hubstaff_name label fresh for future name-based matches
        await client.from("worker_companies")
          .update({hubstaff_name:member.name,status:"active"})
          .eq("worker_id",w.id).eq("company_id",companyId);
      }
    }

    // (1) Look for an existing worker that matches this name. Pull every worker
    //     plus this company's links so we can match by hubstaff_name OR real name,
    //     using the same strict/loose keys the import matcher uses.
    const {data:allW}=await client.from("workers")
      .select("id,first_name,middle_name,last_name,status,"+
              "worker_companies(company_id,hubstaff_name,status)");
    const cand=(allW||[]).map(x=>{
      const link=(x.worker_companies||[]).find(l=>l.company_id===companyId);
      return {worker_id:x.id, inactive:(x.status==="ended"),
        keys:[link?.hubstaff_name, `${x.first_name||""} ${x.middle_name||""} ${x.last_name||""}`]
          .filter(Boolean), linkedHere:!!link};
    });
    const sk=nameKey(member.name), lk=looseKey(member.name);
    // ID-first match (w) wins; otherwise fall back to strict then loose name keys.
    let hit=(w && {worker_id:w.id, inactive:false})
          || cand.find(c=>c.keys.some(k=>nameKey(k)===sk))   // strict first
          || cand.find(c=>c.keys.some(k=>looseKey(k)===lk)); // loose fallback

    // store the stable Hubstaff id on the link when the import row carries one,
    // so the NEXT sync matches this person by id regardless of name changes.
    const idCol = member.user_id!=null ? {hubstaff_user_id:member.user_id} : {};
    if(hit){
      // reuse the existing worker — link to this company if not already, and make
      // sure the hubstaff_name label is set so future imports match automatically.
      w={id:hit.worker_id};
      const {error:le}=await client.from("worker_companies")
        .upsert({worker_id:w.id,company_id:companyId,contract:"FT",
                 hubstaff_name:member.name,status:"active",...idCol},
                {onConflict:"worker_id,company_id"});
      if(le){setErr("Link failed: "+le.message);return;}
    }else{
      // (2) No existing match — create a new worker, then link.
      const toks=member.name.trim().split(/\s+/);
      const first=toks[0]||member.name, last=toks.slice(1).join(" ")||"";
      const base={first_name:first,last_name:last,status:"active",
          health_allowance_eligible:true,thirteenth_month_eligible:true};
      let {data:nw,error:e1}=await client.from("workers").insert(base).select().single();
      // Fallback if the DB still has payout_method NOT NULL (pre-migration).
      if(e1 && /payout_method/i.test(e1.message)){
        ({data:nw,error:e1}=await client.from("workers")
          .insert({...base,payout_method:"wise"}).select().single());
        if(!e1) setTimeout(()=>setErr("Note: set "+member.name+"'s real payout method on their profile (defaulted to Wise)."),1500);
      }
      if(e1){setErr("Add failed: "+e1.message+" — run the FINISH_SETUP migration to make payout_method optional.");return;}
      w=nw;
      const {error:e2}=await client.from("worker_companies")
        .insert({worker_id:w.id,company_id:companyId,contract:"FT",
          hubstaff_name:member.name,status:"active",...idCol});
      if(e2){
        // Race: another tab/sync linked this Hubstaff id to the company between
        // our ID-first check and this insert (partial-unique on
        // company_id+hubstaff_user_id). Reuse the winner's worker and drop the
        // orphan worker we just created so we don't leave a duplicate.
        const isUnique=/duplicate key|unique|23505/i.test(e2.message||"");
        if(isUnique && member.user_id!=null){
          const {data:winner}=await client.from("worker_companies")
            .select("worker_id").eq("company_id",companyId)
            .eq("hubstaff_user_id",member.user_id).maybeSingle();
          if(winner?.worker_id){
            await client.from("workers").delete().eq("id",w.id);  // remove the orphan
            w={id:winner.worker_id};
          }else{ setErr("Link failed: "+e2.message);return; }
        }else{ setErr("Link failed: "+e2.message);return; }
      }
    }

    // backfill worker_id onto any ALREADY-IMPORTED time rows for this person
    // (so they attribute to the worker in payroll, which groups by worker_id)
    await client.from("time_entries").update({worker_id:w.id})
      .eq("company_id",companyId).eq("source_name",member.name).is("worker_id",null);
    logEvent(client,{company_id:companyId,action:"add_contractor",entity:member.name,
      detail:{from:"unmatched import row", reused:!!hit}});
    // refresh links, then rebuild the match table so this person now matches
    const {data:fresh}=await client.from("worker_companies")
      .select("worker_id,hubstaff_name,hubstaff_user_id,status,workers(first_name,last_name,status)")
      .eq("company_id",companyId);
    reloadLinks();
    if(parsed){
      const idx=indexLinks(fresh);
      setMatches(parsed.members.map(m=>{const h=matchExisting(m,idx);
        return {...m,key:nameKey(m.name),worker_id:h?h.worker_id:null,matched:!!h,inactive:!!(h&&h.inactive)};}));
    }
    if(parsed){
      // CSV preview is on screen — they'll be included in this same import.
      setErr(`Added ${member.name} — now matched. They'll be included in this import.`);
    }else{
      // API sync (no preview) — their time wasn't written while unmatched, so
      // remove them from the notice list and tell the user to re-sync.
      setNotice(n=>n?{...n,unmatched:(n.unmatched||[]).filter(x=>x!==member.name)}:n);
      setErr(`Added ${member.name}. Re-sync Hubstaff to import their time.`);
    }
  }

  // Build an index of existing contractors keyed BOTH by the strict (sorted-token)
  // key and the loose (first+last) key, derived from BOTH the hubstaff_name and
  // the worker's real name. An import row then matches on any of these, so the
  // same person is recognized even with reordered words, extra middle names, or a
  // name that was stored slightly differently. Strict keys win over loose.
  function indexLinks(linkRows){
    const byId={}, strict={}, loose={};
    (linkRows||[]).forEach(l=>{
      const inactive=(l.status==="ended")||(l.workers?.status==="ended");
      const val={worker_id:l.worker_id,inactive};
      // primary key: the stable Hubstaff user id, when stored
      if(l.hubstaff_user_id!=null && !byId[l.hubstaff_user_id]) byId[l.hubstaff_user_id]=val;
      // fallback keys: normalized name from both the hubstaff label and real name
      const realName=`${l.workers?.first_name||""} ${l.workers?.last_name||""}`;
      [l.hubstaff_name, realName].filter(Boolean).forEach(src=>{
        const sk=nameKey(src), lk=looseKey(src);
        if(sk && !strict[sk]) strict[sk]=val;
        if(lk && !loose[lk]) loose[lk]=val;
      });
    });
    return {byId,strict,loose};
  }
  // Resolve an import member to an existing worker. STABLE ID WINS: if the member
  // carries a Hubstaff user_id we've seen before, match on that (immune to name
  // changes). Otherwise fall back to strict name key, then loose first+last key.
  function matchExisting(member, idx){
    const uid=(member&&typeof member==="object")?member.user_id:null;
    const name=(member&&typeof member==="object")?member.name:member;
    if(uid!=null && idx.byId[uid]) return idx.byId[uid];
    return idx.strict[nameKey(name)] || idx.loose[looseKey(name)] || null;
  }
  function buildMatchTable(p){
    const idx=indexLinks(links);
    return p.members.map(m=>{
      const hit=matchExisting(m, idx);
      return {...m,key:nameKey(m.name),worker_id:hit?hit.worker_id:null,
              matched:!!hit, inactive:!!(hit&&hit.inactive)};
    });
  }
  function onFile(e){
    const f=e.target.files[0]; if(!f)return;
    setErr("");setDone(null);
    const rd=new FileReader();
    rd.onload=()=>{
      try{
        const p=parseHubstaff(rd.result);
        setParsed(p); setMatches(buildMatchTable(p));
      }catch(ex){setErr(ex.message);setParsed(null);}
    };
    rd.readAsText(f);
  }

  // ---- Phase 2: direct sync via the hubstaff-sync Edge Function -------------
  const [orgId,setOrgId]=useState(localStorage.getItem("hs_org")||"");
  const [syncStart,setSyncStart]=useState("");
  const [syncStop,setSyncStop]=useState("");
  const [syncing,setSyncing]=useState(false);
  const [orgs,setOrgs]=useState(null);        // null=unloaded, []=loaded
  const [loadingOrgs,setLoadingOrgs]=useState(false);
  async function listOrgs(){
    setErr("");setLoadingOrgs(true);
    try{
      const {data,error}=await client.functions.invoke("hubstaff-sync",{body:{action:"list_orgs"}});
      if(error)throw new Error(error.message||"Edge function error");
      if(data&&data.error)throw new Error(data.error);
      setOrgs(data.organizations||[]);
      if((data.organizations||[]).length===1) setOrgId(String(data.organizations[0].id));
    }catch(ex){
      setErr("Couldn't list orgs: "+ex.message+
        " — is the hubstaff-sync function deployed and HUBSTAFF_REFRESH_TOKEN set?");
    }finally{ setLoadingOrgs(false); }
  }
  function listDates(start,stop){
    const out=[]; let d=new Date(start+"T00:00:00"); const e=new Date(stop+"T00:00:00");
    while(d<=e){ out.push(d.toISOString().slice(0,10)); d.setDate(d.getDate()+1); }
    return out;
  }
  async function syncFromHubstaff(){
    if(!orgId||!syncStart||!syncStop){setErr("Enter Hubstaff org id, start and stop dates.");return;}
    setErr("");setDone(null);setNotice(null);setSyncing(true);
    try{
      localStorage.setItem("hs_org",orgId);
      if(consolidated){
        // Consolidated (all clients): one org-wide server sync that attributes each
        // project's tracked time to its mapped client (Hubstaff Projects → Clients).
        // The server writes directly (per-client) and protects human-approved rows.
        const {data,error}=await client.functions.invoke("hubstaff-sync",{
          body:{action:"sync_ingest",org_id:Number(orgId),start:syncStart,stop:syncStop}});
        if(error)throw new Error(error.message||"Edge function error");
        if(data&&data.error)throw new Error(data.error);
        const um=(data.unmatched||[]).length;
        // ONE banner for the org-wide server sync (no import-batch → no "Delete this
        // import"); `consolidated` flag tells the done banner to render this text and
        // the count drives the approval-table refresh.
        setDone({ consolidated:true, count:data.rows_written||0, days:listDates(syncStart,syncStop).length,
          text:(data.note ? data.note
            : `Synced org-wide: ${data.rows_written} daily entr${data.rows_written===1?"y":"ies"} imported across ${data.clients_attributed} client(s), to each contractor's current client.`)
            +(um?` ${um} member(s) couldn't be matched to a contractor (or have no client assigned) and were skipped.`:""),
          unmatched:data.unmatched||[] });
        setRevealApproval(true);   // open the approval table (consolidated shows all clients' pending)
        return;
      }
      // Single client: pull per-member daily totals and commit to this company.
      const {data,error}=await client.functions.invoke("hubstaff-sync",{
        body:{org_id:Number(orgId),start:syncStart,stop:syncStop}});
      if(error)throw new Error(error.message||"Edge function error");
      if(data&&data.error)throw new Error(data.error);
      const dates=listDates(syncStart,syncStop);
      const members=(data.members||[]).map(m=>({
        name:m.name, user_id:m.user_id||null,
        dayseconds:m.days||{},         // tracked seconds per day
        ptoseconds:m.pto_days||{},     // paid+approved PTO seconds per day from Hubstaff
        totalSec:m.total||0,           // tracked-only total (back-compat)
        ptoTotalSec:m.pto_total||0,    // PTO-only total
        totalWithPtoSec:m.total_with_pto||((m.total||0)+(m.pto_total||0)),
        timeOffSec:0, activity:""}));
      const p={dates,members};
      const mt=buildMatchTable(p);
      // NOTE: API sync skips the preview entirely — it commits straight to the
      // Time Approval table. (CSV upload still uses the preview via onFile.)
      setMatches(mt);
      if(!members.length){
        setNotice({ok:false,text:"Hubstaff returned no activity for "+syncStart+" → "+syncStop+"."});
        return;
      }
      // auto-commit straight to approval with fromSync=true. writeRows() posts
      // the success notice (with unmatched names) once a write actually happens —
      // including after the user resolves an overlap. When commit pauses on
      // overlap it returns {paused}, and the overlap banner takes over until then.
      await commit(mt,p,true);
    }catch(ex){
      setNotice({ok:false,text:"Sync failed: "+ex.message+
        " — check the hubstaff-sync Edge Function is deployed and its token is set."});
    }finally{ setSyncing(false); }
  }

  const [overlap,setOverlap]=useState(null);   // {rows, existing:[{source_name,work_date}]}

  // Step 1: detect overlap with already-imported entries, then ask how to proceed.
  // Accepts optional explicit matches/parsed (so sync can commit without waiting
  // on React state). Falls back to component state for the manual CSV flow.
  async function commit(mArg, pArg, fromSync){
    if(!companyId){setErr("Pick a single company first (not consolidated).");return {};}
    const M=mArg||matches, P=pArg||parsed;
    setErr("");setOverlap(null);
    const rows=[];
    M.filter(m=>m.matched).forEach(m=>{
      P.dates.forEach(d=>{
        rows.push({company_id:companyId,worker_id:m.worker_id,source_name:m.name,
          work_date:d,
          tracked_seconds:(m.dayseconds?.[d]||0),
          pto_seconds:(m.ptoseconds?.[d]||0),   // 0 for CSV imports (no PTO source)
          activity_pct:(parseFloat(m.activity)||null),approval:"pending"});
      });
    });
    if(!rows.length){setErr("Nothing matched to import.");return {};}
    const names=[...new Set(rows.map(r=>r.source_name))];
    const {data:existing}=await client.from("time_entries")
      .select("source_name,work_date")
      .eq("company_id",companyId)
      .gte("work_date",P.dates[0]).lte("work_date",P.dates[P.dates.length-1])
      .in("source_name",names);
    const existKey=new Set((existing||[]).map(e=>`${e.source_name}|${e.work_date}`));
    const overlapping=rows.filter(r=>existKey.has(`${r.source_name}|${r.work_date}`));
    if(overlapping.length){
      const days=[...new Set(overlapping.map(r=>r.work_date))].sort();
      const ppl=[...new Set(overlapping.map(r=>r.source_name))];
      setOverlap({rows, overlapping, days, ppl, _parsed:P, _matches:M, _fromSync:!!fromSync});
      return {paused:true};   // wait for user choice — caller skips the notice
    }
    await writeRows(rows,"insert",P,M,fromSync);
    return {written:true};
  }

  // Step 2: perform the actual write per the user's chosen mode.
  async function writeRows(rows,mode,pArg,mArg,fromSync){
    const P=pArg||parsed, M=mArg||matches;
    setCommitting(true);setErr("");setOverlap(null);
    const batch=crypto.randomUUID();
    let toWrite=rows.map(r=>({...r,import_batch_id:batch}));
    if(mode==="skip"){
      const names=[...new Set(rows.map(r=>r.source_name))];
      const {data:existing}=await client.from("time_entries")
        .select("source_name,work_date").eq("company_id",companyId)
        .gte("work_date",P.dates[0]).lte("work_date",P.dates[P.dates.length-1])
        .in("source_name",names);
      const ex=new Set((existing||[]).map(e=>`${e.source_name}|${e.work_date}`));
      toWrite=toWrite.filter(r=>!ex.has(`${r.source_name}|${r.work_date}`));
      if(!toWrite.length){setCommitting(false);setErr("All rows already exist — nothing new to import.");return;}
    }
    const {error}=await client.from("time_entries")
      .upsert(toWrite,{onConflict:"company_id,source_name,work_date"});
    setCommitting(false);
    if(error){setErr(error.message);return;}
    // Teach the system the stable Hubstaff id for each matched contractor that
    // carries one, so the NEXT sync matches by id (immune to name edits). Best
    // effort — never blocks the import.
    try{
      const withId=M.filter(m=>m.matched && m.worker_id && m.user_id!=null);
      for(const m of withId){
        await client.from("worker_companies")
          .update({hubstaff_user_id:m.user_id})
          .eq("company_id",companyId).eq("worker_id",m.worker_id)
          .is("hubstaff_user_id",null);   // only fill when not already set
      }
    }catch(_){/* non-fatal */}
    const ppl=M.filter(m=>m.matched).length;
    logEvent(client,{company_id:companyId, action:"import",
      entity:`${P.dates[0]} → ${P.dates[P.dates.length-1]}`,
      detail:{contractors:ppl, rows:toWrite.length, mode, batch}});
    setDone({count:toWrite.length,people:ppl,
             days:P.dates.length,
             unmatched:M.filter(m=>!m.matched).length, batch, mode});
    // For API sync (which skips the preview), surface a success notice with any
    // unmatched names so the user can set up those profiles. The overlap-resolution
    // path also reaches here, so we read fromSync (threaded via overlap._fromSync).
    if(fromSync){
      const unmatched=M.filter(m=>!m.matched).map(m=>m.name);
      setNotice({ok:true,
        text:`Synced ${ppl} contractor(s) (${P.dates[0]} → ${P.dates[P.dates.length-1]}) straight to Time Approval`+
             (mode==="skip"?" — new rows only.":mode==="overwrite"?" — overwrote existing.":"."),
        unmatched});
    }
    // Import succeeded — offer to go straight to Review & Approve (reveals the
    // approval grid). Cancel leaves the user on the import screen.
    if(typeof window!=="undefined" && window.confirm(
      `Time imported (${P.dates[0]} → ${P.dates[P.dates.length-1]}, ${ppl} contractor(s)).\n\n`+
      `Go to Review & Approve now? Choose Cancel to stay on the import screen.`)){
      setRevealApproval(true);
      setTimeout(()=>{ document.getElementById("time-approval-anchor")?.scrollIntoView({behavior:"smooth",block:"start"}); },100);
    }
  }

  // #1: delete the import that was just committed
  async function deleteCurrentImport(){
    if(!done?.batch)return;
    setCommitting(true);
    await client.from("time_entries").delete()
      .eq("company_id",companyId).eq("import_batch_id",done.batch);
    logEvent(client,{company_id:companyId, action:"delete_import",
      entity:"current import", detail:{batch:done.batch, rows:done.count}});
    setCommitting(false);
    setDone(null);setParsed(null);setMatches([]);
    setErr("Last import deleted.");
  }

  const matchedN=matches.filter(m=>m.matched).length;
  const unmatchedN=matches.length-matchedN;

  return (
    <div>
      <div className="card">
        <h2>Hubstaff time import</h2>
        <p className="sub">Two ways to bring in time. Rows match contractors by their
          <b> Hubstaff name</b>; imported hours stage as <b>pending</b> until approved below.</p>
        {consolidated && <div className="banner">Consolidated view: <b>CSV upload</b> is per-client — switch to one client for that. The <b>Hubstaff API sync</b> (Option B) runs org-wide and attributes each project's time to its client (map them under Configuration → Hubstaff Projects → Clients).</div>}

        <div className="grid-2">
          <div>
            <label style={{fontSize:11,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".03em"}}>Option A — upload CSV</label>
            <p className="muted" style={{fontSize:12,margin:"4px 0 8px"}}>Export the daily report from Hubstaff and drop the file here.</p>
            <input type="file" accept=".csv,text/csv" onChange={onFile} disabled={consolidated}/>
          </div>
          <div style={{borderLeft:"1px solid var(--border)",paddingLeft:16}}>
            <label style={{fontSize:11,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".03em"}}>Option B — sync from Hubstaff API</label>
            <p className="muted" style={{fontSize:12,margin:"4px 0 8px"}}>Pulls directly. Needs the <code>hubstaff-sync</code> Edge Function deployed and the token set (see setup).</p>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"flex-end"}}>
              <div><label style={{fontSize:10,color:"var(--muted)"}}>Organization</label><br/>
                {orgs && orgs.length
                  ? <select value={orgId} onChange={e=>setOrgId(e.target.value)} style={{minWidth:140}}>
                      <option value="">Select…</option>
                      {orgs.map(o=><option key={o.id} value={o.id}>{o.name} ({o.id})</option>)}
                    </select>
                  : <input style={{width:110}} value={orgId} onChange={e=>setOrgId(e.target.value)} placeholder="org id"/>}
              </div>
              <button className="btn ghost sm" disabled={loadingOrgs} onClick={listOrgs}>
                {loadingOrgs?"Loading…":(orgs?"↻ Orgs":"List my orgs")}</button>
              <div><label style={{fontSize:10,color:"var(--muted)"}}>Start</label><br/>
                <input type="date" value={syncStart} onChange={e=>{
                  const v=e.target.value; setSyncStart(v);
                  // Auto-fill Stop to the semi-monthly period end for the chosen
                  // start (15th or month-end) — still editable.
                  if(v){ try{ setSyncStop(periodFor(v).end); }catch(_e){} }
                }}/></div>
              <div><label style={{fontSize:10,color:"var(--muted)"}}>Stop <span style={{fontWeight:400}}>(auto)</span></label><br/>
                <input type="date" value={syncStop} onChange={e=>setSyncStop(e.target.value)}/></div>
              <button className="btn" disabled={syncing} onClick={syncFromHubstaff}>
                {syncing?"Importing…":(consolidated?"Import Time (all clients)":"Import Time")}</button>
            </div>
          </div>
        </div>
        {err && <div className="banner" style={{marginTop:12}}>{err}</div>}

        {overlap && <div className="banner" style={{marginTop:12,background:"var(--warn-soft)",borderColor:"#fcd34d",color:"#92400e"}}>
          <b>Overlap detected.</b> {overlap.overlapping.length} row(s) for {overlap.ppl.length} contractor(s)
          on {overlap.days.length} day(s) ({overlap.days[0]}{overlap.days.length>1?` … ${overlap.days[overlap.days.length-1]}`:""})
          already exist from a previous import. How should I proceed?
          <div style={{marginTop:8,display:"flex",gap:8,flexWrap:"wrap"}}>
            <button className="btn sm" onClick={()=>writeRows(overlap.rows,"overwrite",overlap._parsed,overlap._matches,overlap._fromSync)}>Overwrite existing</button>
            <button className="btn ghost sm" onClick={()=>writeRows(overlap.rows,"skip",overlap._parsed,overlap._matches,overlap._fromSync)}>Skip overlapping (import only new)</button>
            <button className="btn ghost sm" onClick={()=>setOverlap(null)}>Cancel</button>
          </div>
          <div style={{marginTop:6,fontSize:12}}>Overlapping: {overlap.ppl.slice(0,8).join(", ")}{overlap.ppl.length>8?"…":""}</div>
        </div>}

        {done && (done.consolidated
          ? <div className="banner success" style={{display:"block",marginTop:12}}>
              {done.text} Review &amp; approve below.
            </div>
          : <div className="banner success" style={{display:"block",marginTop:12}}>
              Imported <b>{done.people} contractor(s)</b> × {done.days||parsed?.dates?.length||"?"} days
              {" "}= {done.count} daily entries
              {done.mode==="skip"?" (new rows only)":done.mode==="overwrite"?" (overwrote existing)":""}.
              {done.unmatched>0 && ` ${done.unmatched} unmatched member(s) skipped.`} Review &amp; approve below.
              <div style={{marginTop:8}}>
                <button className="btn ghost sm" style={{borderColor:"var(--bad)",color:"var(--bad)"}}
                  disabled={committing} onClick={deleteCurrentImport}>Delete this import</button>
              </div>
            </div>)}

        {/* Hubstaff sync notification — success (with any unmatched names to set up)
            or failure. Dismissible. CSV import uses the preview + done banner above. */}
        {notice && <div className="banner" style={{marginTop:12,
            background:notice.ok?"#dcfce7":"#fee2e2",
            borderColor:notice.ok?"#86efac":"#fca5a5",
            color:notice.ok?"#065f46":"#991b1b"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
            <div><b>{notice.ok?"Hubstaff sync complete":"Hubstaff sync failed"}</b> — {notice.text}</div>
            <button className="btn ghost sm" aria-label="Dismiss" onClick={()=>setNotice(null)}>✕</button>
          </div>
          {notice.ok && notice.unmatched && notice.unmatched.length>0 && (
            <div style={{marginTop:10}}>
              <div style={{fontSize:13,marginBottom:6}}>
                <b>{notice.unmatched.length} Hubstaff member(s) didn't match a contractor</b> and were
                skipped. Set up their profile to include their time — add them here, then re-sync.
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {notice.unmatched.map((nm,i)=>(
                  <span key={i} className="pill warn" style={{display:"inline-flex",alignItems:"center",gap:6}}>
                    {nm}
                    {!consolidated &&
                      <button className="btn ghost sm" style={{padding:"0 6px"}}
                        onClick={()=>addContractor({name:nm})}>+ Add</button>}
                  </span>
                ))}
              </div>
            </div>
          )}
        </div>}
      </div>

      {parsed && (
        <div className="card">
          <h2>Preview · {parsed.dates[0]} → {parsed.dates[parsed.dates.length-1]}</h2>
          <p className="sub">{matchedN} matched · {unmatchedN} unmatched ·
            {" "}{parsed.dates.length} days in period.
            Unmatched members need their <code>hubstaff_name</code> set on the contractor.</p>
          <div className="table-scroll"><table>
            <thead><tr>
              <th>Hubstaff member</th><th>Match</th><th>Days worked</th>
              <th title="Time clocked into Hubstaff timer">Tracked (h)</th>
              <th title="Paid + approved time off from Hubstaff time_off_requests">PTO (h)</th>
              <th title="Tracked + PTO — this is what payroll uses">Total (h)</th>
              <th>Activity</th><th></th>
            </tr></thead>
            <tbody>
              {matches.map((m,i)=>{
                const daysWorked=parsed.dates.filter(d=>(m.dayseconds?.[d]||0)>0).length;
                const trackedH=(m.totalSec||0)/3600;
                const ptoH=(m.ptoTotalSec||0)/3600;
                const totalH=trackedH+ptoH;
                return (
                <tr key={i} style={m.inactive?{background:"var(--warn-soft)"}:{}}>
                  <td className="card-title">{m.name}{m.inactive && <span className="muted" style={{fontSize:11}}> · inactive</span>}</td>
                  <td data-label="Match">{m.matched
                       ?(m.inactive
                          ?<span className="pill" style={{background:"#fde68a",color:"#92400e"}}>matched · inactive</span>
                          :<span className="pill active">matched</span>)
                       :<span className="pill warn">no match</span>}</td>
                  <td data-label="Days worked">{daysWorked} <span className="muted">/ {parsed.dates.length}</span></td>
                  <td data-label="Tracked (h)">{trackedH.toFixed(2)}</td>
                  <td data-label="PTO (h)" style={ptoH>0?{color:"var(--accent)",fontWeight:600}:{color:"var(--muted)"}}>
                    {ptoH>0?ptoH.toFixed(2):"—"}
                  </td>
                  <td data-label="Total (h)" style={{fontWeight:600}}>{totalH.toFixed(2)}</td>
                  <td data-label="Activity">{m.activity||"—"}</td>
                  <td className="card-action" style={{textAlign:"right"}}>
                    {!m.matched && !consolidated &&
                      <button className="btn ghost sm" onClick={()=>addContractor(m)}>+ Add contractor</button>}
                  </td>
                </tr>
              );})}
            </tbody>
          </table></div>
          <p className="muted" style={{fontSize:12,marginTop:8}}>
