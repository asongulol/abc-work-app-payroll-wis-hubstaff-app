            Each contractor is stored as one row per day of the period ({matchedN} × {parsed.dates.length}
            {" "}= {matchedN*parsed.dates.length} daily entries), including zero-hour days — that's what the
            payroll calculation needs. The approval and reports views group these back by contractor.</p>
          {matches.some(m=>m.matched&&m.inactive) &&
            <div className="banner" style={{background:"var(--warn-soft)",borderColor:"#fcd34d",color:"#92400e"}}>
              <b>Heads up:</b> {matches.filter(m=>m.matched&&m.inactive).length} matched contractor(s) are
              marked <b>inactive</b> ({matches.filter(m=>m.matched&&m.inactive).map(m=>m.name).join(", ")}).
              Their time will still import — useful for a final period — but confirm you intend to pay them.</div>}
          <div style={{marginTop:14}}>
            <button className="btn" disabled={committing||!matchedN||consolidated} onClick={commit}>
              {committing?"Importing…":`Import ${matchedN} contractor(s) → pending`}</button>
          </div>
        </div>
      )}

      <div id="time-approval-anchor" />
      {revealApproval
        ? <TimeApproval client={client} companyId={companyId} consolidated={consolidated} goTab={goTab} openPeriodForEdit={openPeriodForEdit} key={done?done.count:"a"}/>
        : <div className="card" style={{textAlign:"center"}}>
            <p className="sub" style={{margin:"0 0 8px"}}>Imported time opens for review automatically after an import.
              To add hours by hand for a contractor, open the manual time entry grid.</p>
            <button className="btn" onClick={()=>setRevealApproval(true)}>Create Manual Time Entry</button>
          </div>}
    </div>
  );
}

// ---- delete imports ---------------------------------------------------------
function DeleteImports({client,companyId,consolidated,onDeleted}){
  const [delStart,setDelStart]=useState("");
  const [delStop,setDelStop]=useState("");
  const [busy,setBusy]=useState(false);
  // msg + msgTone — Banner defaults to success styling if tone isn't passed,
  // which used to mislead users into thinking 'no batch id; use date-range
  // delete instead' was a success message. Tone makes it honest.
  const [msg,setMsg]=useState("");
  const [msgTone,setMsgTone]=useState(null);   // 'info' | 'error' | 'success' | null
  const setInfo  =(m)=>{setMsg(m);setMsgTone("info");};
  const setErr   =(m)=>{setMsg(m);setMsgTone("error");};
  const setOk    =(m)=>{setMsg(m);setMsgTone("success");};
  const [armed,setArmed]=useState(null);   // which item is awaiting 2nd-click confirm
  // Extra-friction confirm text — only required when the date range overlaps
  // a locked/paid period. Forces the user to type DELETE to proceed.
  const [confirmText,setConfirmText]=useState("");
  const [viewing,setViewing]=useState(null); // {batchId, rows}

  async function viewBatch(b){
    if(viewing&&viewing.batchId===b.id){setViewing(null);return;}
    let q=client.from("time_entries")
      .select("source_name,work_date,tracked_seconds,approval")
      .eq("import_batch_id",b.id).order("source_name").order("work_date");
    if(companyId)q=q.eq("company_id",companyId);
    const {data}=await q;
    setViewing({batchId:b.id,rows:data||[]});
  }

  // recent import batches for this company (group time_entries by import_batch_id)
  const {data,reload}=useQuery(client,c=>{
    let q=c.from("time_entries")
      .select("import_batch_id,work_date,created_at")
      .order("created_at",{ascending:false}).limit(2000);
    if(companyId)q=q.eq("company_id",companyId);
    return q;
  },[client,companyId]);

  const batches={};
  (data||[]).forEach(r=>{
    const b=r.import_batch_id||"(no batch)";
    const g=batches[b]||(batches[b]={id:r.import_batch_id,rows:0,min:r.work_date,max:r.work_date,when:r.created_at});
    g.rows++; if(r.work_date<g.min)g.min=r.work_date; if(r.work_date>g.max)g.max=r.work_date;
  });
  const batchList=Object.values(batches).slice(0,12);

  // actual deletes (called only after the inline 2nd-click confirm)
  // Deleting imported time should also remove the pay batch built from it,
  // so a calculated draft doesn't linger with no underlying hours. Scoped to
  // OPEN periods overlapping the range (locked/paid statements are records of
  // what was/will be paid — those require the period-level unlock + delete on
  // the Calculate tab). Returns the number of open periods whose payments were
  // cleared.
  async function clearOpenBatchPayments(lo,hi){
    if(!companyId||!lo||!hi) return 0;
    const {data:pps}=await client.from("pay_periods").select("id,period_start,period_end")
      .eq("company_id",companyId).eq("state","open").lte("period_start",hi).gte("period_end",lo);
    const open=(pps||[]).filter(p=>p.period_start<=hi && p.period_end>=lo);
    for(const p of open){ await client.from("payments").delete().eq("pay_period_id",p.id); }
    return open.length;
  }
  async function doDeleteBatch(b){
    setArmed(null);
    if(!b.id){
      setInfo("This group has no batch ID stored (legacy or manual data). "+
              "Use the date-range delete above, covering the dates shown for this batch.");
      return;
    }
    setBusy(true);setMsg("");setMsgTone(null);
    // GUARD: block deleting an import whose dates fall in a saved/locked pay
    // period (lock writes a pay statement off this time — deleting it would
    // strand the payment). Range delete already does this; batch delete must
    // too. Unlock the period on the Calculate tab first if you really need to.
    if(b.min && b.max){
      const {data:locked}=await client.from("pay_periods")
        .select("period_start,period_end,state")
        .eq("company_id",companyId).in("state",["locked","paid"])
        .lte("period_start",b.max).gte("period_end",b.min);
      const hit=(locked||[]).filter(p=>p.period_start<=b.max && p.period_end>=b.min);
      if(hit.length){
        setBusy(false);
        setErr(`Can't delete this import — its dates (${b.min} → ${b.max}) fall in a saved/locked `+
          `pay period: ${hit.map(p=>`${p.period_start}→${p.period_end} (${p.state})`).join(", ")}. `+
          `Unlock that period on the Calculate tab first.`);
        return;
      }
    }
    let q=client.from("time_entries").delete().eq("import_batch_id",b.id);
    if(companyId)q=q.eq("company_id",companyId);
    const {error}=await q;
    if(error){setBusy(false);setErr(error.message);return;}
    const clearedBatches=await clearOpenBatchPayments(b.min,b.max);
    setBusy(false);
    setOk(`Deleted import (${b.rows} rows)`+(clearedBatches?` and its draft pay batch`:"")+`.`);
    reload(); onDeleted&&onDeleted();
  }
  async function doDeleteRange(){
    setArmed(null); setConfirmText("");
    setBusy(true);setMsg("");setMsgTone(null);
    const {error,count}=await client.from("time_entries").delete({count:"exact"})
      .eq("company_id",companyId).gte("work_date",delStart).lte("work_date",delStop);
    if(error){setBusy(false);setErr(error.message);return;}
    const clearedBatches=await clearOpenBatchPayments(delStart,delStop);
    setBusy(false);
    setOk(`Deleted ${count??"?"} time entries in ${delStart} → ${delStop}`+
      (clearedBatches?` and ${clearedBatches} draft pay batch(es)`:"")+`.`);
    reload(); onDeleted&&onDeleted();
  }
  // arm the date-range delete: validate + count + check paid-period overlap,
  // then show an inline confirm whose label spells out the date range AND
  // warns if any paid/locked periods would lose their underlying time data.
  // This is the guard that should have caught the 2026-05-28 accident where
  // a user-typed range silently deleted 97 rows from already-paid periods.
  async function armRange(){
    if(consolidated||!companyId){setErr("Pick a single company to delete by date.");return;}
    if(!delStart||!delStop){setErr("Enter both start and stop dates.");return;}
    if(delStart>delStop){setErr("'From' must be on or before 'To'.");return;}
    // 1. fetch the actual rows that will be deleted (not just a count) so we can
    //    show a per-contractor dry-run preview BEFORE the user confirms. The
    //    window is one or a few half-month periods, so this is bounded
    //    (contractors × days) — typically a few hundred rows at most.
    const {data:rows}=await client.from("time_entries")
      .select("source_name,work_date,tracked_seconds,pto_seconds")
      .eq("company_id",companyId).gte("work_date",delStart).lte("work_date",delStop);
    const count=(rows||[]).length;
    if(!count){setInfo("No time entries in that range.");return;}
    // Group by contractor for the preview: row count, date span, total hours.
    const byName={};
    (rows||[]).forEach(r=>{
      const g=byName[r.source_name]||(byName[r.source_name]={name:r.source_name,rows:0,
        firstDate:r.work_date,lastDate:r.work_date,sec:0});
      g.rows++;
      g.sec+=(r.tracked_seconds||0)+(r.pto_seconds||0);
      if(r.work_date<g.firstDate) g.firstDate=r.work_date;
      if(r.work_date>g.lastDate)  g.lastDate=r.work_date;
    });
    const preview=Object.values(byName)
      .map(g=>({...g,hours:+(g.sec/3600).toFixed(2)}))
      .sort((a,b)=>a.name.localeCompare(b.name));
    // 2. do any locked/paid pay_periods overlap this window? If so, we want
    //    the user to see exactly which ones BEFORE they confirm.
    const {data:pps}=await client.from("pay_periods")
      .select("period_start,period_end,state")
      .eq("company_id",companyId)
      .in("state",["locked","paid"])
      .lte("period_start",delStop)
      .gte("period_end",delStart);
    const overlap=(pps||[]).filter(p=>p.period_start<=delStop && p.period_end>=delStart);
    setMsg("");setMsgTone(null);
    setArmed({type:"range",count,start:delStart,stop:delStop,overlap,preview});
  }

  return (
    <div className="card">
      <h2>Delete imports</h2>
      <p className="sub">Remove time you imported in error or want to re-pull. Click Delete,
        then Confirm. (Tip: re-importing the same period overwrites rather than duplicates,
        so you usually only need this to clear bad data.)</p>

      <div style={{marginBottom:14}}>
        <label style={{fontSize:11,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".03em"}}>By date range {consolidated?"(pick a single company)":""}</label>
        <div style={{display:"flex",gap:8,alignItems:"flex-end",marginTop:6}}>
          <div><label style={{fontSize:10,color:"var(--muted)"}}>From</label><br/>
            <input type="date" value={delStart} onChange={e=>{setDelStart(e.target.value);setArmed(null);}}/></div>
          <div><label style={{fontSize:10,color:"var(--muted)"}}>To</label><br/>
            <input type="date" value={delStop} onChange={e=>{setDelStop(e.target.value);setArmed(null);}}/></div>
          {armed&&armed.type==="range"
            ? (armed.overlap && armed.overlap.length>0
                // SAFE PATH: overlap with locked/paid periods. Require typed
                // 'DELETE' to confirm, and surface exactly which periods.
                ? <span style={{display:"inline-flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                    <span style={{fontSize:12,color:"var(--bad)",fontWeight:600}}>
                      Delete {armed.count} rows · {armed.start} → {armed.stop}
                    </span>
                    <span style={{fontSize:11,color:"var(--bad)"}}>
                      ⚠️ overlaps {armed.overlap.length} locked/paid period(s) ·
                      type DELETE to confirm
                    </span>
                    <input type="text" placeholder="type DELETE"
                      value={confirmText} onChange={e=>setConfirmText(e.target.value)}
                      style={{fontSize:12,padding:"2px 6px",width:110}}/>
                    <button className="btn sm" style={{background:"var(--bad)"}}
                      disabled={busy||confirmText!=="DELETE"}
                      onClick={doDeleteRange}>Confirm</button>
                    <button className="btn ghost sm" onClick={()=>{setArmed(null);setConfirmText("");}}>Cancel</button>
                  </span>
                // NORMAL PATH: no paid periods in range. Single-click confirm,
                // but spell the dates out so the user can't miss what's being deleted.
                : <span style={{display:"inline-flex",gap:6,alignItems:"center"}}>
                    <span style={{fontSize:12,color:"var(--bad)"}}>
                      Delete {armed.count} rows · {armed.start} → {armed.stop}?
                    </span>
                    <button className="btn sm" style={{background:"var(--bad)"}} disabled={busy}
                      onClick={doDeleteRange}>Confirm</button>
                    <button className="btn ghost sm" onClick={()=>setArmed(null)}>Cancel</button>
                  </span>)
            : <button className="btn ghost" style={{borderColor:"var(--bad)",color:"var(--bad)"}}
                disabled={busy||consolidated} onClick={armRange}>Delete range</button>}
        </div>
        {/* Dry-run preview: which contractors + how much time would be deleted.
            Shown whenever a range is armed, so the user sees WHO is affected
            (not just a row count) before confirming. */}
        {armed && armed.type==="range" && armed.preview && armed.preview.length>0 && (
          <div style={{marginTop:8,padding:"8px 10px",background:"#f8fafc",border:"1px solid var(--border)",borderRadius:4}}>
            <div style={{fontSize:12,fontWeight:600,marginBottom:4}}>
              Will delete {armed.count} row(s) across {armed.preview.length} contractor(s):
            </div>
            <div className="table-scroll" style={{maxHeight:180}}>
              <table style={{fontSize:12}}>
                <thead><tr><th>Contractor</th><th>Rows</th><th>Hours</th><th>Date span</th></tr></thead>
                <tbody>
                  {armed.preview.slice(0,30).map((g,i)=>(
                    <tr key={i}>
                      <td>{g.name}</td>
                      <td>{g.rows}</td>
                      <td>{g.hours.toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                      <td className="muted">{g.firstDate===g.lastDate?g.firstDate:`${g.firstDate} → ${g.lastDate}`}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            {armed.preview.length>30 && <p className="muted" style={{fontSize:11,margin:"4px 0 0"}}>…and {armed.preview.length-30} more contractor(s).</p>}
          </div>
        )}
        {/* If the range overlaps locked/paid periods, list them so the user
            sees exactly which periods would lose underlying time data. */}
        {armed && armed.type==="range" && armed.overlap && armed.overlap.length>0 && (
          <div style={{marginTop:8,padding:"8px 10px",background:"#fef3c7",border:"1px solid #fcd34d",borderRadius:4}}>
            <div style={{fontSize:12,fontWeight:600,marginBottom:4,color:"#92400e"}}>
              This range overlaps {armed.overlap.length} {armed.overlap.length===1?"period":"periods"} that {armed.overlap.length===1?"is":"are"} already locked/paid:
            </div>
            <ul style={{margin:0,paddingLeft:18,fontSize:12,color:"#92400e"}}>
              {armed.overlap.slice(0,10).map((p,i)=>(
                <li key={i}>{p.period_start} → {p.period_end} <b>· {p.state}</b></li>
              ))}
              {armed.overlap.length>10 && <li>…and {armed.overlap.length-10} more</li>}
            </ul>
            <p style={{margin:"6px 0 0",fontSize:11,color:"#92400e"}}>
              Deleting time entries here won't unwind the payments themselves, but it
              will break re-calculation, audit reports, and any future re-locking of these
              periods. If these are real paid periods, <b>cancel</b> and narrow your range.
            </p>
          </div>
        )}
      </div>

      <label style={{fontSize:11,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".03em"}}>By import batch (most recent)</label>
      {batchList.length===0?<div className="empty" style={{padding:20}}>No imports recorded.</div>:
      <div className="table-scroll"><table style={{marginTop:6}}>
        <thead><tr><th>Imported</th><th>Date range</th><th>Rows</th><th></th></tr></thead>
        <tbody>
          {batchList.map((b,i)=>(
            <React.Fragment key={i}>
            <tr>
              <td className="card-title">{b.when?new Date(b.when).toLocaleString():"—"}</td>
              <td data-label="Date range">{b.min} → {b.max}</td>
              <td data-label="Rows">{b.rows}</td>
              <td className="card-action" style={{textAlign:"right"}}>
                <button className="btn ghost sm" disabled={!b.id} onClick={()=>viewBatch(b)}>
                  {viewing&&viewing.batchId===b.id?"Hide":"View"}</button>{" "}
                {armed&&armed.type==="batch"&&armed.i===i
                  ? <span style={{display:"inline-flex",gap:6,alignItems:"center"}}>
                      <button className="btn sm" style={{background:"var(--bad)"}} disabled={busy}
                        onClick={()=>doDeleteBatch(b)}>Confirm</button>
                      <button className="btn ghost sm" onClick={()=>setArmed(null)}>Cancel</button>
                    </span>
                  : <button className="btn ghost sm" style={{borderColor:"var(--bad)",color:"var(--bad)"}}
                      disabled={busy} onClick={()=>setArmed({type:"batch",i})}>Delete</button>}</td>
            </tr>
            {viewing&&viewing.batchId===b.id &&
              <tr><td colSpan={4} style={{background:"#fafafa",padding:0}}>
                <div style={{maxHeight:220,overflow:"auto",padding:"8px 10px"}}>
                  <table><thead><tr><th>Contractor</th><th>Date</th><th>Hours</th><th>Status</th></tr></thead>
                    <tbody>{viewing.rows.map((e,j)=>(
                      <tr key={j}><td>{e.source_name}</td><td>{e.work_date}</td>
                        <td>{(e.tracked_seconds/3600).toFixed(2)}</td><td>{e.approval}</td></tr>
                    ))}</tbody></table>
                </div></td></tr>}
            </React.Fragment>
          ))}
        </tbody>
      </table></div>}
      <Banner msg={msg} tone={msgTone||undefined} style={{marginTop:12}} />
    </div>
  );
}

// ---- approval workflow ------------------------------------------------------
function TimeApproval({client,companyId,consolidated,goTab,openPeriodForEdit}){
  // ACTIVE (pending/rejected) only. Bounded, so it never hits PostgREST's
  // 1000-row default cap — which (oldest-first) was hiding recent pending
  // entries behind old approved history and making the grid undercount.
  const {data,loading,reload:reloadActive}=useQuery(client,c=>{
    let q=c.from("time_entries")
      .select("id,source_name,work_date,tracked_seconds,pto_seconds,approval,worker_id")
      .neq("approval","approved")
      .order("work_date",{ascending:true});
    if(companyId)q=q.eq("company_id",companyId);
    return q;
  },[client,companyId]);
  // Approved history (recent) for the "previously approved periods" section.
  const {data:approvedData,reload:reloadApproved}=useQuery(client,c=>{
    let q=c.from("time_entries")
      .select("id,source_name,work_date,tracked_seconds,pto_seconds,approval,worker_id")
      .eq("approval","approved").order("work_date",{ascending:false}).limit(1000);
    if(companyId)q=q.eq("company_id",companyId);
    return q;
  },[client,companyId]);
  const reload=useCallback(()=>{reloadActive();reloadApproved();},[reloadActive,reloadApproved]);

  // active contractors in this company, for the manual-hours picker
  const {data:wcs}=useQuery(client,c=>{
    let q=c.from("worker_companies").select("worker_id,hubstaff_name,workers(first_name,last_name,status)").neq("status","ended");
    if(companyId)q=q.eq("company_id",companyId);
    return q;
  },[client,companyId]);
  const contractorOpts=(wcs||[]).filter(x=>x.workers&&x.workers.status!=="ended")
    .map(x=>({worker_id:x.worker_id, source:x.hubstaff_name||`${x.workers.first_name} ${x.workers.last_name}`.trim(),
      name:`${x.workers.first_name} ${x.workers.last_name}`.trim()}))
    .sort((a,b)=>a.name.localeCompare(b.name));

  // ACTIVE = still needs a decision (pending or rejected). APPROVED = history.
  const active=data||[];
  const approved=approvedData||[];
  const entries=active.concat(approved);   // combined, for prior-state lookups

  function countWorkingDays(start,end){
    if(!start||!end)return 0;
    let wd=0; const s=new Date(start+"T00:00:00"), e=new Date(end+"T00:00:00");
    for(let d=new Date(s); d<=e; d.setDate(d.getDate()+1)){ const w=d.getDay(); if(w>=1&&w<=5) wd++; }
    return Math.max(0, wd - holidaysInRange(start,end,true).length);
  }

  // Scope the grid to ONE canonical pay period at a time. ACTIVE (pending/
  // rejected) entries are bucketed by periodFor(); without this the view unions
  // every non-approved entry — including the days the daily Hubstaff cron stages
  // for the NEXT period — which inflated the span, the counts, and "days worked".
  const [selPeriod,setSelPeriod]=useState(null);   // "start|end" of the chosen period
  const periodBuckets={};
  active.forEach(e=>{
    if(!e.work_date)return;
    const p=periodFor(e.work_date); const key=`${p.start}|${p.end}`;
    (periodBuckets[key]||(periodBuckets[key]={start:p.start,end:p.end,count:0})).count++;
  });
  // oldest period first — you pay the oldest unpaid period next.
  const periodList=Object.values(periodBuckets).sort((a,b)=>a.start.localeCompare(b.start));
  // honour the user's pick while it still has entries; otherwise snap to oldest.
  const selKey=(selPeriod && periodBuckets[selPeriod]) ? selPeriod
             : (periodList[0] ? `${periodList[0].start}|${periodList[0].end}` : null);
  const curPeriod=selKey ? periodBuckets[selKey] : null;
  // only the selected period's active entries feed the grid + the action buttons.
  const activeInPeriod=curPeriod
    ? active.filter(e=> e.work_date>=curPeriod.start && e.work_date<=curPeriod.end)
    : [];
  const pendingAll=active.filter(e=>e.approval==="pending").length;   // across ALL periods

  // group the SELECTED period's active entries by contractor for review
  const byPerson={};
  activeInPeriod.forEach(e=>{(byPerson[e.source_name]=byPerson[e.source_name]||[]).push(e);});
  // Sort by contractor name so row order is STABLE — otherwise object-insertion
  // order (driven by work_date) makes rows jump around when hours change.
  const people=Object.entries(byPerson).sort((a,b)=>a[0].localeCompare(b[0]));

  // span = the canonical period boundaries (not the min/max of present entries),
  // so a partially-tracked current period still reports its true length.
  const pStart=curPeriod?curPeriod.start:undefined, pEnd=curPeriod?curPeriod.end:undefined;
  const periodDays=(pStart&&pEnd)
    ? Math.round((new Date(pEnd+"T00:00:00")-new Date(pStart+"T00:00:00"))/86400000)+1 : 0;
  const workingDays=countWorkingDays(pStart,pEnd);

  // group APPROVED into periods by half-month span (via periodFor)
  const approvedPeriods={};
  approved.forEach(e=>{
    const p=periodFor(e.work_date); const key=`${p.start}|${p.end}`;
    const g=approvedPeriods[key]||(approvedPeriods[key]={start:p.start,end:p.end,entries:[]});
    g.entries.push(e);
  });
  const approvedList=Object.values(approvedPeriods).sort((a,b)=>b.start.localeCompare(a.start));

  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState("");               // FIX: was referenced but never declared (left busy stuck)
  const [showHistory,setShowHistory]=useState(false);
  const [openPeriod,setOpenPeriod]=useState(null);
  // Undo: { label, fn } — toast stays until clicked or dismissed (no time pressure).
  const [undo,setUndo]=useState(null);
  async function runUndo(){
    if(!undo)return;
    const fn=undo.fn; setUndo(null); setBusy(true); setMsg("");
    try{ await fn(); reload(); }
    catch(ex){ setMsg("Undo failed: "+(ex.message||ex)); }
    finally{ setBusy(false); }
  }
  const [editHrs,setEditHrs]=useState({});       // {source_name: hoursString} inline edits
  // per-row "Add hours" expansion: { name -> {mode:'total'|'daily', total:'', daily:{date:hrs}} }
  const [addRow,setAddRow]=useState(null);        // which contractor's add-hours panel is open
  const [addMode,setAddMode]=useState("total");   // 'total' | 'daily'
  const [addTotal,setAddTotal]=useState("");
  const [addDaily,setAddDaily]=useState({});      // {date: hoursString}
  // bottom manual-add row state (for a contractor not yet in the table).
  // addBottomMode toggles between a single period-total field and per-day
  // inputs (one input per date in the period) — same UX as the per-row
  // Add hours panel above. addBottomDaily is the {date: hoursString} map.
  const [addWid,setAddWid]=useState(""); const [addHrs,setAddHrs]=useState("");
  const [addBottomMode,setAddBottomMode]=useState("total");   // 'total' | 'daily'
  const [addBottomDaily,setAddBottomDaily]=useState({});

  // the period to write into: the active period if present, else default by dates
  const writePeriod = (pStart && pEnd) ? {start:pStart,end:pEnd} : periodFor(new Date().toISOString().slice(0,10));
  // Optional manual-entry period override: pick ANY date and we snap to its
  // semi-monthly period (same periodFor() the payroll engine uses), so you can
  // add hours into a period other than the active pending one. Empty = use
  // writePeriod. Drives periodDates() and the manual-add writes/logs.
  const [mpDate,setMpDate]=useState("");
  const effPeriod = mpDate ? {start:periodFor(mpDate).start, end:periodFor(mpDate).end} : writePeriod;

  // list every date in a period (defaults to the active approval period;
  // the bottom "add a contractor not listed" path passes effPeriod so it can
  // target a different, user-chosen period).
  function periodDates(p){
    const per=p||writePeriod;
    const out=[]; let d=new Date(per.start+"T00:00:00"); const e=new Date(per.end+"T00:00:00");
    while(d<=e){out.push(d.toISOString().slice(0,10));d.setDate(d.getDate()+1);}
    return out;
  }

  // edit an existing contractor's TOTAL for the period: put the whole total on the
  // first day, zero the rest (pay engine sums the period, so total is preserved).
  async function setContractorTotal(name, es, hoursStr){
    const h=parseFloat(hoursStr); if(isNaN(h)||h<0)return;
    setBusy(true);setMsg("");
    try{
      const sorted=[...es].sort((a,b)=>a.work_date.localeCompare(b.work_date));
      for(let i=0;i<sorted.length;i++){
        const secs=i===0?Math.round(h*3600):0;
        await client.from("time_entries").update({tracked_seconds:secs}).eq("id",sorted[i].id);
      }
      logEvent(client,{company_id:companyId,action:"manual_hours",entity:name,
        detail:{period:`${writePeriod.start} → ${writePeriod.end}`,hours:h,mode:"edit-total"}});
      setEditHrs(x=>{const n={...x};delete n[name];return n;});
      reload();
    }catch(ex){ setMsg("Couldn't save hours: "+(ex.message||ex)); }
    finally{ setBusy(false); }   // ALWAYS clear busy so the button never sticks on "Working…"
  }

  // Per-row "Add hours": write manual time for a named contractor (already in the
  // table) as a period TOTAL or DAY-BY-DAY. Upserts pending rows for the period.
  async function addHoursForContractor(name, es){
    // resolve worker_id + source_name from the existing rows for this contractor
    const wid=es.find(e=>e.worker_id)?.worker_id || null;
    const source=name;
    setMsg("");
    let rows=[];
    const dates=periodDates();
    // import_batch_id is a uuid column — must be a bare UUID (no "manual-" prefix).
    // Provenance is recorded in the audit log (action:"manual_hours") instead.
    const batch=crypto.randomUUID();
    if(addMode==="total"){
      const h=parseFloat(addTotal);
      if(isNaN(h)||h<=0){setMsg("Enter total hours for "+name+".");return;}
      // Total goes on the period's first day ONLY. Never blanket-write the whole
      // period — the old "zero the other days" wiped real data (e.g. Hubstaff
      // imports) on days the user didn't touch.
      rows=[{company_id:companyId,worker_id:wid,source_name:source,work_date:dates[0],
        tracked_seconds:Math.round(h*3600),approval:"pending",import_batch_id:batch}];
    }else{
      // DAILY: write ONLY the days the user actually entered hours for; leave
      // every other day (and its existing data) untouched.
      rows=dates.filter(dt=>(parseFloat(addDaily[dt])||0)>0).map(dt=>({company_id:companyId,worker_id:wid,
        source_name:source,work_date:dt,tracked_seconds:Math.round((parseFloat(addDaily[dt])||0)*3600),
        approval:"pending",import_batch_id:batch}));
      if(!rows.length){setMsg("Enter hours for at least one day.");return;}
    }
    setBusy(true);
    try{
      const {error}=await client.from("time_entries").upsert(rows,{onConflict:"company_id,source_name,work_date"});
      if(error)throw error;
      const hrs=rows.reduce((s,r)=>s+r.tracked_seconds,0)/3600;
      logEvent(client,{company_id:companyId,action:"manual_hours",entity:name,
        detail:{period:`${writePeriod.start} → ${writePeriod.end}`,hours:+hrs.toFixed(2),mode:addMode}});
      // reset + close the panel
      setAddRow(null);setAddTotal("");setAddDaily({});setAddMode("total");
      reload();
    }catch(ex){ setMsg("Couldn't add hours: "+(ex.message||ex)); }
    finally{ setBusy(false); }
  }

  // bottom row: add manual hours for a contractor NOT yet in the table.
  // Two modes: 'total' (single number → stuffed onto day-0; payroll sums the
  // period so it's preserved) or 'daily' (one number per date → exact placement).
  async function addManualRow(){
    const opt=contractorOpts.find(o=>o.worker_id===addWid);
    if(!opt){setMsg("Pick a contractor.");return;}
    const dates=periodDates(effPeriod);   // user-chosen period (or active default)
    let rows; let totalForLog;
    if(addBottomMode==="daily"){
      // Validate at least one non-zero day was entered
      const perDay=dates.map(dt=>({dt, h:parseFloat(addBottomDaily[dt])||0}));
      if(!perDay.some(d=>d.h>0)){setMsg("Enter hours for at least one day.");return;}
      const batch=crypto.randomUUID();
      // Only the days actually entered — never touch (or zero) untouched days.
      rows=perDay.filter(d=>d.h>0).map(({dt,h})=>({company_id:companyId,worker_id:opt.worker_id,source_name:opt.source,
        work_date:dt,tracked_seconds:Math.round(h*3600),approval:"pending",
        import_batch_id:batch}));
      totalForLog=+perDay.reduce((s,d)=>s+d.h,0).toFixed(2);
    } else {
      const h=parseFloat(addHrs);
      if(isNaN(h)||h<=0){setMsg("Enter hours.");return;}
      const batch=crypto.randomUUID();
      // Total on the period's first day ONLY — never blanket-write the period.
      rows=[{company_id:companyId,worker_id:opt.worker_id,source_name:opt.source,
        work_date:dates[0],tracked_seconds:Math.round(h*3600),approval:"pending",import_batch_id:batch}];
      totalForLog=h;
    }
    setBusy(true);setMsg("");
    try{
      const {error}=await client.from("time_entries").upsert(rows,{onConflict:"company_id,source_name,work_date"});
      if(error)throw error;
      logEvent(client,{company_id:companyId,action:"manual_hours",entity:opt.name,
        detail:{period:`${effPeriod.start} → ${effPeriod.end}`,hours:totalForLog,mode:`add-${addBottomMode}`}});
      setAddWid("");setAddHrs("");setAddBottomDaily({});setAddBottomMode("total");setMpDate("");
      reload();
    }catch(ex){ setMsg("Couldn't add hours: "+(ex.message||ex)); }
    finally{ setBusy(false); }
  }
  // delete one contractor's time entries (this view's period) — also the "reject" path
  // Delete a contractor's time — now immediate (no confirm) with an UNDO that
  // re-inserts the exact rows (same ids, so payroll links stay intact).
  async function deleteContractor(name,ids){
    if(!ids.length)return;
    setBusy(true);setMsg("");
    try{
      // snapshot the full rows first so Undo can restore them verbatim
      const {data:snap}=await client.from("time_entries").select("*").in("id",ids);
      // GUARD: only allow deletion while the time is NOT yet saved & locked.
      // "Saved & locked" = a locked/paid pay_period covers any of these dates
      // (lock writes payments, not time_entries.pay_period_id, so we check the
      // period state by date overlap — same rule as the Imports tab).
      const dts=(snap||[]).map(s=>s.work_date).filter(Boolean).sort();
      if(dts.length){
        const lo=dts[0], hi=dts[dts.length-1];
        const {data:locked}=await client.from("pay_periods")
          .select("period_start,period_end,state")
          .eq("company_id",companyId).in("state",["locked","paid"])
          .lte("period_start",hi).gte("period_end",lo);
        const hit=(locked||[]).filter(p=>p.period_start<=hi && p.period_end>=lo);
        if(hit.length){
          const lbl=hit.map(p=>`${p.period_start}→${p.period_end} (${p.state})`).join(", ");
          setMsg(`Can't delete ${name}'s time — it falls in a saved/locked pay period: ${lbl}. `+
            `Unlock that period on the Calculate tab first (it has a saved pay statement), then delete.`);
          setBusy(false);
          return;
        }
      }
      const {error}=await client.from("time_entries").delete().in("id",ids);
      if(error)throw error;
      logEvent(client,{company_id:companyId,action:"delete_import",
        entity:name,detail:{entries:ids.length,scope:"individual",period:pStart?`${pStart} → ${pEnd}`:""}});
      setUndo({ label:`Removed ${name}'s time (${ids.length} entr${ids.length===1?"y":"ies"}).`,
        fn:async()=>{
          if(snap&&snap.length){
            await client.from("time_entries").insert(snap);
            logEvent(client,{company_id:companyId,action:"undo",entity:name,detail:{of:"delete",entries:snap.length}});
          }
        }});
      reload();
    }catch(ex){ setMsg("Couldn't remove: "+(ex.message||ex)); }
    finally{ setBusy(false); }
  }
  // Approve / reject — captures each row's PRIOR status so Undo restores them
  // individually (handles mixed prior states correctly).
  async function setApproval(ids,status){
    if(!ids.length)return;
    setBusy(true);setMsg("");
    try{
      const idSet=new Set(ids);
      const prior=entries.filter(e=>idSet.has(e.id)).map(e=>({id:e.id,approval:e.approval}));
      // Chunk the id list: a single .in() with hundreds of UUIDs builds a URL
      // that exceeds PostgREST's length limit, so the request silently fails —
      // which is why "Approve all pending" appeared to do nothing.
      for(let i=0;i<ids.length;i+=100){
        const {error}=await client.from("time_entries").update({approval:status}).in("id",ids.slice(i,i+100));
        if(error)throw error;
      }
      logEvent(client,{company_id:companyId, action:status==="approved"?"approve":"reject",
        entity:pStart?`${pStart} → ${pEnd}`:"time entries", detail:{entries:ids.length}});
      const verb=status==="approved"?"Approved":"Rejected";
      setUndo({ label:`${verb} ${ids.length} entr${ids.length===1?"y":"ies"}.`,
        fn:async()=>{
          // restore prior statuses, grouping ids by their previous value
          const byStatus={};
          prior.forEach(p=>{(byStatus[p.approval]=byStatus[p.approval]||[]).push(p.id);});
          for(const [st,idl] of Object.entries(byStatus)){
            for(let i=0;i<idl.length;i+=100){
              await client.from("time_entries").update({approval:st}).in("id",idl.slice(i,i+100));
            }
          }
          logEvent(client,{company_id:companyId,action:"undo",entity:"approval",detail:{of:status,entries:ids.length}});
        }});
      reload();
      // Approving moves the workflow forward — jump straight to Calculate (and
      // load that period there, refreshing its list so the now-approved batch
      // shows). Rejecting stays put.
      if(status==="approved"){
        // Anchor on the approved entries' own dates (robust when activeDates /
        // pStart is empty, e.g. fresh manual entries), then map to the canonical
        // period so Calculate loads the right batch.
        const dts=entries.filter(e=>idSet.has(e.id)).map(e=>e.work_date).filter(Boolean).sort();
        const anchor=dts[0]||pStart;
        const per=anchor?periodFor(anchor):null;
        // Approve navigates to Calculate (the batch appearing there is the
        // confirmation), so don't leave the "Approved N entries" undo banner to
        // linger on this tab when the user returns. Reject keeps it in place.
        if(typeof openPeriodForEdit==="function" && per){ setUndo(null); openPeriodForEdit({start:per.start, end:per.end}); }
        else if(typeof goTab==="function"){ setUndo(null); goTab("payroll"); }
      }
    }catch(ex){ setMsg("Couldn't update approval: "+(ex.message||ex)); }
    finally{ setBusy(false); }
  }
  const pendingIds=activeInPeriod.filter(e=>e.approval==="pending").map(e=>e.id);
  const pendingTotal=pendingIds.length;

  // Only blank the card on the FIRST load (data still null). On reloads after
  // approve/delete, `loading` flips true briefly but data is already present —
  // keep the table rendered so the in-progress add-hours panel and scroll
  // position survive. (Same guard as the Contractors modal fix.)
  if(loading && !data)return <div className="card"><Skeleton rows={5}/></div>;
  return (
    <div className="card">
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
        <div>
          <h2>Enter Manual Time</h2>
          <p className="sub">Add hours by hand below, or review any staged imports before they become payable.
            {" "}{pendingTotal} pending entr{pendingTotal===1?"y":"ies"} in this period.
            {pStart && <span> · {pStart} → {pEnd} ({periodDays} days, {workingDays} working).</span>}
            {pendingAll>pendingTotal &&
              <span> · {pendingAll-pendingTotal} more pending in {periodList.length-1} other period{periodList.length-1===1?"":"s"} — use the period picker.</span>}</p>
        </div>
        {people.length>0 &&
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          {periodList.length>1 &&
            <select value={selKey||""} onChange={e=>setSelPeriod(e.target.value)}
              title="Choose which pending pay period to review" style={{padding:"6px 8px"}}>
              {periodList.map(p=>{ const k=`${p.start}|${p.end}`;
                return <option key={k} value={k}>{p.start} → {p.end} ({p.count})</option>; })}
            </select>}
          <button className="btn" disabled={busy||!pendingTotal}
            onClick={()=>setApproval(pendingIds,"approved")}>
            {busy?"Working…":`Approve all in period (${pendingTotal})`}</button>
          <button className="btn ghost" disabled={busy||!pendingTotal}
            onClick={()=>setApproval(pendingIds,"rejected")}>
            Reject all in period</button>
        </div>}
      </div>

      {/* Undo toast — stays until clicked or dismissed (no auto-expire). */}
      {undo && <div className="banner" style={{marginTop:10,display:"flex",justifyContent:"space-between",
          alignItems:"center",gap:12,background:"#eef2ff",borderColor:"#c7d2fe",color:"#3730a3"}}>
        <span>{undo.label}</span>
        <span style={{display:"inline-flex",gap:6,whiteSpace:"nowrap"}}>
          <button className="btn sm" disabled={busy} onClick={runUndo}>Undo</button>
          <button className="btn ghost sm" onClick={()=>setUndo(null)}>Dismiss</button>
        </span>
      </div>}

      <Banner msg={msg} style={{marginTop:10}} />

      {(consolidated || !companyId)
        ? <div className="empty">{consolidated
            ? "Time review is per-company — switch to a single company to review and approve time."
            : "Pick a single company to review time."}</div>
        : <div className="table-scroll"><table>
        <thead><tr>
          <th>Contractor</th>
          <th>Days in period</th>
          <th>Working days</th>
          <th>Days worked</th>
          <th title="Time clocked into Hubstaff timer">Tracked (h)</th>
          <th title="Paid time off from Hubstaff (status=approved)">PTO (h)</th>
          <th title="Tracked + PTO — this is what payroll uses">Total (h)</th>
          <th>Status</th><th></th>
        </tr></thead>
        <tbody>
          {people.map(([name,es])=>{
            const ids=es.map(e=>e.id);
            const trackedSec=es.reduce((s,e)=>s+(e.tracked_seconds||0),0);
            const ptoSec=es.reduce((s,e)=>s+(e.pto_seconds||0),0);
            const trackedH=(trackedSec/3600).toFixed(2);
            const ptoH=(ptoSec/3600).toFixed(2);
            const totalH=((trackedSec+ptoSec)/3600).toFixed(2);
            const daysWorked=es.filter(e=>(e.tracked_seconds||0)>0 || (e.pto_seconds||0)>0).length;
            const statuses=new Set(es.map(e=>e.approval));
            const status=statuses.size===1?[...statuses][0]:"mixed";
            const editing=editHrs[name]!==undefined;
            const adding=addRow===name;
            return (
              <React.Fragment key={name}>
              <tr>
                <td className="card-title"><b>{name}</b></td>
                <td data-label="Days in period">{periodDays}</td>
                <td data-label="Working days">{workingDays}</td>
                <td data-label="Days worked">{daysWorked}</td>
                {/* Tracked is editable (manual override of Hubstaff timer). */}
                <td data-label="Tracked (h)">
                  {editing
                    ? <span style={{display:"inline-flex",gap:4,alignItems:"center"}}>
                        <input type="number" step="0.01" autoFocus style={{width:80}}
                          value={editHrs[name]} onChange={e=>setEditHrs(x=>({...x,[name]:e.target.value}))}/>
                        <button className="btn sm" disabled={busy} onClick={()=>setContractorTotal(name,es,editHrs[name])}>✓</button>
                        <button className="btn ghost sm" onClick={()=>setEditHrs(x=>{const n={...x};delete n[name];return n;})}>✕</button>
                      </span>
                    : <span>{trackedH} <button className="btn ghost sm" title="Edit tracked hours (Hubstaff timer time)"
                        style={{padding:"1px 6px"}} onClick={()=>setEditHrs(x=>({...x,[name]:trackedH}))}>✎</button></span>}
                </td>
                {/* PTO is API-sourced (not editable here); shown as muted if zero. */}
                <td data-label="PTO (h)" style={ptoSec>0?{color:"var(--accent)",fontWeight:600}:{color:"var(--muted)"}}>
                  {ptoSec>0?ptoH:"—"}
                </td>
                {/* Total = Tracked + PTO. This is what payroll uses. */}
                <td data-label="Total (h)" style={{fontWeight:600}}>{totalH}</td>
                <td data-label="Status"><span className="pill" style={status==="rejected"?{background:"#fee2e2",color:"var(--bad)"}:{background:"var(--warn-soft)",color:"var(--warn)"}}>
                      {status}</span></td>
                <td className="card-action" style={{textAlign:"right",whiteSpace:"nowrap"}}>
                  <button className="btn sm" disabled={busy} onClick={()=>setApproval(ids,"approved")}>Approve</button>{" "}
                  <button className="btn ghost sm" onClick={()=>{
                    // open the inline add-hours panel for THIS contractor, PRE-FILLED
                    // with the hours already on each day so they're edited, not wiped.
                    if(adding){ setAddRow(null); setMsg(""); return; }
                    const seed={};
                    es.forEach(e=>{ const h=e.tracked_seconds/3600; if(h>0) seed[e.work_date]=String(+h.toFixed(2)); });
                    setAddRow(name); setAddMode("total"); setAddTotal(totalH); setAddDaily(seed); setMsg("");
                  }}>{adding?"Close":"Add hours"}</button>{" "}
                  {/* Delete is immediate now — the Undo toast above restores it (no confirm step). */}
                  <button className="btn ghost sm" style={{borderColor:"var(--bad)",color:"var(--bad)"}} disabled={busy}
                    title="Remove this contractor's time for the period — you can Undo right after"
                    onClick={()=>deleteContractor(name,ids)}>Delete</button>
                </td>
              </tr>
              {adding && (
                <tr style={{background:"#f8fafc"}}>
                  <td colSpan={9}>
                    <div style={{display:"flex",flexWrap:"wrap",gap:12,alignItems:"flex-end"}}>
                      <div>
                        <div style={{fontSize:12,color:"var(--muted)",marginBottom:4}}>
                          Add hours for <b>{name}</b> · {writePeriod.start} → {writePeriod.end}
                        </div>
                        <label style={{fontSize:11,color:"var(--muted)"}}>Entry</label><br/>
                        <select value={addMode} onChange={e=>setAddMode(e.target.value)}>

// ============================ PAYROLL RUN ====================================
const HA_ANNUAL=20000, HA_ELIG_DAYS=180, PERIODS_PER_YEAR=24;
const FT_DAY_HOURS=8, PT_DAY_HOURS=4;   // hours per working day by contract
const PAYOUT_CHANNELS=["wise","bpi","gcash","paymaya","paypal"];  // matches the files

function money(n,cur){ if(n==null)return "—";
  return (cur==="USD"?"$":"PHP ")+Number(n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); }

// --- holiday engine ---------------------------------------------------------
// Expected hours = (all calendar days in period x day-hours) - (day-hours per
// observed holiday in period). Day-hours = 8 (FT) / 4 (PT).
function _nthWeekday(y,m,wd,n){const f=new Date(y,m,1).getDay();return new Date(y,m,1+((wd-f+7)%7)+(n-1)*7);}
function _lastWeekday(y,m,wd){const last=new Date(y,m+1,0);return new Date(y,m,last.getDate()-((last.getDay()-wd+7)%7));}
function _easter(y){const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,
  f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,
  l=(32+2*e+2*i-h-k)%7,mm=Math.floor((a+11*h+22*l)/451),mo=Math.floor((h+l-7*mm+114)/31),
  da=((h+l-7*mm+114)%31)+1;return new Date(y,mo-1,da);}
const _isoD=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
// Shift a holiday that lands on a weekend to the nearest working day (US
// observance): Saturday -> the Friday before, Sunday -> the Monday after.
// Both are the closest weekday (1 day away vs 2). Weekdays pass through.
function _observed(d){
  const o=new Date(d), wd=o.getDay();
  if(wd===6) o.setDate(o.getDate()-1);       // Sat -> Fri
  else if(wd===0) o.setDate(o.getDate()+1);  // Sun -> Mon
  return o;
}
// Default observed holidays for a given year (the offices' list). Fixed-date
// holidays are shifted to the nearest working day when they fall on a weekend.
function defaultHolidays(year){
  const e=_easter(year), gf=new Date(e); gf.setDate(e.getDate()-2);
  const thx=_nthWeekday(year,10,4,4), aft=new Date(thx); aft.setDate(thx.getDate()+1);
  return [
    {name:"New Year's Day", date:_isoD(_observed(new Date(year,0,1)))},
    {name:"Martin Luther King Jr. Day", date:_isoD(_nthWeekday(year,0,1,3))},
    {name:"Good Friday", date:_isoD(gf)},
    {name:"Memorial Day", date:_isoD(_lastWeekday(year,4,1))},
    {name:"Independence Day", date:_isoD(_observed(new Date(year,6,4)))},
    {name:"Labor Day", date:_isoD(_nthWeekday(year,8,1,1))},
    {name:"Indigenous Peoples' Day", date:_isoD(_nthWeekday(year,9,1,2))},
    {name:"Thanksgiving Day", date:_isoD(thx)},
    {name:"Day after Thanksgiving", date:_isoD(aft)},
    {name:"Christmas Day", date:_isoD(_observed(new Date(year,11,25)))},
  ];
}
// Load holidays for a year: user-saved overrides (localStorage) else defaults.
function getHolidays(year){
  try{const raw=localStorage.getItem("holidays_"+year); if(raw)return JSON.parse(raw);}catch(e){}
  return defaultHolidays(year);
}
function saveHolidays(year,list){ localStorage.setItem("holidays_"+year, JSON.stringify(list)); }
function _isWeekday(dateStr){ const wd=new Date(dateStr+"T00:00:00").getDay(); return wd>=1 && wd<=5; }
// count holiday dates within [start,end] inclusive. weekdayOnly: only holidays
// on a Mon-Fri count. Default holidays are already shifted to the nearest
// working day (see _observed), so weekend-landing holidays still reduce
// expected work; weekdayOnly only drops manually-entered weekend overrides.
// Scan adjacent years too: an observance shift can move a holiday across a
// year boundary (New Year's Day on a Saturday is observed Dec 31 prior year).
function holidaysInRange(start,end,weekdayOnly){
  const ys=new Date(start).getFullYear(), ye=new Date(end).getFullYear();
  let all=[]; for(let y=ys-1;y<=ye+1;y++) all=all.concat(getHolidays(y));
  return all.filter(h=>h.date>=start && h.date<=end && (!weekdayOnly || _isWeekday(h.date)));
}
// Expected hours: WORKING DAYS (Mon-Fri) in period x dayHours, minus dayHours
// for each holiday that falls on a working day.
function expectedHours(contract, start, end){
  const dayH = contract==="PT"?PT_DAY_HOURS:FT_DAY_HOURS;
  const s=new Date(start+"T00:00:00"), e=new Date(end+"T00:00:00");
  let weekdays=0;
  for(let d=new Date(s); d<=e; d.setDate(d.getDate()+1)){
    const wd=d.getDay(); if(wd>=1 && wd<=5) weekdays++;
  }
  const hol=holidaysInRange(start,end,true).length;   // weekday holidays only
  return Math.max(0, weekdays*dayH - hol*dayH);
}

// Health allowance for a period (fixed 20k/yr, eligible 6 months after hire).
function healthAllowance(hire, ps, pe){
  if(!hire)return 0;
  const h=new Date(hire), elig=new Date(h.getTime()+HA_ELIG_DAYS*86400000);
  if(new Date(pe) < elig) return 0;
  // anniversary mode: full 20k in the period containing the hire-month/day anniversary
  const y=new Date(ps).getFullYear();
  const anniv=new Date(y, h.getMonth(), Math.min(h.getDate(),28));
  if(new Date(ps)<=anniv && anniv<=new Date(pe) && anniv>=elig) return HA_ANNUAL;
  return 0;
}
// 13th-month: (months worked this year / 12) x MONTHLY rate, then SPLIT IN TWO
// (paid across two periods). monthly = per-period rate x 2.
//   full 13th  = (monthsWorked/12) * (ratePhp*2)
//   per payment = full 13th / 2  = (monthsWorked/12) * ratePhp
// monthsWorked counts from Jan 1 (or hire date if later) through the period end,
// capped at 12. Editable per payee in the table.
function monthsWorkedInYear(hire, periodEnd){
  const end=new Date(periodEnd+"T00:00:00");
  const yearStart=new Date(end.getFullYear(),0,1);
  let from=yearStart;
  if(hire){ const h=new Date(hire); if(h>from && h.getFullYear()===end.getFullYear()) from=h; }
  // whole + partial months between `from` and `end`
  let months=(end.getFullYear()-from.getFullYear())*12 + (end.getMonth()-from.getMonth());
  months += (end.getDate() - from.getDate())/30;   // partial month
  return Math.max(0, Math.min(12, months));
}
function thirteenthAccrual(ratePhp, hire, periodEnd){
  if(!ratePhp) return 0;
  const mw=monthsWorkedInYear(hire, periodEnd);
  return +((mw/12) * ratePhp).toFixed(2);   // = half of the full annual 13th
}

// --- semi-monthly periods + arrears pay dates -------------------------------
const iso=d=>d.toISOString().slice(0,10);
const lastDay=(y,m)=>new Date(y,m+1,0).getDate();   // m is 0-based
// Given any date string, return the half-month period {start,end,payDate}.
// Pay rule (arrears): 1-15 -> paid end of SAME month; 16-end -> paid 15th of NEXT month.
function periodFor(dateStr){
  const d=new Date(dateStr+"T00:00:00");
  const y=d.getFullYear(), m=d.getMonth(), day=d.getDate();
  if(day<=15){
    return {start:iso(new Date(y,m,1)), end:iso(new Date(y,m,15)),
            payDate:iso(new Date(y,m,lastDay(y,m)))};            // end of same month
  } else {
    const ny=m===11?y+1:y, nm=m===11?0:m+1;
    return {start:iso(new Date(y,m,16)), end:iso(new Date(y,m,lastDay(y,m))),
            payDate:iso(new Date(ny,nm,15))};                    // 15th of next month
  }
}

// Editable holiday config for a given year (persists in localStorage).
function HolidayEditor({year, onChange}){
  const [list,setList]=useState(getHolidays(year));
  useEffect(()=>{ setList(getHolidays(year)); },[year]);
  function commit(next){ setList(next); saveHolidays(year,next); onChange&&onChange(); }
  function edit(i,field,val){ const n=list.map((h,j)=>j===i?{...h,[field]:val}:h); commit(n); }
  function add(){ commit([...list,{name:"New holiday",date:`${year}-01-01`}]); }
  function del(i){ commit(list.filter((_,j)=>j!==i)); }
  function reset(){ localStorage.removeItem("holidays_"+year); commit(defaultHolidays(year)); }
  return (
    <div className="card">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <div><h2>Observed holidays · {year}</h2>
          <p className="sub">Each holiday in a period reduces Expected hours by one day
            (8h full-time / 4h part-time). Edit, add, or remove — changes save automatically.</p></div>
        <div style={{display:"flex",gap:8}}>
          <button className="btn ghost sm" onClick={add}>+ Add</button>
          <button className="btn ghost sm" onClick={reset}>Reset to defaults</button>
        </div>
      </div>
      <div className="table-scroll"><table>
        <thead><tr><th>Holiday</th><th>Date</th><th></th></tr></thead>
        <tbody>
          {list.map((h,i)=>(
            <tr key={i}>
              <td data-label="Holiday"><input value={h.name} onChange={e=>edit(i,"name",e.target.value)} style={{width:"100%",border:"none",fontSize:13}}/></td>
              <td data-label="Date"><input type="date" value={h.date} onChange={e=>edit(i,"date",e.target.value)}/></td>
              <td className="card-action" style={{textAlign:"right"}}><button className="btn ghost sm" onClick={()=>del(i)}>Remove</button></td>
            </tr>
          ))}
        </tbody>
      </table></div>
    </div>
  );
}

function Payroll({client,companyId,consolidated,confirmBillingDirty,openContractor,goTab,pendingPeriod,consumePendingPeriod}){
  const gate = (label)=> typeof confirmBillingDirty==="function" ? confirmBillingDirty(label) : true;
  const today=new Date();
  const def=periodFor(iso(today));
  const [start,setStart]=useState(def.start);
  const [end,setEnd]=useState(def.end);
  const [payDate,setPayDate]=useState(def.payDate);
  const [autoDates,setAutoDates]=useState(true);   // auto-fill from imported file dates
  const [loadNonce,setLoadNonce]=useState(0);      // bump to force a reload even when the dates are unchanged
  const [fx,setFx]=useState(58.0);            // PHP per 1 USD (reference only; paid in PHP)
  const [fxAuto,setFxAuto]=useState(true);    // true until the user types over it
  const [fxNote,setFxNote]=useState("");      // shows "live rate as of …"
  const [includeHA,setIncludeHA]=useState(true);
  const [include13,setInclude13]=useState(false);
  const [rows,setRows]=useState(null);
  const [period,setPeriod]=useState(null);    // {id,state}
  const [msg,setMsg]=useState("");
  const [busy,setBusy]=useState(false);
  // When true, the debounced auto-save is paused. Set during a statement
  // delete so a saveDraft timer scheduled BEFORE the delete (e.g. from the
  // initial load) can't fire mid-delete and re-upsert the row we just removed.
  const suppressSave=React.useRef(false);
  // Approved time that Calculate dropped (unmatched name / not linked to this
  // company), surfaced as a banner so it never silently vanishes.
  const [dropped,setDropped]=useState([]);
  // Approved-time batches grouped by pay period (the list on this tab).
  // Seed from the last-known list (per company) so the Calculate tab shows its
  // batch list INSTANTLY on open; loadBatches() then refreshes in the background.
  const [batches,setBatches]=useState(()=>{ try{ const c=(companyId&&!consolidated)&&sessionStorage.getItem("eis_batches_"+companyId); return c?JSON.parse(c):null; }catch{ return null; } });
  const [batchesPartial,setBatchesPartial]=useState(false);   // true = only the recent ~10 are loaded
  // Default the batch list to the actionable ones (not-calculated + draft);
  // locked/paid are hidden behind a toggle so they don't bury the to-do items.
  const [showFinishedBatches,setShowFinishedBatches]=useState(false);
  // Set true by "Calculate this batch" so the date-change loadSaved effect
  // defers to calculate() instead of loading the old draft (avoids a race).
  const pendingCalc=React.useRef(false);
  const scrollToBatch=React.useRef(false);   // set by View/Open so we scroll to the loaded batch card once it renders
  // Bumped by calcBatch so the calculate() trigger fires even when the period
  // dates are UNCHANGED (re-calculating the already-loaded batch). A [start,end]
  // dep alone silently no-ops then, leaving "Calculating…" stuck forever.
  const [calcNonce,setCalcNonce]=useState(0);
  const [showHol,setShowHol]=useState(false);
  const [holTick,setHolTick]=useState(0);     // bump to re-read holidays after edits
  const [undo,setUndo]=useState(null);        // {label,fn} — rollback after a destructive recalculation
  const periodHolidays=holidaysInRange(start,end,true);   // weekday holidays (what's subtracted)
  const ftExp=expectedHours("FT",start,end), ptExp=expectedHours("PT",start,end);
  // sort + filter for the pay-statements table (display only; edits key by worker_id)
  const {rows:sfRows, Th:SfTh, q:sfQ, setQ:sfSetQ}=useSortFilter(rows||[],{
    name:r=>r.name, worked:r=>r.worked, ratio:r=>r.ratio, rate:r=>r.rate,
    net:r=>r.net, method:r=>r.method,
  },["name"]);

  // default the period from the most recent imported time. If that period is
  // already locked/paid, advance to the NEXT period so you start fresh instead
  // of reloading a finished draft.
  useEffect(()=>{
    if(!client||!companyId||!autoDates)return;
    (async()=>{
      const {data}=await client.from("time_entries").select("work_date")
        .eq("company_id",companyId).order("work_date",{ascending:false}).limit(1);
      if(!(data&&data[0]))return;
      let p=periodFor(data[0].work_date);
      // if that period is locked/paid, jump to the next half-month
      const {data:pp}=await client.from("pay_periods").select("state")
        .eq("company_id",companyId).eq("period_start",p.start).eq("period_end",p.end).maybeSingle();
      if(pp && pp.state && pp.state!=="open"){
        const nextDay=new Date(p.end+"T00:00:00"); nextDay.setDate(nextDay.getDate()+1);
        p=periodFor(nextDay.toISOString().slice(0,10));
      }
      setStart(p.start);setEnd(p.end);setPayDate(p.payDate);
    })();
  },[client,companyId,autoDates]);

  // On mount / when company+period settle, restore any saved draft or locked
  // snapshot so a calculated payroll survives tab-switches and refreshes.
  useEffect(()=>{ if(client&&companyId&&start&&end){ if(pendingCalc.current) return; loadSaved(); } /* eslint-disable-next-line */
  },[client,companyId,start,end,loadNonce]);

  // Cross-tab: another tab asked to open a specific period here for editing
  // (e.g. Unlock from Process & Pay). Point the dates at it and force a reload
  // via loadNonce — the dates may already equal this period (e.g. it was just
  // locked here), in which case setStart alone wouldn't re-fire loadSaved. Also
  // refresh the batch list so the now-open draft shows without a manual reload.
  useEffect(()=>{
    if(!pendingPeriod||!pendingPeriod.start) return;
    if(consumePendingPeriod) consumePendingPeriod();
    setAutoDates(false);
    applyStart(pendingPeriod.start);
    loadBatches();
    setLoadNonce(n=>n+1);
    /* eslint-disable-next-line */
  },[pendingPeriod]);

  // "Calculate this batch" sets the period dates then flips pendingCalc; once
  // the new dates have settled, run calculate() (which rebuilds + saves the
  // draft). loadSaved skips this render so it doesn't clobber the result.
  useEffect(()=>{ if(pendingCalc.current){ pendingCalc.current=false; calculate(); } /* eslint-disable-next-line */
  },[calcNonce]);

  // Auto-save edits (gross override, PDD, recipient/method) back to the draft,
  // debounced, so manual changes also survive navigation. Skip locked periods.
  useEffect(()=>{
    if(!rows||!rows.length||(period&&period.state&&period.state!=="open"))return;
    const t=setTimeout(()=>{ if(!suppressSave.current) saveDraft(rows); }, 800);
    return ()=>clearTimeout(t);
    /* eslint-disable-next-line */
  },[rows]);

  // fetch today's live PHP/USD rate once (free API, no key); user can override.
  useEffect(()=>{
    let cancelled=false;
    fetch("https://open.er-api.com/v6/latest/USD")
      .then(r=>r.json())
      .then(d=>{ if(cancelled)return;
        const php=d&&d.rates&&d.rates.PHP;
        if(php){ if(fxAuto) setFx(+(+php).toFixed(4));
          setFxNote(`live rate ${(+php).toFixed(2)} as of ${d.time_last_update_utc?d.time_last_update_utc.slice(5,16):"today"}`); }
      })
      .catch(()=>{ if(!cancelled) setFxNote("couldn't fetch live rate — using last value, editable"); });
    return ()=>{ cancelled=true; };
    /* eslint-disable-next-line */
  },[]);

  // keep pay date in sync when the period start changes (unless user overrides)
  function applyStart(v){ setStart(v); const p=periodFor(v); setEnd(p.end); setPayDate(p.payDate); }

  async function calculate(){
    if(!companyId){setMsg("Pick a single company first.");return;}
    if(!(await gate("Calculate"))) return;
    // GUARD: recalculating rebuilds every row purely from tracked hours. That DISCARDS any
    // manual gross overrides AND any adjustments/allowances (Health Allowance, PDD Lunch, 13th,
    // bonus) currently saved for this period — e.g. amounts brought in by an import. Warn loudly
    // and snapshot the prior values so the user can roll back.
    const prevRows = rows;
    const adjusted = (prevRows||[]).filter(r=>
      r.overridden || (r.ha||0)>0 || (r.pdd||0)>0 || (r.bonus||0)>0 || r.t13_overridden ||
      (Array.isArray(r.misc_items) && r.misc_items.length>0));
    if(adjusted.length){
      const names = adjusted.slice(0,8).map(r=>r.name).join(", ") + (adjusted.length>8?` +${adjusted.length-8} more`:"");
      // Spell out Misc entries explicitly — they're the easiest to forget since
      // they live behind a popup, not an inline column.
      const miscRows = adjusted.filter(r=>Array.isArray(r.misc_items) && r.misc_items.length>0);
      const miscDetail = miscRows.slice(0,6).map(r=>{
        const items=r.misc_items.map(it=>{
          if(it.kind==="other_hours") return `${it.label} ${it.hours}h`;
          if(it.kind==="deduction")   return `-${it.label} ₱${Number(it.amount).toLocaleString()}`;
          return `${it.label} ₱${Number(it.amount).toLocaleString()}`;
        }).join(", ");
        return `   • ${r.name}: ${items}`;
      }).join("\n") + (miscRows.length>6?`\n   …and ${miscRows.length-6} more with Misc entries`:"");
      const ok = await confirmDanger({
        title:"Recalculate from tracked hours?",
        message:`This period has ${adjusted.length} contractor(s) with manual overrides or adjustments `+
          `(gross overrides, Health Allowance, 13th-month, Lunch, bonus, or Misc items):\n   ${names}`+
          (miscRows.length ? `\n\nMisc entries that will be WIPED (${miscRows.length} contractor(s)):\n${miscDetail}` : ""),
        consequence:"Recalculating rebuilds every amount from tracked hours only and OVERWRITES those values "+
          "(allowances reset to 0, overrides and Misc items discarded). An \"Undo recalculation\" button will "+
          "appear so you can restore the current values.",
        confirmWord:"RECALCULATE", confirmLabel:"Recalculate & overwrite",
      });
      if(!ok){ setMsg("Recalculation cancelled — existing overrides and adjustments were kept."); return; }
      // snapshot the current saved amounts so the user can roll back
      const snapshot = prevRows.map(r=>({...r}));
      const snapStart=start, snapEnd=end, snapPid=period?.id;
      setUndo({ label:`Recalculation overwrote ${adjusted.length} override(s)/adjustment(s). Restore the prior amounts?`,
        fn:async()=>{
          setRows(snapshot.map(r=>({...r})));
          // re-persist the snapshot if the period is still an editable draft
          await saveDraft(snapshot);
          logEvent(client,{company_id:companyId,action:"undo",entity:"recalculate",
            detail:{period:`${snapStart} → ${snapEnd}`, restored:snapshot.length}});
          setMsg(`Restored prior amounts for ${snapshot.length} contractor(s).`);
        }});
      // durable trail: record that a recalc overwrote adjustments
      logEvent(client,{company_id:companyId,action:"recalculate",entity:`${start} → ${end}`,
        detail:{overwrote_adjustments:adjusted.length,
          contractors:adjusted.map(r=>r.name)}});
    } else {
      setUndo(null);
    }
    setBusy(true);setMsg("");setRows(null);setDropped([]);
    try{
    // 1. approved time in range — both tracked AND paid PTO count toward worked_hours
    const {data:te,error:e1}=await client.from("time_entries")
      .select("worker_id,source_name,work_date,tracked_seconds,pto_seconds,approval")
      .eq("company_id",companyId).gte("work_date",start).lte("work_date",end)
      .eq("approval","approved");
    if(e1){setMsg(e1.message);setBusy(false);return;}
    // 2. roster (contract, hire) + rates
    const {data:wc}=await client.from("worker_companies")
      .select("worker_id,contract,hubstaff_name,status,ended_on,workers(first_name,middle_name,last_name,hire_date,status,payout_method,health_allowance_eligible,thirteenth_month_eligible)")
      .eq("company_id",companyId);
    // map source_name -> worker_id so time rows with a null worker_id still attribute
    const widByName={};
    (wc||[]).forEach(l=>{
      const w=l.workers||{};
      const keys=[l.hubstaff_name, `${w.first_name||""} ${w.last_name||""}`.trim()].filter(Boolean);
      keys.forEach(k=>{ widByName[k]=l.worker_id; widByName[normName(k)]=l.worker_id; });
    });
    const {data:rt}=await client.from("rates")
      .select("worker_id,amount_php,effective_start,effective_end").eq("company_id",companyId);
    // 3. last-used payout method per worker (most recent prior payment)
    const {data:priorPays}=await client.from("payments")
      .select("worker_id,payout_method,created_at,pay_periods(period_end)")
      .eq("company_id",companyId).not("payout_method","is",null)
      .order("created_at",{ascending:false});
    const lastMethod={};
    (priorPays||[]).forEach(p=>{ if(p.payout_method && !(p.worker_id in lastMethod)) lastMethod[p.worker_id]=p.payout_method; });

    const wcById={}; (wc||[]).forEach(r=>wcById[r.worker_id]=r);
    function rateFor(wid){
      const cands=(rt||[]).filter(r=>r.worker_id===wid &&
        r.effective_start<=end && (!r.effective_end||r.effective_end>=start));
      cands.sort((a,b)=>a.effective_start<b.effective_start?1:-1);
      return cands[0]?Number(cands[0].amount_php):null;
    }
    // aggregate worked seconds per worker (resolve null worker_id by source_name).
    // worked = tracked + paid-PTO so PTO leave is paid like worked time.
    const secByWorker={}, daysByWorker={};
    const unattributed=new Set();   // approved rows whose contractor couldn't be resolved
    (te||[]).forEach(t=>{
      const wid = t.worker_id || widByName[t.source_name] || widByName[normName(t.source_name)];
      if(!wid){ unattributed.add(t.source_name||"(no name)"); return; }   // no matching contractor
      const trackedSecs = Number(t.tracked_seconds||0);
      const ptoSecs = Number(t.pto_seconds||0);
      secByWorker[wid]=(secByWorker[wid]||0)+trackedSecs+ptoSecs;
      if(trackedSecs>0 || ptoSecs>0){
        (daysByWorker[wid]=daysByWorker[wid]||new Set()).add(t.work_date);
      }
    });
    const out=[];
    const noLink=[];   // worker has approved time but no worker_companies link in THIS company
    Object.keys(secByWorker).forEach(wid=>{
      const link=wcById[wid]; if(!link){ noLink.push(wid); return; }
      const w=link.workers||{};
      const worked=secByWorker[wid]/3600;
      const exp=expectedHours(link.contract, start, end);
      const ratio=Math.min(worked/exp,5);          // cap matches workbook V
      const rate=rateFor(wid);
      const gross=rate==null?null:(ratio>=1?rate:+(ratio*rate).toFixed(2));
      const ha=(includeHA && w.health_allowance_eligible)?healthAllowance(w.hire_date,start,end):0;
      const t13=(include13 && w.thirteenth_month_eligible && rate!=null)?thirteenthAccrual(rate,w.hire_date,end):0;
      const pdd=0;     // PDD Lunch: manual per-period add-on, editable in the table
      const bonus=0;   // performance / other bonus, editable in the table
      const ded=rate==null?0:+(rate-(gross||0)).toFixed(2);
      // Calculate resets misc_items — they are user-entered adjustments per
      // pay period, not derivable from rate/hours/dates. The Recalculate
      // warning already tells users overrides will be wiped; that applies
      // to misc_items too.
      const misc_items=[];
      const miscSum=0;
      const net=gross==null?null:+(gross+ha+t13+pdd+bonus+miscSum).toFixed(2);
      // Inactive snapshot for Lock & Save warning: a row is "inactive" if the
      // worker_companies link or the worker itself is no longer active. Keeps
      // people who are mid-offboarding visible (so a final period can still be
      // calculated/locked), but loud-warns at lock time.
      const inactive=(link.status && link.status!=="active") || (w.status && w.status!=="active");
      out.push({worker_id:wid,name:fullName(w)||link.worker_id,
        contract:link.contract,worked:+worked.toFixed(2),expected:exp,ratio:+ratio.toFixed(4),
        rate,gross,computed_gross:gross,ha,t13,computed_t13:t13,pdd,bonus,ded,net,overridden:false,
        misc_items,
        usd_ref:(net==null||!fx)?null:+(net/fx).toFixed(2),   // reference only; paid in PHP
        inactive,
        // default to the worker's set method, else their LAST-USED channel, else unset
        method:w.payout_method||lastMethod[wid]||null});
    });
    out.sort((a,b)=>a.name.localeCompare(b.name));
    // Surface APPROVED time that was dropped so it never silently disappears:
    //   • unattributed — source_name didn't resolve to any contractor (null
    //     worker_id + no name match). Usually a manual/CSV row whose name
    //     doesn't match the roster, or a contractor never linked to this company.
    //   • noLink — worker_id has approved time but no worker_companies link in
    //     THIS company (can't compute expected hours without the contract type).
    let droppedMsg=[];
    if(unattributed.size){
      droppedMsg.push(`${unattributed.size} approved entr(ies) couldn't be matched to a contractor in this company: `+
        [...unattributed].slice(0,8).join(", ")+(unattributed.size>8?` +${unattributed.size-8} more`:"")+
        ". Add/Link them on the Contractors tab (or fix their Hubstaff name), then recalculate.");
    }
    if(noLink.length){
      const {data:nlw}=await client.from("workers").select("id,first_name,last_name").in("id",noLink);
      const names=(nlw||[]).map(w=>`${w.first_name} ${w.last_name}`.trim());
      droppedMsg.push(`${noLink.length} contractor(s) have approved time but aren't linked to this company: `+
        names.slice(0,8).join(", ")+(names.length>8?` +${names.length-8} more`:"")+
        ". Link them to this company on the Contractors tab, then recalculate.");
    }
    setDropped(droppedMsg);
    setRows(out);
    if(!out.length){
      setMsg("No approved time found for this company in that date range — check the period dates match the approved time, and that contractors are linked to this company."+
        (droppedMsg.length?" "+droppedMsg.join(" "):" Import & approve hours first."));
      return;
    }
    await saveDraft(out);   // persist so it survives tab-switch / refresh
    }catch(ex){ setMsg("Calculate failed: "+(ex.message||ex)); }
    finally{ setBusy(false); }   // ALWAYS clear so the button never sticks on "Calculating…"
  }

  // Save the current calculation as a DRAFT (period state='open', payments status='draft').
  async function saveDraft(currentRows){
    if(suppressSave.current) return;   // paused during a delete — don't re-add removed rows
    try{
      const {data:pp}=await client.from("pay_periods")
        .upsert({company_id:companyId,period_start:start,period_end:end,pay_date:payDate,state:"open"},
                {onConflict:"company_id,period_start,period_end"})
        .select().single();
      if(!pp)return;
      // don't clobber a period that's already locked/paid
      if(pp.state && pp.state!=="open") return;
      const draftRows=currentRows.filter(r=>r.net!=null).map(r=>({
        company_id:companyId, pay_period_id:pp.id, worker_id:r.worker_id,
        expected_hours:r.expected, worked_hours:r.worked, performance_ratio:r.ratio,
        rate_php:r.rate, gross_php:r.gross, health_allowance_php:r.ha,
        thirteenth_month_php:r.t13, pdd_lunch_php:r.pdd||0, bonus_php:r.bonus||0,
        deduction_php:r.ded, net_php:r.net,
        misc_items: Array.isArray(r.misc_items)?r.misc_items:[],
        fx_rate:fx, payout_currency:"PHP", payout_amount:r.net,
        payout_method:r.method, status:"draft",
        note:r.overridden?`Gross manually overridden (computed ${r.computed_gross})`:null}));
      if(draftRows.length)
        await client.from("payments").upsert(draftRows,{onConflict:"pay_period_id,worker_id"});
    }catch(e){ /* draft save is best-effort; calculation still shows */ }
  }

  // Load a saved DRAFT (or locked snapshot) for the current company+period.
  // If the period has no saved data, clear any leftover rows so the screen
  // reflects the NEW period rather than lingering on the old one.
  // Rows where the LIVE worker name OR the rate effective for this period has
  // drifted from the snapshot stored in `payments`. Populated by loadSaved().
  // The render shows a banner listing these so the user knows to Recalculate.
  const [staleRows,setStaleRows]=useState([]);
  // Which row's misc-items popup is currently open. null = closed.
  const [miscRowId,setMiscRow]=useState(null);
  // Save the popup's draft back onto the row state. Maps the popup's payload
  // back into six storage sinks: health_allowance_php (ha), thirteenth_month_php
  // (t13), pdd_lunch_php (pdd), bonus_php (bonus), and misc_items
  // (other_earns + other_hours + deduction kinds). The row's `ded` (rate -
  // gross informational column) is NOT touched — user-input deductions live
  // in misc_items. 13th-month follows the existing override convention:
  // payload.t13_blank=true reverts to computed_t13; a numeric value marks
  // t13_overridden.
  function saveMiscForRow(workerId, payload){
    patchRow(workerId, r => ({
      ...r,
      ha: numOrZero(payload.ha),
      t13: payload.t13_blank ? (r.computed_t13||0) : numOrZero(payload.t13),
      t13_overridden: !payload.t13_blank && payload.t13!==""&&payload.t13!=null,
      pdd: numOrZero(payload.pdd),
      bonus: numOrZero(payload.bonus),
      misc_items: Array.isArray(payload.misc_items)?payload.misc_items:[],
    }));
    // saveDraft is auto-debounced by the existing useEffect that watches
    // rows; nothing else to do here.
    setMiscRow(null);
  }

  async function loadSaved(){
    if(!companyId||!start||!end)return;
    const {data:pp}=await client.from("pay_periods").select("id,state")
      .eq("company_id",companyId).eq("period_start",start).eq("period_end",end).maybeSingle();
    if(!pp){ setRows(null); setPeriod(null); setMsg(""); setStaleRows([]); return; }
    const {data:pays}=await client.from("payments")
      .select("worker_id,expected_hours,worked_hours,performance_ratio,rate_php,gross_php,"+
              "health_allowance_php,thirteenth_month_php,pdd_lunch_php,bonus_php,deduction_php,net_php,fx_rate,"+
              "misc_items,payout_method,note,workers(first_name,middle_name,last_name)")
      .eq("pay_period_id",pp.id);
    if(!pays||!pays.length){ setRows(null); setPeriod({id:pp.id,state:pp.state}); setMsg(""); setStaleRows([]); return; }
    setPeriod({id:pp.id,state:pp.state});

    // Live drift check: compare each payment's stored rate_php against the rate
    // CURRENTLY effective for the period. (The Calculate snapshot freezes
    // rate_php at the moment calculate() ran. If a rate was edited or
    // backfilled since then, the stored snapshot is stale.)
    const widList=[...new Set((pays||[]).map(p=>p.worker_id))];
    let liveRateByWid={};
    if(widList.length){
      const {data:rt}=await client.from("rates")
        .select("worker_id,amount_php,effective_start,effective_end")
        .eq("company_id",companyId).in("worker_id",widList);
      // Pick the rate effective for THIS period: effective_start<=end AND
      // (effective_end is null OR effective_end>=start). Most-recent wins.
      const byWorker={};
      (rt||[]).forEach(r=>{
        if(r.effective_start>end) return;
        if(r.effective_end && r.effective_end<start) return;
        const cur=byWorker[r.worker_id];
        if(!cur || r.effective_start>cur.effective_start) byWorker[r.worker_id]=r;
      });
      liveRateByWid=Object.fromEntries(Object.entries(byWorker).map(([wid,r])=>[wid,Number(r.amount_php)]));
    }

    const mapped=pays.map(p=>{
      const liveRate = liveRateByWid[p.worker_id];
      const storedRate = p.rate_php==null ? null : Number(p.rate_php);
      const rateChanged = liveRate!=null && storedRate!=null && Math.abs(liveRate - storedRate) > 0.01;
      return {
        worker_id:p.worker_id, name:fullName(p.workers),
        worked:Number(p.worked_hours||0), expected:Number(p.expected_hours||0),
        ratio:Number(p.performance_ratio||0), rate:storedRate, live_rate:liveRate,
        gross:p.gross_php==null?null:Number(p.gross_php), computed_gross:p.gross_php==null?null:Number(p.gross_php),
        ha:Number(p.health_allowance_php||0), t13:Number(p.thirteenth_month_php||0), computed_t13:Number(p.thirteenth_month_php||0),
        pdd:Number(p.pdd_lunch_php||0), bonus:Number(p.bonus_php||0), ded:Number(p.deduction_php||0), net:p.net_php==null?null:Number(p.net_php),
        misc_items: Array.isArray(p.misc_items) ? p.misc_items : [],
        overridden:!!p.note, usd_ref:(p.net_php==null||!fx)?null:+(Number(p.net_php)/fx).toFixed(2),
        method:p.payout_method||null,
        rate_stale: rateChanged,
      };
    });
    setRows(mapped);
    setStaleRows(mapped.filter(r=>r.rate_stale).map(r=>({
      worker_id:r.worker_id, name:r.name, was:r.rate, now:r.live_rate,
    })));
    setMsg(pp.state==="open"?"Please edit the batch, then press Lock to proceed to Process & Pay.":`Loaded ${pp.state} period (read-only snapshot).`);
  }

  // Sum the misc_items adjustments on a row. other_earns and other_hours add
  // (positive amounts); deduction kind subtracts (amount is stored positive
  // and treated as a deduction here). r.ded (the rate-minus-gross
  // performance shortfall) remains informational and is NOT in net.
  function miscTotal(items){
    if(!Array.isArray(items)) return 0;
    return items.reduce((s,it)=> {
      const a = Number(it?.amount)||0;
      return s + (it?.kind === "deduction" ? -a : a);
    }, 0);
  }

  // recompute net + usd_ref from a row's components (single source of truth).
  // Net adds the misc_items sum on top of the existing typed columns.
  function recalcNet(r){
    const net = r.gross==null ? null
