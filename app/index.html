      failed: S(c.from("payments").select("id",{count:"exact",head:true}).eq("status","failed")),
      links: S(c.from("worker_companies").select("worker_id,company_id,status,workers(id,first_name,middle_name,last_name,status,payout_method)")),
      rates: S(c.from("rates").select("worker_id,company_id,effective_start,effective_end")),
      pendDocs: S(c.from("documents").select("id",{count:"exact",head:true}).in("kind",ONB_DOC_KINDS).eq("review_status","pending")),
      onb: scoped
        ? c.from("onboarding_progress").select("worker_id, worker_companies!inner(company_id)",{count:"exact",head:true}).is("completed_at",null).eq("worker_companies.company_id",companyId)
        : c.from("onboarding_progress").select("worker_id",{count:"exact",head:true}).is("completed_at",null),
    };
    const keys=Object.keys(tasks);
    const res=await Promise.allSettled(keys.map(k=>Promise.resolve(tasks[k])));
    const R={};
    keys.forEach((k,i)=>{ R[k]= res[i].status==="fulfilled" ? res[i].value : {error:String((res[i].reason&&res[i].reason.message)||res[i].reason)}; });
    return { data:R, error:null };
  }, [client, companyId, consolidated]);
  // Stale-while-revalidate: paint the last-known tiles for THIS scope instantly
  // from sessionStorage, then swap in fresh data when the queries resolve. Only a
  // true cold load (no cache) shows skeletons; revisits never flash empty.
  const cacheKey = "eis_ov_" + (consolidated ? "all" : (companyId || "none"));
  const [cached, setCached] = useState(() => readOvCache(cacheKey));
  const ovMounted = React.useRef(false);
  useEffect(() => {            // re-seed the cache view when the scope key changes
    if (!ovMounted.current) { ovMounted.current = true; return; }
    setCached(readOvCache(cacheKey));
  }, [cacheKey]);
  useEffect(() => {            // mirror fresh data into the cache (with a timestamp)
    if (data && !loading) {
      const payload = { at: new Date().toISOString(), R: data };
      try { sessionStorage.setItem(cacheKey, JSON.stringify(payload)); } catch { /* quota / private mode */ }
      setCached(payload);
    }
  }, [data, loading, cacheKey]);
  const [dq,setDq]=useState(null); // lazy data-quality check: null | {loading} | {error} | {result}
  async function runDq(){
    setDq({loading:true});
    try{
      const sc=q=>(!consolidated&&companyId)?q.eq("company_id",companyId):q;
      const {data:pps,error:e1}=await sc(client.from("pay_periods")
        .select("period_start,period_end,payments(worker_id,worked_hours,workers(first_name,middle_name,last_name))")
        .order("period_start",{ascending:false}).limit(1));
      if(e1) throw e1;
      const p=(pps||[])[0];
      if(!p){ setDq({result:{mismatches:[],period:null}}); return; }
      let tq=client.from("time_entries").select("worker_id,tracked_seconds").gte("work_date",p.period_start).lte("work_date",p.period_end);
      if(!consolidated&&companyId) tq=tq.eq("company_id",companyId);
      const {data:te,error:e2}=await tq; if(e2) throw e2;
      const hrs={}; (te||[]).forEach(r=>{ hrs[r.worker_id]=(hrs[r.worker_id]||0)+(r.tracked_seconds||0)/3600; });
      const mism=(p.payments||[]).map(pay=>({ name:fullName(pay.workers||{}), paid:Number(pay.worked_hours||0), tracked:+(hrs[pay.worker_id]||0).toFixed(1) }))
        .filter(m=> Math.abs(m.tracked-m.paid)>0.5);
      setDq({result:{mismatches:mism, period:p.period_start+" → "+p.period_end}});
    }catch(e){ setDq({error:String((e&&e.message)||e)}); }
  }

  if(noScope) return <div className="card"><div className="empty">Pick a company in the switcher (top right) to see your overview.</div></div>;
  if(loading && !data && !cached) return <div className="ov-grid">{Array.from({length:6}).map((_,i)=><div key={i} className="ov-tile" aria-hidden="true" style={{cursor:"default"}}><Skeleton rows={3}/></div>)}</div>;

  const R = data || (cached && cached.R) || {};   // fresh first, else cached (SWR)
  const updatedAt = cached && cached.at;          // freshness stamp from the cache
  const refreshing = loading && !!(data || cached);
  const err = k => R[k] && R[k].error;
  const got = k => R[k] || {};
  const today = new Date().toISOString().slice(0,10);

  // current period + the 8-point net-pay series both come from periods8 (latest
  // first). [0] = current cycle for the tile/hero/pipeline; reversed = sparkline.
  const periodsArr = err("periods8") ? [] : (((got("periods8").data))||[]);
  const current = periodsArr[0] || null;
  let period=null;
  if(current){
    const pays=current.payments||[];
    period={start:current.period_start,end:current.period_end,state:current.state,
            company:current.companies&&current.companies.name,
            contractors:pays.length, net:pays.reduce((s,x)=>s+Number(x.net_php||0),0)};
  }
  const series = periodsArr.slice().reverse().map(pp=>({
    end: pp.period_end, net: (pp.payments||[]).reduce((s,x)=>s+Number(x.net_php||0),0)
  }));

  // Pay-cycle pipeline + pay-day countdown — single-company view only
  // (consolidated mixes companies, so a per-period lifecycle/net is misleading).
  // Stages map to the real enums: payment_status draft->queued->sent/reconciled,
  // pay_period_state open->locked->paid. Time/Calc both gate on "payments exist"
  // because the app requires approved time before a period can be calculated.
  let pipe=null, payday=null, spark=null;
  if(scoped && current){
    const pays=current.payments||[];
    const total=pays.length;
    const settled=pays.filter(p=>p.status==="sent"||p.status==="reconciled").length;
    const reconciled=pays.filter(p=>p.status==="reconciled").length;
    const stt=current.state;
    const calc=total>0, locked=(stt==="locked"||stt==="paid");
    const allSent=total>0&&settled===total, done5=(stt==="paid")||(total>0&&reconciled===total);
    const flags=[calc,calc,locked,allSent,done5];
    const defs=[
      {label:"Time",    sub:calc?"approved":"in progress"},
      {label:"Calc",    sub:calc?(total+" calc'd"):"pending"},
      {label:"Lock",    sub:locked?"locked":"open"},
      {label:"Sent",    sub:total?(settled+"/"+total):"—"},
      {label:"Settled", sub:done5?"done":(total?(reconciled+"/"+total):"—")},
    ];
    const firstTodo=flags.indexOf(false);
    pipe=defs.map((d,i)=>({...d, cls: flags[i]?"done":(i===firstTodo?"active":"todo")}));
    if(current.pay_date){
      const dd=Math.round((new Date(current.pay_date+"T00:00:00")-new Date(today+"T00:00:00"))/86400000);
      payday = stt==="paid" ? "paid" : dd>1?("pay day in "+dd+" days") : dd===1?"pay day tomorrow"
             : dd===0?"pay day today" : dd===-1?"pay day was yesterday" : ("pay day "+Math.abs(dd)+" days ago");
    }
  }
  if(scoped && series.length>=2){
    const last=series[series.length-1].net, prev=series[series.length-2].net;
    spark={ values:series.map(p=>p.net), last, pct: prev>0 ? ((last-prev)/prev*100) : null };
  }
  // contractors needing setup: active worker with no payout method OR no current rate
  let blocked=null;
  if(!err("links") && !err("rates")){
    const rateOk={};
    ((got("rates").data)||[]).forEach(r=>{ if(String(r.effective_start||"")<=today && (!r.effective_end||String(r.effective_end)>today)) rateOk[r.worker_id+"|"+r.company_id]=true; });
    const seen=new Set(); blocked=0;
    ((got("links").data)||[]).forEach(l=>{ const w=l.workers; if(!w||w.status!=="active"||l.status!=="active"||seen.has(l.worker_id)) return;
      if(!w.payout_method || !rateOk[l.worker_id+"|"+l.company_id]){ blocked++; seen.add(l.worker_id); }
    });
  }
  const pendTime = err("pendingTime")? null : (got("pendingTime").count||0);
  const dRows = err("drafts")? null : ((got("drafts").data)||[]);
  const draftN = dRows? dRows.length : null;
  const draftNet = dRows? dRows.reduce((s,p)=>s+Number(p.net_php||0),0) : 0;
  const failed = err("failed")? null : (got("failed").count||0);
  const pendDocs = err("pendDocs")? null : (got("pendDocs").count||0);
  const onbOpen = err("onb")? null : (got("onb").count||0);

  const stTone=s=>s==="paid"?"good":s==="locked"?"warn":"info";
  const stLabel=s=>s==="paid"?"Paid":s==="locked"?"Locked — awaiting payout":s==="open"?"Open (draft)":(s||"—");
  // plain JSX-returning helper (not a nested component) so it never remounts
  const tile=({tone,icon,label,num,sub,drill,error})=>(
    <button key={label} className={"ov-tile t-"+(error?"bad":tone)} disabled={!drill} onClick={()=>drill&&goTab(drill)}
            aria-label={label+(error?": couldn't load":"")}>
      <div className="ov-tile-label"><span aria-hidden="true">{icon}</span>{label}</div>
      <div className="ov-tile-num" style={error?{fontSize:15,color:"var(--bad)"}:null}>{error?"—":num}</div>
      <div className="ov-tile-sub">{error? <span style={{color:"var(--bad)"}}>Couldn't load — press Refresh</span> : sub}</div>
    </button>
  );

  return (
    <div>
      <div className="card" style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <div>
          <h2 style={{margin:0}}>Overview</h2>
          <div className="sub" style={{margin:0}}>{consolidated?"All companies":((period&&period.company)||"This company")} · what needs your attention</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
          <button className="btn ghost sm" onClick={reload} disabled={loading}>{loading?"Refreshing…":"↻ Refresh"}</button>
          {updatedAt && <span className={"ov-updated"+(refreshing?" refreshing":"")}><span className="dot"/>{refreshing?"updating…":("updated "+timeAgo(updatedAt))}</span>}
        </div>
      </div>
      {scoped && period && (
        <div className="card ov-cycle ov-anim">
          <div className="ov-cycle-head">
            <div>
              <div className="ov-tile-label" style={{marginBottom:4}}><span aria-hidden="true">📅</span>THIS PAY CYCLE</div>
              <div style={{fontWeight:700,fontSize:16}}>{period.start} → {period.end}</div>
              <div className="sub" style={{marginTop:2}}>{stLabel(period.state)}{payday?(" · "+payday):""} · {period.contractors} contractor(s)</div>
            </div>
            <div className="ov-cycle-net">
              <div className="ov-tile-label" style={{justifyContent:"flex-end"}}>Net this period</div>
              <div className="ov-tile-num">{money(period.net,"PHP")}</div>
            </div>
          </div>
          {pipe && (
            <div className="ov-pipe" role="list" aria-label="Pay cycle progress">
              {pipe.map((s,i)=>(
                <div key={s.label} className={"ov-pipe-step "+s.cls} role="listitem"
                     aria-label={s.label+": "+(s.cls==="done"?"done":s.cls==="active"?"in progress":"not started")}>
                  <span className="ov-pipe-pip" aria-hidden="true">{s.cls==="done"?"✓":(i+1)}</span>
                  <span className="ov-pipe-label">{s.label}</span>
                  <span className="ov-pipe-sub">{s.sub}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
      <div className="ov-grid">
        {!(scoped && period) && tile({tone:period?stTone(period.state):"info", icon:"📅", label:"Current pay period", error:err("periods8"),
          num: period? <span style={{fontSize:17}}>{period.start} → {period.end}</span> : "—",
          sub: period? `${stLabel(period.state)} · ${period.contractors} contractor(s) · net ${money(period.net,"PHP")}` : "No pay periods yet — run a payroll",
          drill:"process"})}
        {tile({tone:draftN?"warn":"good", icon:"💸", label:"Locked, not yet sent", error:err("drafts"),
          num: draftN==null?"—":draftN,
          sub: draftN? `${money(draftNet,"PHP")} ready to send` : "All locked pay is sent",
          drill:"process"})}
        {tile({tone:pendTime?"warn":"good", icon:"⏱", label:"Time pending approval", error:err("pendingTime"),
          num: pendTime==null?"—":pendTime,
          sub: pendTime? "time entr(ies) awaiting approval" : "All time approved",
          drill:"time"})}
        {tile({tone:blocked?"warn":"good", icon:"👤", label:"Contractors needing setup", error:err("links")||err("rates"),
          num: blocked==null?"—":blocked,
          sub: blocked? "missing payout method or current rate" : "All active contractors are payroll-ready",
          drill:"contractors"})}
        {tile({tone:(pendDocs||onbOpen)?"info":"good", icon:"📄", label:"Docs & onboarding", error:err("pendDocs")||err("onb"),
          num: (pendDocs==null&&onbOpen==null)?"—":((pendDocs||0)+(onbOpen||0)),
          sub: (pendDocs||onbOpen)? `${pendDocs||0} doc(s) to review · ${onbOpen||0} onboarding open` : "Nothing waiting on you",
          drill:"documents"})}
        {tile({tone:failed?"bad":"good", icon:"🚩", label:"Payout issues", error:err("failed"),
          num: failed==null?"—":failed,
          sub: failed? "failed payout(s) need attention" : "No failed payouts",
          drill:"batches"})}
      </div>
      {spark && (
        <div className="card ov-anim" style={{marginTop:12}}>
          <div className="ov-spark-wrap">
            <div className="ov-spark-meta">
              <div className="ov-tile-label"><span aria-hidden="true">📈</span>NET PAY · last {spark.values.length} periods</div>
              <div className="ov-tile-num" style={{fontSize:22,margin:"2px 0"}}>{money(spark.last,"PHP")}</div>
              {spark.pct!=null
                ? <span className={"ov-delta "+(spark.pct>0.5?"up":spark.pct<-0.5?"down":"flat")}>
                    {spark.pct>0.5?"▲":spark.pct<-0.5?"▼":"▬"} {Math.abs(spark.pct).toFixed(1)}% vs prior period
                  </span>
                : <span className="ov-delta flat">— vs prior period</span>}
            </div>
            <Sparkline values={spark.values}/>
          </div>
        </div>
      )}
      <div className="card" style={{marginTop:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <div><b>Data-quality</b>
            <div className="sub" style={{margin:"4px 0 0"}}>Checks the latest period for contractors whose paid hours differ from tracked time.</div></div>
          <button className="btn ghost sm" disabled={dq&&dq.loading} onClick={runDq}>{dq&&dq.loading?"Checking…":"Run check"}</button>
        </div>
        {dq&&dq.error && <div className="field-err" style={{marginTop:8}}>Check failed: {dq.error}</div>}
        {dq&&dq.result && (dq.result.mismatches.length
          ? <div style={{marginTop:10}}>
              <div className="pill warn" style={{marginBottom:6}}>{dq.result.mismatches.length} time/pay mismatch(es) · {dq.result.period}</div>
              {dq.result.mismatches.slice(0,8).map((m,i)=>(
                <div key={i} className="row" style={{fontSize:12.5,gap:8}}><span className="k">{m.name}</span>
                  <span>paid <b>{m.paid}h</b> · tracked {m.tracked}h</span></div>))}
              <div className="sub" style={{marginTop:6}}>Review these in Calculate / Reports.</div>
            </div>
          : <div className="sub" style={{marginTop:8,color:"var(--good)"}}>✓ No time/pay mismatches in {dq.result.period||"the latest period"}.</div>)}
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:10}}>
          <button className="btn ghost sm" onClick={()=>goTab("payroll")}>Open Calculate</button>
          <button className="btn ghost sm" onClick={()=>goTab("reports")}>Open Reports</button>
        </div>
      </div>
    </div>
  );
}

// Mobile "More" sheet (Phase 7): full grouped nav as a slide-up dialog. Its own
// component so it MOUNTS when opened -> useModalA11y gives it focus-trap, initial
// focus, focus-restore and Escape-to-close like every other dialog.
function MoreSheet({ tabGroups, tab, navIcon, go, onClose }){
  const sref=useModalA11y(onClose,{escClose:true});
  return (
    <div className="more-sheet-bg" onClick={onClose}>
      <div className="more-sheet" ref={sref} onClick={e=>e.stopPropagation()} role="dialog" aria-modal="true" aria-label="All sections">
        <div className="more-sheet-head"><b>All sections</b>
          <button className="x" aria-label="Close" onClick={onClose}><span aria-hidden="true">×</span></button></div>
        {tabGroups.map(([label,items])=>(
          <div className="side-group" key={label}>
            <div className="side-group-label">{label}</div>
            {items.map(([id,lbl])=>(
              <button key={id} className={"side-item"+(tab===id?" active":"")}
                aria-current={tab===id?"page":undefined} onClick={()=>{ go(id); onClose(); }}>
                <span className="side-ico" aria-hidden="true">{navIcon[id]}</span>
                <span className="side-label">{lbl}</span>
              </button>
            ))}

        ))}

    </div>
  );
}

// ===== Global quick-find (Cmd/Ctrl-K) command palette =====================
// Jump to any contractor, pay period, or section by typing — search once content
// exceeds easy scanning (UX guidelines). Reuses the app's existing nav plumbing:
// go(tab) / openContractor(workerId) / openPeriodForEdit({start,end}). Loads the
// (small) worker + period lists once on open, company-scoped. ↑↓ move, ↵ open,
// esc close (focus-trap/restore via useModalA11y).
function CommandPalette({ client, companyId, consolidated, tabGroups, navIcon, go, openContractor, openPeriodForEdit, onClose }){
  const pref=useModalA11y(onClose,{escClose:true});
  const listRef=React.useRef(null);
  const [q,setQ]=useState("");
  const [sel,setSel]=useState(0);
  const [lists,setLists]=useState(null);   // {workers:[{id,name,status}], periods:[{start,end,state}]} | {error}
  useEffect(()=>{
    let live=true;
    (async()=>{
      const scoped = !consolidated && !!companyId;
      try{
        const wq = scoped
          ? client.from("worker_companies").select("worker_id,workers(id,first_name,middle_name,last_name,status)").eq("company_id",companyId)
          : client.from("workers").select("id,first_name,middle_name,last_name,status");
        let pq = client.from("pay_periods").select("period_start,period_end,state").order("period_start",{ascending:false}).limit(60);
        if(scoped) pq=pq.eq("company_id",companyId);
        const [{data:wd},{data:pd}]=await Promise.all([wq,pq]);
        if(!live) return;
        const seen=new Set(), workers=[];
        (wd||[]).forEach(r=>{ const w=scoped?r.workers:r; if(!w||seen.has(w.id)) return; seen.add(w.id);
          workers.push({id:w.id, name:fullName(w), status:w.status}); });
        workers.sort((a,b)=>a.name.localeCompare(b.name));
        setLists({workers, periods:(pd||[]).map(p=>({start:p.period_start,end:p.period_end,state:p.state}))});
      }catch(e){ if(live) setLists({workers:[],periods:[],error:String((e&&e.message)||e)}); }
    })();
    return ()=>{ live=false; };
  },[]);  // load once on open

  const ql=q.trim().toLowerCase();
  const match=s=> !ql || String(s||"").toLowerCase().includes(ql);
  const items=[];
  tabGroups.forEach(([grp,grpItems])=> grpItems.forEach(([id,lbl])=>{
    if(match(lbl)||match(grp)) items.push({type:"section",id,label:lbl,sub:grp,icon:navIcon[id]||"›"});
  }));
  if(lists){
    lists.workers.filter(w=>match(w.name)).slice(0,8).forEach(w=>items.push({type:"worker",id:w.id,label:w.name,sub:w.status,icon:"👤"}));
    lists.periods.filter(p=>match(p.start+" "+p.end+" "+p.state)).slice(0,8).forEach(p=>items.push({type:"period",label:p.start+" → "+p.end,sub:p.state,start:p.start,end:p.end,icon:"📅"}));
  }
  const capped=items.slice(0,14);
  const selIdx=Math.min(sel,Math.max(0,capped.length-1));
  useEffect(()=>{ const el=listRef.current&&listRef.current.querySelector(".cmdk-item.sel"); if(el&&el.scrollIntoView) el.scrollIntoView({block:"nearest"}); },[selIdx]);

  function activate(it){
    if(!it) return;
    onClose();
    if(it.type==="section") go(it.id);
    else if(it.type==="worker" && openContractor) openContractor(it.id);
    else if(it.type==="period" && openPeriodForEdit) openPeriodForEdit({start:it.start,end:it.end});
  }
  function onKey(e){
    if(e.key==="ArrowDown"){ e.preventDefault(); setSel(s=>Math.min(s+1,Math.max(0,capped.length-1))); }
    else if(e.key==="ArrowUp"){ e.preventDefault(); setSel(s=>Math.max(s-1,0)); }
    else if(e.key==="Enter"){ e.preventDefault(); activate(capped[selIdx]); }
  }
  const typeLabel=t=> t==="section"?"Section":t==="worker"?"Contractor":"Period";
  return (
    <div className="modal-bg cmdk-bg" onClick={onClose}>
      <div className="modal cmdk" ref={pref} onClick={e=>e.stopPropagation()} role="dialog" aria-modal="true"
           aria-label="Quick find" style={{maxWidth:560,padding:0}}>
        <input className="cmdk-input" autoFocus value={q} onKeyDown={onKey}
               onChange={e=>{ setQ(e.target.value); setSel(0); }}
               placeholder="Search contractors, periods, sections…" aria-label="Quick find" />
        <div className="cmdk-list" ref={listRef} role="listbox" aria-label="Results">
          {capped.length===0 && <div className="cmdk-empty">{lists?(lists.error?("Couldn't load — "+lists.error):"No matches"):"Loading…"}</div>}
          {capped.map((it,i)=>(
            <button key={it.type+":"+(it.id||it.label)+":"+i} role="option" aria-selected={i===selIdx}
                    className={"cmdk-item"+(i===selIdx?" sel":"")}
                    onMouseEnter={()=>setSel(i)} onClick={()=>activate(it)}>
              <span className="cmdk-ico" aria-hidden="true">{it.icon}</span>
              <span className="cmdk-label">{it.label}</span>
              <span className="cmdk-type">{typeLabel(it.type)}{it.sub?(" · "+it.sub):""}</span>
            </button>
          ))}
        </div>
        <div className="cmdk-foot">↑↓ navigate · ↵ open · esc close</div>
      </div>
    </div>
  );
}

// ===== Companies management ===============================================
// Add / rename / archive / delete the companies the app runs payroll for.
// REMOVE IS ARCHIVE BY DEFAULT (status -> 'inactive'): companies anchor ALL
// payroll history — payments, pay_periods, rates, time_entries and
// worker_companies FK to companies ON DELETE CASCADE — so a hard delete of a
// company with data would WIPE that history. Permanent delete is therefore
// owner-only and allowed ONLY for a genuinely empty company (typed-confirm);
// otherwise we offer "Archive instead". Archive hides the company from the
// switcher but keeps every record; Restore brings it back. Per the ID-first
// convention, hubstaff_org_id is the stable link the Hubstaff sync matches on.
function CompaniesModal({ client, isOwner, kind, currentCompanyId, setCompanyId, onChanged, onClose }){
  const [rows,setRows]=useState(null);
  const mref=useModalA11y(onClose,{escClose:true, dep:rows!==null});
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState("");
  const [editId,setEditId]=useState("");
  const [eName,setEName]=useState(""); const [eOrg,setEOrg]=useState("");
  const [eAddr,setEAddr]=useState(""); const [ePhone,setEPhone]=useState(""); const [eWeb,setEWeb]=useState("");
  const [eTax,setETax]=useState("");
  const [eContacts,setEContacts]=useState([]);   // [{first_name,last_name,title,email,mobile,extension,fax}]
  const [nName,setNName]=useState(""); const [nOrg,setNOrg]=useState("");
  const BLANK_CONTACT={first_name:"",last_name:"",title:"",email:"",mobile:"",office:"",extension:"",fax:""};
  const normContact=k=>({...BLANK_CONTACT,...(k||{})});
  const setContact=(i,key,val)=>setEContacts(cs=>cs.map((c,idx)=>idx===i?{...c,[key]:val}:c));
  const addContact=()=>setEContacts(cs=>[...cs,{...BLANK_CONTACT}]);
  const removeContact=(i)=>setEContacts(cs=>cs.filter((_,idx)=>idx!==i));
  async function load(){
    let q=client.from("companies").select("id,name,status,hubstaff_org_id,kind,address,phone,website,tax_id,contacts").order("name");
    if(kind) q=q.eq("kind",kind);   // 'employer' (payroll home) vs 'client' (billed)
    const {data,error}=await q;
    if(error){ setMsg("Couldn't load companies: "+error.message); setRows([]); return; }
    setRows(data||[]);
  }
  useEffect(()=>{ load(); },[]);  // eslint-disable-line
  const norm=s=>String(s||"").trim().toLowerCase();
  const orgNum=s=>{ const t=String(s||"").trim(); if(!t) return null; if(!/^\d+$/.test(t)) return NaN; return Number(t); };

  async function add(){
    const name=(nName||"").trim();
    if(!name){ setMsg("Enter a company name."); return; }
    const org=orgNum(nOrg);
    if(Number.isNaN(org)){ setMsg("Hubstaff org ID must be a whole number (or blank)."); return; }
    const cur=rows||[];
    if(cur.some(c=>norm(c.name)===norm(name))){ setMsg(`A company named "${name}" already exists.`); return; }
    if(org!=null){ const clash=cur.find(c=>Number(c.hubstaff_org_id)===org); if(clash){ setMsg(`Hubstaff org ${org} is already linked to "${clash.name}".`); return; } }
    setBusy(true);
    const {data,error}=await client.from("companies").insert({name, hubstaff_org_id:org, kind:kind||"client"}).select("id").maybeSingle();
    setBusy(false);
    if(error){ setMsg("Add failed: "+error.message); return; }
    logEvent(client,{company_id:data&&data.id, action:"company_added", entity:"company "+name, detail:{hubstaff_org_id:org}});
    setNName(""); setNOrg(""); setMsg(`Added "${name}".`);
    await load(); onChanged&&onChanged();
  }

  function startEdit(c){ setEditId(c.id); setEName(c.name); setEOrg(c.hubstaff_org_id!=null?String(c.hubstaff_org_id):"");
    setEAddr(c.address||""); setEPhone(formatPhone(c.phone)); setEWeb(c.website||""); setETax(c.tax_id||"");
    setEContacts(Array.isArray(c.contacts)?c.contacts.map(k=>{ const n=normContact(k); return {...n, mobile:formatPhone(n.mobile), office:formatPhone(n.office), fax:formatPhone(n.fax)}; }):[]); setMsg(""); }
  function cancelEdit(){ setEditId(""); setEName(""); setEOrg(""); setEAddr(""); setEPhone(""); setEWeb(""); setETax(""); setEContacts([]); }
  async function saveEdit(c){
    const name=(eName||"").trim();
    if(!name){ setMsg("Name can't be empty."); return; }
    const org=orgNum(eOrg);
    if(Number.isNaN(org)){ setMsg("Hubstaff org ID must be a whole number (or blank)."); return; }
    const others=(rows||[]).filter(x=>x.id!==c.id);
    if(others.some(x=>norm(x.name)===norm(name))){ setMsg(`Another company is already named "${name}".`); return; }
    if(org!=null){ const clash=others.find(x=>Number(x.hubstaff_org_id)===org); if(clash){ setMsg(`Hubstaff org ${org} is linked to "${clash.name}".`); return; } }
    // Trim each contact; auto-format phone/fax; drop rows the admin left entirely blank.
    const contacts=(eContacts||[])
      .map(k=>({ first_name:(k.first_name||"").trim(), last_name:(k.last_name||"").trim(), title:(k.title||"").trim(),
                 email:(k.email||"").trim(), mobile:formatPhone(k.mobile), office:formatPhone(k.office), extension:(k.extension||"").trim(), fax:formatPhone(k.fax) }))
      .filter(k=>k.first_name||k.last_name||k.title||k.email||k.mobile||k.office||k.extension||k.fax);
    setBusy(true);
    const {error}=await client.from("companies").update({
      name, hubstaff_org_id:org,
      address:(eAddr||"").trim()||null, phone:formatPhone(ePhone)||null, website:(eWeb||"").trim()||null,
      tax_id:(eTax||"").trim()||null, contacts,
    }).eq("id",c.id);
    setBusy(false);
    if(error){ setMsg("Save failed: "+error.message); return; }
    logEvent(client,{company_id:c.id, action:"company_updated", entity:"company "+name, detail:{hubstaff_org_id:org, contacts:contacts.length}});
    cancelEdit(); setMsg(`Saved "${name}".`);
    await load(); onChanged&&onChanged();
  }

  async function doSetStatus(c,status){
    setBusy(true);
    const {error}=await client.from("companies").update({status}).eq("id",c.id);
    setBusy(false);
    if(error){ setMsg("Update failed: "+error.message); return false; }
    logEvent(client,{company_id:c.id, action:status==="inactive"?"company_archived":"company_restored", entity:"company "+c.name});
    setMsg(`${status==="inactive"?"Archived":"Restored"} "${c.name}".`);
    if(status==="inactive" && currentCompanyId===c.id && setCompanyId) setCompanyId(""); // don't strand the switcher on a hidden company
    await load(); onChanged&&onChanged(); return true;
  }
  async function archive(c){
    const ok=await confirmDanger({ title:`Archive "${c.name}"?`,
      message:`This hides the company from the switcher and new payroll, but KEEPS all its history (payments, pay periods, time, rates, contractor links). You can Restore it anytime.`,
      confirmLabel:"Archive company" });
    if(ok) await doSetStatus(c,"inactive");
  }

  async function countDeps(id){
    const tables=["payments","pay_periods","time_entries","rates","worker_companies"];
    const res=await Promise.all(tables.map(t=>client.from(t).select("*",{count:"exact",head:true}).eq("company_id",id)));
    const counts={}; let total=0;
    tables.forEach((t,i)=>{ const n=res[i].count||0; counts[t]=n; total+=n; });
    return {counts,total};
  }
  async function destroy(c){
    setBusy(true); setMsg("Checking dependent data…");
    let dep; try{ dep=await countDeps(c.id); }catch(e){ setBusy(false); setMsg("Couldn't check dependent data: "+String((e&&e.message)||e)); return; }
    setBusy(false); setMsg("");
    if(dep.total>0){
      const parts=Object.entries(dep.counts).filter(([,n])=>n>0).map(([t,n])=>`${n} ${t.replace(/_/g," ")}`).join(", ");
      const goArchive=await confirmDanger({ title:`"${c.name}" has payroll history`,
        message:`It has ${parts}. Permanently deleting would cascade-delete all of that and erase the history. Archive it instead — that hides the company but keeps every record (Restore anytime).`,
        confirmLabel: c.status==="active" ? "Archive instead" : "OK" });
      if(goArchive && c.status==="active") await doSetStatus(c,"inactive");
      return;
    }
    const ok=await confirmDanger({ title:`Permanently delete "${c.name}"?`,
      message:`This company has no payments, pay periods, time, rates, or contractor links. It will be removed completely. This cannot be undone.`,
      confirmWord:c.name, confirmLabel:"Delete permanently" });
    if(!ok) return;
    setBusy(true);
    const {error}=await client.from("companies").delete().eq("id",c.id);
    setBusy(false);
    if(error){ setMsg("Delete failed: "+error.message); return; }
    logEvent(client,{action:"company_deleted", entity:"company "+c.name});
    setMsg(`Deleted "${c.name}".`);
    if(currentCompanyId===c.id && setCompanyId) setCompanyId("");
    await load(); onChanged&&onChanged();
  }

  if(rows===null) return <div className="modal-bg" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}><Skeleton rows={4}/></div></div>;
  const active=rows.filter(c=>c.status==="active");
  const archived=rows.filter(c=>c.status!=="active");
  const badge=s=> s==="active" ? <span className="pill good">Active</span> : <span className="pill">Archived</span>;
  const orgTxt=c=> c.hubstaff_org_id!=null ? ("Hubstaff org "+c.hubstaff_org_id) : "no Hubstaff link";

  const rowView=(c)=>{
   const editing=editId===c.id;
   return (
    <div key={c.id} className={editing?"":"row"} style={editing
      ? {borderTop:"1px solid var(--border)",padding:"12px 0"}
      : {justifyContent:"space-between",alignItems:"center",gap:10,borderTop:"1px solid var(--border)",padding:"10px 0",flexWrap:"wrap"}}>
      {editing ? (
        <div style={{width:"100%"}}>
          <div className="row">
            <div className="field" style={{minWidth:0}}><label>Company name</label>
              <input value={eName} onChange={e=>setEName(e.target.value)} placeholder="Company name" style={{width:"100%"}} aria-label="Company name"/></div>
            <div className="field" style={{minWidth:0}}><label>Tax ID (EIN / TIN)</label>
              <input value={eTax} onChange={e=>setETax(e.target.value)} placeholder="e.g. 12-3456789" style={{width:"100%"}} aria-label="Tax ID"/></div>
            <div className="field" style={{minWidth:0}}><label>Hubstaff org ID (optional)</label>
              <input value={eOrg} onChange={e=>setEOrg(e.target.value)} placeholder="e.g. 258598" inputMode="numeric" style={{width:"100%"}} aria-label="Hubstaff org ID"/></div>
          </div>
          <div className="row">
            <div className="field" style={{minWidth:0,flex:"2 1 0"}}><label>Address</label>
              <input value={eAddr} onChange={e=>setEAddr(e.target.value)} placeholder="Street, city, state ZIP" style={{width:"100%"}}/></div>
            <div className="field" style={{minWidth:0,flex:"2 1 0"}}><label>Phone</label>
              <PhoneInput value={ePhone} onChange={setEPhone} defaultCountry="US"/></div>
            <div className="field" style={{minWidth:0}}><label>Website</label>
              <input value={eWeb} onChange={e=>setEWeb(e.target.value)} placeholder="https://…" style={{width:"100%"}}/></div>
          </div>
          <div style={{marginTop:2}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <b style={{fontSize:13}}>Contacts</b>
              <button className="btn ghost sm" disabled={busy} onClick={addContact}>+ Add contact</button>
            </div>
            {eContacts.length===0 && <div className="sub" style={{fontSize:12,marginBottom:4}}>No contacts yet — add one.</div>}
            {eContacts.map((k,i)=>(
              <div key={i} className="card" style={{marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                  <span className="sub" style={{fontSize:11}}>Contact {i+1}</span>
                  <button className="btn ghost sm" disabled={busy} onClick={()=>removeContact(i)} style={{color:"#b91c1c",borderColor:"#fca5a5"}}>Remove</button>
                </div>
                <div className="row">
                  <div className="field" style={{minWidth:0}}><label>First name</label>
                    <input value={k.first_name} onChange={e=>setContact(i,"first_name",e.target.value)} style={{width:"100%"}}/></div>
                  <div className="field" style={{minWidth:0}}><label>Last name</label>
                    <input value={k.last_name} onChange={e=>setContact(i,"last_name",e.target.value)} style={{width:"100%"}}/></div>
                  <div className="field" style={{minWidth:0}}><label>Title</label>
                    <input value={k.title} onChange={e=>setContact(i,"title",e.target.value)} placeholder="e.g. Billing Manager" style={{width:"100%"}}/></div>
                </div>
                <div className="row">
                  <div className="field" style={{minWidth:0,flex:"2 1 0"}}><label>Email</label>
                    <EmailInput value={k.email} onChange={v=>setContact(i,"email",v)} style={{width:"100%"}}/></div>
                  <div className="field" style={{minWidth:0,flex:"2 1 0"}}><label>Mobile</label>
                    <PhoneInput value={k.mobile} onChange={v=>setContact(i,"mobile",v)} defaultCountry="US"/></div>
                </div>
                <div className="row">
                  <div className="field" style={{minWidth:0,flex:"2 1 0"}}><label>Office number <span className="muted" style={{fontWeight:400}}>(trunk line)</span></label>
                    <PhoneInput value={k.office} onChange={v=>setContact(i,"office",v)} defaultCountry="US"/></div>
                  <div className="field" style={{minWidth:0,flex:"1 1 0"}}><label>Extension</label>
                    <input value={k.extension} onChange={e=>setContact(i,"extension",e.target.value)} inputMode="numeric" placeholder="x123" style={{width:"100%"}}/></div>
                </div>
                <div className="row">
                  <div className="field" style={{minWidth:0,flex:"2 1 0"}}><label>Fax</label>
                    <PhoneInput value={k.fax} onChange={v=>setContact(i,"fax",v)} defaultCountry="US"/></div>
                </div>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:8,marginTop:8}}>
            <button className="btn sm" disabled={busy} onClick={()=>saveEdit(c)}>{busy?"Saving…":"Save"}</button>
            <button className="btn ghost sm" disabled={busy} onClick={cancelEdit}>Cancel</button>
          </div>
        </div>
      ) : (
        <React.Fragment>
          <div style={{minWidth:200}}>
            <div style={{fontWeight:600,display:"flex",alignItems:"center",gap:8}}>{c.name} {badge(c.status)}</div>
            <div className="sub" style={{fontSize:12}}>{orgTxt(c)}{currentCompanyId===c.id?" · currently selected":""}</div>
            {(c.tax_id||c.phone||c.website||c.address||(Array.isArray(c.contacts)&&c.contacts.length>0)) &&
              <div className="sub" style={{fontSize:11.5,marginTop:2}}>
                {[c.tax_id&&("Tax ID "+c.tax_id),c.phone,c.website,c.address].filter(Boolean).join(" · ")}
                {Array.isArray(c.contacts)&&c.contacts.length>0
                  ? ((c.tax_id||c.phone||c.website||c.address?" · ":"")+c.contacts.length+" contact"+(c.contacts.length===1?"":"s"))
                  : ""}
              </div>}
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            <button className="btn ghost sm" disabled={busy} onClick={()=>startEdit(c)}>Edit</button>
            {/* The employer is the payroll home — never archive/delete it (would orphan all pay history). */}
            {kind!=="employer" && (c.status==="active"
              ? <button className="btn ghost sm" disabled={busy} onClick={()=>archive(c)}>Archive</button>
              : <button className="btn ghost sm" disabled={busy} onClick={()=>doSetStatus(c,"active")}>Restore</button>)}
            {isOwner && kind!=="employer" && <button className="btn danger-outline sm" disabled={busy} onClick={()=>destroy(c)}>Delete</button>}
          </div>
        </React.Fragment>
      )}
    </div>
   );
  };

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" ref={mref} role="dialog" aria-modal="true" aria-labelledby="co-title" onClick={e=>e.stopPropagation()}
           style={{maxWidth:680,maxHeight:"86vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <h2 id="co-title" style={{margin:0}}>{kind==="employer"?"Employer":kind==="client"?"Clients":"Companies"}</h2>
          <button className="btn ghost sm" onClick={onClose}>Close</button>
        </div>
        <p className="sub" style={{marginTop:6}}>{kind==="employer"
          ? "The payroll home for every contractor (Aaron Anderson E.H.S. LLC). Edit it to set its Hubstaff org link, tax ID, address, phone, website and contacts. It is never billed and can't be archived/deleted."
          : "Add/edit/archive the clients you invoice. Edit a client to set its tax ID, address, phone, website and contacts. Assigning a contractor to a client is billing-only and never changes their pay."}{isOwner&&kind!=="employer"?" Permanent delete is only for empty clients.":""}</p>
        {msg && <div className="banner info" style={{margin:"10px 0"}}>{msg}</div>}

        <div className="card" style={{marginTop:6}}>
          <b>{kind==="employer"?"Add an employer (tenant)":kind==="client"?"Add a client":"Add a company"}</b>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",marginTop:8}}>
            <input value={nName} onChange={e=>setNName(e.target.value)} placeholder="Company name (required)" style={{minWidth:200,flex:1}} aria-label="New company name"/>
            <input value={nOrg} onChange={e=>setNOrg(e.target.value)} placeholder="Hubstaff org ID (optional)" inputMode="numeric" style={{minWidth:170}} aria-label="New company Hubstaff org ID"/>
            <button className="btn" disabled={busy||!nName.trim()} onClick={add}>Add</button>
          </div>
          <div className="sub" style={{fontSize:11.5,marginTop:6}}>Hubstaff org ID links the company for time sync (ID-first matching). Find it in Hubstaff → Organization settings, or leave blank and set it later via Edit.</div>
        </div>

        <div style={{marginTop:14}}>
          <div className="ov-tile-label" style={{marginBottom:2}}>Active ({active.length})</div>
          {active.length ? active.map(rowView) : <div className="sub" style={{padding:"8px 0"}}>No active companies.</div>}
        </div>
        {archived.length>0 && (
          <div style={{marginTop:16}}>
            <div className="ov-tile-label" style={{marginBottom:2}}>Archived ({archived.length})</div>
            {archived.map(rowView)}
          </div>
        )}
      </div>
    </div>
  );
}

// Configuration tab — one home for the admin config + global maintenance tools.
// Portal Fields / Agreement Templates / Onboarding Configuration open the same
// modals used elsewhere; the Wise admin tools (Backfill all paid periods, Email
// cross-check, Cross-system drift) live in WiseReconciliation.
// Phase 4 — client invoicing. Invoice a CLIENT for WORKED hours per contractor ×
// their USD bill rate (worker_companies.bill_rate_usd); PTO is excluded (it's the
// employer's cost, never billed). Reads time_entries by company_id + date window;
// persists an invoices header + invoice_lines snapshot (reproducible AR).
function Invoicing({ client, employerId, companiesNonce }){
  const inp={width:"100%"};
  const yr=new Date().getFullYear();
  const cur=(()=>{ try{ return periodFor(new Date().toISOString().slice(0,10)); }catch{ return {start:"",end:""}; } })();
  const [from,setFrom]=useState(cur.start||""); const [to,setTo]=useState(cur.end||"");
  const [markup,setMarkup]=useState(0);
  const [preview,setPreview]=useState(null);   // {lines, subtotal, total_hours}
  const [busy,setBusy]=useState(false); const [msg,setMsg]=useState(""); const [err,setErr]=useState("");
  // Client picker lives here now (it's the only tab that bills a client). "__all__"
  // browses the full invoice history; a single client is required to create one.
  // Derive companyId/consolidated locally so the rest of the tab is unchanged.
  const { data:clients }=useQuery(client,
    c=>c.from("companies").select("id,name").eq("kind","client").eq("status","active").order("name"),[client,companiesNonce]);
  const [selClient,setSelClient]=useState("__all__");
  const consolidated = (selClient==="__all__"||!selClient);
  const companyId = consolidated ? "" : selClient;
  const { data:invoices, reload }=useQuery(client,c=>{
    let q=c.from("invoices").select("id,company_id,period_start,period_end,invoice_no,status,subtotal_usd,total_usd,markup_pct,created_at,companies(name)").order("created_at",{ascending:false});
    if(!consolidated&&companyId) q=q.eq("company_id",companyId);
    return q;
  },[client,companyId,consolidated]);

  async function buildPreview(){
    if(consolidated||!companyId){ setErr("Pick a single client above to invoice."); return; }
    if(!from||!to){ setErr("Set a from and to date."); return; }
    if(!employerId){ setErr("Employer not resolved yet — reload and retry."); return; }
    setBusy(true); setErr(""); setMsg(""); setPreview(null);
    // 1) the CLIENT's roster + USD bill rates (the worker→client billing links).
    const { data:wc, error:wcErr }=await client.from("worker_companies")
      .select("worker_id,role,bill_rate_usd,workers(first_name,middle_name,last_name)")
      .eq("company_id",companyId).eq("status","active");
    if(wcErr){ setErr("Couldn't load client roster: "+wcErr.message); setBusy(false); return; }
    const rateBy={}, nameBy={}, ids=[];
    (wc||[]).forEach(l=>{ if(!l.worker_id) return; rateBy[l.worker_id]={ rate:Number(l.bill_rate_usd)||0, role:l.role||"" }; nameBy[l.worker_id]=fullName(l.workers); ids.push(l.worker_id); });
    if(!ids.length){ setPreview({lines:[],subtotal:0,total_hours:0}); setMsg("No contractors are assigned to this client yet — assign them in Configuration → Clients."); setBusy(false); return; }
    // 2) EMPLOYER time for those workers (time lives on the employer; we attribute
    //    it to this client via the billing links above — NOT via time_entries.company_id).
    const { data:te, error }=await client.from("time_entries")
      .select("worker_id,tracked_seconds")
      .eq("company_id",employerId).in("worker_id",ids).gte("work_date",from).lte("work_date",to).limit(100000);
    if(error){ setErr("Couldn't load time: "+error.message); setBusy(false); return; }
    const agg={};   // worked seconds per worker (PTO already excluded — only tracked_seconds summed)
    (te||[]).forEach(t=>{ if(!t.worker_id) return; (agg[t.worker_id]=agg[t.worker_id]||{sec:0}).sec+=Number(t.tracked_seconds)||0; });
    const lines=ids.map(wid=>{ const r=rateBy[wid]||{rate:0,role:""}; const sec=(agg[wid]||{}).sec||0;
      const hours=Math.round(sec/3600*100)/100; return { worker_id:wid, worker_name:nameBy[wid], position:r.role, worked_hours:hours, bill_rate_usd:r.rate, amount_usd:Math.round(hours*r.rate*100)/100 }; })
      .filter(l=>l.worked_hours>0).sort((a,b)=>a.worker_name.localeCompare(b.worker_name));
    const subtotal=Math.round(lines.reduce((s,l)=>s+l.amount_usd,0)*100)/100;
    const total_hours=Math.round(lines.reduce((s,l)=>s+l.worked_hours,0)*100)/100;
    setPreview({lines,subtotal,total_hours}); setBusy(false);
    if(!lines.length) setMsg("No worked hours for this client's contractors in the window.");
    else if(lines.some(l=>!l.bill_rate_usd)) setMsg("Heads up: some contractors have no USD bill rate (their lines are $0). Set each one's rate in the contractor's Edit → Client engagements.");
  }

  async function generate(){
    if(!preview||!preview.lines.length){ setErr("Build a preview first."); return; }
    setBusy(true); setErr(""); setMsg("");
    const mk=Number(markup)||0; const subtotal=preview.subtotal; const total=Math.round(subtotal*(1+mk/100)*100)/100;
    const { data:noRes }=await client.rpc("allocate_invoice_no",{ p_year:yr });
    const { data:u }=await client.auth.getUser();
    const { data:inv, error }=await client.from("invoices").insert({
      company_id:companyId, period_start:from, period_end:to, invoice_no:noRes||null, status:"draft",
      subtotal_usd:subtotal, total_usd:total, markup_pct:mk, currency:"USD", created_by:(u&&u.user&&u.user.id)||null,
    }).select("id,invoice_no").single();
    if(error){ setErr(/one_live_per_period/.test(error.message)?"A live invoice already exists for this client + period — void it first to regenerate.":"Couldn't create invoice: "+error.message); setBusy(false); return; }
    const { error:le }=await client.from("invoice_lines").insert(preview.lines.map(l=>({ invoice_id:inv.id, worker_id:l.worker_id, worker_name:l.worker_name, position:l.position, worked_hours:l.worked_hours, bill_rate_usd:l.bill_rate_usd, amount_usd:l.amount_usd })));
    if(le){ setErr("Invoice created but lines failed: "+le.message); setBusy(false); return; }
    logEvent(client,{company_id:companyId,action:"invoice_generated",entity:"Invoice "+(inv.invoice_no||inv.id),detail:{period:[from,to],subtotal_usd:subtotal,total_usd:total,lines:preview.lines.length}});
    setMsg("Invoice "+(inv.invoice_no||"")+" generated — "+money(total,"USD")+"."); setPreview(null); setBusy(false); reload();
  }

// Map Hubstaff projects → client companies (Phase A of multi-client attribution).
// Lists the employer org's projects via hubstaff-sync(list_projects) and lets the
// owner assign each to a client; saved to hubstaff_projects. cron_ingest then
// attributes each project's tracked time to that client.
function HubstaffProjectsModal({ client, onClose }){
  const mref=useModalA11y(onClose,{escClose:true});
  const [companies,setCompanies]=useState([]);
  const [orgOptions,setOrgOptions]=useState([]); const [orgId,setOrgId]=useState("");
  const [projects,setProjects]=useState(null);   // null = not loaded yet
  const [map,setMap]=useState({});                // project_id -> company_id ("" = unassigned)
  const [busy,setBusy]=useState(false); const [msg,setMsg]=useState(""); const [err,setErr]=useState("");
  useEffect(()=>{
    client.from("companies").select("id,name,status,hubstaff_org_id").eq("status","active").order("name").then(({data})=>{
      const cs=data||[]; setCompanies(cs);
      const orgs=[...new Set(cs.map(c=>c.hubstaff_org_id).filter(x=>x!=null).map(Number))];
      setOrgOptions(orgs); if(orgs.length) setOrgId(String(orgs[0]));
    });
    client.from("hubstaff_projects").select("hubstaff_project_id,company_id").then(({data})=>{
      const m={}; (data||[]).forEach(r=>{ m[r.hubstaff_project_id]=r.company_id; }); setMap(m);
    });
  },[]);  // eslint-disable-line
  async function loadProjects(){
    if(!orgId){ setErr("No Hubstaff org is linked to a company yet — set one under Companies."); return; }
    setBusy(true); setErr(""); setMsg("");
    const {data,error}=await client.functions.invoke("hubstaff-sync",{body:{action:"list_projects",org_id:Number(orgId)}});
    setBusy(false);
    if(error||(data&&data.error)){ setErr((data&&data.error)||"Couldn't load projects — is hubstaff-sync deployed with the list_projects action?"); return; }
    setProjects((data.projects||[]).slice().sort((a,b)=>String(a.name||"").localeCompare(String(b.name||""))));
  }
  async function save(){
    setBusy(true); setErr(""); setMsg("");
    const rows=Object.entries(map).filter(([,cid])=>cid).map(([pid,cid])=>{
      const p=(projects||[]).find(x=>String(x.id)===String(pid));
      return { hubstaff_project_id:Number(pid), company_id:cid, name:p?p.name:null, org_id:Number(orgId)||null, updated_at:new Date().toISOString() };
    });
    if(rows.length){ const {error}=await client.from("hubstaff_projects").upsert(rows,{onConflict:"hubstaff_project_id"}); if(error){ setErr("Save failed: "+error.message); setBusy(false); return; } }
    const unassigned=Object.entries(map).filter(([,cid])=>!cid).map(([pid])=>Number(pid));
    if(unassigned.length){ await client.from("hubstaff_projects").delete().in("hubstaff_project_id",unassigned); }
    setBusy(false); setMsg(`Saved — ${rows.length} project${rows.length===1?"":"s"} mapped.`);
    logEvent(client,{action:"hubstaff_projects_mapped",entity:"Hubstaff project map",detail:{mapped:rows.length,org_id:Number(orgId)||null}});
  }
  const inp={width:"100%"};
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" ref={mref} role="dialog" aria-modal="true" aria-labelledby="hp-title" onClick={e=>e.stopPropagation()} style={{maxWidth:680,maxHeight:"86vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <h2 id="hp-title" style={{margin:0}}>Hubstaff projects → clients</h2>
          <button className="btn ghost sm" onClick={onClose}>Close</button>
        </div>
        <p className="sub">Assign each Hubstaff project to the client company it bills to. Tracked time on that project is then attributed to that client. Unassigned projects fall back to the company the daily sync runs for.</p>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",margin:"8px 0"}}>
          {orgOptions.length>1
            ? <select value={orgId} onChange={e=>setOrgId(e.target.value)}>{orgOptions.map(o=><option key={o} value={o}>Hubstaff org {o}</option>)}</select>
            : <span className="muted" style={{fontSize:12}}>{orgId?`Hubstaff org ${orgId}`:"No Hubstaff org linked (set under Companies)"}</span>}
          <button className="btn sm" disabled={busy||!orgId} onClick={loadProjects}>{busy?"Loading…":(projects?"Reload projects":"Load projects")}</button>
        </div>
        {err && <div className="err" style={{marginTop:4}}>{err}</div>}
        {projects!==null && (projects.length===0
          ? <div className="muted" style={{fontSize:13}}>No projects returned for this org.</div>
          : <div style={{marginTop:6}}>
              {projects.map(p=>(
                <div key={p.id} style={{display:"flex",gap:8,alignItems:"center",justifyContent:"space-between",borderTop:"1px solid var(--border)",padding:"8px 0",flexWrap:"wrap"}}>
                  <div><b>{p.name||("Project "+p.id)}</b> <span className="muted" style={{fontSize:11}}>· id {p.id}{p.status&&p.status!=="active"?` · ${p.status}`:""}</span></div>
                  <select style={{minWidth:220}} value={map[p.id]||""} onChange={e=>setMap(m=>({...m,[p.id]:e.target.value}))}>
                    <option value="">— unassigned —</option>
                    {companies.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                  </select>
                </div>
              ))}
              <div style={{display:"flex",gap:8,alignItems:"center",marginTop:10}}>
                <button className="btn" disabled={busy} onClick={save}>{busy?"Saving…":"Save mappings"}</button>
                {msg && <span className="muted" style={{fontSize:13}}>{msg}</span>}
              </div>
            </div>)}
      </div>
    </div>
  );
}

function App() {
  const sb = useSupabase();
  // Restore the last tab on refresh (validated against known ids) so reloading
  // keeps you on the screen you were on instead of resetting to Contractors.
  const [tab, setTab] = useState(()=>{
    try{ const t=localStorage.getItem("eis_tab");
      return ["overview","contractors","onboarding","documents","time","payroll","process","batches","reports","invoicing","imports","audit","configuration"].includes(t)?t:"overview";
    }catch{ return "overview"; }
  });
  useEffect(()=>{ setToastTab(tab); try{ localStorage.setItem("eis_tab",tab); }catch{ /* ignore */ } },[tab]);
  // Lazy-mount tabs on first visit: a never-opened tab isn't mounted, so its
  // useQuery calls never fire — this kills the on-app-load query storm where all
  // ~10 always-mounted tabs fetched at once. Once a tab is opened it STAYS mounted
  // (added to seenTabs), preserving its in-memory state across later switches —
  // the original "keep tabs mounted" intent, minus the never-visited ones.
  const [seenTabs,setSeenTabs]=useState(()=>new Set([tab]));
  useEffect(()=>{ setSeenTabs(s=>s.has(tab)?s:new Set(s).add(tab)); },[tab]);
  const [sidebarCollapsed,setSidebarCollapsed]=useState(()=>{ try{ return localStorage.getItem("eis_sidebar")==="1"; }catch{ return false; } });
  useEffect(()=>{ try{ localStorage.setItem("eis_sidebar",sidebarCollapsed?"1":"0"); }catch{ /* ignore */ } },[sidebarCollapsed]);
  const [moreOpen,setMoreOpen]=useState(false);   // mobile "More" sheet
  // Global quick-find: Cmd-K (Mac) / Ctrl-K (Win) toggles the command palette.
  const [paletteOpen,setPaletteOpen]=useState(false);
  useEffect(()=>{
    const h=(e)=>{ if((e.metaKey||e.ctrlKey)&&!e.altKey&&(e.key==="k"||e.key==="K")){ e.preventDefault(); setPaletteOpen(o=>!o); } };
    window.addEventListener("keydown",h); return ()=>window.removeEventListener("keydown",h);
  },[]);
  // Pin the sticky sidebar exactly below the topbar by measuring its REAL height
  // (varies with brand size / wrapping) rather than a hardcoded guess.
  useEffect(()=>{
    const set=()=>{ const tb=document.querySelector(".topbar"); if(tb) document.documentElement.style.setProperty("--topbar-h", tb.offsetHeight+"px"); };
    set(); window.addEventListener("resize",set);
    return ()=>window.removeEventListener("resize",set);
  },[sb.session]);
  // EMPLOYER (tenant / payroll home) = the app's primary context; EVERY contractor
  // is paid here and every payroll/ops tab is pinned to it. The top-right switcher
  // selects it (today there's one: Aaron Anderson E.H.S. LLC). Default to the known
  // id to avoid a null flash; on mount, keep a valid cached pick or snap to the
  // (only) employer from the DB. Client selection for billing now lives inside the
  // Invoicing tab — it's the only place it's used.
  const [employerId,setEmployerId]=useState(localStorage.getItem("sel_employer")||"11111111-1111-1111-1111-111111111111");
  useEffect(()=>{ if(employerId){ try{localStorage.setItem("sel_employer",employerId);}catch{/*noop*/} } },[employerId]);
  useEffect(()=>{ if(!sb.client) return; let live=true;
    sb.client.from("companies").select("id").eq("kind","employer").eq("status","active").order("name")
      .then(({data})=>{ if(!live||!data||!data.length) return; const ids=new Set(data.map(c=>c.id));
        setEmployerId(cur=> ids.has(cur) ? cur : data[0].id); }).catch(()=>{});
    return ()=>{live=false;}; },[sb.client]);

  // Per-company API-payouts gate (keyed on the selected EMPLOYER — the payroll
  // context). When TRUE, the Process & Pay screen shows Fund affordances that
  // move real money via the wise-payouts edge function `fund` action. Default
  // FALSE — flip per employer via the owner-only toggle (or SQL). Re-queried
  // when the employer changes.
  const [apiPayoutsEnabled, setApiPayoutsEnabled] = useState(false);
  useEffect(()=>{
    if (!sb.client || !employerId) { setApiPayoutsEnabled(false); return; }
    sb.client.from("companies").select("api_payouts_enabled").eq("id", employerId).single()
      .then(({data}) => setApiPayoutsEnabled(!!data?.api_payouts_enabled));
  }, [sb.client, employerId]);
  // H7 — flip the per-employer API-payout flag from the UI (was SQL-only).
  // Real-money gate, so it requires a typed ENABLE/DISABLE confirmation and
  // writes an audit row. Returns a status string for the caller to surface.
  const toggleApiPayouts = React.useCallback(async (next)=>{
    if (!sb.client || !employerId) return "Pick an employer first.";
    const word = next ? "ENABLE" : "DISABLE";
    const typed = window.prompt(
      `${next?"ENABLE":"DISABLE"} API payouts for this employer?\n\n`+
      (next
        ? "When ENABLED, the Process & Pay screen can fund Wise transfers directly "+
          "via the API — this moves REAL MONEY out of your Wise balance (per-row and "+
          "bulk Fund buttons appear). Each fund still has its own confirmation.\n\n"
        : "When DISABLED, the Fund buttons disappear; payouts go back to draft-only "+
          "(money moves via the Manual Wise batch CSV).\n\n")+
      `Type ${word} to confirm:`);
    if (typed==null) return null;                       // cancelled
    if (typed.trim().toUpperCase()!==word) return `Not ${word.toLowerCase()}d — confirmation text didn't match.`;
    const { error } = await sb.client.from("companies")
      .update({ api_payouts_enabled: next }).eq("id", employerId);
    if (error) return "Couldn't update flag: "+error.message;
    setApiPayoutsEnabled(next);
    logEvent(sb.client, { company_id:employerId, action:"api_payouts_flag",
      entity:"company", detail:{ enabled:next } });
    return `API payouts ${next?"ENABLED":"DISABLED"} for this employer.`;
  }, [sb.client, employerId]);

  // Bumped when companies are added/archived/deleted (Configuration → CompaniesModal)
  // so the EmployerSwitcher / pickers re-fetch their lists without a full reload.
  const [companiesNonce,setCompaniesNonce]=useState(0);
  const bumpCompanies=React.useCallback(()=>setCompaniesNonce(n=>n+1),[]);

  // Bumped when a contractor is added from another tab (e.g. the Onboarding
  // hire wizard) so the always-mounted Contractors list re-fetches instead of
  // showing a stale roster until a manual refresh / company switch.
  const [rosterNonce,setRosterNonce]=useState(0);
  const bumpRoster=React.useCallback(()=>setRosterNonce(n=>n+1),[]);

  // Session-scoped "billing dirty" tracker: ProfileModal pushes a record into
  // billingDirty whenever a billing-relevant field (rate, payout method, Wise
  // recipient, UUID, payout account) is saved. Any action that could
  // calculate/process/pay against stale info (Calculate, Lock & Save,
  // Reconcile, Create Wise batch, Download CSVs, Mark all paid) calls
  // confirmBillingDirty() first; the user sees a list of changes and can
  // cancel or proceed. The list is cleared on confirm so back-to-back actions
  // in the same chain don't re-prompt — a later edit re-arms it.
  const [billingDirty, setBillingDirty] = useState([]);
  const recordBillingChange = React.useCallback((rec) => {
    setBillingDirty(prev => {
      const filtered = prev.filter(e => !(e.workerId===rec.workerId && e.field===rec.field));
      return [...filtered, { ...rec, at: new Date().toISOString() }];
    });
  }, []);
  // Cross-tab "jump to contractor profile" plumbing. Any warning anywhere in
  // the app can call openContractor(workerId) to switch to the Contractors
  // tab and auto-open that contractor's profile modal. Contractors consumes
  // the id via useEffect.
  const [pendingWorkerId, setPendingWorkerId] = useState(null);
  const openContractor = React.useCallback(async (workerId)=>{
    if(!workerId) return;
    if(unsavedDirty() && !(await confirmUnsaved())) return;
    setPendingWorkerId(String(workerId));
    setTab("contractors");
    const w=document.querySelector(".wrap");
    if(w) w.scrollIntoView({block:"start"});
    window.scrollTo(0,0);
  }, []);
  const consumePendingWorker = React.useCallback(()=>setPendingWorkerId(null), []);

  // Cross-tab "open this period in Calculate" plumbing — e.g. unlocking a period
  // in Process & Pay jumps straight to Calculate with that batch loaded for
  // editing. Calculate (Payroll) consumes pendingPeriod via useEffect.
  const [pendingPeriod, setPendingPeriod] = useState(null);   // {start,end} | null
  const openPeriodForEdit = React.useCallback(async (p)=>{
    if(!p||!p.start) return;
    if(unsavedDirty() && !(await confirmUnsaved())) return;
    setPendingPeriod({start:p.start, end:p.end});
    setTab("payroll");
    const w=document.querySelector(".wrap");
    if(w) w.scrollIntoView({block:"start"});
    window.scrollTo(0,0);
  }, []);
  const consumePendingPeriod = React.useCallback(()=>setPendingPeriod(null), []);

  // Async (returns Promise<boolean>) — uses the styled confirmDanger modal like
  // the other money actions, NOT window.confirm. It's a review-and-proceed (no
  // typed word), so confirmWord is omitted → plain Cancel / Proceed. Every
  // caller awaits gate()/confirmBillingDirty(); an un-awaited call would render a
  // truthy Promise and silently bypass the guard, so all 9 sites are awaited.
  const confirmBillingDirty = React.useCallback(async (actionLabel) => {
    if (!billingDirty.length) return true;
    const lines = billingDirty.slice(0,12).map(e=>`• ${e.name} — ${e.field}`).join("\n");
    const more = billingDirty.length>12 ? `\n…and ${billingDirty.length-12} more` : "";
    const ok = await confirmDanger({
      title: `Billing info changed for ${billingDirty.length} contractor(s)`,
      message: `Edited in this session:\n\n${lines}${more}`,
      consequence: `Recommended: cancel, then Recalculate the affected pay period(s) so the new info is reflected before "${actionLabel}".`,
      confirmLabel: `Proceed with ${actionLabel}`,
    });
    if (ok) setBillingDirty([]);
    return ok;
  }, [billingDirty]);

  // Browser refresh / tab-close backstop: native prompt when any guarded surface
  // is dirty (the in-app prompt can't intercept a hard unload). Mounted once for
  // the whole session; placed before the early returns so hook order is stable.
  useEffect(()=>{
    const h=(e)=>{ if(unsavedDirty()){ e.preventDefault(); e.returnValue=""; } };
    window.addEventListener("beforeunload",h);
    return ()=>window.removeEventListener("beforeunload",h);
  }, []);

  // Who is signed in: gate the app to admins; owner-only controls to owners.
  const [myAdminRole,setMyAdminRole]=useState(undefined);  // undefined=loading | null=not an admin | 'error' | 'owner'|'admin'
  const [showAdmins,setShowAdmins]=useState(false);
  const [roleNonce,setRoleNonce]=useState(0);              // bump to retry the access check
  useEffect(()=>{
    if(!sb.client || !sb.session){ setMyAdminRole(undefined); return; }
    let live=true; setMyAdminRole(undefined);
    sb.client.from("admin_users").select("role").eq("user_id",sb.session.user.id).maybeSingle()
      .then(({data,error})=>{ if(!live) return; setMyAdminRole(error ? "error" : (data?data.role:null)); })
      .catch(()=>{ if(live) setMyAdminRole("error"); });   // fail CLOSED → retry screen, never grant access on an error
    return ()=>{ live=false; };
  },[sb.client, sb.session?.user?.id, roleNonce]);   // re-run on real user change / explicit retry — NOT on every token refresh

  if (!sb.client) {
    // Credentials are built-in, so a null client means the supabase-js module is
    // still loading from esm.sh — show Loading (or a Reload prompt if the CDN
    // never answered), NOT the Connect screen. Connect only appears when creds
    // are genuinely absent (the user explicitly disconnected).
    if (sb.creds.url && sb.creds.key) return (
      <div className="connect"><div className="card">
        {sb.libTimedOut
          ? <><p className="sub">Couldn't load the app — check your connection, then reload.</p>
              <button className="btn" style={{width:"100%"}} onClick={()=>window.location.reload()}>Reload</button></>
          : <p className="sub">Loading…</p>}
      </div></div>
    );
    return <ConnectScreen onConnect={sb.connect} />;
  }
  if (!sb.authReady) return <div className="connect"><div className="card"><p className="sub">Loading…</p></div></div>;
  if (!sb.session) return <SignInScreen client={sb.client} onBack={sb.disconnect} />;
  if (myAdminRole===undefined) return <div className="connect"><div className="card"><p className="sub">Checking access…</p></div></div>;
  if (myAdminRole==="error") return <AccessErrorScreen onRetry={()=>setRoleNonce(n=>n+1)} onSignOut={sb.signOut} />;
  if (myAdminRole===null) return <NotAuthorizedScreen email={sb.session?.user?.email||""} onSignOut={sb.signOut} />;

  // Tabs grouped by workflow stage so the bar reads as the real process order.
  const tabGroups = [
    ["Home",    [["overview","Overview"]]],
    ["Manage Team", [["contractors","Contractors"],["onboarding","Hiring & Onboarding"],["documents","Documents"]]],
    ["Run payroll", [["time","Time & Approval"],["payroll","Calculate"],["process","Process and Pay"]]],
    ["Review",  [["batches","Review & Recon Batches"],["reports","Reports"],["invoicing","Invoicing"],["imports","Imports"],["audit","Audit Log"]]],
    ["Configuration", [["configuration","Configuration"]]],
  ];
  async function go(id){ if(id===tab) return; if(unsavedDirty() && !(await confirmUnsaved())) return; setTab(id); const w=document.querySelector(".wrap"); if(w) w.scrollIntoView({block:"start"}); window.scrollTo(0,0); }
  // One icon per destination, used by the sidebar, the mobile bottom bar and the More-sheet.
  const NAV_ICON={overview:"🏠",contractors:"👥",onboarding:"🧭",documents:"📄",time:"⏱",payroll:"🧮",process:"💸",batches:"📦",reports:"📊",invoicing:"🧾",imports:"🗂",audit:"📝",configuration:"⚙"};
  // Mobile bottom bar: 4 most-used + a "More" button (opens the full grouped sheet).
  const bottomPrimary=[["overview","Home"],["time","Time"],["payroll","Calc"],["process","Pay"]];
  const inPrimary=bottomPrimary.some(([id])=>id===tab);
  const isOwner = myAdminRole==="owner";
  return (
    <div>
      <a href="#main" className="skip-link">Skip to content</a>
      <DangerConfirm/>
      {paletteOpen && <CommandPalette {...{client:sb.client,companyId:employerId,consolidated:false,tabGroups,navIcon:NAV_ICON,go,openContractor,openPeriodForEdit,onClose:()=>setPaletteOpen(false)}} />}
      {isOwner && showAdmins && <AdminsModal client={sb.client} meId={sb.session.user.id} onClose={()=>setShowAdmins(false)}/>}
      <header className="topbar">
        <h1 className="brand">
          <img src="mark-light.png" alt="" onError={e=>{e.currentTarget.style.display="none";}}
            style={{height:38,marginRight:12,verticalAlign:"middle"}}/>
          HR &amp; Payroll<small>PH independent contractors</small></h1>
        <div className="topbar-actions">
          <button className="btn ghost sm" onClick={()=>setPaletteOpen(true)} title="Quick find (⌘K / Ctrl-K)" aria-label="Quick find">🔎 Find</button>
          <div className="company-switcher"><EmployerSwitcher {...{client:sb.client,employerId,setEmployerId,companiesNonce}} /></div>
          {sb.session?.user?.email && <span className="sub" style={{fontSize:12,whiteSpace:"nowrap"}} title="Signed in">{sb.session.user.email}</span>}
          {isOwner && <button className="btn ghost sm" onClick={()=>setShowAdmins(true)}>Admins</button>}
          <button className="btn ghost sm" onClick={async()=>{ if(unsavedDirty() && !(await confirmUnsaved())) return; sb.signOut(); }}>Sign out</button>
        </div>
      </header>
      <div className="shell">
        <nav className={"sidebar no-print"+(sidebarCollapsed?" collapsed":"")} aria-label="Sections">
          {tabGroups.map(([label,items])=>(
            <div className="side-group" key={label}>
              <div className="side-group-label">{label}</div>
              {items.map(([id,lbl])=>(
                <button key={id} className={"side-item"+(tab===id?" active":"")}
                  aria-current={tab===id?"page":undefined} title={sidebarCollapsed?lbl:undefined} onClick={()=>go(id)}>
                  <span className="side-ico" aria-hidden="true">{NAV_ICON[id]}</span>
                  <span className="side-label">{lbl}</span>
                </button>
              ))}
            </div>
          ))}
          <button className="side-collapse" onClick={()=>setSidebarCollapsed(c=>!c)}
            aria-label={sidebarCollapsed?"Expand sidebar":"Collapse sidebar"} title={sidebarCollapsed?"Expand":"Collapse"}>
            <span className="side-ico" aria-hidden="true">{sidebarCollapsed?"»":"«"}</span>
            <span className="side-label">Collapse</span>
          </button>
        </nav>
        <main className="wrap" id="main">
        <DstNudge/>
        {/* Overview (Phase 5): conditional render so its queries fire only when
            viewed; wrapped in its own ErrorBoundary for per-tab isolation. */}
        {/* EVERY tab is PINNED to the selected employer (payroll home). The top-right
            switcher picks the employer; there is no global client toggle anymore.
            Invoicing has its own client picker (the only tab that bills a client). */}
        {tab==="overview" && <ErrorBoundary><Overview {...{client:sb.client,companyId:employerId,consolidated:false,goTab:go}} /></ErrorBoundary>}
        {/* All tabs stay mounted; only the active one is shown. This preserves
            each tab's in-memory state (selected period, loaded rows, filters)
            across tab switches. */}
        {/* Contractors is pinned to the EMPLOYER roster so rate reads/writes (which key
            off r.company_id) always target the payroll home — never a client. Per-client
            billing/bill-rates are edited in the contractor's "Client engagements". */}
        {seenTabs.has("contractors") && <div style={{display:tab==="contractors"?"block":"none"}}><Contractors {...{client:sb.client,companyId:employerId,consolidated:false,onBillingChange:recordBillingChange,pendingWorkerId,consumePendingWorker,rosterNonce}} /></div>}
        {seenTabs.has("time") && <div style={{display:tab==="time"?"block":"none"}}><TimeImport {...{client:sb.client,companyId:employerId,consolidated:false,goTab:go,openPeriodForEdit}} /></div>}
        {seenTabs.has("imports") && <div style={{display:tab==="imports"?"block":"none"}}><DeleteImports {...{client:sb.client,companyId:employerId,consolidated:false}} /></div>}
        {seenTabs.has("payroll") && <div style={{display:tab==="payroll"?"block":"none"}}><Payroll {...{client:sb.client,companyId:employerId,consolidated:false,confirmBillingDirty,openContractor,goTab:go,pendingPeriod,consumePendingPeriod}} /></div>}
        {seenTabs.has("process") && <div style={{display:tab==="process"?"block":"none"}}><ProcessPayroll {...{client:sb.client,companyId:employerId,consolidated:false,active:tab==="process",confirmBillingDirty,openContractor,goTab:go,openPeriodForEdit,apiPayoutsEnabled,toggleApiPayouts}} /></div>}
        {seenTabs.has("documents") && <div style={{display:tab==="documents"?"block":"none"}}><Documents {...{client:sb.client,companyId:employerId,consolidated:false}} /></div>}
        {seenTabs.has("batches") && <div style={{display:tab==="batches"?"block":"none"}}><ProcessPayroll {...{client:sb.client,companyId:employerId,consolidated:false,active:tab==="batches",confirmBillingDirty,openContractor,reconcileOnly:true}} /></div>}
        {seenTabs.has("reports") && <div style={{display:tab==="reports"?"block":"none"}}><Reports {...{client:sb.client,companyId:employerId,consolidated:false}} /></div>}
        {seenTabs.has("invoicing") && <div style={{display:tab==="invoicing"?"block":"none"}}><Invoicing {...{client:sb.client,employerId,companiesNonce}} /></div>}
        {seenTabs.has("audit") && <div style={{display:tab==="audit"?"block":"none"}}><AuditLog {...{client:sb.client,companyId:employerId,consolidated:false}} /></div>}
        {seenTabs.has("onboarding") && <div style={{display:tab==="onboarding"?"block":"none"}}><OnboardingAdmin {...{client:sb.client,companyId:employerId,consolidated:false,active:tab==="onboarding",onContractorChanged:bumpRoster}} /></div>}
        {tab==="configuration" && <ErrorBoundary><Configuration {...{client:sb.client,isOwner,employerId,onCompaniesChanged:bumpCompanies}} /></ErrorBoundary>}
        <div className="no-print" style={{textAlign:"center",color:"var(--muted)",fontSize:11,padding:"18px 0 32px",letterSpacing:".02em"}}>Build {BUILD}</div>
      </main>
      </div>{/* /shell */}
      {/* Mobile-only bottom bar (<=768px): 4 most-used + More (opens the full sheet). */}
      <nav className="bottom-nav no-print" aria-label="Primary">
        {bottomPrimary.map(([id,lbl])=>(
          <button key={id} className={"bnav"+(tab===id?" active":"")}
            aria-current={tab===id?"page":undefined} aria-label={lbl} onClick={()=>go(id)}>
            <span className="bnav-ico" aria-hidden="true">{NAV_ICON[id]}</span>
            <span>{lbl}</span>
          </button>
        ))}
        <button className={"bnav"+(!inPrimary?" active":"")} aria-haspopup="dialog" aria-expanded={moreOpen}
          aria-label="More sections" onClick={()=>setMoreOpen(true)}>
          <span className="bnav-ico" aria-hidden="true">☰</span><span>More</span>
        </button>
      </nav>
      {moreOpen && <MoreSheet {...{tabGroups, tab, navIcon:NAV_ICON, go, onClose:()=>setMoreOpen(false)}} />}
    </div>
  );
}

// Phase 6: top-level error boundary. Any uncaught render error now shows a
// recovery screen (reload / switch to classic) instead of a blank white page,
// and ties into the kill-switch. Implements the guideline's "error state":
// names what happened, reassures, and offers a way out — never a dead end.
class ErrorBoundary extends React.Component{
  constructor(p){ super(p); this.state={err:null}; }
  static getDerivedStateFromError(err){ return {err}; }
  componentDidCatch(err,info){ try{ console.error("App error:",err,info); }catch(_){} }
  render(){
    if(!this.state.err) return this.props.children;
    return (
      <div style={{maxWidth:560,margin:"60px auto",padding:24,fontFamily:"Inter,system-ui,sans-serif"}}>
        <h2 style={{marginTop:0}}>Something went wrong</h2>
        <p className="sub">The page hit an unexpected error. Your data is safe — nothing was changed.
          Try reloading; if it keeps happening, switch to the classic view.</p>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",marginTop:12}}>
          <button className="btn" onClick={()=>location.reload()}>Reload</button>
          <a className="btn ghost" href="/?ui=classic">Switch to classic view</a>
        </div>
        <pre style={{marginTop:16,padding:12,background:"var(--surface-2)",border:"1px solid var(--border)",
          borderRadius:8,fontSize:12,overflow:"auto",color:"var(--muted)"}}>{String((this.state.err&&this.state.err.message)||this.state.err)}</pre>
      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(<><ErrorBoundary><App /></ErrorBoundary><Toaster /><UnsavedChangesModal /></>);
</script>
</body>
</html>
