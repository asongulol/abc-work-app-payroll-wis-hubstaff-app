        if(data?.error) throw new Error(data.error);
        refreshedMatched=data.matched||0;
        refreshedData=data.scanned||0;
        varianceCount+=(data.variances||0);
        ambiguousCount+=(data.ambiguous||0);
        unmatchedCount+=(data.unmatched||0);
        overriddenCount+=(data.results||[]).filter(r=>r.outcome==="matched_with_variance_overridden").length;
        // If we didn't already set matchResult from step 1, set it now so
        // the user sees per-row details from refresh too.
        if(!matchedCount) setMatchResult(data);
      }
      // 3. Report
      const parts=[];
      if(matchedCount>0)        parts.push(`linked ${matchedCount} new`);
      if(refreshedData>0)       parts.push(`re-checked ${refreshedData} already-matched`);
      if(overriddenCount>0)     parts.push(`auto-overrode ${overriddenCount} amount(s) to match Wise`);
      if(varianceCount>overriddenCount) parts.push(`${varianceCount-overriddenCount} ambiguous variance(s) needing review`);
      if(ambiguousCount>0)      parts.push(`${ambiguousCount} ambiguous`);
      if(unmatchedCount>0)      parts.push(`${unmatchedCount} unmatched`);
      if(!wiseAll.length)       parts.push("no Wise rows in this period");
      else if(!parts.length)    parts.push("nothing to do — all rows already reconciled");
      logEvent(client,{ company_id:companyId, action:"wise_recipient_sync",
        entity:`${pers?.period_start} → ${pers?.period_end}`,
        detail:{ kind:"smart_reconcile",
                 wise_rows:wiseAll.length, needs_matching:needsMatching.length,
                 needs_data:needsData.length, already_matched:alreadyMatched.length,
                 matched:matchedCount, refreshed:refreshedData,
                 overridden:overriddenCount,
                 variances:varianceCount, ambiguous:ambiguousCount, unmatched:unmatchedCount } });
      setMsg(`Reconciled with Wise: ${parts.join(", ")}.`);
      await load(periodId);
    }catch(ex){ setMsg("Reconcile failed: "+(ex.message||ex)); }
    finally{ setBusy(false); }
  }

  // Manual poll without importing a CSV — useful once transfer IDs are already in.
  // Pass includeSent=true to re-poll already-sent rows (refreshes wise_dates
  // on rows that were marked sent before that column existed).
  // Kept around as an Advanced option only — smart Reconcile is the primary UI.
  async function pollWiseForPeriod(includeSent){
    setBusy(true); setMsg("");
    try{
      const { data, error }=await client.functions.invoke("wise-payouts",{
        body:{ action:"poll", pay_period_id:periodId, only_drafts:!includeSent } });
      if(error) throw new Error(error.message||"Edge function error");
      if(data?.error) throw new Error(data.error);
      const inFlightNote=data?.in_flight?` · ${data.in_flight} still in-flight`:"";
      const verb=includeSent?"Re-polled":"Polled";
      setMsg(`${verb} ${data?.checked||0} Wise transfer(s); ${data?.marked_paid||0} now marked paid${inFlightNote}.`);
      await load(periodId);
    }catch(ex){ setMsg("Wise poll failed: "+(ex.message||ex)); }
    finally{ setBusy(false); }
  }

  // Match historical batch — call the matcher action for this period.
  // Surfaces matched / variance / ambiguous / unmatched results without
  // auto-fixing anything ambiguous. Pass refresh=true to re-fetch already-
  // matched rows (e.g. to backfill wise_dates onto older matches).
  const [matchResult,setMatchResult]=useState(null);
  async function matchHistoryForPeriod(refresh){
    setBusy(true); setMsg(""); setMatchResult(null);
    try{
      const { data, error }=await client.functions.invoke("wise-payouts",{
        body:{ action:"match", pay_period_id:periodId, window_days:14, refresh:!!refresh } });
      if(error) throw new Error(error.message||"Edge function error");
      if(data?.error) throw new Error(data.error);
      setMatchResult(data);
      // Log so it's auditable that we ran a match (idempotent, but worth recording)
      if(data?.matched || data?.variances){
        logEvent(client,{ company_id:companyId, action:"wise_recipient_sync",
          entity:`${pers?.period_start} → ${pers?.period_end}`,
          detail:{ kind:refresh?"history_refresh":"history_match", scanned:data.scanned, matched:data.matched,
                   variances:data.variances, ambiguous:data.ambiguous, unmatched:data.unmatched } });
      }
      const verb=refresh?"Refreshed":"Scanned";
      setMsg(`${verb} ${data.scanned} payment(s) against ${data.wise_transfers_pulled||0} Wise transfers: `+
             `${data.matched} matched cleanly, ${data.variances} matched with variance, `+
             `${data.ambiguous} ambiguous, ${data.unmatched} unmatched.`);
      await load(periodId);
    }catch(ex){ setMsg("History match failed: "+(ex.message||ex)); }
    finally{ setBusy(false); }
  }

  const wiseRows=(rows||[]).filter(r=>r.method==="wise");
  const bpiRows=(rows||[]).filter(r=>r.method==="bpi");
  const otherRows=(rows||[]).filter(r=>!["wise","bpi"].includes(r.method));
  const label=pers?`${pers.period_start}_to_${pers.period_end}`:"period";

  // --- export-tracking guard: warn if a batch file was already downloaded for
  // this period (prevents accidentally uploading/paying the same batch twice).
  const exportKey=(type)=>`exported_${type}_${periodId}`;
  const [exportTick,setExportTick]=useState(0); // re-render after stamping
  function lastExported(type){ try{return localStorage.getItem(exportKey(type));}catch(e){return null;} }
  function guardedExport(type, doDownload){
    const prev=lastExported(type);
    if(prev && !confirm(`You already downloaded this ${type==="wise"?"Wise batch":"payments"} file for `+
      `this period on ${new Date(prev).toLocaleString()}.\n\nDownloading again risks paying the batch twice. `+
      `Download anyway?`)) return;
    doDownload();
    try{ localStorage.setItem(exportKey(type), new Date().toISOString()); }catch(e){}
    setExportTick(t=>t+1);
  }
  // (1) Manual Wise batch CSV — EXACT Wise batch-upload template, keyed by the
  // stable recipient UUID (recipientId). Rows missing a UUID can't be uploaded,
  // so we surface them rather than emit a file Wise would reject.
  const wiseMissingUuid=wiseRows.filter(r=>!r.recipient_uuid);
  function downloadWiseBatch(){
    if(!gate("Download Wise batch CSV")) return;
    // Hard stop if there's nothing to write (every Wise row is missing a UUID).
    const includedCount=wiseRows.length-wiseMissingUuid.length;
    if(!includedCount){
      alert("All Wise rows are missing a Wise recipient UUID — nothing to write. "+
        "Open each contractor's profile and paste their UUID (Wise → Batch payments → Download all templates).");
      return;
    }
    // Click-time confirm when any row would be silently dropped — keeps the
    // user from uploading a CSV that omits contractors they think they're paying.
    if(wiseMissingUuid.length>0){
      const droppedTotal=wiseMissingUuid.reduce((s,r)=>s+(r.net||0),0);
      const lines=wiseMissingUuid.slice(0,20).map(r=>`• ${r.name} — ${money(r.net,"PHP")}`).join("\n");
      const more=wiseMissingUuid.length>20?`\n…and ${wiseMissingUuid.length-20} more`:"";
      if(!confirm(
        `${wiseMissingUuid.length} contractor(s) will be DROPPED from this CSV (no Wise recipient UUID on file):\n\n`+
        lines+more+
        `\n\nTotal not included: ${money(droppedTotal,"PHP")}\n`+
        `Included in the CSV: ${includedCount} contractor(s).\n\n`+
        `Fix: open each profile (Contractors tab) and paste the UUID from Wise → Batch payments → Download all templates.\n\n`+
        `Download anyway?`
      )) return;
    }
    guardedExport("wise", ()=>{
      // Match Wise's "all recipients" export template: 10 columns (no trailing apiError/userError
      // columns — those only appear when you re-download a processed batch). recipientId is the
      // stable recipient UUID; recipientDetail is left empty (Wise fills it from the recipientId).
      const header=["recipientId","name","recipientEmail","recipientDetail","sourceCurrency",
                    "targetCurrency","amountCurrency","amount","paymentReference","receiverType"];
      const ref=`Payroll ${pers?.period_end||""}`.trim();
      // amount: whole numbers have no trailing .00, cents preserved
      const fmtAmt=n=>{ const v=Math.round(Number(n)*100)/100; return Number.isInteger(v)?String(v):v.toFixed(2); };
      const body=wiseRows
        .filter(r=>r.recipient_uuid)   // only rows with a UUID are valid for the batch upload
        .map(r=>[r.recipient_uuid, r.name, r.email, "", srcCcy, tgtCcy, "target",
                 fmtAmt(r.net), ref, "PERSON"]);
      downloadCSV(`wise_batch_${label}.csv`, [header,...body]);
    });
  }
  // (2) Individual payment files — full per-contractor breakdown (all methods)
  function downloadIndividual(){
    if(!gate("Download individual payment files")) return;
    guardedExport("individual", ()=>{
    const header=["Contractor","Method","Wise recipient id","Email","Amount PHP","Pay date","Period"];
    const body=(rows||[]).map(r=>[r.name,r.method,r.recipient_id,r.email,r.net.toFixed(2),pers?.pay_date||"",`${pers?.period_start}–${pers?.period_end}`]);
    downloadCSV(`payments_${label}.csv`, [header,...body]);
    });
  }

  const total=(rows||[]).reduce((s,r)=>s+r.net,0);
  const wiseTotal=wiseRows.reduce((s,r)=>s+r.net,0);
  const bpiTotal=bpiRows.reduce((s,r)=>s+r.net,0);

  return (
    <div>
      <div className="card">
        <h2>Process payroll</h2>
        <p className="sub">After a period is locked, pay people here. Choose a locked period, then use
          a manual Wise batch file, individual payment files, or the automatic Wise API draft below.
          <b> Contractors are paid in PHP.</b></p>
        {consolidated && <div className="banner">Pick a single company.</div>}
        <div className="row" style={{alignItems:"flex-end"}}>
          <div className="field"><label>Locked pay period</label>
            <select value={periodId} onChange={e=>load(e.target.value)}>
              <option value="">Select…</option>
              {periods.map(p=><option key={p.id} value={p.id}>{p.period_start} → {p.period_end} ({p.state})</option>)}
            </select></div>
        </div>
        {periods.length===0 && !consolidated && <p className="muted" style={{fontSize:12}}>No locked periods yet — lock a payroll run on the Payroll tab first.</p>}
        {/* Undo toast — status only, never moves money. Stays until clicked/dismissed. */}
        {undo && <div className="banner" style={{display:"flex",justifyContent:"space-between",alignItems:"center",
            gap:12,background:"#eef2ff",borderColor:"#c7d2fe",color:"#3730a3"}}>
          <span>{undo.label}</span>
          <span style={{display:"inline-flex",gap:6,whiteSpace:"nowrap"}}>
            <button className="btn sm" disabled={busy} onClick={runUndo}>Undo</button>
            <button className="btn ghost sm" onClick={()=>setUndo(null)}>Dismiss</button>
          </span>
        </div>}
        <Banner msg={msg} />
      </div>

      {rows && rows.length>0 && <>
        <div className="card">
          <h3 style={{margin:"0 0 4px"}}>Summary · pay date {pers?.pay_date||"—"}</h3>
          <p className="sub">{rows.length} contractor(s) · total <b>{money(total,"PHP")}</b>
            {" · "}Wise {wiseRows.length} ({money(wiseTotal,"PHP")}) · BPI {bpiRows.length} ({money(bpiTotal,"PHP")})
            {otherRows.length>0 && ` · other ${otherRows.length}`}
            {" · "}{rows.filter(r=>r.status==="sent").length} paid</p>
          {otherRows.some(r=>!r.method) &&
            <div className="banner">{otherRows.filter(r=>!r.method).length} contractor(s) have <b>no payout method</b>
              ({otherRows.filter(r=>!r.method).map(r=>r.name).join(", ")}). They appear in the pay list below
              but not in the Wise/BPI exports — set their method on their profile.</div>}
        </div>

        {/* Reconcile with Wise — import processed batch + status + variance.
            Sits between Summary and the Pay list because reconciling is the
            after-batch step that turns "I uploaded a file to Wise" into
            "the DB reflects what actually happened." */}
        <div className="card no-print">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
            <div>
              <h3 style={{margin:"0 0 4px"}}>Reconcile with Wise</h3>
              <p className="sub">After Wise processes your batch, re-download the processed CSV from Wise
                (Batch payments → your batch → Download) and upload it here. The app backfills each Wise
                transfer ID into the DB, polls Wise for current status, and flags any amount mismatches.
                Idempotent — safe to re-run.</p>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <input ref={reconFileRef} type="file" accept=".csv,text/csv"
                style={{display:"none"}} onChange={onReconcileFile}/>
              <button className="btn" disabled={busy}
                onClick={()=>reconFileRef.current&&reconFileRef.current.click()}>
                Import processed Wise CSV
              </button>
              <button className="btn" disabled={busy} onClick={reconcileWithWise}
                title="One-click reconcile: links unmatched rows, fills in missing Wise dates, and locks rows that Wise has confirmed. Skips rows that are already current — no wasted API calls.">
                {busy?"Reconciling…":"Reconcile with Wise"}
              </button>
            </div>
          </div>
          {reconResult && (
            <div style={{marginTop:12}}>
              {reconResult.parseErrors && reconResult.parseErrors.length>0 && (
                <Banner tone="error" style={{marginBottom:8}}>
                  Couldn't read the Wise CSV: {reconResult.parseErrors.join("; ")}
                </Banner>
              )}
              <div className="row" style={{gap:16,flexWrap:"wrap",fontSize:13}}>
                <span><b>{reconResult.imported}</b> transfer ID(s) imported</span>
                <span className="muted">{reconResult.skipped} already on file</span>
                <span className={reconResult.variances.length?"pill warn":"muted"}>
                  {reconResult.variances.length} amount variance(s)
                </span>
                <span className={reconResult.unmatched.length?"pill warn":"muted"}>
                  {reconResult.unmatched.length} unmatched
                </span>
                {reconResult.polled && !reconResult.polled.error && (
                  <span className="muted">
                    Polled {reconResult.polled.checked}: {reconResult.polled.marked_paid} paid
                    {reconResult.polled.in_flight>0 && `, ${reconResult.polled.in_flight} in-flight`}
                  </span>
                )}
                {reconResult.polled && reconResult.polled.error && (
                  <span className="pill warn">Poll error: {reconResult.polled.error}</span>
                )}
              </div>
              {reconResult.variances.length>0 && (
                <div style={{marginTop:10}}>
                  <div style={{fontWeight:600,fontSize:13,marginBottom:4}}>Amount variances (DB vs Wise)</div>
                  <div className="table-scroll"><table>
                    <thead><tr><th>Contractor</th><th>DB (₱)</th><th>Wise (₱)</th><th>Delta (₱)</th></tr></thead>
                    <tbody>
                      {reconResult.variances.map((v,i)=>(
                        <tr key={i}>
                          <td>{v.name}</td>
                          <td>{v.db_amount.toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                          <td>{v.wise_amount.toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                          <td style={{color:v.delta>0?"#a16207":"#b91c1c",fontWeight:600}}>
                            {(v.delta>0?"+":"")+v.delta.toLocaleString(undefined,{minimumFractionDigits:2})}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table></div>
                  <p className="muted" style={{fontSize:12,marginTop:4}}>
                    A non-zero delta means the amount Wise actually transferred doesn't match what the DB
                    recorded. Investigate before treating the period as reconciled — the Wise amount is
                    the source of truth for what was paid.
                  </p>
                </div>
              )}
              {reconResult.unmatched.length>0 && (
                <div style={{marginTop:10}}>
                  <div style={{fontWeight:600,fontSize:13,marginBottom:4}}>Unmatched CSV rows</div>
                  <p className="muted" style={{fontSize:12,marginBottom:6}}>
                    These rows from the Wise CSV don't match anyone in this period's pay list (wrong
                    period, recipient swap, or a manual addition in Wise).
                  </p>
                  <ul style={{margin:0,paddingLeft:18,fontSize:13}}>
                    {reconResult.unmatched.slice(0,10).map((u,i)=>{
                      const sKey=u.suggest?`csvsug:${u.suggest.worker_id}:${u.transfer_id||u.recipient_uuid}`:null;
                      const done=sKey&&csvAccepted[sKey];
                      const inflight=sKey&&csvAcceptBusy===sKey;
                      return (
                      <li key={i} style={{marginBottom:u.suggest?6:0}}>
                        {u.name||"—"} <span className="muted">· uuid {String(u.recipient_uuid).slice(0,8)}…</span>
                        {u.amount?` · ₱${u.amount.toLocaleString(undefined,{minimumFractionDigits:2})}`:""}
                        {u.suggest && (
                          <div style={{marginTop:3,padding:"4px 8px",background:"#eff6ff",
                            border:"1px solid #bfdbfe",borderRadius:4,display:"inline-flex",gap:8,
                            alignItems:"center",flexWrap:"wrap"}}>
                            <span style={{fontSize:12}}>Likely <b>{u.suggest.name}</b> (name + amount match, no UUID on file)</span>
                            {done
                              ? <span className="pill active" style={{fontSize:10}}>linked</span>
                              : u.transfer_id
                                ? <button className="btn ghost sm" disabled={!!csvAcceptBusy}
                                    onClick={()=>acceptCsvSuggestion(sKey,u)}>
                                    {inflight?"Linking…":`Accept & link to ${u.suggest.name}`}</button>
                                : <span className="muted" style={{fontSize:11}}>(no transferId in CSV to link)</span>}
                          </div>
                        )}
                      </li>
                    );})}
                    {reconResult.unmatched.length>10 && <li className="muted">…and {reconResult.unmatched.length-10} more</li>}
                  </ul>
                </div>
              )}
              {reconResult.rowErrors.length>0 && (
                <div style={{marginTop:10}}>
                  <div style={{fontWeight:600,fontSize:13,marginBottom:4,color:"#b91c1c"}}>Row errors from Wise</div>
                  <ul style={{margin:0,paddingLeft:18,fontSize:13}}>
                    {reconResult.rowErrors.slice(0,10).map((r,i)=>(
                      <li key={i}>{r.name||"—"}: <span className="muted">{r.error}</span></li>
                    ))}
                    {reconResult.rowErrors.length>10 && <li className="muted">…and {reconResult.rowErrors.length-10} more</li>}
                  </ul>
                </div>
              )}
            </div>
          )}

          {matchResult && (
            <div style={{marginTop:12,borderTop:"1px solid var(--line)",paddingTop:12}}>
              <div style={{fontWeight:600,fontSize:13,marginBottom:6}}>History match results</div>
              {(() => {
                const closestCount=(matchResult.results||[]).filter(r=>r.outcome==="matched_closest_date").length;
                return (
                  <div className="row" style={{gap:16,flexWrap:"wrap",fontSize:13,marginBottom:6}}>
                    <span>Scanned <b>{matchResult.scanned}</b> unmatched payment(s)</span>
                    <span className="muted">across {matchResult.wise_transfers_pulled||0} Wise transfer(s)</span>
                    <span><b>{matchResult.matched}</b> matched cleanly</span>
                    {closestCount>0 && <span className="muted">(of which {closestCount} via closest-date tiebreaker)</span>}
                    <span className={matchResult.variances?"pill warn":"muted"}>{matchResult.variances} matched with variance</span>
                    <span className={matchResult.ambiguous?"pill warn":"muted"}>{matchResult.ambiguous} ambiguous</span>
                    <span className={matchResult.unmatched?"pill warn":"muted"}>{matchResult.unmatched} unmatched</span>
                  </div>
                );
              })()}
              {/* Closest-date tiebreaker — multiple transfers matched recipient+amount,
                  picked by proximity to pay_date. Worth surfacing so the user can spot-check. */}
              {(matchResult.results||[]).some(r=>r.outcome==="matched_closest_date") && (
                <div style={{marginTop:8}}>
                  <div style={{fontWeight:600,fontSize:13,marginBottom:4}}>Resolved by closest-date tiebreaker</div>
                  <p className="muted" style={{fontSize:12,marginBottom:6}}>
                    Multiple Wise transfers matched recipient + amount in this period's window.
                    The matcher picked the transfer closest to the period's pay_date and linked
                    that one; the others almost certainly belong to other periods (and will get
                    linked when you Reconcile those).
                  </p>
                  <ul style={{margin:0,paddingLeft:18,fontSize:13}}>
                    {(matchResult.results||[]).filter(r=>r.outcome==="matched_closest_date").map((r,i)=>{
                      const w=(rows||[]).find(x=>x.worker_id===r.worker_id);
                      const others=(r.also_considered||[]).slice(0,3).join(", ");
                      const more=(r.also_considered||[]).length>3?"…":"";
                      return (<li key={i}>{w?w.name:`worker ${String(r.worker_id).slice(0,8)}…`}
                        <span className="muted"> · picked {r.transfer_id}; deferred {others}{more}</span></li>);
                    })}
                  </ul>
                </div>
              )}
              {/* Variances — amount differs. Two sub-cases:
                  - matched_with_variance_overridden: single candidate, DB auto-updated to Wise's value.
                  - matched_with_variance: multiple candidates, DB amount left alone (too risky to pick). */}
              {(matchResult.results||[]).some(r=>r.outcome==="matched_with_variance_overridden") && (
                <div style={{marginTop:8}}>
                  <div style={{fontWeight:600,fontSize:13,marginBottom:4}}>⚠️ Auto-overridden by Wise (DB updated)</div>
                  <p className="muted" style={{fontSize:12,marginBottom:6}}>
                    Exactly one Wise transfer matched the recipient + window, and its amount differs
                    from the DB. The DB has been updated to Wise's amount (the original is preserved
                    in <code>original_net_php</code>). These rows show a ⚠️ next to the amount in the
                    Pay list — hover for details.
                  </p>
                  <div className="table-scroll"><table>
                    <thead><tr><th>Worker</th><th>Was DB (₱)</th><th>Now Wise (₱)</th><th>Delta (₱)</th><th>Wise status</th></tr></thead>
                    <tbody>
                      {(matchResult.results||[]).filter(r=>r.outcome==="matched_with_variance_overridden").map((r,i)=>{
                        const w=(rows||[]).find(x=>x.worker_id===r.worker_id);
                        return (<tr key={i}>
                          <td><b>{w?w.name:`worker ${String(r.worker_id).slice(0,8)}…`}</b></td>
                          <td className="muted">{Number(r.db_amount).toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                          <td><b>{Number(r.wise_amount).toLocaleString(undefined,{minimumFractionDigits:2})}</b></td>
                          <td style={{color:r.delta>0?"#a16207":"#b91c1c",fontWeight:600}}>
                            {(r.delta>0?"+":"")+Number(r.delta).toLocaleString(undefined,{minimumFractionDigits:2})}
                          </td>
                          <td><span className="muted">{r.wise_status||"—"}</span></td>
                        </tr>);
                      })}
                    </tbody>
                  </table></div>
                </div>
              )}
              {(matchResult.results||[]).some(r=>r.outcome==="matched_with_variance") && (
                <div style={{marginTop:8}}>
                  <div style={{fontWeight:600,fontSize:13,marginBottom:4}}>Variance — needs review (DB not changed)</div>
                  <p className="muted" style={{fontSize:12,marginBottom:6}}>
                    Multiple Wise transfers matched the recipient + window — the matcher picked the
                    closest amount but did NOT auto-override the DB (too risky when there are multiple
                    candidates). Investigate, then fix the DB row manually if Wise is right.
                  </p>
                  <div className="table-scroll"><table>
                    <thead><tr><th>Worker</th><th>DB (₱)</th><th>Wise (₱)</th><th>Delta (₱)</th><th>Wise status</th></tr></thead>
                    <tbody>
                      {(matchResult.results||[]).filter(r=>r.outcome==="matched_with_variance").map((r,i)=>{
                        const w=(rows||[]).find(x=>x.worker_id===r.worker_id);
                        return (<tr key={i}>
                          <td>{w?w.name:`worker ${String(r.worker_id).slice(0,8)}…`}</td>
                          <td>{Number(r.db_amount).toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                          <td>{Number(r.wise_amount).toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                          <td style={{color:r.delta>0?"#a16207":"#b91c1c",fontWeight:600}}>
                            {(r.delta>0?"+":"")+Number(r.delta).toLocaleString(undefined,{minimumFractionDigits:2})}
                          </td>
                          <td><span className="muted">{r.wise_status||"—"}</span></td>
                        </tr>);
                      })}
                    </tbody>
                  </table></div>
                </div>
              )}
              {/* Ambiguous — multiple Wise transfers match the same DB row */}
              {(matchResult.results||[]).some(r=>r.outcome==="ambiguous_exact") && (
                <div style={{marginTop:10}}>
                  <div style={{fontWeight:600,fontSize:13,marginBottom:4}}>Ambiguous matches</div>
                  <p className="muted" style={{fontSize:12,marginBottom:6}}>
                    More than one Wise transfer matches this row's recipient AND amount in the date window.
                    Nothing was written — you'll need to pick the right transfer manually (or just rely on
                    the next "Check Wise status" pass once one of them clears).
                  </p>
                  <ul style={{margin:0,paddingLeft:18,fontSize:13}}>
                    {(matchResult.results||[]).filter(r=>r.outcome==="ambiguous_exact").map((r,i)=>{
                      const w=(rows||[]).find(x=>x.worker_id===r.worker_id);
                      return (<li key={i}>{w?w.name:`worker ${String(r.worker_id).slice(0,8)}…`} <span className="muted">· {r.candidate_transfer_ids.length} candidates: {r.candidate_transfer_ids.slice(0,3).join(", ")}{r.candidate_transfer_ids.length>3?"…":""}</span></li>);
                    })}
                  </ul>
                </div>
              )}
              {/* Unmatched — no Wise transfer for this recipient/amount/window */}
              {(matchResult.results||[]).some(r=>String(r.outcome||"").startsWith("no_")) && (
                <div style={{marginTop:10}}>
                  <div style={{fontWeight:600,fontSize:13,marginBottom:4}}>Unmatched</div>
                  <p className="muted" style={{fontSize:12,marginBottom:6}}>
                    These DB rows had no clean Wise match. Common reasons: worker has no
                    stored Wise recipient UUID, the payment was actually sent via BPI, the
                    transfer happened outside the ±14 day window, or it was funded from a
                    different Wise account.
                  </p>
                  <ul style={{margin:0,paddingLeft:18,fontSize:13}}>
                    {(matchResult.results||[]).filter(r=>String(r.outcome||"").startsWith("no_")).slice(0,15).map((r,i)=>{
                      const w=(rows||[]).find(x=>x.worker_id===r.worker_id);
                      const workerName=w?w.name:`worker ${String(r.worker_id).slice(0,8)}…`;
                      const orphans=Array.isArray(r.candidate_orphan_transfers)?r.candidate_orphan_transfers:[];
                      return (
                        <li key={i} style={{marginBottom:orphans.length?6:0}}>
                          {workerName} <span className="muted">· {r.reason}</span>
                          {orphans.length>0 && (
                            <div style={{marginTop:4,marginLeft:-4,padding:"6px 8px",
                              background:"#fffbeb",border:"1px solid #fde68a",borderRadius:4,fontSize:12}}>
                              <div style={{fontWeight:600,marginBottom:4}}>
                                Possible historical recipient{orphans.length>1?"s":""} (amount + date fit, not yet on this worker):
                              </div>
                              {orphans.map((o,j)=>{
                                const key=`${r.worker_id}:${o.target_account}`;
                                const done=!!linkedKeys[key];
                                const inflight=linkBusy===key;
                                const created=o.created?new Date(o.created).toISOString().slice(0,10):"—";
                                const amt=Number(o.target_value||0).toLocaleString(undefined,{minimumFractionDigits:2});
                                return (
                                  <div key={j} style={{display:"flex",alignItems:"center",gap:8,
                                    flexWrap:"wrap",padding:"3px 0"}}>
                                    <span>Transfer <code>{o.transfer_id}</code> · recipient <b>#{o.target_account}</b>
                                      {" "}· ₱{amt} · {created}
                                      {o.wise_status && <span className="muted"> · {o.wise_status}</span>}
                                      {o.ambiguous && <span className="pill" style={{fontSize:10,marginLeft:6,
                                        background:"#fef2f2",color:"#b91c1c"}}
                                        title={`This amount matches ${o.shared_with_n_payments} unpaid contractors in the window — verify by date + recipient before linking.`}>
                                        ⚠ ambiguous (matches {o.shared_with_n_payments})</span>}</span>
                                    {done
                                      ? <span className="pill active" style={{fontSize:10}}>linked</span>
                                      : <button className="btn ghost sm" disabled={inflight}
                                          style={o.ambiguous?{borderColor:"#b91c1c",color:"#b91c1c"}:{}}
                                          onClick={()=>linkOrphanRecipient(r.worker_id, workerName, o.target_account, o.transfer_id, {ambiguous:o.ambiguous})}>
                                          {inflight?"Linking…":(o.ambiguous?`Verify & link #${o.target_account}`:`Link #${o.target_account} to ${workerName}`)}
                                        </button>}
                                  </div>
                                );
                              })}
                              {!Object.keys(linkedKeys).length ? null :
                                <div className="muted" style={{fontSize:11,marginTop:4}}>
                                  After linking, click <b>Reconcile with Wise</b> again to match the linked period(s).
                                </div>}
                            </div>
                          )}
                        </li>
                      );
                    })}
                  </ul>
                </div>
              )}
            </div>
          )}
        </div>

        {/* Printable pay list + mark-paid, with channel tabs (Wise | BPI | All).
            Per CLAUDE.md guidance, grouping by transfer channel makes the list
            scannable instead of forcing the eye to jump between Wise and BPI
            rows in alphabetical order. Each tab shows its own subtotal in the
            tab header; the All tab shows the grand total. Print uses All view
            so the printed statement always shows everything. */}
        <div className="card" id="paylist-print">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
            <div>
              <h3 style={{margin:"0 0 4px"}}>Pay list · {pers?.period_start} → {pers?.period_end}</h3>
              <p className="sub">Pay date {pers?.pay_date||"—"} · {rows.length} contractor(s) · total {money(total,"PHP")}.
                Mark each paid after you've sent it.</p>
            </div>
            <div className="no-print" style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <button className="btn ghost" onClick={()=>window.print()}>Print</button>
              <button className="btn ghost" disabled={busy} onClick={checkWiseStatus}>Check Wise status</button>
              {rows.some(r=>r.status!=="sent") &&
                <button className="btn" disabled={busy}
                  onClick={()=>markPaid(rows.filter(r=>r.status!=="sent").map(r=>r.worker_id))}>Mark all paid</button>}
              <button className="btn ghost" disabled={busy||!rows.some(r=>r.status==="sent")}
                title="Revert all paid contractors in this period to unpaid (status only — no money moves; rows with a Wise transfer are skipped)"
                onClick={markAllUnpaid}>Mark all unpaid</button>
            </div>
          </div>

          {/* Channel tabs — pills, not full nav. Always show 'All' last.
              When a pill is active (filled), force the count/subtotal text to
              white-with-opacity instead of the default gray .muted, which is
              unreadable against the dark blue fill. */}
          {(() => {
            const channelButton=(id,label,count,sub)=>{
              const isActive=payTab===id;
              const subStyle=isActive
                ? {fontWeight:400,color:"rgba(255,255,255,0.78)"}
                : {fontWeight:400};
              const subClass=isActive?"":"muted";
              return (
                <button key={id} type="button"
                  onClick={()=>setPayTab(id)}
                  className={"btn"+(isActive?"":" ghost")+" sm"}
                  style={{borderRadius:999,fontWeight:isActive?600:500}}>
                  {label} <span className={subClass} style={subStyle}>· {count}</span>
                  {sub && <span className={subClass} style={{...subStyle,marginLeft:6}}>· {sub}</span>}
                </button>
              );
            };
            return (
              <div className="no-print" style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:6,marginBottom:10}}>
                {channelButton("wise","Wise",wiseRows.length,money(wiseTotal,"PHP"))}
                {channelButton("bpi","BPI",bpiRows.length,money(bpiTotal,"PHP"))}
                {otherRows.length>0 && channelButton("other","Other",otherRows.length,money(otherRows.reduce((s,r)=>s+r.net,0),"PHP"))}
                {channelButton("all","All",rows.length,money(total,"PHP"))}
              </div>
            );
          })()}

          {(() => {
            // In print mode we always show everything (the printed statement
            // shouldn't depend on which tab was visible when Print was clicked).
            // For screen, filter rows by the active tab.
            const visibleRows = payTab==="all" ? rows
                              : payTab==="wise" ? wiseRows
                              : payTab==="bpi" ? bpiRows
                              : payTab==="other" ? otherRows
                              : rows;
            const visibleTotal = visibleRows.reduce((s,r)=>s+r.net,0);
            const fmtDate=(iso)=>{ if(!iso)return ""; try{return new Date(iso).toLocaleDateString();}catch(e){return String(iso).slice(0,10);} };
            return (
              <div className="table-scroll"><table>
                <thead><tr>
                  <th>Contractor</th><th>Method</th><th>Recipient/Email</th>
                  <th>Amount ₱</th><th>Status</th>
                  <th title="For Wise rows: the date Wise drafted the transfer — the actual send date isn't returned by Wise's API for batch-uploaded transfers, so this is approximate (money typically leaves Wise within 1–2 days of the drafted date). For BPI rows: the date you manually recorded the payment.">Sent ≈</th>
                  <th className="no-print"></th>
                </tr></thead>
                <tbody>
                  {visibleRows.map(r=>{
                    const isWise=r.method==="wise";
                    const armed=paidArm[r.worker_id];
                    // For Wise rows we'd LIKE to show the real dateSent, but Wise's API
                    // for batch-uploaded transfers only returns `created` (the draft
                    // timestamp) — not dateSent or dateFunded. So we fall back to that.
                    // For BPI rows, paid_at is the date the user entered manually.
                    const wd=r.wise_dates||{};
                    const sentIso = wd.dateSent || wd.dateFunded || wd.created || r.paid_at;
                    // Tooltip is honest about WHICH date this is for each row.
                    let tooltip="";
                    if(isWise && r.wise_dates){
                      const lines=[];
                      if(wd.dateSent)   lines.push(`Sent: ${fmtDate(wd.dateSent)}`);
                      if(wd.dateFunded) lines.push(`Funded: ${fmtDate(wd.dateFunded)}`);
                      if(wd.created)    lines.push(`Drafted in Wise: ${fmtDate(wd.created)}`);
                      if(!wd.dateSent && !wd.dateFunded){
                        lines.push("(Wise didn't return the actual send timestamp; money typically leaves within 1–2 days of the drafted date shown above.)");
                      }
                      tooltip=lines.join("\n");
                    } else if(r.paid_at){
                      tooltip=`Manually recorded as paid on ${fmtDate(r.paid_at)}`;
                    }
                    const locked=!!r.locked_at;
                    const unlockReason=unlockArm[r.payment_id];
                    const unlockArmed=unlockReason!==undefined;
                    return (
                    <tr key={r.worker_id} style={locked?{background:"rgba(99,102,241,0.03)"}:{}}>
                      <td>
                        {openContractor
                          ? <button type="button" onClick={()=>openContractor(r.worker_id)}
                              title="Open contractor profile"
                              style={{background:"none",border:"none",padding:0,margin:0,
                                font:"inherit",fontWeight:700,color:"inherit",cursor:"pointer",
                                textDecoration:r.stale_inactive?"line-through":"none"}}>
                              {r.name}
                            </button>
                          : <b style={{textDecoration:r.stale_inactive?"line-through":"none"}}>{r.name}</b>}
                        {locked && <span className="pill" title={`Locked by Wise reconcile · ${fmtDate(r.locked_at)}`}
                          style={{background:"#eef2ff",color:"#3730a3",fontSize:10,marginLeft:6,verticalAlign:"middle"}}>🔒 locked</span>}
                        {r.stale_inactive && (
                          <span className="tip-wrap" tabIndex={0}
                            style={{marginLeft:6,fontSize:10,verticalAlign:"middle",cursor:"help"}}>
                            <span className="pill" style={{background:"#fef2f2",color:"#b91c1c"}}>
                              🚫 now inactive
                            </span>
                            <span className="tip-body">
                              {`This contractor is now marked inactive`}
                              {r.worker_status!=="active" && `\n• Worker status: ${r.worker_status}`}
                              {r.link_status!=="active" && `\n• Company link: ${r.link_status}${r.link_ended_on?` (ended ${r.link_ended_on})`:""}`}
                              {`\n\nThe locked statement still stands — the snapshot is the source of truth for what was/will be paid.`}
                            </span>
                          </span>
                        )}
                        {r.method_drift && (
                          <span className="tip-wrap" tabIndex={0}
                            style={{marginLeft:6,fontSize:10,verticalAlign:"middle",cursor:"help"}}>
                            <span className="pill" style={{background:"#fffbeb",color:"#92400e"}}>
                              ⚠ method drift
                            </span>
                            <span className="tip-body">
                              {`Payment was locked with method "${r.method||"—"}" but the contractor's current payout method is "${r.current_worker_method||"—"}". The locked statement uses the snapshot; future periods will follow the new method.`}
                            </span>
                          </span>
                        )}
                      </td>
                      <td>{methodLabel(r.method)||"—"}</td>
                      <td className="muted">{isWise?(r.recipient_id?`#${r.recipient_id}`:(r.email||"—")):(r.email||"—")}</td>
                      <td>
                        {r.net.toLocaleString(undefined,{minimumFractionDigits:2})}
                        {r.original_net!=null && (() => {
                          const delta=r.net-r.original_net;
                          const sign=delta>0?"+":"";
                          const fmt=n=>Number(n).toLocaleString(undefined,{minimumFractionDigits:2});
                          const tip=`Auto-overridden by Wise reconcile.\nOriginal DB amount: ₱${fmt(r.original_net)}\nWise actually sent: ₱${fmt(r.net)}\nDelta: ${sign}₱${fmt(delta)}`;
                          return (
                            <span className="tip-wrap" tabIndex={0}
                              style={{marginLeft:6,cursor:"help",fontSize:13,color:"#a16207"}}>
                              ⚠️
                              <span className="tip-body">{tip}</span>
                            </span>
                          );
                        })()}
                      </td>
                      <td>{r.status==="sent"
                        ? <span className="pill active">paid</span>
                        : <span className="pill" style={{background:"#f3f4f6",color:"var(--muted)"}}>unpaid</span>}</td>
                      <td title={tooltip} style={{fontSize:12,color:"var(--muted)",whiteSpace:"nowrap"}}>
                        {r.status==="sent" && sentIso ? fmtDate(sentIso) : "—"}
                      </td>
                      <td className="no-print" style={{textAlign:"right"}}>
                        {locked
                          // Locked rows: inline Unlock-with-reason flow. Mark unpaid is blocked.
                          ? (unlockArmed
                              ? <span style={{display:"inline-flex",gap:4,alignItems:"center"}}>
                                  <input type="text" placeholder="Reason…" value={unlockReason}
                                    onChange={e=>setUnlockReason(r.payment_id,e.target.value)}
                                    style={{fontSize:12,padding:"2px 6px",width:160}}/>
                                  <button className="btn sm" disabled={busy||!unlockReason.trim()}
                                    onClick={()=>confirmUnlock(r.payment_id,r.worker_id)}>Unlock</button>
                                  <button className="btn ghost sm" disabled={busy}
                                    onClick={()=>unarmUnlock(r.payment_id)}>Cancel</button>
                                </span>
                              : <button className="btn ghost sm" disabled={busy}
                                  title="This row is locked by Wise reconcile. Unlock with a reason to edit it; the next Reconcile will re-lock."
                                  onClick={()=>armUnlock(r.payment_id)}>Unlock…</button>)
                          : r.status==="sent"
                            ? <button className="btn ghost sm" disabled={busy}
                                title="Revert this payment to unpaid (status only — no money moves)"
                                onClick={()=>markUnpaid([r.worker_id])}>Mark unpaid</button>
                            : isWise
                              // Wise rows: paid date comes from the API after polling, not user input
                              ? <button className="btn ghost sm" disabled={busy} onClick={()=>markPaid([r.worker_id])}>Mark paid</button>
                              : armed
                                // Non-Wise (BPI/other) armed for date input — inline confirm
                                ? <span style={{display:"inline-flex",gap:4,alignItems:"center"}}>
                                    <input type="date" value={armed}
                                      onChange={e=>setPaidDate(r.worker_id,e.target.value)}
                                      style={{fontSize:12,padding:"2px 4px",width:130}}/>
                                    <button className="btn sm" disabled={busy||!armed}
                                      onClick={()=>confirmPaidWithDate(r.worker_id)}>Confirm</button>
                                    <button className="btn ghost sm" disabled={busy}
                                      onClick={()=>unarmPaid(r.worker_id)}>Cancel</button>
                                  </span>
                                // Non-Wise unarmed — clicking arms the row for date entry
                                : <button className="btn ghost sm" disabled={busy} onClick={()=>armPaid(r.worker_id)}>Mark paid…</button>}
                      </td>
                    </tr>);
                  })}
                  <tr>
                    <td colSpan={3} style={{fontWeight:700}}>
                      {payTab==="all" ? "Grand total" : `${payTab.toUpperCase()} subtotal`}
                    </td>
                    <td style={{fontWeight:700}}>{visibleTotal.toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                    <td/><td/><td className="no-print"/>
                  </tr>
                  {payTab!=="all" && (
                    <tr><td colSpan={3} className="muted" style={{fontSize:12}}>Grand total (all channels)</td>
                      <td className="muted" style={{fontSize:12}}>{total.toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                      <td/><td/><td className="no-print"/></tr>
                  )}
                </tbody>
              </table></div>
            );
          })()}

          <p className="muted" style={{fontSize:12,marginTop:8}}>For Wise rows, <b>Reconcile with Wise</b> sets paid status and
            the Wise draft date automatically. <b>The "Sent ≈" date is approximate</b> — Wise's API doesn't return
            the actual send timestamp for batch-uploaded transfers, so it shows the draft date (the money typically
            leaves Wise within 1–2 days). For BPI / non-Wise rows, click <b>Mark paid…</b> and enter the date the
            BPI transfer actually happened.</p>
        </div>

        <div className="card no-print">
          <h3 style={{margin:"0 0 4px"}}>1 · Manual Wise batch file</h3>
          <p className="sub">Downloads a CSV in Wise's exact batch-upload template, keyed by each recipient's
            Wise ID ({wiseRows.length-wiseMissingUuid.length} of {wiseRows.length} Wise contractor(s) ready).
            Upload it on your Wise account → Batch payments. You fund it in Wise.</p>
          {wiseMissingUuid.length>0 &&
            <Banner tone="error" style={{marginBottom:8}}>
              <b>{wiseMissingUuid.length} Wise contractor(s) have no stored Wise recipient UUID</b> and will be dropped from the CSV:
              {" "}
              {wiseMissingUuid.map((r,i)=>(
                <React.Fragment key={r.worker_id||i}>
                  {i>0 && ", "}
                  {openContractor
                    ? <button type="button" className="btn-link"
                        onClick={()=>openContractor(r.worker_id)}
                        title="Open this contractor's profile and jump to the Wise recipient UUID field"
                        style={{background:"none",border:"none",padding:0,margin:0,color:"#b91c1c",
                          textDecoration:"underline",cursor:"pointer",font:"inherit"}}>
                        {r.name}
                      </button>
                    : <span>{r.name}</span>}
                </React.Fragment>
              ))}.
              {" "}Click a name above to open the profile and paste the UUID into the <b>"Wise recipient UUID"</b> field — get UUIDs from <i>Wise → Batch payments → Download all templates</i>.
              {" "}<span className="muted" style={{fontSize:11}}>("Pull recipients from Wise" can't fix this — the Wise API doesn't return UUIDs, only the templates CSV does.)</span>
            </Banner>}
          <div className="row" style={{alignItems:"flex-end",gap:12,marginBottom:8}}>
            <div className="field"><label style={{fontSize:12}}>Source currency</label>
              <select value={srcCcy} onChange={e=>setSrcCcy(e.target.value)}>
                <option value="USD">USD</option><option value="PHP">PHP</option>
              </select></div>
            <div className="field"><label style={{fontSize:12}}>Target currency</label>
              <select value={tgtCcy} onChange={e=>setTgtCcy(e.target.value)}>
                <option value="PHP">PHP</option><option value="USD">USD</option>
              </select></div>
            <span className="muted" style={{fontSize:11,paddingBottom:6}}>Default USD → PHP.</span>
          </div>
          <button className="btn" disabled={!(wiseRows.length-wiseMissingUuid.length)} onClick={downloadWiseBatch}>
            Download Wise batch CSV ({wiseRows.length-wiseMissingUuid.length})</button>
          {!wiseRows.length && <span className="muted" style={{marginLeft:8,fontSize:12}}>No Wise-method contractors in this period.</span>}
          {lastExported("wise") && <span className="pill warn" style={{marginLeft:8}}>already downloaded {new Date(lastExported("wise")).toLocaleDateString()}</span>}
        </div>

        <div className="card">
          <h3 style={{margin:"0 0 4px"}}>2 · Individual payment files</h3>
          <p className="sub">A per-contractor breakdown of all {rows.length} payments (every method, incl. BPI),
            with amounts, methods and pay date — for manual/individual payments and record-keeping.</p>
          <button className="btn ghost" onClick={downloadIndividual}>Download payments CSV ({rows.length})</button>
          {lastExported("individual") && <span className="pill warn" style={{marginLeft:8}}>already downloaded {new Date(lastExported("individual")).toLocaleDateString()}</span>}
        </div>

        <div className="card">
          <h3 style={{margin:"0 0 4px"}}>3 · Automatic Wise API draft</h3>
          <p className="sub">Draft the Wise transfers directly via the API (drafts only — you fund in Wise).
            Lets you edit recipients/amounts per person and create one batch.</p>
          <WisePayouts client={client} companyId={companyId} consolidated={consolidated} presetPeriodId={periodId} confirmBillingDirty={confirmBillingDirty} openContractor={openContractor} apiPayoutsEnabled={apiPayoutsEnabled}/>
        </div>
      </>}
    </div>
  );
}

// ============================ AUDIT LOG ======================================
const AUDIT_LABELS={import:"Import",delete_import:"Delete import",approve:"Approve time",
  reject:"Reject time",lock:"Lock period",unlock_period:"Unlock period",mark_paid:"Mark paid",mark_unpaid:"Mark unpaid",manual_hours:"Manual hours",api_payout:"API payout (fund)",
  wise_recipient_sync:"Wise recipient sync",
  wise_lock_release:"Unlock Wise-locked row",
  wise_lock_warning:"Edit attempted on locked row",
  add_contractor:"Add contractor",edit_contractor:"Edit contractor",set_rate:"Set rate",
  recalculate:"Recalculate (reset overrides)",undo:"Undo",
  "override.gross":"Gross override"};
function AuditLog({client,companyId,consolidated}){
  // Date-range filter drives the SERVER query, so you can look back further
  // than the recent-500 cap when investigating something older. Empty = no
  // bound (recent 500 as before). `to` is inclusive of the whole day.
  const [from,setFrom]=useState("");
  const [to,setTo]=useState("");
  const {data,loading,reload}=useQuery(client,c=>{
    let q=c.from("audit_log").select("id,actor,action,entity,detail,created_at")
      .order("created_at",{ascending:false}).limit(500);
    if(!consolidated&&companyId)q=q.eq("company_id",companyId);
    if(from) q=q.gte("created_at",from);
    if(to)   q=q.lte("created_at",to+"T23:59:59.999Z");
    return q;
  },[client,companyId,consolidated,from,to]);
  const {rows,Th,q,setQ}=useSortFilter((data||[]).map(r=>({...r,
    _label:AUDIT_LABELS[r.action]||r.action, _when:r.created_at})),{
    when:r=>r._when, action:r=>r._label, entity:r=>r.entity, actor:r=>r.actor,
  },["_label","entity","actor"]);
  function exportCsv(){
    const header=["When (ISO)","When (local)","Action","Item","Detail","By"];
    const body=rows.map(r=>[
      r.created_at,
      new Date(r.created_at).toLocaleString(),
      r._label,
      r.entity||"",
      summarizeDetail(r.detail) || (r.detail?JSON.stringify(r.detail):""),
      r.actor||"",
    ]);
    const tag=`${from||"start"}_${to||"latest"}`;
    downloadCSV(`audit_log_${tag}.csv`, [header,...body]);
  }
  // Quick presets so investigating "last 30 days" is one click, not date math.
  function preset(days){
    const d=new Date(); d.setDate(d.getDate()-days);
    setFrom(d.toISOString().slice(0,10)); setTo("");
  }
  return (
    <div className="card">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
        <div><h2>Audit log</h2>
          <p className="sub">Every change and override — imports, approvals, overrides, locks, payments, deletions.
            {" "}{consolidated?"All companies.":"This company."} {(from||to)?"Filtered by date.":"Most recent 500."}</p></div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <button className="btn ghost sm" disabled={!rows.length} onClick={exportCsv}>Export CSV ({rows.length})</button>
          <button className="btn ghost sm" onClick={reload}>Refresh</button>
        </div>
      </div>
      <div style={{display:"flex",gap:8,alignItems:"flex-end",flexWrap:"wrap",margin:"8px 0"}}>
        <div><label style={{fontSize:10,color:"var(--muted)"}}>From</label><br/>
          <input type="date" value={from} onChange={e=>setFrom(e.target.value)}/></div>
        <div><label style={{fontSize:10,color:"var(--muted)"}}>To</label><br/>
          <input type="date" value={to} onChange={e=>setTo(e.target.value)}/></div>
        <button className="btn ghost sm" onClick={()=>preset(7)}>Last 7d</button>
        <button className="btn ghost sm" onClick={()=>preset(30)}>Last 30d</button>
        <button className="btn ghost sm" onClick={()=>preset(365)}>Last year</button>
        {(from||to) && <button className="btn ghost sm" onClick={()=>{setFrom("");setTo("");}}>Clear dates</button>}
      </div>
      <FilterBox q={q} setQ={setQ} placeholder="Filter by action, item (e.g. a contractor name), who…" />
      {loading?<div className="empty">Loading…</div>:
       rows.length===0?<div className="empty">No audit events {(from||to)?"in this date range":"yet"}.</div>:
      <div className="table-scroll"><table>
        <thead><tr><Th k="when">When</Th><Th k="action">Action</Th><Th k="entity">Item</Th><th>Detail</th><Th k="actor">By</Th></tr></thead>
        <tbody>
          {rows.map(r=>(
            <tr key={r.id}>
              <td className="muted" style={{whiteSpace:"nowrap"}}>{new Date(r.created_at).toLocaleString()}</td>
              <td><span className="pill info">{r._label}</span></td>
              <td>{r.entity||"—"}</td>
              <td className="muted" style={{fontSize:12,maxWidth:360}}>{summarizeDetail(r.detail)}</td>
              <td className="muted">{r.actor||"—"}</td>
            </tr>
          ))}
        </tbody>
      </table></div>}
      {rows.length>=500 && !from && !to &&
        <p className="muted" style={{fontSize:11,marginTop:6}}>Showing the most recent 500 events. Set a date range to see older ones.</p>}
    </div>
  );
}
function summarizeDetail(d){
  if(!d) return "";
  const parts=[];
  if(d.contractors!=null) parts.push(`${Array.isArray(d.contractors)?d.contractors.length:d.contractors} contractor(s)`);
  if(d.rows!=null) parts.push(`${d.rows} rows`);
  if(d.entries!=null) parts.push(`${d.entries} entries`);
  if(d.count!=null) parts.push(`${d.count} item(s)`);
  if(d.total_net!=null) parts.push(`net ₱${Number(d.total_net).toLocaleString()}`);
  if(d.mode) parts.push(d.mode);
  if(d.hours!=null) parts.push(`${d.hours}h`);
  if(d.overrides && d.overrides.length) parts.push(`${d.overrides.length} override(s)`);
  if(Array.isArray(d.contractors) && d.contractors.length<=6) parts.push("("+d.contractors.join(", ")+")");
  return parts.join(" · ");
}

// ============================ APP SHELL ======================================
function App() {
  const sb = useSupabase();
  const [tab, setTab] = useState("contractors");
  const [companyId, setCompanyId] = useState(localStorage.getItem("sel_company")||"");
  const [consolidated, setConsolidated] = useState(false);
  useEffect(()=>{ if(companyId) localStorage.setItem("sel_company",companyId); },[companyId]);

  // Per-company API-payouts gate. When TRUE, the Process & Pay screen
  // shows "Create + Fund batch" affordances that move real money via the
  // wise-payouts edge function `fund` action. Default FALSE — flip per
  // company via SQL once you're confident in the API path. Re-queried
  // when the selected company changes; consolidated mode forces FALSE
  // since there's no single company to read the flag from.
  const [apiPayoutsEnabled, setApiPayoutsEnabled] = useState(false);
  useEffect(()=>{
    if (!sb.client || !companyId || consolidated) { setApiPayoutsEnabled(false); return; }
    sb.client.from("companies").select("api_payouts_enabled").eq("id", companyId).single()
      .then(({data}) => setApiPayoutsEnabled(!!data?.api_payouts_enabled));
  }, [sb.client, companyId, consolidated]);

  // Session-scoped "billing dirty" tracker: ProfileModal pushes a record into
  // billingDirty whenever a billing-relevant field (rate, payout method, Wise
  // recipient, UUID, payout account) is saved. Any action that could
  // calculate/process/pay against stale info (Calculate, Lock & Save,
  // Reconcile, Create Wise batch, Download CSVs, Mark all paid) calls
  // confirmBillingDirty() first; the user sees a list of changes and can
  // cancel or proceed. The list is cleared on confirm so back-to-back actions
  // in the same chain don't re-prompt — a later edit re-arms it.
  const [billingDirty, setBillingDirty] = useState([]);
  const recordBillingChange = React.useCallback((rec) => {
    setBillingDirty(prev => {
      const filtered = prev.filter(e => !(e.workerId===rec.workerId && e.field===rec.field));
      return [...filtered, { ...rec, at: new Date().toISOString() }];
    });
  }, []);
  // Cross-tab "jump to contractor profile" plumbing. Any warning anywhere in
  // the app can call openContractor(workerId) to switch to the Contractors
  // tab and auto-open that contractor's profile modal. Contractors consumes
  // the id via useEffect.
  const [pendingWorkerId, setPendingWorkerId] = useState(null);
  const openContractor = React.useCallback((workerId)=>{
    if(!workerId) return;
    setPendingWorkerId(String(workerId));
    setTab("contractors");
    const w=document.querySelector(".wrap");
    if(w) w.scrollIntoView({block:"start"});
    window.scrollTo(0,0);
  }, []);
  const consumePendingWorker = React.useCallback(()=>setPendingWorkerId(null), []);

  const confirmBillingDirty = React.useCallback((actionLabel) => {
    if (!billingDirty.length) return true;
    const lines = billingDirty.slice(0,12).map(e=>`• ${e.name} — ${e.field}`).join("\n");
    const more = billingDirty.length>12 ? `\n…and ${billingDirty.length-12} more` : "";
    const ok = window.confirm(
      `⚠ Billing info changed for ${billingDirty.length} contractor(s) in this session:\n\n`+
      lines + more +
      `\n\nProceed with "${actionLabel}"?\n\n`+
      `Recommended: cancel, then Recalculate the affected pay period(s) so the new info `+
      `is reflected before continuing.`
    );
    if (ok) setBillingDirty([]);
    return ok;
  }, [billingDirty]);

  if (!sb.client) return <ConnectScreen onConnect={sb.connect} />;

  // Tabs grouped by workflow stage so the bar reads as the real process order.
  const tabGroups = [
    ["Setup",   [["contractors","Contractors"],["documents","Documents"]]],
    ["Run payroll", [["time","Time & Approval"],["payroll","Calculate"],["process","Process and Pay"]]],
    ["Review",  [["reports","Reports"],["audit","Audit Log"],["imports","Imports"]]],
  ];
  function go(id){ setTab(id); const w=document.querySelector(".wrap"); if(w) w.scrollIntoView({block:"start"}); window.scrollTo(0,0); }
  return (
    <div>
      <div className="topbar">
        <div className="brand">HR &amp; Payroll<small>PH independent contractors</small></div>
        <CompanySwitcher {...{client:sb.client,companyId,setCompanyId,consolidated,setConsolidated}} />
        <button className="btn ghost sm" onClick={sb.disconnect}>Disconnect</button>
      </div>
      <div className="tabs">
        {tabGroups.map(([label,items],gi)=>(
          <React.Fragment key={label}>
            {gi>0 && <div className="tab-sep"></div>}
            <span className="tabgroup-label">{label}</span>
            {items.map(([id,lbl])=>(
              <button key={id} className={"tab"+(tab===id?" active":"")} onClick={()=>go(id)}>{lbl}</button>
            ))}
          </React.Fragment>
        ))}
      </div>
      <div className="wrap">
        {!companyId && !consolidated &&
          <div className="banner">Pick a company in the switcher (top right) to begin.</div>}
        {/* All tabs stay mounted; only the active one is shown. This preserves
            each tab's in-memory state (selected period, loaded rows, filters)
            across tab switches. */}
        <div style={{display:tab==="contractors"?"block":"none"}}><Contractors {...{client:sb.client,companyId,consolidated,onBillingChange:recordBillingChange,pendingWorkerId,consumePendingWorker}} /></div>
        <div style={{display:tab==="time"?"block":"none"}}><TimeImport {...{client:sb.client,companyId,consolidated}} /></div>
        <div style={{display:tab==="imports"?"block":"none"}}><DeleteImports {...{client:sb.client,companyId,consolidated}} /></div>
        <div style={{display:tab==="payroll"?"block":"none"}}><Payroll {...{client:sb.client,companyId,consolidated,confirmBillingDirty,openContractor}} /></div>
        <div style={{display:tab==="process"?"block":"none"}}><ProcessPayroll {...{client:sb.client,companyId,consolidated,active:tab==="process",confirmBillingDirty,openContractor,apiPayoutsEnabled}} /></div>
        <div style={{display:tab==="documents"?"block":"none"}}><Documents {...{client:sb.client,companyId,consolidated}} /></div>
        <div style={{display:tab==="reports"?"block":"none"}}><Reports {...{client:sb.client,companyId,consolidated}} /></div>
        <div style={{display:tab==="audit"?"block":"none"}}><AuditLog {...{client:sb.client,companyId,consolidated}} /></div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
