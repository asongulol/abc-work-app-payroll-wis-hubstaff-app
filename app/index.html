    if(!sel.has(p.worker_id)) return;   // default none selected -> empty until contractors are chosen
    const key=`${p.worker_id}|${p.companies?.name||""}`;
    const g=byWorker[key]||(byWorker[key]={
      gkey:key, name:fullName(p.workers)||"(unknown)", company:p.companies?.name||"",
      periods:0, hours:0, gross:0, ha:0, t13:0, lunch:0, bonus:0, misc:0, ded:0, net:0, paid:0,
      statements:[]});
    const mi=miscSum(p.misc_items);
    g.periods++;
    g.hours+=Number(p.worked_hours||0);
    g.gross+=Number(p.gross_php||0);
    g.ha+=Number(p.health_allowance_php||0);
    g.t13+=Number(p.thirteenth_month_php||0);
    g.lunch+=Number(p.pdd_lunch_php||0);
    g.bonus+=Number(p.bonus_php||0);
    g.misc+=mi;
    g.ded+=Number(p.deduction_php||0);
    g.net+=Number(p.net_php||0);
    if(p.status==="sent"||p.status==="reconciled") g.paid+=Number(p.net_php||0);
    // Keep each underlying pay statement so a contractor's row can expand to the
    // individual per-period breakdown that makes up the aggregate totals above.
    g.statements.push({
      start:p.pay_periods?.period_start||"", end:p.pay_periods?.period_end||"",
      payDate:p.pay_periods?.pay_date||"", hours:Number(p.worked_hours||0),
      gross:Number(p.gross_php||0), ha:Number(p.health_allowance_php||0),
      t13:Number(p.thirteenth_month_php||0), lunch:Number(p.pdd_lunch_php||0),
      bonus:Number(p.bonus_php||0), misc:mi, ded:Number(p.deduction_php||0),
      net:Number(p.net_php||0), status:p.status});
  });
  // Show each contractor's statements newest-first within the expansion.
  Object.values(byWorker).forEach(g=>g.statements.sort((a,b)=>b.start.localeCompare(a.start)));
  const rows=Object.values(byWorker).sort((a,b)=>a.name.localeCompare(b.name));
  const totNet=rows.reduce((s,r)=>s+r.net,0);

  function exportCsv(){
    // "Misc PHP" already nets user deductions (earns+hours−deductions). The
    // deduction_php column is the rate−gross performance shortfall — labeled
    // "Perf short PHP" so it isn't read as an actual withholding.
    const header=["Contractor",...(consolidated?["Company"]:[]),"Periods","Hours","Gross PHP",
      "Health PHP","13th PHP","Lunch PHP","Bonus PHP","Misc PHP (net)","Perf short PHP","Net PHP","Paid PHP"];
    const body=rows.map(r=>[r.name,...(consolidated?[r.company]:[]),r.periods,
      r.hours.toFixed(2),r.gross.toFixed(2),r.ha.toFixed(2),r.t13.toFixed(2),r.lunch.toFixed(2),
      r.bonus.toFixed(2),r.misc.toFixed(2),r.ded.toFixed(2),r.net.toFixed(2),r.paid.toFixed(2)]);
    downloadCSV(`contractor_summary_${from||"start"}_${to||"latest"}.csv`, [header,...body]);
  }

  // One row per individual pay statement (period × contractor) — the per-period
  // breakdown behind the aggregate, for anyone who needs statement-level detail.
  function exportStatements(){
    const header=["Contractor",...(consolidated?["Company"]:[]),"Period start","Period end","Pay date",
      "Hours","Gross PHP","Health PHP","13th PHP","Lunch PHP","Bonus PHP","Misc PHP (net)","Perf short PHP","Net PHP","Status"];
    const body=[];
    rows.forEach(r=>r.statements.forEach(s=>body.push([r.name,...(consolidated?[r.company]:[]),
      s.start,s.end,s.payDate,s.hours.toFixed(2),s.gross.toFixed(2),s.ha.toFixed(2),s.t13.toFixed(2),
      s.lunch.toFixed(2),s.bonus.toFixed(2),s.misc.toFixed(2),s.ded.toFixed(2),s.net.toFixed(2),s.status||""])));
    downloadCSV(`contractor_statements_${from||"start"}_${to||"latest"}.csv`, [header,...body]);
  }
  const stmtCount=rows.reduce((n,r)=>n+r.statements.length,0);

  return (
    <div className="card">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
        <div><h2>Contractor Pay Summary</h2>
          <p className="sub">Totals per selected contractor over a date range (by period start). For year-end
            statements, visa/mortgage letters, and quick "how much did we pay X" lookups.</p></div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          <button className="btn ghost sm" disabled={!rows.length} onClick={exportCsv}>Summary CSV ({rows.length})</button>
          <button className="btn ghost sm" disabled={!stmtCount} onClick={exportStatements}>Statements CSV ({stmtCount})</button>
        </div>
      </div>
      <div style={{display:"flex",gap:8,alignItems:"flex-end",flexWrap:"wrap",margin:"8px 0"}}>
        <div><label style={{fontSize:10,color:"var(--muted)"}}>From (period start)</label><br/>
          <input type="date" value={from} onChange={e=>setFrom(e.target.value)}/></div>
        <div><label style={{fontSize:10,color:"var(--muted)"}}>To</label><br/>
          <input type="date" value={to} onChange={e=>setTo(e.target.value)}/></div>
        <div><label style={{fontSize:10,color:"var(--muted)",display:"block",marginBottom:2}}>Contractors</label>
          <ContractorPicker options={pickOptions} value={sel} onChange={setSel} placeholder="Select…"/></div>
        <button className="btn ghost sm" onClick={()=>{setFrom(`${yr}-01-01`);setTo("");}}>This year</button>
        <button className="btn ghost sm" onClick={()=>{setFrom(`${yr-1}-01-01`);setTo(`${yr-1}-12-31`);}}>Last year</button>
        <span className="muted" style={{fontSize:12,marginLeft:"auto",alignSelf:"center"}}>
          {rows.length} contractor(s) · total net {money(totNet,"PHP")}</span>
      </div>
      {loading?<Skeleton rows={4}/>:
       sel.size===0?<div className="empty">Pick one or more contractors above (or “Select all”) to see their pay summary.</div>:
       rows.length===0?<div className="empty">No pay statements for the selected contractor(s) in this range.</div>:
      <div className="table-scroll"><table>
        <thead><tr>
          <th>Contractor</th>{consolidated&&<th>Company</th>}
          <th>Periods</th><th>Hours</th><th>Gross ₱</th><th>Misc ₱</th><th>Net ₱</th><th>Paid ₱</th>
        </tr></thead>
        <tbody>
          {rows.map(r=>{
            const open=openKey===r.gkey;
            const nCols=consolidated?8:7;
            return (
            <React.Fragment key={r.gkey}>
            <tr onClick={()=>setOpenKey(open?null:r.gkey)} style={{cursor:"pointer",background:open?"#f1f5f9":undefined}}>
              <td className="card-title"><span style={{color:"var(--muted)",marginRight:6}}>{open?"▾":"▸"}</span><b>{r.name}</b></td>{consolidated&&<td data-label="Company" className="muted">{r.company}</td>}
              <td data-label="Periods">{r.periods}</td>
              <td data-label="Hours">{r.hours.toFixed(2)}</td>
              <td data-label="Gross ₱">{money(r.gross,"PHP")}</td>
              <td data-label="Misc ₱" style={r.misc<0?{color:"#b91c1c"}:{}}>{money(r.misc,"PHP")}</td>
              <td data-label="Net ₱"><b>{money(r.net,"PHP")}</b></td>
              <td data-label="Paid ₱" style={r.paid<r.net?{color:"var(--warn)"}:{color:"var(--good)"}}>{money(r.paid,"PHP")}</td>
            </tr>
            {open && (
              <tr><td colSpan={nCols} style={{background:"#f8fafc",padding:"8px 10px"}}>
                <div className="sub" style={{margin:"0 0 6px"}}>Individual pay statements ({r.statements.length}) — each pay period that makes up the totals above.</div>
                <table className="keep-table"><thead><tr>
                  <th>Pay period</th><th>Pay date</th><th>Hours</th><th>Gross ₱</th><th>Health ₱</th>
                  <th>13th ₱</th><th>Lunch ₱</th><th>Bonus ₱</th><th>Misc ₱</th><th>Net ₱</th><th>Status</th>
                </tr></thead>
                <tbody>{r.statements.map((s,j)=>{
                  const isPaid=s.status==="sent"||s.status==="reconciled";
                  return (
                  <tr key={j}>
                    <td>{s.start} → {s.end||"?"}</td>
                    <td className="muted">{s.payDate||"—"}</td>
                    <td>{s.hours.toFixed(2)}</td>
                    <td>{money(s.gross,"PHP")}</td>
                    <td>{s.ha?money(s.ha,"PHP"):"—"}</td>
                    <td>{s.t13?money(s.t13,"PHP"):"—"}</td>
                    <td>{s.lunch?money(s.lunch,"PHP"):"—"}</td>
                    <td>{s.bonus?money(s.bonus,"PHP"):"—"}</td>
                    <td style={s.misc<0?{color:"#b91c1c"}:{}}>{s.misc?money(s.misc,"PHP"):"—"}</td>
                    <td><b>{money(s.net,"PHP")}</b></td>
                    <td><span className="pill" style={isPaid?{background:"#dcfce7",color:"#065f46"}:{background:"#f3f4f6",color:"var(--muted)"}}>{isPaid?"paid":(s.status||"draft")}</span></td>
                  </tr>
                );})}</tbody></table>
              </td></tr>
            )}
            </React.Fragment>
          );})}
        </tbody>
      </table></div>}
      <p className="muted" style={{fontSize:11,marginTop:6}}>
        Click a contractor to expand their individual pay statements per period. <b>Summary CSV</b> is the
        condensed per-contractor totals; <b>Statements CSV</b> is one row per pay period (the full breakdown:
        Health, 13th, Lunch, Bonus, Deductions). Gross + Misc + the other components reconcile to Net.</p>
    </div>
  );
}

// Per-contractor drill-down: pick one contractor, see every pay period stacked
// — worked hours + PTO (from time_entries, bucketed by period) merged with the
// pay components (Health/Lunch/13th/Gross/Net) from the saved pay statement.
// Read-only. Complements PerContractorSummary (which aggregates across periods).
function ContractorHistory({client,companyId,consolidated}){
  const {data:wkrs}=useQuery(client,c=>c.from("workers")
    .select("id,first_name,middle_name,last_name"),[client]);
  const workers=(wkrs||[]).map(w=>({id:w.id,name:fullName(w)||"(unknown)"}))
    .sort((a,b)=>a.name.localeCompare(b.name));
  const [wid,setWid]=useState("");
  const [rows,setRows]=useState(null);
  const [openKey,setOpenKey]=useState(null);   // which period row is expanded to daily
  useEffect(()=>{
    if(!wid){ setRows(null); return; }
    let cancel=false;
    (async()=>{
      const {data:pays}=await client.from("payments")
        .select("worked_hours,gross_php,health_allowance_php,pdd_lunch_php,thirteenth_month_php,bonus_php,net_php,payout_method,status,pay_periods(period_start,period_end,pay_date)")
        .eq("worker_id",wid);
      const {data:te}=await client.from("time_entries")
        .select("work_date,tracked_seconds,pto_seconds").eq("worker_id",wid)
        .order("work_date",{ascending:true}).limit(5000);
      if(cancel) return;
      const tmap={};
      (te||[]).forEach(r=>{ const p=periodFor(r.work_date);
        const g=tmap[p.start]||(tmap[p.start]={end:p.end,tracked:0,pto:0,days:{}});
        g.tracked+=Number(r.tracked_seconds||0); g.pto+=Number(r.pto_seconds||0);
        const d=g.days[r.work_date]||(g.days[r.work_date]={date:r.work_date,tracked:0,pto:0});
        d.tracked+=Number(r.tracked_seconds||0); d.pto+=Number(r.pto_seconds||0); });
      const pmap={};
      (pays||[]).forEach(p=>{ const s=p.pay_periods?.period_start; if(!s) return;
        pmap[s]={end:p.pay_periods?.period_end,ha:Number(p.health_allowance_php||0),
          lunch:Number(p.pdd_lunch_php||0),t13:Number(p.thirteenth_month_php||0),
          gross:Number(p.gross_php||0),net:Number(p.net_php||0),method:p.payout_method,
          status:p.status,workedPay:p.worked_hours}; });
      const keys=[...new Set([...Object.keys(tmap),...Object.keys(pmap)])].sort((a,b)=>b.localeCompare(a));
      setRows(keys.map(k=>{ const t=tmap[k]||{}; const p=pmap[k]; return {
        start:k, end:(p&&p.end)||t.end,
        worked: t.tracked!=null?t.tracked/3600:(p&&p.workedPay!=null?Number(p.workedPay):null),
        pto:(t.pto||0)/3600, hasPay:!!p,
        days: Object.values(t.days||{}).filter(x=>x.tracked>0||x.pto>0).sort((a,b)=>a.date.localeCompare(b.date)),
        ha:p&&p.ha, lunch:p&&p.lunch, t13:p&&p.t13, gross:p&&p.gross, net:p&&p.net, method:p&&p.method, status:p&&p.status }; }));
    })();
    return ()=>{cancel=true;};
  },[client,wid]);
  const sel=workers.find(w=>w.id===wid);
  const paid=st=>st==="sent"||st==="reconciled";
  function exportCsv(){
    if(!rows||!rows.length) return;
    const header=["Period start","Period end","Worked h","PTO h","Health PHP","Lunch PHP","13th PHP","Gross PHP","Net PHP","Method","Status"];
    const body=rows.map(r=>[r.start,r.end||"",r.worked!=null?r.worked.toFixed(2):"",r.pto.toFixed(2),
      r.hasPay?r.ha:"",r.hasPay?r.lunch:"",r.hasPay?r.t13:"",r.hasPay?r.gross:"",r.hasPay?r.net:"",r.method||"",r.status||""]);
    downloadCSV(`${(sel?.name||"contractor").replace(/[^a-z0-9]+/gi,"_")}_history.csv`,[header,...body]);
  }
  return (
    <div className="card">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
        <div><h2>Contractor pay &amp; hours history</h2>
          <p className="sub">Pick a contractor to see every pay period's worked hours, PTO, and pay
            components stacked. Hours/PTO come from time entries; amounts from saved pay statements.</p></div>
        {rows&&rows.length>0 && <button className="btn ghost sm" onClick={exportCsv}>Export CSV ({rows.length})</button>}
      </div>
      <select value={wid} onChange={e=>setWid(e.target.value)} style={{maxWidth:340,margin:"6px 0"}}>
        <option value="">Select contractor…</option>
        {workers.map(w=><option key={w.id} value={w.id}>{w.name}</option>)}
      </select>
      {!wid ? null :
       rows===null ? <Skeleton rows={4}/> :
       !rows.length ? <div className="empty">No hours or pay records for this contractor.</div> :
       <div className="table-scroll"><table>
         <thead><tr>
           <th>Pay period</th><th>Worked h</th><th>PTO h</th><th>Health ₱</th><th>Lunch ₱</th>
           <th>13th ₱</th><th>Gross ₱</th><th>Net ₱</th><th>Method</th><th>Status</th>
         </tr></thead>
         <tbody>
           {rows.map((r,i)=>{
             const open=openKey===i; const hasDays=r.days&&r.days.length>0;
             const fmtD=d=>{ try{ return new Date(d+"T00:00:00").toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"}); }catch{ return d; } };
             return (
             <React.Fragment key={i}>
             <tr onClick={()=>hasDays&&setOpenKey(open?null:i)}
                 style={{cursor:hasDays?"pointer":"default", background:open?"#f1f5f9":undefined}}>
               <td className="card-title"><span style={{color:"var(--muted)",marginRight:6}}>{hasDays?(open?"▾":"▸"):" "}</span>{r.start} → {r.end||"?"}</td>
               <td data-label="Worked h">{r.worked!=null?r.worked.toFixed(2):"—"}</td>
               <td data-label="PTO h">{r.pto>0?r.pto.toFixed(2):"—"}</td>
               <td data-label="Health ₱">{r.hasPay?money(r.ha,"PHP"):"—"}</td>
               <td data-label="Lunch ₱">{r.hasPay?money(r.lunch,"PHP"):"—"}</td>
               <td data-label="13th ₱">{r.hasPay&&r.t13?money(r.t13,"PHP"):"—"}</td>
               <td data-label="Gross ₱">{r.hasPay?money(r.gross,"PHP"):"—"}</td>
               <td data-label="Net ₱"><b>{r.hasPay?money(r.net,"PHP"):"—"}</b></td>
               <td data-label="Method">{r.hasPay?(methodLabel(r.method)||"—"):"—"}</td>
               <td data-label="Status">{r.hasPay
                 ? <span className="pill" style={paid(r.status)?{background:"#dcfce7",color:"#065f46"}:{background:"#f3f4f6",color:"var(--muted)"}}>{paid(r.status)?"paid":(r.status||"draft")}</span>
                 : <span className="muted" style={{fontSize:11}}>time only</span>}</td>
             </tr>
             {open && hasDays && (
               <tr><td colSpan={10} style={{background:"#f8fafc",padding:"8px 10px"}}>
                 <div>
                   <table className="keep-table"><thead><tr><th>Day</th><th>Worked h</th><th>PTO h</th></tr></thead>
                   <tbody>{r.days.map(d=>(
                     <tr key={d.date}><td>{fmtD(d.date)} <span className="muted" style={{fontSize:11}}>({d.date})</span></td>
                       <td>{(d.tracked/3600).toFixed(2)}</td>
                       <td>{d.pto>0?(d.pto/3600).toFixed(2):"—"}</td></tr>
                   ))}</tbody></table>
                 </div>
               </td></tr>
             )}
             </React.Fragment>
           );})}
         </tbody>
       </table></div>}
    </div>
  );
}

// Wise reconciliation admin: one-time backfill of wise_transfer_id across ALL
// paid periods, and the matching summary. Lives in Reports (not Process Payroll)
// because it's a global cleanup operation, not a per-period action. Per the
// app UX guideline, admin/cleanup tools are tucked into a section rather than
// promoted to top-level peers.
function WiseReconciliation({client,companyId,consolidated}){
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState("");
  const [result,setResult]=useState(null);
  const [confirm,setConfirm]=useState(false);   // inline-confirm pattern
  const [emailCheck,setEmailCheck]=useState(null);  // { checked, mismatches, missing_in_db, missing_in_wise }
  const [driftSummary,setDriftSummary]=useState(null);  // { wise:[{worker_id,name,fields}], hubstaff:[...] }
  const [driftBusy,setDriftBusy]=useState(false);
  const [driftMsg,setDriftMsg]=useState("");
  const [driftShow,setDriftShow]=useState(false);

  // Cross-system drift summary: which contractors have ANY name/email mismatch
  // against Wise OR Hubstaff. Lightweight — just shows counts and a click-out
  // to the contractor's profile for the fix.
  async function runDriftScan(){
    if(consolidated||!companyId){ setDriftMsg("Pick a single company first."); return; }
    setDriftBusy(true); setDriftMsg(""); setDriftSummary(null);
    try{
      // 1. Pull workers in this company with at least one external ID
      const {data:wcs,error:wcErr}=await client.from("worker_companies")
        .select("worker_id,hubstaff_user_id,workers(id,first_name,middle_name,last_name,email,wise_recipient_id)")
        .eq("company_id",companyId);
      if(wcErr) throw new Error(wcErr.message);
      const workers=(wcs||[]).map(x=>({
        ...x.workers,
        worker_id:x.worker_id,
        hubstaff_user_id:x.hubstaff_user_id,
      })).filter(w=>w && (w.wise_recipient_id || w.hubstaff_user_id));

      // 2. Bulk-pull Wise recipients (one API call)
      const wiseLinked=workers.filter(w=>w.wise_recipient_id);
      let wiseById=new Map();
      if(wiseLinked.length>0){
        const { data, error }=await client.functions.invoke("wise-payouts",{ body:{ action:"recipients" } });
        if(error) throw new Error(error.message||"Edge function error");
        if(data?.error) throw new Error(data.error);
        for(const rec of (data?.recipients||[])){ if(rec.id) wiseById.set(String(rec.id), rec); }
      }

      // 3. Pull each linked Hubstaff user (one call per user — Hubstaff doesn't
      //    have a bulk-by-id endpoint that's reliable across orgs; this is N
      //    calls but only for linked workers, typically <50)
      const hubLinked=workers.filter(w=>w.hubstaff_user_id);
      const hubById=new Map();
      // Fetch each linked user's Hubstaff record with bounded concurrency (was a
      // fully sequential loop of N cold edge calls). Per-worker errors are skipped
      // exactly as before — one failed id never aborts the scan.
      const CHUNK=6;
      for(let i=0;i<hubLinked.length;i+=CHUNK){
        const settled=await Promise.all(hubLinked.slice(i,i+CHUNK).map(async w=>{
          try{
            const { data, error }=await client.functions.invoke("hubstaff-sync",{
              body:{ action:"get_user", user_id:w.hubstaff_user_id } });
            if(error || data?.error) return null;
            return data?.user ? [String(w.hubstaff_user_id), data.user] : null;
          }catch(_){ return null; }
        }));
        settled.forEach(e=>{ if(e) hubById.set(e[0],e[1]); });
      }

      // 4. Compute drift per worker
      const norm=s=>String(s||"").trim().toLowerCase();
      const wiseDrift=[]; const hubDrift=[];
      for(const w of workers){
        const dbName=fullName(w), dbEmail=w.email||"";
        if(w.wise_recipient_id){
          const rec=wiseById.get(String(w.wise_recipient_id));
          if(rec){
            const fields=[];
            if(norm(rec.name)!==norm(dbName)) fields.push("name");
            if(rec.email && norm(rec.email)!==norm(dbEmail)) fields.push("email");
            if(fields.length) wiseDrift.push({ worker_id:w.id, name:dbName, fields,
              external:{name:rec.name, email:rec.email} });
          }
        }
        if(w.hubstaff_user_id){
          const hub=hubById.get(String(w.hubstaff_user_id));
          if(hub){
            const fields=[];
            if(norm(hub.name)!==norm(dbName)) fields.push("name");
            if(hub.email && norm(hub.email)!==norm(dbEmail)) fields.push("email");
            if(fields.length) hubDrift.push({ worker_id:w.id, name:dbName, fields,
              external:{name:hub.name, email:hub.email} });
          }
        }
      }
      setDriftSummary({
        wise_checked:wiseLinked.length, wise_drift:wiseDrift,
        hub_checked:hubLinked.length, hub_drift:hubDrift,
      });
      setDriftMsg(`Scanned ${workers.length} linked contractor(s): `+
        `Wise drift on ${wiseDrift.length}, Hubstaff drift on ${hubDrift.length}.`);
    }catch(ex){ setDriftMsg("Drift scan failed: "+(ex.message||ex)); }
    finally{ setDriftBusy(false); }
  }

  // Compare workers' emails to whatever email Wise has on the linked recipient.
  // Honest scope: only catches mismatches where Wise actually has an email on
  // the recipient (many PHP bank recipients don't). Surfaces a 'needs review'
  // table; fixing the email is a manual edit on the contractor profile.
  async function runEmailCheck(){
    setBusy(true); setMsg(""); setEmailCheck(null);
    try{
      // Pull Wise recipients (the existing read-only action; now also returns email when present).
      const { data: rData, error: rErr }=await client.functions.invoke("wise-payouts",{ body:{ action:"recipients" } });
      if(rErr) throw new Error(rErr.message||"Edge function error");
      if(rData?.error) throw new Error(rData.error);
      const recipients=Array.isArray(rData.recipients)?rData.recipients:[];
      // Index Wise recipients by numeric id.
      const wiseById=new Map();
      for(const rec of recipients){ if(rec.id) wiseById.set(String(rec.id), rec); }
      // Pull workers with a linked Wise recipient. If company is selected, scope to it;
      // otherwise the cross-check runs across all companies.
      let q=client.from("workers").select("id,first_name,middle_name,last_name,email,wise_recipient_id").not("wise_recipient_id","is",null);
      if(!consolidated && companyId){
        // No direct workers.company_id — scope via worker_companies join.
        const {data:wcs}=await client.from("worker_companies").select("worker_id").eq("company_id",companyId);
        const ids=(wcs||[]).map(x=>x.worker_id);
        if(ids.length) q=q.in("id",ids);
      }
      const {data:workers,error:wErr}=await q;
      if(wErr) throw new Error(wErr.message);
      const norm=s=>String(s||"").trim().toLowerCase();
      const mismatches=[];           // worker has email, Wise has different email
      const missing_in_db=[];        // Wise has an email, worker has no email
      const missing_in_wise=[];      // worker has an email, Wise has no email (only flagged for context)
      let checked=0;
      for(const w of (workers||[])){
        const rec=wiseById.get(String(w.wise_recipient_id));
        if(!rec) continue;
        checked++;
        const wEmail=norm(w.email), rEmail=norm(rec.email);
        if(rEmail && !wEmail){
          missing_in_db.push({ worker_id:w.id, name:fullName(w), wise_email:rec.email, wise_name:rec.name });
        } else if(wEmail && !rEmail){
          missing_in_wise.push({ worker_id:w.id, name:fullName(w), db_email:w.email, wise_name:rec.name });
        } else if(rEmail && wEmail && rEmail!==wEmail){
          mismatches.push({ worker_id:w.id, name:fullName(w), db_email:w.email, wise_email:rec.email, wise_name:rec.name });
        }
      }
      setEmailCheck({ checked, mismatches, missing_in_db, missing_in_wise,
                      recipients_total:recipients.length, workers_linked:(workers||[]).length });
      setMsg(`Compared ${checked} linked worker(s) against Wise: `+
             `${mismatches.length} mismatch(es), ${missing_in_db.length} missing in DB, `+
             `${missing_in_wise.length} missing on Wise.`);
    }catch(ex){ setMsg("Email check failed: "+(ex.message||ex)); }
    finally{ setBusy(false); }
  }

  async function runBackfill(){
    setBusy(true); setMsg(""); setResult(null); setConfirm(false);
    try{
      // No pay_period_id — scans all unmatched Wise payments.
      const { data, error }=await client.functions.invoke("wise-payouts",{
        body:{ action:"match", window_days:14 } });
      if(error) throw new Error(error.message||"Edge function error");
      if(data?.error) throw new Error(data.error);
      setResult(data);
      setMsg(`Scanned ${data.scanned} unmatched payment(s) against ${data.wise_transfers_pulled||0} Wise transfer(s): `+
             `${data.matched} matched cleanly, ${data.variances} matched with variance, `+
             `${data.ambiguous} ambiguous, ${data.unmatched} unmatched.`);
      logEvent(client,{ company_id:companyId, action:"wise_recipient_sync",
        entity:"Wise reconciliation",
        detail:{ kind:"global_backfill", scanned:data.scanned, matched:data.matched,
                 variances:data.variances, ambiguous:data.ambiguous, unmatched:data.unmatched } });
    }catch(ex){ setMsg("Backfill failed: "+(ex.message||ex)); }
    finally{ setBusy(false); }
  }

  return (
    <div className="card" style={{borderColor:"#bcd"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
        <div>
          <h2 style={{margin:"0 0 4px"}}>Wise reconciliation <span className="pill" style={{background:"#eef2ff",color:"#3730a3",fontSize:10}}>admin</span></h2>
          <p className="sub">One-time cleanup: scans every paid Wise payment that has no
            <code>wise_transfer_id</code> stored, pulls Wise's transfer history, and links
            each DB row to its real Wise transfer by recipient + amount + date.
            Read-mostly: writes only the transfer ID. Never changes amounts.
            Variances and ambiguous matches are surfaced for review.</p>
        </div>
        {!confirm
          ? <button className="btn" disabled={busy} onClick={()=>setConfirm(true)}>Backfill all paid periods</button>
          : <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <span className="muted" style={{fontSize:13}}>Run across all paid periods?</span>
              <button className="btn" disabled={busy} onClick={runBackfill}>{busy?"Scanning…":"Confirm"}</button>
              <button className="btn ghost" disabled={busy} onClick={()=>setConfirm(false)}>Cancel</button>
            </div>}
      </div>
      {msg && <div className="muted" style={{fontSize:13,marginTop:10}}>{msg}</div>}
      {result && (
        <div style={{marginTop:12}}>
          <div className="row" style={{gap:16,flexWrap:"wrap",fontSize:13}}>
            <span>Scanned <b>{result.scanned}</b></span>
            <span className="muted">across {result.wise_transfers_pulled||0} Wise transfer(s)</span>
            <span><b>{result.matched}</b> matched cleanly</span>
            <span className={result.variances?"pill warn":"muted"}>{result.variances} with variance</span>
            <span className={result.ambiguous?"pill warn":"muted"}>{result.ambiguous} ambiguous</span>
            <span className={result.unmatched?"pill warn":"muted"}>{result.unmatched} unmatched</span>
          </div>
          {result.window && (
            <div className="muted" style={{fontSize:12,marginTop:6}}>
              Window: {String(result.window.from).slice(0,10)} → {String(result.window.to).slice(0,10)} (±{result.window.days} days)
            </div>
          )}
          {result.variances>0 && (
            <p className="muted" style={{fontSize:12,marginTop:8}}>
              See the <b>Process and Pay</b> tab for any period to view the per-row variance
              details. Variances are not auto-fixed — Wise's amount is shown next to the DB
              amount, and you decide whether to update the DB.
            </p>
          )}
        </div>
      )}

      {/* Email cross-check — separate action in the same admin card. */}
      <div style={{marginTop:16,paddingTop:12,borderTop:"1px solid var(--line)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
          <div>
            <h3 style={{margin:"0 0 4px",fontSize:15}}>Email cross-check</h3>
            <p className="sub" style={{fontSize:12}}>Compares the email on each contractor against the email Wise has
              on their linked recipient. Surfaces mismatches for manual fix. <b>Partial signal:</b> only catches
              mismatches where Wise actually has an email on the recipient (many PHP bank recipients don't).</p>
          </div>
          <button className="btn ghost" disabled={busy} onClick={runEmailCheck}>
            {busy?"Checking…":"Check emails"}
          </button>
        </div>
        {emailCheck && (
          <div style={{marginTop:10}}>
            <div className="row" style={{gap:16,flexWrap:"wrap",fontSize:13}}>
              <span>Compared <b>{emailCheck.checked}</b> linked worker(s)</span>
              <span className="muted">of {emailCheck.workers_linked} with a Wise recipient stored</span>
              <span className={emailCheck.mismatches.length?"pill warn":"muted"}>{emailCheck.mismatches.length} mismatch(es)</span>
              <span className={emailCheck.missing_in_db.length?"pill warn":"muted"}>{emailCheck.missing_in_db.length} missing in DB</span>
              <span className="muted">{emailCheck.missing_in_wise.length} missing on Wise</span>
            </div>
            {emailCheck.mismatches.length>0 && (
              <div style={{marginTop:8}}>
                <div style={{fontWeight:600,fontSize:13,marginBottom:4}}>Mismatches (DB ≠ Wise)</div>
                <div className="table-scroll"><table>
                  <thead><tr><th>Worker</th><th>DB email</th><th>Wise email</th><th>Wise recipient name</th></tr></thead>
                  <tbody>
                    {emailCheck.mismatches.map((m,i)=>(
                      <tr key={i}>
                        <td className="card-title"><b>{m.name}</b></td>
                        <td data-label="DB email" style={{color:"#b91c1c"}}>{m.db_email}</td>
                        <td data-label="Wise email" style={{color:"var(--good)"}}>{m.wise_email}</td>
                        <td data-label="Wise recipient name" className="muted">{m.wise_name||"—"}</td>
                      </tr>
                    ))}
                  </tbody>
                </table></div>
                <p className="muted" style={{fontSize:12,marginTop:4}}>
                  Fix mismatches manually on the contractor's profile (Contractors → Edit).
                  The Wise email is shown for reference but you decide which is right.
                </p>
              </div>
            )}
            {emailCheck.missing_in_db.length>0 && (
              <div style={{marginTop:10}}>
                <div style={{fontWeight:600,fontSize:13,marginBottom:4}}>Missing in DB (Wise has, contractor doesn't)</div>
                <ul style={{margin:0,paddingLeft:18,fontSize:13}}>
                  {emailCheck.missing_in_db.slice(0,15).map((m,i)=>(
                    <li key={i}><b>{m.name}</b> <span className="muted">· Wise has {m.wise_email}</span></li>
                  ))}
                  {emailCheck.missing_in_db.length>15 && <li className="muted">…and {emailCheck.missing_in_db.length-15} more</li>}
                </ul>
              </div>
            )}
          </div>
        )}
      </div>

      {/* --- Cross-system drift summary ---
          Counts of contractors who differ between DB and Wise OR DB and Hubstaff
          on name/email. Click 'Show list' to see who; the actual fix happens in
          each contractor's profile (the External sources section). */}
      <div style={{marginTop:16,paddingTop:12,borderTop:"1px solid var(--line)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
          <div>
            <h3 style={{margin:"0 0 4px",fontSize:15}}>Cross-system drift (Wise + Hubstaff)</h3>
            <p className="sub" style={{fontSize:12}}>Scans every contractor with a Wise recipient or
              Hubstaff user and lists where the external system disagrees with the DB on name or email.
              Click a name to open the profile and fix it there.</p>
          </div>
          <button className="btn ghost" disabled={driftBusy||consolidated} onClick={runDriftScan}>
            {driftBusy?"Scanning…":"Scan all"}</button>
        </div>
        {consolidated && <Banner tone="info" msg="Pick a single company first." style={{marginTop:8}}/>}
        {driftMsg && <div className="muted" style={{fontSize:13,marginTop:8}}>{driftMsg}</div>}
        {driftSummary && (
          <div style={{marginTop:10}}>
            <div className="row" style={{gap:16,flexWrap:"wrap",fontSize:13}}>
              <span>Wise checked: <b>{driftSummary.wise_checked}</b></span>
              <span className={driftSummary.wise_drift.length?"pill warn":"muted"}>
                {driftSummary.wise_drift.length} Wise drift
              </span>
              <span>Hubstaff checked: <b>{driftSummary.hub_checked}</b></span>
              <span className={driftSummary.hub_drift.length?"pill warn":"muted"}>
                {driftSummary.hub_drift.length} Hubstaff drift
              </span>
              {(driftSummary.wise_drift.length+driftSummary.hub_drift.length)>0 && (
                <button className="btn ghost sm" onClick={()=>setDriftShow(s=>!s)}>
                  {driftShow?"Hide list":"Show list"}</button>
              )}
            </div>
            {driftShow && (
              <div style={{marginTop:10,display:"flex",gap:24,flexWrap:"wrap"}}>
                {driftSummary.wise_drift.length>0 && (
                  <div style={{flex:"1 1 280px"}}>
                    <div style={{fontWeight:600,fontSize:13,marginBottom:4}}>Wise drift</div>
                    <ul style={{margin:0,paddingLeft:18,fontSize:13}}>
                      {driftSummary.wise_drift.slice(0,20).map((d,i)=>(
                        <li key={i}><b>{d.name}</b> <span className="muted">· differs on {d.fields.join(", ")}</span></li>
                      ))}
                      {driftSummary.wise_drift.length>20 && <li className="muted">…and {driftSummary.wise_drift.length-20} more</li>}
                    </ul>
                  </div>
                )}
                {driftSummary.hub_drift.length>0 && (
                  <div style={{flex:"1 1 280px"}}>
                    <div style={{fontWeight:600,fontSize:13,marginBottom:4}}>Hubstaff drift</div>
                    <ul style={{margin:0,paddingLeft:18,fontSize:13}}>
                      {driftSummary.hub_drift.slice(0,20).map((d,i)=>(
                        <li key={i}><b>{d.name}</b> <span className="muted">· differs on {d.fields.join(", ")}</span></li>
                      ))}
                      {driftSummary.hub_drift.length>20 && <li className="muted">…and {driftSummary.hub_drift.length-20} more</li>}
                    </ul>
                  </div>
                )}
              </div>
            )}
            <p className="muted" style={{fontSize:12,marginTop:8}}>
              To fix: open the contractor on the <b>Contractors</b> tab. The External sources section
              shows DB vs Wise/Hubstaff side by side. For <b>Wise</b> drift, click "Use Wise's …" to
              pull Wise's value into the DB. For <b>Hubstaff</b> drift, fix it in Hubstaff's web UI —
              Hubstaff's public API doesn't accept user-profile edits.
            </p>
          </div>
        )}
      </div>
    </div>
  );
}

// Avg. weekly activity from Hubstaff (time_entries.activity_pct). Activity % is
// NOT synced for the historical hours-only backfill, so the table stays empty
// until a Hubstaff API sync captures it — until then this is the requested
// contractor picker. Pick contractor(s) to see their week-by-week activity.
function UtilizationReport({client,companyId,consolidated}){
  const [sel,setSel]=useState(()=>new Set());
  const {data,loading}=useQuery(client,c=>{
    // Page the full approved time_entries set — 10k+ rows would otherwise truncate
    // at 1000 and silently drop weeks from the activity table.
    const applyF=q=>{ q=q.eq("approval","approved"); if(!consolidated&&companyId)q=q.eq("company_id",companyId); return q; };
    return pageAll(
      ()=>applyF(c.from("time_entries").select("worker_id",{count:"exact",head:true})),
      (from,to)=>applyF(c.from("time_entries").select("worker_id,source_name,work_date,tracked_seconds,activity_pct,approval,company_id")).order("work_date",{ascending:true}).range(from,to));
  },[client,companyId,consolidated]);
  const te=data||[];
  const optMap={}; te.forEach(t=>{ const id=String(t.worker_id||t.source_name||""); if(id && !optMap[id]) optMap[id]=t.source_name||"(unknown)"; });
  const pickOptions=Object.entries(optMap).map(([id,name])=>({id,name})).sort((a,b)=>a.name.localeCompare(b.name));
  const weekStart=ds=>{ if(!ds) return ""; const d=new Date(ds+"T00:00:00"); if(isNaN(d)) return ""; const off=(d.getDay()+6)%7; d.setDate(d.getDate()-off); return d.toISOString().slice(0,10); };
  const byKey={}; let anyActivity=false;
  te.forEach(t=>{ const id=String(t.worker_id||t.source_name||""); if(!sel.has(id)) return;
    const wk=weekStart(t.work_date); if(!wk) return;
    const k=id+"|"+wk; const g=byKey[k]||(byKey[k]={name:optMap[id],week:wk,actSum:0,actN:0,hours:0});
    g.hours+=(t.tracked_seconds||0)/3600;
    if(t.activity_pct!=null){ g.actSum+=Number(t.activity_pct); g.actN++; anyActivity=true; }
  });
  const rows=Object.values(byKey).map(g=>({...g, act:g.actN?+(g.actSum/g.actN).toFixed(1):null, hours:+g.hours.toFixed(1)}))
    .sort((a,b)=> a.name.localeCompare(b.name) || b.week.localeCompare(a.week));
  return (
    <div className="card">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
        <div><h2>Avg. Weekly Activity</h2>
          <p className="sub">Average Hubstaff activity % per contractor per week (Mon–Sun), from approved time.</p></div>
        <div><label style={{fontSize:10,color:"var(--muted)",display:"block",marginBottom:2}}>Contractors</label>
          <ContractorPicker options={pickOptions} value={sel} onChange={setSel} placeholder="Select…"/></div>
      </div>
      {loading?<Skeleton rows={4}/>:
       sel.size===0?<div className="empty">Pick one or more contractors above to see their weekly activity.</div>:
       rows.length===0?<div className="empty">No approved time for the selected contractor(s).</div>:
       !anyActivity?<div className="empty">No Hubstaff activity % is synced for the selected contractor(s) yet — it appears here once a Hubstaff API sync captures it (historical imports were hours-only).</div>:
      <div className="table-scroll"><table>
        <thead><tr><th>Contractor</th><th>Week of</th><th>Avg activity</th><th>Hours</th></tr></thead>
        <tbody>
          {rows.map((r,i)=>(
            <tr key={i}><td className="card-title"><b>{r.name}</b></td><td data-label="Week of">{r.week}</td>
              <td data-label="Avg activity">{r.act==null?"—":r.act+"%"}</td><td data-label="Hours">{r.hours}</td></tr>
          ))}
        </tbody>
      </table></div>}
    </div>
  );
}

// ============================ WISE PAYOUTS ===================================
// Drafts Wise transfers for a LOCKED period and writes back transfer id + FX.
// It NEVER funds (moves money) — you fund the batch in Wise directly.
// Pull saved recipients from Wise and match them to contractors (ID-first).
// Lives in the Contractors tab (recipient identity is a contractor attribute,
// not a per-payout action). Read-only against Wise; writes the matched
// recipient id onto the worker. Extracted from WisePayouts.
function PullRecipients({client,companyId,consolidated,onClose}){
  const mref=useModalA11y(onClose,{escClose:true}); // read-only viewer: Escape-safe (hook before the consolidated early-return)
  const [recSync,setRecSync]=useState(null);
  const [recBusy,setRecBusy]=useState(false);
  const [msg,setMsg]=useState("");
  async function pullWiseRecipients(){
    if(consolidated||!companyId){setMsg("Pick a single company first.");return;}
    setRecBusy(true);setMsg("");
    try{
      const {data,error}=await client.functions.invoke("wise-payouts",{body:{action:"recipients"}});
      if(error)throw new Error(error.message||"Edge function error");
      if(data&&data.error)throw new Error(data.error);
      const recipients=data.recipients||[];
      const {data:wcs}=await client.from("worker_companies")
        .select("worker_id,workers(first_name,middle_name,last_name,wise_recipient_id,wise_recipients)")
        .eq("company_id",companyId);
      const byWiseId={}, byStrict={}, byLoose={};
      (wcs||[]).forEach(l=>{
        const w=l.workers; if(!w)return;
        const val={worker_id:l.worker_id, worker_name:fullName(w)};
        const ids=[w.wise_recipient_id, ...(Array.isArray(w.wise_recipients)?w.wise_recipients.map(x=>x.id):[])].filter(x=>x!=null);
        ids.forEach(id=>{ if(!byWiseId[id]) byWiseId[id]=val; });
        const sk=nameKey(fullName(w)), lk=looseKey(fullName(w));
        if(sk&&!byStrict[sk])byStrict[sk]=val;
        if(lk&&!byLoose[lk])byLoose[lk]=val;
      });
      const preview=recipients.map(rec=>{
        const hit=byWiseId[rec.id] || byStrict[nameKey(rec.name)] || byLoose[looseKey(rec.name)] || null;
        const already=!!byWiseId[rec.id];
        return {recipient_id:rec.id, name:rec.name, currency:rec.currency, account:rec.account,
                worker_id:hit?hit.worker_id:null, worker_name:hit?hit.worker_name:null,
                matched:!!hit, already};
      });
      const matched=preview.filter(p=>p.matched).length;
      setRecSync({preview, profile_id:data.profile_id});
      setMsg(`Pulled ${recipients.length} Wise recipient(s); matched ${matched} to contractors. Review below, then save the IDs.`);
    }catch(ex){
      setMsg("Wise recipient pull failed: "+ex.message+
        " — check the wise-payouts function is deployed and WISE_API_TOKEN is set.");
    }finally{ setRecBusy(false); }
  }
  async function saveMatchedRecipients(){
    if(!recSync)return;
    setRecBusy(true);setMsg("");
    try{
      const toSave=recSync.preview.filter(p=>p.matched && !p.already);
      let saved=0;
      if(toSave.length){
        // One batched read instead of a per-row SELECT (was a read-modify-write N+1).
        const ids=[...new Set(toSave.map(p=>p.worker_id))];
        const {data:ws,error:re}=await client.from("workers").select("id,wise_recipients,wise_recipient_id").in("id",ids);
        if(re) throw re;
        const byId=new Map((ws||[]).map(w=>[w.id,w]));
        // Merge each match into its worker (handles >1 recipient per worker), in memory.
        const updates=new Map();
        for(const p of toSave){
          let cur=updates.get(p.worker_id);
          if(!cur){ const w=byId.get(p.worker_id)||{}; cur={ wise_recipients:Array.isArray(w.wise_recipients)?[...w.wise_recipients]:[], wise_recipient_id:w.wise_recipient_id||null }; }
          if(!cur.wise_recipients.some(x=>x.id===p.recipient_id)) cur.wise_recipients.push({id:p.recipient_id,label:p.name||`Recipient ${p.recipient_id}`});
          if(!cur.wise_recipient_id) cur.wise_recipient_id=p.recipient_id;
          updates.set(p.worker_id,cur);
        }
        // Apply the UPDATEs concurrently (bounded). Plain UPDATE — rows exist.
        const entries=[...updates.entries()];
        for(let i=0;i<entries.length;i+=8){
          const res=await Promise.all(entries.slice(i,i+8).map(([wid,u])=>
            client.from("workers").update({wise_recipients:u.wise_recipients, wise_recipient_id:u.wise_recipient_id}).eq("id",wid).then(({error})=>!error)));
          saved+=res.filter(Boolean).length;
        }
      }
      logEvent(client,{company_id:companyId,action:"wise_recipient_sync",
        entity:"Wise recipients",detail:{pulled:recSync.preview.length,saved}});
      setMsg(`Saved Wise recipient id for ${saved} contractor(s). Unmatched recipients were left alone.`);
      setRecSync(null);
    }catch(ex){ setMsg("Couldn't save recipient ids: "+ex.message); }
    finally{ setRecBusy(false); }
  }
  if(consolidated) return null;
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" ref={mref} role="dialog" aria-modal="true" aria-labelledby="pull-title" onClick={e=>e.stopPropagation()} style={{maxWidth:880}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
        <div>
          <h2 id="pull-title" style={{margin:0}}>Pull recipient IDs from Wise</h2>
          <p className="sub" style={{margin:"4px 0 0"}}>Read-only. Lists your saved Wise recipients and matches each to a
            contractor (by stored Wise ID first, then name), then stores the numeric <b>recipient ID</b> on the
            matched contractor. Doesn't pull bank details or the batch-CSV UUID. No money moves.</p>
        </div>
        <button className="btn ghost sm" onClick={onClose}>Close</button>
      </div>
      <div style={{marginTop:12}}>
        <button className="btn" disabled={recBusy||!companyId} onClick={pullWiseRecipients}>
          {recBusy?"Pulling…":"Pull IDs from Wise"}</button>
      </div>
      {recSync && (()=>{ const toSave=recSync.preview.filter(p=>p.matched&&!p.already);
        return (
        <div style={{marginTop:12}}>
          <div className="table-scroll"><table>
            <thead><tr><th>Wise recipient</th><th>Currency</th><th>Account</th><th>Matched contractor</th><th>Status</th></tr></thead>
            <tbody>
              {recSync.preview.map(p=>(
                <tr key={p.recipient_id}>
                  <td className="card-title"><b>{p.name||"(no name)"}</b> <span className="muted">#{p.recipient_id}</span></td>
                  <td data-label="Currency">{p.currency||"—"}</td>
                  <td data-label="Account" className="muted">{p.account||"—"}</td>
                  <td data-label="Matched contractor">{p.matched?p.worker_name:<span className="muted">— no match —</span>}</td>
                  <td className="card-action">{p.already
                    ? <span className="pill active">already linked</span>
                    : p.matched
                      ? <span className="pill info">will link</span>
                      : <span className="pill warn">unmatched</span>}</td>
                </tr>
              ))}
            </tbody>
          </table></div>
          <div className="actions" style={{marginTop:10,display:"flex",gap:8,alignItems:"center"}}>
            <button className="btn" disabled={recBusy||!toSave.length} onClick={saveMatchedRecipients}>
              {toSave.length?`Save ${toSave.length} matched ID(s)`:"Nothing new to save"}</button>
            <button className="btn ghost" disabled={recBusy} onClick={()=>setRecSync(null)}>Dismiss</button>
            <span className="muted" style={{fontSize:12}}>Unmatched recipients are left untouched — set the Wise recipient on the contractor's profile.</span>
          </div>
        </div>);})()}
      <Banner msg={msg} style={{marginTop:10}} />
      </div>
    </div>
  );
}

function WisePayouts({client,companyId,consolidated,presetPeriodId,confirmBillingDirty,openContractor,apiPayoutsEnabled,toggleApiPayouts}){
  const gate = (label)=> typeof confirmBillingDirty==="function" ? confirmBillingDirty(label) : true;
  const [periods,setPeriods]=useState([]);
  const [periodId,setPeriodId]=useState("");
  const [rows,setRows]=useState(null);     // editable per-contractor rows
  const [busy,setBusy]=useState(false);
  const [armed,setArmed]=useState(false);
  const [msg,setMsg]=useState("");
  const [batchId,setBatchId]=useState(null);
  // (Pull-recipients-from-Wise moved to the Contractors tab — see the
  //  PullRecipients component.)

  useEffect(()=>{
    if(!client||!companyId){setPeriods([]);return;}
    client.from("pay_periods").select("id,period_start,period_end,state")
      .eq("company_id",companyId).in("state",["locked","paid"])
      .order("period_start",{ascending:false})
      .then(({data})=>setPeriods(data||[]));
  },[client,companyId]);

  // when embedded in Process Payroll with a chosen period, auto-load it
  useEffect(()=>{ if(presetPeriodId && presetPeriodId!==periodId) loadBatch(presetPeriodId);
    /* eslint-disable-next-line */ },[presetPeriodId]);

  async function loadBatch(pid){
    setPeriodId(pid);setRows(null);setMsg("");setArmed(false);setBatchId(null);
    if(!pid)return;
    const {data,error}=await client.from("payments")
      .select("id,worker_id,net_php,payout_amount,wise_transfer_id,fx_rate,status,payout_method,funded_at,funded_by,fund_error,"+
              "workers(first_name,middle_name,last_name,wise_recipient_id,wise_recipient_uuid,wise_recipients,payout_method)")
      .eq("pay_period_id",pid);
    if(error){setMsg(error.message);return;}
    setRows((data||[])
      // Filter on the PAYMENT row's snapshot of payout_method (frozen at lock
      // time), not the worker's current value. If a contractor's profile method
      // changes after lock, the locked statement is still the source of truth —
      // this is what the Pay list does and the API draft must match it,
      // otherwise contractors silently disappear from one view but not the other.
      .filter(p=>(p.payout_method||p.workers?.payout_method)==="wise")
      .map(p=>{
        const list=Array.isArray(p.workers?.wise_recipients)?p.workers.wise_recipients:[];
        const def=p.workers?.wise_recipient_id||list[0]?.id||null;  // last-used default
        return {
          payment_id:p.id,                                // needed by the fund action
          worker_id:p.worker_id,
          name:fullName(p.workers),
          amount:Number(p.net_php||p.payout_amount||0),  // editable
          recipients:list,
          recipient_id:def,                               // editable; defaults to last-used
          recipient_uuid:p.workers?.wise_recipient_uuid||"",  // Wisetag/contact rows have only a UUID
          // include: by default true for unfunded drafts and untouched rows.
          // We don't auto-select rows that are already funded — they're done.
          include:!!def && !p.wise_transfer_id,
          transfer_id:p.wise_transfer_id, status:p.status,
          funded_at:p.funded_at||null,
          fund_error:p.fund_error||null,
        };
      })
      // only contractors who actually have a Wise recipient on file
      .filter(r=>r.recipient_id));
  }

  function setRow(wid,patch){ setRows(prev=>prev.map(r=>r.worker_id===wid?{...r,...patch}:r)); }
  function setAll(include){ setRows(prev=>prev.map(r=>r.transfer_id?r:{...r,include})); }

  const selected=(rows||[]).filter(r=>r.include && r.recipient_id && r.amount>0 && !r.transfer_id);
  const total=selected.reduce((s,r)=>s+r.amount,0);

  // Drafted-but-not-yet-funded rows. Surfaced when companies.api_payouts_enabled
  // is true so the user can fund them via the API path (real money). Excludes
  // rows with a Wisetag-only / missing-numeric-id since the existing draft
  // path rejects those (manual CSV handles them instead).
  const drafted=(rows||[]).filter(r=>r.transfer_id && !r.funded_at);
  const draftedTotal=drafted.reduce((s,r)=>s+r.amount,0);

  // Per-row fund: hits the edge function for one transfer, updates the local
  // row state with the outcome, surfaces error inline. Returns {ok, error}.
  const [fundBusyId,setFundBusyId]=useState(null);  // payment_id or "__bulk__" while in flight
  async function fundOne(row, actor){
    if(!row?.transfer_id){ return { ok:false, error:"no transfer_id" }; }
    if(row.funded_at){ return { ok:true, already_funded:true }; }
    setFundBusyId(row.payment_id || row.worker_id);
    try{
      const { data, error }=await client.functions.invoke("wise-payouts",{
        body:{
          action:"fund",
          transfer_id: row.transfer_id,
          payment_id:  row.payment_id || null,
          actor:       actor || null,
        }});
      if(error) throw new Error(error.message||"Edge function error");
      if(data && data.ok===false){
        const errMsg=data.error||"Wise fund failed";
        setRow(row.worker_id, { fund_error: errMsg });
        logEvent(client,{ company_id:companyId, action:"api_payout",
          entity:`${row.name} · transfer ${row.transfer_id}`,
          detail:{ outcome:"failed", amount_php:row.amount, transfer_id:String(row.transfer_id),
                   error:errMsg, http_status:data.http_status||null } });
        return { ok:false, error:errMsg };
      }
      // success path
      const fundedAt=data?.funded_at||new Date().toISOString();
      setRow(row.worker_id, { funded_at:fundedAt, fund_error:null });
      logEvent(client,{ company_id:companyId, action:"api_payout",
        entity:`${row.name} · transfer ${row.transfer_id}`,
        detail:{ outcome:data?.already_funded?"already_funded":"funded",
                 amount_php:row.amount, transfer_id:String(row.transfer_id),
                 wise_status:data?.wise_status||null, funded_at:fundedAt } });
      return { ok:true, funded_at:fundedAt };
    }catch(ex){
      const errMsg=String(ex.message||ex);
      setRow(row.worker_id, { fund_error: errMsg });
      logEvent(client,{ company_id:companyId, action:"api_payout",
        entity:`${row.name} · transfer ${row.transfer_id}`,
        detail:{ outcome:"failed", amount_php:row.amount, transfer_id:String(row.transfer_id),
                 error:errMsg } });
      return { ok:false, error:errMsg };
    }finally{
      setFundBusyId(null);
    }
  }

  // Bulk fund all drafted-but-unfunded rows. Per-row outcomes; doesn't stop
  // on first failure (other rows may still succeed). Requires a typed-amount
  // confirmation since this moves real money.
  async function fundDrafted(){
    if(!drafted.length){ setMsg("Nothing drafted to fund."); return; }
    if(!(await gate("Fund drafted Wise transfers (real money)"))) return;
    const totalStr=money(draftedTotal,"PHP");
    const sample=drafted.slice(0,8).map(r=>`• ${r.name} — ${money(r.amount,"PHP")}`).join("\n");
    const more=drafted.length>8?`\n…and ${drafted.length-8} more`:"";
    const ok=window.confirm(
      `⚠ REAL MONEY: about to fund ${drafted.length} drafted Wise transfer(s):\n\n`+
      sample+more+
      `\n\nTotal: ${totalStr}\n\nThis calls Wise's funding endpoint and moves money out of your business Wise balance. The action is per-row idempotent (refuses to refund a row already funded) and each outcome is logged to the audit log.\n\nProceed?`
    );
    if(!ok) return;
    setFundBusyId("__bulk__"); setBusy(true); setMsg("");
    let funded=0, alreadyFunded=0, failed=0;
    const actor=null;  // future: pull from auth.user.email if available
    for(const r of drafted){
      const res=await fundOne(r, actor);
      if(res.ok){ if(res.already_funded) alreadyFunded++; else funded++; }
      else failed++;
    }
    setFundBusyId(null); setBusy(false);
    setMsg(`Funded ${funded} transfer(s)`+
      (alreadyFunded?`; ${alreadyFunded} already funded`:"")+
      (failed?`; ${failed} failed — see per-row error pills`:"")+`. Total intended: ${totalStr}.`);
    // refresh from DB to pull canonical funded_at / fund_error values
    loadBatch(periodId);
  }

  async function createBatch(){
    if(!(await gate("Create Wise batch (API draft)"))) return;
    setArmed(false);setBusy(true);setMsg("");
    try{
      const {data,error}=await client.functions.invoke("wise-payouts",{
        body:{action:"batch",
          name:`Payroll ${periods.find(p=>p.id===periodId)?.period_end||""}`,
          items:selected.map(r=>({worker_id:r.worker_id,recipient_id:r.recipient_id,amount_php:r.amount}))}});
      if(error)throw new Error(error.message||"Edge function error");
      if(data&&data.error)throw new Error(data.error);
      // Apply the post-batch DB writes concurrently (was 2 sequential writes per
      // transfer). Still plain UPDATEs (rows already exist) — not upsert, to avoid
      // a NOT-NULL insert-candidate on a partial payment row. ok/fail counts match
      // the prior semantics (ok = transfers created).
      const succ=(data.results||[]).filter(r=>r.transfer_id);
      const ok=succ.length;
      // C5 — Wisetag/Wise-balance recipients can't be API-drafted; surface them
      // separately so they're not lumped into a generic "failed" count (the user
      // pays those via the Manual Wise batch CSV instead).
      const wisetagRows=(data.results||[]).filter(r=>r.status==="wisetag_unsupported");
      const fail=(data.results||[]).length-ok-wisetagRows.length;
      const CH=8;
      for(let i=0;i<succ.length;i+=CH){
        await Promise.all(succ.slice(i,i+CH).map(r=>client.from("payments").update({
          wise_transfer_id:String(r.transfer_id), fx_rate:r.fx_rate, status:"queued"})
          .eq("pay_period_id",periodId).eq("worker_id",r.worker_id)));
      }
      // remember last-used recipient per worker (dedup → one write each)
      const recById=new Map();
      for(const r of succ){ const row=selected.find(s=>s.worker_id===r.worker_id); if(row) recById.set(r.worker_id,row.recipient_id); }
      const recEntries=[...recById.entries()];
      for(let i=0;i<recEntries.length;i+=CH){
        await Promise.all(recEntries.slice(i,i+CH).map(([wid,rid])=>client.from("workers").update({wise_recipient_id:rid}).eq("id",wid)));
      }
      const wisetag=wisetagRows.map(res=>{ const row=selected.find(r=>r.worker_id===res.worker_id); return row?row.name:String(res.worker_id).slice(0,8); });
      const wisetagNote=wisetag.length
        ? ` ${wisetag.length} Wisetag contractor(s) skipped — pay via Manual CSV: ${wisetag.join(", ")}.`
        : "";
      setBatchId(data.batch_group_id);
      setMsg(`Created Wise batch with ${ok} transfer(s)${fail?`, ${fail} failed`:""}.`+wisetagNote+
        ` Batch group id: ${data.batch_group_id}. NO money has moved — open Wise to review, complete, and FUND this batch.`);
      loadBatch(periodId);
    }catch(ex){
      setMsg("Wise batch failed: "+ex.message+
        " — check the wise-payouts function is deployed and WISE_API_TOKEN is set.");
    }finally{ setBusy(false); }
  }

  return (
    <div className="card" style={{borderColor:"#cdb"}}>
      <h2>Wise payouts <span className="pill" style={{background:"#fef3c7",color:"var(--warn)",fontSize:10}}>drafts only · no money moves</span></h2>
      <p className="sub">For a locked period: review each Wise contractor, adjust recipient or amount,
        include/exclude as needed, then create them as <b>one Wise batch</b>. This records the locked FX
        and transfer IDs but <b>does not send money</b> — you complete and fund the batch in Wise yourself.</p>
      {consolidated && <div className="banner">Pick a single company.</div>}

      {/* Pull recipients from Wise moved to the Contractors tab. */}

      {!presetPeriodId &&
      <div className="row" style={{alignItems:"flex-end"}}>
        <div className="field"><label>Locked pay period</label>
          <select value={periodId} onChange={e=>loadBatch(e.target.value)}>
            <option value="">Select…</option>
            {periods.map(p=><option key={p.id} value={p.id}>{p.period_start} → {p.period_end} ({p.state})</option>)}
          </select></div>
      </div>}

      {rows && (rows.length===0
        ? <div className="empty">No Wise contractors with a saved recipient in this period.
            Set a Wise recipient on a contractor's profile to include them here.</div>
        : (()=>{ const selectable=rows.filter(r=>!r.transfer_id);
                 const allOn=selectable.length>0 && selectable.every(r=>r.include);
          return <div>
          <p className="sub" style={{marginTop:8}}>{selected.length} selected · total to batch <b>{money(total,"PHP")}</b></p>
          <div className="table-scroll"><table>
            <thead><tr>
              <th><label style={{display:"inline-flex",gap:4,alignItems:"center",fontWeight:600}}>
                <input type="checkbox" checked={allOn}
                  onChange={e=>setAll(e.target.checked)} disabled={!selectable.length}/> All</label></th>
              <th>Contractor</th><th>Amount ₱</th><th>Wise recipient</th><th>Status</th></tr></thead>
            <tbody>
              {rows.map(r=>(
                <tr key={r.worker_id} style={r.transfer_id?{opacity:.6}:{}}>
                  <td className="card-action"><input type="checkbox" checked={r.include&&!r.transfer_id} disabled={r.transfer_id}
                    onChange={e=>setRow(r.worker_id,{include:e.target.checked})}/></td>
                  <td className="card-title"><b>{r.name}</b></td>
                  <td data-label="Amount ₱"><input type="number" step="0.01" value={r.amount} disabled={r.transfer_id}
                    onChange={e=>setRow(r.worker_id,{amount:parseFloat(e.target.value)||0})}
                    style={{width:100,padding:"3px 6px",fontSize:13}}/></td>
                  <td data-label="Wise recipient">
                    {r.transfer_id
                      ? <span className="muted">#{r.recipient_id}</span>
                      : r.recipients.length
                        ? <select value={r.recipient_id||""} onChange={e=>setRow(r.worker_id,{recipient_id:Number(e.target.value)})}
                            style={{padding:"3px 6px",fontSize:13}}>
                            {r.recipients.map(rec=><option key={rec.id} value={rec.id}>{rec.label} (#{rec.id})</option>)}
                          </select>
                        : r.recipient_uuid
                          ? <span className="tip-wrap muted" tabIndex={0} style={{fontStyle:"italic",cursor:"help"}}>
                              Wisetag — use Manual CSV
                              <span className="tip-body">Paid via Wise Tag (contact recipient). The Wise API draft path requires a bank-account recipient — include this contractor in the Manual Wise batch CSV instead (uses the stored UUID).</span>
                            </span>
                          : (openContractor
                              ? <button type="button"
                                  onClick={()=>openContractor(r.worker_id)}
                                  title="Open this contractor's profile to add a Wise recipient"
                                  style={{background:"none",border:"none",padding:0,margin:0,
                                    color:"var(--warn)",textDecoration:"underline",cursor:"pointer",font:"inherit"}}>
                                  add recipient on profile
                                </button>
                              : <span style={{color:"var(--warn)"}}>add recipient on profile</span>)}
                  </td>
                  <td className="card-action" style={{whiteSpace:"nowrap"}}>
                    {r.funded_at
                      ? <span className="pill" style={{background:"#dcfce7",color:"#166534"}}
                          title={`Funded ${new Date(r.funded_at).toLocaleString()} — money out of your Wise balance.`}>
                          ✓ funded
                        </span>
                      : r.transfer_id
                        ? <span style={{display:"inline-flex",gap:4,alignItems:"center",flexWrap:"wrap"}}>
                            <span className="pill active">drafted</span>
                            {apiPayoutsEnabled && (
                              fundBusyId===(r.payment_id||r.worker_id)
                                ? <span className="muted" style={{fontSize:11}}>funding…</span>
                                : <button className="btn ghost sm" disabled={!!fundBusyId}
                                    title={`Fund this single transfer (${money(r.amount,"PHP")}) via Wise API. Real money will move.`}
                                    onClick={async ()=>{
                                      if(!(await gate("Fund this Wise transfer (real money)"))) return;
                                      if(!window.confirm(`Fund ${r.name} for ${money(r.amount,"PHP")} via Wise API?\n\nThis moves real money out of your Wise balance.`)) return;
                                      await fundOne(r, null);
                                    }}>
                                    Fund
                                  </button>
                            )}
                            {r.fund_error && (
                              <span className="tip-wrap" tabIndex={0}
                                style={{fontSize:10,verticalAlign:"middle",cursor:"help"}}>
                                <span className="pill" style={{background:"#fef2f2",color:"#b91c1c"}}>
                                  fund failed
                                </span>
                                <span className="tip-body">{`Last Wise fund attempt failed:\n${r.fund_error}\n\nClick Fund to retry.`}</span>
                              </span>
                            )}
                          </span>
                        : <span className="pill" style={{background:"#f3f4f6",color:"var(--muted)"}}>{r.status||"ready"}</span>}
                  </td>
                </tr>
              ))}
            </tbody>
          </table></div>
          <div style={{marginTop:12,display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
            {selected.length===0
              ? <span className="muted">Nothing selected to batch.</span>
              : armed
                ? <span style={{display:"inline-flex",gap:8,alignItems:"center"}}>
                    <span style={{fontSize:13}}>Create a Wise batch of {selected.length} transfer(s), {money(total,"PHP")}? (no money moves)</span>
                    <button className="btn" disabled={busy} onClick={createBatch}>Confirm batch</button>
                    <button className="btn ghost" onClick={()=>setArmed(false)}>Cancel</button>
                  </span>
                : <button className="btn" disabled={busy} onClick={()=>setArmed(true)}>
                    Create Wise batch ({selected.length})</button>}
            {/* Bulk Fund — only when api_payouts_enabled is on for this company AND
                there's at least one drafted-but-unfunded row to fund. Separate
                from Create Wise batch because the existing batch action stops
                at draft (the safer default); funding is a real-money step that
                deserves its own button and its own confirmation. */}
            {apiPayoutsEnabled && drafted.length>0 && (
              <button className="btn" disabled={busy||fundBusyId==="__bulk__"}
                onClick={fundDrafted}
                title={`Call Wise's funding endpoint for every drafted transfer (${money(draftedTotal,"PHP")}). REAL MONEY moves.`}
                style={{background:"#166534",color:"#fff",borderColor:"#166534"}}>
                {fundBusyId==="__bulk__" ? `Funding…` : `Fund ${drafted.length} drafted (${money(draftedTotal,"PHP")})`}
              </button>
            )}
            {toggleApiPayouts && !consolidated && companyId && (
              <span style={{fontSize:11,display:"inline-flex",gap:6,alignItems:"center",marginLeft:"auto"}}>
                API payouts {apiPayoutsEnabled
                  ? <b style={{color:"#166534"}}>ENABLED</b>
                  : <b className="muted">off</b>}
                <button className="btn ghost sm" style={{fontSize:11,padding:"2px 8px",
                  ...(apiPayoutsEnabled?{borderColor:"#b91c1c",color:"#b91c1c"}:{})}}
                  onClick={async ()=>{ const r=await toggleApiPayouts(!apiPayoutsEnabled); if(r) setMsg(r); }}>
                  {apiPayoutsEnabled?"Disable…":"Enable API payouts…"}
                </button>
              </span>
            )}
          </div>
        </div>; })())}
      <Banner msg={msg} style={{marginTop:12}} />
    </div>
  );
}

// ============================ PROCESS PAYROLL ================================
// Everything you do AFTER locking a period: download a manual Wise batch file,
// download individual payment files, or use the automatic Wise API draft.
function downloadCSV(filename, rowsOfArrays){
  const esc=v=>{ const s=v==null?"":String(v); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; };
  const text=rowsOfArrays.map(r=>r.map(esc).join(",")).join("\r\n");
  const blob=new Blob([text],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

// Reconciliation overview (Review & Recon tab): lists EVERY locked/paid period
// with its Wise reconcile status and a one-click "reconcile all pending".
// "Reconcile" here = finalize confirmed payments to status 'reconciled' and tag
// the period "Paid · Wise OK". A payment is reconcilable when it is 'sent', has a
// paid_at, and is either NON-Wise (nothing to match) or Wise WITH a matched
// transfer id. Genuinely-unmatched Wise rows (sent, wise, no transfer) are left
// 'sent' and flagged so they can be matched per-period. Status-only, reversible,
// no money moves. company-scoped; the bulk action requires a single company.
function ReconcileOverview({ client, companyId, consolidated, onPick }){
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState("");
  const {data,loading,reload}=useQuery(client,c=>{
    let q=c.from("payments").select("net_php,status,payout_method,wise_transfer_id,paid_at,pay_periods(id,period_start,period_end,state)");
    if(!consolidated&&companyId)q=q.eq("company_id",companyId);
    return q;
  },[client,companyId,consolidated]);
  const pays=data||[];
  const byP={};
  pays.forEach(p=>{ const pp=p.pay_periods; if(!pp) return;
    const g=byP[pp.id]||(byP[pp.id]={id:pp.id,start:pp.period_start,end:pp.period_end,state:pp.state,
      total:0,reconciled:0,readySent:0,unmatchedWise:0,drafts:0,net:0});
    g.total++; g.net+=Number(p.net_php||0);
    if(p.status==="reconciled") g.reconciled++;
    else if(p.status==="draft"||p.status==="queued") g.drafts++;
    else if(p.status==="sent"){
      const ready = p.paid_at && (p.payout_method!=="wise" || p.wise_transfer_id);
      if(ready) g.readySent++; else g.unmatchedWise++;
    }
  });
  const periods=Object.values(byP).sort((a,b)=>String(b.start).localeCompare(String(a.start)));
  const totalReadySent=periods.reduce((s,p)=>s+p.readySent,0);
  const pendingPeriods=periods.filter(p=>p.readySent>0).length;

  async function reconcileAll(){
    if(!totalReadySent){ setMsg("Nothing pending — every confirmed payment is already reconciled."); return; }
    const ok=await confirmDanger({
      title:`Reconcile ${totalReadySent} payment(s)?`,
      message:`Finalize ${totalReadySent} confirmed payment(s) across ${pendingPeriods} period(s) as reconciled and tag them "Paid · Wise OK".`,
      consequence:"Status-only — no money moves, and it's reversible by re-polling. Wise payments with NO matched transfer are left as 'sent' (flagged) for you to match per-period first.",
      confirmLabel:"Reconcile all pending",
    });
    if(!ok) return;
    setBusy(true); setMsg("");
    try{
      let q=client.from("payments").update({status:"reconciled"});
      if(!consolidated&&companyId) q=q.eq("company_id",companyId);
      // null payout_method counts as non-Wise (paid, nothing to match) — matches the JS readySent counter.
      q=q.eq("status","sent").not("paid_at","is",null).or("payout_method.is.null,payout_method.neq.wise,wise_transfer_id.not.is.null").select("id");
      const {data:upd,error}=await q;
      if(error) throw new Error(error.message);
      logEvent(client,{ company_id:companyId, action:"wise_recipient_sync",
        detail:{ kind:"reconcile_all", reconciled:(upd||[]).length, periods:pendingPeriods } });
      setMsg(`Reconciled ${(upd||[]).length} payment(s) — now tagged Paid · Wise OK.`);
      reload();
    }catch(ex){ setMsg("Reconcile-all failed: "+(ex.message||ex)); }
    finally{ setBusy(false); }
  }

  return (
    <div className="card no-print" style={{marginTop:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,flexWrap:"wrap"}}>
        <div><b>Reconciliation overview</b>
          <div className="sub" style={{margin:"2px 0 0"}}>Every locked/paid period and its Wise reconcile status.</div></div>
        {consolidated
          ? <span className="muted" style={{fontSize:12}}>Pick a single company to reconcile</span>
          : <button className="btn" disabled={busy||loading||!totalReadySent} onClick={reconcileAll}>
              {busy?"Reconciling…":`Reconcile all pending (${totalReadySent})`}</button>}
      </div>
      {msg && <div style={{marginTop:8}}><Banner msg={msg}/></div>}
      {loading?<Skeleton rows={4}/>:periods.length===0?<div className="empty">No locked or paid periods yet.</div>:
      <div className="table-scroll" style={{marginTop:8}}><table>
        <thead><tr><th>Period</th><th>Contractors</th><th>Reconcile status</th><th></th></tr></thead>
        <tbody>
          {periods.map(p=>{
            const done = p.total>0 && p.reconciled===p.total;
            return (
              <tr key={p.id}>
                <td className="card-title"><b>{p.start} → {p.end}</b> <span className="muted">{p.state}</span></td>
                <td data-label="Contractors">{p.total}</td>
                <td data-label="Reconcile status" style={{display:"flex",flexWrap:"wrap",gap:4}}>
                  {done
                    ? <span className="pill active" title="All payments reconciled against Wise">✓ Paid · Wise OK</span>
                    : <>
                        {p.readySent>0 && <span className="pill warn" title="Confirmed payments ready to finalize">{p.readySent} to reconcile</span>}
                        {p.unmatchedWise>0 && <span className="pill bad" title="Wise payment with no matched transfer — match it per-period first">{p.unmatchedWise} unmatched</span>}
                        {p.reconciled>0 && <span className="pill active">{p.reconciled} ok</span>}
                        {p.drafts>0 && <span className="pill" title="Not yet paid — handle in Process & Pay">{p.drafts} draft</span>}
                      </>}
                </td>
                <td className="card-action" style={{textAlign:"right"}}>
                  <button className="btn ghost sm" onClick={()=>onPick&&onPick(p.id)}>Open</button></td>
              </tr>
            );
          })}
        </tbody>
      </table></div>}
      <p className="muted" style={{fontSize:11,marginTop:6}}>
        “Reconcile all pending” finalizes confirmed payments (non-Wise, or Wise with a matched transfer).
        For <b>unmatched</b> Wise rows, Open the period and run its per-period Reconcile to link the transfer first.</p>
    </div>
  );
}

function ProcessPayroll({client,companyId,consolidated,active,confirmBillingDirty,openContractor,reconcileOnly,goTab,openPeriodForEdit,apiPayoutsEnabled,toggleApiPayouts}){
  const gate = (label)=> typeof confirmBillingDirty==="function" ? confirmBillingDirty(label) : true;
  const [periods,setPeriods]=useState([]);
  const [periodId,setPeriodId]=useState("");
  const [pers,setPers]=useState(null);   // {start,end,pay_date}
  const [rows,setRows]=useState(null);
  const [msg,setMsg]=useState("");
  // When a period is opened, scroll its detail into view; a floating "↑ Top"
  // button returns to the period list.
  const detailRef=React.useRef(null);
  useEffect(()=>{ if(!periodId) return; const t=setTimeout(()=>{ if(detailRef.current) detailRef.current.scrollIntoView({behavior:"smooth",block:"start"}); }, 80); return ()=>clearTimeout(t); },[periodId]);
  // Undo: { label, fn } — status only, never touches money. Stays until dismissed.
  const [undo,setUndo]=useState(null);
  // Wise batch currencies — default USD source -> PHP target; user can change.
  const [srcCcy,setSrcCcy]=useState("USD");
  const [tgtCcy,setTgtCcy]=useState("PHP");
  // Which payment-channel tab is active on the Pay list: 'wise' | 'bpi' | 'all'.
  // Default reaches for the channel with the most rows so the most useful view
  // is shown first; 'all' is the consolidated fallback.
  const [payTab,setPayTab]=useState("wise");
  const [wiseDialog,setWiseDialog]=useState(false);   // step-by-step Wise API payout dialog
  async function runUndo(){
    if(!undo)return;
    const fn=undo.fn; setUndo(null); setBusy(true); setMsg("");
    try{ await fn(); load(periodId); }
    catch(ex){ setMsg("Undo failed: "+(ex.message||ex)); }
    finally{ setBusy(false); }
  }

  // Period-level UNLOCK from Process & Pay — flip pay_periods.state back to
  // 'open' so it returns to the Calculate tab as an editable draft. Refuses a
  // 'paid' period (mark unpaid first), warns if any rows are already sent/locked
  // in Wise (recalculating can drift from what was actually paid), and records a
  // reason in the audit log.
  async function unlockPeriod(p){
    if(!p) return;
    if(!(await gate("Unlock period"))) return;
    if(p.state==="paid"){
      setMsg("This period is PAID — use “Mark all unpaid” below first, then unlock."); return; }
    const {data:pays}=await client.from("payments")
      .select("status,paid_at,wise_locked_at").eq("pay_period_id",p.id);
    const started=(pays||[]).filter(r=> r.paid_at || r.wise_locked_at || (r.status && r.status!=="draft"));
    if(started.length && !(await confirmDanger({
      title:"Unlock a period with sent/paid payments?",
      message:`${started.length} payment(s) in this period are already sent / paid / locked in Wise.`,
      consequence:"Unlocking returns it to Calculate for editing. Recalculating there REBUILDS amounts from hours and can drift from what was actually paid — sent Wise transfers are NOT reversed.",
      confirmWord:"UNLOCK", confirmLabel:"Unlock for editing",
    }))) return;
    const reason=window.prompt(
      "Unlock this pay period for editing?\n\n"+
      `Period: ${p.period_start} → ${p.period_end}\n\n`+
      "It returns to the Calculate tab as a draft (recalculate / edit, then re-lock).\n\n"+
      "Enter a reason (recorded in the audit log):");
    if(reason==null) return;
    if(!reason.trim()){ setMsg("Unlock requires a reason."); return; }
    setBusy(true); setMsg("");
    try{
      const {error}=await client.from("pay_periods").update({state:"open",locked_at:null}).eq("id",p.id);
      if(error) throw new Error(error.message);
      logEvent(client,{company_id:companyId,action:"unlock_period",
        entity:`${p.period_start} → ${p.period_end}`,
        detail:{reason,previous_state:p.state,from:"process_and_pay"}});
      setPeriods(prev=>prev.filter(x=>x.id!==p.id));   // no longer locked/paid
      if(periodId===p.id){ setPeriodId(""); setPers(null); setRows(null); }
      // Jump straight to Calculate with this batch loaded for editing.
      if(typeof openPeriodForEdit==="function"){
