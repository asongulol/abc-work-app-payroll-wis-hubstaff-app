<style>
  :root{ --bg:#f6f7f9; --card:#fff; --line:#e3e6ec; --text:#1a1d21; --muted:#6b7280;
         --accent:#1F3A68; --accent-soft:#eaf0fb; --gold:#D4A24C; --good:#0a7d3c; --warn:#b45309; --radius:12px; }
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg); color:var(--text); -webkit-text-size-adjust:100%;}
  .wrap{max-width:560px; margin:0 auto; padding:14px 14px 80px;}
  .top{position:sticky; top:0; background:var(--accent); color:#fff; padding:14px 16px;
       display:flex; align-items:center; justify-content:space-between; z-index:5;}
  .top b{font-size:16px} .top small{display:block; opacity:.85; font-weight:400; font-size:12px}
  .btn{background:var(--accent); color:#fff; border:0; border-radius:10px; padding:10px 14px;
       font-size:15px; font-weight:600; cursor:pointer;}
  .btn:disabled{opacity:.5}
  .btn.ghost{background:transparent; color:#fff; border:1px solid rgba(255,255,255,.5);}
  .btn.link{background:transparent; color:var(--accent); padding:6px; font-weight:600;}
  .ptabs{display:flex; gap:6px; border-bottom:1px solid var(--line); margin:6px 0 12px;}
  .ptabs button{flex:1; background:none; border:0; border-bottom:2px solid transparent;
       padding:9px 4px; font-size:14px; font-weight:600; color:var(--muted); cursor:pointer;}
  .ptabs button.on{color:var(--accent); border-bottom-color:var(--accent);}
  /* ---- onboarding flow (M2) ---- */
  .ob-wrap{padding-bottom:24px;}
  .ob-progress{margin:8px 0 14px;}
  .ob-bar{height:8px; background:var(--line); border-radius:999px; overflow:hidden; margin-top:6px;}
  .ob-bar-fill{height:100%; background:var(--accent); transition:width .3s;}
  .ob-agr{display:flex; align-items:center; gap:10px; padding:12px 0; border-top:1px solid var(--line);}
  .ob-agr.locked{opacity:.5;}
  .ob-check{color:#16a34a; font-weight:800; font-size:18px;}
  .ob-lock{font-size:16px;}
  .ob-modal-bg{position:fixed; inset:0; background:rgba(0,0,0,.5); display:flex; align-items:flex-end; justify-content:center; z-index:50;}
  .ob-modal{background:#fff; width:100%; max-width:560px; max-height:92vh; border-radius:16px 16px 0 0; display:flex; flex-direction:column; overflow:hidden;}
  .ob-modal-head{display:flex; justify-content:space-between; align-items:center; padding:14px; border-bottom:1px solid var(--line);}
  .ob-doc{overflow-y:auto; padding:14px; flex:1; min-height:160px; background:#fafafa;}
  .ob-scrollhint{padding:8px 14px; font-size:13px; color:#92400e; background:#fef3c7;}
  .ob-scrollhint.ok{background:#dcfce7; color:#166534;}
  .ob-sign{padding:14px; border-top:1px solid var(--line);}
  .ob-canvas{border:1px dashed var(--line); border-radius:8px; width:100%; height:120px; touch-action:none; background:#fff;}
  .ob-consent{display:flex; gap:8px; align-items:flex-start; font-size:13px; margin:10px 0;}
  .ob-consent input{width:auto; margin-top:2px;}
  .ob-toggle{flex:1; padding:8px;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
        padding:14px; margin:12px 0;}
  .sub{color:var(--muted); font-size:13px; margin:2px 0;}
  input,select{width:100%; padding:12px; font-size:16px; border:1px solid var(--line); border-radius:10px; margin:6px 0; background:#fff;}
  .pill{display:inline-block; padding:2px 8px; border-radius:999px; font-size:11px; font-weight:600;}
  .pill.paid{background:#dcfce7; color:#166534;} .pill.pending{background:#fef3c7; color:#92400e;}
  .net{font-size:28px; font-weight:800; color:var(--accent);}
  .row{display:flex; justify-content:space-between; gap:10px; padding:4px 0; font-size:14px;}
  .row .k{color:var(--muted);}
  .tabs{position:fixed; bottom:0; left:0; right:0; display:flex; background:#fff; border-top:1px solid var(--line);}
  .tabs button{flex:1; background:none; border:0; padding:10px 4px 12px; font-size:12px; color:var(--muted); cursor:pointer;}
  .tabs button.on{color:var(--accent); font-weight:700;}
  .tabs .ic{display:block; font-size:18px; line-height:1.4;}
  .err{background:#fef2f2; border:1px solid #fecaca; color:#991b1b; border-radius:10px; padding:10px; font-size:14px; margin:8px 0;}
  .empty{color:var(--muted); text-align:center; padding:24px 8px;}
  h2{font-size:18px; margin:14px 2px 2px;}
  code{background:#f3f4f6; padding:1px 5px; border-radius:5px; font-size:13px;}
  /* ---- Home redesign: Skyline & Kumusta + Golden Hour (hybrid) ---- */
  .avatar{width:44px; height:44px; border-radius:50%; background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:16px; flex:0 0 auto; box-shadow:0 0 0 2px var(--gold);}
  .stickwrap{margin:20px 0 6px 4px;}
  .sticker{display:inline-flex; align-items:center; gap:6px; background:#fff; border:1px solid var(--line); border-radius:9px; padding:4px 10px; font-size:12px; font-weight:800; letter-spacing:.02em; color:var(--accent); box-shadow:0 2px 7px rgba(31,58,104,.14); transform:rotate(-2.5deg);}
  .nyhero{position:relative; overflow:hidden; color:#fff; border-radius:14px; padding:16px 16px 0; margin:12px 0; background:linear-gradient(180deg,#14213d,#1F3A68 62%,#24305a); transition:background 1.2s ease;}
  .nyhero .eyebrow{font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:rgba(255,255,255,.72); position:relative; z-index:3;}
  .nyhero .zones{display:flex; gap:8px; margin-top:10px; position:relative; z-index:3;}
  .nyhero .z{flex:1;} .nyhero .z .lbl{font-size:12px; color:rgba(255,255,255,.8);}
  .nyhero .z .t{font-size:22px; font-weight:800; line-height:1.15;} .nyhero .z .d{font-size:11px; color:rgba(255,255,255,.72);}
  .nyhero .vline{width:1px; background:rgba(255,255,255,.18);}
  .nyhero .ghr{height:1px; background:var(--gold); opacity:.85; margin:13px 0 9px; position:relative; z-index:3;}
  .nyhero .fact{font-size:13.5px; line-height:1.45; color:rgba(255,255,255,.92); position:relative; z-index:3; padding-bottom:64px;}
  .nyhero .fact b{color:var(--gold);}
  .nyhero .sky{position:absolute; left:0; right:0; bottom:0; width:100%; height:74px; display:block; z-index:1;}
  .nyhero .celestial{position:absolute; top:12px; right:14px; z-index:2;}
  .nyhero .win{animation:winOn .5s ease both;}
  @keyframes winOn{from{opacity:0} to{opacity:1}}
  /* Weather FX: a pure-CSS animated layer over the sky that matches NYC's current
     weather (set by NyPanel from open-meteo's weather_code). z-index 2 = behind the
     text content (z-3), in front of the skyline (z-1). Pointer-events off. */
  .nyhero .wxfx{position:absolute; inset:0; z-index:2; pointer-events:none; overflow:hidden; border-radius:14px;}
  .nyhero .wxfx::before,.nyhero .wxfx::after{content:""; position:absolute; inset:-25%;}
  /* clear — gentle warm sun glow, top-right (near the sun) */
  .wxfx-clear{background:radial-gradient(210px 155px at 86% 6%, rgba(244,201,93,.52), rgba(244,201,93,.16) 46%, transparent 72%); animation:wxGlow 3.6s ease-in-out infinite alternate;}
  @keyframes wxGlow{from{opacity:.55; transform:scale(1)} to{opacity:1; transform:scale(1.08)}}
  /* cloudy — soft drifting cloud blobs */
  .wxfx-cloudy::before{background:
      radial-gradient(88px 36px at 22% 26%, rgba(255,255,255,.44), transparent 70%),
      radial-gradient(112px 42px at 62% 16%, rgba(255,255,255,.34), transparent 70%),
      radial-gradient(72px 32px at 90% 32%, rgba(255,255,255,.36), transparent 70%);
    animation:wxDrift 16s linear infinite;}
  @keyframes wxDrift{from{transform:translateX(-14%)} to{transform:translateX(14%)}}
  /* fog — soft haze that gently breathes + drifts */
  .wxfx-fog{background:linear-gradient(180deg, rgba(220,225,235,.12), rgba(220,225,235,.38) 55%, rgba(220,225,235,.48)); animation:wxFog 6s ease-in-out infinite alternate;}
  @keyframes wxFog{from{opacity:.6; transform:translateX(-18px)} to{opacity:1; transform:translateX(18px)}}
  /* rain — diagonal falling streaks (shared by storm) */
  .wxfx-rain::before,.wxfx-storm::before{background-image:repeating-linear-gradient(108deg, transparent 0 5px, rgba(255,255,255,.4) 5px 7px); animation:wxRain .5s linear infinite;}
  @keyframes wxRain{from{transform:translate(0,0)} to{transform:translate(-20px,56px)}}
  /* snow — two layers of drifting dots at different speeds */
  .wxfx-snow::before{background-image:
      radial-gradient(3px 3px at 12% 18%, rgba(255,255,255,1), transparent),
      radial-gradient(2.5px 2.5px at 38% 38%, rgba(255,255,255,.9), transparent),
      radial-gradient(2.5px 2.5px at 58% 8%, rgba(255,255,255,.95), transparent),
      radial-gradient(3px 3px at 70% 12%, rgba(255,255,255,.95), transparent),
      radial-gradient(2.5px 2.5px at 88% 46%, rgba(255,255,255,.85), transparent);
    background-size:120px 120px; animation:wxSnow 5.5s linear infinite;}
  .wxfx-snow::after{background-image:
      radial-gradient(2px 2px at 28% 60%, rgba(255,255,255,.8), transparent),
      radial-gradient(2px 2px at 50% 86%, rgba(255,255,255,.72), transparent),
      radial-gradient(2.5px 2.5px at 60% 80%, rgba(255,255,255,.75), transparent),
      radial-gradient(2.5px 2.5px at 80% 66%, rgba(255,255,255,.8), transparent);
    background-size:160px 160px; animation:wxSnow 8.5s linear infinite;}
  @keyframes wxSnow{from{transform:translateY(-26%)} to{transform:translateY(30%)}}
  /* storm — rain (::before) + periodic lightning flash (::after) */
  .wxfx-storm::after{inset:0; background:rgba(255,255,255,.85); opacity:0; animation:wxFlash 5s linear infinite;}
  @keyframes wxFlash{0%,86%,100%{opacity:0} 87%{opacity:.78} 88.5%{opacity:.12} 90%{opacity:.7} 92%{opacity:0}}
  @media (prefers-reduced-motion: reduce){ .nyhero .wxfx, .nyhero .wxfx::before, .nyhero .wxfx::after{animation:none !important;} }
  .paycard{background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin:4px 0 12px; box-shadow:0 6px 20px rgba(31,58,104,.10);}
  .bigpay{font-size:27px; font-weight:800; color:var(--accent); line-height:1.1;}
  .obar{position:relative; height:8px; background:linear-gradient(90deg,#f0e6d2,#f6efe0); border-radius:999px; margin:10px 0 4px;}
  .obar > i{display:block; height:100%; background:linear-gradient(90deg,#e6b860,var(--gold)); border-radius:999px; transition:width .7s ease;}
  .obar .paysun{position:absolute; top:-7px; font-size:15px; transform:translateX(-50%);}
  .hair{height:1px; background:var(--line); margin:12px 0;}
  .annlist > .item{padding:10px 0; border-top:1px solid var(--line);} .annlist > .item:first-child{border-top:0;}
  .annlist .dot{color:var(--gold); font-weight:900; margin-right:4px;}
  .qgrid{display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px;}
  .qgrid a{display:flex; align-items:center; gap:10px; padding:11px 12px; border:1px solid var(--line); border-radius:10px; text-decoration:none; color:var(--text); background:#fff;}
  .qgrid .qico{width:24px; height:24px; display:flex; align-items:center; justify-content:center; font-size:20px;}
  /* ---- shared sub-page polish (Pay slips / Time / Docs / Profile) ---- */
  .pagehead{display:flex; align-items:center; gap:8px; margin:10px 2px 12px;}
  .summary{display:flex; gap:10px; margin:0 0 12px;}
  .summary .scell{flex:1; background:var(--accent-soft); border-radius:12px; padding:10px 12px;}
  .summary .scell .v{font-size:18px; font-weight:800; color:var(--accent); line-height:1.1;}
  .summary .scell .l{font-size:11px; color:var(--muted); margin-top:1px;}
  .chev{color:var(--muted); font-size:13px; font-weight:500;}
  .filedrop{display:block; border:1.5px dashed #cfd6e2; border-radius:12px; padding:18px 14px; text-align:center; color:var(--muted); background:#fbfcfe; cursor:pointer; font-size:14px;}
  .filedrop:hover{border-color:var(--gold); color:var(--text);}
  .filedrop input[type=file]{display:none;}
  .docrow{display:flex; align-items:center; gap:12px;}
  .docicon{width:40px; height:40px; border-radius:10px; background:var(--accent-soft); color:var(--accent); display:flex; align-items:center; justify-content:center; font-size:19px; flex:0 0 auto;}
  .ptabs button{transition:color .15s, border-color .15s;}
  @media (prefers-reduced-motion: reduce){ *{transition:none !important; animation:none !important;} }
  /* collapse toggle: only for the desktop sidebar — hidden on the mobile bottom
     bar (the desktop @media reveals it). */
  .portal-shell .nav-collapse{ display:none; }
  /* ===== Desktop layout (>=900px): full-width header on top + collapsible left
     sidebar + dashboard. ADDITIVE only — mobile (default rules above) is
     unchanged; everything is scoped to .portal-shell, so Login/Onboarding stay
     centered-narrow. The fixed bottom tab bar (.tabs) is restyled into the
     sidebar purely in CSS (fixed positioning ignores DOM order). ===== */
  @media (min-width:900px){
    .portal-shell{ --pnav-w:212px; }
    .portal-shell.nav-collapsed{ --pnav-w:62px; }
    /* header spans the FULL width, pinned on top */
    .portal-shell .top{ position:sticky; top:0; z-index:6; }
    /* sidebar sits BELOW the header (pinned via the header's measured height) */
    .portal-shell .tabs{
      top:var(--ptop-h,62px); bottom:0; left:0; right:auto; width:var(--pnav-w);
      flex-direction:column; align-items:stretch; justify-content:flex-start; gap:6px;
      border-top:0; border-right:1px solid var(--line);
      padding:14px 12px; z-index:5; overflow-x:hidden; overflow-y:auto;
      transition:width .15s ease;
    }
    /* flex:none so items keep their natural height and STACK at the top with even
       gaps (instead of growing to fill the column); left-aligned content. */
    .portal-shell .tabs button{
      flex:none; flex-direction:row; align-items:center; justify-content:flex-start;
      gap:12px; padding:10px 12px; border-radius:10px; font-size:14px; text-align:left;
      white-space:nowrap; overflow:hidden; min-height:0;
    }
    .portal-shell .tabs button:hover{ background:var(--bg); }
    .portal-shell .tabs button.on{ background:var(--accent-soft); color:var(--accent); font-weight:700; }
    /* fixed-width icon column so every label starts at the same x (aligned left) */
    .portal-shell .tabs .ic{ display:inline-flex; align-items:center; justify-content:center; width:24px; flex:0 0 24px; font-size:18px; line-height:1; }
    /* collapse toggle pinned to the sidebar bottom */
    .portal-shell .nav-collapse{ display:flex; margin-top:auto; color:var(--muted); }
    /* collapsed = icon rail: hide labels (font-size:0); icons keep their size */
    .portal-shell.nav-collapsed .tabs button{ justify-content:center; gap:0; padding:10px 0; font-size:0; }
    .portal-shell.nav-collapsed .tabs .ic{ font-size:19px; }
    /* header full width; content + footer offset right of the sidebar */
    /* Capped content width, CENTERED in the area beside the sidebar (never slides
       under it on narrow screens). --cw = the comfortable content width per view. */
    .portal-shell .wrap{ --cw:720px; max-width:var(--cw); margin-right:auto;
      margin-left:calc(var(--pnav-w) + max(0px, (100% - var(--pnav-w) - var(--cw))/2));
      padding:24px 28px 44px; transition:margin-left .15s ease; }
    .portal-shell .pbuild{ margin-left:var(--pnav-w); transition:margin-left .15s ease; }
    /* Home -> explicit 2-column dashboard grid (~1000px reads best for cards).
       Everything is full width by default (clock, greeting, hero, "Word from
       Your Mother", toolkit); only Next-pay and Activity sit side by side. */
    /* minmax(0,1fr) lets the columns shrink below their content's intrinsic width
       so the grid can NEVER force horizontal page scroll as the window narrows. */
    .portal-shell .wrap.home{ --cw:1000px; display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px 18px; align-items:start; }
    .portal-shell .wrap.home > *{ grid-column:1 / -1; min-width:0; }
    /* pay + activity: same row, EQUAL height (stretch the cell, let the card fill) */
    .portal-shell .wrap.home > .dash-pay{ grid-column:1; align-self:stretch; display:flex; flex-direction:column; min-width:0; }
    .portal-shell .wrap.home > .dash-act{ grid-column:2; align-self:stretch; display:flex; flex-direction:column; min-width:0; }
    .portal-shell .wrap.home > .dash-pay > .paycard,
    .portal-shell .wrap.home > .dash-act > .card{ flex:1; margin:0; }
    /* inside a dash cell the sticker's big top margin isn't needed (grid gap handles it) */
    .portal-shell .wrap.home .dash-cell > .stickwrap{ margin-top:0; }
  }
  /* Narrow desktop: when there isn't room for two columns beside an EXPANDED
     sidebar, stack the dashboard to one column so nothing needs horizontal
     scrolling. A collapsed sidebar has the room, so it keeps two columns. */
  @media (min-width:900px) and (max-width:1024px){
    .portal-shell:not(.nav-collapsed) .wrap.home{ grid-template-columns:1fr; }
    .portal-shell:not(.nav-collapsed) .wrap.home > .dash-pay,
    .portal-shell:not(.nav-collapsed) .wrap.home > .dash-act{ grid-column:1 / -1; align-self:auto; }
  }
</style>
</head>

function phoneCountry(code){ return PHONE_COUNTRIES.find(c=>c.code===code) || PHONE_COUNTRIES[0]; }
// Group national digits per country style (progressive, for live typing). US & PH
// use local grouping; every other country keeps raw digits (E.164 caps total at 15).
function groupNational(code, raw){
  if(code==="US" || code==="PH"){
    const d=String(raw||"").replace(/\D/g,"").slice(0,10);
    if(!d) return "";
    const a=d.slice(0,3), b=d.slice(3,6), c=d.slice(6,10);
    if(code==="PH") return [a,b,c].filter(Boolean).join("-");   // AAA-BBB-CCCC
    let out="("+a;                                              // US: (AAA) BBB-CCCC
    if(d.length>3) out+=") "+b;
    if(d.length>6) out+="-"+c;
    return out;
  }
  return String(raw||"").replace(/\D/g,"").slice(0,15);
}
function buildPhone(code, national){
  const g=groupNational(code, national);
  return g ? `${phoneCountry(code).cc} ${g}` : "";
}
// Parse a stored phone string into {code, national}. Detects PH/US local forms
// first (+63/+1, 63+10, 0+10, 1+10), then matches the longest dial-code prefix of
// any picker country; otherwise falls back to `def`.
function parsePhone(value, def){
  const s=String(value==null?"":value).trim();
  const digits=s.replace(/\D/g,"");
  if(!digits) return { code: def||"PH", national:"" };
  if(s.startsWith("+63") || (digits.startsWith("63") && digits.length===12)) return { code:"PH", national:digits.replace(/^63/,"").slice(0,10) };
  if(digits.startsWith("0") && digits.length===11)                           return { code:"PH", national:digits.slice(1,11) };
  if(s.startsWith("+1")  || (digits.startsWith("1") && digits.length===11))  return { code:"US", national:digits.replace(/^1/,"").slice(0,10) };
  if(s.startsWith("+")){                                       // any other "+CC …" value
    let best=null;
    for(const c of PHONE_COUNTRIES){
      const d=c.cc.replace(/\D/g,"");
      if(d && digits.startsWith(d) && (!best || d.length>best.len)) best={ code:c.code, len:d.length };
    }
    if(best) return { code:best.code, national: digits.slice(best.len).slice(0,15) };
  }
  return { code: def||"PH", national: digits.slice(-10) };
}
// Pretty-print any stored phone value (read-only display + on-save normalization).
// US → "+1 (AAA) BBB-CCCC", PH → "+63 AAA-BBB-CCCC", others → "+CC digits".
// Incomplete US/PH numbers are returned unchanged so a half-typed value is never mangled.
function formatPhone(raw){
  const s=(raw==null?"":String(raw)).trim();
  if(!s) return "";
  const { code, national }=parsePhone(s, null);
  if(!national) return s;
  if((code==="US"||code==="PH") && national.length!==10) return s;   // incomplete — leave as typed
  return buildPhone(code, national);
}
// True when `v` carries a complete number — US/PH need 10 national digits, other
// countries at least 6. Used by validation.
function phoneComplete(v){
  const { code, national }=parsePhone(v, "PH");
  return (code==="US"||code==="PH") ? national.length===10 : national.length>=6;
}

// Phone field with a country-code picker. Controlled by `value` (the full stored
// string e.g. "+63 917-123-4567"); emits the same canonical string via onChange.
// Live edits stay raw (no cursor jank); formats on blur and on country switch.
function PhoneInput({ value, onChange, defaultCountry="PH", style, inputStyle, placeholder, ...rest }){
  const p0=parsePhone(value, defaultCountry);
  const [country,setCountry]=useState(p0.code);
  const [nat,setNat]=useState(()=>groupNational(p0.code, p0.national));
  useEffect(()=>{
    const emitted=buildPhone(country, nat);
    if(String(value||"")!==emitted){ const p=parsePhone(value, defaultCountry); setCountry(p.code); setNat(groupNational(p.code, p.national)); }
  // eslint-disable-next-line
  },[value]);
  const emit=(code,text)=>onChange(buildPhone(code, text));
  return (
    <div style={{display:"flex",gap:6,width:"100%",...style}}>
      <select value={country} aria-label="Country code" style={{flex:"0 0 auto",width:96,padding:"0 4px"}}
        onChange={e=>{ const c=e.target.value; setCountry(c); setNat(n=>groupNational(c,n)); emit(c,nat); }}>
        {PHONE_COUNTRIES.map(c=><option key={c.code} value={c.code} title={c.name}>{c.flag} {c.cc} {c.name}</option>)}
      </select>
      <input type="tel" inputMode="tel" value={nat}
        placeholder={placeholder||phoneCountry(country).ex} style={{flex:1,minWidth:0,...inputStyle}}
        onChange={e=>{ setNat(e.target.value); emit(country, e.target.value); }}
        onBlur ={e=>{ const g=groupNational(country, e.target.value); setNat(g); emit(country, g); }}
        {...rest}/>
    </div>
  );
}

// ---- Email: shared input with common-domain autocomplete -------------------
// Domains ordered by approximate global mailbox count: Gmail is far ahead, then
// the big consumer providers (Microsoft's Outlook/Hotmail, Yahoo, Apple), then
// large legacy/regional ones. Pass `work` to pin the company domains to the front
// (work-email fields), or `pin` to supply your own front-of-list domains.
const EMAIL_DOMAINS = [
  "gmail.com","yahoo.com","hotmail.com","outlook.com","icloud.com",
  "aol.com","proton.me","gmx.com","yandex.com","live.com","msn.com","mail.com",
];
const WORK_EMAIL_DOMAINS = ["123babytalks.com","abckidsny.com"];
// Build `local@domain` completions from what's typed. Once a domain is started
// after "@", narrow to domains that begin with it; cap the list so it stays tidy.
function emailSuggestions(value, domains){
  const v=String(value||"");
  const at=v.indexOf("@");
  const local=(at>=0 ? v.slice(0,at) : v).trim();
  if(!local) return [];
  const typed=(at>=0 ? v.slice(at+1) : "").toLowerCase();
  return domains.filter(d=> !typed || d.startsWith(typed)).slice(0,8).map(d=>`${local}@${d}`);
}
// Drop-in for <input type="email">. Emits the raw string via onChange(value) and
// offers domain completions through a native <datalist> (degrades to a plain
// field where datalist is unsupported).
function EmailInput({ value, onChange, work, pin, style, placeholder, ...rest }){
  const id=React.useId();
  const domains=[...new Set([...(pin || (work ? WORK_EMAIL_DOMAINS : [])), ...EMAIL_DOMAINS])];
  const opts=emailSuggestions(value, domains);
  return (
    <>
      <input type="email" inputMode="email" autoCapitalize="none" autoCorrect="off" spellCheck={false}
        list={id} value={value||""} placeholder={placeholder} style={style}
        onChange={e=>onChange(e.target.value)} {...rest}/>
      <datalist id={id}>{opts.map(o=><option key={o} value={o}/>)}</datalist>
    </>
  );
}

// Build stamp — replaced on each deploy by tools/stamp-build.mjs.
const BUILD = "2026-06-15 18:41 EDT · 9864471";
// Self-update: on load, compare the running build to the deployed version.txt
// (fetched no-store). If a newer build is live, reload to it via a cache-busting
// URL — so a NORMAL refresh always lands on the latest, no hard refresh needed.
(function(){
  async function checkUpdate(){
    try{
      // never interrupt an OAuth callback — its code/token lives in the URL.
      if(/access_token=|[?&](code|error)=/.test(location.hash + "&" + location.search)) return;
      const res = await fetch("version.txt?_=" + Date.now(), { cache:"no-store" });
      if(!res.ok) return;
      const latest = (await res.text()).trim();
      if(!latest || latest === BUILD) return;                 // already current
      // Loop-safe: reload only if we're not already on THIS build's buster. (The
      // old guard checked merely for the PRESENCE of _v=, so it stopped updating
      // after the first reload — that's why long-open tabs went stale.)
      if(location.search.indexOf("_v=" + encodeURIComponent(latest)) === -1)
        location.replace(location.pathname + "?_v=" + encodeURIComponent(latest));
    }catch(_e){ /* offline / blocked — ignore */ }
  }
  checkUpdate();
  // Re-check when the tab is refocused/reopened, so an open tab picks up a new
  // deploy without a manual refresh.
  document.addEventListener("visibilitychange", function(){ if(!document.hidden) checkUpdate(); });
  window.addEventListener("focus", checkUpdate);
})();

// ── Unsaved-changes guard ──────────────────────────────────────────────────
// Surfaces with in-progress edits register via useUnsavedGuard({dirty,label,
// save,discard}); the bottom-tab nav, sign-out, the signing modal's Close, and
// the browser unload event consult the registry and, when something is dirty,
// open ONE blocking prompt (Save / Discard / Stay). "Save" runs the surface's
// own save when the entry is complete; incomplete onboarding steps keep their
// partial entry where the flow already persists per-step.
const _guards = new Map();
function _setGuard(id, rec){ if(rec && rec.dirty) _guards.set(id, rec); else _guards.delete(id); }
function _dirtyGuards(){ return [..._guards.values()]; }
// Only a surface with a real Save action blocks navigation. A dirty surface with
// nothing savable (e.g. an in-progress signature) just lets you leave — no prompt.
function _savableDirty(){ return [..._guards.values()].filter(g=>g.save); }
function unsavedDirty(){ return _savableDirty().length>0; }
function useUnsavedGuard(rec){
  const id = React.useId();
  useEffect(()=>{ _setGuard(id, rec); });
  useEffect(()=>()=>{ _guards.delete(id); }, []);
}
let _ucOpen=null, _ucResolve=null;
function confirmUnsaved(){
  const gs=_savableDirty();
  if(!gs.length) return Promise.resolve(true);   // nothing savable → just let them go
  if(typeof _ucOpen!=="function") return Promise.resolve(window.confirm("You have unsaved changes. Leave and lose them?"));
  return new Promise(resolve=>{ if(_ucResolve){ const p=_ucResolve; _ucResolve=null; p(false); } _ucResolve=resolve; _ucOpen(gs.map(g=>g.label).filter(Boolean)); });
}
async function _ucDecide(decision){
  const gs=_savableDirty(); const resolve=_ucResolve; _ucResolve=null;
  let proceed=false;
  try{
    if(decision==="save"){ for(const g of gs){ if(g.save){ const ok=await g.save(); if(ok===false) throw new Error("save_incomplete"); } } proceed=true; }
    else if(decision==="discard"){ for(const g of gs){ if(g.discard){ try{ g.discard(); }catch(_e){} } } proceed=true; }
    else proceed=false;
  }catch(_e){ proceed=false; }
  if(resolve) resolve(proceed);
  return proceed;
}
function guardedClose(onClose){ return async ()=>{ if(await confirmUnsaved()) onClose&&onClose(); }; }
function UnsavedGuardModal(){
  const [labels,setLabels]=useState(null);
  const [busy,setBusy]=useState(false);
  useEffect(()=>{ _ucOpen=(ls)=>{ setLabels(ls||[]); setBusy(false); };
    return ()=>{ _ucOpen=null; if(_ucResolve){ const r=_ucResolve; _ucResolve=null; r(false); } }; },[]);
  const act=async(d)=>{ setBusy(true); const proceed=await _ucDecide(d); setBusy(false); if(proceed||d==="stay") setLabels(null); };
  const stayRef=React.useRef(null);
  useEffect(()=>{ if(labels===null) return; if(stayRef.current) stayRef.current.focus();
    const onKey=(e)=>{ if(e.key==="Escape"&&!busy) act("stay"); };
    window.addEventListener("keydown",onKey); return ()=>window.removeEventListener("keydown",onKey); },[labels,busy]);  // eslint-disable-line
  if(labels===null) return null;
  const canSave=_dirtyGuards().some(g=>g.save);
  const where=(labels&&labels.length)?` in ${labels.join(", ")}`:"";
  return (
    <div className="ob-modal-bg" role="dialog" aria-modal="true" aria-label="Unsaved changes" style={{alignItems:"center"}}>
      <div className="ob-modal" style={{maxWidth:420,borderRadius:16,margin:12,maxHeight:"none"}}>
        <div className="ob-modal-head"><b>Unsaved changes</b></div>
        <div style={{padding:14}}>
          <p className="sub" style={{marginTop:0}}>You have unsaved changes{where}. {canSave?"Save them before leaving, or discard them?":"Leave and discard them?"}</p>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",justifyContent:"flex-end",marginTop:10}}>
            <button className="btn ghost" ref={stayRef} disabled={busy} onClick={()=>act("stay")}>Stay</button>
            <button className="btn ghost" disabled={busy} onClick={()=>act("discard")} style={{color:"#b91c1c"}}>Discard</button>
            {canSave && <button className="btn" disabled={busy} onClick={()=>act("save")}>{busy?"Saving…":"Save"}</button>}
          </div>
        </div>
      </div>
    </div>
  );
}

// body is on error.context (a Response). Pull the real {error} message out.
async function fnErr(error, data){
  if(data && data.error) return data.error;
  try { const j = await error.context.json(); if(j && j.error) return j.error; } catch(_e){}
  return (error && error.message) || "Something went wrong — please try again.";
}

function ageManila(dobStr){
  const p=String(dobStr).slice(0,10).split("-").map(Number); const y=p[0],m=p[1],d=p[2];
  if(!y||!m||!d) return null;
  const today=new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Manila",year:"numeric",month:"2-digit",day:"2-digit"}).format(new Date());
  const tp=today.split("-").map(Number); let a=tp[0]-y; if(tp[1]<m||(tp[1]===m&&tp[2]<d))a--; return a;
}

// best-effort SHA-256 + device fingerprint (never throw — capture is best-effort, §6.8)
async function sha256Hex(str){
  try{
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str||""));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
  }catch(_e){ return null; }
}
function deviceFingerprint(){
  try{
    const n = navigator;
    return [n.userAgent, n.language, (n.languages||[]).join(","), (screen.width+"x"+screen.height), new Date().getTimezoneOffset()].join("|");
  }catch(_e){ return null; }
}

// progress: each stage = 1/3; within a stage, tasks are equal-weight.
function overallPct(prog, cfg, signedCount){
  const nAgr = (cfg && cfg.agreements && cfg.agreements.length) || 4;
  const s1 = prog && prog.stage1_complete ? 1 : Math.min(1, (signedCount||0)/nAgr);
  const s2 = prog && prog.stage2_complete ? 1 : 0;
  const s3 = prog && prog.stage3_complete ? 1 : 0;
  return Math.round((s1+s2+s3)/3*100);
}
function stepOf(prog){
  const st = (prog && prog.current_stage) || "stage1_sign";
  return st==="stage1_sign" ? 1 : st==="stage2_profile" ? 2 : 3;
}

function useClient(){
  const [client,setClient]=useState(null);
  const [session,setSession]=useState(null);
  const [ready,setReady]=useState(false);
  useEffect(()=>{
    let cancelled=false, sub=null;
    // supabase-js loads as a SEPARATE esm.sh module (window.__createClient). On a
    // slow/cold network that import can resolve AFTER React mounts — so POLL
    // until it's ready instead of capturing it once. The old one-shot useState
    // initializer left client=null forever when the module wasn't ready yet,
    // stranding the portal on its loading screen until a manual reload.
    (function init(){
      if(cancelled) return;
      if(!window.__createClient){ setTimeout(init,50); return; }
      const c=window.__createClient(SUPABASE_URL,SUPABASE_ANON);
      setClient(c);
      c.auth.getSession().then(({data})=>{ if(!cancelled){ setSession(data?.session||null); setReady(true); } });
      sub=c.auth.onAuthStateChange((_e,s)=>{ if(!cancelled) setSession(s||null); });
    })();
    return ()=>{ cancelled=true; try{ sub?.data?.subscription?.unsubscribe(); }catch(_e){} };
  },[]);
  return { client, session, ready };
}

function Login({ client }){
  const [email,setEmail]=useState(""); const [pw,setPw]=useState("");
  const [busy,setBusy]=useState(false); const [err,setErr]=useState(""); const [sent,setSent]=useState("");
  // Cloudflare Turnstile: render the widget, capture its (single-use) token, and
  // attach it to the password / reset calls. When TURNSTILE_SITE_KEY is empty the
  // whole thing is a no-op so the portal still works.
  const [captcha,setCaptcha]=useState("");
  const capRef=React.useRef(null); const widgetId=React.useRef(null);
  useEffect(()=>{
    if(!TURNSTILE_SITE_KEY) return;
    let cancelled=false;
    (function mount(){
      if(cancelled) return;
      if(!window.turnstile || !capRef.current){ setTimeout(mount,150); return; }   // wait for api.js
      if(widgetId.current!=null) return;
      try{
        widgetId.current=window.turnstile.render(capRef.current,{
          sitekey:TURNSTILE_SITE_KEY,
          callback:(t)=>setCaptcha(t),
          "expired-callback":()=>setCaptcha(""),
          "error-callback":()=>setCaptcha(""),
        });
      }catch(_e){ /* already rendered / transient */ }
    })();
    return ()=>{ cancelled=true; try{ if(widgetId.current!=null&&window.turnstile) window.turnstile.remove(widgetId.current); }catch(_e){} widgetId.current=null; };
  },[]);
  function resetCaptcha(){ try{ if(widgetId.current!=null&&window.turnstile) window.turnstile.reset(widgetId.current); }catch(_e){} setCaptcha(""); }
  // We attach the Turnstile token when we have it but never client-block on it —
  // Supabase Auth is the real enforcer, so a Turnstile load hiccup can't brick login.
  async function signIn(e){
    e.preventDefault(); setBusy(true); setErr(""); setSent("");
    const { error }=await client.auth.signInWithPassword({ email:email.trim().toLowerCase(), password:pw,
      options: captcha?{ captchaToken:captcha }:undefined });
    if(error) setErr(error.message);
    resetCaptcha();   // Turnstile tokens are single-use — refresh for the next attempt
    setBusy(false);
  }
  async function reset(){
    if(!email.trim()){ setErr("Enter your email first, then tap reset."); return; }
    setErr(""); const { error }=await client.auth.resetPasswordForEmail(email.trim().toLowerCase(),
      { redirectTo: window.location.origin + window.location.pathname, captchaToken: captcha||undefined });
    resetCaptcha();
    if(error) setErr(error.message); else setSent("Password-reset email sent — check your inbox.");
  }
  return (
    <div className="wrap">
      <div style={{textAlign:"center",margin:"32px 0 8px"}}>
        <img src="logo.png" alt="Aaron Anderson EHS LLC" onError={e=>{e.currentTarget.style.display="none";}}
          style={{maxWidth:200,width:"70%",margin:"0 auto 10px",display:"block"}}/>
        <h2 style={{margin:0}}>Contractor Portal</h2>
        <p className="sub">Sign in to view your pay, time, and documents.</p>
      </div>
      <form className="card" onSubmit={signIn}>
        <label className="sub">Email</label>
        <EmailInput autoComplete="username" value={email} onChange={setEmail} placeholder="you@example.com"/>
        <label className="sub">Password</label>
        <input type="password" autoComplete="current-password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••"/>
        {TURNSTILE_SITE_KEY && <div ref={capRef} style={{marginTop:10,display:"flex",justifyContent:"center"}}></div>}
        {err && <div className="err">{err}</div>}
        {sent && <div style={{color:"var(--good)",fontSize:14,padding:"6px 0"}}>{sent}</div>}
        <button className="btn" style={{width:"100%",marginTop:8}} disabled={busy}>{busy?"Signing in…":"Sign in"}</button>
        <div style={{textAlign:"center",marginTop:6}}>
          <button type="button" className="btn link" onClick={reset}>Forgot / set password</button>
        </div>
      </form>
      <p className="sub" style={{textAlign:"center"}}>Trouble signing in? Contact your payroll admin.</p>
    </div>
  );
}

function TimeView({ client }){
  const [rows,setRows]=useState(null); const [err,setErr]=useState("");
  const [open,setOpen]=useState({});   // { periodKey: true } — which periods are expanded
  useEffect(()=>{
    client.from("time_entries").select("work_date,tracked_seconds,pto_seconds,approval")
      .order("work_date",{ascending:false}).limit(2000)
      .then(({data,error})=>{ if(error) setErr(error.message); setRows(data||[]); });
  },[]);
  if(err) return <div className="wrap"><div className="err">{err}</div></div>;
  if(rows===null) return <div className="wrap"><div className="empty">Loading…</div></div>;
  if(!rows.length) return <div className="wrap"><div className="empty">No time recorded yet.</div></div>;
  // group by semi-monthly period, keeping a per-day breakdown for the drill-down
  const byPeriod={};
  rows.forEach(r=>{ const d=r.work_date; const half=Number(d.slice(8,10))<=15?"01–15":"16–end"; const key=d.slice(0,7)+" "+half;
    const g=byPeriod[key]||(byPeriod[key]={key,tracked:0,pto:0,byDay:{}});
    g.tracked+=r.tracked_seconds||0; g.pto+=r.pto_seconds||0;
    const day=g.byDay[d]||(g.byDay[d]={date:d,tracked:0,pto:0});
    day.tracked+=r.tracked_seconds||0; day.pto+=r.pto_seconds||0; });
  const periods=Object.values(byPeriod).map(g=>{
    g.daysList=Object.values(g.byDay).filter(x=>x.tracked>0||x.pto>0).sort((a,b)=>a.date.localeCompare(b.date));
    g.days=g.daysList.length; return g; });
  const fmtDay=(d)=>{ try{ return new Date(d+"T00:00:00").toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"}); }catch{ return d; } };
  const latest=periods[0];
  return (
    <div className="wrap">
      <div className="pagehead"><span className="sticker">⏱ Your time</span></div>
      {latest && <div className="summary">
        <div className="scell"><div className="v">{(hrs(latest.tracked)+hrs(latest.pto)).toFixed(1)} h</div><div className="l">{latest.key} total</div></div>
        <div className="scell"><div className="v">{latest.days}</div><div className="l">day{latest.days===1?"":"s"} worked</div></div>
      </div>}
      {periods.map(g=>{
        const isOpen=!!open[g.key];
        return (
        <div className="card" key={g.key}>
          <div onClick={()=>setOpen(o=>({...o,[g.key]:!o[g.key]}))} style={{cursor:"pointer"}}>
            <div style={{fontWeight:700,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span>{g.key}</span>
              <span className="sub" style={{fontWeight:500}}>{g.days} day{g.days===1?"":"s"} {isOpen?"▾":"▸"}</span>
            </div>
            <div className="row"><span className="k">Worked</span><span>{hrs(g.tracked).toFixed(2)} h</span></div>
            {g.pto>0 && <div className="row"><span className="k">PTO</span><span style={{color:"var(--gold)",fontWeight:600}}>{hrs(g.pto).toFixed(2)} h</span></div>}
            <div className="row" style={{fontWeight:700}}><span>Total</span><span>{(hrs(g.tracked)+hrs(g.pto)).toFixed(2)} h</span></div>
          </div>
          {isOpen && (
            <div style={{marginTop:8,paddingTop:8,borderTop:"1px solid #e5e7eb"}}>
              {g.daysList.length===0
                ? <div className="sub">No daily entries.</div>
                : g.daysList.map(day=>(
                    <div className="row" key={day.date}>
                      <span className="k">{fmtDay(day.date)}</span>
                      <span>{(hrs(day.tracked)+hrs(day.pto)).toFixed(2)} h{day.pto>0?` · ${hrs(day.pto).toFixed(2)} PTO`:""}</span>
                    </div>
                  ))}
            </div>
          )}
        </div>
        );
      })}
    </div>
  );
}

          </div>

          {d.expires_on && <div className="row"><span className="k">Expires</span><span>{d.expires_on}</span></div>}
        </div>
      ))}
    </div>
  );
}

// PHT (Asia/Manila) wall-clock parts, independent of the device time zone.
function phtParts(){
  const now=new Date();
  const hour=Number(new Intl.DateTimeFormat("en-US",{timeZone:"Asia/Manila",hour:"numeric",hour12:false}).format(now));
  const clock=new Intl.DateTimeFormat("en-US",{timeZone:"Asia/Manila",weekday:"short",month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}).format(now);
  return {hour,clock};
}
// current semi-monthly period (1–15 → paid month-end; 16–end → paid 15th next month)
function curPeriod(){
  const s=new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Manila",year:"numeric",month:"2-digit",day:"2-digit"}).format(new Date());
  const [y,m,d]=s.split("-").map(Number);
  const lastDay=new Date(y,m,0).getDate();
  const iso=dd=>`${y}-${String(m).padStart(2,"0")}-${String(dd).padStart(2,"0")}`;
  if(d<=15) return {start:iso(1),end:iso(15),pay:`${y}-${String(m).padStart(2,"0")}-${String(lastDay).padStart(2,"0")}`};
  const ny=m===12?y+1:y, nm=m===12?1:m+1;
  return {start:iso(16),end:iso(lastDay),pay:`${ny}-${String(nm).padStart(2,"0")}-15`};
}

// Post-onboarding login reminder: nags a contractor (who's already in the
// portal) to upload any outstanding onboarding documents. Only shows for
// contractors actually engaged in the doc process (>=1 onboarding doc uploaded)
// so grandfathered contractors are never bothered. "Outstanding" = missing or
// sent-back (needs_replacement); a pending upload stops the nag.
// Detect a contractor's outstanding onboarding documents (missing required, or
// admin-flagged needs_replacement/deferred). Shared by the Home popup, the Docs
// tab badge, and the inline Docs uploader so they stay in sync (one query).
function useOutstandingDocs(client){
  const [st,setSt]=useState(null);
  function load(){
    Promise.all([
      client.from("workers").select("id").maybeSingle(),
      client.from("documents").select("id,kind,side,title,storage_path,review_status,review_reason,created_at").order("created_at",{ascending:false}),
      client.from("portal_settings").select("onboarding_config").eq("id",1).maybeSingle(),
    ]).then(([wq,dq,pq])=>{
      const wid=(wq.data&&wq.data.id)||null;
      const docs=dq.data||[];
      const cfg=(pq.data&&pq.data.onboarding_config)||{};
      const ONB_KINDS=["resume","diploma","nbi_clearance","gov_id"];
      const DEFAULT_DOCS=[{kind:"resume",title:"Resume / CV",required:true},{kind:"diploma",title:"Diploma or Transcript of Records",required:true},{kind:"nbi_clearance",title:"NBI Clearance",required:true,freshness_months:6},{kind:"gov_id",title:"Government-issued ID or Passport",required:true,sides:["front","back"]}];
      const KLABEL={resume:"Resume / CV",diploma:"Diploma / TOR",nbi_clearance:"NBI Clearance",gov_id:"Government ID",professional_license:"Professional License"};
      const labelKind=k=>KLABEL[k]||String(k||"").replace(/_/g," ").replace(/\b\w/g,c=>c.toUpperCase());
      const cfgDocs=(Array.isArray(cfg.documents)&&cfg.documents.length)?cfg.documents:DEFAULT_DOCS;
      const byKey={}; docs.forEach(d=>{ const k=d.kind+"|"+(d.side||""); (byKey[k]=byKey[k]||[]).push(d); });
      const latest=(kind,side)=>{ const a=byKey[kind+"|"+(side||"")]; return a&&a[0]; };
      const engaged=docs.some(d=>ONB_KINDS.includes(d.kind));
      const ACTION=["needs_replacement","deferred"];
      const slots=[]; const seen=new Set();
      cfgDocs.forEach(d=>{ const optional=d.required===false;
        if(Array.isArray(d.sides)) d.sides.forEach(side=>{ slots.push({kind:d.kind,side,label:d.title+" ("+side+")",optional}); seen.add(d.kind+"|"+side); });
        else { slots.push({kind:d.kind,side:null,label:d.title,optional}); seen.add(d.kind+"|"); } });
      docs.forEach(d=>{ const key=d.kind+"|"+(d.side||""); if(seen.has(key))return; seen.add(key);
        if(ACTION.includes(d.review_status)) slots.push({kind:d.kind,side:d.side||null,label:labelKind(d.kind)+(d.side?" ("+d.side+")":""),optional:false}); });
      const outstanding=slots.filter(s=>{ const l=latest(s.kind,s.side); return !l || ACTION.includes(l.review_status); });
      const actionItems=outstanding.filter(s=>{ const l=latest(s.kind,s.side); return l && ACTION.includes(l.review_status); });
      const hasAction=actionItems.length>0;
      const show=outstanding.length>0 && (engaged || hasAction);   // don't nag grandfathered contractors
      setSt({ ready:true, wid, latest, outstanding, hasAction, engaged, show });
    });
  }
  useEffect(load,[]);  // eslint-disable-line
  return st ? { ...st, reload:load } : { ready:false, outstanding:[], hasAction:false, show:false, reload:load };
}

function nyHourNow(){ return Number(new Intl.DateTimeFormat("en-US",{timeZone:"America/New_York",hour:"numeric",hour12:false}).format(new Date())); }
function skyPhase(h){
  if(h>=5&&h<7)   return {grad:"linear-gradient(180deg,#2a3a6b,#6b5a8c 55%,#1F3A68)", night:false, sign:"New York is waking up."};
  if(h>=7&&h<17)  return {grad:"linear-gradient(180deg,#2f5aa0,#5b8fd4 55%,#1F3A68)", night:false, sign:"It's a fresh day over in New York."};
  if(h>=17&&h<19) return {grad:"linear-gradient(180deg,#4a3f7a,#b5703e 55%,#1F3A68)", night:false, sign:"Golden hour in the city right now."};
  if(h>=19&&h<21) return {grad:"linear-gradient(180deg,#21305c,#3d3566 55%,#8a4a52)", night:true,  sign:"New York is settling into the evening."};
  return                  {grad:"linear-gradient(180deg,#14213d,#1F3A68 62%,#24305a)", night:true,  sign:"New York is winding down for the night."};
}
// Map open-meteo weather_code → the CSS weather-FX class suffix (.wxfx-<cat>).
function wxCategory(code){
  if(code==null) return null;
  if([45,48].includes(code)) return "fog";
  if([71,73,75,77,85,86].includes(code)) return "snow";
  if([95,96,99].includes(code)) return "storm";
  if([51,53,55,61,63,65,66,67,80,81,82].includes(code)) return "rain";
  if([2,3].includes(code)) return "cloudy";
  if([0,1].includes(code)) return "clear";
  return null;
}

// Trailing activity bar chart (Home, under the pay card). Reads the contractor's
// own time_entries (RLS-scoped) and shows activity_pct per day for the last N days.
function ActivityChart({ client }){
  const DAYS=18;
  const [days,setDays]=useState(null);
  const scRef=React.useRef(null);
  useEffect(()=>{
    const today=new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Manila"}).format(new Date());
    const start=new Date(Date.parse(today+"T00:00:00Z")-89*86400000).toISOString().slice(0,10);   // scan ~90d to find the worked days
    client.from("time_entries").select("work_date,activity_pct,tracked_seconds")
      .gte("work_date",start).lte("work_date",today)
      .then(({data})=>{
        const agg={};   // worked day (has tracked activity) -> tracked-weighted activity
        (data||[]).forEach(r=>{ if(r.activity_pct==null) return;
          const w=Math.max(Number(r.tracked_seconds)||0,1);
          const a=agg[r.work_date]||(agg[r.work_date]={s:0,w:0});
          a.s+=Number(r.activity_pct)*w; a.w+=w; });
        // Only days with logged time, most recent DAYS of them (skip days off).
        const out=Object.keys(agg).sort()
          .map(d=>({ date:d, activity:Math.round(agg[d].s/agg[d].w) }))
          .slice(-DAYS);
        setDays(out);
      });
  },[]);  // eslint-disable-line
  // Start the scroll at the most recent day (right edge).
  React.useEffect(()=>{ if(days&&scRef.current) scRef.current.scrollLeft=scRef.current.scrollWidth; },[days]);
  if(days===null) return <div className="card"><div className="empty">Loading activity…</div></div>;
  const fmtMD=iso=>{ try{ return new Intl.DateTimeFormat("en-US",{month:"numeric",day:"numeric",timeZone:"UTC"}).format(new Date(iso+"T00:00:00Z")); }catch{ return iso.slice(5); } };
  const present=days.filter(d=>d.activity!=null);
  const avg=present.length?Math.round(present.reduce((a,d)=>a+d.activity,0)/present.length):null;
  if(!present.length) return (
    <div className="card"><p className="sub" style={{marginTop:0}}>Your Hubstaff activity % per day.</p>
      <div className="empty">No logged activity yet.</div></div>);
  // SVG geometry — fixed per-day width so the chart scrolls left/right.
  const dayW=36, H=104, padTop=16, padBottom=22, W=days.length*dayW, svgH=H+padTop+padBottom;
  const yOf=v=>padTop+H-(Math.max(0,Math.min(100,v))/100)*H, cx=i=>i*dayW+dayW/2, barW=dayW*0.56;
  const col=v=>v>=60?"var(--good,#16a34a)":v>=35?"var(--accent,#1F3A68)":"var(--warn,#d97706)";
  // Trend line = 3-point centered moving average over the days that have activity.
  const nn=days.map((d,i)=>({i,v:d.activity})).filter(p=>p.v!=null);
  const trend=nn.map((p,k)=>{ const lo=Math.max(0,k-1),hi=Math.min(nn.length-1,k+1); let s=0; for(let j=lo;j<=hi;j++) s+=nn[j].v; return `${cx(p.i)},${yOf(s/(hi-lo+1)).toFixed(1)}`; }).join(" ");
  return (
    <div className="card">
      <div className="row" style={{padding:0,alignItems:"baseline",gap:8}}>
        <p className="sub" style={{marginTop:0,marginBottom:8,flex:1}}>Your activity % on each logged day (last {days.length}) — scroll for more · line = 3-day trend.</p>
        {avg!=null && <span style={{fontWeight:700,whiteSpace:"nowrap",color:"var(--accent,#1F3A68)"}}>avg {avg}%</span>}
      </div>
      <div ref={scRef} style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
        <svg width={W} height={svgH} style={{display:"block"}} role="img" aria-label={`Daily activity, last ${DAYS} days`}>
          {[25,50,75].map(g=><line key={g} x1="0" x2={W} y1={yOf(g)} y2={yOf(g)} stroke="var(--line,#eef2f7)"/>)}
          {days.map((d,i)=>{ const v=d.activity;
            if(v==null) return <rect key={i} x={cx(i)-barW/2} y={padTop+H-2} width={barW} height="2" fill="var(--line,#e5e7eb)" rx="1"/>;
            const y=yOf(v);
            return <g key={i}>
              <rect x={cx(i)-barW/2} y={y} width={barW} height={padTop+H-y} fill={col(v)} rx="3" opacity="0.8"><title>{fmtMD(d.date)} · {v}%</title></rect>
              <text x={cx(i)} y={y-4} textAnchor="middle" fontSize="9" fill="var(--muted,#94a3b8)">{v}</text>
            </g>; })}
          {nn.length>=2 && <polyline points={trend} fill="none" stroke="var(--accent,#1F3A68)" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>}
          {days.map((d,i)=><text key={"d"+i} x={cx(i)} y={svgH-6} textAnchor="middle" fontSize="9" fill="var(--muted,#94a3b8)">{fmtMD(d.date)}</text>)}
        </svg>
      </div>
    </div>
  );
}

function Home({ client, session, od }){
  const [w,setW]=useState(null);
  const [lastPaid,setLastPaid]=useState(undefined); const [nextPay,setNextPay]=useState(undefined);  // last paid / next pending statement
  const [anns,setAnns]=useState(null); const [moodPrompt,setMoodPrompt]=useState(null);  // null=none | {kind:'start'|'end'}
  const [moodChecked,setMoodChecked]=useState(false);   // mood decision made (prompt shown or not)
  const [docPopup,setDocPopup]=useState(false);         // outstanding-docs popup (after the mood check)
  const per=curPeriod(); const {hour,clock}=phtParts();
  const greetEN=hour<12?"Good morning":hour<18?"Good afternoon":"Good evening";
  const greetTL=hour<12?"Magandang umaga":hour<18?"Magandang hapon":"Magandang gabi";
  const ex=(w&&w.profile_extras&&typeof w.profile_extras==="object")?w.profile_extras:{};
  const greetName=(ex.nickname||w?.first_name||"").trim();
  // hybrid Home extras: avatar initials, NY-time sky phase (for the greeting sign-off
  // + emoji), and the current pay-period progress toward payday.
  const nyPh=skyPhase(nyHourNow());
  const greetEmoji=nyPh.night?"🌙":"☀️";
  const initials=((greetName||w?.first_name||"?").trim().split(/\s+/).map(s=>s[0]).slice(0,2).join("")||"?").toUpperCase();
  const fmtMD=iso=>{ try{ return new Intl.DateTimeFormat("en-US",{month:"short",day:"numeric",timeZone:"UTC"}).format(new Date(iso+"T00:00:00Z")); }catch{ return iso; } };
  const todayISO=new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Manila"}).format(new Date());
  const dNum=iso=>Number(String(iso).slice(8,10));
  const totalDays=Math.max(1,dNum(per.end)-dNum(per.start)+1);
  const elapsedDays=Math.min(totalDays,Math.max(0,dNum(todayISO)-dNum(per.start)+1));
  const pct=Math.round(elapsedDays/totalDays*100);
  const payISO=(nextPay&&nextPay.pay)||per.pay;
  const daysToPay=Math.round((Date.parse(payISO+"T00:00:00Z")-Date.parse(todayISO+"T00:00:00Z"))/86400000);
  useEffect(()=>{
    client.from("workers").select("id,first_name,profile_extras,shift_start,shift_end").maybeSingle().then(({data})=>setW(data||{}));
    client.from("payments").select("net_php,status,pay_periods(pay_date,period_start,period_end)")
      .then(({data})=>{ const isPaid=s=>s==="sent"||s==="reconciled";
        const ps=(data||[]).map(p=>({net:Number(p.net_php||0),status:p.status,
          pay:p.pay_periods?.pay_date,start:p.pay_periods?.period_start,end:p.pay_periods?.period_end}))
          .sort((a,b)=>String(b.pay||"").localeCompare(String(a.pay||"")));
        setLastPaid(ps.find(p=>isPaid(p.status))||null);   // most recent paid
        setNextPay(ps.find(p=>!isPaid(p.status))||null); });   // most recent pending
    client.from("announcements").select("title,body,published_at").eq("active",true).order("published_at",{ascending:false}).limit(5)
      .then(({data})=>setAnns(data||[]));
  },[]);  // eslint-disable-line
  // Decide whether to show the mood pop-out, and which one:
  //   START ("How are you feeling today?")  — within 2h after shift start
  //   END   ("Tell me how your day went?")  — within 2h after shift end
  // De-dupe per shift by looking back 16h (handles overnight US-hours shifts,
  // where start/end straddle midnight PHT). No shift set => generic once-per-
  // ~day start check-in so it still works before an admin enters a schedule.
  useEffect(()=>{
    const wid=w&&w.id; if(!wid) return;
    const phDate=new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Manila"}).format(new Date());
    // sessionStorage guard: once a kind is answered today, don't reappear on
    // refresh within this session (covers the gap before the DB write commits).
    const ssDone=(k)=>{ try{ return sessionStorage.getItem(`mood:${k}:${phDate}`)==="1"; }catch{ return false; } };
    const phHM=new Intl.DateTimeFormat("en-GB",{timeZone:"Asia/Manila",hour12:false,hour:"2-digit",minute:"2-digit"}).format(new Date());
    const [hh,mm]=phHM.split(":").map(Number); const nowMin=hh*60+mm;
    const parse=(t)=>{ if(!t) return null; const [a,b]=String(t).split(":").map(Number); return (a||0)*60+(b||0); };
    const start=parse(w.shift_start), end=parse(w.shift_end);
    const sinceIso=new Date(Date.now()-16*3600*1000).toISOString();
    client.from("mood_checkins").select("kind,created_at").eq("worker_id",wid).gte("created_at",sinceIso)
      .then(({data})=>{
        setMoodChecked(true);   // a mood decision is being made now → the doc popup may follow
        const recent=data||[];
        const hasStart=recent.some(r=>r.kind==="start")||ssDone("start");
        const hasEnd  =recent.some(r=>r.kind==="end")  ||ssDone("end");
        if(start!=null && end!=null){
          const afterStart=(nowMin-start+1440)%1440, afterEnd=(nowMin-end+1440)%1440;
          if(afterStart<=120 && !hasStart){ setMoodPrompt({kind:"start"}); return; }
          if(afterEnd<=120   && !hasEnd)  { setMoodPrompt({kind:"end"});   return; }
          setMoodPrompt(null); return;
        }
        // No shift configured -> fall back to a single check-in on first open of
        // the day ("start"), de-duped so it doesn't reappear on every refresh.
        setMoodPrompt((recent.length || hasStart) ? null : {kind:"start"});
      });
  },[w]);  // eslint-disable-line
  // After the mood check is done (answered or none) show the outstanding-docs
  // popup — once per day, guarded by sessionStorage like the mood check.
  useEffect(()=>{
    if(!moodChecked || moodPrompt) return;            // wait until mood is decided + dismissed
    if(!od || !od.ready || !od.show) return;           // nothing flagged → no popup
    const phDate=new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Manila"}).format(new Date());
    let done=false; try{ done=sessionStorage.getItem("docpop:"+phDate)==="1"; }catch{}
    if(done) return;
    try{ sessionStorage.setItem("docpop:"+phDate,"1"); }catch{}
    setDocPopup(true);
  },[moodChecked,moodPrompt,od&&od.ready,od&&od.show]);  // eslint-disable-line
  async function logMood(m){
    const kind=(moodPrompt&&moodPrompt.kind)||"start"; const wid=w?.id;
    setMoodPrompt(null);               // tapping an emoji is the ONLY way to dismiss the pop-out
    try{ const phDate=new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Manila"}).format(new Date());
      sessionStorage.setItem(`mood:${kind}:${phDate}`,"1"); }catch{ /* ignore */ }   // don't re-show this kind today
    if(wid){ const { error }=await client.from("mood_checkins").insert({worker_id:wid,mood:m,kind});   // mood = 1..5 Likert
      if(error) console.error("mood check-in failed:", error.message); }   // surfaced in DevTools if RLS/insert ever fails
  }
  return (
    <div className="wrap home">
      <div style={{margin:"8px 2px 2px",fontSize:13,color:"var(--muted)"}}>{clock} · PHT</div>
      <div style={{display:"flex",gap:12,alignItems:"center",margin:"6px 2px 2px"}}>
        <div className="avatar">{initials}</div>
        <div>
          <h2 style={{margin:0,fontSize:19}}>{greetTL}{greetName?`, ${greetName}`:""} {greetEmoji}</h2>
          <div className="sub" style={{margin:"1px 0 0"}}>{nyPh.sign}</div>
        </div>
      </div>
      <NyPanel/>
      <div className="dash-cell dash-word">
      <div className="stickwrap"><span className="sticker">📣 Word from Your Mother</span></div>
      {anns===null?<div className="empty">Loading…</div>: !anns.length?<div className="empty">No announcements right now.</div>:
        <div className="card annlist">
          {anns.map((a,i)=>(
            <div className="item" key={i}>
              <div style={{fontWeight:700}}><span className="dot">•</span>{a.title}</div>
              <div className="sub" style={{margin:"1px 0 3px"}}>{String(a.published_at).slice(0,10)}</div>
              {a.body && <div style={{fontSize:14,whiteSpace:"pre-wrap"}}>{a.body}</div>}
            </div>
          ))}
        </div>}
      </div>
      <div className="dash-cell dash-pay">
      <div className="stickwrap"><span className="sticker">📮 Your pay</span></div>
      <div className="paycard">
        <div className="row" style={{alignItems:"flex-end",padding:0}}>
          <div>
            <div className="sub" style={{margin:0}}>Next pay</div>
            <div className="bigpay">{nextPay===undefined?"…":peso(nextPay?nextPay.net:null)}</div>
            <div className="sub" style={{margin:"2px 0 0"}}>{nextPay===undefined?" ":nextPay
              ? `pays ${nextPay.pay||per.pay}${daysToPay>0?` · in ${daysToPay} day${daysToPay>1?"s":""}`:""}`
              : `being prepared · pays ${per.pay}`}</div>
          </div>
          <span className="pill pending">pending</span>
        </div>
        <div style={{marginTop:12}}>
          <div className="sub" style={{margin:0}}>Day {elapsedDays} of {totalDays} — sun's climbing toward payday</div>
          <div className="obar"><i style={{width:pct+"%"}}></i><span className="paysun" style={{left:pct+"%"}}>☀️</span></div>
          <div className="sub" style={{margin:"2px 0 0",display:"flex",justifyContent:"space-between"}}><span>{fmtMD(per.start)}</span><span>{fmtMD(per.end)}</span></div>
        </div>
        <div className="hair"></div>
        <div className="row" style={{padding:0}}>
          <span className="k">Last pay</span>
          <span>{lastPaid===undefined?"…":lastPaid
            ? <><b>{peso(lastPaid.net)}</b> · {lastPaid.pay||"—"} <span className="pill paid">paid</span></>
            : "—"}</span>
        </div>
      </div>
      </div>
      <div className="dash-cell dash-act">
      <div className="stickwrap"><span className="sticker">📊 Activity</span></div>
      <ActivityChart client={client}/>
      </div>
      <QuickLinks/>
      {moodPrompt && (
        <div role="dialog" aria-modal="true" aria-label="Shift mood check-in"
          style={{position:"fixed",inset:0,background:"rgba(15,28,51,.55)",display:"flex",alignItems:"center",justifyContent:"center",padding:20,zIndex:60}}>
          <div className="card" style={{maxWidth:360,width:"100%",textAlign:"center",margin:0}}>
            <div style={{fontWeight:800,fontSize:17,marginBottom:2}}>{moodPrompt.kind==="end"?"Tell me how your day went?":"How are you feeling today?"}</div>
            <div className="sub" style={{marginTop:0,marginBottom:12}}>Tap an emoji to continue.</div>
            <div style={{display:"flex",gap:12,fontSize:36,justifyContent:"center"}}>
              {["😞","😕","🙂","😀","🤩"].map((e,i)=><span key={i} onClick={()=>logMood(i+1)} style={{cursor:"pointer"}} role="button" aria-label={"mood "+(i+1)}>{e}</span>)}
            </div>
          </div>
        </div>
      )}
      {docPopup && <DocReminder client={client} session={session} od={od} variant="modal" onClose={()=>setDocPopup(false)}/>}
    </div>
  );
}

function SignaturePad({ client, agreement, text, canSign, onSigned }){
  const [mode,setMode]=useState("type"); const [name,setName]=useState("");
  const [consent,setConsent]=useState(false); const [busy,setBusy]=useState(false);
  const [err,setErr]=useState(""); const [drawn,setDrawn]=useState(false);
  const [allow,setAllow]=useState("both");   // signature method the admin permits for contractors
  const [signedDate,setSignedDate]=useState(()=>new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Manila"}).format(new Date()));  // auto-fills today; editable
  const canvasRef = React.useRef(null);
  const prefillRef = React.useRef("");
  useEffect(()=>{ client.from("workers").select("first_name,middle_name,last_name").maybeSingle()
    .then(({data})=>{ if(data){ const n=fullName(data); setName(n); prefillRef.current=n; } }); },[]);
  useEffect(()=>{ client.from("portal_settings").select("onboarding_config").eq("id",1).maybeSingle()
    .then(({data})=>{ const s=(data&&data.onboarding_config&&data.onboarding_config.signature_methods)||{};
      const a=["both","typed","drawn"].includes(s.contractor)?s.contractor:"both"; setAllow(a); if(a==="drawn") setMode("draw"); else if(a==="typed") setMode("type"); }); },[]);
  // Unsaved-changes guard: a drawn signature lives only on the canvas, and a ticked
  // consent / edited name are easy to lose on an accidental Close. No "save" —
  // signing needs the scroll + consent gate — so the prompt offers Discard / Stay.
  useUnsavedGuard({ dirty: consent || drawn || (!!name && name!==prefillRef.current), label:"your signature" });
  useEffect(()=>{
    if(mode!=="draw") return;
    const c = canvasRef.current; if(!c) return;
    const ctx = c.getContext("2d"); ctx.lineWidth=2.2; ctx.lineCap="round"; ctx.strokeStyle="#1F3A68";
    let drawing=false;
    const pos=(e)=>{ const r=c.getBoundingClientRect(); const p=e.touches?e.touches[0]:e;
      return [ (p.clientX-r.left)*(c.width/r.width), (p.clientY-r.top)*(c.height/r.height) ]; };
    const down=(e)=>{ drawing=true; const [x,y]=pos(e); ctx.beginPath(); ctx.moveTo(x,y); e.preventDefault(); };
    const move=(e)=>{ if(!drawing) return; const [x,y]=pos(e); ctx.lineTo(x,y); ctx.stroke(); setDrawn(true); e.preventDefault(); };
    const up=()=>{ drawing=false; };
    c.addEventListener("mousedown",down); c.addEventListener("mousemove",move); window.addEventListener("mouseup",up);
    c.addEventListener("touchstart",down,{passive:false}); c.addEventListener("touchmove",move,{passive:false}); window.addEventListener("touchend",up);
    return ()=>{ c.removeEventListener("mousedown",down); c.removeEventListener("mousemove",move); window.removeEventListener("mouseup",up);
      c.removeEventListener("touchstart",down); c.removeEventListener("touchmove",move); window.removeEventListener("touchend",up); };
  },[mode]);
  function clearCanvas(){ const c=canvasRef.current; if(c){ c.getContext("2d").clearRect(0,0,c.width,c.height); setDrawn(false); } }
  async function doSign(){
    setErr("");
    if(!canSign){ setErr(t("ob.err.scroll")); return; }
    if(!name.trim()){ setErr(t("ob.err.name")); return; }
    if(!consent){ setErr(t("ob.err.consent")); return; }
    let signature_data = name.trim();
    if(mode==="draw"){ if(!drawn){ setErr(t("ob.err.draw")); return; } signature_data = canvasRef.current.toDataURL("image/png"); }
    setBusy(true);
    const doc_sha256 = await sha256Hex(text);
    const { data, error } = await client.functions.invoke("portal-sign", { body: {
      action:"sign", agreement_kind:agreement.kind, doc_version:agreement.version||"1.0",
      doc_sha256, signed_legal_name:name.trim(), signature_method:(mode==="draw"?"drawn":"typed"),
      signature_data, scrolled_to_end:true, signed_date:signedDate, device_fingerprint:deviceFingerprint(),
    }});
    setBusy(false);
    if(error||(data&&data.error)){ setErr(await fnErr(error,data)); return; }
    onSigned && onSigned();
  }
  const ghost = { color:"var(--accent)", borderColor:"var(--accent)" };
  return (
    <div className="ob-sign">
      {allow==="both" && <div style={{display:"flex",gap:6,marginBottom:8}}>
        <button className={"btn ob-toggle "+(mode==="type"?"":"ghost")} style={mode==="type"?{}:ghost} onClick={()=>setMode("type")}>{t("ob.sign.type")}</button>
        <button className={"btn ob-toggle "+(mode==="draw"?"":"ghost")} style={mode==="draw"?{}:ghost} onClick={()=>setMode("draw")}>{t("ob.sign.draw")}</button>
      </div>}
      <label className="sub" style={{display:"block"}}>{t("ob.sign.legalname")}</label>
      <input value={name} onChange={e=>setName(e.target.value)} aria-label={t("ob.sign.legalname")} />
      <label className="sub" style={{display:"block",marginTop:8}}>Date signed</label>
      <input type="date" value={signedDate} onChange={e=>setSignedDate(e.target.value)} aria-label="Date signed" />
      {mode==="draw" && <div style={{margin:"6px 0"}}>
        <canvas ref={canvasRef} width={520} height={120} className="ob-canvas" aria-label="Signature drawing area"/>
        <button className="btn link" onClick={clearCanvas} style={{padding:"4px 0"}}>{t("ob.sign.clear")}</button>
      </div>}
      <label className="ob-consent">
        <input type="checkbox" checked={consent} onChange={e=>setConsent(e.target.checked)} />
        <span>{t("ob.sign.consent")}</span>
      </label>
      {err && <div className="err">{err}</div>}
      <button className="btn" style={{width:"100%",marginTop:4}} disabled={busy||!canSign||!consent||!name.trim()} onClick={doSign}>
        {busy ? t("ob.sign.signing") : t("ob.sign.button")}
      </button>
    </div>
  );
}

// Build a formatted addendum block (per-hire) for an agreement, or "" if none.
function agAddendum(type,text){
  const t=String(text||"").trim(); if(!t) return "";
  return t;
}
// Fill {{merge}} fields in an agreement body from the prepared instance + worker.
// Auto-appends the addendum when the template doesn't place {{addendum}} itself.
// Monthly rate from a per-period rate (payroll is semi-monthly → ×2). "" when unparseable.
function monthlyFromPeriod(rate){
  const n=parseFloat(String(rate==null?"":rate).replace(/[^0-9.]/g,""));
  if(!Number.isFinite(n)||n<=0) return "";
  return (Math.round(n*2*100)/100).toLocaleString("en-US");
}
function mergeAgreement(body, v){
  const empRaw=(v&&v.employment_type)||"";
  const empLabel=empRaw==="full_time"?"Full-time":empRaw==="part_time"?"Part-time":(empRaw||"");
  const empHours=(v&&v.hours_per_week!=null&&String(v.hours_per_week).trim()!=="")?String(v.hours_per_week).trim():(empRaw==="full_time"?"40":empRaw==="part_time"?"20":"");
  const empPhrase=empLabel?(empLabel+(empHours?` (${empHours} hours/week)`:"")):"";
  const sched=(v&&v.schedule)||"";
  const s={ contractor_name:(v&&v.contractor_name)||"", rate:(v&&v.rate)||"________",
    monthly_rate:(v&&v.monthly_rate)||"________", company_name:(v&&v.company_name)||"________",
    client_name:(v&&v.company_name)||"________", employer_name:(v&&v.employer_name)||"Aaron Anderson E.H.S. LLC",
    start_date:(v&&v.start_date)||"________", position:(v&&v.position)||"________",
    contractor_address:(v&&v.contractor_address)||"________",
    countersigner_name:(v&&v.countersigner_name)||"________", today:(v&&v.today)||"",
    employment_type:empPhrase||"________", hours_per_week:empHours||"________", schedule:sched||"________",
    addendum:(v&&v.addendum)||"" };
  let out = String(body||"").replace(/\{\{\s*(\w+)\s*\}\}/g,(m,k)=> (k in s? s[k]: m));
  if(s.addendum && !/\{\{\s*addendum\s*\}\}/.test(String(body||""))) out += "\n\n"+s.addendum;
  // Auto-append the engagement basis (employment type + shift) when set and the
  // template doesn't already place those tokens — so every agreement states it.
  if(!/\{\{\s*(employment_type|hours_per_week|schedule)\s*\}\}/.test(String(body||"")) && (empPhrase||sched)){
    const bits=[];
    if(empPhrase) bits.push("Engagement: "+empPhrase+".");
    if(sched) bits.push("Work schedule: "+sched+".");
    if(sched) bits.push("This schedule is stated in U.S. Eastern Time, which observes U.S. daylight saving time. Because the Philippines does not change its clocks, the equivalent local Philippine start and end times shift by one hour when the U.S. springs forward (mid-March) and falls back (early November).");
    out += "\n\n"+bits.join(" ");
  }
  return out;
}
function AgreementViewer({ client, agreement, onClose, onSigned }){
  const [reached,setReached]=useState(false);
  const [text,setText]=useState(null);   // null = loading
  const scrollRef = React.useRef(null); const bottomRef = React.useRef(null);
  const close=guardedClose(onClose);   // prompt to discard if a signature is in progress
  useEffect(()=>{
    let alive=true;
    (async()=>{
      const today=new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Manila",year:"numeric",month:"2-digit",day:"2-digit"}).format(new Date());
      const isIc = agreement.kind==="ic_agreement";
      const [{data:tpl},{data:inst},{data:ic},{data:w}] = await Promise.all([
        client.from("agreement_templates").select("body").eq("kind",agreement.kind).maybeSingle(),
        client.from("onboarding_agreements").select("f_rate,f_start_date,f_position,f_company_name,f_employment_type,f_hours_per_week,f_schedule,countersigner_name,addendum_type,addendum_text").eq("agreement_kind",agreement.kind).maybeSingle(),
        isIc ? Promise.resolve({data:null}) : client.from("onboarding_agreements").select("f_rate,f_start_date,f_position,f_company_name,f_employment_type,f_hours_per_week,f_schedule,countersigner_name").eq("agreement_kind","ic_agreement").maybeSingle(),
        client.from("workers").select("first_name,middle_name,last_name,ph_address,hire_date").maybeSingle(),
      ]);
      if(!alive) return;
      const body = (tpl&&tpl.body) || AGREEMENT_TEXT[agreement.kind] || "";   // fallback to legacy placeholder
      // Auto-populate from the initial setup: rate/position/start-date and the
      // countersigner fall back to the IC Agreement prefill (what HR entered when
      // adding the contractor), and start-date further to the worker's hire date —
      // so every template shows the same name/dates as the admin's copy. Any
      // per-document override on this agreement still wins.
      const pick=(field)=> (inst&&inst[field]) || (ic&&ic[field]) || "";
      const merged = mergeAgreement(body, {
        contractor_name: w?fullName(w):"", rate:pick("f_rate"), monthly_rate:monthlyFromPeriod(pick("f_rate")),
        company_name:pick("f_company_name"), start_date:pick("f_start_date")||(w&&w.hire_date)||"",
        position:pick("f_position"), countersigner_name:(inst&&inst.countersigner_name)||(ic&&ic.countersigner_name)||"",
        employment_type:pick("f_employment_type"), hours_per_week:pick("f_hours_per_week"), schedule:pick("f_schedule"),
        contractor_address: w&&w.ph_address, addendum: agAddendum(inst&&inst.addendum_type, inst&&inst.addendum_text), today });
      setText(merged);
    })();
    return ()=>{ alive=false; };
  },[agreement.kind]);
  useEffect(()=>{
    if(text==null) return;
    const el = bottomRef.current; if(!el) return;
    const obs = new IntersectionObserver((entries)=>{ if(entries.some(e=>e.isIntersecting)) setReached(true); },
      { root: scrollRef.current, threshold: 0.9 });
    obs.observe(el);
    return ()=>obs.disconnect();
  },[text]);
  return (
    <div className="ob-modal-bg" role="dialog" aria-modal="true" aria-label={agreement.title}>
      <div className="ob-modal">
        <div className="ob-modal-head">
          <b>{agreement.title}</b>
          <button className="btn ghost" style={{padding:"4px 10px",fontSize:13,color:"var(--accent)",borderColor:"var(--accent)"}} onClick={close}>{t("ob.close")}</button>
        </div>
        <div className="ob-doc" ref={scrollRef} tabIndex={0}>
          {text==null ? <div className="empty">Loading…</div> : <>
            <pre style={{whiteSpace:"pre-wrap",fontFamily:"inherit",fontSize:14,lineHeight:1.5,margin:0}}>{text}</pre>
            <div ref={bottomRef} style={{height:1}}/>
          </>}
        </div>
        <div className={"ob-scrollhint "+(reached?"ok":"")} role="status" aria-live="polite">
          {reached ? t("ob.viewer.reachedend") : t("ob.viewer.scrollhint")}
        </div>
        <SignaturePad client={client} agreement={agreement} text={text||""} canSign={reached} onSigned={onSigned}/>
      </div>
    </div>
  );
}

function Stage1Agreements({ client, cfg, signed, onSigned }){
  const [openK,setOpenK]=useState(null); const [busy,setBusy]=useState(false); const [err,setErr]=useState("");
  const agreements = (cfg && cfg.agreements ? cfg.agreements.slice() : []).sort((a,b)=>(a.order||0)-(b.order||0));
  const signedSet = new Set(signed||[]);
  const nextKind = (agreements.find(a=>!signedSet.has(a.kind))||{}).kind;
  // All required agreements already signed but the flow hasn't advanced (e.g.
  // an admin reopened to Signing while the signatures still stand) — let the
  // contractor continue instead of being stuck on all-ticked Stage 1.
  const allSigned = agreements.length>0 && agreements.filter(a=>a.required!==false).every(a=>signedSet.has(a.kind));
  async function cont(){
    setBusy(true); setErr("");
    const { data, error } = await client.functions.invoke("portal-self",{body:{action:"advance_from_stage1"}});
    setBusy(false);
    if(error||(data&&data.error)){ setErr((data&&data.error)||await fnErr(error,data)); return; }
    onSigned && onSigned();
  }
  return (
    <div className="card">
      <div style={{fontWeight:700,marginBottom:4}}>{t("ob.stage1.title")}</div>
      <p className="sub" style={{marginTop:0}}>{t("ob.stage1.intro")}</p>
      {agreements.map(a=>{
        const isSigned = signedSet.has(a.kind);
        const isNext = a.kind===nextKind;
        const locked = !isSigned && !isNext;
        return (
          <div key={a.kind} className={"ob-agr "+(isSigned?"done":locked?"locked":"active")}>
            <div style={{flex:1}}>
              <div style={{fontWeight:600}}>{a.title}</div>
              <div className="sub">{isSigned ? "✓ "+t("ob.signed") : locked ? t("ob.locked") : "v"+(a.version||"1.0")}</div>
            </div>
            {isSigned ? <span className="ob-check" aria-label={t("ob.signed")}>✓</span>
              : locked ? <span className="ob-lock" aria-hidden="true">🔒</span>
              : <button className="btn" style={{padding:"8px 12px"}} onClick={()=>setOpenK(a.kind)}>{t("ob.reviewsign")}</button>}
          </div>
        );
      })}
      {allSigned && <button className="btn" style={{width:"100%",marginTop:10}} disabled={busy} onClick={cont}>
        {busy?t("ob.sign.signing"):t("ob.stage2.continue")}</button>}
      {err && <div className="err" style={{marginTop:6}}>{err}</div>}
      {openK && <AgreementViewer client={client}
        agreement={agreements.find(a=>a.kind===openK)}
        onClose={()=>setOpenK(null)}
        onSigned={()=>{ setOpenK(null); onSigned && onSigned(); }}/>}
    </div>
  );
}

function OnboardingFlow({ client, session, cfg, prog:prog0, onDone }){
  const [prog,setProg]=useState(prog0||null);

      client.from("onboarding_signatures").select("agreement_kind").eq("status","signed"),
    ]);

    setSigned((sg||[]).map(r=>r.agreement_kind));

                  background:"#fff",color:"#1F3A68",border:"2px solid #1F3A68",borderRadius:8,cursor:"pointer",boxShadow:"0 1px 2px rgba(0,0,0,.06)"}}>

      {intro && stage==="stage2_profile" && <Stage2Profile client={client} onAdvance={refresh}/>}
