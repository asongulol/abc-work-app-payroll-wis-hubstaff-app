<style>
  :root{ --bg:#f6f7f9; --card:#fff; --line:#e3e6ec; --text:#1a1d21; --muted:#6b7280;
         --accent:#1F3A68; --accent-soft:#eaf0fb; --gold:#D4A24C; --good:#0a7d3c; --warn:#b45309; --radius:12px; }
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg); color:var(--text); -webkit-text-size-adjust:100%;}
  .wrap{max-width:560px; margin:0 auto; padding:14px 14px 80px;}
  .top{position:sticky; top:0; background:var(--accent); color:#fff; padding:14px 16px;
       display:flex; align-items:center; justify-content:space-between; z-index:5;}
  .top b{font-size:16px} .top small{display:block; opacity:.85; font-weight:400; font-size:12px}
  .btn{background:var(--accent); color:#fff; border:0; border-radius:10px; padding:10px 14px;
       font-size:15px; font-weight:600; cursor:pointer;}
  .btn:disabled{opacity:.5}
  .btn.ghost{background:transparent; color:#fff; border:1px solid rgba(255,255,255,.5);}
  .btn.link{background:transparent; color:var(--accent); padding:6px; font-weight:600;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
        padding:14px; margin:12px 0;}
  .sub{color:var(--muted); font-size:13px; margin:2px 0;}
  input{width:100%; padding:12px; font-size:16px; border:1px solid var(--line); border-radius:10px; margin:6px 0;}
  .pill{display:inline-block; padding:2px 8px; border-radius:999px; font-size:11px; font-weight:600;}
  .pill.paid{background:#dcfce7; color:#166534;} .pill.pending{background:#fef3c7; color:#92400e;}
  .net{font-size:28px; font-weight:800; color:var(--accent);}
  .row{display:flex; justify-content:space-between; gap:10px; padding:4px 0; font-size:14px;}
  .row .k{color:var(--muted);}
  .tabs{position:fixed; bottom:0; left:0; right:0; display:flex; background:#fff; border-top:1px solid var(--line);}
  .tabs button{flex:1; background:none; border:0; padding:10px 4px 12px; font-size:12px; color:var(--muted); cursor:pointer;}
  .tabs button.on{color:var(--accent); font-weight:700;}
  .tabs .ic{display:block; font-size:18px; line-height:1.4;}
  .err{background:#fef2f2; border:1px solid #fecaca; color:#991b1b; border-radius:10px; padding:10px; font-size:14px; margin:8px 0;}
  .empty{color:var(--muted); text-align:center; padding:24px 8px;}
  h2{font-size:18px; margin:14px 2px 2px;}
  code{background:#f3f4f6; padding:1px 5px; border-radius:5px; font-size:13px;}

<script type="text/babel" data-type="module">
const { useState, useEffect } = React;

// Same Supabase project + anon key as the admin app. Safe to ship: RLS scopes a
// signed-in contractor to ONLY their own rows (verified), and grants nothing
// without a login. See schema/migrations/2026-05-30_contractor_portal_rls.sql.
const SUPABASE_URL  = "https://cgsidolrauzsowqlllsz.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNnc2lkb2xyYXV6c293cWxsbHN6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MDMwMzEsImV4cCI6MjA5NTM3OTAzMX0.2Z_dDcN0la3c5l2YMYWjeUejhAGZH4ROHXQtYRGWYfY";

const peso = n => (n==null||isNaN(n)) ? "—" : "₱"+Number(n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
const hrs  = s => ((Number(s||0))/3600);
const fullName = w => w ? [w.first_name,w.middle_name,w.last_name].filter(Boolean).join(" ") : "";

function useClient(){
  const [client]=useState(()=> window.__createClient ? window.__createClient(SUPABASE_URL,SUPABASE_ANON) : null);
  const [session,setSession]=useState(null);
  const [ready,setReady]=useState(false);
  useEffect(()=>{
    if(!client){ return; }
    let sub;
    client.auth.getSession().then(({data})=>{ setSession(data?.session||null); setReady(true); });
    sub=client.auth.onAuthStateChange((_e,s)=>setSession(s||null));
    return ()=>{ try{ sub?.data?.subscription?.unsubscribe(); }catch(_e){} };
  },[client]);
  return { client, session, ready };
}

function Login({ client }){
  const [email,setEmail]=useState(""); const [pw,setPw]=useState("");
  const [busy,setBusy]=useState(false); const [err,setErr]=useState(""); const [sent,setSent]=useState("");
  async function signIn(e){
    e.preventDefault(); setBusy(true); setErr(""); setSent("");
    const { error }=await client.auth.signInWithPassword({ email:email.trim().toLowerCase(), password:pw });
    if(error) setErr(error.message);
    setBusy(false);
  }
  async function reset(){
    if(!email.trim()){ setErr("Enter your email first, then tap reset."); return; }
    setErr(""); const { error }=await client.auth.resetPasswordForEmail(email.trim().toLowerCase(),
      { redirectTo: window.location.origin + window.location.pathname });
    if(error) setErr(error.message); else setSent("Password-reset email sent — check your inbox.");
  }
  return (
    <div className="wrap">
      <div style={{textAlign:"center",margin:"32px 0 8px"}}>
        <div style={{fontSize:40}}>₱</div>
        <h2 style={{margin:0}}>Contractor Portal</h2>
        <p className="sub">Sign in to view your pay, time, and documents.</p>
      </div>
      <form className="card" onSubmit={signIn}>
        <label className="sub">Email</label>
        <input type="email" autoComplete="username" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com"/>
        <label className="sub">Password</label>
        <input type="password" autoComplete="current-password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••"/>
        {err && <div className="err">{err}</div>}
        {sent && <div style={{color:"var(--good)",fontSize:14,padding:"6px 0"}}>{sent}</div>}
        <button className="btn" style={{width:"100%",marginTop:8}} disabled={busy}>{busy?"Signing in…":"Sign in"}</button>
        <div style={{textAlign:"center",marginTop:6}}>
          <button type="button" className="btn link" onClick={reset}>Forgot / set password</button>
        </div>
      </form>
      <p className="sub" style={{textAlign:"center"}}>Trouble signing in? Contact your payroll admin.</p>
    </div>
  );
}

function PaySlips({ client }){
  const [rows,setRows]=useState(null); const [open,setOpen]=useState(null); const [err,setErr]=useState("");
  useEffect(()=>{
    client.from("payments").select(
      "id,net_php,gross_php,health_allowance_php,thirteenth_month_php,pdd_lunch_php,bonus_php,"+
      "deduction_php,misc_items,fx_rate,payout_method,status,paid_at,wise_transfer_id,"+
      "worked_hours,expected_hours,performance_ratio,rate_php,"+
      "pay_periods(period_start,period_end,pay_date)")
      .then(({data,error})=>{ if(error) setErr(error.message);
        const list=(data||[]).slice().sort((a,b)=>String(b.pay_periods?.pay_date||"").localeCompare(String(a.pay_periods?.pay_date||"")));
        setRows(list); });
  },[]);
  if(err) return <div className="wrap"><div className="err">{err}</div></div>;
  if(rows===null) return <div className="wrap"><div className="empty">Loading…</div></div>;
  if(!rows.length) return <div className="wrap"><div className="empty">No pay slips yet.</div></div>;
  const paid = s => s==="sent"||s==="reconciled";
  return (
    <div className="wrap">
      <h2>Pay slips</h2>
      {rows.map(p=>{
        const pp=p.pay_periods||{}; const isOpen=open===p.id;
        const misc=Array.isArray(p.misc_items)?p.misc_items:[];
        return (
          <div className="card" key={p.id} onClick={()=>setOpen(isOpen?null:p.id)} style={{cursor:"pointer"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{fontWeight:700}}>{pp.period_start} → {pp.period_end}</div>
                <div className="sub">Pay date {pp.pay_date||"—"} · <span className={"pill "+(paid(p.status)?"paid":"pending")}>{paid(p.status)?"paid":"pending"}</span></div>
              </div>
              <div className="net">{peso(p.net_php)}</div>
            </div>
            {isOpen && <div style={{marginTop:10,borderTop:"1px solid var(--line)",paddingTop:8}}>
              {/* Hours & rate — explains how gross was derived */}
              {p.worked_hours!=null && <div className="row"><span className="k">Worked hours</span><span>{Number(p.worked_hours).toFixed(2)} h</span></div>}
              {p.expected_hours!=null && <div className="row"><span className="k">Expected hours</span><span>{Number(p.expected_hours).toFixed(2)} h</span></div>}
              {p.performance_ratio!=null && <div className="row"><span className="k">Hours ratio</span><span>{Math.round(Number(p.performance_ratio)*100)}%</span></div>}
              {p.rate_php!=null && <div className="row"><span className="k">Rate (per period)</span><span>{peso(p.rate_php)}</span></div>}
              {/* Earnings */}
              <div className="row" style={{fontWeight:600,borderTop:"1px solid var(--line)",marginTop:4,paddingTop:6}}><span>Gross pay</span><span>{peso(p.gross_php)}</span></div>
              {p.health_allowance_php>0 && <div className="row"><span className="k">Health allowance</span><span>{peso(p.health_allowance_php)}</span></div>}
              {p.thirteenth_month_php>0 && <div className="row"><span className="k">13th month</span><span>{peso(p.thirteenth_month_php)}</span></div>}
              {p.pdd_lunch_php>0 && <div className="row"><span className="k">Lunch</span><span>{peso(p.pdd_lunch_php)}</span></div>}
              {p.bonus_php>0 && <div className="row"><span className="k">Bonus</span><span>{peso(p.bonus_php)}</span></div>}
              {misc.map((m,i)=><div className="row" key={i}><span className="k">{m.label||m.kind}</span><span>{m.kind==="other_hours"?`${m.hours} h`:(m.kind==="deduction"?"−"+peso(m.amount):peso(m.amount))}</span></div>)}
              <div className="row" style={{fontWeight:700,borderTop:"1px solid var(--line)",marginTop:4,paddingTop:6}}><span>Net pay</span><span>{peso(p.net_php)}</span></div>
              {/* Payout details */}
              <div className="row" style={{borderTop:"1px solid var(--line)",marginTop:4,paddingTop:6}}><span className="k">Paid via</span><span>{p.payout_method||"—"}</span></div>
              {p.fx_rate>0 && <div className="row"><span className="k">≈ USD (reference)</span><span>${(Number(p.net_php)/Number(p.fx_rate)).toFixed(2)} <span className="sub">@ {Number(p.fx_rate).toFixed(2)}</span></span></div>}
              {p.wise_transfer_id && <div className="row"><span className="k">Wise transfer</span><span><code>{p.wise_transfer_id}</code></span></div>}
              {p.paid_at && <div className="row"><span className="k">Date sent</span><span>{String(p.paid_at).slice(0,10)}</span></div>}
            </div>}
          </div>
        );
      })}
    </div>
  );
}

function TimeView({ client }){
  const [rows,setRows]=useState(null); const [err,setErr]=useState("");
  useEffect(()=>{
    client.from("time_entries").select("work_date,tracked_seconds,pto_seconds,approval")
      .order("work_date",{ascending:false}).limit(1000)
      .then(({data,error})=>{ if(error) setErr(error.message); setRows(data||[]); });
  },[]);
  if(err) return <div className="wrap"><div className="err">{err}</div></div>;
  if(rows===null) return <div className="wrap"><div className="empty">Loading…</div></div>;
  if(!rows.length) return <div className="wrap"><div className="empty">No time recorded yet.</div></div>;
  // group by semi-monthly-ish: just by month-half via the date
  const byPeriod={};
  rows.forEach(r=>{ const d=r.work_date; const half=Number(d.slice(8,10))<=15?"01–15":"16–end"; const key=d.slice(0,7)+" "+half;
    const g=byPeriod[key]||(byPeriod[key]={key,tracked:0,pto:0,days:0}); g.tracked+=r.tracked_seconds||0; g.pto+=r.pto_seconds||0;
    if((r.tracked_seconds||0)>0||(r.pto_seconds||0)>0) g.days++; });
  const periods=Object.values(byPeriod);
  return (
    <div className="wrap">
      <h2>Time</h2>
      {periods.map(g=>(
        <div className="card" key={g.key}>
          <div style={{fontWeight:700}}>{g.key}</div>
          <div className="row"><span className="k">Worked</span><span>{hrs(g.tracked).toFixed(2)} h</span></div>
          {g.pto>0 && <div className="row"><span className="k">PTO</span><span>{hrs(g.pto).toFixed(2)} h</span></div>}
          <div className="row" style={{fontWeight:700}}><span>Total</span><span>{(hrs(g.tracked)+hrs(g.pto)).toFixed(2)} h</span></div>
        </div>
      ))}
    </div>
  );
}

function DocsView({ client, session }){
  const [rows,setRows]=useState(null); const [err,setErr]=useState(""); const [wid,setWid]=useState(null);
  const [kind,setKind]=useState("ic_agreement"); const [file,setFile]=useState(null);
  const [busy,setBusy]=useState(false); const [msg,setMsg]=useState("");
  function load(){
    client.from("workers").select("id").maybeSingle().then(({data})=>setWid(data?.id||null));
    client.from("documents").select("id,kind,title,signed_on,expires_on,storage_path,created_at")
      .order("created_at",{ascending:false})
      .then(({data,error})=>{ if(error) setErr(error.message); setRows(data||[]); });
  }
  useEffect(load,[]);
  const label=k=>({ic_agreement:"IC Agreement",w8ben:"W-8BEN",gov_id:"Government ID"}[k]||k);
  async function upload(){
    if(!file){ setMsg("Choose a file first."); return; }
    if(!wid){ setMsg("Couldn't find your profile — contact admin."); return; }
    setBusy(true); setMsg("");
    try{
      const uid=session?.user?.id;
      const path=`${uid}/${Date.now()}-${file.name.replace(/[^a-zA-Z0-9._-]/g,"_")}`;
      const up=await client.storage.from("contractor-docs").upload(path,file,{upsert:false});
      if(up.error) throw up.error;
      const ins=await client.from("documents").insert({worker_id:wid,kind,title:file.name,storage_path:path});
      if(ins.error) throw ins.error;
      setMsg("Uploaded ✓"); setFile(null); load();
    }catch(ex){ setMsg("Upload failed: "+(ex.message||ex)); }
    finally{ setBusy(false); }
  }
  async function view(d){
    if(!d.storage_path) return;
    const { data, error }=await client.storage.from("contractor-docs").createSignedUrl(d.storage_path,120);
    if(error){ setMsg("Couldn't open: "+error.message); return; }
    window.open(data.signedUrl,"_blank");
  }
  return (
    <div className="wrap">
      <h2>Documents</h2>
      <div className="card">
        <div style={{fontWeight:700,marginBottom:6}}>Upload a document</div>
        <label className="sub">Type</label>
        <select value={kind} onChange={e=>setKind(e.target.value)}
          style={{width:"100%",padding:12,fontSize:16,border:"1px solid var(--line)",borderRadius:10,margin:"6px 0"}}>
          <option value="ic_agreement">IC Agreement</option>
          <option value="w8ben">W-8BEN</option>
          <option value="gov_id">Government ID</option>
        </select>
        <input type="file" onChange={e=>setFile(e.target.files?.[0]||null)} style={{margin:"6px 0"}}/>
        {msg && <div style={{fontSize:14,padding:"4px 0",color:msg.includes("✓")?"var(--good)":"var(--accent)"}}>{msg}</div>}
        <button className="btn" style={{width:"100%"}} disabled={busy} onClick={upload}>{busy?"Uploading…":"Upload"}</button>
      </div>
      {err && <div className="err">{err}</div>}
      {rows===null ? <div className="empty">Loading…</div> :
       !rows.length ? <div className="empty">No documents on file yet.</div> :
       rows.map((d,i)=>(
        <div className="card" key={d.id||i}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontWeight:700}}>{label(d.kind)}</div>
            {d.storage_path && <button className="btn link" style={{padding:"4px 8px"}} onClick={()=>view(d)}>View</button>}
          </div>
          {d.title && <div className="sub">{d.title}</div>}
          {d.signed_on && <div className="row"><span className="k">Signed</span><span>{d.signed_on}</span></div>}
          {d.expires_on && <div className="row"><span className="k">Expires</span><span>{d.expires_on}</span></div>}
        </div>
      ))}
    </div>
  );
}

const FIELD_DEFS = [
  {k:"first_name",label:"First name"}, {k:"middle_name",label:"Middle name"}, {k:"last_name",label:"Last name"},
  {k:"mobile",label:"Mobile",type:"tel"}, {k:"ph_address",label:"PH address"}, {k:"date_of_birth",label:"Date of birth",type:"date"},
  {k:"gcash",label:"GCash"}, {k:"paymaya",label:"PayMaya"}, {k:"paypal",label:"PayPal"},
  {k:"wise_tag",label:"Wise Tag",wise:true},
  {k:"emergency_name",label:"Emergency contact name"}, {k:"emergency_relationship",label:"Emergency contact relationship"}, {k:"emergency_mobile",label:"Emergency contact mobile",type:"tel"},
  {k:"permanent_address",label:"Permanent address"}, {k:"address_landmark",label:"Landmark"}, {k:"postal_code",label:"Postal code"},
  {k:"marital_status",label:"Marital status"}, {k:"education_level",label:"Education level"}, {k:"course",label:"Course"}, {k:"year_graduated",label:"Year graduated"}, {k:"school",label:"School"},
];
function ProfileView({ client, session, onSignOut }){
  const [w,setW]=useState(null); const [editable,setEditable]=useState([]); const [form,setForm]=useState({});
  const [busy,setBusy]=useState(false); const [msg,setMsg]=useState(""); const [err,setErr]=useState("");
  function load(){
    client.from("workers").select("first_name,middle_name,last_name,email,work_email,mobile,work_number,work_extension,ph_address,date_of_birth,gcash,paymaya,paypal,wise_tag,hire_date,payout_method,emergency_name,emergency_relationship,emergency_mobile,permanent_address,address_landmark,postal_code,marital_status,education_level,course,year_graduated,school")
      .then(({data})=>{ const row=(data||[])[0]||{}; setW(row);
        setForm(Object.fromEntries(FIELD_DEFS.map(f=>[f.k,row[f.k]||""]))); });
    client.from("portal_settings").select("editable_fields").eq("id",1).maybeSingle()
      .then(({data})=>setEditable(Array.isArray(data?.editable_fields)?data.editable_fields:[]));
  }
  useEffect(load,[]);
  const isEditable=k=>editable.includes(k);
  const set=(k,v)=>setForm(x=>({...x,[k]:v}));
  async function save(){
    setBusy(true); setMsg(""); setErr("");
    const fields={};
    FIELD_DEFS.forEach(f=>{ if(isEditable(f.k) && (form[f.k]||"")!==(w[f.k]||"")) fields[f.k]=form[f.k]; });
    if(!Object.keys(fields).length){ setMsg("Nothing changed."); setBusy(false); return; }
    const {data,error}=await client.functions.invoke("portal-self",{body:{action:"update_profile",fields}});
    if(error||data?.error){ setErr((data&&data.error)||error.message); }
    else { setMsg("Saved — thank you!"); load(); }
    setBusy(false);
  }
  if(!w) return <div className="wrap"><div className="empty">Loading…</div></div>;
  const anyEditable=FIELD_DEFS.some(f=>isEditable(f.k));
  return (
    <div className="wrap">
      <h2>Profile</h2>
      <div className="card">
        <div style={{fontWeight:700,fontSize:18,marginBottom:4}}>{fullName(w)||"—"}</div>
        <div className="row"><span className="k">Personal email</span><span>{w.email||session?.user?.email||"—"}</span></div>
        {w.work_email && <div className="row"><span className="k">Work email</span><span>{w.work_email}</span></div>}
        {w.work_number && <div className="row"><span className="k">Work number</span><span>{w.work_number}{w.work_extension?` ext. ${w.work_extension}`:""}</span></div>}
        <div className="row"><span className="k">Engaged since</span><span>{w.hire_date||"—"}</span></div>
        <div className="row"><span className="k">Paid via</span><span>{w.payout_method||"—"}</span></div>
      </div>
      <div className="card">
        <div style={{fontWeight:700,marginBottom:6}}>Your details</div>
        <p className="sub" style={{marginTop:0}}>{anyEditable
          ? "Update your info and Save. Fields shown as plain text are managed by payroll."
          : "Editing is currently turned off by your payroll admin."}</p>
        {FIELD_DEFS.map(f=>(
          <div key={f.k} style={{margin:"8px 0"}}>
            <label className="sub" style={{display:"block"}}>{f.label}</label>
            {isEditable(f.k)
              ? <input type={f.type||"text"} value={form[f.k]||""} onChange={e=>set(f.k,e.target.value)} placeholder={f.wise?"@yourtag":""}/>
              : <div style={{padding:"6px 0",fontSize:15}}>{w[f.k]||<span className="sub">—</span>}</div>}
            {f.wise && isEditable("wise_tag") &&
              <a href="https://wise.com/invite/dic/olivert410" target="_blank" rel="noreferrer"
                 style={{fontSize:13,color:"var(--accent)",fontWeight:600,display:"inline-block",marginTop:2}}>Don't have a Wise account? Set one up →</a>}
          </div>
        ))}
        {anyEditable && <>
          {err && <div className="err">{err}</div>}
          {msg && <div style={{color:"var(--good)",fontSize:14,padding:"4px 0"}}>{msg}</div>}
          <button className="btn" style={{width:"100%",marginTop:8}} disabled={busy} onClick={save}>{busy?"Saving…":"Save changes"}</button>
        </>}
      </div>
      <p className="sub">Questions about your pay? Contact your payroll admin.</p>
      <button className="btn ghost" style={{width:"100%",color:"var(--accent)",borderColor:"var(--accent)"}} onClick={onSignOut}>Sign out</button>
    </div>
  );
}

// PHT (Asia/Manila) wall-clock parts, independent of the device time zone.
function phtParts(){
  const now=new Date();
  const hour=Number(new Intl.DateTimeFormat("en-US",{timeZone:"Asia/Manila",hour:"numeric",hour12:false}).format(now));
  const clock=new Intl.DateTimeFormat("en-US",{timeZone:"Asia/Manila",weekday:"short",month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}).format(now);
  return {hour,clock};
}
// current semi-monthly period (1–15 → paid month-end; 16–end → paid 15th next month)
function curPeriod(){
  const s=new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Manila",year:"numeric",month:"2-digit",day:"2-digit"}).format(new Date());
  const [y,m,d]=s.split("-").map(Number);
  const lastDay=new Date(y,m,0).getDate();
  const iso=dd=>`${y}-${String(m).padStart(2,"0")}-${String(dd).padStart(2,"0")}`;
  if(d<=15) return {start:iso(1),end:iso(15),pay:`${y}-${String(m).padStart(2,"0")}-${String(lastDay).padStart(2,"0")}`};
  const ny=m===12?y+1:y, nm=m===12?1:m+1;
  return {start:iso(16),end:iso(lastDay),pay:`${ny}-${String(nm).padStart(2,"0")}-15`};
}
function Home({ client, session }){
  const [w,setW]=useState(null); const [billable,setBillable]=useState(null);
  const [latest,setLatest]=useState(undefined); const [anns,setAnns]=useState(null); const [moodMsg,setMoodMsg]=useState("");
  const per=curPeriod(); const {hour,clock}=phtParts();
  const greetEN=hour<12?"Good morning":hour<18?"Good afternoon":"Good evening";
  const greetTL=hour<12?"Magandang umaga":hour<18?"Magandang hapon":"Magandang gabi";
  useEffect(()=>{
    client.from("workers").select("id,first_name").maybeSingle().then(({data})=>setW(data||{}));
    client.from("time_entries").select("tracked_seconds,pto_seconds").gte("work_date",per.start).lte("work_date",per.end)
      .then(({data})=>setBillable((data||[]).reduce((s,r)=>s+(r.tracked_seconds||0)+(r.pto_seconds||0),0)/3600));
    client.from("payments").select("net_php,status,pay_periods(pay_date)")
      .then(({data})=>{ const l=(data||[]).slice().sort((a,b)=>String(b.pay_periods?.pay_date||"").localeCompare(String(a.pay_periods?.pay_date||""))); setLatest(l[0]||null); });
    client.from("announcements").select("title,body,published_at").eq("active",true).order("published_at",{ascending:false}).limit(5)
      .then(({data})=>setAnns(data||[]));
  },[]);  // eslint-disable-line
  async function logMood(m){
    setMoodMsg(""); const wid=w?.id; if(!wid){ setMoodMsg("Loading your profile…"); return; }
    const {error}=await client.from("mood_checkins").insert({worker_id:wid,mood:m});
    setMoodMsg(error?("Couldn't save: "+error.message):"Thanks for checking in 💙");
  }
  const paid=s=>s==="sent"||s==="reconciled";
  return (
    <div className="wrap">
      <div style={{margin:"6px 2px 4px"}}>
        <div style={{fontSize:13,color:"var(--muted)"}}>{clock} · PHT</div>
        <h2 style={{margin:"2px 0"}}>{greetTL}{w?.first_name?`, ${w.first_name}`:""} 👋</h2>
        <div className="sub">{greetEN} — here's your day.</div>
      </div>
      <div className="card" style={{borderTop:"3px solid var(--accent)"}}>
        <div style={{fontWeight:700,marginBottom:6}}>This pay period</div>
        <div className="row"><span className="k">Period</span><span>{per.start} → {per.end}</span></div>
        <div className="row"><span className="k">Billable hours so far</span><span><b>{billable==null?"…":billable.toFixed(2)} h</b></span></div>
        <div className="row"><span className="k">Next pay date</span><span>{per.pay}</span></div>
        {latest && <div className="row" style={{borderTop:"1px solid var(--line)",marginTop:4,paddingTop:6}}>
          <span className="k">Last pay</span><span>{peso(latest.net_php)} · <span className={"pill "+(paid(latest.status)?"paid":"pending")}>{paid(latest.status)?"paid":"pending"}</span></span></div>}
      </div>
      <h2 style={{color:"var(--accent)"}}>From New York</h2>
      {anns===null?<div className="empty">Loading…</div>: !anns.length?<div className="empty">No announcements right now.</div>:
        anns.map((a,i)=>(
          <div className="card" key={i} style={{borderLeft:"4px solid var(--gold)"}}>
            <div style={{fontWeight:700}}>{a.title}</div>
            <div className="sub">{String(a.published_at).slice(0,10)}</div>
            {a.body && <div style={{fontSize:14,marginTop:4,whiteSpace:"pre-wrap"}}>{a.body}</div>}
          </div>
        ))}
      <div className="card">
        <div style={{fontWeight:700,marginBottom:4}}>How are you feeling today?</div>
        <div style={{display:"flex",gap:10,fontSize:28}}>
          {["😞","😕","🙂","😀","🤩"].map((e,i)=><span key={i} onClick={()=>logMood(i+1)} style={{cursor:"pointer"}} role="button" aria-label={"mood "+(i+1)}>{e}</span>)}
        </div>
        {moodMsg && <div className="sub" style={{marginTop:6,color:"var(--good)"}}>{moodMsg}</div>}
      </div>
    </div>
  );
}

function Portal({ client, session }){
  const [tab,setTab]=useState("home");
  const signOut=()=>client.auth.signOut();
  return (
    <div>
      <div className="top">
        <div><b>My Pay</b><small>{session?.user?.email}</small></div>
        <button className="btn ghost" style={{padding:"6px 10px",fontSize:13}} onClick={signOut}>Sign out</button>
      </div>
      {tab==="home" && <Home client={client} session={session}/>}
      {tab==="pay"  && <PaySlips client={client}/>}
      {tab==="time" && <TimeView client={client}/>}
      {tab==="docs" && <DocsView client={client} session={session}/>}
      {tab==="me"   && <ProfileView client={client} session={session} onSignOut={signOut}/>}
      <div className="tabs">
        <button className={tab==="home"?"on":""} onClick={()=>setTab("home")}><span className="ic">🏠</span>Home</button>
        <button className={tab==="pay"?"on":""}  onClick={()=>setTab("pay")}><span className="ic">₱</span>Pay slips</button>
        <button className={tab==="time"?"on":""} onClick={()=>setTab("time")}><span className="ic">⏱</span>Time</button>
        <button className={tab==="docs"?"on":""} onClick={()=>setTab("docs")}><span className="ic">📄</span>Docs</button>
        <button className={tab==="me"?"on":""}   onClick={()=>setTab("me")}><span className="ic">👤</span>Profile</button>
      </div>
    </div>
  );
}

function App(){
  const { client, session, ready } = useClient();
  if(!client) return <div className="wrap"><div className="empty">Loading…</div></div>;
  if(!ready)  return <div className="wrap"><div className="empty">Loading…</div></div>;
  if(!session) return <Login client={client}/>;
  return <Portal client={client} session={session}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
