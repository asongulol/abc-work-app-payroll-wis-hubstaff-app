// supabase-js v2: on a non-2xx response `data` is null and the server's JSON
// body is on error.context (a Response). Pull the real {error} message out.
async function fnErr(error, data){
  if(data && data.error) return data.error;
  try { const j = await error.context.json(); if(j && j.error) return j.error; } catch(_e){}
  return (error && error.message) || "Something went wrong — please try again.";
}
// age as of today in Asia/Manila — mirrors the server's ageManila exactly so the
// 18+ check can't disagree across the midnight-PHT boundary.
function ageManila(dobStr){
  const p=String(dobStr).slice(0,10).split("-").map(Number); const y=p[0],m=p[1],d=p[2];
  if(!y||!m||!d) return null;
  const today=new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Manila",year:"numeric",month:"2-digit",day:"2-digit"}).format(new Date());
  const tp=today.split("-").map(Number); let a=tp[0]-y; if(tp[1]<m||(tp[1]===m&&tp[2]<d))a--; return a;
}

// best-effort SHA-256 + device fingerprint (never throw — capture is best-effort, §6.8)
async function sha256Hex(str){
  try{
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str||""));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
  }catch(_e){ return null; }
}
function deviceFingerprint(){
  try{
    const n = navigator;
    return [n.userAgent, n.language, (n.languages||[]).join(","), (screen.width+"x"+screen.height), new Date().getTimezoneOffset()].join("|");
  }catch(_e){ return null; }
}

// progress: each stage = 1/3; within a stage, tasks are equal-weight.
function overallPct(prog, cfg, signedCount){
  const nAgr = (cfg && cfg.agreements && cfg.agreements.length) || 4;
  const s1 = prog && prog.stage1_complete ? 1 : Math.min(1, (signedCount||0)/nAgr);
  const s2 = prog && prog.stage2_complete ? 1 : 0;
  const s3 = prog && prog.stage3_complete ? 1 : 0;
  return Math.round((s1+s2+s3)/3*100);
}
function stepOf(prog){
  const st = (prog && prog.current_stage) || "stage1_sign";
  return st==="stage1_sign" ? 1 : st==="stage2_profile" ? 2 : 3;
}

function useClient(){
  const [client]=useState(()=> window.__createClient ? window.__createClient(SUPABASE_URL,SUPABASE_ANON) : null);
  const [session,setSession]=useState(null);
  const [ready,setReady]=useState(false);
  useEffect(()=>{
    if(!client){ return; }
    let sub;
    client.auth.getSession().then(({data})=>{ setSession(data?.session||null); setReady(true); });
    sub=client.auth.onAuthStateChange((_e,s)=>setSession(s||null));
    return ()=>{ try{ sub?.data?.subscription?.unsubscribe(); }catch(_e){} };
  },[client]);
  return { client, session, ready };
}

function Login({ client }){
  const [email,setEmail]=useState(""); const [pw,setPw]=useState("");
  const [busy,setBusy]=useState(false); const [err,setErr]=useState(""); const [sent,setSent]=useState("");
  async function signIn(e){
    e.preventDefault(); setBusy(true); setErr(""); setSent("");
    const { error }=await client.auth.signInWithPassword({ email:email.trim().toLowerCase(), password:pw });
    if(error) setErr(error.message);
    setBusy(false);
  }
  async function reset(){
    if(!email.trim()){ setErr("Enter your email first, then tap reset."); return; }
    setErr(""); const { error }=await client.auth.resetPasswordForEmail(email.trim().toLowerCase(),
      { redirectTo: window.location.origin + window.location.pathname });
    if(error) setErr(error.message); else setSent("Password-reset email sent — check your inbox.");
  }
  return (
    <div className="wrap">
      <div style={{textAlign:"center",margin:"32px 0 8px"}}>
        <img src="logo.png" alt="Aaron Anderson EHS LLC" onError={e=>{e.currentTarget.style.display="none";}}
          style={{maxWidth:200,width:"70%",margin:"0 auto 10px",display:"block"}}/>
        <h2 style={{margin:0}}>Contractor Portal</h2>
        <p className="sub">Sign in to view your pay, time, and documents.</p>
      </div>
      <form className="card" onSubmit={signIn}>
        <label className="sub">Email</label>
        <input type="email" autoComplete="username" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com"/>
        <label className="sub">Password</label>
        <input type="password" autoComplete="current-password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••"/>
        {err && <div className="err">{err}</div>}
        {sent && <div style={{color:"var(--good)",fontSize:14,padding:"6px 0"}}>{sent}</div>}
        <button className="btn" style={{width:"100%",marginTop:8}} disabled={busy}>{busy?"Signing in…":"Sign in"}</button>
        <div style={{textAlign:"center",marginTop:6}}>
          <button type="button" className="btn link" onClick={reset}>Forgot / set password</button>
        </div>
      </form>
      <p className="sub" style={{textAlign:"center"}}>Trouble signing in? Contact your payroll admin.</p>
    </div>
  );
}

function PaySlips({ client }){
  const [rows,setRows]=useState(null); const [open,setOpen]=useState(null); const [err,setErr]=useState("");
  useEffect(()=>{
    client.from("payments").select(
      "id,net_php,gross_php,health_allowance_php,thirteenth_month_php,pdd_lunch_php,bonus_php,"+
      "deduction_php,misc_items,fx_rate,payout_method,status,paid_at,wise_transfer_id,"+
      "worked_hours,expected_hours,performance_ratio,rate_php,"+
      "pay_periods(period_start,period_end,pay_date)")
      .then(({data,error})=>{ if(error) setErr(error.message);
        const list=(data||[]).slice().sort((a,b)=>String(b.pay_periods?.pay_date||"").localeCompare(String(a.pay_periods?.pay_date||"")));
        setRows(list); });
  },[]);
  if(err) return <div className="wrap"><div className="err">{err}</div></div>;
  if(rows===null) return <div className="wrap"><div className="empty">Loading…</div></div>;
  if(!rows.length) return <div className="wrap"><div className="empty">No pay slips yet.</div></div>;
  const paid = s => s==="sent"||s==="reconciled";
  return (
    <div className="wrap">
      <h2>Pay slips</h2>
      {rows.map(p=>{
        const pp=p.pay_periods||{}; const isOpen=open===p.id;

              {/* Hours & rate — explains how gross was derived */}
              {p.worked_hours!=null && <div className="row"><span className="k">Worked hours</span><span>{Number(p.worked_hours).toFixed(2)} h</span></div>}
              {p.expected_hours!=null && <div className="row"><span className="k">Expected hours</span><span>{Number(p.expected_hours).toFixed(2)} h</span></div>}
              {p.performance_ratio!=null && <div className="row"><span className="k">Hours ratio</span><span>{Math.round(Number(p.performance_ratio)*100)}%</span></div>}
              {p.rate_php!=null && <div className="row"><span className="k">Rate (per period)</span><span>{peso(p.rate_php)}</span></div>}
              {/* Earnings */}
              <div className="row" style={{fontWeight:600,borderTop:"1px solid var(--line)",marginTop:4,paddingTop:6}}><span>Gross pay</span><span>{peso(p.gross_php)}</span></div>
              {p.health_allowance_php>0 && <div className="row"><span className="k">Health allowance</span><span>{peso(p.health_allowance_php)}</span></div>}
              {p.thirteenth_month_php>0 && <div className="row"><span className="k">13th month</span><span>{peso(p.thirteenth_month_php)}</span></div>}
              {p.pdd_lunch_php>0 && <div className="row"><span className="k">Lunch</span><span>{peso(p.pdd_lunch_php)}</span></div>}
              {p.bonus_php>0 && <div className="row"><span className="k">Bonus</span><span>{peso(p.bonus_php)}</span></div>}
              {misc.map((m,i)=><div className="row" key={i}><span className="k">{m.label||m.kind}</span><span>{m.kind==="other_hours"?`${m.hours} h`:(m.kind==="deduction"?"−"+peso(m.amount):peso(m.amount))}</span></div>)}
              <div className="row" style={{fontWeight:700,borderTop:"1px solid var(--line)",marginTop:4,paddingTop:6}}><span>Net pay</span><span>{peso(p.net_php)}</span></div>

// PHT (Asia/Manila) wall-clock parts, independent of the device time zone.
function phtParts(){
  const now=new Date();
  const hour=Number(new Intl.DateTimeFormat("en-US",{timeZone:"Asia/Manila",hour:"numeric",hour12:false}).format(now));
  const clock=new Intl.DateTimeFormat("en-US",{timeZone:"Asia/Manila",weekday:"short",month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}).format(now);
  return {hour,clock};
}
// current semi-monthly period (1–15 → paid month-end; 16–end → paid 15th next month)
function curPeriod(){
  const s=new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Manila",year:"numeric",month:"2-digit",day:"2-digit"}).format(new Date());
  const [y,m,d]=s.split("-").map(Number);
  const lastDay=new Date(y,m,0).getDate();
  const iso=dd=>`${y}-${String(m).padStart(2,"0")}-${String(dd).padStart(2,"0")}`;
  if(d<=15) return {start:iso(1),end:iso(15),pay:`${y}-${String(m).padStart(2,"0")}-${String(lastDay).padStart(2,"0")}`};
  const ny=m===12?y+1:y, nm=m===12?1:m+1;
  return {start:iso(16),end:iso(lastDay),pay:`${ny}-${String(nm).padStart(2,"0")}-15`};
}

// Post-onboarding login reminder: nags a contractor (who's already in the
// portal) to upload any outstanding onboarding documents. Only shows for
// contractors actually engaged in the doc process (>=1 onboarding doc uploaded)
// so grandfathered contractors are never bothered. "Outstanding" = missing or
// sent-back (needs_replacement); a pending upload stops the nag.
function OnboardingDocReminder({ client, session }){
  const [wid,setWid]=useState(null); const [docs,setDocs]=useState(null); const [cfg,setCfg]=useState(null); const [open,setOpen]=useState(false);
  function load(){
    client.from("workers").select("id").maybeSingle().then(({data})=>setWid(data&&data.id||null));
    client.from("documents").select("id,kind,side,title,storage_path,review_status,review_reason,created_at")
      .order("created_at",{ascending:false}).then(({data})=>setDocs(data||[]));
    client.from("portal_settings").select("onboarding_config").eq("id",1).maybeSingle()
      .then(({data})=>setCfg((data&&data.onboarding_config)||{}));
  }
  useEffect(load,[]);
  if(docs===null||cfg===null) return null;
  const ONB_KINDS=["resume","diploma","nbi_clearance","gov_id"];
  const DEFAULT_DOCS=[{kind:"resume",title:"Resume / CV",required:true},{kind:"diploma",title:"Diploma or Transcript of Records",required:true},{kind:"nbi_clearance",title:"NBI Clearance",required:true,freshness_months:6},{kind:"gov_id",title:"Government-issued ID or Passport",required:true,sides:["front","back"]}];
  const cfgDocs=(Array.isArray(cfg.documents)&&cfg.documents.length)?cfg.documents:DEFAULT_DOCS;
  const byKey={}; (docs||[]).forEach(d=>{ const k=d.kind+"|"+(d.side||""); (byKey[k]=byKey[k]||[]).push(d); });
  const latest=(kind,side)=>{ const a=byKey[kind+"|"+(side||"")]; return a&&a[0]; };
  const engaged=(docs||[]).some(d=>ONB_KINDS.includes(d.kind));
  const slots=[];
  cfgDocs.forEach(d=>{
    const optional=d.required===false;
    if(Array.isArray(d.sides)) d.sides.forEach(side=>slots.push({kind:d.kind,side,label:d.title+" ("+side+")",optional}));
    else slots.push({kind:d.kind,side:null,label:d.title,optional});
  });
  const outstanding=slots.filter(s=>{ const l=latest(s.kind,s.side); return !l || l.review_status==="needs_replacement"; });
  if(!engaged || !outstanding.length) return null;
  const anyBounced=outstanding.some(s=>{ const l=latest(s.kind,s.side); return l&&l.review_status==="needs_replacement"; });
  return (
    <div className="card" style={{borderLeft:"4px solid var(--gold)"}}>
      <div style={{fontWeight:700,marginBottom:2}}>📄 {outstanding.length} document{outstanding.length>1?"s":""} still needed</div>
      <p className="sub" style={{marginTop:0}}>Please upload these so HR can finish your file.{anyBounced?" Some were sent back for a replacement — see the reason below.":""}</p>
      {!open
        ? <button className="btn" style={{width:"100%"}} onClick={()=>setOpen(true)}>Upload documents</button>
        : <div>{outstanding.map(s=>(
            <UploadSlot key={s.kind+(s.side||"")} client={client} session={session} wid={wid} slot={s} doc={latest(s.kind,s.side)} onChange={load}/>
          ))}</div>}
    </div>
  );
}

// Live two-zone world clock: Philippine Time + New York Time, re-rendered
// every 20s so the minutes stay current.
function WorldClock(){
  const [,tick]=useState(0);
  useEffect(()=>{ const id=setInterval(()=>tick(t=>t+1),20000); return ()=>clearInterval(id); },[]);
  const fmt=(tz)=>new Intl.DateTimeFormat("en-US",{timeZone:tz,hour:"numeric",minute:"2-digit",hour12:true}).format(new Date());
  const day=(tz)=>new Intl.DateTimeFormat("en-US",{timeZone:tz,weekday:"short",month:"short",day:"numeric"}).format(new Date());

    <div style={{flex:1,textAlign:"center"}}>
      <div className="sub" style={{margin:0,fontSize:12}}>{flag} {label}</div>
      <div style={{fontWeight:800,fontSize:20,color:accent?"var(--accent)":"var(--text)"}}>{fmt(tz)}</div>
      <div className="sub" style={{margin:0,fontSize:11}}>{day(tz)}</div>

  );
  return (
    <div className="card" style={{display:"flex",alignItems:"center",gap:8,padding:"12px 14px"}}>
      <Z flag="🇵🇭" label="Manila" tz="Asia/Manila"/>
      <div style={{width:1,alignSelf:"stretch",background:"var(--line)"}}/>

}

      .then(({data})=>setAnns(data||[]));
  },[]);  // eslint-disable-line
  // Decide whether to show the mood pop-out, and which one:
  //   START ("How are you feeling today?")  — within 2h after shift start
  //   END   ("Tell me how your day went?")  — within 2h after shift end
  // De-dupe per shift by looking back 16h (handles overnight US-hours shifts,
  // where start/end straddle midnight PHT). No shift set => generic once-per-
  // ~day start check-in so it still works before an admin enters a schedule.
  useEffect(()=>{
    const wid=w&&w.id; if(!wid) return;
    const phDate=new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Manila"}).format(new Date());
    // sessionStorage guard: once a kind is answered today, don't reappear on
    // refresh within this session (covers the gap before the DB write commits).
    const ssDone=(k)=>{ try{ return sessionStorage.getItem(`mood:${k}:${phDate}`)==="1"; }catch{ return false; } };
    const phHM=new Intl.DateTimeFormat("en-GB",{timeZone:"Asia/Manila",hour12:false,hour:"2-digit",minute:"2-digit"}).format(new Date());
    const [hh,mm]=phHM.split(":").map(Number); const nowMin=hh*60+mm;
    const parse=(t)=>{ if(!t) return null; const [a,b]=String(t).split(":").map(Number); return (a||0)*60+(b||0); };
    const start=parse(w.shift_start), end=parse(w.shift_end);
    const sinceIso=new Date(Date.now()-16*3600*1000).toISOString();
    client.from("mood_checkins").select("kind,created_at").eq("worker_id",wid).gte("created_at",sinceIso)
      .then(({data})=>{
        const recent=data||[];
        const hasStart=recent.some(r=>r.kind==="start")||ssDone("start");
        const hasEnd  =recent.some(r=>r.kind==="end")  ||ssDone("end");
        if(start!=null && end!=null){
          const afterStart=(nowMin-start+1440)%1440, afterEnd=(nowMin-end+1440)%1440;
          if(afterStart<=120 && !hasStart){ setMoodPrompt({kind:"start"}); return; }
          if(afterEnd<=120   && !hasEnd)  { setMoodPrompt({kind:"end"});   return; }
          setMoodPrompt(null); return;
        }
        // No shift configured -> fall back to a single check-in on first open of
        // the day ("start"), de-duped so it doesn't reappear on every refresh.
        setMoodPrompt((recent.length || hasStart) ? null : {kind:"start"});

    if(wid){ const { error }=await client.from("mood_checkins").insert({worker_id:wid,mood:m,kind});   // mood = 1..5 Likert
      if(error) console.error("mood check-in failed:", error.message); }   // surfaced in DevTools if RLS/insert ever fails
  }
  const paid=s=>s==="sent"||s==="reconciled";
  return (
    <div className="wrap">
      <div style={{margin:"6px 2px 4px"}}>
        <div style={{fontSize:13,color:"var(--muted)"}}>{clock} · PHT</div>
        <h2 style={{margin:"2px 0"}}>{greetTL}{greetName?`, ${greetName}`:""} 👋</h2>
        <div className="sub">{greetEN} — here's your day.</div>
      </div>
      <WorldClock/>
      <OnboardingDocReminder client={client} session={session}/>
      <div className="card" style={{borderTop:"3px solid var(--accent)"}}>
        <div style={{fontWeight:700,marginBottom:6}}>This pay period</div>
        <div className="row"><span className="k">Period</span><span>{per.start} → {per.end}</span></div>
        <div className="row"><span className="k">Billable hours so far</span><span><b>{billable==null?"…":billable.toFixed(2)} h</b></span></div>
        <div className="row"><span className="k">Next pay date</span><span>{per.pay}</span></div>
        {latest && <div className="row" style={{borderTop:"1px solid var(--line)",marginTop:4,paddingTop:6}}>
          <span className="k">Last pay</span><span>{peso(latest.net_php)} · <span className={"pill "+(paid(latest.status)?"paid":"pending")}>{paid(latest.status)?"paid":"pending"}</span></span></div>}
      </div>
      <h2 style={{color:"var(--accent)"}}>From New York</h2>
      <NyWeather/>
      <NyTrivia/>
      {anns===null?<div className="empty">Loading…</div>: !anns.length?<div className="empty">No announcements right now.</div>:
        anns.map((a,i)=>(
          <div className="card" key={i} style={{borderLeft:"4px solid var(--gold)"}}>
            <div style={{fontWeight:700}}>{a.title}</div>
            <div className="sub">{String(a.published_at).slice(0,10)}</div>
            {a.body && <div style={{fontSize:14,marginTop:4,whiteSpace:"pre-wrap"}}>{a.body}</div>}
          </div>
        ))}
      <QuickLinks/>
      {moodPrompt && (
        <div role="dialog" aria-modal="true" aria-label="Shift mood check-in"
          style={{position:"fixed",inset:0,background:"rgba(15,28,51,.55)",display:"flex",alignItems:"center",justifyContent:"center",padding:20,zIndex:60}}>
          <div className="card" style={{maxWidth:360,width:"100%",textAlign:"center",margin:0}}>
            <div style={{fontWeight:800,fontSize:17,marginBottom:2}}>{moodPrompt.kind==="end"?"Tell me how your day went?":"How are you feeling today?"}</div>
            <div className="sub" style={{marginTop:0,marginBottom:12}}>Tap an emoji to continue.</div>
            <div style={{display:"flex",gap:12,fontSize:36,justifyContent:"center"}}>
              {["😞","😕","🙂","😀","🤩"].map((e,i)=><span key={i} onClick={()=>logMood(i+1)} style={{cursor:"pointer"}} role="button" aria-label={"mood "+(i+1)}>{e}</span>)}

function SignaturePad({ client, agreement, text, canSign, onSigned }){
  const [mode,setMode]=useState("type"); const [name,setName]=useState("");
  const [consent,setConsent]=useState(false); const [busy,setBusy]=useState(false);
  const [err,setErr]=useState(""); const [drawn,setDrawn]=useState(false);
  const canvasRef = React.useRef(null);
  useEffect(()=>{ client.from("workers").select("first_name,middle_name,last_name").maybeSingle()
    .then(({data})=>{ if(data) setName(fullName(data)); }); },[]);
  useEffect(()=>{
    if(mode!=="draw") return;
    const c = canvasRef.current; if(!c) return;
    const ctx = c.getContext("2d"); ctx.lineWidth=2.2; ctx.lineCap="round"; ctx.strokeStyle="#1F3A68";
    let drawing=false;
    const pos=(e)=>{ const r=c.getBoundingClientRect(); const p=e.touches?e.touches[0]:e;
      return [ (p.clientX-r.left)*(c.width/r.width), (p.clientY-r.top)*(c.height/r.height) ]; };
    const down=(e)=>{ drawing=true; const [x,y]=pos(e); ctx.beginPath(); ctx.moveTo(x,y); e.preventDefault(); };
    const move=(e)=>{ if(!drawing) return; const [x,y]=pos(e); ctx.lineTo(x,y); ctx.stroke(); setDrawn(true); e.preventDefault(); };
    const up=()=>{ drawing=false; };
    c.addEventListener("mousedown",down); c.addEventListener("mousemove",move); window.addEventListener("mouseup",up);
    c.addEventListener("touchstart",down,{passive:false}); c.addEventListener("touchmove",move,{passive:false}); window.addEventListener("touchend",up);
    return ()=>{ c.removeEventListener("mousedown",down); c.removeEventListener("mousemove",move); window.removeEventListener("mouseup",up);
      c.removeEventListener("touchstart",down); c.removeEventListener("touchmove",move); window.removeEventListener("touchend",up); };
  },[mode]);
  function clearCanvas(){ const c=canvasRef.current; if(c){ c.getContext("2d").clearRect(0,0,c.width,c.height); setDrawn(false); } }
  async function doSign(){
    setErr("");
    if(!canSign){ setErr(t("ob.err.scroll")); return; }
    if(!name.trim()){ setErr(t("ob.err.name")); return; }
    if(!consent){ setErr(t("ob.err.consent")); return; }
    let signature_data = name.trim();
    if(mode==="draw"){ if(!drawn){ setErr(t("ob.err.draw")); return; } signature_data = canvasRef.current.toDataURL("image/png"); }
    setBusy(true);
    const doc_sha256 = await sha256Hex(text);
    const { data, error } = await client.functions.invoke("portal-sign", { body: {
      action:"sign", agreement_kind:agreement.kind, doc_version:agreement.version||"1.0",
      doc_sha256, signed_legal_name:name.trim(), signature_method:(mode==="draw"?"drawn":"typed"),
      signature_data, scrolled_to_end:true, device_fingerprint:deviceFingerprint(),
    }});
    setBusy(false);
    if(error||(data&&data.error)){ setErr(await fnErr(error,data)); return; }
    onSigned && onSigned();
  }
  const ghost = { color:"var(--accent)", borderColor:"var(--accent)" };
  return (
    <div className="ob-sign">
      <div style={{display:"flex",gap:6,marginBottom:8}}>
        <button className={"btn ob-toggle "+(mode==="type"?"":"ghost")} style={mode==="type"?{}:ghost} onClick={()=>setMode("type")}>{t("ob.sign.type")}</button>
        <button className={"btn ob-toggle "+(mode==="draw"?"":"ghost")} style={mode==="draw"?{}:ghost} onClick={()=>setMode("draw")}>{t("ob.sign.draw")}</button>
      </div>
      <label className="sub" style={{display:"block"}}>{t("ob.sign.legalname")}</label>
      <input value={name} onChange={e=>setName(e.target.value)} aria-label={t("ob.sign.legalname")} />
      {mode==="draw" && <div style={{margin:"6px 0"}}>
        <canvas ref={canvasRef} width={520} height={120} className="ob-canvas" aria-label="Signature drawing area"/>
        <button className="btn link" onClick={clearCanvas} style={{padding:"4px 0"}}>{t("ob.sign.clear")}</button>
      </div>}
      <label className="ob-consent">
        <input type="checkbox" checked={consent} onChange={e=>setConsent(e.target.checked)} />
        <span>{t("ob.sign.consent")}</span>
      </label>
      {err && <div className="err">{err}</div>}
      <button className="btn" style={{width:"100%",marginTop:4}} disabled={busy||!canSign||!consent||!name.trim()} onClick={doSign}>
        {busy ? t("ob.sign.signing") : t("ob.sign.button")}
      </button>
    </div>
  );
}

// Fill {{merge}} fields in an agreement body from the prepared instance + worker.
function mergeAgreement(body, vals){
  const v = vals||{};
  const sub = { contractor_name:v.contractor_name||"", rate:v.rate||"________",
    start_date:v.start_date||"________", position:v.position||"________",
    countersigner_name:v.countersigner_name||"________", today:v.today||"" };
  return String(body||"").replace(/\{\{\s*(\w+)\s*\}\}/g, (m,k)=> (k in sub ? sub[k] : m));
}
function AgreementViewer({ client, agreement, onClose, onSigned }){
  const [reached,setReached]=useState(false);
  const [text,setText]=useState(null);   // null = loading
  const scrollRef = React.useRef(null); const bottomRef = React.useRef(null);
  useEffect(()=>{
    let alive=true;
    (async()=>{
      const today=new Intl.DateTimeFormat("en-CA",{timeZone:"Asia/Manila",year:"numeric",month:"2-digit",day:"2-digit"}).format(new Date());
      const [{data:tpl},{data:inst},{data:w}] = await Promise.all([
        client.from("agreement_templates").select("body").eq("kind",agreement.kind).maybeSingle(),
        client.from("onboarding_agreements").select("f_rate,f_start_date,f_position,countersigner_name").eq("agreement_kind",agreement.kind).maybeSingle(),
        client.from("workers").select("first_name,middle_name,last_name").maybeSingle(),
      ]);
      if(!alive) return;
      const body = (tpl&&tpl.body) || AGREEMENT_TEXT[agreement.kind] || "";   // fallback to legacy placeholder
      const merged = mergeAgreement(body, {
        contractor_name: w?fullName(w):"", rate:inst&&inst.f_rate, start_date:inst&&inst.f_start_date,
        position:inst&&inst.f_position, countersigner_name:inst&&inst.countersigner_name, today });
      setText(merged);
    })();
    return ()=>{ alive=false; };
  },[agreement.kind]);
  useEffect(()=>{
    if(text==null) return;
    const el = bottomRef.current; if(!el) return;
    const obs = new IntersectionObserver((entries)=>{ if(entries.some(e=>e.isIntersecting)) setReached(true); },
      { root: scrollRef.current, threshold: 0.9 });
    obs.observe(el);
    return ()=>obs.disconnect();
  },[text]);
  return (
    <div className="ob-modal-bg" role="dialog" aria-modal="true" aria-label={agreement.title}>
      <div className="ob-modal">
        <div className="ob-modal-head">
          <b>{agreement.title}</b>
          <button className="btn ghost" style={{padding:"4px 10px",fontSize:13,color:"var(--accent)",borderColor:"var(--accent)"}} onClick={onClose}>{t("ob.close")}</button>
        </div>
        <div className="ob-doc" ref={scrollRef} tabIndex={0}>
          {text==null ? <div className="empty">Loading…</div> : <>
            <pre style={{whiteSpace:"pre-wrap",fontFamily:"inherit",fontSize:14,lineHeight:1.5,margin:0}}>{text}</pre>
            <div ref={bottomRef} style={{height:1}}/>
          </>}
        </div>
        <div className={"ob-scrollhint "+(reached?"ok":"")} role="status" aria-live="polite">
          {reached ? t("ob.viewer.reachedend") : t("ob.viewer.scrollhint")}
        </div>
        <SignaturePad client={client} agreement={agreement} text={text||""} canSign={reached} onSigned={onSigned}/>
      </div>
    </div>
  );
}

function Stage1Agreements({ client, cfg, signed, onSigned }){
  const [openK,setOpenK]=useState(null); const [busy,setBusy]=useState(false); const [err,setErr]=useState("");
  const agreements = (cfg && cfg.agreements ? cfg.agreements.slice() : []).sort((a,b)=>(a.order||0)-(b.order||0));
  const signedSet = new Set(signed||[]);
  const nextKind = (agreements.find(a=>!signedSet.has(a.kind))||{}).kind;
  // All required agreements already signed but the flow hasn't advanced (e.g.
  // an admin reopened to Signing while the signatures still stand) — let the
  // contractor continue instead of being stuck on all-ticked Stage 1.
  const allSigned = agreements.length>0 && agreements.filter(a=>a.required!==false).every(a=>signedSet.has(a.kind));
  async function cont(){
    setBusy(true); setErr("");
    const { data, error } = await client.functions.invoke("portal-self",{body:{action:"advance_from_stage1"}});
    setBusy(false);
    if(error||(data&&data.error)){ setErr((data&&data.error)||await fnErr(error,data)); return; }
    onSigned && onSigned();
  }
  return (
    <div className="card">
      <div style={{fontWeight:700,marginBottom:4}}>{t("ob.stage1.title")}</div>
      <p className="sub" style={{marginTop:0}}>{t("ob.stage1.intro")}</p>
      {agreements.map(a=>{
        const isSigned = signedSet.has(a.kind);
        const isNext = a.kind===nextKind;
        const locked = !isSigned && !isNext;
        return (
          <div key={a.kind} className={"ob-agr "+(isSigned?"done":locked?"locked":"active")}>
            <div style={{flex:1}}>
              <div style={{fontWeight:600}}>{a.title}</div>
              <div className="sub">{isSigned ? "✓ "+t("ob.signed") : locked ? t("ob.locked") : "v"+(a.version||"1.0")}</div>
            </div>
            {isSigned ? <span className="ob-check" aria-label={t("ob.signed")}>✓</span>
              : locked ? <span className="ob-lock" aria-hidden="true">🔒</span>
              : <button className="btn" style={{padding:"8px 12px"}} onClick={()=>setOpenK(a.kind)}>{t("ob.reviewsign")}</button>}
          </div>
        );
      })}
      {allSigned && <button className="btn" style={{width:"100%",marginTop:10}} disabled={busy} onClick={cont}>
        {busy?t("ob.sign.signing"):t("ob.stage2.continue")}</button>}
      {err && <div className="err" style={{marginTop:6}}>{err}</div>}
      {openK && <AgreementViewer client={client}
        agreement={agreements.find(a=>a.kind===openK)}
        onClose={()=>setOpenK(null)}
        onSigned={()=>{ setOpenK(null); onSigned && onSigned(); }}/>}
    </div>
  );
}

function OnboardingFlow({ client, session, cfg, prog:prog0, onDone }){
  const [prog,setProg]=useState(prog0||null);
  const [signed,setSigned]=useState([]);
  const [intro,setIntro]=useState(false);

      client.from("onboarding_signatures").select("agreement_kind").eq("status","signed"),

    setProg(p||null);
    setSigned((sg||[]).map(r=>r.agreement_kind));
    if(p && p.completed_at) onDone && onDone();
  }
  useEffect(()=>{ refresh(); },[]);
  const signedCount = new Set(signed).size;
  const stage = (prog && prog.current_stage) || "stage1_sign";
  return (
    <div className="wrap ob-wrap">
      <ProgressHeader prog={prog} cfg={cfg} signedCount={signedCount}/>
      {!intro && <WelcomeIntro onStart={()=>setIntro(true)}/>}
      {intro && stage==="stage1_sign" &&
        <Stage1Agreements client={client} cfg={cfg} signed={signed} onSigned={refresh}/>}
      {intro && stage==="stage2_profile" && <Stage2Profile client={client} onAdvance={refresh}/>}
      {intro && stage==="stage3_docs"   && <Stage3Docs client={client} session={session} cfg={cfg} onAdvance={refresh}/>}
      {intro && stage==="complete"      && <div className="card"><h2 style={{marginTop:0}}>{t("ob.done.title")}</h2></div>}
    </div>
  );
}

// ---- Stage 2: profile tabs (client validation mirrors portal-self) ----
const STAGE2_SECTIONS = [["contact","Contact"],["personal","Personal"],["payout","Payout"],["about","About you"]];
const REQUIRED_S2 = { first_name:1,last_name:1,mobile:1,ph_address:1,date_of_birth:1,emergency_name:1,emergency_relationship:1,emergency_mobile:1,marital_status:1 };
function validateTabClient(tab, f){
  const e={}; const ne=v=>v!=null&&String(v).trim()!==""; const PHM=/^(\+63|0)9\d{9}$/;
  if(tab==="contact"){
    if(!ne(f.first_name)) e.first_name="Required";
    if(!ne(f.last_name)) e.last_name="Required";
    if(!ne(f.ph_address)) e.ph_address="Required";
    if(!ne(f.mobile)) e.mobile="Required"; else if(!PHM.test(String(f.mobile).replace(/\s/g,""))) e.mobile="Use 09XXXXXXXXX or +639XXXXXXXXX";
    if(ne(f.postal_code)&&!/^\d{4}$/.test(String(f.postal_code).trim())) e.postal_code="PH postal code is 4 digits";
    if(!ne(f.date_of_birth)) e.date_of_birth="Required";
    else { const a=ageManila(f.date_of_birth); if(a==null) e.date_of_birth="Invalid date"; else if(a<18) e.date_of_birth="You must be at least 18"; }
  } else if(tab==="personal"){
    if(!ne(f.emergency_name)) e.emergency_name="Required";
    if(!ne(f.emergency_relationship)) e.emergency_relationship="Required";
    if(!ne(f.emergency_mobile)) e.emergency_mobile="Required"; else if(!PHM.test(String(f.emergency_mobile).replace(/\s/g,""))) e.emergency_mobile="Use 09XXXXXXXXX or +639XXXXXXXXX";
    if(!ne(f.marital_status)) e.marital_status="Required";
  } else if(tab==="payout"){
    if(!["gcash","paymaya","paypal","wise_tag"].some(k=>ne(f[k]))) e._="Add at least one payout method";
  }
  return e;
}
function Stage2Profile({ client, onAdvance }){
  const [form,setForm]=useState(null); const [sec,setSec]=useState("contact");
  const [errs,setErrs]=useState({}); const [busy,setBusy]=useState(false); const [serverErr,setServerErr]=useState("");
  useEffect(()=>{
    const cols = FIELD_DEFS.map(f=>f.ex?null:f.k).filter(Boolean).join(",")+",profile_extras";
    client.from("workers").select(cols).maybeSingle().then(({data})=>{
      const row=data||{}; const ex=(row.profile_extras&&typeof row.profile_extras==="object")?row.profile_extras:{};
      const f=Object.fromEntries(FIELD_DEFS.map(d=>[d.k,(d.ex?ex[d.k]:row[d.k])||""]));
      setForm(f);
      const firstBad=["contact","personal","payout"].find(t=>Object.keys(validateTabClient(t,f)).length);
      setSec(firstBad||"about");
    });
  },[]);
  if(!form) return <div className="card"><div className="empty">Loading…</div></div>;
  const set=(k,v)=>setForm(x=>({...x,[k]:v}));
  const order=STAGE2_SECTIONS.map(s=>s[0]); const idx=order.indexOf(sec); const isLast=idx===order.length-1;
  const secFields=FIELD_DEFS.filter(d=>d.s===sec);
  async function saveSection(){
    setServerErr("");
    const ce=validateTabClient(sec,form);
    if(Object.keys(ce).length){ setErrs(ce); return; }
    setErrs({}); setBusy(true);
    const fields=Object.fromEntries(secFields.map(d=>[d.k,form[d.k]]));
    const { data, error } = await client.functions.invoke("portal-self",{body:{action:"complete_tab",tab:sec,fields}});
    setBusy(false);
    if(error||(data&&data.error)){ setServerErr(await fnErr(error,data)); return; }
    if(data.field_errors&&data.field_errors.length){ const fe={}; data.field_errors.forEach(x=>fe[x.field]=x.msg); setErrs(fe); return; }
    // Walk EVERY tab in order, including the optional "About you" tab — don't
    // jump to Stage 3 the moment the required tabs validate (that skipped the
    // About tab entirely). Only advance to the next stage after the LAST tab.
    if(!isLast){ setSec(order[idx+1]); return; }
    onAdvance && onAdvance();
  }
  return (
    <div className="card">
      <div className="ptabs" style={{marginTop:0}}>
        {STAGE2_SECTIONS.map(([k,lbl])=>(
          <button key={k} className={sec===k?"on":""} onClick={()=>{ setErrs({}); setServerErr(""); setSec(k); }}>{lbl}</button>
        ))}
      </div>
      <p className="sub" style={{marginTop:0}}>{t("ob.stage2.intro")}</p>
      {secFields.map(d=>(
        <div key={d.k} style={{margin:"8px 0"}}>
          <label className="sub" style={{display:"block"}}>{d.label}{REQUIRED_S2[d.k]?" *":""}</label>
          {d.opts
            ? <select value={form[d.k]||""} onChange={e=>set(d.k,e.target.value)} aria-invalid={errs[d.k]?"true":"false"}><option value="">Select…</option>{d.opts.map(o=><option key={o} value={o}>{o}</option>)}{form[d.k]&&!d.opts.includes(form[d.k])&&<option value={form[d.k]}>{form[d.k]}</option>}</select>
            : <input type={d.type||"text"} value={form[d.k]||""} onChange={e=>set(d.k,e.target.value)}
                aria-invalid={errs[d.k]?"true":"false"} placeholder={d.wise?"@yourtag":""}/>}
          {errs[d.k] && <div className="err" style={{padding:"2px 0"}}>{errs[d.k]}</div>}
        </div>
      ))}
      {sec==="payout" && errs._ && <div className="err">{errs._}</div>}
      {serverErr && <div className="err">{serverErr}</div>}
      <button className="btn" style={{width:"100%",marginTop:8}} disabled={busy} onClick={saveSection}>
        {busy?t("ob.sign.signing"):(isLast?t("ob.stage2.finish"):t("ob.stage2.continue"))}
      </button>
    </div>
  );
}

// ---- Stage 3: document uploads (HR-reviewed) ----
function UploadSlot({ client, session, wid, slot, doc, onChange }){
  const [file,setFile]=useState(null); const [issued,setIssued]=useState((doc&&doc.issued_on)||"");
  const [busy,setBusy]=useState(false); const [msg,setMsg]=useState("");
  const status=doc&&doc.review_status;
  async function doUpload(){
    setMsg("");
    if(!file){ setMsg(t("ob.err.file")); return; }
    if(!wid){ setMsg("Couldn't find your profile — contact admin."); return; }
    if(!["application/pdf","image/jpeg","image/png"].includes(file.type)){ setMsg(t("ob.err.filetype")); return; }
    if(file.size>10*1024*1024){ setMsg(t("ob.err.filesize")); return; }
    if(slot.kind==="nbi_clearance" && !issued){ setMsg(t("ob.err.issued")); return; }
    setBusy(true);
    try{
      const uid=session&&session.user&&session.user.id;
      const path=`${uid}/${slot.kind}/${Date.now()}-${slot.side?slot.side+"-":""}${file.name.replace(/[^a-zA-Z0-9._-]/g,"_")}`;
      const up=await client.storage.from("contractor-docs").upload(path,file,{upsert:false});
      if(up.error) throw up.error;
      const row={worker_id:wid,kind:slot.kind,storage_path:path,title:file.name,mime_type:file.type,file_size_bytes:file.size,review_status:"pending"};
      if(slot.side) row.side=slot.side;
      if(slot.kind==="nbi_clearance"&&issued) row.issued_on=issued;
      const ins=await client.from("documents").insert(row);
      if(ins.error) throw ins.error;
      setFile(null); onChange&&onChange();
    }catch(ex){ setMsg("Upload failed: "+(ex.message||ex)); }
    finally{ setBusy(false); }
  }
  const badge = status==="approved"?{cls:"paid",txt:t("ob.doc.approved")}
    : status==="needs_replacement"?{cls:"pending",txt:t("ob.doc.needs")}
    : status?{cls:"pending",txt:t("ob.doc.pending")}:null;
  return (
    <div style={{borderTop:"1px solid var(--line)",padding:"10px 0"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontWeight:600}}>{slot.label}{slot.optional && <span className="sub" style={{fontWeight:400}}> · optional</span>}</div>
        {badge && <span className={"pill "+badge.cls}>{badge.txt}</span>}
      </div>
      {status==="needs_replacement" && doc&&doc.review_reason &&
        <div className="err" style={{marginTop:4}}>{t("ob.doc.reason")}: {doc.review_reason}</div>}
      {status!=="approved" && <div>
        {slot.kind==="nbi_clearance" && <div>
          <label className="sub" style={{display:"block",marginTop:6}}>{t("ob.doc.issued")}</label>
          <input type="date" value={issued} onChange={e=>setIssued(e.target.value)}/>
        </div>}
        <input type="file" accept="application/pdf,image/jpeg,image/png" capture="environment"
          onChange={e=>setFile(e.target.files&&e.target.files[0]||null)} style={{margin:"6px 0"}}/>
        {msg && <div className="err">{msg}</div>}
        <button className="btn ghost" style={{color:"var(--accent)",borderColor:"var(--accent)",padding:"6px 12px"}} disabled={busy} onClick={doUpload}>
          {busy?t("ob.doc.uploading"):(status?t("ob.doc.replace"):t("ob.doc.upload"))}
        </button>
      </div>}
      {status==="approved" && doc&&doc.title && <div className="sub" style={{marginTop:4}}>✓ {doc.title}</div>}
    </div>
  );
}
function Stage3Docs({ client, session, cfg, onAdvance }){
  const [wid,setWid]=useState(null); const [docs,setDocs]=useState(null); const [err,setErr]=useState(""); const [busy,setBusy]=useState(false);
  function load(){
    client.from("workers").select("id").maybeSingle().then(({data})=>setWid(data&&data.id||null));
    client.from("documents").select("id,kind,side,title,storage_path,issued_on,review_status,review_reason,created_at")
      .order("created_at",{ascending:false})
      .then(({data,error})=>{ if(error) setErr(error.message); setDocs(data||[]); });
  }
  useEffect(load,[]);
  const DEFAULT_DOCS=[{kind:"resume",title:"Resume / CV",required:true},{kind:"diploma",title:"Diploma or Transcript of Records",required:true},{kind:"nbi_clearance",title:"NBI Clearance",required:true,freshness_months:6},{kind:"gov_id",title:"Government-issued ID or Passport",required:true,sides:["front","back"]}];
  const allCfgDocs=(cfg&&Array.isArray(cfg.documents)&&cfg.documents.length)?cfg.documents:DEFAULT_DOCS;
  const byKey={}; (docs||[]).forEach(d=>{ const key=d.kind+"|"+(d.side||""); (byKey[key]=byKey[key]||[]).push(d); });
  const latest=(kind,side)=>{ const a=byKey[kind+"|"+(side||"")]; return a&&a[0]; };
  // Show EVERY configured document (required + optional). Only REQUIRED ones
  // gate completion; optional ones are uploadable but never block — outstanding
  // ones are reminded at login instead.
  const slots=[];
  allCfgDocs.forEach(d=>{
    const optional = d.required===false;
    if(Array.isArray(d.sides)) d.sides.forEach(side=>slots.push({kind:d.kind,side,label:d.title+" ("+side+")",optional}));
    else slots.push({kind:d.kind,side:null,label:d.title,optional});
  });
  const reqSlots=slots.filter(s=>!s.optional);
  const isApproved=s=>{ const l=latest(s.kind,s.side); return l&&l.review_status==="approved"; };
  const isSubmitted=s=>{ const l=latest(s.kind,s.side); return l&&l.review_status!=="needs_replacement"; };   // pending or approved
  const allRequiredApproved = reqSlots.every(isApproved);                       // vacuously true if no required docs
  const awaitingReview = reqSlots.length>0 && reqSlots.every(isSubmitted) && !allRequiredApproved;
  const optionalOutstanding = slots.filter(s=>s.optional && !isSubmitted(s)).length;
  async function finish(){
    setBusy(true); setErr("");
    const { data, error } = await client.functions.invoke("portal-self",{body:{action:"finish_onboarding"}});
    setBusy(false);
    if(error||(data&&data.error)){ setErr((data&&data.error)||await fnErr(error,data)); return; }
    onAdvance && onAdvance();
  }
  if(docs===null) return <div className="card"><div className="empty">Loading…</div></div>;
  return (
    <div className="card">
      <div style={{fontWeight:700,marginBottom:4}}>{t("ob.stage3.title")}</div>
      <p className="sub" style={{marginTop:0}}>{t("ob.stage3.intro")}</p>
      {awaitingReview && (
        <div style={{background:"#f7edd8",border:"1px solid var(--gold)",borderRadius:12,padding:"14px 16px",margin:"6px 0 10px"}}>
          <div style={{fontWeight:700,marginBottom:4,color:"var(--accent)"}}>⏳ {t("ob.stage3.review.title")}</div>
          <div className="sub" style={{margin:0,fontSize:14,color:"#5b4a22"}}>{t("ob.stage3.review.body")}</div>
        </div>
      )}
      {err && <div className="err">{err}</div>}
      {slots.map(s=>(
        <UploadSlot key={s.kind+(s.side||"")} client={client} session={session} wid={wid} slot={s} doc={latest(s.kind,s.side)} onChange={load}/>
      ))}
      {allRequiredApproved && optionalOutstanding>0 &&
        <p className="sub" style={{marginTop:8}}>You can finish now and upload the {optionalOutstanding} optional document{optionalOutstanding>1?"s":""} later — we'll remind you at login.</p>}
      <button className="btn" style={{width:"100%",marginTop:10}} disabled={busy||!allRequiredApproved} onClick={finish}>
        {busy?t("ob.sign.signing"):(allRequiredApproved? t("ob.stage3.finish") : t("ob.stage3.waiting"))}
      </button>
    </div>
  );
}

function App(){
  const { client, session, ready } = useClient();
  const [ob,setOb]=useState(undefined);   // undefined=loading | {enabled,done,prog,cfg}
  useEffect(()=>{
    if(!client || !session){ return; }
    let cancelled=false;
    (async()=>{
      const [{data:ps},{data:prog}] = await Promise.all([
        client.from("portal_settings").select("onboarding_config").eq("id",1).maybeSingle(),
        client.from("onboarding_progress").select("current_stage,stage1_complete,stage2_complete,stage3_complete,completed_at").maybeSingle(),
      ]);
      if(cancelled) return;
      const cfg = (ps && ps.onboarding_config) || {};
      setOb({ enabled: !!cfg.onboarding_enabled, done: !!(prog && prog.completed_at), prog: prog||null, cfg });
    })().catch(()=>{ if(!cancelled) setOb({ enabled:false, done:true, prog:null, cfg:{} }); });
    return ()=>{ cancelled=true; };
  },[client,session]);

  const loading = <div className="wrap"><div className="empty">Loading…</div></div>;
  if(!client || !ready) return loading;
  if(!session) return <Login client={client}/>;
  if(ob===undefined) return loading;
  // Gate: only when the feature is enabled AND this contractor hasn't finished.
  if(ob.enabled && !ob.done)
    return <OnboardingFlow client={client} session={session} cfg={ob.cfg} prog={ob.prog} onDone={()=>setOb(x=>({...x,done:true}))}/>;
  return <Portal client={client} session={session}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
