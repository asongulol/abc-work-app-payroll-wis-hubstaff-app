name: CI

# Checks-only CI: lint + HTML syntax + precompile check. No production access,
# no secrets required. Gives every push/PR a green/red signal and catches
# anything a skipped local hook would have missed.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Lint (eslint + HTML syntax)
        run: npm run lint

      - name: Build check (precompile, no write)
        run: npm run build:check
